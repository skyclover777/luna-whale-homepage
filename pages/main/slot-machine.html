    <script>

            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                        "primary-blue": "#0056b3",
                        "sky-blue": "#3da9fc",
                        "navy-blue": "#094067",
                    },
                    animation: {
                        fadeInUp: 'fadeInUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },

        body {

            background-color: #f8fafc;
        }

        .dark body {
            background-color: #0f172a;
        }

        .neumorphic-slot-blue {
            box-shadow: inset 8px 8px 16px rgba(224, 231, 255, 0.8), inset -8px -8px 16px rgba(255, 255, 255, 0.8);
            border: 4px solid #f0f7ff;
        }

        .dark .neumorphic-slot-blue {
            box-shadow: inset 8px 8px 16px rgba(0, 0, 0, 0.3), inset -8px -8px 16px rgba(255, 255, 255, 0.05);
            border: 4px solid #1e293b;
            background-color: #0f172a;
        }

        .pop-art-shadow-blue {
            box-shadow: 6px 6px 0px 0px #094067;
        }

        .dark .pop-art-shadow-blue {
            box-shadow: 6px 6px 0px 0px #0ea5e9;
            border-color: #0ea5e9;
        }

        .blue-gradient-bg {
            background: radial-gradient(circle at 50% 50%, #f0f9ff 0%, #ffffff 100%);
        }

        .dark .blue-gradient-bg {
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .slot-animation-container {
            mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent);
        }

        /* Spinning animation logic */
        .slot-col {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .slot-item {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hide-scrollbar::-webkit-scrollbar {

        }

            -ms-overflow-style: none;
            scrollbar-width: none;

        // Shuffle utility
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderCol(colIndex, itemsArray) {
            cols[colIndex].innerHTML = "";

                const item = itemsArray[j];
                const div = document.createElement('div');
                div.className = "slot-item text-center w-full"; // 100px height

                    const styleClass = colIndex === 0 ? "text-navy-blue dark:text-white" : "text-navy-blue dark:text-white";

        function initInitialState() {

                for (let j = 0; j < numItemsPerColumn; j++) items.push(pool[j % pool.length]);

                renderCol(i, items);

                // Immediately jump to the end of the random list. 
                // Using target index (numItemsPerColumn - 2).
                // Magic number 94 centers the 100px item horizontally inside the 288px container.
                const targetY = 94 - ((numItemsPerColumn - 2) * 100);
                cols[i].style.transition = 'none';
                cols[i].style.transform = `translateY(${targetY}px)`;
            }
        }

        // Fire spin
        function spin() {
            if (isSpinning) return;
            isSpinning = true;

            const N = numItemsPerColumn;

            for (let i = 0; i < 3; i++) {
                let oldItems = colsCurrentItems[i];
                let pool = shuffle([...slotsData[i]]);
                let newItems = [];

                // Seamlessly transfer the currently visible 3 items to the TOP of the new list.
                // Currently focused on N-2, which means indices N-3, N-2, N-1 are visible in the box.
                newItems[0] = oldItems[N - 3];
                newItems[1] = oldItems[N - 2];
                newItems[2] = oldItems[N - 1];

                // Fill the rest randomly
                for (let j = 3; j < N; j++) {
                    newItems[j] = pool[j % pool.length];
                }

                colsCurrentItems[i] = newItems;
                renderCol(i, newItems);

                // Instantly snap to the top (index 1 is vertically centered) so it perfectly overlays the old position.
                // 94 - 100 = -6px offset
                cols[i].style.transition = 'none';
                cols[i].style.transform = `translateY(-6px)`;
            }

            // Force reflow to commit 'none' transitions
            void cols[0].offsetHeight;

            // Start animation
            // Target Y is N-2
            const targetY = 94 - ((numItemsPerColumn - 2) * 100);

            // Spin each column with slightly different delays for the classic effect
            cols.forEach((col, i) => {
                setTimeout(() => {
                    col.style.transition = `transform ${2.5 + i * 0.5}s cubic-bezier(0.15, 0.85, 0.25, 1)`;
                    col.style.transform = `translateY(${targetY}px)`;
                }, i * 200);
            });

            // Re-enable after longest spin completes
            setTimeout(() => {
                isSpinning = false;
            }, 2500 + (2 * 500) + 100);
        }

            const wrapAdj = document.getElementById('wrap-adj');

                wrapPlace.style.order = "3";
            }

            // Immediately re-render currently displayed items so they translate in place
            if (colsCurrentItems[0].length > 0) {
                renderCol(0, colsCurrentItems[0]);
