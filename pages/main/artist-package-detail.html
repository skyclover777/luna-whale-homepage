<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작가 100강 패키지 - Luna Whale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0b08;
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            color: #f5ede0;
            min-height: 100vh;
        }

        /* ── Ambient ── */
        .ambient {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .ambient .orb {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.12;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .ambient .orb:nth-child(1) { width: 500px; height: 500px; background: #c9a24e; top: -100px; left: -100px; }
        .ambient .orb:nth-child(2) { width: 400px; height: 400px; background: #8b6914; bottom: -80px; right: -80px; animation-delay: -7s; }
        @keyframes drift { to { transform: translate(60px, -40px) scale(1.1); } }

        /* ── Layout ── */
        .page-wrap {
            position: relative; z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 24px 80px;
        }

        /* ── Back ── */
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none; color: #c9a24e;
            font-size: 14px; opacity: 0.7;
            transition: opacity 0.3s; margin-bottom: 20px;
        }
        .back-btn:hover { opacity: 1; }

        /* ── Package Header ── */
        .pkg-header {
            text-align: center;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(201,162,78,0.15);
            margin-bottom: 40px;
        }

        .pkg-vol {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            color: #c9a24e;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .pkg-header h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 34px;
            font-weight: 900;
            background: linear-gradient(135deg, #f5ede0, #c9a24e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .pkg-header .en-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: rgba(201,162,78,0.6);
            font-style: italic;
            margin-bottom: 16px;
        }

        .pkg-header .pkg-desc {
            font-size: 14px;
            color: rgba(245,237,224,0.5);
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .pkg-range-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 20px;
            border: 1px solid rgba(201,162,78,0.3);
            border-radius: 30px;
            font-size: 12px;
            color: #c9a24e;
            letter-spacing: 1px;
        }

        /* ── Lesson List ── */
        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lesson-item {
            display: flex;
            align-items: stretch;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,162,78,0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(.22,.68,0,1);
        }
        .lesson-item:hover {
            background: rgba(201,162,78,0.06);
            border-color: rgba(201,162,78,0.3);
            transform: translateX(6px);
            box-shadow: 0 8px 30px rgba(201,162,78,0.08);
        }

        /* Thumbnail */
        .lesson-thumb {
            width: 130px;
            min-height: 130px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .lesson-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .lesson-item:hover .lesson-thumb img {
            transform: scale(1.08);
        }
        .lesson-thumb .num-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(13,11,8,0.8);
            color: #c9a24e;
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .lesson-thumb.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a1f14, #1a1408);
        }
        .lesson-thumb.placeholder .ph-icon {
            font-size: 36px;
            opacity: 0.3;
        }

        /* Lesson info */
        .lesson-info {
            flex: 1;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .lesson-info .artist-name {
            font-size: 12px;
            color: #c9a24e;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .lesson-info .lesson-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 19px;
            font-weight: 700;
            color: #f5ede0;
            margin-bottom: 3px;
        }

        .lesson-info .lesson-en {
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            font-style: italic;
            color: rgba(201,162,78,0.5);
            margin-bottom: 8px;
        }

        .lesson-info .lesson-desc {
            font-size: 12px;
            color: rgba(245,237,224,0.4);
            line-height: 1.6;
        }

        .lesson-info .lesson-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .lesson-info .cat-tag {
            font-size: 11px;
            padding: 2px 10px;
            background: rgba(201,162,78,0.1);
            border: 1px solid rgba(201,162,78,0.15);
            border-radius: 20px;
            color: rgba(201,162,78,0.7);
        }

        .lesson-info .years-tag {
            font-size: 11px;
            color: rgba(245,237,224,0.25);
        }

        .lesson-info .img-count {
            font-size: 11px;
            color: rgba(245,237,224,0.25);
        }

        /* Arrow */
        .lesson-arrow {
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: rgba(201,162,78,0.3);
            transition: color 0.3s;
        }
        .lesson-item:hover .lesson-arrow {
            color: #c9a24e;
        }

        /* ── Navigation between packages ── */
        .pkg-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(201,162,78,0.1);
        }
        .pkg-nav a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #c9a24e;
            font-size: 14px;
            opacity: 0.6;
            transition: opacity 0.3s;
            padding: 10px 18px;
            border: 1px solid rgba(201,162,78,0.2);
            border-radius: 12px;
        }
        .pkg-nav a:hover { opacity: 1; }
        .pkg-nav a.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* ── Sound ── */
        .play-sound { display: none; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .pkg-header h1 { font-size: 26px; }
            .lesson-thumb { width: 100px; min-height: 100px; }
            .lesson-info .lesson-title { font-size: 16px; }
            .lesson-arrow { padding: 0 12px; }
        }
        @media (max-width: 480px) {
            .page-wrap { padding: 20px 16px 60px; }
            .lesson-thumb { width: 80px; min-height: 80px; }
            .lesson-info { padding: 12px 14px; }
            .lesson-info .lesson-title { font-size: 15px; }
            .lesson-info .lesson-desc { display: none; }
            .lesson-arrow { display: none; }
        }
    </style>
    <script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<div class="ambient">
    <div class="orb"></div>
    <div class="orb"></div>
</div>

<div class="page-wrap">
    <a href="artist-packages.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        패키지 목록
    </a>

    <header class="pkg-header" id="pkgHeader"></header>

    <div class="lesson-list" id="lessonList"></div>

    <nav class="pkg-nav" id="pkgNav"></nav>
</div>

<script src="../../assets/data/artist-100-data.js"></script>
<script>
// ═══ Package Definitions ═══
const PACKAGES = [
    { id:1, range:[1,10],  title:'선과 색의 기초', en:'Foundations of Line & Color', emoji:'🎨',
      desc:'칸딘스키, 클레, 몬드리안, 반 고흐 등 거장들과 함께 선, 색, 형태의 기본 언어를 배웁니다. 추상의 세계에 첫 발을 내딛는 입문 패키지.' },
    { id:2, range:[11,20], title:'시선과 감정', en:'Perspective & Emotion', emoji:'👁️',
      desc:'호퍼의 고독, 프리다의 자화상, 뭉크의 비명까지. 화가들이 세상을 바라보는 다양한 시선과 감정 표현법을 익힙니다.' },
    { id:3, range:[21,30], title:'상상과 해체', en:'Imagination & Deconstruction', emoji:'🌀',
      desc:'달리의 꿈, 마그리트의 역설, 에셔의 무한, 피카소의 해체. 현실을 넘어서는 초현실과 큐비즘의 세계를 탐험합니다.' },
    { id:4, range:[31,40], title:'거리와 패턴', en:'Streets & Patterns', emoji:'✨',
      desc:'바스키아의 스프레이, 쿠사마의 물방울, 클림트의 황금 무늬. 거리 예술부터 장식 미술까지, 반복과 패턴의 힘을 체험합니다.' },
    { id:5, range:[41,50], title:'사회와 내면', en:'Society & Inner Voice', emoji:'🔥',
      desc:'키스 해링의 저항, 바버라 크루거의 메시지, 아이 웨이웨이의 도전. 예술이 사회에 던지는 목소리와 내면의 울림을 다룹니다.' },
    { id:6, range:[51,60], title:'일상의 발견', en:'Discovering the Everyday', emoji:'🌿',
      desc:'모네의 빛, 와이어스의 계절, 에민의 감정 일기. 평범한 일상에서 예술을 발견하고 기록하는 방법을 배웁니다.' },
    { id:7, range:[61,70], title:'몸과 공간', en:'Body & Space', emoji:'🏛️',
      desc:'다빈치의 해부학, 칼더의 모빌, 오키프의 풍경. 인체와 자연 공간을 새로운 시각으로 바라보고 표현하는 수업입니다.' },
    { id:8, range:[71,80], title:'기억과 시간', en:'Memory & Time', emoji:'⏳',
      desc:'프리드리히의 달빛, 리히터의 흐릿한 기억, 호크니의 물속 리듬. 시간이 남기는 흔적과 기억의 풍경을 그립니다.' },
    { id:9, range:[81,90], title:'꿈과 실험', en:'Dreams & Experiments', emoji:'🔮',
      desc:'샤갈의 마법 동물, 골즈워디의 대지미술, 리시츠키의 구성주의. 경계를 허물고 새로운 매체와 기법을 실험합니다.' },
    { id:10, range:[91,100], title:'정체성과 출발', en:'Identity & New Beginning', emoji:'🚀',
      desc:'패턴 속 나를 찾고, 도시를 걸으며, 마지막에는 "나 자신"을 작가로 선언합니다. 당신만의 예술 세계가 시작되는 마지막 패키지.' }
];

// ═══ Parse URL ═══
const params = new URLSearchParams(location.search);
const pkgId = parseInt(params.get('pkg')) || 1;
const pkg = PACKAGES.find(p => p.id === pkgId) || PACKAGES[0];

// ═══ Sound ═══
function playDrop() {
    const a = new Audio('../../assets/sounds/SonSounds/DA - Book Drop - 1.mp3');
    a.volume = 0.05; a.play().catch(()=>{});
}

// ═══ Render Header ═══
document.title = `Vol.${pkg.id} ${pkg.title} - 작가 100강`;
document.getElementById('pkgHeader').innerHTML = `
    <div class="pkg-vol">VOLUME ${String(pkg.id).padStart(2,'0')}</div>
    <h1>${pkg.emoji} ${pkg.title}</h1>
    <div class="en-title">${pkg.en}</div>
    <p class="pkg-desc">${pkg.desc}</p>
    <div class="pkg-range-badge">제${pkg.range[0]}강 ~ 제${pkg.range[1]}강 · 10수업</div>
`;

// ═══ Render Lessons ═══
const lessons = ARTIST_LESSONS.filter(l => l.id >= pkg.range[0] && l.id <= pkg.range[1]);
const list = document.getElementById('lessonList');

lessons.forEach((lesson, idx) => {
    const NNN = String(lesson.id).padStart(3, '0');
    const hasCover = lesson.imageCount > 0;

    const item = document.createElement('div');
    item.className = 'lesson-item';
    item.style.animationDelay = (idx * 0.06) + 's';
    item.onclick = () => {
        playDrop();
        if (hasCover) {
            window.location.href = `artist-lesson.html?lesson=${lesson.id}`;
        }
    };

    item.innerHTML = `
        <div class="lesson-thumb ${hasCover ? '' : 'placeholder'}">
            ${hasCover
                ? `<img src="../../images/artist-100/${NNN}/thumbs/${NNN}_001.jpg" loading="lazy" alt="${lesson.title}">`
                : `<span class="ph-icon">🔒</span>`
            }
            <div class="num-badge">${lesson.id}</div>
        </div>
        <div class="lesson-info">
            <div class="artist-name">${lesson.artist} · ${lesson.artistEn}</div>
            <div class="lesson-title">${lesson.title}</div>
            <div class="lesson-en">${lesson.en}</div>
            <div class="lesson-desc">${lesson.lesson || ''}</div>
            <div class="lesson-meta">
                <span class="cat-tag">${lesson.category}</span>
                <span class="years-tag">${lesson.years}</span>
                ${hasCover ? `<span class="img-count">🖼️ ${lesson.imageCount}장</span>` : ''}
            </div>
        </div>
        <div class="lesson-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
        </div>
    `;

    list.appendChild(item);
});

// ═══ Prev / Next navigation ═══
const prevPkg = PACKAGES.find(p => p.id === pkgId - 1);
const nextPkg = PACKAGES.find(p => p.id === pkgId + 1);

document.getElementById('pkgNav').innerHTML = `
    <a href="${prevPkg ? `artist-package-detail.html?pkg=${prevPkg.id}` : '#'}" class="${prevPkg ? '' : 'disabled'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        ${prevPkg ? `Vol.${prevPkg.id} ${prevPkg.title}` : ''}
    </a>
    <a href="${nextPkg ? `artist-package-detail.html?pkg=${nextPkg.id}` : '#'}" class="${nextPkg ? '' : 'disabled'}">
        ${nextPkg ? `Vol.${nextPkg.id} ${nextPkg.title}` : ''}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
    </a>
`;
</script>

</body>
</html>
