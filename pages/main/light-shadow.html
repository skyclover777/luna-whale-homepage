<!DOCTYPE html>
<html class="light" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Luna Whale 3D Light & Shadow Laboratory">
    <title>3D Light & Shadow Laboratory</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="../../index.css" rel="stylesheet" />

    <!-- React, ReactDOM, Three, React-Three-Fiber, Drei via ESM.sh -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <!-- Babel standalone for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../assets/js/luna-nav.js"></script>
</head>

<body
    class="bg-gray-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 antialiased transition-colors duration-300">

    <div id="root" class="w-full max-w-6xl"></div>

    <!-- React App Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, Suspense, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas } from '@react-three/fiber';
        import { OrbitControls, Sphere, Box, RoundedBox, Cone, Plane, SoftShadows, useGLTF } from '@react-three/drei';

        function Model({ url, scale, position, materialProps }) {
            const { scene } = useGLTF(url);
            useEffect(() => {
                scene.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (materialProps) {
                            child.material = new THREE.MeshStandardMaterial(materialProps);
                        }
                    }
                });
            }, [scene, materialProps]);
            return <primitive object={scene} scale={scale} position={position} />;
        }

        function Scene({ shape, lightPos }) {
            // Plaster-like matte material for drawing study
            const materialProps = {
                color: '#f5f5f5',
                roughness: 0.9, // Matte like paper/plaster
                metalness: 0.0,
            };

            return (
                <group>
                    {/* Lighting setup */}
                    <ambientLight intensity={0.1} />
                    <hemisphereLight color="#ffffff" groundColor="#444444" intensity={0.4} />
                    <spotLight
                        castShadow
                        position={[lightPos.x, lightPos.y, lightPos.z]}
                        intensity={150}
                        angle={0.8}
                        penumbra={0.5}
                        decay={2}
                        shadow-mapSize={[1024, 1024]}
                        shadow-bias={-0.0001}
                    />

                    {/* Shapes */}
                    <group position={[0, 1, 0]}>
                        {shape === 'Sphere' && <Sphere args={[1, 64, 64]} castShadow receiveShadow><meshStandardMaterial {...materialProps} /></Sphere>}
                        {shape === 'Cube' && <RoundedBox args={[1.5, 1.5, 1.5]} radius={0.05} smoothness={4} position={[0, -0.25, 0]} castShadow receiveShadow><meshStandardMaterial {...materialProps} /></RoundedBox>}
                        {shape === 'Cone' && <Cone args={[1, 2, 32]} castShadow receiveShadow position={[0, 0, 0]}><meshStandardMaterial {...materialProps} /></Cone>}
                        {shape === 'Figure1' && <Model url="../../models/david.glb" scale={0.4} position={[0, 0.4, 0]} materialProps={materialProps} />}
                        {shape === 'Figure2' && <Model url="../../models/venus.glb" scale={0.16} position={[0, -1.0, 0]} materialProps={materialProps} />}
                    </group>

                    {/* Ground Plane */}
                    <Plane receiveShadow rotation={[-Math.PI / 2, 0, 0]} position={[0, 0, 0]} args={[50, 50]}>
                        <meshStandardMaterial color="#eeeeee" />
                    </Plane>

                    {/* Controls */}
                    <OrbitControls makeDefault minPolarAngle={0} maxPolarAngle={Math.PI / 2 - 0.05} />
                </group>
            );
        }

        function App() {
            const [shape, setShape] = useState('Sphere');
            const [lightPos, setLightPos] = useState({ x: 5, y: 5, z: 5 });

            const handleLightChange = (axis, value) => {
                setLightPos(prev => ({ ...prev, [axis]: parseFloat(value) }));
            };

            const shapes = [
                { id: 'Sphere', icon: 'circle', label: 'Sphere' },
                { id: 'Cube', icon: 'square', label: 'Cube' },
                { id: 'Cone', icon: 'change_history', label: 'Cone' },
                { id: 'Figure1', icon: 'face', label: 'Figure 1' },
                { id: 'Figure2', icon: 'woman', label: 'Figure 2' }
            ];

            return (
                <div className="relative flex h-auto w-full flex-col bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 animate-fadeInUp">
                    {/* Header */}
                    <header className="flex items-center justify-between border-b border-solid border-slate-100 dark:border-slate-800 px-6 md:px-8 py-5 md:py-6">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href = '../../index.html'} className="flex items-center justify-center rounded-full h-10 w-10 md:h-12 md:w-12 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                <span className="material-symbols-outlined text-xl md:text-2xl">arrow_back</span>
                            </button>
                            <div>
                                <h1 className="text-lg md:text-2xl font-black leading-tight tracking-tight text-navy-blue dark:text-sky-300">오늘의 빛과 그림자</h1>
                                <p className="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-widest mt-0.5">3D Laboratory Viewer</p>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="p-4 md:p-8 flex flex-col lg:flex-row gap-6 md:gap-8">
                        {/* 3D Canvas Section */}
                        <div className="relative w-full lg:w-[70%] xl:w-3/4 aspect-square md:aspect-video lg:aspect-auto lg:h-[600px] bg-gradient-to-b from-slate-100 to-slate-200 dark:from-slate-800 dark:to-slate-950 rounded-2xl overflow-hidden shadow-[inset_0_2px_10px_rgba(0,0,0,0.1)]">
                            <Canvas shadows camera={{ position: [5, 5, 8], fov: 45 }}>
                                <color attach="background" args={['#1e293b']} /> {/* Dark slate background for canvas */}
                                <fog attach="fog" args={['#1e293b', 10, 40]} />
                                <Suspense fallback={null}>
                                    <Scene shape={shape} lightPos={lightPos} />
                                </Suspense>
                            </Canvas>

                            {/* On-canvas status */}
                            <div className="absolute top-4 left-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur px-3 py-1.5 rounded-full text-[10px] font-bold tracking-tighter text-slate-600 dark:text-slate-400 border border-slate-200/50 shadow-sm pointer-events-none">
                                REAL-TIME RENDER: {shape.toUpperCase()}
                            </div>
                            <div className="absolute bottom-4 right-4 bg-black/40 backdrop-blur px-3 py-1.5 rounded-lg text-xs text-white/80 flex items-center gap-2 pointer-events-none">
                                <span className="material-symbols-outlined text-sm">360</span> Drag to rotate
                            </div>
                        </div>

                        {/* Control Panel */}
                        <div className="w-full lg:w-[30%] xl:w-1/4 flex flex-col gap-4 md:gap-6 lg:gap-4 xl:gap-6 items-start lg:max-h-[600px] lg:overflow-y-auto lg:pr-2 custom-scrollbar">
                            {/* Object Selection */}
                            <div className="w-full flex flex-col gap-2">
                                <h3 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest px-1">기본 도형 (Objects)</h3>
                                <div className="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-5 lg:grid-cols-3 gap-2 p-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50">
                                    {shapes.map((s) => (
                                        <label key={s.id} className={`flex flex-col cursor-pointer items-center justify-center gap-1.5 rounded-xl p-2 transition-all ${shape === s.id ? 'bg-white dark:bg-slate-700 shadow-sm text-primary-blue dark:text-sky-400 border-sky-blue/30 dark:border-sky-500/30 border' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border border-transparent'}`}>
                                            <span className="material-symbols-outlined text-2xl md:text-3xl">{s.icon}</span>
                                            <span className="text-[10px] md:text-xs font-bold whitespace-nowrap">{s.label}</span>
                                            <input className="hidden" name="object-select" type="radio" value={s.id} checked={shape === s.id} onChange={(e) => setShape(e.target.value)} />
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Light Properties */}
                            <div className="w-full flex flex-col gap-3">
                                <h3 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest px-1">조명 방향 조절 (Light Position)</h3>
                                <div className="space-y-4 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700/50">
                                    {['x', 'y', 'z'].map((axis) => (
                                        <div key={axis} className="flex flex-col gap-2 md:gap-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs md:text-sm font-black text-slate-400 dark:text-slate-500 uppercase">Axis {axis}</span>
                                                <span className="text-xs font-mono text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 px-2 py-0.5 rounded-full">{lightPos[axis].toFixed(1)}</span>
                                            </div>
                                            <input
                                                className="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary-blue"
                                                title={`Axis ${axis} slider`}
                                                max="15"
                                                min="-15"
                                                step="0.5"
                                                type="range"
                                                value={lightPos[axis]}
                                                onChange={(e) => handleLightChange(axis, e.target.value)}
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<!-- Art Cosmos Widget -->
<script src="../../assets/data/art-archive.js?v=0319"></script>
<script src="../../assets/js/voice-engine.js?v=0319"></script>
<script src="../../assets/js/art-cosmos-widget.js?v=0320b"></script>
</body>

</html>
