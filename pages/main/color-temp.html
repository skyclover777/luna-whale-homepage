<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>색온도 필터 - Luna Whale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lexend:wght@300;400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lexend',sans-serif;background:#f8f6f3;min-height:100vh;color:#2c2420}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(248,246,243,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.04);padding:14px 24px;display:flex;align-items:center;gap:14px}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.08);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.back-btn:hover{background:rgba(0,0,0,.04)}
.top-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#2c2420;flex:1;letter-spacing:-.5px}
.container{max-width:900px;margin:0 auto;padding:24px}
.subtitle{text-align:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:#a09890;margin-bottom:24px;letter-spacing:-.2px}

/* Sliders */
.sliders{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;max-width:500px;margin-left:auto;margin-right:auto}
.slider-row{display:flex;align-items:center;gap:12px}
.slider-row label{font-size:12px;color:#6b5c4e;font-weight:400;min-width:52px;text-align:right}
.slider-row input[type=range]{flex:1;height:6px;-webkit-appearance:none;background:#e8e4de;border-radius:3px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
#temp-slider::-webkit-slider-thumb{background:linear-gradient(135deg,#e8a040,#4a90d9)}
#sat-slider::-webkit-slider-thumb{background:#8b7355}
#bright-slider::-webkit-slider-thumb{background:#8b7355}
#contrast-slider::-webkit-slider-thumb{background:#8b7355}
.slider-row .val{font-size:11px;color:#2c2420;min-width:36px;text-align:center;font-weight:600}

/* Temp bar gradient */
.temp-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#4a90d9,#f5f0e8,#e8a040);margin:-4px 64px 8px 64px}

/* Presets */
.presets{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.preset{padding:6px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:#fff;font-size:11px;color:#6b5c4e;cursor:pointer;transition:.2s}
.preset:hover{background:rgba(0,0,0,.03)}
.preset.active{background:#2c2420;color:#fff;border-color:#2c2420}

/* Panel */
.panel{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);overflow:hidden}
.panel-header{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:600;color:#2c2420}
.panel-badge{font-size:10px;color:#a09890;background:rgba(0,0,0,.04);padding:3px 10px;border-radius:20px}
.panel-body{display:flex;align-items:center;justify-content:center;padding:20px;min-height:400px}

.drop-zone{width:100%;height:100%;min-height:380px;border:2px dashed rgba(0,0,0,.12);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:.3s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:#8b7355;background:rgba(139,115,85,.04)}
.drop-zone .material-symbols-outlined{font-size:48px;color:#c4b8a8}
.drop-zone p{font-size:13px;color:#a09890}
.drop-zone small{font-size:11px;color:#c4b8a8}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-zone.has-image{border:none;cursor:default}
.drop-zone.has-image .placeholder{display:none}
.drop-zone.has-image input{display:none}
.canvas-wrap{display:none;max-width:100%}
.canvas-wrap canvas{max-width:100%;max-height:700px;border-radius:4px;display:block}

.btn-row{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:10px;border:1px solid rgba(0,0,0,.1);background:#fff;font-family:'Lexend',sans-serif;font-size:13px;font-weight:400;color:#2c2420;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.btn:hover{background:rgba(0,0,0,.03)}
.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:#2c2420;color:#fff;border-color:#2c2420}
.btn-primary:hover{background:#3d3530}
.btn .material-symbols-outlined{font-size:18px}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">
    <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
  </button>
  <div class="top-title">Color Temperature</div>
</div>

<div class="container">
  <div class="subtitle">따뜻한 ↔ 차가운 톤으로 그림의 분위기를 미리 확인하세요</div>

  <div class="sliders">
    <div class="slider-row">
      <label>색온도</label>
      <input type="range" id="temp-slider" min="-100" max="100" value="0"/>
      <span class="val" id="temp-val">0</span>
    </div>
    <div class="temp-bar"></div>
    <div class="slider-row">
      <label>채도</label>
      <input type="range" id="sat-slider" min="-100" max="100" value="0"/>
      <span class="val" id="sat-val">0</span>
    </div>
    <div class="slider-row">
      <label>밝기</label>
      <input type="range" id="bright-slider" min="-100" max="100" value="0"/>
      <span class="val" id="bright-val">0</span>
    </div>
    <div class="slider-row">
      <label>대비</label>
      <input type="range" id="contrast-slider" min="-100" max="100" value="0"/>
      <span class="val" id="contrast-val">0</span>
    </div>
  </div>

  <div class="presets">
    <button class="preset" onclick="applyPreset(0,0,0,0,this)">원본</button>
    <button class="preset" onclick="applyPreset(60,10,5,0,this)">🌅 골든아워</button>
    <button class="preset" onclick="applyPreset(-50,- 20,0,10,this)">🌊 차가운 블루</button>
    <button class="preset" onclick="applyPreset(30,30,10,10,this)">🍂 가을 톤</button>
    <button class="preset" onclick="applyPreset(-20,-40,-10,0,this)">🌙 무드 나이트</button>
    <button class="preset" onclick="applyPreset(10,-60,20,- 10,this)">🖼️ 빈티지</button>
    <button class="preset" onclick="applyPreset(0,0,30,30,this)">✨ 하이키</button>
    <button class="preset" onclick="applyPreset(0,0,-30,30,this)">🎭 로우키</button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">미리보기</span>
      <span class="panel-badge" id="img-size"></span>
    </div>
    <div class="panel-body">
      <div class="drop-zone" id="drop-zone">
        <div class="placeholder">
          <span class="material-symbols-outlined">thermostat</span>
          <p>이미지를 드래그하거나 클릭하세요</p>
          <small>PNG, JPG, WEBP</small>
        </div>
        <input type="file" accept="image/*" id="file-input"/>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="main-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btn-reset" disabled onclick="resetAll()">
      <span class="material-symbols-outlined">restart_alt</span> 초기화
    </button>
    <button class="btn btn-primary" id="btn-dl" disabled onclick="download()">
      <span class="material-symbols-outlined">download</span> 이미지 저장
    </button>
  </div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const mainCanvas = document.getElementById('main-canvas');
const canvasWrap = document.getElementById('canvas-wrap');
const tempS = document.getElementById('temp-slider');
const satS = document.getElementById('sat-slider');
const brightS = document.getElementById('bright-slider');
const contrastS = document.getElementById('contrast-slider');

let currentImage = null;
let originalData = null;

[tempS, satS, brightS, contrastS].forEach(s => {
  s.oninput = () => {
    document.getElementById(s.id.replace('-slider','-val')).textContent = s.value;
    document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
    if(currentImage) render();
  };
});

function applyPreset(t, s, b, c, btn) {
  tempS.value = t; satS.value = s; brightS.value = b; contrastS.value = c;
  document.getElementById('temp-val').textContent = t;
  document.getElementById('sat-val').textContent = s;
  document.getElementById('bright-val').textContent = b;
  document.getElementById('contrast-val').textContent = c;
  document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(currentImage) render();
}

['dragenter','dragover'].forEach(e => {
  dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag-over'); });
});
['dragleave','drop'].forEach(e => {
  dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('drag-over'); });
});
dropZone.addEventListener('drop', ev => {
  const file = ev.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) loadImage(file);
});
fileInput.addEventListener('change', ev => {
  if(ev.target.files[0]) loadImage(ev.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      currentImage._name = file.name;
      dropZone.classList.add('has-image');
      canvasWrap.style.display = 'block';
      document.getElementById('img-size').textContent = img.width + ' × ' + img.height;
      document.getElementById('btn-reset').disabled = false;
      document.getElementById('btn-dl').disabled = false;

      // Cache original pixel data
      const w = img.width, h = img.height;
      mainCanvas.width = w; mainCanvas.height = h;
      const ctx = mainCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      originalData = ctx.getImageData(0, 0, w, h);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function render() {
  if(!originalData) return;
  const temp = parseInt(tempS.value);
  const sat = parseInt(satS.value);
  const bright = parseInt(brightS.value);
  const contrast = parseInt(contrastS.value);

  const w = mainCanvas.width, h = mainCanvas.height;
  const ctx = mainCanvas.getContext('2d');
  const src = originalData.data;
  const out = ctx.createImageData(w, h);
  const dst = out.data;

  // Contrast factor
  const cf = (259 * (contrast * 2.55 + 255)) / (255 * (259 - contrast * 2.55));

  for(let i = 0; i < src.length; i += 4) {
    let r = src[i], g = src[i+1], b = src[i+2];

    // 1. Color temperature (warm = +R +G -B, cool = -R +B)
    if(temp > 0) {
      r = r + temp * 0.6;
      g = g + temp * 0.15;
      b = b - temp * 0.4;
    } else {
      r = r + temp * 0.4;
      g = g + temp * 0.05;
      b = b - temp * 0.6;
    }

    // 2. Brightness
    r += bright * 1.5;
    g += bright * 1.5;
    b += bright * 1.5;

    // 3. Contrast
    r = cf * (r - 128) + 128;
    g = cf * (g - 128) + 128;
    b = cf * (b - 128) + 128;

    // 4. Saturation (HSL-based)
    if(sat !== 0) {
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      const factor = 1 + sat / 100;
      r = gray + factor * (r - gray);
      g = gray + factor * (g - gray);
      b = gray + factor * (b - gray);
    }

    dst[i]   = Math.max(0, Math.min(255, Math.round(r)));
    dst[i+1] = Math.max(0, Math.min(255, Math.round(g)));
    dst[i+2] = Math.max(0, Math.min(255, Math.round(b)));
    dst[i+3] = src[i+3];
  }

  ctx.putImageData(out, 0, 0);
}

function download() {
  mainCanvas.toBlob(blob => {
    const link = document.createElement('a');
    const base = (currentImage._name || 'image').replace(/\.[^.]+$/, '');
    link.download = `${base}_filtered.jpg`;
    link.href = URL.createObjectURL(blob);
    link.click();
  }, 'image/jpeg', 0.95);
}

function resetAll() {
  applyPreset(0, 0, 0, 0, document.querySelector('.preset'));
  currentImage = null;
  originalData = null;
  dropZone.classList.remove('has-image');
  canvasWrap.style.display = 'none';
  document.getElementById('img-size').textContent = '';
  document.getElementById('btn-reset').disabled = true;
  document.getElementById('btn-dl').disabled = true;
  fileInput.value = '';
}
</script>

<script src="../../assets/js/art-cosmos-widget.js?v=0320b"></script>
</body>
</html>
