<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>색칠교실 - Luna Whale</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Lexend:wght@300;400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lexend',sans-serif;background:#f8f6f3;min-height:100vh;color:#2c2420}

/* Top Bar */
.top-bar{position:sticky;top:0;z-index:50;background:rgba(248,246,243,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.04);padding:14px 24px;display:flex;align-items:center;gap:14px}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.08);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.back-btn:hover{background:rgba(0,0,0,.04)}
.top-title{font-family:'Jua',sans-serif;font-size:22px;color:#2c2420;flex:1;letter-spacing:-.3px}
.top-count{font-size:11px;color:#a09890;font-weight:400;letter-spacing:.5px}

/* Category Bar */
.cat-bar{display:flex;gap:12px;padding:20px 24px 8px;max-width:1200px;margin:0 auto;justify-content:center;flex-wrap:wrap}
.cat-icon{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:12px 24px;border-radius:16px;border:2px solid transparent;transition:.3s;min-width:100px}
.cat-icon:hover{background:rgba(0,0,0,.03)}
.cat-icon.active{border-color:#2c2420;background:rgba(44,36,32,.04)}
.cat-icon.disabled{opacity:.45;cursor:default}
.cat-icon.disabled:hover{background:transparent}
.cat-icon .icon-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;transition:.3s}
.cat-icon .icon-label{font-family:'Jua',sans-serif;font-size:13px;color:#6b5c4e;white-space:nowrap}
.cat-icon .icon-count{font-size:10px;color:#a09890;font-weight:300}
.cat-icon.active .icon-label{color:#2c2420}
.cat-all .icon-circle{background:linear-gradient(135deg,#f0e6d6,#e8d5c4);color:#8b6914}
.cat-young .icon-circle{background:linear-gradient(135deg,#e8ddf0,#d4c4e8);color:#7c3aed}
.cat-older .icon-circle{background:linear-gradient(135deg,#dce8f5,#c4d4e8);color:#4a6fa5}

/* Grid */
.grid-wrap{max-width:1200px;margin:0 auto;padding:8px 24px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
@media(max-width:640px){.grid{grid-template-columns:repeat(3,1fr);gap:8px}}
.card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .25s,box-shadow .25s;cursor:pointer;border:1px solid rgba(0,0,0,.04);position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0ece6}
.card-label{padding:6px 8px;font-family:'Jua',sans-serif;font-size:12px;color:#6b5c4e;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Placeholder message */
.placeholder-msg{text-align:center;padding:80px 24px;max-width:480px;margin:0 auto}
.placeholder-msg .icon{font-size:64px;margin-bottom:16px;opacity:.4}
.placeholder-msg h3{font-family:'Jua',sans-serif;font-size:20px;color:#6b5c4e;margin-bottom:8px}
.placeholder-msg p{font-size:13px;color:#a09890;line-height:1.7}

/* Lightbox */
.lb-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(20,18,15,.8);backdrop-filter:blur(8px);justify-content:center;align-items:center;flex-direction:column;overflow-y:auto}
.lb-overlay.active{display:flex}
.lb-close{position:absolute;top:16px;right:20px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:110;transition:.2s}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-inner{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 20px 120px;max-width:560px;width:100%}
.lb-img-container{position:relative;width:100%;max-width:460px}
.lb-img-container img{width:100%;border-radius:12px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.3);display:block}
.lb-title{color:#fff;font-family:'Jua',sans-serif;font-size:20px;text-align:center}

/* Controls panel */
.lb-controls{background:rgba(44,36,32,.85);backdrop-filter:blur(12px);border-radius:14px;padding:16px 20px;width:100%;max-width:460px;display:flex;flex-direction:column;gap:12px}
.lb-ctrl-row{display:flex;align-items:center;gap:10px}
.lb-ctrl-label{font-size:11px;color:#f8f6f3;font-weight:600;white-space:nowrap;min-width:70px}
.lb-ctrl-row input[type=range]{flex:1;accent-color:#e8c170;height:4px}
.lb-ctrl-val{font-size:11px;color:#e8c170;font-weight:600;min-width:36px;text-align:right}
.lb-btn-row{display:flex;gap:8px;margin-top:4px}
.lb-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s}
.lb-btn:hover{opacity:.85}
.lb-btn-line{background:#fff;color:#2c2420}
.lb-btn-print{background:#6b5c4e;color:#fff}
.lb-btn-download{background:transparent;color:#f8f6f3;border:1px solid rgba(255,255,255,.2)}

/* Print styles */
@media print{
  body *{display:none!important}
  #print-container{display:block!important;position:fixed;inset:0;z-index:99999;background:#fff}
  #print-container img{width:100%;height:auto;max-height:100vh;object-fit:contain}
}

/* Loading */
.load-more{text-align:center;padding:30px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(44,36,32,.08);border-top-color:#6b5c4e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.end-msg{text-align:center;padding:20px;color:#a09890;font-size:14px;font-family:'Jua',sans-serif}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.history.back()">
    <span class="material-symbols-outlined" style="font-size:20px;color:#7c3aed">arrow_back</span>
  </button>
  <div class="top-title">색칠교실</div>
  <div class="top-count" id="count-label"></div>
</div>

<!-- Category Bar -->
<div class="cat-bar" id="cat-bar">
  <div class="cat-icon cat-all active" onclick="switchCat('all')">
    <div class="icon-circle">✨</div>
    <div class="icon-label">전체</div>
    <div class="icon-count" id="cnt-all"></div>
  </div>
  <div class="cat-icon cat-young" onclick="switchCat('4-7')">
    <div class="icon-circle">🖍️</div>
    <div class="icon-label">4-7세</div>
    <div class="icon-count" id="cnt-young"></div>
  </div>
  <div class="cat-icon cat-older" onclick="switchCat('8-10')">
    <div class="icon-circle">🎨</div>
    <div class="icon-label">8-10세</div>
    <div class="icon-count" id="cnt-older"></div>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="placeholder-msg" id="placeholder" style="display:none">
    <div class="icon">🎨</div>
    <h3>준비 중이에요!</h3>
    <p>8-10세 색칠 도안이 곧 추가될 예정이에요.<br/>조금만 기다려 주세요!</p>
  </div>
  <div class="load-more" id="load-more"><div class="spinner"></div></div>
  <div class="end-msg" id="end-msg" style="display:none">모든 색칠 도안을 다 불러왔어요! 🎨</div>
</div>

<!-- Lightbox -->
<div class="lb-overlay" id="lightbox">
  <button class="lb-close" onclick="closeLB()">
    <span class="material-symbols-outlined" style="font-size:22px">close</span>
  </button>
  <div class="lb-inner">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-img-container">
      <img id="lb-img" src="" alt=""/>
    </div>
    <div class="lb-controls">
      <div class="lb-ctrl-row">
        <span class="lb-ctrl-label">✏️ 검정 감소</span>
        <input type="range" id="br-slider" min="0" max="80" value="0"/>
        <span class="lb-ctrl-val" id="br-val">0%</span>
      </div>
      <div class="lb-btn-row">
        <button class="lb-btn lb-btn-line" id="btn-line" onclick="toggleLineArt()">
          <span class="material-symbols-outlined" style="font-size:16px">contrast</span> LINE ART
        </button>
        <button class="lb-btn lb-btn-print" onclick="printImage()">
          <span class="material-symbols-outlined" style="font-size:16px">print</span> 인쇄
        </button>
        <button class="lb-btn lb-btn-download" onclick="downloadImage()">
          <span class="material-symbols-outlined" style="font-size:16px">download</span> 저장
        </button>
      </div>
    </div>
  </div>
  <canvas id="br-canvas" style="display:none"></canvas>
</div>

<!-- Hidden print container -->
<div id="print-container" style="display:none"></div>

// Flatten: each variant becomes its own card
const ALL_ITEMS = [];
RAW_DATA.forEach(d => {
  d.files.forEach((f, i) => {
    ALL_ITEMS.push({
      kr: d.kr,
      file: f,
      src: d.src,
      age: d.src === 3 ? '8-10' : '4-7',
      variantIdx: i,
      variantTotal: d.files.length
    });
  });
});

const PER_PAGE = 20;
let page = 0;
let currentCat = 'all';
let filtered = ALL_ITEMS;
let lineArtMode = false;
let currentItem = null;

const grid = document.getElementById('grid');
const loadMore = document.getElementById('load-more');
const endMsg = document.getElementById('end-msg');
const placeholder = document.getElementById('placeholder');
const countLabel = document.getElementById('count-label');

// Update counts
document.getElementById('cnt-all').textContent = ALL_ITEMS.length + '장';
document.getElementById('cnt-young').textContent = ALL_ITEMS.filter(x => x.age === '4-7').length + '장';
document.getElementById('cnt-older').textContent = ALL_ITEMS.filter(x => x.age === '8-10').length + '장';

function switchCat(cat) {
  // all categories active
  currentCat = cat;
  // Update active state
  document.querySelectorAll('.cat-icon').forEach(el => el.classList.remove('active'));
  if (cat === 'all') document.querySelector('.cat-all').classList.add('active');
  else if (cat === '4-7') document.querySelector('.cat-young').classList.add('active');
  else if (cat === '8-10') document.querySelector('.cat-older').classList.add('active');
  
  // Filter
  if (cat === 'all') filtered = ALL_ITEMS;
  else if (cat === '4-7') filtered = ALL_ITEMS.filter(x => x.age === '4-7');
  else filtered = ALL_ITEMS.filter(x => x.age === '8-10');
  
  // Reset grid
  page = 0;
  grid.innerHTML = '';
  endMsg.style.display = 'none';
  loadMore.style.display = '';
  placeholder.style.display = 'none';
  
  if (filtered.length === 0) {
    loadMore.style.display = 'none';
    placeholder.style.display = '';
  } else {
    countLabel.textContent = filtered.length + '장';
    renderPage();
  }
}

function renderPage() {
  const start = page * PER_PAGE;
  const end = Math.min(start + PER_PAGE, filtered.length);
  if (start >= filtered.length) {
    loadMore.style.display = 'none';
    endMsg.style.display = 'block';
    return;
  }
  for (let i = start; i < end; i++) {
    const d = filtered[i];
    const card = document.createElement('div');
    card.className = 'card';
    const thumbSrc = getThumb(d.src) + d.file.replace('.png', '.jpg');
    card.innerHTML = '<img src="' + thumbSrc + '" alt="' + d.kr + '" loading="lazy"/><div class="card-label">' + d.kr + '</div>';
    card.onclick = () => openLB(i);
    grid.appendChild(card);
  }
  page++;
  if (end >= filtered.length) {
    loadMore.style.display = 'none';
    endMsg.style.display = 'block';
  }
}

// Intersection Observer for infinite scroll
const obs = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) renderPage();
}, { rootMargin: '300px' });
obs.observe(loadMore);

// Lightbox
function openLB(idx) {
  const d = filtered[idx];
  currentItem = d;
  lineArtMode = false;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lb-img');
  document.getElementById('lb-title').textContent = d.kr;
  img.src = getOrig(d.src) + d.file;
  img.style.filter = '';
  document.getElementById('br-slider').value = 0;
  document.getElementById('br-val').textContent = '0%';
  document.getElementById('btn-line').innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">contrast</span> LINE ART';
  document.getElementById('btn-line').style.background = '#fff';
  document.getElementById('btn-line').style.color = '#2c2420';
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
  currentItem = null;
  lineArtMode = false;
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox' || e.target.classList.contains('lb-overlay')) closeLB();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

// Toggle line art mode
function toggleLineArt() {
  lineArtMode = !lineArtMode;
  const btn = document.getElementById('btn-line');
  const img = document.getElementById('lb-img');
  if (lineArtMode) {
    btn.style.background = '#2c2420';
    btn.style.color = '#fff';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">contrast</span> LINE ART ON';
    applyBrightness();
  } else {
    btn.style.background = '#fff';
    btn.style.color = '#2c2420';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">contrast</span> LINE ART';
    const brVal = parseInt(document.getElementById('br-slider').value);
    if (brVal > 0) {
      const brightness = 1 + brVal * 0.012;
      img.style.filter = 'brightness(' + brightness + ')';
    } else {
      img.style.filter = '';
    }
  }
}

function applyBrightness() {
  const img = document.getElementById('lb-img');
  const brVal = parseInt(document.getElementById('br-slider').value);
  if (lineArtMode) {
    // Line art: high contrast + brightness + grayscale
    const brightness = 1.6 + brVal * 0.015;
    const contrast = 2.5;
    img.style.filter = 'grayscale(1) brightness(' + brightness + ') contrast(' + contrast + ')';
  } else {
    if (brVal > 0) {
      const brightness = 1 + brVal * 0.012;
      img.style.filter = 'brightness(' + brightness + ')';
    } else {
      img.style.filter = '';
    }
  }
}

// Brightness slider
document.getElementById('br-slider').addEventListener('input', function() {
  const val = parseInt(this.value);
  document.getElementById('br-val').textContent = val + '%';
  applyBrightness();
});

// Print
function printImage() {
  if (!currentItem) return;
  const img = document.getElementById('lb-img');
  const printContainer = document.getElementById('print-container');
  
  // If line art or brightness adjusted, render via canvas
  const brVal = parseInt(document.getElementById('br-slider').value);
  if (lineArtMode || brVal > 0) {
    renderToCanvas(function(dataUrl) {
      printContainer.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:auto;max-height:100vh;object-fit:contain"/>';
      window.print();
    });
  } else {
    printContainer.innerHTML = '<img src="' + img.src + '" style="width:100%;height:auto;max-height:100vh;object-fit:contain"/>';
    window.print();
  }
}

// Download
function downloadImage() {
  if (!currentItem) return;
  const d = currentItem;
  const brVal = parseInt(document.getElementById('br-slider').value);
  
  if (lineArtMode || brVal > 0) {
    renderToCanvas(function(dataUrl) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = d.kr + (lineArtMode ? '_lineart' : '') + (brVal > 0 ? '_br' + brVal : '') + '.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });
  } else {
    const a = document.createElement('a');
    a.href = getOrig(d.src) + d.file;
    a.download = d.kr + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

// Canvas render with filters
function renderToCanvas(callback) {
  const d = currentItem;
  const brVal = parseInt(document.getElementById('br-slider').value);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const c = document.getElementById('br-canvas');
    const ctx = c.getContext('2d');
    c.width = img.width; c.height = img.height;
    
    if (lineArtMode) {
      const brightness = 1.6 + brVal * 0.015;
      const contrast = 2.5;
      ctx.filter = 'grayscale(1) brightness(' + brightness + ') contrast(' + contrast + ')';
    } else if (brVal > 0) {
      const brightness = 1 + brVal * 0.012;
      ctx.filter = 'brightness(' + brightness + ')';
    }
    
    ctx.drawImage(img, 0, 0);
    callback(c.toDataURL('image/png'));
  };
  img.onerror = function() {
    // Fallback: try thumb
    img.src = getThumb(d.src) + d.file.replace('.png', '.jpg');
  };
  img.src = getOrig(d.src) + d.file;
}

// Initial render
countLabel.textContent = ALL_ITEMS.length + '장';
renderPage();
</script>
