<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lexend',sans-serif;background:#f8f6f3;min-height:100vh;color:#2c2420}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(248,246,243,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.04);padding:14px 24px;display:flex;align-items:center;gap:14px}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.08);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.back-btn:hover{background:rgba(0,0,0,.04)}
.top-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#2c2420;flex:1;letter-spacing:-.5px}
.top-count{font-size:11px;color:#a09890;font-weight:400;letter-spacing:.5px}

/* Collection Icons */
.hero-msg{text-align:center;padding:24px 24px 4px;max-width:1200px;margin:0 auto}
.hero-msg p{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;line-height:1.9;letter-spacing:-.2px;background:linear-gradient(135deg,#b8a080,#8b7355,#a08868);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-msg p:first-child{font-size:13px;opacity:.7}
.hero-msg em{font-style:normal;font-weight:700}
.collection-bar{display:flex;gap:16px;padding:20px 24px 8px;max-width:1200px;margin:0 auto;justify-content:center;flex-wrap:wrap}
.col-icon{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:12px 20px;border-radius:16px;border:2px solid transparent;transition:.3s;min-width:100px}
.col-icon:hover{background:rgba(0,0,0,.03)}
.col-icon.active{border-color:#2c2420;background:rgba(44,36,32,.04)}
.col-icon .icon-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;transition:.3s}
.col-icon .icon-label{font-size:12px;font-weight:600;color:#6b5c4e;letter-spacing:-.3px;white-space:nowrap}
.col-icon .icon-count{font-size:10px;color:#a09890;font-weight:300}
.col-icon.active .icon-label{color:#2c2420}
.col-all .icon-circle{background:linear-gradient(135deg,#f0e6d6,#e8d5c4);color:#8b6914}
.col-building .icon-circle{background:linear-gradient(135deg,#dce8f5,#c4d4e8);color:#4a6fa5}
.col-japanimation .icon-circle{background:linear-gradient(135deg,#e8ddf0,#d4c4e8);color:#6b4a8b}
.col-korean .icon-circle{background:linear-gradient(135deg,#f0e8d6,#e8d8b8);color:#8b7a4a}
.col-fairytale .icon-circle{background:linear-gradient(135deg,#f0d6d6,#e8c4c4);color:#8b4a5c}
.col-witty .icon-circle{background:linear-gradient(135deg,#e6f0d6,#d4e8c4);color:#5c8b4a}
.col-croquis .icon-circle{background:linear-gradient(135deg,#f5e6d0,#e8d4b8);color:#8b6b3e}
.tag-bar{display:none;gap:6px;padding:4px 24px 8px;max-width:1200px;margin:0 auto;justify-content:center;flex-wrap:wrap}
.tag-bar.visible{display:flex}
.tag-chip{padding:5px 12px;border-radius:16px;border:1px solid rgba(0,0,0,.08);background:#fff;font-size:11px;color:#6b5c4e;cursor:pointer;transition:.2s}
.tag-chip:hover{background:rgba(0,0,0,.03)}
.tag-chip.active{background:#2c2420;color:#fff;border-color:#2c2420}

.grid-wrap{max-width:1200px;margin:0 auto;padding:8px 24px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .collection-bar{gap:8px;padding:12px 12px 4px;overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start}
  .col-icon{padding:8px 12px;min-width:70px}
  .col-icon .icon-circle{width:44px;height:44px;font-size:20px}
  .col-icon .icon-label{font-size:10px}
  .col-icon .icon-count{font-size:9px}
}
.card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .25s,box-shadow .25s;cursor:pointer;border:1px solid rgba(0,0,0,.04)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0ece6}
.card-price{padding:6px 8px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:#6b5c4e}
/* card collection badge */
.card-badge{position:absolute;top:6px;left:6px;font-size:14px;background:rgba(255,255,255,.85);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.card{position:relative}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(20,18,15,.75);backdrop-filter:blur(8px);justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#faf8f5;border-radius:16px;max-width:560px;width:92%;max-height:88vh;overflow-y:auto;padding:20px 24px;position:relative}
.modal-close{float:right;width:28px;height:28px;border-radius:50%;border:1px solid rgba(0,0,0,.08);background:transparent;cursor:pointer;font-size:14px;color:#8a7e74;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(0,0,0,.04)}
.modal-images{display:flex;gap:10px;margin:14px 0;justify-content:center}
.modal-img-wrap{position:relative;flex:0 0 auto}
.modal-img-wrap img{width:220px;height:220px;object-fit:cover;border-radius:8px;background:#f0ece6;border:1px solid rgba(0,0,0,.06)}
.modal-img-wrap .img-label{position:absolute;bottom:8px;left:8px;background:rgba(44,36,32,.75);color:#f8f6f3;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase}
@media(max-width:640px){.modal-img-wrap img{width:40vw;height:40vw}}
.modal-msg{background:#f0ece6;border-radius:8px;padding:14px 16px;margin:10px 0;text-align:center;font-size:12px;color:#6b5c4e;line-height:1.8;font-family:'Lexend',sans-serif;font-weight:300}
.modal-msg b{font-weight:600;color:#2c2420}
.modal-btns{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.buy-btn{padding:9px 16px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s;flex:1;min-width:0;letter-spacing:.3px}
.buy-btn:hover{opacity:.85}
.btn-download{background:transparent;color:#6b5c4e;border:1px solid #d6d0c8;flex:0 0 100%;margin-top:2px}
.dl-divider{text-align:center;color:#c4bdb4;font-size:10px;margin:8px 0 2px;font-weight:400;letter-spacing:1px;text-transform:uppercase}
.load-more{text-align:center;padding:30px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(44,36,32,.08);border-top-color:#6b5c4e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.end-msg{text-align:center;padding:20px;color:#a09890;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic}
.admin-delete{position:absolute;top:48px;right:20px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(220,38,38,.2);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s;opacity:.5}
.admin-delete:hover{opacity:1;background:rgba(220,38,38,.08)}
</style>
<!-- luna-nav.js 제거: global-nav.js가 대체 -->
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.history.back()">
    <span class="material-symbols-outlined" style="font-size:20px;color:#b45309">arrow_back</span>
  </button>
  <div class="top-title">Illustration Atelier</div>
  <div class="top-count" id="count-label"></div>
</div>

<!-- Hero Message -->
<div class="hero-msg">
  <p>구매하신 도안은 영구 삭제됩니다.</p>
  <p>세상에 단 하나뿐인 <em>나만의 작품</em>을 완성해보세요.</p>
</div>

<!-- Collection Icons -->
<div class="collection-bar" id="col-bar">
  <div class="col-icon col-all active" onclick="switchCollection('all')">
    <div class="icon-circle">✨</div>
    <div class="icon-label">전체</div>
    <div class="icon-count" id="cnt-all"></div>
  </div>
  <div class="col-icon col-building" onclick="switchCollection('building')">
    <div class="icon-circle">🏠</div>
    <div class="icon-label">건물 수채화</div>
    <div class="icon-count" id="cnt-building"></div>
  </div>
  <div class="col-icon col-japanimation" onclick="switchCollection('japanimation')">
    <div class="icon-circle">🎞️</div>
    <div class="icon-label">빈티지 재패니메이션</div>
    <div class="icon-count" id="cnt-japanimation"></div>
  </div>
  <div class="col-icon col-korean" onclick="switchCollection('korean')">
    <div class="icon-circle">🏔️</div>
    <div class="icon-label">서정적 한국화</div>
    <div class="icon-count" id="cnt-korean"></div>
  </div>
  <div class="col-icon col-fairytale" onclick="switchCollection('fairytale')">
    <div class="icon-circle">🏰</div>
    <div class="icon-label">영국 동화 삽화</div>
    <div class="icon-count" id="cnt-fairytale"></div>
  </div>
  <div class="col-icon col-witty" onclick="switchCollection('illust')">
    <div class="icon-circle">✏️</div>
    <div class="icon-label">위트있는 일러스트</div>
    <div class="icon-count" id="cnt-illust"></div>
  </div>
  <div class="col-icon col-croquis" onclick="switchCollection('croquis')">
    <div class="icon-circle">🏃</div>
    <div class="icon-label">역동 스케치</div>
    <div class="icon-count" id="cnt-croquis"></div>
  </div>
  <!-- 관리자 전용 휴지통 (로그인 후에만 보임) -->
  <div class="col-icon col-trash" id="trash-cat" onclick="switchCollection('trash')" style="display:none">
    <div class="icon-circle" style="background:rgba(220,38,38,.1)">🗑️</div>
    <div class="icon-label" style="color:#dc2626">휴지통</div>
    <div class="icon-count" id="cnt-trash" style="color:#dc2626"></div>
  </div>
</div>

<div class="tag-bar" id="tag-bar"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="load-more" id="load-more"><div class="spinner"></div></div>
  <div class="end-msg" id="end-msg" style="display:none">모든 도안을 불러왔어요! 🎨</div>
</div>

<!-- Purchase Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <button class="admin-delete" id="admin-del" style="display:none" onclick="adminDelete()">💀</button>
    <div class="modal-images" id="modal-images"></div>
    <div class="modal-msg">
      세상에 단 하나뿐인 <b>나만의 작품</b>을 완성해보세요.
    </div>
    <!-- 검정 감소 슬라이더 -->
    <div id="black-reduce-wrap" style="margin:10px 0;padding:10px 14px;background:#f0ece6;border-radius:10px;display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:12px;font-weight:700;color:#2c2420;font-family:'Lexend',sans-serif;margin-bottom:2px;">🎛️ 이미지 조절</div>
      <!-- 검정 감소 -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:10px;color:#6b5c4e;width:50px;flex-shrink:0;">✏️ 검정감소</span>
        <input type="range" id="black-reduce-slider" min="0" max="80" value="0" style="flex:1;accent-color:#8a7e74">
        <span id="br-val" style="font-size:10px;color:#6b5c4e;width:28px;text-align:right;">0%</span>
      </div>
      <!-- 밝기 -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:10px;color:#6b5c4e;width:50px;flex-shrink:0;">☀️ 밝기</span>
        <input type="range" id="brightness-slider" min="-50" max="50" value="0" style="flex:1;accent-color:#f59e0b">
        <span id="bright-val" style="font-size:10px;color:#6b5c4e;width:28px;text-align:right;">0</span>
      </div>
      <!-- 대비 -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:10px;color:#6b5c4e;width:50px;flex-shrink:0;">🔲 대비</span>
        <input type="range" id="contrast-slider" min="-50" max="50" value="0" style="flex:1;accent-color:#6366f1">
        <span id="contrast-val" style="font-size:10px;color:#6b5c4e;width:28px;text-align:right;">0</span>
      </div>
      <!-- 레벨 (3핀: 하나의 트랙 위에 3개 슬라이더) -->
      <div style="display:flex;align-items:center;gap:4px;width:100%;">
        <span style="font-size:10px;color:#6b5c4e;width:50px;flex-shrink:0;">📊 레벨</span>
        <div style="position:relative;flex:1;height:24px;">
          <!-- 트랙 배경 -->
          <div style="position:absolute;left:8px;right:8px;top:10px;height:4px;background:linear-gradient(to right,#333,#999,#eee);border-radius:2px;"></div>
          <!-- 3개 슬라이더를 같은 트랙 위에 겹쳐놓기 -->
          <input type="range" id="level-shadow" min="0" max="255" value="0" style="position:absolute;left:0;right:0;width:100%;top:0;height:24px;margin:0;padding:0;background:transparent;-webkit-appearance:none;appearance:none;pointer-events:none;" title="어두운점">
          <input type="range" id="level-gamma" min="0" max="255" value="128" style="position:absolute;left:0;right:0;width:100%;top:0;height:24px;margin:0;padding:0;background:transparent;-webkit-appearance:none;appearance:none;pointer-events:none;" title="감마">
          <input type="range" id="level-highlight" min="0" max="255" value="255" style="position:absolute;left:0;right:0;width:100%;top:0;height:24px;margin:0;padding:0;background:transparent;-webkit-appearance:none;appearance:none;pointer-events:none;" title="밝은점">
        </div>
      </div>
      <style>
        #level-shadow::-webkit-slider-thumb,#level-gamma::-webkit-slider-thumb,#level-highlight::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer;pointer-events:auto;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);}
        #level-shadow::-webkit-slider-thumb{background:#222;}
        #level-gamma::-webkit-slider-thumb{background:#888;}
        #level-highlight::-webkit-slider-thumb{background:#f0f0f0;}
        #level-shadow::-webkit-slider-runnable-track,#level-gamma::-webkit-slider-runnable-track,#level-highlight::-webkit-slider-runnable-track{background:transparent;height:24px;}
      </style>
      <!-- 초기화 -->
      <button onclick="resetAdjust()" style="align-self:flex-end;font-size:10px;padding:3px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#666;cursor:pointer;">↩ 초기화</button>
      <canvas id="sketch-canvas" style="display:none"></canvas>
    </div>
    <div class="modal-btns">
      <div style="display:flex;gap:6px;width:100%">
        <button class="buy-btn btn-download" id="dl-color" style="flex:1"><span class="material-symbols-outlined" style="font-size:13px">palette</span> 원본 다운</button>
        <button class="buy-btn btn-download" id="dl-sketch" style="flex:1"><span class="material-symbols-outlined" style="font-size:13px">draw</span> 스케치 다운</button>
      </div>
    </div>
  </div>
</div>

// Build merged array with collection key attached
function buildMerged() {
  const all = [];
  for (const [key, col] of Object.entries(COLLECTIONS)) {
    col.files.forEach(f => all.push({ file: f, col: key }));
  }
  // Shuffle (Fisher-Yates)
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all;
}

function getFiltered() {
  if (currentCol === 'all') return merged;
  let result = merged.filter(item => item.col === currentCol);
  if (currentCol === 'illust' && currentTag !== 'all' && typeof ILLUST_TAGS !== 'undefined') {
    const tagFiles = new Set(ILLUST_TAGS[currentTag].map(i => ILLUST_FILES[i]));
    result = result.filter(item => tagFiles.has(item.file));
  }
  if (currentCol === 'korean' && currentTag !== 'all' && typeof KOREAN_TAGS !== 'undefined') {
    const tagFiles = new Set(KOREAN_TAGS[currentTag].map(i => KOREAN_FILES[i]));
    result = result.filter(item => tagFiles.has(item.file));
  }
  if (currentCol === 'japanimation' && currentTag !== 'all' && typeof GHIBLI_TAGS !== 'undefined') {
    const tagFiles = new Set(GHIBLI_TAGS[currentTag].map(i => GHIBLI_FILES[i]));
    result = result.filter(item => tagFiles.has(item.file));
  }
  if (currentCol === 'croquis' && currentTag !== 'all' && typeof CROQUIS_TAGS !== 'undefined') {
    const tagFiles = new Set(CROQUIS_TAGS[currentTag].map(i => CROQUIS_FILES[i].f));
    result = result.filter(item => tagFiles.has(item.file));
  }
  return result;
}

function renderPage() {
  const filtered = getFiltered();
  const start = page * PER_PAGE;
  const end = Math.min(start + PER_PAGE, filtered.length);
  if (start >= filtered.length) {
    loadMore.style.display = 'none';
    endMsg.style.display = 'block';
    return;
  }
  for (let i = start; i < end; i++) {
    const item = filtered[i];
    const card = document.createElement('div');
    card.className = 'card';
    const emoji = COLLECTIONS[item.col].emoji;
    card.innerHTML = '<div class="card-badge">' + emoji + '</div><img src="' + getThumb(item) + '" loading="lazy"/>';
    card.onclick = () => openModal(item);
    grid.appendChild(card);
  }
  page++;
  if (end >= filtered.length) {
    loadMore.style.display = 'none';
    endMsg.style.display = 'block';
  }
}

function switchCollection(col) {
  currentCol = col;
  page = 0;
  grid.innerHTML = '';
  loadMore.style.display = '';
  endMsg.style.display = 'none';
  // Update active icon
  document.querySelectorAll('.col-icon').forEach(el => el.classList.remove('active'));
  const colClass = col === 'illust' ? 'col-witty' : 'col-' + col;
  document.querySelector('.' + colClass).classList.add('active');
  // 휴지통 모드
  if (col === 'trash') {
    tagBar.classList.remove('visible'); currentTag = 'all';
    const trash = getTrash();
    document.getElementById('count-label').textContent = trash.length + '장';
    renderTrash();
    return;
  }
  // Show/hide tag bar
  if(col === 'illust' || col === 'korean' || col === 'japanimation' || col === 'croquis') { showTagBar(col); }
  else { tagBar.classList.remove('visible'); currentTag = 'all'; }
  // Update count
  const cnt = col === 'all' ? totalAll : COLLECTIONS[col].files.length;
  document.getElementById('count-label').textContent = cnt + '장';
  renderPage();
}

// ─── 이미지 조절 통합 ───
function applyAllAdjustments() {
  if (!sketchOrigData) return;
  const br = parseInt(document.getElementById('black-reduce-slider').value) / 100;
  const brightness = parseInt(document.getElementById('brightness-slider').value);
  const contrast = parseInt(document.getElementById('contrast-slider').value);
  const shadow = parseInt(document.getElementById('level-shadow').value);
  const gamma = parseInt(document.getElementById('level-gamma').value) / 100;
  const highlight = parseInt(document.getElementById('level-highlight').value);

  // 라벨 업데이트
  document.getElementById('br-val').textContent = Math.round(br * 100) + '%';
  document.getElementById('bright-val').textContent = brightness;
  document.getElementById('contrast-val').textContent = contrast;

  const data = new ImageData(new Uint8ClampedArray(sketchOrigData.data), sketchOrigData.width, sketchOrigData.height);
  const d = data.data;
  const contrastF = (259 * (contrast + 255)) / (255 * (259 - contrast));

  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];

    // 1) 검정 감소
    if (br > 0) {
      if (r < 200) r = r + (200 - r) * br;
      if (g < 200) g = g + (200 - g) * br;
      if (b < 200) b = b + (200 - b) * br;
    }

    // 2) 레벨 (shadow/gamma/highlight)
    r = Math.max(0, Math.min(255, ((r - shadow) / (highlight - shadow)) * 255));
    g = Math.max(0, Math.min(255, ((g - shadow) / (highlight - shadow)) * 255));
    b = Math.max(0, Math.min(255, ((b - shadow) / (highlight - shadow)) * 255));
    if (gamma !== 1) {
      r = 255 * Math.pow(r / 255, 1 / gamma);
      g = 255 * Math.pow(g / 255, 1 / gamma);
      b = 255 * Math.pow(b / 255, 1 / gamma);
    }

    // 3) 밝기
    r += brightness; g += brightness; b += brightness;

    // 4) 대비
    r = contrastF * (r - 128) + 128;
    g = contrastF * (g - 128) + 128;
    b = contrastF * (b - 128) + 128;

    d[i] = Math.max(0, Math.min(255, r));
    d[i+1] = Math.max(0, Math.min(255, g));
    d[i+2] = Math.max(0, Math.min(255, b));
  }

  sketchCtx.putImageData(data, 0, 0);
  const preview = document.getElementById('sketch-preview');
  if (preview) preview.src = sketchCanvas.toDataURL('image/jpeg', 0.9);
}

function resetAdjust() {
  document.getElementById('black-reduce-slider').value = 0;
  document.getElementById('brightness-slider').value = 0;
  document.getElementById('contrast-slider').value = 0;
  document.getElementById('level-shadow').value = 0;
  document.getElementById('level-gamma').value = 100;
  document.getElementById('level-highlight').value = 255;
  applyAllAdjustments();
}

// ─── 휴지통 시스템: Firestore 기반 ───
// 어떤 브라우저에서든 동기화됨
const db = firebase.firestore();
const TRASH_COLLECTION = 'art-shop-trash';
let trashCache = []; // 로컬 캐시

async function loadTrash() {
  try {
    const snap = await db.collection(TRASH_COLLECTION).orderBy('date', 'desc').get();
    trashCache = [];
    snap.forEach(doc => {
      trashCache.push({ id: doc.id, ...doc.data() });
    });
  } catch(e) {
    console.warn('휴지통 로드 실패 (오프라인?):', e);
    // 폴백: localStorage
    try { trashCache = JSON.parse(localStorage.getItem('art-shop-trash') || '[]'); } catch { trashCache = []; }
  }
  return trashCache;
}

function getTrash() { return trashCache; }

async function addToTrash(col, file, base) {
  const fname = typeof file === 'string' ? file : file.f || file;
  const entry = { col, file: fname, base, date: new Date().toISOString() };
  // localStorage 먼저 저장 (Firestore 느려도 안전)
  trashCache.push(entry);
  localStorage.setItem('art-shop-trash', JSON.stringify(trashCache));
  try {
    const docRef = await db.collection(TRASH_COLLECTION).add(entry);
    entry.id = docRef.id;
    // Firestore ID 반영하여 localStorage 재저장
    localStorage.setItem('art-shop-trash', JSON.stringify(trashCache));
  } catch(e) {
    console.warn('Firestore 저장 실패 (localStorage에는 저장됨):', e);
  }
}

async function restoreFromTrash(index) {
  if (index < 0 || index >= trashCache.length) return;
  const item = trashCache[index];
  // Firestore에서 삭제
  try {
    if (item.id) await db.collection(TRASH_COLLECTION).doc(item.id).delete();
  } catch(e) { console.warn('Firestore 삭제 실패:', e); }
  trashCache.splice(index, 1);
  localStorage.setItem('art-shop-trash', JSON.stringify(trashCache));
  // hidden에서도 제거
  removeHidden(item.col + '::' + item.file);
  // COLLECTIONS에 다시 추가
  if (COLLECTIONS[item.col]) {
    COLLECTIONS[item.col].files.push(item.file);
  }
  merged = buildMerged();
  updateCounts();
  page = 0; grid.innerHTML = '';
  renderPage();
  alert('✅ 복원 완료: ' + item.file);
}

async function emptyTrash() {
  if (!confirm('🗑️ 휴지통을 비울까요? 복구 불가능합니다.')) return;
  // 1) 휴지통 아이템을 영구 숨김 목록에 등록 (localStorage)
  trashCache.forEach(item => addHidden(item.col + '::' + item.file));
  // 2) 휴지통 Firestore 비우기
  try {
    const batch = db.batch();
    const snap = await db.collection(TRASH_COLLECTION).get();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
  } catch(e) { console.warn('Firestore 비우기 실패:', e); }
  trashCache = [];
  localStorage.setItem('art-shop-trash', '[]');
  alert('🗑️ 영구 삭제 완료! 새로고침해도 다시 안 나옵니다.');
  if (currentCol === 'trash') { page = 0; grid.innerHTML = ''; renderTrash(); }
}

// ─── 영구삭제 시스템: localStorage 기반 (단순·확실) ───
const HIDDEN_KEY = 'art-shop-hidden';
function getHiddenSet() {
  try { return new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]')); } catch { return new Set(); }
}
function addHidden(key) {
  const set = getHiddenSet();
  set.add(key);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...set]));
}
function removeHidden(key) {
  const set = getHiddenSet();
  set.delete(key);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...set]));
}
// 초기 로드 시 숨긴 항목 필터링
function applyHidden() {
  const hidden = getHiddenSet();
  if (hidden.size === 0) return;
  Object.entries(COLLECTIONS).forEach(([colKey, col]) => {
    col.files = col.files.filter(f => {
      const fname = typeof f === 'string' ? f : f.f;
      return !hidden.has(colKey + '::' + fname);
    });
  });
}
applyHidden();

async function adminDelete() {
  if (!currentItem) return;
  const fname = typeof currentItem.file === 'string' ? currentItem.file : currentItem.file.f || currentItem.file;
  if (!confirm('💀 이 도안을 휴지통으로 보낼까요?\n\n' + fname)) return;

  // 1) hidden 시스템에도 등록 (이중 안전장치 — 새로고침해도 절대 안 보임)
  addHidden(currentItem.col + '::' + fname);

  // 2) 휴지통에 추가 (localStorage 먼저 → Firestore)
  const col = COLLECTIONS[currentItem.col];
  await addToTrash(currentItem.col, fname, col.base);

  // 3) COLLECTIONS에서 제거
  col.files = col.files.filter(f => {
    const fn = typeof f === 'string' ? f : f.f;
    return fn !== fname;
  });
  // 4) merged에서도 제거
  merged = merged.filter(m => {
    const mf = typeof m.file === 'string' ? m.file : m.file.f || m.file;
    return !(mf === fname && m.col === currentItem.col);
  });

  closeModal();
  updateCounts();
  page = 0; grid.innerHTML = '';
  renderPage();
  // 휴지통 카운트 업데이트
  const cntEl = document.getElementById('cnt-trash');
  if (cntEl) cntEl.textContent = trashCache.length + '장';
  alert('🗑️ 휴지통으로 이동! (관리자만 복원 가능)');
}

function renderTrash() {
  grid.innerHTML = '';
  loadMore.style.display = 'none';
  endMsg.style.display = 'none';
  const trash = getTrash();
  if (trash.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;font-size:14px">🗑️ 휴지통이 비어있어요</div>';
    return;
  }
  // 비우기 버튼
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:right;padding:0 0 8px"><button onclick="emptyTrash()" style="background:rgba(220,38,38,.1);color:#dc2626;border:1px solid rgba(220,38,38,.2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">🗑️ 전체 비우기</button></div>';
  trash.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.opacity = '0.6';
    // base를 trash에 저장된 값 우선, 없으면 COLLECTIONS에서
    const colObj = COLLECTIONS[item.col];
    const baseDir = item.base || (colObj ? colObj.base : '');
    const thumbSrc = baseDir + 'thumbs/' + toJpg(item.file);
    card.innerHTML = '<img src="' + thumbSrc + '" loading="lazy" onerror="this.src=\'\'" />' +
      '<div style="padding:6px 8px;display:flex;justify-content:space-between;align-items:center">' +
      '<span style="font-size:10px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">' + item.file.slice(0,20) + '</span>' +
      '<button onclick="restoreFromTrash(' + idx + ')" style="background:#10b981;color:#fff;border:none;padding:3px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:600">복원</button>' +
      '</div>';
    grid.appendChild(card);
  });
}

function updateCounts() {
  const totalNow = Object.values(COLLECTIONS).reduce((s, c) => s + c.files.length, 0);
  document.getElementById('count-label').textContent = totalNow + '장';
  const el = id => { try { document.getElementById(id).textContent = COLLECTIONS[id.replace('cnt-','')].files.length + '장'; } catch{} };
  document.getElementById('cnt-all').textContent = totalNow + '장';
  el('cnt-building'); el('cnt-japanimation'); el('cnt-korean'); el('cnt-fairytale'); el('cnt-illust'); el('cnt-croquis');
}

// ─── 초기 로드: 영구삭제 + 휴지통 → COLLECTIONS 필터 → 렌더 ───
(async function initWithTrash() {
  await loadTrash();
  if (trashCache.length > 0) {
    const trashSet = new Set(trashCache.map(t => t.col + '::' + t.file));
    Object.entries(COLLECTIONS).forEach(([key, col]) => {
      col.files = col.files.filter(f => {
        const fname = typeof f === 'string' ? f : f.f;
        return !trashSet.has(key + '::' + fname);
      });
    });
  }
  merged = buildMerged();
  updateCounts();
  page = 0; grid.innerHTML = '';
  renderPage();
})();
</script>
