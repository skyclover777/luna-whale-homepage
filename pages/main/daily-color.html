<!DOCTYPE html>
<html lang="ko" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이번주의 색상 조합 - Luna Whale</title>

    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        }
                    },
                    animation: {
                        fadeInUp: 'fadeInUp 0.4s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- App System Scripts -->
    <script src="../../js/theme.js"></script>
    <script src="../../public/js/data/popular_palettes.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        .dark body {
            background-color: #0f172a;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes staggerFadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .color-card-anim {
            opacity: 0;
            animation: staggerFadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card-wrapper {
            transition: all 0.3s ease;
        }

        /* Float animation for the icon */
        @keyframes iconBounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1) translateY(-3px);
            }
        }

        .revealed-icon {
            animation: iconBounce 2.5s infinite ease-in-out;
            animation-delay: 0.3s;
        }
    </style>
<script src="../../assets/js/luna-nav.js"></script>
</head>

<body class="text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col bg-slate-50 dark:bg-slate-900">

    <!-- Header (Back Button & Logo Only) -->
    <header
        class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shrink-0">
        <div class="flex items-center justify-between h-14 px-4 w-full max-w-[1200px] mx-auto">
            <button onclick="window.location.href='../../index.html'"
                class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span
                    class="material-symbols-outlined text-xl text-slate-700 dark:text-slate-300">arrow_back_ios_new</span>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-white text-lg">water_drop</span>
                </div>
                <h1 class="font-bold text-lg tracking-tight">Luna Whale</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openMonthlyLeaderboard()"
                    class="flex items-center gap-1 text-amber-500 hover:text-amber-600 transition-colors">
                    <span class="material-symbols-outlined text-sm md:text-base">emoji_events</span>
                    <span class="text-xs md:text-sm font-bold">이달의 카드</span>
                </button>
                <button onclick="window.location.href='past-gallery.html'"
                    class="flex items-center gap-1 text-slate-500 hover:text-primary transition-colors pr-2">
                    <span class="material-symbols-outlined text-sm md:text-base">history</span>
                    <span class="text-xs md:text-sm font-bold">과거 갤러리</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Background (Just cards) -->
    <main class="flex-1 w-full max-w-[1400px] mx-auto px-3 py-2 pb-4 relative">
        <div class="flex flex-col gap-2 w-full h-full">
            <!-- Grid container: 4 cols, tight fit to show all 16 slots in one screen -->
            <div class="grid grid-cols-4 gap-2" id="color-grid">
                <!-- Cards injected here via JS -->
            </div>
        </div>
    </main>

    <!-- Hidden Audio for timer -->
    <audio id="timer-alarm" src="../../assets/alarm.mp3" preload="auto"></audio>

    <script>
        // --- Random Icon Assets for the destiny reveal ---
        const ICONS = ["star", "favorite", "eco", "diamond", "water_drop", "lightbulb", "music_note", "cruelty_free", "verified", "local_fire_department", "bolt", "sailing", "rocket_launch", "auto_awesome", "psychiatry", "cookie", "forest", "pets", "child_care", "nature_people", "bubble_chart", "cake", "nightlight", "potted_plant", "magic_button", "palette", "volcano", "umbrella", "sports_esports", "piano", "local_florist", "science", "architecture", "brush", "directions_car", "flight", "directions_boat", "pedal_bike", "local_dining", "restaurant", "local_cafe", "icecream", "egg", "sunny", "bedtime", "cloud", "ac_unit"];
        const ICON_COLORS = ["text-amber-500", "text-pink-500", "text-emerald-500", "text-cyan-500", "text-blue-500", "text-yellow-400", "text-fuchsia-500", "text-purple-500", "text-indigo-500", "text-orange-500"];

        // Seeded PRNG for daily consistancy
        function mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        // ─── TIMER STATE (Inline) ─────────────────────────
        let timerTotal = 300; // 5 min default
        let timerLeft = 300;
        let timerActive = false;
        let timerInterval = null;
        let timerFinished = false;

        function timerTick() {
            if (!timerActive) return;
            if (timerLeft > 0) {
                timerLeft--;
                renderTimerCard();
            } else {
                timerActive = false;
                timerFinished = true;
                clearInterval(timerInterval);
                timerInterval = null;
                renderTimerCard();
                const audio = document.getElementById('timer-alarm');
                if (audio) audio.play().catch(() => { });
            }
        }

        function setTimerDuration(min) {
            timerTotal = min * 60;
            timerLeft = timerTotal;
            timerActive = false;
            timerFinished = false;
            clearInterval(timerInterval);
            timerInterval = null;
            renderTimerCard();
        }

        function toggleTimer() {
            if (timerFinished) resetTimer();
            timerActive = !timerActive;
            if (timerActive) {
                timerInterval = setInterval(timerTick, 1000);
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            renderTimerCard();
        }

        function resetTimer() {
            timerActive = false;
            timerFinished = false;
            timerLeft = timerTotal;
            clearInterval(timerInterval);
            timerInterval = null;
            const audio = document.getElementById('timer-alarm');
            if (audio) { audio.pause(); audio.currentTime = 0; }
            renderTimerCard();
        }

        function renderTimerCard() {
            const el = document.getElementById('timer-card-inner');
            if (!el) return;
            const m = Math.floor(timerLeft / 60);
            const s = timerLeft % 60;
            const mm = String(m).padStart(2, '0');
            const ss = String(s).padStart(2, '0');
            const presets = [5, 10, 15];
            el.innerHTML = `
                <div class="flex flex-col h-full items-center justify-between py-1.5 px-1 select-none">
                    <!-- Label -->
                    <div class="text-[9px] font-black text-pink-400/90 dark:text-pink-300 px-2 py-0.5 rounded border border-pink-100 dark:border-pink-900/50 bg-white/60 dark:bg-pink-900/10 self-start">
                        TIMER
                    </div>
                    <!-- Big Timer Display -->
                    <div class="flex flex-col items-center justify-center flex-1">
                        <span class="text-[3rem] font-black leading-none tracking-tight ${timerFinished ? 'text-emerald-500' : (timerActive ? 'text-blue-500' : 'text-slate-800 dark:text-white')}" style="transition:color 0.3s;">${mm}:${ss}</span>
                        <span class="text-[8px] font-bold ${timerFinished ? 'text-emerald-400' : (timerActive ? 'text-blue-400' : 'text-slate-400')} tracking-widest mt-0.5">${timerFinished ? 'DONE!' : (timerActive ? 'RUNNING' : 'READY')}</span>
                    </div>
                    <!-- Preset Buttons -->
                    <div class="flex gap-1 w-full justify-center">
                        ${presets.map(min => `
                            <button onclick="setTimerDuration(${min})" class="flex-1 text-[10px] font-bold py-0.5 rounded-full border transition-all ${timerTotal === min * 60
                    ? 'bg-blue-500 text-white border-blue-500 shadow'
                    : 'bg-white dark:bg-slate-700 text-slate-500 dark:text-slate-300 border-slate-200 dark:border-slate-600 hover:border-blue-400'
                }">${min}m</button>
                        `).join('')}
                    </div>
                    <!-- Controls -->
                    <div class="flex items-center justify-center gap-2 w-full">
                        <button onclick="resetTimer()" class="flex items-center justify-center w-7 h-7 rounded-full border border-slate-200 dark:border-slate-600 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">
                            <span class="material-symbols-outlined" style="font-size:14px;">replay</span>
                        </button>
                        <button onclick="toggleTimer()" class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-500 text-white shadow-lg hover:bg-blue-600 transition-all active:scale-95">
                            <span class="material-symbols-outlined" style="font-size:20px;">${timerActive ? 'pause' : 'play_arrow'}</span>
                        </button>
                        <button onclick="timerActive=false;timerLeft=0;clearInterval(timerInterval);timerInterval=null;timerFinished=true;renderTimerCard();" class="flex items-center justify-center w-7 h-7 rounded-full border border-slate-200 dark:border-slate-600 text-slate-400 hover:bg-red-50 hover:text-red-500 hover:border-red-300 transition-all">
                            <span class="material-symbols-outlined" style="font-size:14px;">stop</span>
                        </button>
                    </div>
                </div>
            `;
        }
        // ─────────────────────────────────────────────────

        let initialized = false;
        document.addEventListener('DOMContentLoaded', () => {
            if (initialized) return;
            initialized = true;

            // Weekly seed: ISO week number
            const today = new Date();
            const jan1 = new Date(today.getFullYear(), 0, 1);
            const dayOfYear = Math.ceil((today - jan1) / 86400000);
            const weekNum = Math.ceil((dayOfYear + jan1.getDay()) / 7);
            const weekString = `${today.getFullYear()}-W${weekNum}`;

            // Generate seed for this week
            let seed = 0;
            for (let i = 0; i < weekString.length; i++) {
                seed = Math.imul(31, seed) + weekString.charCodeAt(i) | 0;
            }
            seed ^= 0x4B3A2C1D;
            const rng = mulberry32(seed);
            const currentWeekKey = weekString;

            let CURATED_PALETTES = [];
            if (typeof COLORHUNT_PALETTES !== 'undefined') {
                CURATED_PALETTES = COLORHUNT_PALETTES;
            } else {
                CURATED_PALETTES = [
                    ["#FFB6B9", "#FAE3D9", "#BBDED6", "#61C0BF"], ["#F4F9F4", "#A7D7C5", "#74B49B", "#5C8D89"],
                    ["#FFF1E6", "#FDE2E4", "#FAD2E1", "#E2ECE9"], ["#F8EDE3", "#DFD3C3", "#D0B8A8", "#7D6E83"]
                ];
            }

            const grid = document.getElementById('color-grid');
            grid.innerHTML = ''; // 중복 방지: 매번 초기화

            // Select 15 unique palettes (slot 4 is the timer)
            const dailyIndices = [];
            const needed = 15;
            const usedPalettes = new Set();
            let attempts = 0;
            
            while (dailyIndices.length < needed && attempts < 1000) {
                let idx = Math.floor(rng() * CURATED_PALETTES.length);
                const paletteStr = JSON.stringify(CURATED_PALETTES[idx]);
                if (!usedPalettes.has(paletteStr)) {
                    usedPalettes.add(paletteStr);
                    dailyIndices.push(idx);
                }
                attempts++;
            }
            
            while (dailyIndices.length < needed) {
                dailyIndices.push(Math.floor(rng() * CURATED_PALETTES.length));
            }

            // ── Insert cards and timer in correct order ──
            // Slots: 1, 2, 3, [TIMER at 4], 5, 6, … 16
            let paletteIdx = 0;
            for (let slot = 1; slot <= 16; slot++) {
                if (slot === 4) {
                    // ── TIMER CARD ──
                    const timerCard = document.createElement('div');
                    timerCard.className = 'card-wrapper flex flex-col w-full color-card-anim pointer-events-auto cursor-default';
                    timerCard.style.animationDelay = `${(slot - 1) * 0.05}s`;
                    timerCard.innerHTML = `
                        <div class="w-full bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-blue-200 dark:border-blue-900/50 overflow-hidden" style="height:var(--card-h, 172px)">
                            <div id="timer-card-inner" class="w-full h-full"></div>
                        </div>
                    `;
                    grid.appendChild(timerCard);
                    setTimeout(renderTimerCard, 50);
                    continue;
                }

                // ── COLOR CARD ──
                const i = slot > 4 ? slot - 1 : slot; // display number skips 4
                const palette = CURATED_PALETTES[dailyIndices[paletteIdx++]];
                const c1 = palette[0], c2 = palette[1], c3 = palette[2], c4 = palette[3];

                // Two random icons for this card based on PRNG
                const iconName1 = ICONS[Math.floor(rng() * ICONS.length)];
                const iconColor1 = ICON_COLORS[Math.floor(rng() * ICON_COLORS.length)];
                const iconName2 = ICONS[Math.floor(rng() * ICONS.length)];
                const iconColor2 = ICON_COLORS[Math.floor(rng() * ICON_COLORS.length)];

                const delay = (slot - 1) * 0.05;

                // Create outer wrapper
                const card = document.createElement('div');
                card.className = 'card-wrapper flex flex-col w-full color-card-anim pointer-events-auto cursor-pointer';
                card.style.animationDelay = `${delay}s`;
                card.id = `card-${slot}`;

                card.innerHTML = `
                    <div class="w-full bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700/60 flex flex-row overflow-hidden hover:shadow-md transition-shadow">
                        <!-- Left: Colors (60% width) -->
                        <div class="w-3/5 flex flex-col relative" style="height:155px">
                            <span style="position:absolute;top:4px;left:6px;font-size:24px;font-weight:900;color:#999;line-height:1;text-shadow:0 0 4px rgba(255,255,255,0.8);z-index:1;">${i}</span>
                            <div style="background-color:${c1};" class="flex-1 w-full"></div>
                            <div style="background-color:${c2};" class="flex-1 w-full"></div>
                            <div style="background-color:${c3};" class="flex-1 w-full"></div>
                            <div style="background-color:${c4};" class="flex-1 w-full"></div>
                        </div>
                        <!-- Right: Icons (40% width) -->
                        <div class="w-2/5 flex flex-col items-center justify-center gap-2 bg-slate-50 dark:bg-slate-800/80 p-2">
                            <div class="w-9 h-9 rounded-full bg-white dark:bg-slate-700 flex items-center justify-center shadow-sm ring-1 ring-slate-100 dark:ring-slate-600 transition-transform hover:scale-110">
                                <span class="material-symbols-outlined text-xl ${iconColor1}">${iconName1}</span>
                            </div>
                            <div class="w-9 h-9 rounded-full bg-white dark:bg-slate-700 flex items-center justify-center shadow-sm ring-1 ring-slate-100 dark:ring-slate-600 transition-transform hover:scale-110">
                                <span class="material-symbols-outlined text-xl ${iconColor2}">${iconName2}</span>
                            </div>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    renderAccordion(card, palette, i);
                });

                grid.appendChild(card);
            } // end for slot

            // Accordion logic
            let currentAccordion = null;
            function renderAccordion(cardEl, palette, index) {
                if (currentAccordion && currentAccordion.dataset.cardId === cardEl.id) {
                    currentAccordion.remove();
                    currentAccordion = null;
                    cardEl.classList.remove('ring-4', 'ring-primary', 'scale-105');
                    return;
                }

                if (currentAccordion) {
                    currentAccordion.remove();
                    document.querySelectorAll('.card-wrapper').forEach(c => {
                        c.classList.remove('ring-4', 'ring-primary', 'scale-105');
                    });
                }

                currentAccordion = document.createElement('div');
                currentAccordion.className = "col-span-full w-full bg-white dark:bg-[#1E293B] rounded-[2.5rem] md:rounded-[3rem] shadow-xl p-6 md:p-12 border border-slate-100 dark:border-slate-800 my-4 md:my-8 overflow-hidden transform transition-all animate-fadeInUp";
                currentAccordion.dataset.cardId = cardEl.id;

                cardEl.classList.add('ring-4', 'ring-primary', 'scale-105');

                const [c1, c2, c3, c4] = palette;

                currentAccordion.innerHTML = `
                    <button class="absolute top-4 right-4 md:top-6 md:right-6 w-10 h-10 flex items-center justify-center rounded-full bg-slate-100/80 dark:bg-slate-800/80 text-slate-500 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors z-20 accordion-close-btn">
                        <span class="material-symbols-outlined text-xl">close</span>
                    </button>
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 md:gap-12 mb-8 md:mb-12 relative z-10 pt-4 md:pt-0">
                        <div class="flex flex-col md:flex-row items-center md:items-start gap-4 md:gap-8 text-center md:text-left">
                            <div class="w-24 h-24 md:w-32 md:h-32 rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex flex-col shadow-xl rotate-3 shrink-0">
                                <div class="h-1/4" style="background-color: ${c1};"></div>
                                <div class="h-1/4" style="background-color: ${c2};"></div>
                                <div class="h-1/4" style="background-color: ${c3};"></div>
                                <div class="h-1/4" style="background-color: ${c4};"></div>
                            </div>
                            <div class="mt-2 md:mt-0">
                                <div class="flex items-center justify-center md:justify-start gap-2 mb-2 md:mb-3">
                                    <span class="material-symbols-outlined text-amber-500 text-sm md:text-lg">auto_fix_high</span>
                                    <span class="text-[10px] md:text-xs font-black text-primary uppercase tracking-widest bg-primary/10 px-3 py-1 rounded-full">Selected Palette #No.${String(index).padStart(2, '0')}</span>
                                </div>
                                <h4 class="text-2xl md:text-4xl font-black text-slate-900 dark:text-white tracking-tight mb-1 md:mb-2">아이들의 상상력</h4>
                                <span class="text-slate-400 dark:text-slate-500 font-bold text-sm md:text-lg uppercase tracking-[0.2em] block mb-3 md:mb-4">Student Gallery</span>
                                <p class="text-slate-500 dark:text-slate-400 text-xs md:text-sm leading-relaxed max-w-xl font-medium">선택하신 세상의 색상조합에서 영감을 받아 탄생한 아이들의 멋진 작품들을 만나보세요.</p>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto mt-4 md:mt-0">
                            <button class="upload-btn w-full sm:w-auto px-6 md:px-10 py-3 md:py-5 bg-primary text-white rounded-[1.5rem] font-black shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:bg-blue-700 transition-all hover:-translate-y-1 text-sm md:text-base">
                                <span class="material-symbols-outlined text-xl md:text-2xl">upload</span>
                                작품 업로드하기
                            </button>
                        </div>
                    </div>
                    <div id="card-ranking-${cardEl.id}" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 relative z-10 w-full"></div>
                `;

                // Render top 4 rankings for this card
                renderCardRankings(cardEl.id, palette, index);

                // Upload button opens modal
                const uploadBtn = currentAccordion.querySelector('.upload-btn');
                uploadBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openUploadModal(palette, index, cardEl.id);
                });

                const cards = Array.from(document.querySelectorAll('.card-wrapper'));
                const clickedTop = cardEl.offsetTop;

                let lastInRow = cardEl;
                for (let j = cards.indexOf(cardEl) + 1; j < cards.length; j++) {
                    if (cards[j].offsetTop <= clickedTop + 10) {
                        lastInRow = cards[j];
                    } else {
                        break;
                    }
                }

                lastInRow.after(currentAccordion);

                setTimeout(() => {
                    const y = currentAccordion.getBoundingClientRect().top + window.scrollY - 100;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }, 50);
                const closeBtn = currentAccordion.querySelector('.accordion-close-btn');
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentAccordion) {
                        currentAccordion.remove();
                        currentAccordion = null;
                        cardEl.classList.remove('ring-4', 'ring-primary', 'scale-105');
                    }
                });
            }

            document.addEventListener('click', (e) => {
                if (currentAccordion) {
                    const clickedInsideAccordion = currentAccordion.contains(e.target);
                    const clickedInsideCard = e.target.closest('.card-wrapper') !== null;

                    if (!clickedInsideAccordion && !clickedInsideCard) {
                        currentAccordion.remove();
                        currentAccordion = null;
                        document.querySelectorAll('.card-wrapper').forEach(c => {
                            c.classList.remove('ring-4', 'ring-primary', 'scale-105');
                        });
                    }
                }
            });

            // ─── COLOR SCORING & STORAGE SYSTEM ────────────────
            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return [r, g, b];
            }

            function rgbToLab([r, g, b]) {
                r /= 255; g /= 255; b /= 255;
                r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
                g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
                b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
                let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047;
                let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 1.00000;
                let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;
                x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + 16/116;
                y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + 16/116;
                z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + 16/116;
                return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
            }

            function deltaE(lab1, lab2) {
                return Math.sqrt(Math.pow(lab1[0]-lab2[0],2) + Math.pow(lab1[1]-lab2[1],2) + Math.pow(lab1[2]-lab2[2],2));
            }

            function getDominantColors(canvas, numColors = 4) {
                const ctx = canvas.getContext('2d');
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const pixels = [];
                for (let i = 0; i < data.length; i += 16) {
                    pixels.push([data[i], data[i+1], data[i+2]]);
                }
                // Simple k-means-ish: bucket into regions
                const buckets = {};
                pixels.forEach(([r,g,b]) => {
                    const key = `${Math.round(r/32)*32}-${Math.round(g/32)*32}-${Math.round(b/32)*32}`;
                    if (!buckets[key]) buckets[key] = { sum: [0,0,0], count: 0 };
                    buckets[key].sum[0] += r; buckets[key].sum[1] += g; buckets[key].sum[2] += b;
                    buckets[key].count++;
                });
                const sorted = Object.values(buckets).sort((a,b) => b.count - a.count);
                return sorted.slice(0, numColors).map(b => [
                    Math.round(b.sum[0]/b.count), Math.round(b.sum[1]/b.count), Math.round(b.sum[2]/b.count)
                ]);
            }

            function calculateColorScore(dominantColors, palette) {
                const paletteLabs = palette.map(hex => rgbToLab(hexToRgb(hex)));
                let totalDelta = 0;
                const used = new Set();
                dominantColors.forEach(rgb => {
                    const lab = rgbToLab(rgb);
                    let bestDist = Infinity, bestIdx = 0;
                    paletteLabs.forEach((pLab, idx) => {
                        if (!used.has(idx)) {
                            const d = deltaE(lab, pLab);
                            if (d < bestDist) { bestDist = d; bestIdx = idx; }
                        }
                    });
                    used.add(bestIdx);
                    totalDelta += bestDist;
                });
                const avgDelta = totalDelta / Math.min(dominantColors.length, palette.length);
                return Math.max(0, Math.round(100 - avgDelta * 0.8));
            }

            // ─── FIRESTORE 기반 저장/조회 (모든 기기·사용자 공유) ───
            function getDb() {
                return (window.LunaAuth && window.LunaAuth.getDb) ? window.LunaAuth.getDb() : firebase.firestore();
            }

            async function saveSubmission(weekKey, submission) {
                try {
                    const db = getDb();
                    await db.collection('color_submissions').add({
                        ...submission,
                        weekKey: weekKey,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    console.error('Firestore save error:', e);
                    // 오프라인 폴백: localStorage에도 저장
                    const key = `color_submissions_${weekKey}`;
                    const data = JSON.parse(localStorage.getItem(key) || '[]');
                    data.push(submission);
                    localStorage.setItem(key, JSON.stringify(data));
                }
            }

            async function getSubmissions(weekKey, cardSlot) {
                try {
                    const db = getDb();
                    const snap = await db.collection('color_submissions')
                        .where('weekKey', '==', weekKey)
                        .where('cardSlot', '==', cardSlot)
                        .orderBy('score', 'desc')
                        .limit(10)
                        .get();
                    return snap.docs.map(d => d.data());
                } catch (e) {
                    console.error('Firestore read error:', e);
                    // 오프라인 폴백
                    const key = `color_submissions_${weekKey}`;
                    const data = JSON.parse(localStorage.getItem(key) || '[]');
                    return data.filter(s => s.cardSlot === cardSlot).sort((a, b) => b.score - a.score);
                }
            }

            async function getAllMonthlySubmissions() {
                try {
                    const db = getDb();
                    const now = new Date();
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
                    const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59).toISOString();
                    const snap = await db.collection('color_submissions')
                        .where('date', '>=', startOfMonth)
                        .where('date', '<=', endOfMonth)
                        .orderBy('date')
                        .get();
                    const all = snap.docs.map(d => d.data());
                    return all.sort((a, b) => b.score - a.score);
                } catch (e) {
                    console.error('Firestore monthly read error:', e);
                    return [];
                }
            }

            // ─── RENDER CARD RANKINGS (TOP 4) ─────────────
            async function renderCardRankings(cardId, palette, index) {
                const container = document.getElementById(`card-ranking-${cardId}`);
                if (!container) return;
                container.innerHTML = `<div class="col-span-full flex items-center justify-center py-8"><div class="w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>`;
                const subs = await getSubmissions(currentWeekKey, cardId);
                const top4 = subs.slice(0, 4);
                const medals = ['🥇', '🥈', '🥉', '4th'];
                if (top4.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-10 opacity-60">
                            <span class="material-symbols-outlined text-5xl text-slate-300 mb-3">photo_camera</span>
                            <p class="text-sm font-bold text-slate-400">아직 업로드된 작품이 없습니다</p>
                            <p class="text-xs text-slate-400">위 버튼을 눌러 작품을 올려보세요!</p>
                        </div>`;
                    return;
                }
                container.innerHTML = top4.map((s, idx) => `
                    <div class="group cursor-pointer">
                        <div class="relative aspect-[4/5] mb-3 overflow-hidden rounded-[1.5rem] md:rounded-[2rem] bg-slate-100 dark:bg-slate-800 shadow-sm group-hover:shadow-xl transition-all duration-500">
                            <img src="${s.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="작품" />
                            <div class="absolute top-2 left-2 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm rounded-full px-2.5 py-1 text-xs font-black shadow">${medals[idx]}</div>
                            <div class="absolute bottom-2 right-2 bg-primary/90 text-white rounded-full px-2.5 py-1 text-xs font-black shadow">${s.score}점</div>
                        </div>
                        <div class="px-2">
                            <h5 class="font-bold text-sm md:text-base text-slate-900 dark:text-slate-100 truncate">${s.name}</h5>
                            <span class="text-[10px] md:text-xs font-bold text-slate-500">${new Date(s.date).toLocaleDateString('ko-KR')}</span>
                        </div>
                    </div>
                `).join('');
            }

            // ─── UPLOAD MODAL ─────────────────────────────
            window.openUploadModal = function(palette, index, cardId) {
                let existingModal = document.getElementById('upload-modal');
                if (existingModal) existingModal.remove();

                const modal = document.createElement('div');
                modal.id = 'upload-modal';
                modal.className = 'fixed inset-0 z-[999] flex items-center justify-center bg-black/60 backdrop-blur-sm';
                modal.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-[90vw] max-w-lg max-h-[90vh] overflow-y-auto p-6 md:p-8 relative animate-fadeInUp">
                        <button id="close-upload-modal" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors z-20">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                        <h3 class="text-xl font-black mb-1">📸 작품 업로드</h3>
                        <p class="text-xs text-slate-400 mb-5">사진을 자르고, 이름을 적어 제출하세요!</p>
                        <div class="flex gap-2 mb-4">
                            ${palette.map(c => `<div class="flex-1 h-8 rounded-lg" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="mb-4">
                            <label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-1">이름 *</label>
                            <input id="upload-name" type="text" placeholder="이름을 입력하세요" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm focus:ring-2 focus:ring-primary outline-none transition" />
                        </div>
                        <div class="mb-4">
                            <label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-1">사진 선택</label>
                            <input id="upload-file" type="file" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition" />
                        </div>
                        <div id="cropper-container" class="hidden mb-4 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700" style="max-height:300px">
                            <img id="crop-image" style="max-width:100%;display:block;" />
                        </div>
                        <div id="upload-result" class="hidden mb-4 p-4 rounded-xl bg-gradient-to-r from-emerald-50 to-cyan-50 dark:from-emerald-900/20 dark:to-cyan-900/20 border border-emerald-200 dark:border-emerald-800 text-center"></div>
                        <button id="submit-upload" class="w-full py-3 bg-primary text-white rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <span class="material-symbols-outlined">check_circle</span>
                            제출하기
                        </button>
                    </div>
                `;
                document.body.appendChild(modal);
                let cropper = null;

                document.getElementById('close-upload-modal').addEventListener('click', () => {
                    if (cropper) cropper.destroy();
                    modal.remove();
                });
                modal.addEventListener('click', (e) => { if (e.target === modal) { if (cropper) cropper.destroy(); modal.remove(); } });

                document.getElementById('upload-file').addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const container = document.getElementById('cropper-container');
                        const img = document.getElementById('crop-image');
                        img.src = ev.target.result;
                        container.classList.remove('hidden');
                        if (cropper) cropper.destroy();
                        setTimeout(() => {
                            cropper = new Cropper(img, { aspectRatio: 4/5, viewMode: 1, autoCropArea: 0.9, responsive: true });
                            document.getElementById('submit-upload').disabled = false;
                        }, 100);
                    };
                    reader.readAsDataURL(file);
                });

                document.getElementById('submit-upload').addEventListener('click', async function() {
                    const name = document.getElementById('upload-name').value.trim();
                    if (!name) { alert('이름을 입력해주세요!'); return; }
                    if (!cropper) { alert('사진을 선택해주세요!'); return; }

                    this.disabled = true;
                    this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 저장 중...';

                    const canvas = cropper.getCroppedCanvas({ width: 400, height: 500 });
                    const thumbnail = canvas.toDataURL('image/jpeg', 0.6);
                    const dominantColors = getDominantColors(canvas);
                    const score = calculateColorScore(dominantColors, palette);

                    const submission = {
                        name, score, thumbnail,
                        paletteIndex: index,
                        palette: palette,
                        cardSlot: cardId,
                        date: new Date().toISOString()
                    };
                    await saveSubmission(currentWeekKey, submission);

                    // Show result
                    const resultDiv = document.getElementById('upload-result');
                    resultDiv.classList.remove('hidden');
                    resultDiv.innerHTML = `
                        <div class="text-4xl font-black mb-1" style="color: ${score >= 70 ? '#10b981' : score >= 40 ? '#f59e0b' : '#ef4444'}">${score}<span class="text-lg">점</span></div>
                        <p class="text-sm font-bold text-slate-600 dark:text-slate-400">${score >= 70 ? '🎉 놀라운 일치!' : score >= 40 ? '👍 좋은 시도!': '🌱 다시 도전해보세요!'}</p>
                    `;
                    this.textContent = '제출 완료 ✓';

                    // Refresh accordion rankings
                    await renderCardRankings(cardId, palette, index);

                    setTimeout(() => { if (cropper) cropper.destroy(); modal.remove(); }, 2000);
                });
            };

            // ─── MONTHLY LEADERBOARD ──────────────────────
            window.openMonthlyLeaderboard = async function() {
                let existing = document.getElementById('monthly-leaderboard-modal');
                if (existing) existing.remove();

                const now = new Date();
                const monthName = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long' });
                const all = await getAllMonthlySubmissions();
                const top10 = all.slice(0, 10);
                const medals = ['🥇', '🥈', '🥉'];

                const modal = document.createElement('div');
                modal.id = 'monthly-leaderboard-modal';
                modal.className = 'fixed inset-0 z-[999] flex items-center justify-center bg-black/60 backdrop-blur-sm';

                const rowsHTML = top10.length > 0 ? top10.map((s, i) => `
                    <div class="flex items-center gap-3 p-3 rounded-2xl ${i < 3 ? 'bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-800/50' : 'bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700/50'} transition-all hover:shadow-md">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg font-black shrink-0 ${i < 3 ? 'bg-amber-100 dark:bg-amber-900/30' : 'bg-slate-200 dark:bg-slate-700'}">
                            ${i < 3 ? medals[i] : i + 1}
                        </div>
                        <img src="${s.thumbnail}" class="w-12 h-14 rounded-lg object-cover shrink-0 shadow-sm" alt="" />
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-sm truncate">${s.name}</div>
                            <div class="flex gap-1 mt-0.5">${s.palette.map(c => `<div class="w-3 h-3 rounded-full" style="background:${c}"></div>`).join('')}</div>
                        </div>
                        <div class="text-right shrink-0">
                            <div class="text-lg font-black text-primary">${s.score}</div>
                            <div class="text-[9px] text-slate-400">${new Date(s.date).toLocaleDateString('ko-KR', {month:'short', day:'numeric'})}</div>
                        </div>
                    </div>
                `).join('') : `<div class="flex flex-col items-center py-12 opacity-60"><span class="material-symbols-outlined text-5xl text-slate-300 mb-3">emoji_events</span><p class="text-sm font-bold text-slate-400">이번 달 데이터가 없습니다</p></div>`;

                modal.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-[90vw] max-w-md max-h-[85vh] overflow-y-auto p-6 md:p-8 relative animate-fadeInUp">
                        <button id="close-monthly-modal" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors z-20">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                        <div class="text-center mb-6">
                            <div class="text-3xl mb-1">🏆</div>
                            <h3 class="text-xl font-black">${monthName} 이달의 카드</h3>
                            <p class="text-xs text-slate-400 mt-1">색상 일치도 TOP 10</p>
                        </div>
                        <div class="flex flex-col gap-2">${rowsHTML}</div>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('close-monthly-modal').addEventListener('click', () => modal.remove());
                modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            };
        });
    </script>
