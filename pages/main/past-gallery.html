<!DOCTYPE html>
<html lang="ko" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>과거 갤러리 - Luna Whale</title>

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                    }
                }
            }
        }
    </script>

    <!-- App System Scripts -->
    <script src="../../js/theme.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        .dark body {
            background-color: #0f172a;
        }
    </style>
<script src="../../assets/js/luna-nav.js"></script>
</head>

<body class="text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col bg-slate-50 dark:bg-slate-900">

    <!-- Header (Back Button & Logo Only) -->
    <header
        class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shrink-0">
        <div class="flex items-center justify-between h-14 px-4 w-full max-w-[1200px] mx-auto">
            <button onclick="window.history.back()"
                class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span
                    class="material-symbols-outlined text-xl text-slate-700 dark:text-slate-300">arrow_back_ios_new</span>
            </button>
            <div class="flex items-center gap-2">
                <h1 class="font-bold text-lg tracking-tight">과거 기록</h1>
            </div>
            <div class="w-10 flex items-center justify-end">
                <button onclick="toggleTheme()"
                    class="w-10 h-10 -mr-2 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500">
                    <span id="theme-icon" class="material-symbols-outlined text-[20px]">light_mode</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Background (Just cards) -->
    <main class="flex-1 w-full max-w-[1200px] mx-auto p-6 md:p-12 pb-20 relative">
        <div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
            <div class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">construction</span>
            </div>
            <h2 class="text-2xl md:text-3xl font-black mb-3">과거 갤러리 준비 중</h2>
            <p class="text-slate-500 max-w-sm mb-8">아이들의 지난 빛나는 작품 기록들을 모아보는 공간을 열심히 준비하고 있습니다.</p>
            <button onclick="window.history.back()"
                class="px-6 py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-full font-bold transition-colors">
                돌아가기
            </button>
        </div>
    </main>

<!-- Art Cosmos Widget -->
<script src="../../assets/data/art-archive.js?v=0319"></script>
<script src="../../assets/js/voice-engine.js?v=0319"></script>
<script src="../../assets/js/art-cosmos-widget.js?v=0320b"></script>
</body>

</html>
