<script>
// ── LunaCoin Bridge (standalone pages) ──
window.LunaCoinBridge = {
    _key: 'luna_coins',
    get coins() { return parseInt(localStorage.getItem(this._key) || '0'); },
    spend(amount) {
        const cur = this.coins;
        if (cur < amount) return false;
        localStorage.setItem(this._key, String(cur - amount));
        // Firestore sync
        try {
            const user = firebase.auth().currentUser;
            if (user) firebase.firestore().collection('users').doc(user.uid).update({ coins: cur - amount });
        } catch(e) {}
        return true;
    }
};

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform, useMotionTemplate, AnimatePresence } from 'framer-motion';
        import confetti from 'canvas-confetti';

        // --- Database ---
        let currentDB = [];

        // Load DB
        const loadDatabase = async (packType = 'impressionism') => {
            try {
                const url = packType === '100artists' ? '../../data/cards/100_artists.json' : '../../data/cards/impressionism.json';
                const res = await fetch(url);
                const data = await res.json();
                currentDB = data;
                console.log(`Loaded DB (${packType}):`, currentDB.length, "cards");
            } catch (e) {
                console.error("Failed to load DB", e);
            }
        };

        // Generate N cards depending on pack
        const generatePack = (packType) => {
            const pack = [];
            const dbRef = currentDB.length > 0 ? currentDB : [];

            if (dbRef.length === 0) return pack;

            const pullCount = packType === '100artists' ? 3 : 2; // 3 cards for 100 artists, 2 for impressionism

            for (let i = 0; i < pullCount; i++) {
                if (i === 0) {
                    // Guaranteed Rare+ for first card
                    const rand = Math.random();
                    let pool = 'Common';
                    if (rand > 0.85) pool = 'Legendary';
                    else if (rand > 0.60) pool = 'Epic';
                    else if (rand > 0.30) pool = 'Rare';
                    const subset = dbRef.filter(c => c.rarity === pool);
                    const pick = subset.length > 0 ? subset[Math.floor(Math.random() * subset.length)] : dbRef[Math.floor(Math.random() * dbRef.length)];
                    pack.push({ ...pick, uid: Math.random().toString(36).substr(2, 9) });
                } else {
                    // Mostly Common for others
                    const rand = Math.random();
                    const pool = rand > 0.90 ? 'Rare' : 'Common';
                    const subset = dbRef.filter(c => c.rarity === pool);
                    const pick = subset.length > 0 ? subset[Math.floor(Math.random() * subset.length)] : dbRef[Math.floor(Math.random() * dbRef.length)];
                    pack.push({ ...pick, uid: Math.random().toString(36).substr(2, 9) });
                }
            }
            return pack;
        }

        // --- Audio Manager ---
        // Synthetic sounds disabled to fix weird noise
        const playSynthSound = (type) => {
            // No-op
        };

        // --- Masterpiece Style Card Component (Redline Pattern) ---
        const Card = ({ data, index, total, revealDelay, onEnlarge }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const cardRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const mouseXSpring = useSpring(x, { stiffness: 150, damping: 20 });
            const mouseYSpring = useSpring(y, { stiffness: 150, damping: 20 });

            const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["15deg", "-15deg"]);
            const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-15deg", "15deg"]);

            const handleMouseMove = (e) => {
                if (!cardRef.current || !isFlipped) return;
                const rect = cardRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                x.set(mouseX / rect.width - 0.5);
                y.set(mouseY / rect.height - 0.5);
            };

            const handleMouseLeave = () => { x.set(0); y.set(0); };

            const isLegendary = data.rarity === 'Legendary';
            const isEpic = data.rarity === 'Epic';

            // Dynamic Fan spread calculation
            const mid = (total - 1) / 2;
            const diff = index - mid;
            const spread = total > 2 ? 8 : 5; // degrees per card
            const fanAngle = diff * spread;
            const ySpread = total > 2 ? 8 : 5;
            const fanYOffset = Math.abs(diff) * ySpread;

            const handleFlip = () => {
                if (!isFlipped) {
                    setIsFlipped(true);
                } else if (onEnlarge) {
                    onEnlarge(data);
                }
                // Removed confetti
            };

            return (
                <motion.div
                    className="relative w-[250px] h-[350px] perspective-1000 flex-shrink-0 cursor-pointer z-50"
                    initial={{ scale: 0, x: 0, y: 150, rotateZ: 0 }}
                    animate={{ scale: 1, x: 0, y: fanYOffset, rotateZ: fanAngle }}
                    transition={{ type: "spring", damping: 12, delay: 0.5 + (index * 0.1) }}
                    style={{ zIndex: isFlipped ? 100 : 50 + index, pointerEvents: 'auto' }}
                    onClick={handleFlip}
                    onPointerDown={(e) => {
                        // Backup for mobile touch
                        if (e.pointerType === 'touch') {
                            // handleFlip will trigger on click, but for safety:
                            // we don't want to double flip, so handleFlip logic is better
                        }
                    }}
                >
                    <motion.div
                        ref={cardRef}
                        style={{ rotateX, rotateY, transformStyle: 'preserve-3d' }}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                        className="w-[250px] h-[350px] relative"
                        whileHover={isFlipped ? { scale: 1.05 } : { scale: 1.02, y: -10 }}
                    >
                        <motion.div
                            className="w-full h-full relative"
                            style={{ transformStyle: 'preserve-3d' }}
                            initial={{ rotateY: 180 }}
                            animate={{ rotateY: isFlipped ? 0 : 180 }}
                            transition={{ duration: 0.8, type: "spring", bounce: 0.4 }}
                        >
                            {/* FRONT FACE (Redline Spec) */}
                            <div

                                style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', zIndex: 2 }}
                            >
                                {/* Zoom Icon Overlay - Very Obvious */}
                                {isFlipped && (
                                    <div
                                        className="absolute top-1 right-1 z-[60] bg-gold-500/90 text-black rounded-full p-1.5 shadow-lg flex items-center justify-center cursor-pointer hover:bg-gold-400 hover:scale-110 transition-all border-2 border-zinc-900"

                                    </div>

                                <div className="h-[30px] shrink-0 bg-gradient-to-r from-[#dcd1c4] to-[#c9bcae] rounded-t-[6px] rounded-b-[2px] border-[2px] border-zinc-900 px-[6px] flex justify-between items-center shadow-[inset_0_0_4px_rgba(255,255,255,0.5)] z-40 relative pt-[2px] cursor-pointer" onClick={(e) => { e.stopPropagation(); if (isFlipped && onEnlarge) onEnlarge(data); }}>
                                    <div className="flex flex-col flex-1 min-w-0 pr-2 pb-[1px]">
                                        <span className="text-[12px] font-bold text-zinc-900 leading-[1.1] tracking-tight font-display mb-[1px] truncate">{data.title_ko || data.title}</span>
                                        <span className="text-[7px] text-zinc-600 leading-none truncate">{data.title_en}</span>

                                    <div className="flex-shrink-0 flex items-center gap-[2px]">
                                        {isLegendary && <span className="material-symbols-outlined text-[16px] text-yellow-600 drop-shadow-sm">stars</span>}
                                        {data.rarity === 'Epic' && <span className="material-symbols-outlined text-[16px] text-purple-600 drop-shadow-sm">diamond</span>}
                                        {data.rarity === 'Rare' && <span className="material-symbols-outlined text-[16px] text-blue-600 drop-shadow-sm">pentagon</span>}
                                        {data.rarity === 'Common' && <span className="material-symbols-outlined text-[16px] text-zinc-500 drop-shadow-sm">circle</span>}
                                    </div>
                                </div>

                                {/* Art Box */}
                                <div

                                        style={{ backgroundImage: `url(${data.img_thumb || data.img_large || data.url})` }}
                                    ></div>
                                    {/* Fitted Image */}
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <img src={data.img_thumb || data.img_large || data.url} alt={data.title_ko || data.title} className="w-full h-full object-contain drop-shadow-2xl" draggable="false" />
                                    </div>
                                </div>

                                {/* Type Line */}
                                <div className="mt-[4px] h-[22px] shrink-0 bg-gradient-to-r from-[#dcd1c4] to-[#c9bcae] rounded-[2px] border-[2px] border-zinc-900 px-[6px] flex justify-between items-center shadow-[inset_0_0_4px_rgba(255,255,255,0.5)] z-40 relative">
                                    <span className="text-[11px] font-bold text-zinc-900 truncate">{data.artist_ko || data.artist}</span>
                                    <span className="text-[9px] font-semibold text-zinc-700 whitespace-nowrap ml-2">{data.era_ko || data.era}</span>
                                </div>

                                {/* Text Box (TMI) */}
                                <div
                                    className="mt-[4px] h-[64px] shrink-0 bg-[#dcd1c4]/95 rounded-[2px] border-[2px] border-zinc-900 p-[6px] overflow-y-auto scroll-smooth custom-scrollbar shadow-inner relative flex flex-col gap-[4px] pointer-events-auto z-40 overscroll-contain"
                                    onWheel={(e) => {
                                        e.currentTarget.scrollBy({ top: Math.sign(e.deltaY) * 30, behavior: 'smooth' });
                                        e.stopPropagation();
                                        e.preventDefault();
                                    }}
                                    onTouchStart={(e) => e.stopPropagation()}
                                    onTouchMove={(e) => e.stopPropagation()}
                                    onPointerDown={(e) => e.stopPropagation()}
                                >
                                    <p className="text-[10px] leading-[1.3] text-zinc-900 whitespace-pre-wrap break-keep">
                                        {data.desc_ko}
                                    </p>
                                    <p className="text-[9px] leading-[1.2] text-zinc-700 italic">
                                        {data.desc_en}
                                    </p>
                                </div>

                                {/* Bottom Info Line */}
                                <div className="h-[12px] shrink-0 flex justify-between items-end px-[2px] mt-[4px] z-40 relative">
                                    <span className="text-[10px] font-bold text-white tracking-widest leading-none drop-shadow-md">{data.year || '19c'}</span>
                                    <div className="flex items-center gap-1">
                                        <span className="text-[8px] text-white/70 font-mono leading-none">{data.id}</span>
                                    </div>
                                </div>
                            </div>

                            {/* BACK FACE (Luna Whale Official) */}
                            <div
                                className="absolute inset-0 backface-hidden rounded-[12px] border-[1px] border-gold-500/30 overflow-hidden shadow-2xl pointer-events-auto"
                                style={{ transform: "rotateY(180deg)", backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', zIndex: 1 }}
                            >
                                <img src="../../images/카드 뒷면 저용량.png" alt="Card Back" className="w-full h-full object-cover" />

                            </div>
                        </motion.div>
                    </motion.div>
                </motion.div>
            );
        };

        const MasterpieceGacha = () => {
            const [packState, setPackState] = useState('selecting'); // selecting -> sealed -> opening -> opened
            const [selectedPackType, setSelectedPackType] = useState(null);
            const [cards, setCards] = useState([]);
            const [showGuide, setShowGuide] = useState(true);
            const [enlargedCard, setEnlargedCard] = useState(null);
            const [packKey, setPackKey] = useState(0);

            const audioCtxRef = useRef(null);
            const dragY = useMotionValue(0);

            const handleSelectPack = async (type) => {
                playSfx('click');
                setSelectedPackType(type);
                await loadDatabase(type);
                setPackState('sealed');
                playSfx('whoosh');
            };

            // Audio Synthesis for Tearing (can be repurposed for a 'swish' or 'pop')
            const playTearSound = (val) => {
                if (!audioCtxRef.current) {
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();

                const v = Math.abs(val);
                if (v < 20) return;

                const bufferSize = ctx.sampleRate * 0.05;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                const source = ctx.createBufferSource();
                source.buffer = buffer;

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1200 + v * 3, ctx.currentTime);
                filter.Q.value = 1;

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(Math.min(0.1, v / 2000), ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);

                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start();
            };

            const handleDrag = (_, info) => {
                playTearSound(info.velocity.y);
                if (Math.abs(info.offset.y) > 10) setShowGuide(false);
            };

            // DB is loaded upon pack selection

                try {
                    const batch = firebase.firestore().batch();
                    pack.forEach(card => {
                        const docRef = firebase.firestore().collection('users').doc(user.uid).collection('cards').doc();
                        batch.set(docRef, {
                            ...card,
                            packType: selectedPackType,
                            drawnAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                    await batch.commit();
                    console.log("Cards saved successfully to Firestore.");
                } catch (e) {
                    console.error("Error saving cards:", e);
                }
            };

                const user = firebase.auth().currentUser;

                    return;

                const confirmReset = confirm("수집한 모든 카드를 초기화 하시겠습니까? (테스트용)");

                    const snapshot = await firebase.firestore().collection('users').doc(user.uid).collection('cards').get();
                    if (snapshot.empty) {
                        alert("삭제할 카드가 없습니다.");
                        return;
                    }
                    const batch = firebase.firestore().batch();
                    snapshot.docs.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    alert("성공적으로 초기화되었습니다.");

                                        <button onClick={() => setEnlargedCard(null)} className="absolute -top-[10px] -right-[10px] bg-red-500/80 hover:bg-red-500 border border-white/20 text-white rounded-full size-6 flex items-center justify-center backdrop-blur transition-colors z-[100] shadow-xl">
                                            <span className="material-symbols-outlined text-[14px] font-bold leading-none">close</span>
                                        </button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Bottom Controls */}
                    <motion.div
                        className="absolute bottom-8 flex flex-row items-center gap-6 z-50 pb-[env(safe-area-inset-bottom)]"
                        initial={{ opacity: 0, y: 30 }}
                        animate={{ opacity: packState === 'opened' ? 1 : 0, y: packState === 'opened' ? 0 : 30 }}
                        transition={{ delay: 2.5 }}
                    >
                        <button onClick={resetPack} className="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-full font-bold tracking-wide border border-slate-600 transition-all text-sm shadow-xl">
                            다시 뽑기 (테스트)
                        </button>
                        <button onClick={() => window.location.href = "masterpiece-collection.html"} className="px-6 py-2.5 bg-gradient-to-r from-primary to-blue-600 text-white rounded-full font-bold tracking-wide shadow-xl hover:shadow-primary/50 transition-all text-sm">
                            컬렉션 보러가기
                        </button>
                    </motion.div>

                </div>
            )
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MasterpieceGacha />);
    </script>
