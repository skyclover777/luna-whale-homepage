    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Responsive Masonry – using columns for true masonry effect */
        .masonry-grid {
            columns: 2;
            column-gap: 12px;
            width: 100%;
        }

        @media (min-width: 640px) {
            .masonry-grid {
                columns: 3;
            }
        }

        @media (min-width: 1024px) {
            .masonry-grid {
                columns: 4;
            }
        }

        @media (min-width: 1280px) {
            .masonry-grid {
                columns: 5;
            }
        }

        .masonry-item {
            display: block;
            break-inside: avoid;
            margin-bottom: 12px;
            border-radius: 1.5rem;
            overflow: hidden;
        }

        /* Language dropdown */
        #lang-dropdown {
            display: none;
        }

        #lang-dropdown.open {
            display: block;
        }

        /* Sub-category panel */
        #sub-panel {
            display: none;
        }

        #sub-panel.open {
            display: flex;
        }

        /* Card hover */
        .art-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .art-card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
        }

        .card-text-shadow {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* Premium Card Styles */
        .premium-card {
            background-color: transparent !important;
            border-radius: 1.5rem;
            overflow: visible;
            /* Allow glow to bleed out */
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .dark .premium-card {
            background-color: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .premium-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.25);
        }

        .card-bg-blur {
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, var(--color-1, #1337ec) 0%, var(--color-2, #8b5cf6) 100%);
            opacity: 0;
            z-index: -1;
            border-radius: 1.8rem;
            filter: blur(20px);
            transition: opacity 0.4s ease;
        }

        .premium-card:hover .card-bg-blur {
            opacity: 0.15;
        }

        .card-image-container {
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            background: var(--bg-fallback, #f1f5f9);
            border-radius: 1.4rem;
            margin: 0;
            transition: all 0.4s ease;
        }

        .dark .card-image-container {
            background: #1e293b;
        }

        .card-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .premium-card:hover .card-image {
            transform: scale(1.08);
        }

        .card-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.3) 30%, transparent 60%);
            transition: all 0.4s ease;
        }

        .glass-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Level Badge */
        .level-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px 3px 5px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            line-height: 1;
        }
        .level-badge .lv-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
        }
        /* Lv 0.5 - 연분홍 (Baby) */
        .level-badge.lv-05 { background: rgba(255,182,193,0.85); color: #9b1b5c; border: 1px solid rgba(255,105,135,0.3); }
        .level-badge.lv-05 .lv-icon { background: linear-gradient(135deg,#ff6b8a,#ff85a2); }
        /* Lv 1 - 초록 (Easy) */
        .level-badge.lv-1 { background: rgba(167,243,208,0.85); color: #065f46; border: 1px solid rgba(16,185,129,0.3); }
        .level-badge.lv-1 .lv-icon { background: linear-gradient(135deg,#10b981,#34d399); }
        /* Lv 2 - 파랑 (Medium) */
        .level-badge.lv-2 { background: rgba(191,219,254,0.85); color: #1e40af; border: 1px solid rgba(59,130,246,0.3); }
        .level-badge.lv-2 .lv-icon { background: linear-gradient(135deg,#3b82f6,#60a5fa); }
        /* Lv 3 - 보라 (Hard) */
        .level-badge.lv-3 { background: rgba(221,214,254,0.85); color: #5b21b6; border: 1px solid rgba(139,92,246,0.3); }
        .level-badge.lv-3 .lv-icon { background: linear-gradient(135deg,#8b5cf6,#a78bfa); }

        .status-badge {
            animation: pulse-soft 2s infinite;
        }

        @keyframes pulse-soft {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }



        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Monthly Navigator Styles */
        .month-card {
            flex: 0 0 140px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .month-card:hover {
            transform: translateY(-4px);
        }

        .month-card.active {
            border-color: #1337ec;
            background: rgba(19, 55, 236, 0.05);
        }
    </style>
</head>

        // --- Firestore Integration ---
        async function fetchClassesFromFirestore() {
            const grid = document.getElementById('masonry-grid');
            if (!grid) return;

            // Show Skeleton UI only if NOT in home view
            const isHome = (currentCat === 'all' && currentSubTag === null);
            if (!isHome) {
                grid.innerHTML = Array(6).fill(0).map(() => `
                    <div class="animate-pulse bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-sm h-[400px]">
                        <div class="bg-slate-200 dark:bg-slate-800 h-1/2"></div>
                        <div class="p-6 space-y-4">
                            <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-1/4"></div>
                            <div class="h-6 bg-slate-200 dark:bg-slate-800 rounded w-3/4"></div>
                            <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-full"></div>
                        </div>
                    </div>
                `).join('');
            }

            const useFallback = () => {
                console.warn("Classes: Using local fallback data.");
                if (typeof CLASSES_DATA !== 'undefined') {
                    window.CURRENT_CLASSES = CLASSES_DATA;
                    renderGallery(true);
                } else {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">Failed to load classes. Please try again later.</div>`;
                }
            };

            if (!window.LunaAuth || !window.LunaAuth.getDb) {
                console.warn("LunaAuth not ready, waiting...");
                setTimeout(fetchClassesFromFirestore, 500);
                return;
            }

            try {
                const db = LunaAuth.getDb();
                const snapshot = await db.collection('classes').orderBy('createdAt', 'desc').get();

                if (snapshot.empty) {
                    console.log("Classes: Firestore collection is empty.");
                    useFallback();
                    return;
                }

                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                window.CURRENT_CLASSES = data;

                // Unify: Use the full fully-featured renderGallery instead of a separate redundant renderClasses
                renderGallery(true);
            } catch (error) {
                console.error("Error fetching classes from Firestore:", error);
                useFallback();
            }
        }

        function trackAEClick(tag) {
            if (!tag) return;
            let logs = JSON.parse(localStorage.getItem('ae_click_logs') || '{}');
            logs[tag] = (logs[tag] || 0) + 1;
            localStorage.setItem('ae_click_logs', JSON.stringify(logs));
        }

        function getWeightedSortedData(data) {
            let logs = JSON.parse(localStorage.getItem('ae_click_logs') || '{}');
            let maxClicks = 0;
            let favTag = null;
            for (const t in logs) {
                if (logs[t] > maxClicks) {
                    maxClicks = logs[t];
                    favTag = t;
                }
            }
            if (!favTag) return data.sort(() => Math.random() - 0.5);

            const favs = data.filter(item => item.tags && item.tags.includes(favTag));
            const others = data.filter(item => !item.tags || !item.tags.includes(favTag));

            let result = [];
            const total = data.length;
            const favCopy = [...favs].sort(() => Math.random() - 0.5);
            const othersCopy = [...others].sort(() => Math.random() - 0.5);

            for (let i = 0; i < total; i++) {
                if (Math.random() < 0.6 && favCopy.length > 0) {
                    result.push(favCopy.shift());
                } else if (othersCopy.length > 0) {
                    result.push(othersCopy.shift());
                } else if (favCopy.length > 0) {
                    result.push(favCopy.shift());
                }
            }
            return result;
        }

        // Add specialized rendering logic inside renderGallery or as a separate call
        function renderGallery(reset = true) {
            const grid = document.getElementById('masonry-grid');
            const monthlyNav = document.getElementById('monthly-navigator');
            const homeView = document.getElementById('classes-home-view');
            const filterPills = document.querySelector('.cat-pill') ? document.querySelector('.cat-pill').parentElement : null;
            const subPanel = document.getElementById('sub-panel');

            // --- Home View Protection ---
            // If we are in the "All" category with no specific sub-tag selected, show Home Screen.
            const isHome = (currentCat === 'all' && currentSubTag === null);

            if (isHome) {
                if (homeView) homeView.classList.remove('hidden');
                if (grid) {
                    grid.classList.add('hidden');
                    if (reset) grid.innerHTML = '';
                }
                if (monthlyNav) monthlyNav.classList.add('hidden');
                if (filterPills) filterPills.classList.add('hidden'); // This is #category-filter-bar
                if (subPanel) {
                    subPanel.classList.add('hidden');
                    subPanel.classList.remove('open');
                }
                itemsRendered = 0;
                return;
            } else {
                if (homeView) homeView.classList.add('hidden');
                if (grid) grid.classList.remove('hidden');
                if (filterPills) filterPills.classList.remove('hidden');

                // Sub-panel visibility controlled by reset/data phase
                if (subPanel) {
                    const hasSubCats = (SUB_CATS[currentCat] && SUB_CATS[currentCat].length > 0);
                    if (hasSubCats) {
                        subPanel.classList.remove('hidden');
                        subPanel.classList.add('open');
                    } else {
                        subPanel.classList.add('hidden');
                        subPanel.classList.remove('open');
                    }
                }

                // Monthly navigator visibility
                if (monthlyNav) {
                    if (currentSubTag === 'Monthly') {
                        monthlyNav.classList.remove('hidden');
                        monthlyNav.style.display = 'block';
                    } else {
                        monthlyNav.classList.add('hidden');
                        monthlyNav.style.display = 'none';
                    }
                }
            }

            if (reset) {
                itemsRendered = 0;
                grid.innerHTML = '';
                grid.className = "masonry-grid"; // Reset to default grid layout

                // Initial Data Filtering
                let baseItems = window.CURRENT_CLASSES ? [...window.CURRENT_CLASSES] : [...CLASSES_DATA];
                if (currentCat === 'artists-eye') {
                    const artistItems = (typeof LW_ARTISTS !== 'undefined' ? LW_ARTISTS : []).map(artist => ({
                        ...artist,
                        category: 'artists-eye',
                        subCategory: 'ArtistsEye',
                        isArtist: true
                    }));
                    baseItems = [...baseItems, ...artistItems];
                }

                baseItems = baseItems.filter(item => {
                    const catMatch = (currentCat === 'all' || item.category === currentCat || (currentCat === 'artists-eye' && item.subCategory === 'ArtistsEye'));
                    const subMatch = (!currentSubTag || item.subCategory === currentSubTag || (currentCat === 'artists-eye' && item.tags && item.tags.includes(currentSubTag)));
                    const monthMatch = (currentMonthId && currentSubTag === 'Monthly') ? item.month === currentMonthId : true;
                    return catMatch && subMatch && monthMatch;
                });

                if (currentCat === 'artists-eye') {
                    filteredItems = getWeightedSortedData(baseItems);
                } else {
                    filteredItems = baseItems;
                }
            }

            if (itemsRendered >= filteredItems.length && itemsRendered > 0) return;

            // Empty state handling
            if (filteredItems.length === 0 && reset) {
                grid.innerHTML = `
                        <span class="material-symbols-outlined text-6xl mb-4 text-slate-200">sentiment_dissatisfied</span>
                        <p class="text-sm font-medium" data-i18n="no_classes_found">현재 필터 조건에 해당하는 클래스가 없습니다.</p>

                        const artist = getArtistInfo(item.artistId);
                        if (artist) {
                            artistHtml = `<span class="text-slate-500 text-[10px] font-medium">${artist.title_ko}</span>`;
                        }
                    } else if (item.author) {
                        artistHtml = `<span class="text-slate-500 text-[10px] font-medium">${item.author}</span>`;
                    }

                    let bottomBadge = '';
                    if (item.subCategory === 'Monthly') {
                        bottomBadge = `<span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full" data-i18n="sub_monthly">Monthly</span>`;
                    } else if (item.subCategory === 'Free') {
                        bottomBadge = `<span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full" data-i18n="sub_free">Free</span>`;
                    } else if (item.subCategory === 'Special') {
                        bottomBadge = `<span class="text-[10px] font-bold text-accent-purple bg-accent-purple/10 px-2 py-0.5 rounded-full" data-i18n="sub_special">Special</span>`;
                    } else if (item.price) {
                        bottomBadge = `<span class="text-[10px] font-bold text-slate-500">${item.price}</span>`;
                    } else {
                        bottomBadge = `<span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full" data-i18n="sub_premium">Premium</span>`;
                    }

                    let lessonsCountHtml = '';
                    if (item.lessonsCount) {
                        lessonsCountHtml = `
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-slate-400 text-[14px]">schedule</span>
                            <span class="text-[10px] text-slate-500">${item.lessonsCount} <span data-i18n="class_lessons">Lessons</span></span>
                        </div>
                    `;
                    } else if (artistHtml) {
                        lessonsCountHtml = artistHtml;
                    }

                    // Level badge
                    const lvNum = item.level;
                    let lvBadgeHtml = '';
                    if (lvNum !== undefined && lvNum !== null) {
                        const lvClass = lvNum == 0.5 ? 'lv-05' : `lv-${lvNum}`;
                        const lvLabel = lvNum == 0.5 ? '0.5' : lvNum;
                        const lvAge = lvNum == 0.5 ? '4-5' : lvNum == 1 ? '5-7' : lvNum == 2 ? '8-10' : '11-13';
                        lvBadgeHtml = `<div class="level-badge ${lvClass}"><span class="lv-icon">${lvLabel}</span>Lv.${lvLabel} · ${lvAge}세</div>`;
                    }

                    card.innerHTML = `
                        <div class="feed-card bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700/50 h-full flex flex-col group-hover:shadow-md transition-all duration-300">
                            <div class="relative w-full aspect-video overflow-hidden bg-slate-100 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800">
                                ${displayImg ? `<img data-src="${displayImg}" class="card-image lazy-load-img w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Class Image">` : ''}
                                ${item.youtubeId ? `<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><span class="material-symbols-outlined text-white text-4xl drop-shadow-md">play_circle</span></div>` : ''}
                                ${lvBadgeHtml}
                            </div>
                            <div class="p-3.5 flex flex-col flex-1">
                                ${tagHtml}
                                ${titleHtml}
                                <div class="mt-auto pt-3 flex items-center justify-between">
                                    ${lessonsCountHtml}
                                    ${bottomBadge}
                                </div>
                            </div>
                        </div>
                    `;
                }
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
            itemsRendered += chunk.length;
            if (window.lwApplyLang) lwApplyLang();
            LunaApp.utils.lazyLoad('.lazy-load-img');
        }

        function renderMobileSwipe(items) {
            const grid = document.getElementById('masonry-grid');
            grid.innerHTML = '';
            grid.className = "flex flex-col gap-0 h-[calc(100vh-120px)] overflow-y-scroll snap-y snap-mandatory hide-scrollbar";

            items.forEach(item => {
                const section = document.createElement('div');
                section.className = "w-full h-full flex-none snap-start relative bg-black overflow-hidden";

                let finalLink = item.lessonLink;
                if (finalLink && !finalLink.startsWith('http')) {
                    if (finalLink.startsWith('lesson-') && !finalLink.includes('lesson-viewer.html')) {
                        finalLink = `../lessons/${finalLink}`;
                    }
                }

                // Access control for mobile swipe
                const isPurchased = window.LunaApp && LunaApp.hasAccessToClass(item.id);
                let btnLabel = 'View Class';
                let btnIcon = 'arrow_forward';

                if (!isPurchased) {
                    finalLink = 'payment.html';
                    btnLabel = 'Purchase to View';
                    btnIcon = 'shopping_cart';
                }

                section.innerHTML = `
                        < iframe src = "https://www.youtube.com/embed/${item.youtubeId}?rel=0&modestbranding=1" class="w-full h-full" frameborder = "0" allow = "encrypted-media" allowfullscreen ></iframe >
                            <div class="absolute bottom-10 left-6 right-16 p-6 pointer-events-none">
                                <span class="text-primary text-[10px] uppercase font-black tracking-widest mb-1 shadow-sm" data-i18n="${item.tagKey}"></span>
                                <h3 class="text-white font-bold text-lg mb-2 drop-shadow-lg">${item.title}</h3>
                                <p class="text-white/80 text-sm mb-4 drop-shadow-md">@${item.author}</p>
                                <a href="${finalLink}" class="pointer-events-auto inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary text-white text-xs font-black uppercase shadow-lg shadow-primary/30">
                                    ${btnLabel} <span class="material-symbols-outlined text-sm">${btnIcon}</span>
                                </a>
                            </div>
                    `;
                section.onclick = () => trackAEClick(item.tags ? item.tags[0] : null);
                grid.appendChild(section);
            });
            if (window.lwApplyLang) lwApplyLang();
        }

        // Infinite scroll observer
        window.addEventListener('scroll', () => {
            const isHome = (currentCat === 'all' && currentSubTag === null);
            if (isHome) return; // Don't trigger infinite scroll on Home Screen

            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                renderGallery(false);
            }
        });


        document.addEventListener('DOMContentLoaded', function () {
            if (window.lwRenderLangPicker) {
                lwRenderLangPicker('lang-dropdown');
            }

            // Load artists data
            loadArtistsData();

            const hash = window.location.hash.substring(1);
            if (hash === 'artists-eye') {
                currentCat = 'artists-eye';
            } else if (hash && ['Free', 'Monthly', 'Special', 'Masterpiece', 'KidsMasterpiece'].includes(hash)) {
                currentSubTag = hash;
            }

            renderFilterBar();
            renderSubPanel(currentCat);
            renderMonthlyNavigator();
            renderGallery();

            // Ensure sub-panel and filter bar are hidden on home view after initial render
            const isHomeInit = (currentCat === 'all' && currentSubTag === null);
            if (isHomeInit) {
                const sp = document.getElementById('sub-panel');
                const fb = document.getElementById('category-filter-bar');
                if (sp) { sp.classList.add('hidden'); sp.classList.remove('open'); }
                if (fb) fb.classList.add('hidden');
            }

        });

        function filterSubFromSidebar(el, tag) {
            document.querySelectorAll('.submenu-item').forEach(item => item.classList.remove('active'));
            if (el) el.classList.add('active');

            // Force main category to 'all' and update pills visually
            currentCat = 'all';
            renderFilterBar();
            document.querySelectorAll('.cat-pill').forEach(p => {
                p.classList.remove('bg-primary', 'text-white', 'shadow-md', 'shadow-primary/20');
                p.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-600');
                if (p.getAttribute('data-i18n') === 'cat_all') {
                    p.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-600');
                    p.classList.add('bg-primary', 'text-white', 'shadow-md', 'shadow-primary/20');
                }
            });

            currentSubTag = tag;
            renderGallery();
            renderSubPanel(currentCat);
        }

        // New function to reset to Classes Home
        LunaApp.resetClassesHome = function () {
            console.log('LUNA_DEBUG: resetClassesHome called');
            currentCat = 'all';
            currentSubTag = null;
            currentMonthId = null;

            // UI Visibility: Show home, hide gallery/filter
            const homeView = document.getElementById('classes-home-view');
            const grid = document.getElementById('masonry-grid');
            const filterBar = document.getElementById('category-filter-bar');
            if (homeView) homeView.classList.remove('hidden');
            if (grid) grid.classList.add('hidden');
            if (filterBar) filterBar.classList.add('hidden');

            // Reset Submenu active states (though physically removed, logic safety)
            document.querySelectorAll('.submenu-item').forEach(item => item.classList.remove('active'));

            // Re-render UI
            renderSubPanel(currentCat);
            renderGallery();
        }

    </script>
