<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Masterpiece Collection</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a413ec",
                        "navy-deep": "#0a1128",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "mtg": ["Cinzel", "serif"],
                        "sans": ["sans-serif"]
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .watercolor-bg { background: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #050510 100%); background-attachment: fixed; }
            .star-field { opacity: 0.3; }
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0, 0, 0, 0.3); border-radius: 4px; }
        .progress-ring-circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        .legendary-mtg::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 9px;
            background: linear-gradient(125deg, rgba(255,0,0,0.3) 0%, rgba(255,255,0,0.3) 20%, rgba(0,255,0,0.3) 40%, rgba(0,255,255,0.3) 60%, rgba(0,0,255,0.3) 80%, rgba(255,0,255,0.3) 100%);
            background-size: 200% 200%; mix-blend-mode: color-dodge; pointer-events: none; z-index: 30;
        }
        .legendary-mtg::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 9px;
            background: linear-gradient(125deg, rgba(255,0,0,0.3) 0%, rgba(255,255,0,0.3) 20%, rgba(0,255,0,0.3) 40%, rgba(0,255,255,0.3) 60%, rgba(0,0,255,0.3) 80%, rgba(255,0,255,0.3) 100%);
            background-size: 200% 200%; mix-blend-mode: color-dodge; pointer-events: none; z-index: 30;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../assets/js/luna-nav.js"></script>
</head>

<body class="bg-[#050510] font-sans text-slate-100 min-h-screen watercolor-bg">
    <div
        class="star-field fixed inset-0 pointer-events-none z-0 border-t border-white/5 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
    </div>
    <div id="root" class="relative z-10 flex h-full min-h-screen w-full flex-col overflow-x-hidden"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence, useMotionValue, useSpring, useTransform } from 'framer-motion';

        const rarityMap = {
            'Legendary': { class: 'mtg-card-legendary', icon: 'workspace_premium', color: 'text-orange-400', val: 5000, res: 3200 },
            'Epic': { class: 'mtg-card-epic', icon: 'diamond', color: 'text-primary', val: 2200, res: 1500 },
            'Rare': { class: 'mtg-card-rare', icon: 'pentagon', color: 'text-blue-400', val: 1850, res: 1200 },
            'Common': { class: 'mtg-card-common', icon: 'circle', color: 'text-slate-400', val: 600, res: 400 }
        };
        const rarityOrder = { 'Legendary': 1, 'Epic': 2, 'Rare': 3, 'Common': 4 };

        const CardItem = ({ card, count, onClick, isEnlarged = false }) => {
            const cardRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const mouseXSpring = useSpring(x, { stiffness: 150, damping: 20 });
            const mouseYSpring = useSpring(y, { stiffness: 150, damping: 20 });

            const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["5deg", "-5deg"]);
            const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-5deg", "5deg"]);

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const xPct = (e.clientX - rect.left) / rect.width - 0.5;
                const yPct = (e.clientY - rect.top) / rect.height - 0.5;
                x.set(xPct); y.set(yPct);
            };

            const isLegendary = card.rarity === 'Legendary';
            const isArtist = card.id && card.id.startsWith('art100_');
            const masterpieces = card.masterpieces || [];

            if (!isArtist) {
                // Keep original vertical style for non-artist cards (IMPR)
                return (
                    <div onClick={onClick} className="flex justify-center relative cursor-pointer w-full items-center">
                        <motion.div className="relative w-full aspect-[2.5/3.5] max-w-[220px] perspective-1000 origin-center">
                            <motion.div ref={cardRef} style={{ rotateX, rotateY }} onMouseMove={handleMouseMove} onMouseLeave={() => { x.set(0); y.set(0); }} className="w-full h-full relative preserve-3d transition-transform hover:scale-105 hover:z-50">
                                <div className={`absolute inset-0 rounded-[12px] bg-zinc-800 border-[8px] border-zinc-900 box-border overflow-hidden flex flex-col p-[6px] shadow-xl ${isLegendary ? 'legendary-mtg' : ''}`}>
                                    <div className="h-[28px] shrink-0 bg-gradient-to-r from-[#dcd1c4] to-[#c9bcae] rounded-t-[6px] rounded-b-[2px] border-[2px] border-zinc-900 px-[6px] flex justify-between items-center z-40 relative pt-[2px]">
                                        <div className="flex flex-col flex-1 min-w-0 pr-2">
                                            <span className="text-[10px] font-bold text-zinc-900 leading-[1.1] tracking-tight font-mtg truncate">{card.title_ko || card.title}</span>
                                            <span className="text-[6px] text-zinc-600 leading-none truncate">{card.title_en || card.title}</span>
                                        </div>
                                        <div className="flex-shrink-0 flex items-center">
                                            {isLegendary && <span className="material-symbols-outlined text-[14px] text-yellow-600">stars</span>}
                                            {card.rarity === 'Epic' && <span className="material-symbols-outlined text-[14px] text-purple-600">diamond</span>}
                                            {card.rarity === 'Rare' && <span className="material-symbols-outlined text-[14px] text-blue-600">pentagon</span>}
                                            {card.rarity === 'Common' && <span className="material-symbols-outlined text-[14px] text-zinc-500">circle</span>}
                                        </div>
                                    </div>
                                    <div className={`mt-[4px] shrink-0 relative border-[2px] border-zinc-900 bg-zinc-950 aspect-[4/3] w-full overflow-hidden flex items-center justify-center z-40`}>
                                        <div className="absolute inset-0 bg-center bg-cover blur-[8px] scale-110 opacity-70 pointer-events-none" style={{ backgroundImage: `url(${card.img_thumb || card.url})` }}></div>
                                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                            <img src={card.img_thumb || card.url} alt={card.title} className="w-full h-full object-contain drop-shadow-2xl" draggable="false" />
                                        </div>
                                    </div>
                                    <div className="mt-[4px] h-[20px] shrink-0 bg-gradient-to-r from-[#dcd1c4] to-[#c9bcae] rounded-[2px] border-[2px] border-zinc-900 px-[4px] flex justify-between items-center z-40 relative">
                                        <span className="text-[10px] font-bold text-zinc-900 truncate font-sans">{card.artist_ko || card.artist}</span>
                                        <span className="text-[8px] font-semibold text-zinc-700 whitespace-nowrap ml-1 font-sans">{card.era_ko || card.era}</span>
                                    </div>
                                    <div className="mt-[4px] flex-1 bg-[#dcd1c4]/95 rounded-[2px] border-[2px] border-zinc-900 p-[4px] overflow-y-auto scroll-smooth custom-scrollbar flex flex-col pointer-events-auto z-40 relative">
                                        <p className="text-[8px] leading-[1.3] text-zinc-900 font-sans">{card.desc_ko || card.desc}</p>
                                    </div>
                                    <div className="h-[12px] shrink-0 flex justify-between items-end px-[2px] mt-[4px] z-40 relative">
                                        <span className="text-[10px] font-bold text-white tracking-widest leading-none drop-shadow-md font-sans">{card.year || '19c'}</span>
                                        <span className="text-[8px] text-white/70 font-mono leading-none">{card.id}</span>
                                    </div>
                                </div>
                            </motion.div>
                            {count !== 1 && (
                                <div className="absolute -top-3 -right-3 bg-primary text-white rounded-full size-7 flex items-center justify-center font-bold text-[12px] shadow-lg border border-white/20 z-50">{count}</div>
                            )}
                        </motion.div>
                    </div>
                );
            }

            // Landscape Artist Card Redesign
            return (
                <div onClick={onClick} className="flex justify-center relative cursor-pointer w-full items-center">
                    <motion.div className="relative w-full aspect-[2.8/1.8] min-h-[140px] perspective-1000 origin-center">
                        <motion.div ref={cardRef} style={{ rotateX, rotateY }} onMouseMove={handleMouseMove} onMouseLeave={() => { x.set(0); y.set(0); }} className="w-full h-full relative preserve-3d transition-transform hover:scale-[1.03] hover:z-50">
                            <div className={`absolute inset-0 rounded-[16px] bg-[#1a1a1a] border-[1px] border-white/10 box-border overflow-hidden flex shadow-2xl ${isLegendary ? 'after:content-[""] after:absolute after:inset-0 after:bg-gradient-to-br after:from-yellow-500/10 after:to-transparent after:pointer-events-none' : ''}`}>
                                {/* Left Side: Artist Portrait */}
                                <div className="w-[38%] h-full relative shrink-0 border-r border-white/5">
                                    <img src={card.img_large || card.url} alt={card.title_ko} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                    <div className="absolute bottom-2 left-2 right-2">
                                        <p className="text-[11px] font-bold text-white leading-tight font-display">{card.title_ko}</p>
                                        <p className="text-[7px] text-white/60 leading-none truncate">{card.title_en}</p>
                                    </div>
                                </div>

                                {/* Right Side: Info & Masterpieces */}
                                <div className="flex-1 flex flex-col p-3 gap-2 overflow-hidden bg-[#0d0d0d]">
                                    <div className="flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <span className="text-[9px] font-bold text-primary tracking-widest uppercase">{card.era_ko}</span>
                                            <span className="text-[7px] text-slate-500 italic leading-none">{card.artist_ko}</span>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            {isLegendary && <span className="material-symbols-outlined text-[12px] text-yellow-500">stars</span>}
                                            <span className={`text-[8px] font-bold uppercase tracking-tighter ${rarityMap[card.rarity].color}`}>{card.rarity}</span>
                                        </div>
                                    </div>

                                    {/* Masterpiece Grid */}
                                    <div className="flex-1 flex flex-col gap-1.5 min-h-0">
                                        <p className="text-[8px] font-bold text-slate-400 border-b border-white/5 pb-0.5">MAJOR WORKS</p>
                                        {masterpieces.length > 0 ? (
                                            <div className="grid grid-cols-2 gap-1.5 h-full content-start">
                                                {masterpieces.slice(0, 2).map((mp, idx) => (
                                                    <div key={idx} className="group relative aspect-video bg-zinc-900 rounded-sm border border-white/5 overflow-hidden">
                                                        <img src={mp.url} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                                                        <div className="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors"></div>
                                                        <div className="absolute bottom-0.5 left-0.5 right-0.5">
                                                            <p className="text-[6px] text-white font-medium leading-none truncate bg-black/40 px-0.5 rounded-sm">{mp.title}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                                {masterpieces.length === 1 && (
                                                    <div className="aspect-video bg-zinc-800/20 rounded-sm border border-dashed border-white/5 flex items-center justify-center">
                                                        <span className="text-[6px] text-slate-600 uppercase tracking-tighter">Seeking archives</span>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="flex-1 bg-white/5 rounded-md p-2 border border-dashed border-white/10 flex flex-col items-center justify-center text-center">
                                                <span className="material-symbols-outlined text-[14px] text-slate-600 mb-0.5">image_not_supported</span>
                                                <p className="text-[7px] text-slate-500 leading-tight">Masterpieces Archive<br />Synchronizing...</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex justify-between items-center pt-1 border-t border-white/5">
                                        <span className="text-[7px] font-mono text-slate-600">{card.id}</span>
                                        <div className="flex gap-1">
                                            <div className="size-1.5 rounded-full bg-blue-500/30"></div>
                                            <div className="size-1.5 rounded-full bg-purple-500/30"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </motion.div>
                        {count !== 1 && (
                            <div className="absolute -top-2 -right-2 bg-primary text-white rounded-full size-6 flex items-center justify-center font-bold text-[10px] shadow-lg border border-white/20 z-50">{count}</div>
                        )}
                    </motion.div>
                </div>
            );
        };

        const CardModal = ({ card, count, onClose }) => {
            if (!card) return null;
            const rarityStyle = rarityMap[card.rarity] || rarityMap['Common'];
            const isArtist = card.id && card.id.startsWith('art100_');
            const masterpieces = card.masterpieces || [];

            return (
                <AnimatePresence>
                    <motion.div
                        initial={{ opacity: 0, backdropFilter: 'blur(0px)' }}
                        animate={{ opacity: 1, backdropFilter: 'blur(16px)' }}
                        exit={{ opacity: 0, backdropFilter: 'blur(0px)' }}
                        className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4"
                        onClick={onClose}
                    >
                        <motion.div
                            initial={{ scale: 0.9, y: 30, opacity: 0 }}
                            animate={{ scale: 1, y: 0, opacity: 1 }}
                            exit={{ scale: 0.9, y: 30, opacity: 0 }}
                            className="relative w-full max-w-[800px] bg-[#0a0a0a] rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col md:flex-row"
                            onClick={(e) => e.stopPropagation()}
                        >
                            {/* Artist Image Section */}
                            <div className="md:w-1/2 aspect-[4/5] md:aspect-auto relative group overflow-hidden">
                                <img src={card.img_large || card.url} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                                <div className="absolute bottom-6 left-6 right-6">
                                    <h2 className="text-3xl font-bold text-white mb-1 font-display leading-tight">{card.title_ko}</h2>
                                    <p className="text-lg text-white/50 font-medium">{card.title_en}</p>
                                </div>
                                <div className="absolute top-4 left-4 flex gap-2">
                                    <span className="bg-black/40 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-white border border-white/10 tracking-widest uppercase">{card.id}</span>
                                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold border border-white/10 tracking-widest uppercase bg-black/40 backdrop-blur ${rarityStyle.color}`}>{card.rarity}</span>
                                </div>
                            </div>

                            {/* Info Section */}
                            <div className="flex-1 p-6 md:p-8 flex flex-col gap-6 overflow-y-auto max-h-[80vh] custom-scrollbar bg-gradient-to-b from-[#0d0d0d] to-[#050505]">
                                <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                    <div>
                                        <p className="text-[10px] font-bold text-primary tracking-[0.2em] uppercase mb-1">Period & Movement</p>
                                        <p className="text-white font-medium text-lg">{card.era_ko} <span className="text-white/30 text-sm ml-2">{card.era_en}</span></p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase mb-1">Lifespan</p>
                                        <p className="text-white font-mono">{card.artist_ko}</p>
                                    </div>
                                </div>

                                <div>
                                    <p className="text-[10px] font-bold text-primary tracking-[0.2em] uppercase mb-2">Biography</p>
                                    <p className="text-slate-300 text-sm leading-relaxed tracking-wide break-keep">{card.desc_ko}</p>
                                </div>

                                {masterpieces.length > 0 && (
                                    <div className="flex flex-col gap-3">
                                        <p className="text-[10px] font-bold text-primary tracking-[0.2em] uppercase">Authenticated Masterpieces</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {masterpieces.map((mp, idx) => (
                                                <div key={idx} className="group relative aspect-video bg-zinc-900 rounded-lg overflow-hidden border border-white/10 shadow-lg">
                                                    <img src={mp.url} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500 scale-105 group-hover:scale-100" />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent translate-y-4 group-hover:translate-y-0 transition-transform"></div>
                                                    <div className="absolute bottom-2 left-2 right-2">
                                                        <p className="text-[10px] text-white font-bold truncate leading-tight">{mp.title}</p>
                                                        <p className="text-[8px] text-white/50 truncate leading-none">{mp.title_en}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="mt-auto pt-6 flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Ownership</span>
                                            <span className="text-xl font-bold text-white">{count} <span className="text-[10px] text-slate-600 ml-1 uppercase">Units</span></span>
                                        </div>
                                    </div>
                                    <button onClick={onClose} className="px-6 py-2 bg-white text-black text-[11px] font-bold uppercase tracking-widest rounded-full hover:bg-slate-200 transition-colors shadow-lg">Close Archive</button>
                                </div>
                            </div>

                            <button onClick={onClose} className="absolute top-4 right-4 bg-black/40 hover:bg-white/10 border border-white/10 text-white rounded-full size-8 flex items-center justify-center backdrop-blur transition-all z-[110] group">
                                <span className="material-symbols-outlined text-[18px] group-hover:rotate-90 transition-transform">close</span>
                            </button>
                        </motion.div>
                    </motion.div>
                </AnimatePresence>
            );
        };

        const CollectionApp = () => {
            const [collectionData, setCollectionData] = useState([]);
            const [selectedCard, setSelectedCard] = useState(null);
            const [filterRarity, setFilterRarity] = useState('All');
            const [filterPack, setFilterPack] = useState('All');
            const [loading, setLoading] = useState(true);
            const [totalPoolSize, setTotalPoolSize] = useState(74);

            useEffect(() => {
                const fetchCards = async () => {
                    const user = firebase.auth().currentUser;
                    if (!user) {
                        return;
                    }

                    try {
                        if (user.email === 'skyclover777@gmail.com') {
                            const [impRes, artRes] = await Promise.all([
                                fetch('../../data/cards/impressionism.json'),
                                fetch('../../data/cards/100_artists.json')
                            ]);
                            const impCards = await impRes.json();
                            const artCards = await artRes.json();
                            const allCards = [...impCards, ...artCards];
                            setTotalPoolSize(allCards.length);

                            const grouped = {};
                            allCards.forEach(card => {
                                grouped[card.id] = { card: card, count: "ALL" };
                            });

                            const sorted = Object.values(grouped).sort((a, b) => {
                                const rarityDiff = (rarityOrder[a.card.rarity] || 99) - (rarityOrder[b.card.rarity] || 99);
                                if (rarityDiff !== 0) return rarityDiff;
                                return (a.card.id || "").localeCompare((b.card.id || ""));
                            });

                            setCollectionData(sorted);
                            return;
                        }

                        const snapshot = await firebase.firestore().collection('users').doc(user.uid).collection('cards').get();

                        if (!snapshot.empty) {
                            const grouped = {};
                            snapshot.docs.forEach(doc => {
                                const card = doc.data();
                                if (!grouped[card.id]) {
                                    grouped[card.id] = { card: card, count: 0 };
                                }
                                grouped[card.id].count += 1;
                            });

                            const sorted = Object.values(grouped).sort((a, b) => {
                                const rarityDiff = (rarityOrder[a.card.rarity] || 99) - (rarityOrder[b.card.rarity] || 99);
                                if (rarityDiff !== 0) return rarityDiff;
                                return (a.card.id || "").localeCompare((b.card.id || ""));
                            });

                            setCollectionData(sorted);
                        } else {
                            setCollectionData([]);
                        }
                    } catch (err) {
                        console.error("Error fetching cards:", err);
                    } finally {
                        setLoading(false);
                    }
                };

                const unsubscribe = firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        fetchCards();
                    } else {
                        setLoading(false);
                    }
                });

                return () => unsubscribe();
            }, []);

            const totalCards = collectionData.length;

            const filteredData = useMemo(() => {
                let data = collectionData;
                if (filterPack === 'impressionism') {
                    data = data.filter(item => item.card.id && item.card.id.startsWith('impr_'));
                } else if (filterPack === '100artists') {
                    data = data.filter(item => item.card.id && item.card.id.startsWith('art100_'));
                }
                if (filterRarity !== 'All') {
                    data = data.filter(item => item.card.rarity === filterRarity);
                }
                return data;
            }, [collectionData, filterRarity, filterPack]);

            const collectionRate = Math.min(100, Math.round((totalCards / totalPoolSize) * 100));
            const dashoffset = 251.2 - (251.2 * collectionRate / 100);

            return (
                <div className="flex h-full flex-col">
