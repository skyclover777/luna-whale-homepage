<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Lexend:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#e8f0fe;
  --card-bg:#fff;
  --text:#1a1a2e;
  --sub:#666;
  --accent:#4f46e5;
  --gemini:#8b5cf6;
  --groq:#10b981;
  --mistral:#3b82f6;
  --claude:#d97706;
  --chatgpt:#ef4444;
  --cohere:#06b6d4;
  --openrouter:#f97316;
}
body{
  font-family:'Jua','Lexend',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
}

/* ─── Hero / AI Characters Section ─── */
.hero{
  position:relative;
  background:linear-gradient(180deg,#1a1a3e 0%,#2d1b69 40%,#4c1d95 70%,#7c3aed 100%);
  padding:2rem 1rem 3rem;
  text-align:center;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle 300px at 20% 60%,rgba(139,92,246,0.3),transparent),
    radial-gradient(circle 200px at 80% 30%,rgba(16,185,129,0.2),transparent),
    radial-gradient(circle 250px at 50% 80%,rgba(59,130,246,0.2),transparent);
  pointer-events:none;
}
/* Stars */
.hero::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,#fff,transparent),
    radial-gradient(1px 1px at 30% 50%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 50% 15%,#fff,transparent),
    radial-gradient(1px 1px at 70% 40%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 85% 25%,#fff,transparent),
    radial-gradient(1px 1px at 15% 70%,#fff,transparent),
    radial-gradient(1px 1px at 60% 65%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 90% 60%,#fff,transparent),
    radial-gradient(1px 1px at 40% 80%,#fff,transparent),
    radial-gradient(1px 1px at 75% 75%,#fff,transparent);
  opacity:0.6;pointer-events:none;
  animation:twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:0.4}100%{opacity:0.8}}

.hero-title{
  font-size:1.6rem;color:#fff;margin-bottom:0.5rem;
  text-shadow:0 2px 20px rgba(139,92,246,0.5);
  position:relative;z-index:1;
}
.hero-sub{
  font-size:0.85rem;color:rgba(255,255,255,0.7);
  margin-bottom:1.5rem;position:relative;z-index:1;
}

/* Characters - horizontal scroll */
.characters-scroll{
  position:relative;z-index:2;
  margin-bottom:1.5rem;
  overflow-x:auto;overflow-y:visible;
  -ms-overflow-style:none;scrollbar-width:none;
  padding:0 1rem 8px;
}
.characters-scroll::-webkit-scrollbar{display:none}
.characters{
  display:flex;align-items:flex-end;
  gap:0.8rem;
  justify-content:center;
  min-width:min-content;
}
.char-wrap{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform 0.3s;
  flex-shrink:0;
}
.char-wrap:hover{transform:none}
.char-wrap:active{transform:scale(0.95)}
.char-wrap.inactive{opacity:0.4;filter:grayscale(0.8)}
.char-wrap.inactive:hover{opacity:0.7;filter:grayscale(0.3)}
.char-img{
  width:80px;height:80px;object-fit:contain;
  filter:drop-shadow(0 4px 15px rgba(0,0,0,0.4));
  /* float/hover 애니 제거 — 머리 잘림 방지 */
}
.char-name{
  font-size:0.65rem;color:#fff;
  background:rgba(0,0,0,0.4);
  padding:2px 8px;border-radius:20px;
  margin-top:4px;backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  white-space:nowrap;
}
.char-name.gemini{border-color:var(--gemini)}
.char-name.groq{border-color:var(--groq)}
.char-name.mistral{border-color:var(--mistral)}

/* Speech Bubbles — displayed in a row above all characters */
.speech-area{display:none}
.char-wrap{position:relative}
.bubbles-row{
  position:relative;z-index:10;
  display:flex;gap:12px;justify-content:center;
  margin-bottom:12px;min-height:0;
  padding:0 1rem;
  flex-wrap:wrap;
  transition:min-height 0.3s;
}
.bubbles-row.has-answers{min-height:120px}
.char-bubble{
  background:rgba(255,255,255,0.95);
  color:#333;border-radius:14px;
  padding:10px 14px;font-size:0.8rem;
  width:200px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  animation:popIn 0.3s ease;
  line-height:1.5;
  font-family:'Lexend',sans-serif;
  display:none;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
}
.char-bubble.active{display:block}
.char-bubble.greeting{
  width:180px;font-family:'Jua',sans-serif;
  font-size:0.85rem;text-align:center;
  position:absolute;
  bottom:calc(100% + 10px);
  left:50%;transform:translateX(-50%);
  z-index:15;
}
.char-bubble.greeting::after{
  content:'';position:absolute;bottom:-8px;
  left:50%;transform:translateX(-50%);
  border:8px solid transparent;
  border-top-color:rgba(255,255,255,0.95);
}
.char-bubble.loading{
  color:#aaa;font-style:italic;
}
.char-bubble.answered{
  border:2px solid transparent;
  border-left:3px solid var(--accent);
}
.char-bubble.answered:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
.char-bubble.selected{
  background:linear-gradient(135deg,#f0e6ff,#e0f0ff);
  border-color:rgba(139,92,246,0.4);
  width:320px;
  max-height:400px;
  overflow-y:auto;
  z-index:20;
}
.char-bubble .bubble-name{
  font-weight:700;font-size:0.75rem;
  margin-bottom:4px;
  font-family:'Jua',sans-serif;
  display:flex;align-items:center;gap:6px;
}
.char-bubble .bubble-name img{
  width:24px;height:24px;object-fit:contain;
}
.bubble-copy{
  margin-left:auto;background:none;border:none;
  cursor:pointer;padding:2px;border-radius:6px;
  color:#aaa;transition:all 0.2s;display:flex;
  align-items:center;justify-content:center;
}
.bubble-copy:hover{color:#666;background:rgba(0,0,0,0.06)}
.bubble-copy .material-symbols-outlined{font-size:16px}
.bubble-copy.copied{color:#10b981}
.char-bubble .bubble-text{
  font-size:0.78rem;line-height:1.6;
}
.char-bubble .bubble-preview{display:block}
.char-bubble .bubble-full{display:none}
.char-bubble.selected .bubble-preview{display:none}
.char-bubble.selected .bubble-full{display:block}
.char-bubble .bubble-hint{
  font-size:0.65rem;color:#aaa;
  text-align:center;margin-top:6px;
}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

/* Question Input */
.question-box{
  position:relative;z-index:2;
  max-width:500px;margin:0 auto;
  display:flex;gap:8px;
}
.question-input{
  flex:1;padding:12px 16px;border:none;border-radius:30px;
  font-size:0.9rem;font-family:'Jua',sans-serif;
  background:rgba(255,255,255,0.95);
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  outline:none;
}
.question-input::placeholder{color:#aaa}
.question-input:focus{box-shadow:0 4px 25px rgba(139,92,246,0.4)}
.send-btn{
  width:46px;height:46px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--gemini),var(--mistral));
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(139,92,246,0.4);
  transition:transform 0.2s;
}
.send-btn:hover{transform:scale(1.1)}
.send-btn:active{transform:scale(0.95)}

/* AI Answers — now handled by char-bubble above each character */
/* + Add button */
.char-add{
  width:80px;height:80px;
  border-radius:50%;
  border:3px dashed rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;
  background:rgba(255,255,255,0.08);
  flex-shrink:0;
}
.char-add:hover{
  border-color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.15);
  transform:scale(1.08);
}
.char-add .material-symbols-outlined{
  font-size:32px;color:rgba(255,255,255,0.5);
}
/* (answer-text/expand moved to char-bubble) */

/* ─── Game Categories ─── */
.games-section{
  padding:1.5rem 1rem 6rem;
  max-width:1200px;margin:0 auto;
}
.category-tabs{
  display:flex;gap:8px;overflow-x:auto;
  padding-bottom:8px;margin-bottom:1.5rem;
  -ms-overflow-style:none;scrollbar-width:none;
}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;
  padding:8px 18px;border-radius:25px;
  border:2px solid #ddd;background:#fff;
  font-size:0.85rem;font-family:'Jua',sans-serif;
  cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
  color:#666;
}
.cat-tab:hover{border-color:var(--accent);color:var(--accent)}
.cat-tab.active{
  background:var(--accent);color:#fff;
  border-color:var(--accent);
  box-shadow:0 4px 15px rgba(79,70,229,0.3);
}

/* Game Cards Grid */
.games-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media(min-width:640px){.games-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.games-grid{grid-template-columns:repeat(4,1fr)}}

.game-card{
  position:relative;
  border-radius:16px;overflow:hidden;
  background:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
  cursor:pointer;transition:all 0.3s;
  border:2px solid transparent;
}
.game-card:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
  border-color:var(--accent);
}
.game-card:active{transform:scale(0.97)}
.game-thumb{
  width:100%;aspect-ratio:4/3;
  object-fit:contain;display:block;
  background:linear-gradient(135deg,#e0e7ff,#dbeafe);
  padding:20%;
}
.game-info{padding:10px 12px}
.game-title{font-size:0.85rem;margin-bottom:4px;line-height:1.3}
.game-desc{font-size:0.7rem;color:var(--sub);line-height:1.4}
.game-age{
  position:absolute;top:8px;right:8px;
  font-size:0.6rem;padding:2px 8px;
  border-radius:10px;
  background:rgba(0,0,0,0.6);color:#fff;
  backdrop-filter:blur(4px);
}
.game-icon{display:none}

/* ─── API Key Setup Modal ─── */
.key-modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  padding:1rem;
}
.key-modal-bg.active{display:flex}
.key-modal{
  background:#fff;border-radius:20px;
  max-width:420px;width:100%;
  padding:1.5rem;position:relative;
  animation:slideUp 0.3s ease;
  max-height:90vh;overflow-y:auto;
}
.key-modal-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;border:none;
  background:#f1f1f1;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.key-modal h2{
  font-size:1.2rem;margin-bottom:0.3rem;
  display:flex;align-items:center;gap:8px;
}
.key-modal .key-char-img{width:48px;height:48px;object-fit:contain}
.key-modal .key-subtitle{font-size:0.75rem;color:#888;margin-bottom:1rem}
.key-step{
  background:#f8f9ff;border-radius:12px;
  padding:12px;margin-bottom:10px;
}
.key-step-num{
  display:inline-block;width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#fff;text-align:center;
  font-size:0.7rem;line-height:22px;margin-right:6px;font-weight:700;
}
.key-step p{font-size:0.78rem;color:#444;line-height:1.5;margin:4px 0 0}
.key-step a{
  color:var(--accent);font-weight:700;text-decoration:none;
  word-break:break-all;
}
.key-step a:hover{text-decoration:underline}
.key-input-wrap{
  display:flex;gap:8px;margin-top:1rem;
}
.key-input{
  flex:1;padding:10px 14px;border:2px solid #e0e0e0;
  border-radius:12px;font-size:0.85rem;
  font-family:'Lexend',sans-serif;outline:none;
  transition:border-color 0.2s;
}
.key-input:focus{border-color:var(--accent)}
.key-input.has-key{border-color:#10b981;background:#f0fdf4}
.key-save-btn{
  padding:10px 20px;border:none;border-radius:12px;
  background:var(--accent);color:#fff;
  font-family:'Jua',sans-serif;font-size:0.85rem;
  cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
}
.key-save-btn:hover{background:#4338ca;transform:scale(1.03)}
.key-save-btn:active{transform:scale(0.97)}
.key-notice{
  margin-top:10px;padding:8px 12px;
  background:#fef3c7;border-radius:10px;
  font-size:0.7rem;color:#92400e;line-height:1.5;
  display:flex;align-items:flex-start;gap:6px;
}
.key-notice .material-symbols-outlined{font-size:16px;flex-shrink:0;margin-top:1px}
.key-status{
  margin-top:8px;font-size:0.7rem;
  display:flex;align-items:center;gap:4px;
}
.key-status.connected{color:#10b981}
.key-status.disconnected{color:#ef4444}
.key-status .dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;
}
.key-status.connected .dot{background:#10b981}
.key-status.disconnected .dot{background:#ef4444}
.key-delete-btn{
  background:none;border:none;color:#ef4444;
  font-size:0.7rem;cursor:pointer;margin-left:auto;
  text-decoration:underline;
}

/* Gear icon on character */
.char-gear{
  position:absolute;bottom:22px;right:-4px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0.5;transition:opacity 0.2s;
  cursor:pointer;
}
.char-gear:hover{opacity:1;background:rgba(255,255,255,0.7)}
.char-gear .material-symbols-outlined{font-size:11px;color:rgba(255,255,255,0.9)}
.char-gear.has-key .material-symbols-outlined{color:#10b981}
.char-wrap{position:relative}

/* Detail overlay */
.detail-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  padding:1rem;
}
.detail-overlay.active{display:flex}
.detail-panel{
  background:#fff;border-radius:20px;
  max-width:500px;width:100%;
  max-height:80vh;overflow-y:auto;
  padding:1.5rem;position:relative;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.detail-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;
  border:none;background:#f1f1f1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ─── PC: Split Layout ─── */
/* Right slide panel */
.side-panel{
  display:none; /* hidden on mobile */
}
.panel-toggle{
  display:none; /* hidden on mobile */
}

@media(min-width:1024px){
  body{height:100vh;overflow:hidden}
  .hero{
    min-height:100vh;height:100vh;padding:2rem 2.5rem 2rem;
    display:flex;flex-direction:column;justify-content:center;
    overflow-y:auto;
    transition:margin-right 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .hero.panel-open{margin-left:420px}
  .hero-title{font-size:2.5rem;margin-bottom:0.3rem}
  .hero-sub{font-size:1rem;margin-bottom:2rem}
  .characters{gap:1.5rem}
  .char-img{width:120px;height:120px}
  .char-add{width:120px;height:120px}
  .char-name{font-size:0.8rem;padding:4px 14px}
  .question-box{max-width:650px}
  .answers-grid{flex-direction:row;flex-wrap:wrap}
  .answer-card{flex:1;min-width:200px}
  .games-section{display:none}

  /* Panel toggle — HIDDEN (replaced by arcade button) */
  .panel-toggle{display:none!important}

  /* Side Panel — HIDDEN (replaced by arcade page) */
  .side-panel{display:none!important}
  .side-panel-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:1rem;
  }
  .side-panel-title{
    font-size:1.2rem;font-weight:900;
    display:flex;align-items:center;gap:8px;
  }
  .side-panel .category-tabs{
    margin-bottom:1rem;
  }
  .side-panel .games-grid{
    grid-template-columns:1fr;
    gap:8px;
  }
  .side-panel .game-card{
    border-radius:14px;
    display:flex;align-items:center;
    overflow:hidden;position:relative;
    min-height:80px;
    background:#fff;
    transition:transform 0.3s, box-shadow 0.3s;
  }
  .side-panel .game-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 24px rgba(0,0,0,0.12);
  }
  .side-panel .game-card .game-thumb{
    position:absolute;left:-10px;top:50%;transform:translateY(-50%);
    width:100px;height:100px;padding:0;
    aspect-ratio:1;opacity:1;
    filter:none;
    animation:iconWobble 2.5s ease-in-out infinite;
    transition:filter 0.4s;
  }
  .side-panel .game-card:hover .game-thumb{
    animation:iconWobble 1.2s ease-in-out infinite, iconGoldShimmer 1.5s ease-in-out infinite;
    filter:drop-shadow(0 0 8px rgba(255,200,0,0.6));
  }
  @keyframes iconWobble{
    0%,100%{transform:translateY(-50%) rotate(0deg)}
    25%{transform:translateY(-50%) rotate(3deg)}
    75%{transform:translateY(-50%) rotate(-3deg)}
  }
  @keyframes iconGoldShimmer{
    0%,100%{filter:drop-shadow(0 0 4px rgba(255,200,0,0.3)) brightness(1)}
    50%{filter:drop-shadow(0 0 12px rgba(255,200,0,0.8)) brightness(1.15)}
  }
  .side-panel .game-card .game-info{
    padding:14px 16px 14px 80px;
    position:relative;z-index:1;
    width:100%;
  }
  .side-panel .game-card .game-title{
    font-size:1.1rem;font-weight:900;
    margin-bottom:2px;
  }
  .side-panel .game-card .game-desc{
    font-size:0.85rem;color:#555;
    font-family:'Lexend',sans-serif;
  }
  .side-panel .game-card .game-age{
    font-size:0.75rem;padding:3px 10px;
    top:50%;right:12px;transform:translateY(-50%);
    background:rgba(79,70,229,0.15);color:var(--accent);
    font-weight:700;
  }

  /* Fun particles on hero */
  .hero-particles{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    overflow:hidden;
  }
  .particle{
    position:absolute;
    width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,0.3);
    animation:particleFloat linear infinite;
  }
  @keyframes particleFloat{
    0%{transform:translateY(100vh) scale(0);opacity:0}
    10%{opacity:1}
    90%{opacity:1}
    100%{transform:translateY(-20px) scale(1);opacity:0}
  }
}
</style>
<!-- Arcade Button Styles -->
<style>
.arcade-toggle{
  position:fixed;bottom:28px;left:calc(50% - 140px);z-index:80;
  width:72px;height:72px;border-radius:50%;border:3px solid #ffd700;
  background:linear-gradient(145deg,#2d1b69,#1a1a3e);
  box-shadow:
    0 0 20px rgba(255,215,0,0.4),
    0 0 40px rgba(255,215,0,0.15),
    inset 0 0 15px rgba(255,215,0,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;
  animation:arcadePulse 2s ease-in-out infinite;
  text-decoration:none;
}
.arcade-toggle:hover{
  transform:scale(1.12);
  box-shadow:
    0 0 30px rgba(255,215,0,0.6),
    0 0 60px rgba(255,215,0,0.25),
    inset 0 0 20px rgba(255,215,0,0.15);
}
.arcade-toggle:active{transform:scale(0.95)}
@keyframes arcadePulse{
  0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.4),0 0 40px rgba(255,215,0,0.15),inset 0 0 15px rgba(255,215,0,0.1)}
  50%{box-shadow:0 0 30px rgba(255,215,0,0.6),0 0 50px rgba(255,215,0,0.25),inset 0 0 20px rgba(255,215,0,0.2)}
}
.arcade-toggle svg{

<script>
window.LunaCoin = window.LunaCoin || (function() {
    const DAILY_LIMIT = 15;
    function getToday() { return new Date().toISOString().slice(0,10); }
    function load() {
        if (localStorage.getItem('luna_coins_date') !== getToday()) {
            localStorage.setItem('luna_coins_today','0');
            localStorage.setItem('luna_coins_date', getToday());
        }
        return { total: parseInt(localStorage.getItem('luna_coins')||'0'), today: parseInt(localStorage.getItem('luna_coins_today')||'0') };
    }
    function save(t, d) { localStorage.setItem('luna_coins',t); localStorage.setItem('luna_coins_today',d); localStorage.setItem('luna_coins_date',getToday()); updateUI(t,d); }
    function updateUI(t) { const el = document.getElementById('sideCoinCount'); if(el) el.textContent = t; }
    function earn(n) { const d=load(); const c=Math.min(n,DAILY_LIMIT-d.today); if(c<=0) return {earned:0}; d.total+=c; d.today+=c; save(d.total,d.today); return {earned:c,total:d.total}; }
    function spend(n) { const d=load(); if(d.total<n) return {success:false}; d.total-=n; save(d.total,d.today); return {success:true,remaining:d.total}; }
    function getBalance() { return load(); }
    function showInfo() { alert('🪙 코인: ' + load().total + ' (오늘 ' + load().today + '/' + DAILY_LIMIT + ')'); }
    const init = load(); updateUI(init.total);
    return { earn, spend, getBalance, showInfo, DAILY_LIMIT };
})();
</script>

// ═══ API KEY MANAGEMENT (localStorage) ═══
function getKey(ai){ return localStorage.getItem('luna_ai_key_'+ai) || '' }
function setKey(ai, key){ localStorage.setItem('luna_ai_key_'+ai, key) }
function removeKey(ai){ localStorage.removeItem('luna_ai_key_'+ai) }
function hasKey(ai){ return !!getKey(ai) }

function getEnabledAIs(){
  // Return list of AI ids that are enabled (stored in localStorage)
  const stored = localStorage.getItem('luna_enabled_ais');
  if(stored) return JSON.parse(stored);
  return ['gemini','groq','mistral']; // defaults
}
function setEnabledAIs(list){ localStorage.setItem('luna_enabled_ais', JSON.stringify(list)) }
function isEnabled(ai){ return getEnabledAIs().includes(ai) }

function updateGearIcons(){
  getEnabledAIs().forEach(ai=>{
    const gear = document.getElementById('gear-'+ai);
    if(gear){
      if(hasKey(ai)) gear.classList.add('has-key');
      else gear.classList.remove('has-key');
    }
  });
}

// ═══ RENDER CHARACTERS ═══
function renderCharacters(){
  const row = document.getElementById('charactersRow');
  const enabled = getEnabledAIs();
  let html = '';
  enabled.forEach(ai=>{
    const cfg = AI_CONFIG[ai];
    if(!cfg) return;
    const active = hasKey(ai);
    html += `
      <div class="char-wrap ${active?'':'inactive'}" id="charWrap-${ai}">
        <div class="char-bubble greeting" id="greet-${ai}">${cfg.greeting}</div>
        <img class="char-img" src="${cfg.img}" alt="${cfg.label}" onclick="tapCharacter('${ai}')"/>
        <div class="char-gear ${active?'has-key':''}" id="gear-${ai}" onclick="event.stopPropagation();openKeyModal('${ai}')">
          <span class="material-symbols-outlined">settings</span>
        </div>
        <span class="char-name" style="border-color:${cfg.color}">${cfg.name} (${cfg.label})</span>
      </div>
    `;
  });
  html += `
    <div class="char-wrap" onclick="openAddAIModal()">
      <div class="char-add"><span class="material-symbols-outlined">add</span></div>
      <span class="char-name" style="border-color:rgba(255,255,255,0.3)">AI 추가</span>
    </div>
  `;
  row.innerHTML = html;
}

function toggleBubble(ai){
  const bubble = document.getElementById('ans-'+ai);
  if(!bubble || !bubble.classList.contains('answered')) return;

  if(bubble.classList.contains('selected')){
    bubble.classList.remove('selected');
  } else {
    document.querySelectorAll('.char-bubble.selected').forEach(b=>b.classList.remove('selected'));
    bubble.classList.add('selected');
  }
}

// ═══ ADD AI MODAL ═══
function openAddAIModal(){
  const enabled = getEnabledAIs();
  const available = Object.keys(AI_CONFIG).filter(ai=>!enabled.includes(ai));
  const modal = document.getElementById('keyModal');

  modal.innerHTML = `
    <button class="key-modal-close" onclick="closeKeyModal()">&times;</button>
    <h2>AI 친구 추가하기</h2>
    <div class="key-subtitle">새로운 AI 친구를 추가해보세요!</div>
    ${available.length === 0 ? '<p style="text-align:center;color:#888;padding:2rem 0">모든 AI가 이미 추가되었어요!</p>' :
      available.map(ai=>{
        const cfg = AI_CONFIG[ai];
        return `
          <div class="key-step" style="cursor:pointer;display:flex;align-items:center;gap:12px" onclick="addAI('${ai}')">
            <img src="${cfg.img}" style="width:48px;height:48px;object-fit:contain;flex-shrink:0"/>
            <div style="flex:1">
              <b>${cfg.name} (${cfg.label})</b>
              <div style="font-size:0.7rem;color:#888;margin-top:2px">
                ${cfg.free ? '<span style="color:#10b981">무료</span>' : '<span style="color:#ef4444">유료</span>'}
                · ${cfg.signupText}
              </div>
            </div>
            <span class="material-symbols-outlined" style="color:var(--accent)">add_circle</span>
          </div>
        `;
      }).join('')
    }
    ${enabled.length > 1 ? `
      <div style="margin-top:1rem;border-top:1px solid #eee;padding-top:1rem">
        <div class="key-subtitle" style="margin-bottom:8px">현재 추가된 AI (클릭하여 제거)</div>
        ${enabled.map(ai=>{
          const cfg = AI_CONFIG[ai];
          return cfg ? `
            <div class="key-step" style="cursor:pointer;display:flex;align-items:center;gap:12px;padding:8px 12px" onclick="removeAI('${ai}')">
              <img src="${cfg.img}" style="width:32px;height:32px;object-fit:contain"/>
              <span style="flex:1;font-size:0.8rem"><b>${cfg.name}</b> (${cfg.label})</span>
              <span class="material-symbols-outlined" style="color:#ef4444;font-size:18px">remove_circle</span>
            </div>
          ` : '';
        }).join('')}
      </div>
    ` : ''}
    <div class="key-notice">
      <span class="material-symbols-outlined">info</span>
      <div>추가한 AI 목록과 API 키는 이 기기의 브라우저에만 저장됩니다.</div>
    </div>
  `;
  document.getElementById('keyModalBg').classList.add('active');
}

function addAI(ai){
  const list = getEnabledAIs();
  if(!list.includes(ai)) list.push(ai);
  setEnabledAIs(list);
  renderCharacters();
  closeKeyModal();
  // Open key setup for the new AI
  setTimeout(()=>openKeyModal(ai), 300);
}

function removeAI(ai){
  let list = getEnabledAIs().filter(a=>a!==ai);
  if(list.length === 0){ alert('최소 1개의 AI는 있어야 해요!'); return; }
  setEnabledAIs(list);
  removeKey(ai);
  renderCharacters();
  openAddAIModal(); // Refresh modal
}

// ═══ KEY SETUP MODAL ═══
function openKeyModal(ai){
  const cfg = AI_CONFIG[ai];
  const key = getKey(ai);
  const masked = key ? key.substring(0,8)+'...' + key.slice(-4) : '';
  const modal = document.getElementById('keyModal');

  modal.innerHTML = `
    <button class="key-modal-close" onclick="closeKeyModal()">&times;</button>
    <h2>
      <img class="key-char-img" src="${cfg.img}" alt=""/>
      ${cfg.name} (${cfg.label}) 설정
    </h2>
    <div class="key-subtitle">API 키를 등록하면 ${cfg.name}에게 질문할 수 있어요!</div>

    <div class="key-step">
      <span class="key-step-num" style="background:${cfg.color}">1</span>
      <b>API 키 발급받기</b>
      <p><a href="${cfg.signupUrl}" target="_blank">${cfg.signupText} &#8599;</a></p>
    </div>

    <div class="key-step">
      <span class="key-step-num" style="background:${cfg.color}">2</span>
      <b>키 발급 방법</b>
      ${cfg.steps.map((s,i)=>`<p>${i+1}. ${s}</p>`).join('')}
    </div>

    <div class="key-step">
      <span class="key-step-num" style="background:${cfg.color}">3</span>
      <b>API 키 붙여넣기</b>
      <div class="key-input-wrap">
        <input class="key-input ${key?'has-key':''}" id="keyInput-${ai}" type="password"
          placeholder="API 키를 붙여넣으세요..." value="${key}"/>
        <button class="key-save-btn" style="background:${cfg.color}" onclick="saveKey('${ai}')">저장</button>
      </div>
      ${key ? `
        <div class="key-status connected">
          <span class="dot"></span> 연결됨: ${masked}
          <button class="key-delete-btn" onclick="deleteKey('${ai}')">삭제</button>
        </div>
      ` : `
        <div class="key-status disconnected">
          <span class="dot"></span> 아직 연결되지 않았어요
        </div>
      `}
    </div>

    <div class="key-notice">
      <span class="material-symbols-outlined">info</span>
      <div>
        <b>이 API 키는 접속한 기기에만 저장됩니다.</b><br/>
        서버로 전송되지 않으며, 이 브라우저의 로컬 저장소에만 보관됩니다.
        다른 기기나 브라우저에서는 다시 입력해야 합니다.
      </div>
    </div>
  `;

  document.getElementById('keyModalBg').classList.add('active');
}

function closeKeyModal(){
  document.getElementById('keyModalBg').classList.remove('active');
}

function saveKey(ai){
  const input = document.getElementById('keyInput-'+ai);
  const key = input.value.trim();
  if(!key){alert('API 키를 입력해주세요!');return;}
  setKey(ai, key);
  updateGearIcons();
  // Refresh modal to show connected status
  openKeyModal(ai);
}

function deleteKey(ai){
  if(!confirm('정말 이 API 키를 삭제할까요?')) return;
  removeKey(ai);
  updateGearIcons();
  openKeyModal(ai);
}

// ═══ CHARACTER TAP ═══
let activeSpeech = null;
function tapCharacter(name){
  if(!hasKey(name)){
    openKeyModal(name);
    return;
  }

  // 인사 말풍선 토글
  const greet = document.getElementById('greet-'+name);
  if(!greet) return;

  if(activeSpeech === name){
    greet.classList.remove('active');
    activeSpeech = null;
    return;
  }
  document.querySelectorAll('.char-bubble.greeting.active').forEach(b=>b.classList.remove('active'));
  greet.classList.add('active');
  activeSpeech = name;
  setTimeout(()=>{
    greet.classList.remove('active');
    activeSpeech=null;
  },3000);
}

// ═══ ASK ALL AIs ═══
let isAsking = false;

function askAll(){
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if(!q || isAsking) return;

  const enabled = getEnabledAIs();
  const withKeys = enabled.filter(ai=>hasKey(ai));

  if(withKeys.length === 0){
    openKeyModal(enabled[0]);
    return;
  }

  isAsking = true;

  // 인사 말풍선 닫기
  document.querySelectorAll('.char-bubble.greeting').forEach(b=>b.classList.remove('active'));

  // bubblesRow에 답변 카드 생성
  const row = document.getElementById('bubblesRow');
  row.classList.add('has-answers');
  row.innerHTML = enabled.map(ai=>{
    const cfg = AI_CONFIG[ai];
    if(!cfg) return '';
    const isLoading = hasKey(ai);
    return `
      <div class="char-bubble active ${isLoading?'loading':''}" id="ans-${ai}" onclick="toggleBubble('${ai}')" style="border-left-color:${cfg.color}">
        <div class="bubble-name">
          <img src="${cfg.img}" alt=""/>
          <span style="color:${cfg.color}">${cfg.name}</span>
        </div>
        <div class="bubble-text">${isLoading ? '생각하는 중... 💭' : 'API 키가 없어요 🔑'}</div>
      </div>
    `;
  }).join('');

  withKeys.forEach(ai=>callAI(ai, q));
}

function displayAnswer(ai, text){
  const bubble = document.getElementById('ans-'+ai);
  const cfg = AI_CONFIG[ai];
  if(!bubble || !cfg) return;

  const preview = text.length > 80 ? text.substring(0,80)+'...' : text;

  bubble.className = 'char-bubble active answered';
  bubble.style.borderLeftColor = cfg.color;
  bubble.innerHTML = `
    <div class="bubble-name">
      <img src="${cfg.img}" alt=""/>
      <span style="color:${cfg.color}">${cfg.name}</span>
      <button class="bubble-copy" onclick="event.stopPropagation();copyAnswer(this,'${ai}')" title="복사하기">
        <span class="material-symbols-outlined">content_copy</span>
      </button>
    </div>
    <div class="bubble-text bubble-preview">${preview}</div>
    <div class="bubble-text bubble-full">${text}</div>
    ${text.length > 80 ? '<div class="bubble-hint">👆 클릭하면 전체 보기</div>' : ''}
  `;
  bubble.dataset.fullText = text;

  isAsking = false;
}

function copyAnswer(btn, ai){
  const bubble = document.getElementById('ans-'+ai);
  const text = bubble?.dataset?.fullText || '';
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const icon = btn.querySelector('.material-symbols-outlined');
    icon.textContent = 'check';
    btn.classList.add('copied');
    setTimeout(()=>{ icon.textContent='content_copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ═══ UNIFIED API CALLER ═══

async function callAI(ai, question){
  const cfg = AI_CONFIG[ai];
  const key = getKey(ai);
  if(!cfg||!key) return displayAnswer(ai,'API 키가 없어요!');

  try{
    let text = '';

    if(cfg.apiType === 'gemini'){
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:cfg.sysPrompt+'\n\n질문: '+question}]}]})
      });
      const data = await resp.json();
      if(data.error) return displayAnswer(ai, cfg.name+': API 키를 확인해주세요!');
      text = data?.candidates?.[0]?.content?.parts?.[0]?.text || cfg.name+'가 잠시 바빠요...';

    } else if(cfg.apiType === 'claude'){
      const resp = await fetch(cfg.endpoint, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:cfg.model, max_tokens:300,
          system:cfg.sysPrompt,
          messages:[{role:'user',content:question}]
        })
      });
      const data = await resp.json();
      if(data.error) return displayAnswer(ai, cfg.name+': API 키를 확인해주세요!');
      text = data?.content?.[0]?.text || cfg.name+'가 잠시 바빠요...';

    } else if(cfg.apiType === 'cohere'){
      const resp = await fetch(cfg.endpoint, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({
          model:cfg.model,
          messages:[
            {role:'system',content:cfg.sysPrompt},
            {role:'user',content:question}
          ]
        })
      });
      const data = await resp.json();
      if(typeof data.message === 'string') return displayAnswer(ai, cfg.name+': API 키를 확인해주세요! ('+data.message+')');
      text = data?.message?.content?.[0]?.text || cfg.name+'가 잠시 바빠요...';

    } else if(cfg.apiType === 'openai'){
      // Works for Groq, Mistral, ChatGPT, OpenRouter (OpenAI-compatible)
      const headers = {'Content-Type':'application/json','Authorization':'Bearer '+key};
      if(ai === 'openrouter') headers['HTTP-Referer'] = window.location.origin;
      const resp = await fetch(cfg.endpoint, {
        method:'POST', headers,
        body:JSON.stringify({
          model:cfg.model,
          messages:[
            {role:'system',content:cfg.sysPrompt},
            {role:'user',content:question}
          ],
          max_tokens:300
        })
      });
      const data = await resp.json();
      if(data.error) return displayAnswer(ai, cfg.name+': API 키를 확인해주세요! ('+(data.error.message||data.error)+')');
      text = data?.choices?.[0]?.message?.content || cfg.name+'가 잠시 바빠요...';
    }

    displayAnswer(ai, text);
  }catch(e){
    displayAnswer(ai, cfg.name+'가 잠시 쉬고 있어요! 나중에 다시 물어봐 주세요.');
  }
}
