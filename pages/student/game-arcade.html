<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna Arcade - 게임 오락실</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-pink:#ff2d95;
  --neon-cyan:#00f0ff;
  --neon-yellow:#ffe600;
  --neon-green:#39ff14;
  --neon-orange:#ff6b2b;
  --neon-purple:#c471ed;
  --dark:#0a0a1a;
  --dark2:#12122a;
  --card-bg:rgba(18,18,42,0.85);
}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:3px}

body{
  font-family:'Jua',sans-serif;
  background:var(--dark);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* === ANIMATED BG === */
.arcade-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(255,45,149,0.08), transparent),
    radial-gradient(ellipse 500px 500px at 80% 30%, rgba(0,240,255,0.06), transparent),
    radial-gradient(ellipse 400px 300px at 50% 90%, rgba(196,113,237,0.06), transparent);
}

/* Scanlines */
.arcade-bg::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
}

/* Grid floor */
.grid-floor{
  position:fixed;bottom:0;left:0;right:0;height:40vh;
  z-index:0;pointer-events:none;
  background:
    linear-gradient(to bottom, transparent 0%, rgba(196,113,237,0.05) 100%),
    repeating-linear-gradient(90deg, rgba(196,113,237,0.08) 0px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(196,113,237,0.05) 0px, transparent 1px, transparent 60px);
  transform:perspective(500px) rotateX(45deg);
  transform-origin:bottom;
}

/* === HEADER === */
.arcade-header{
  position:relative;z-index:10;
  text-align:center;
  padding:2.5rem 1rem 1rem;
}

.arcade-logo{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2rem,6vw,3.5rem);
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  background:linear-gradient(180deg, #fff 0%, var(--neon-cyan) 50%, var(--neon-pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(0,240,255,0.4)) drop-shadow(0 0 40px rgba(255,45,149,0.3));
  animation:logoGlow 3s ease-in-out infinite alternate;
}
@keyframes logoGlow{
  0%{filter:drop-shadow(0 0 15px rgba(0,240,255,0.3)) drop-shadow(0 0 30px rgba(255,45,149,0.2))}
  100%{filter:drop-shadow(0 0 25px rgba(0,240,255,0.6)) drop-shadow(0 0 50px rgba(255,45,149,0.4))}
}

.arcade-subtitle{
  font-size:0.9rem;color:rgba(255,255,255,0.5);
  margin-top:4px;letter-spacing:2px;
}

/* Back button */
.back-btn{
  position:fixed;top:16px;left:16px;z-index:100;
  width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;color:#fff;font-size:24px;
  text-decoration:none;
}
.back-btn:hover{border-color:var(--neon-cyan);box-shadow:0 0 20px rgba(0,240,255,0.3)}

/* === MASCOT IMAGES === */
.mascot-left{
  position:fixed;top:40px;left:0;z-index:5;
  width:clamp(120px,22vw,280px);
  opacity:0.9;pointer-events:none;
  filter:drop-shadow(0 0 30px rgba(255,45,149,0.3));
  animation:mascotFloat 4s ease-in-out infinite;
}
.mascot-right{
  position:fixed;bottom:0;right:0;z-index:5;
  width:clamp(120px,22vw,280px);
  opacity:0.85;pointer-events:none;
  filter:drop-shadow(0 0 30px rgba(0,240,255,0.3));
  animation:mascotFloat 4s ease-in-out infinite 2s;
}
@keyframes mascotFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* === CATEGORIES CONTAINER === */
.categories{
  position:relative;z-index:10;
  max-width:1100px;margin:0 auto;
  padding:1rem 1rem 4rem;
  display:flex;flex-direction:column;gap:2rem;
}

/* === CATEGORY BOX === */
.cat-box{
  background:var(--card-bg);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:1.5rem;
  backdrop-filter:blur(12px);
  position:relative;
  overflow:hidden;
  transition:border-color 0.3s;
}
.cat-box:hover{border-color:rgba(255,255,255,0.15)}

/* Neon glow line at top */
.cat-box::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  border-radius:0 0 4px 4px;
}
.cat-box[data-cat="korean"]::before{background:var(--neon-pink);box-shadow:0 0 15px var(--neon-pink)}
.cat-box[data-cat="math"]::before{background:var(--neon-cyan);box-shadow:0 0 15px var(--neon-cyan)}
.cat-box[data-cat="english"]::before{background:var(--neon-green);box-shadow:0 0 15px var(--neon-green)}
.cat-box[data-cat="science"]::before{background:var(--neon-orange);box-shadow:0 0 15px var(--neon-orange)}
.cat-box[data-cat="art"]::before{background:var(--neon-purple);box-shadow:0 0 15px var(--neon-purple)}
.cat-box[data-cat="bonus"]::before{background:var(--neon-yellow);box-shadow:0 0 15px var(--neon-yellow)}

.cat-title{
  font-family:'Orbitron',sans-serif;
  font-size:1.1rem;font-weight:700;
  margin-bottom:1rem;
  display:flex;align-items:center;gap:10px;
  letter-spacing:1px;
}
.cat-title .cat-emoji{font-size:1.4rem}
.cat-title .cat-count{
  font-size:0.65rem;
  padding:2px 10px;border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);
  font-family:'Jua',sans-serif;
}

/* Neon colored titles */
.cat-box[data-cat="korean"] .cat-title{color:var(--neon-pink)}
.cat-box[data-cat="math"] .cat-title{color:var(--neon-cyan)}
.cat-box[data-cat="english"] .cat-title{color:var(--neon-green)}
.cat-box[data-cat="science"] .cat-title{color:var(--neon-orange)}
.cat-box[data-cat="art"] .cat-title{color:var(--neon-purple)}
.cat-box[data-cat="bonus"] .cat-title{color:var(--neon-yellow)}

/* === GAME GRID === */
.game-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));
  gap:12px;
}
@media(min-width:768px){.game-grid{grid-template-columns:repeat(auto-fill, minmax(130px, 1fr))}}

/* === GAME ITEM === */
.game-item{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:14px 8px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:all 0.3s;
  text-decoration:none;color:#fff;
  position:relative;
}
.game-item:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.15);
  transform:translateY(-4px);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
.game-item:active{transform:scale(0.95)}

.game-item .icon-wrap{
  width:72px;height:72px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  transition:all 0.3s;
}
.game-item:hover .icon-wrap{
  box-shadow:0 0 20px rgba(255,255,255,0.1);
  transform:scale(1.08) rotate(-3deg);
}
.game-item .icon-wrap img{
  width:100%;height:100%;object-fit:contain;
}

.game-item .game-name{
  font-size:0.75rem;text-align:center;
  line-height:1.3;
  opacity:0.85;
}
.game-item .game-age-tag{
  position:absolute;top:4px;right:4px;
  font-size:0.55rem;padding:1px 6px;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4);
}

/* Coming soon items */
.game-item.coming-soon{
  opacity:0.35;pointer-events:none;
}
.game-item.coming-soon::after{
  content:'SOON';position:absolute;
  bottom:8px;font-size:0.5rem;
  font-family:'Orbitron',sans-serif;
  letter-spacing:2px;
  color:rgba(255,255,255,0.3);
}

/* Neon hover glow per category */
.cat-box[data-cat="korean"] .game-item:hover{box-shadow:0 4px 25px rgba(255,45,149,0.15)}
.cat-box[data-cat="math"] .game-item:hover{box-shadow:0 4px 25px rgba(0,240,255,0.15)}
.cat-box[data-cat="english"] .game-item:hover{box-shadow:0 4px 25px rgba(57,255,20,0.15)}
.cat-box[data-cat="science"] .game-item:hover{box-shadow:0 4px 25px rgba(255,107,43,0.15)}
.cat-box[data-cat="art"] .game-item:hover{box-shadow:0 4px 25px rgba(196,113,237,0.15)}
.cat-box[data-cat="bonus"] .game-item:hover{box-shadow:0 4px 25px rgba(255,230,0,0.15)}

/* === NEON STARS (floating) === */
.neon-star{
  position:fixed;z-index:2;pointer-events:none;
  width:4px;height:4px;border-radius:50%;
  animation:starPulse 2s ease-in-out infinite;
}
@keyframes starPulse{
  0%,100%{opacity:0.3;transform:scale(1)}
  50%{opacity:1;transform:scale(1.5)}
}

/* === RESPONSIVE === */
@media(max-width:600px){
  .mascot-left{width:100px;top:10px}
  .mascot-right{width:100px}
  .arcade-header{padding-top:4rem}
  .cat-box{padding:1rem}
  .game-grid{grid-template-columns:repeat(3, 1fr);gap:8px}
  .game-item .icon-wrap{width:56px;height:56px;border-radius:12px}
  .game-item{padding:10px 6px}
}
@media(min-width:1200px){
  .game-grid{grid-template-columns:repeat(6, 1fr)}
}
</style>
</head>
<body>

<!-- Neon Stars -->
<script>
(function(){
  const colors = ['#ff2d95','#00f0ff','#ffe600','#39ff14','#c471ed','#ff6b2b'];
  for(let i=0;i<30;i++){
    const s = document.createElement('div');
    s.className = 'neon-star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.boxShadow = `0 0 6px ${s.style.background}`;
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.animationDuration = (1.5+Math.random()*2)+'s';
    document.body.appendChild(s);
  }
})();
</script>
