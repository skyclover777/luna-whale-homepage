<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>나는 조선왕 👑 — LunaWhale</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0705;font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Starfield BG ── */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 50% 0%,rgba(120,80,20,0.25) 0%,transparent 70%),
  radial-gradient(ellipse 40% 30% at 80% 100%,rgba(60,30,10,0.3) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* ── Header ── */
.header{position:relative;z-index:10;text-align:center;padding:18px 20px 10px;
  background:linear-gradient(180deg,rgba(80,40,5,0.8) 0%,transparent 100%)}
.header-emoji{font-size:28px;display:inline;margin-right:8px;filter:drop-shadow(0 2px 8px rgba(255,200,50,0.5))}
.header h1{font-family:'Noto Serif KR',serif;font-size:clamp(16px,3vw,24px);font-weight:900;display:inline;
  color:#f5d77a;text-shadow:0 2px 20px rgba(255,180,30,0.6);letter-spacing:2px}
.header p{color:#b8964a;font-size:11px;margin-top:3px;letter-spacing:1px}
.back-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,200,80,0.3);border-radius:8px;padding:5px 10px;
  color:#d4a830;font-size:11px;cursor:pointer;text-decoration:none;
  transition:all .2s;display:flex;align-items:center;gap:4px}
.back-btn:hover{background:rgba(255,200,80,0.15);color:#f5d77a}

/* ── Filter Bar ── */
.filter-bar{position:relative;z-index:10;display:flex;gap:6px;justify-content:center;
  padding:8px 20px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,200,80,0.2);
  border-radius:20px;padding:4px 12px;color:#a08040;font-size:11px;cursor:pointer;
  transition:all .25s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:rgba(255,180,30,0.18);
  border-color:rgba(255,180,30,0.6);color:#f5d77a}

/* ── King Grid ── */
.king-grid{position:relative;z-index:10;display:grid;grid-template-columns:repeat(7, 82px);gap:8px;
  justify-content:center;padding:0 16px 20px;max-width:1200px;margin:0 auto}

/* ── King Card ── */
.king-card{width:82px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative}
.king-card:hover{transform:translateY(-5px) scale(1.06)}
.king-card:hover .king-avatar{box-shadow:0 8px 24px rgba(255,180,30,0.5);border-color:rgba(255,200,80,0.8)}
.king-avatar{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid rgba(255,200,80,0.25);
  display:flex;align-items:center;justify-content:center;font-size:42px;
  background:linear-gradient(135deg,#1a1208,#2a1e0a);
  transition:all .25s;overflow:hidden;position:relative}
.king-avatar img{width:100%;height:100%;object-fit:cover;image-rendering:auto}
.king-num{position:absolute;top:3px;left:5px;font-size:8px;color:rgba(255,200,80,0.5);
  font-family:'Noto Serif KR',serif}
.era-badge{position:absolute;top:3px;right:3px;font-size:7px;padding:1px 4px;border-radius:4px;font-weight:700}
.era-1{background:rgba(30,80,200,0.5);color:#80b4ff}
.era-2{background:rgba(200,120,20,0.5);color:#ffd080}
.era-3{background:rgba(150,30,30,0.5);color:#ff9090}
.king-name{text-align:center;margin-top:5px;font-family:'Noto Serif KR',serif;
  font-size:10px;font-weight:700;color:#e8c870;line-height:1.2}
.king-period{text-align:center;font-size:8px;color:#6a5030;margin-top:1px}
.king-icons{display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap}
.king-icon{font-size:10px;opacity:0.8;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;
  display:none;align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(160deg,#1a1106,#0f0a04);border:1px solid rgba(255,200,80,0.35);
  border-radius:24px;max-width:850px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 0 60px rgba(255,160,20,0.2),0 30px 80px rgba(0,0,0,0.8);
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:none}}

.modal-header{padding:28px 24px 20px;border-bottom:1px solid rgba(255,200,80,0.12);
  display:flex;align-items:flex-start;gap:18px;position:relative}
.modal-avatar{width:88px;height:88px;border-radius:16px;border:2px solid rgba(255,200,80,0.4);
  display:flex;align-items:center;justify-content:center;font-size:52px;
  background:linear-gradient(135deg,#1e1608,#2e2410);overflow:hidden;flex-shrink:0}
.modal-avatar img{width:100%;height:100%;object-fit:cover}
.modal-title h2{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#f5d77a}
.modal-title .sub{color:#8a6830;font-size:12px;margin-top:3px}
.modal-title .reign{color:#c49a40;font-size:12px;margin-top:2px}
.close-btn{position:absolute;top:16px;right:16px;width:32px;height:32px;
  background:rgba(255,255,255,0.06);border:none;border-radius:50%;
  color:#806040;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:rgba(255,180,30,0.2);color:#f5d77a}

/* Stats */
.stats-row{display:flex;gap:10px;padding:18px 24px;flex-wrap:wrap}
.stat-box{flex:1;min-width:90px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,200,80,0.1);
  border-radius:12px;padding:12px;text-align:center}
.stat-label{font-size:10px;color:#7a6030;letter-spacing:1px;margin-bottom:6px}
.stat-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin:0 auto 6px;max-width:80px}
.stat-bar{height:100%;border-radius:3px;transition:width 0.6s ease}
.stat-val{font-size:11px;font-weight:700;color:#d4a830}

/* Achievements */
.achievements{padding:0 24px 16px}
.achievements h3{font-size:12px;font-weight:700;color:#6a5030;letter-spacing:2px;margin-bottom:12px}
/* Flip Cards */
.ach-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.ach-card{perspective:1000px;height:70px;cursor:pointer;opacity:0;transform:scale(0.8);transition:all 0.4s cubic-bezier(.34,1.56,.64,1)}
.ach-card.show{opacity:1;transform:scale(1)}
.ach-card-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);transform-style:preserve-3d}
.ach-card.flipped .ach-card-inner{transform:rotateY(180deg)}
.ach-front, .ach-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;padding:0 15px;border:1px solid rgba(255,200,80,0.15)}
.ach-front{background:rgba(255,255,255,0.06);color:#8a6830;font-size:12px;justify-content:center;gap:8px}
.ach-back{background:rgba(255,180,30,0.1);color:#f5d77a;transform:rotateY(180deg);text-align:left;gap:12px}
.ach-icon{font-size:24px;flex-shrink:0}
.ach-text h4{font-size:13px;font-weight:700;color:#f5d77a;margin-bottom:1px}
.ach-text p{font-size:11px;color:#b8964a;line-height:1.4}

/* Citizens */
.citizens-area{padding:16px 24px 28px;border-top:1px solid rgba(255,200,80,0.1)}
.citizens-area.unlocked .citizen-figure{border-color:rgba(255,200,80,0.6);box-shadow:0 0 15px rgba(255,200,80,0.2);cursor:pointer}
.citizens-area.unlocked .citizen-figure:hover{transform:scale(1.1) rotate(5deg)}
.citizens-area h3{font-size:12px;font-weight:700;color:#6a5030;letter-spacing:2px;margin-bottom:14px}
.citizens-grid{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.citizen{display:flex;flex-direction:column;align-items:center;gap:6px;max-width:120px;
  opacity:0;transform:translateY(20px)}
.citizen.show{opacity:1;transform:none;animation:citizenJump 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes citizenJump{
  0%{transform:translateY(20px) scale(0.8)}
  50%{transform:translateY(-10px) scale(1.1)}
  100%{transform:none;scale:1}
}
.citizen-figure{
  width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:24px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,200,80,0.15)}
.speech-bubble{background:rgba(255,255,255,0.07);border:1px solid rgba(255,200,80,0.2);
  border-radius:10px;padding:6px 10px;font-size:10px;color:#c8a060;line-height:1.4;
  text-align:center;position:relative;opacity:0;transform:scale(0.5);transform-origin:bottom;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1)}
.speech-bubble.show{opacity:1;transform:scale(1)}
.speech-bubble.revealing{animation:springPop 0.5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes springPop{0%{transform:scale(0.5)} 60%{transform:scale(1.2)} 100%{transform:scale(1)}}
.speech-bubble::before{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:8px;height:5px;background:rgba(255,200,80,0.2);clip-path:polygon(0% 0%, 100% 0%, 50% 100%)}

/* Hidden */
.king-card.hidden{display:none}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3)}
::-webkit-scrollbar-thumb{background:rgba(255,180,30,0.3);border-radius:3px}

@media(max-width:600px){.king-card{width:70px}.king-avatar{font-size:22px}}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>

// ── Sound Engine (Synthetic) ──
class SoundEngine {
  constructor() {
    this.ctx = null;
  }
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  playStat(pitch = 440) {
    this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(pitch, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(pitch * 1.5, this.ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.1);
  }
  playPop(pitch = 200) {
    this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(pitch, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(pitch * 0.5, this.ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.15);
  }
}
const sounds = new SoundEngine();

const grid = document.getElementById('kingGrid');
const modal = document.getElementById('modal');

function renderGrid(kings) {
  grid.innerHTML = '';
  kings.forEach(k => {
    const card = document.createElement('div');
    card.className = 'king-card';
    card.dataset.type = k.type.join(' ');
    card.innerHTML = `
      <div class="king-avatar">
        <div class="king-num">${k.id}</div>
        <div class="era-badge era-${k.era}">${k.era === 1 ? '초기' : k.era === 2 ? '중기' : '말기'}</div>
        <span style="font-size:48px">${k.emoji}</span>
      </div>
      <div class="king-name">${k.name}</div>
      <div class="king-period">${k.period}</div>
      <div class="king-icons">${k.icons.map(i => `<span class="king-icon">${i}</span>`).join('')}</div>
    `;
    card.addEventListener('click', () => openModal(k));
    grid.appendChild(card);
  });
}

// ── Stat color ──
function statColor(v) {
  if (v >= 80) return '#4caf50';
  if (v >= 60) return '#ff9800';
  if (v >= 40) return '#f44336';
  return '#9e9e9e';
}

    </div>
    <div class="stats-row">${statsHtml}</div>
    <div class="achievements">
      <h3>📌 주요 업적</h3>
      <div class="ach-list">${achHtml}</div>
    </div>
    <div class="citizens-area">
      <h3>💬 백성들의 반응</h3>
      <div class="citizens-grid">${citizenHtml}</div>
    </div>
  `;

  // Seq: Stats -> Achievements -> Citizens
  animateStats(k.stats, statsConfig);
}

async function animateStats(stats, config) {
  for(const s of config) {
    const target = stats[s.key];
    const bar = document.getElementById(`bar-${s.id}`);
    const val = document.getElementById(`val-${s.id}`);
    
    let cur = 0;
    const duration = 400;
    const steps = 10;
    const stepVal = target / steps;
    const intervalTime = duration / steps;

    const interval = setInterval(() => {
      cur += stepVal;
      if(cur >= target) {
        cur = target;
        clearInterval(interval);
      }
      bar.style.width = cur + '%';
      val.innerText = Math.floor(cur);
      sounds.playStat(400 + (cur*2));
    }, intervalTime);

    await new Promise(r => setTimeout(r, 150));
  }
  
  await new Promise(r => setTimeout(r, 200));
  animateAchievements();
  animateCitizens();
}

async function animateAchievements() {
  const items = document.querySelectorAll('.ach-card');
  for(let i=0; i<items.length; i++) {
    items[i].classList.add('show');
    sounds.playPop(300 + (i*40));
    await new Promise(r => setTimeout(r, 180));
  }
}

function flipCard(el) {
  if(el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  sounds.playPop(500);
  flippedCount++;
  
  if(flippedCount === totalAchievements) {
    setTimeout(() => {
      document.querySelector('.citizens-area').classList.add('unlocked');
      // Subtle hint that citizens can be clicked
      document.querySelectorAll('.speech-bubble').forEach(b => {
        b.style.color = '#f5d77a';
        b.innerText = 'Click!';
      });
      sounds.playPop(800);
    }, 400);
  }
}

async function animateCitizens() {
  const items = document.querySelectorAll('.citizen');
  for(let i=0; i<items.length; i++) {
    items[i].classList.add('show');
    sounds.playPop(200 + (i*30));
    
    setTimeout(() => {
      const bubble = document.getElementById(`bubble-${i}`);
      if(bubble) bubble.classList.add('show');
    }, 200);

    await new Promise(r => setTimeout(r, 150));
  }
}

function revealCitizen(idx, el) {
  if(flippedCount < totalAchievements) return;
  const bubble = document.getElementById(`bubble-${idx}`);
  if(bubble.classList.contains('revealed')) return;

  const citizenData = activeKing.citizens[idx];
  const say = citizenData.sayings[Math.floor(Math.random() * citizenData.sayings.length)];
  
  bubble.innerText = say;
  bubble.classList.add('revealed', 'revealing');
  sounds.playPop(600 + (idx*50));
}

function closeModal() {
  modal.classList.remove('open');
}

function filterKings(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('.king-card');
  cards.forEach(card => {
    const types = card.dataset.type;
    card.classList.toggle('hidden', type !== 'all' && !types.includes(type));
  });
}

// Keyboard close
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

renderGrid(KINGS);
</script>
</body>
</html>
