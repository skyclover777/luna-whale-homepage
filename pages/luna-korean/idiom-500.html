<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>고사성어 500 — Luna Whale</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="../../assets/data/idiom-data.js?v=2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Gothic A1','Noto Sans KR',sans-serif;
  background:#faf8f2;
  min-height:100vh;overflow-x:hidden;color:#2c2c2c;
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;opacity:0.22;
}
body::before{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(251,191,36,0.45),transparent 70%);
  top:-100px;right:-100px;animation:fb1 12s ease-in-out infinite;
}
body::after{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(217,119,6,0.3),transparent 70%);
  bottom:-80px;left:-80px;animation:fb2 15s ease-in-out infinite;
}
@keyframes fb1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,40px) scale(1.1);}}
@keyframes fb2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.15);}}

/* ── Header ── */
.page-header{
  position:relative;text-align:center;
  padding:3rem 1rem 1.5rem;z-index:1;
}
.back-btn{
  position:absolute;left:1rem;top:1.8rem;
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:20px;
  background:transparent;border:1px solid #d5d0c8;
  font-size:12px;font-weight:400;color:#888;
  text-decoration:none;transition:all .2s;letter-spacing:0.5px;
}
.back-btn:hover{border-color:#b08d57;color:#8b6914;transform:translateY(-1px);}
.title-en{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.4rem,4.5vw,2.2rem);font-weight:700;
  letter-spacing:3px;color:#2c2c2c;margin-bottom:4px;
}
.title-main{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(1.6rem,5vw,2.6rem);font-weight:900;
  letter-spacing:6px;color:#2c2c2c;margin-bottom:6px;
}
.title-sub{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(0.72rem,1.8vw,0.9rem);font-weight:400;
  color:#b08d57;letter-spacing:3px;
}
.title-divider{width:40px;height:1px;background:#d4c5a0;margin:14px auto 0;}

/* ── Progress ── */
.progress-wrap{
  max-width:360px;margin:1.2rem auto 0.6rem;padding:0 1rem;text-align:center;
}
.progress-bar{height:2px;background:#e8e4d8;border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:#d4a032;border-radius:1px;transition:width .6s ease;}
.progress-label{font-size:11px;color:#bbb;margin-top:6px;letter-spacing:0.5px;font-weight:300;}

/* ── Level pills ── */
.cat-pills{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin:1.2rem auto 1.5rem;padding:0 1rem;max-width:780px;z-index:1;position:relative;
}
.cat-pill{
  font-size:11px;font-weight:400;color:#aaa;
  padding:5px 14px;border:1px solid #ddd;border-radius:20px;
  background:transparent;cursor:pointer;transition:all .2s;letter-spacing:0.5px;
}
.cat-pill:hover{color:#8b6914;border-color:#c9a94e;}
.cat-pill.active{color:#8b6914;border-color:#c9a94e;background:rgba(212,160,50,.08);}

/* ── Cards grid ── */
.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:16px;padding:0 20px 3rem;max-width:1100px;margin:0 auto;
  position:relative;z-index:1;
}
@media(min-width:640px){.books-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px;}}
@media(min-width:960px){.books-grid{grid-template-columns:repeat(6,1fr);gap:20px;}}
@media(max-width:400px){.books-grid{grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 2rem;}}

/* ── Idiom card ── */
.book-card{
  position:relative;aspect-ratio:3/4;border-radius:8px;
  overflow:hidden;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:transform .35s cubic-bezier(.23,1,.32,1),box-shadow .35s ease;
  text-decoration:none;display:block;
}
.book-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,0.1);}

.book-bg{position:absolute;inset:0;}
.book-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.06) 100%);
  pointer-events:none;
}

/* 사자성어 대형 표시 */
.book-idiom{
  position:absolute;
  top:38%;left:50%;transform:translate(-50%,-50%);
  font-family:'Noto Serif KR',serif;
  font-size:clamp(18px,4.5vw,24px);font-weight:900;
  color:rgba(0,0,0,0.12);line-height:1.3;
  z-index:1;pointer-events:none;
  text-align:center;writing-mode:vertical-rl;
  letter-spacing:4px;
}

.book-text{
  position:absolute;bottom:10px;left:0;right:0;
  text-align:center;z-index:2;
}
.book-num{
  display:block;font-family:'Playfair Display',serif;
  font-size:10px;font-weight:400;color:rgba(0,0,0,0.3);
  letter-spacing:2px;margin-bottom:2px;
}
.book-reading{
  display:block;font-family:'Noto Serif KR',serif;
  font-size:clamp(12px,2vw,14px);font-weight:700;
  color:rgba(0,0,0,0.55);letter-spacing:1px;
}
.book-meaning{
  display:block;font-size:10px;font-weight:400;
  color:rgba(0,0,0,0.35);margin-top:1px;letter-spacing:0.5px;
  padding:0 6px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* 레벨 색상 엑센트 */
.book-accent{
  position:absolute;top:0;left:0;right:0;height:3px;z-index:3;
}

/* 업로드 카운트 */
.book-badge{
  position:absolute;top:6px;right:8px;z-index:3;
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;border-radius:9px;
  background:rgba(212,160,50,.8);color:#fff;
  font-size:9px;font-weight:700;padding:0 5px;
}

/* Ready dot */
.book-dot{
  position:absolute;top:6px;left:8px;z-index:2;
  width:6px;height:6px;border-radius:50%;background:#d4a032;opacity:0.7;
}

/* Lock overlay */
.book-lock{
  position:absolute;inset:0;z-index:3;
  background:rgba(250,248,242,0.5);
  display:flex;align-items:center;justify-content:center;
}
.book-lock .material-symbols-outlined{font-size:20px;color:rgba(0,0,0,0.15);}

/* ── Footer ── */
.page-footer{
  text-align:center;padding:1rem 1rem 2.5rem;
  font-size:11px;color:#ccc;letter-spacing:1px;font-weight:300;
  position:relative;z-index:1;
}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<header class="page-header">
  <a href="../luna-korean/index.html" class="back-btn">
    <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
    국어
  </a>
  <div class="title-main">고사성어 500</div>
  <div class="title-sub">四字成語 &middot; 이야기로 배우는 지혜</div>
  <div class="title-divider"></div>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<nav class="cat-pills" id="catPills">
  <button class="cat-pill active" data-level="all">전체</button>
</nav>

<main class="books-grid" id="booksGrid"></main>

<footer class="page-footer">LUNA WHALE ART LAB &copy; 2026</footer>

<script>
(function(){
  const grid = document.getElementById('booksGrid');
  const pills = document.getElementById('catPills');

  /* 7-level fallback if data only has 3 levels */
  const LEVELS_7 = [
    { id:'elem',   label:'초등',       color:'#10b981', icon:'\u{1F331}', total:100 },
    { id:'mid1',   label:'중등 Lv.1',  color:'#3b82f6', icon:'\u{1F4D6}', total:75  },
    { id:'mid2',   label:'중등 Lv.2',  color:'#6366f1', icon:'\u{1F4DA}', total:75  },
    { id:'high1',  label:'고등 Lv.1',  color:'#8b5cf6', icon:'\u{1F3DB}', total:75  },
    { id:'high2',  label:'고등 Lv.2',  color:'#a855f7', icon:'\u{1F3AF}', total:75  },
    { id:'univ1',  label:'대학 Lv.1',  color:'#ec4899', icon:'\u{1F393}', total:50  },
    { id:'univ2',  label:'대학 Lv.2',  color:'#f43f5e', icon:'\u{1F451}', total:50  },
  ];

  /* Use IDIOM_LEVELS from data if it has 7 levels, else use fallback mapping */
  const levels = (typeof IDIOM_LEVELS !== 'undefined' && IDIOM_LEVELS.length >= 7)
    ? IDIOM_LEVELS
    : LEVELS_7;

  /* Map old 3-level data to new 7-level structure */
  function getLessons(levelId) {
    if (typeof IDIOM_LESSONS !== 'undefined') {
      if (IDIOM_LESSONS[levelId]) return IDIOM_LESSONS[levelId];
      /* fallback mapping: easy→elem, mid→mid1, hard→high1 */
      if (levelId === 'elem' && IDIOM_LESSONS['easy']) return IDIOM_LESSONS['easy'];
      if (levelId === 'mid1' && IDIOM_LESSONS['mid']) return IDIOM_LESSONS['mid'];
      if (levelId === 'high1' && IDIOM_LESSONS['hard']) return IDIOM_LESSONS['hard'];
    }
    return [];
  }

  /* 색상 팔레트 — warm amber/parchment tones */
  const PALETTES = [
    ['#fef9ef','#fbecd0'], ['#fdf6e3','#f5e6c8'], ['#faf5eb','#efe0c3'],
    ['#f8f4ee','#eee3cc'], ['#fef7e8','#f9e4b8'], ['#fdf5e6','#f3dbb5'],
    ['#faf3e8','#ebdbc5'], ['#fcf8f0','#f0e2c8'], ['#fef9f0','#f6e8cd'],
    ['#f9f5ed','#ecdcc2'], ['#fdf8f0','#f2e1c0'], ['#fbf6ec','#eedbc4'],
    ['#fef8ed','#f4dfbe'], ['#f8f3ea','#e9d8c0'], ['#fcf7ee','#f0dec5'],
  ];

  /* 레벨 필터 버튼 생성 */
  levels.forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.level = lv.id;
    btn.textContent = lv.icon + ' ' + lv.label + ' (' + lv.total + ')';
    pills.appendChild(btn);
  });

  /* 전체 데이터 수집 */
  let allCards = [];
  let totalReady = 0;
  let totalLessons = 0;

  levels.forEach(lv => {
    const lessons = getLessons(lv.id);
    totalLessons += lv.total;
    lessons.forEach(lesson => {
      if (lesson.ready) totalReady++;
      allCards.push({ ...lesson, levelId: lv.id, levelInfo: lv });
    });
  });

  /* 진행바 */
  const pct = totalLessons > 0 ? (totalReady / totalLessons * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = totalReady + ' / ' + totalLessons + ' lessons ready';

  /* 카드 렌더 */
  function renderCards(filter) {
    grid.innerHTML = '';
    const cards = filter === 'all' ? allCards : allCards.filter(c => c.levelId === filter);

    if (cards.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#bbb;font-size:.9rem;">준비 중이에요</div>';
      return;
    }

    cards.forEach((lesson, idx) => {
      const pal = PALETTES[idx % PALETTES.length];
      const a = document.createElement('a');
      a.className = 'book-card';
      a.href = 'idiom-lesson.html?level=' + lesson.levelId + '&lesson=' + lesson.id;

      /* localStorage progress */
      let uploadCount = 0;
      try { uploadCount = JSON.parse(localStorage.getItem('idiom-gallery-' + lesson.levelId + '-' + lesson.id) || '[]').length; } catch(e){}

      const idiomText = lesson.idiom || lesson.hanja || '';
      const readingText = lesson.reading || '';
      const meaningText = lesson.shortMeaning || lesson.meaning || '';
      const accentColor = lesson.levelInfo.color || '#d4a032';

      a.innerHTML =
        '<div class="book-accent" style="background:' + accentColor + ';"></div>' +
        '<div class="book-bg" style="background:linear-gradient(135deg,' + pal[0] + ',' + pal[1] + ');"></div>' +
        '<div class="book-vignette"></div>' +
        '<div class="book-idiom">' + idiomText + '</div>' +
        (lesson.ready ? '<div class="book-dot"></div>' : '') +
        '<span class="book-badge" style="' + (uploadCount > 0 ? '' : 'background:rgba(0,0,0,.12);') + '">' + uploadCount + '</span>' +
        '<div class="book-text">' +
          '<span class="book-num">' + lesson.levelId.toUpperCase() + ' \u2014 ' + String(lesson.id).padStart(2,'0') + '</span>' +
          '<span class="book-reading">' + readingText + '</span>' +
          '<span class="book-meaning">' + meaningText + '</span>' +
        '</div>';

      grid.appendChild(a);
    });
  }

  renderCards('all');

  /* 필터 클릭 */
  pills.addEventListener('click', function(e) {
    var btn = e.target.closest('.cat-pill');
    if (!btn) return;
    pills.querySelectorAll('.cat-pill').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderCards(btn.dataset.level);
  });
})();
</script>
</body>
</html>
