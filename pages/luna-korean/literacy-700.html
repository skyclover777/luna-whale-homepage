<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>어원 사전 900 — Luna Whale</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="../../assets/data/hanja-data.js?v=2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Gothic A1','Noto Sans KR',sans-serif;
  background:#f5f2ec;
  min-height:100vh;overflow-x:hidden;color:#2c2c2c;
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;opacity:0.25;
}
body::before{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(167,243,208,0.5),transparent 70%);
  top:-100px;right:-100px;animation:fb1 12s ease-in-out infinite;
}
body::after{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(253,230,138,0.5),transparent 70%);
  bottom:-80px;left:-80px;animation:fb2 15s ease-in-out infinite;
}
@keyframes fb1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,40px) scale(1.1);}}
@keyframes fb2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.15);}}

/* ── Header ── */
.page-header{
  position:relative;text-align:center;
  padding:3rem 1rem 1.5rem;z-index:1;
}
.back-btn{
  position:absolute;left:1rem;top:1.8rem;
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:20px;
  background:transparent;border:1px solid #d5d0c8;
  font-size:12px;font-weight:400;color:#888;
  text-decoration:none;transition:all .2s;letter-spacing:0.5px;
}
.back-btn:hover{border-color:#999;color:#555;transform:translateY(-1px);}
.title-en{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.6rem);font-weight:700;
  letter-spacing:3px;color:#2c2c2c;margin-bottom:6px;
}
.title-kr{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(0.75rem,2vw,0.95rem);font-weight:400;
  color:#999;letter-spacing:2px;
}
.title-divider{width:40px;height:1px;background:#ccc;margin:14px auto 0;}

/* ── Progress ── */
.progress-wrap{
  max-width:360px;margin:1.2rem auto 0.6rem;padding:0 1rem;text-align:center;
}
.progress-bar{height:2px;background:#e8e4df;border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:#6bb896;border-radius:1px;transition:width .6s ease;}
.progress-label{font-size:11px;color:#bbb;margin-top:6px;letter-spacing:0.5px;font-weight:300;}

/* ── Level pills ── */
.cat-pills{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin:1.2rem auto 1.5rem;padding:0 1rem;max-width:700px;z-index:1;position:relative;
}
.cat-pill{
  font-size:11px;font-weight:400;color:#aaa;
  padding:5px 14px;border:1px solid #ddd;border-radius:20px;
  background:transparent;cursor:pointer;transition:all .2s;letter-spacing:0.5px;
}
.cat-pill:hover{color:#666;border-color:#bbb;}
.cat-pill.active{color:#2c6e4f;border-color:#2c6e4f;background:rgba(44,110,79,.06);}

/* ── Cards grid ── */
.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:16px;padding:0 20px 3rem;max-width:1100px;margin:0 auto;
  position:relative;z-index:1;
}
@media(min-width:640px){.books-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px;}}
@media(min-width:960px){.books-grid{grid-template-columns:repeat(6,1fr);gap:20px;}}
@media(max-width:400px){.books-grid{grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 2rem;}}

/* ── Hanja card ── */
.book-card{
  position:relative;aspect-ratio:3/4;border-radius:8px;
  overflow:hidden;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:transform .35s cubic-bezier(.23,1,.32,1),box-shadow .35s ease;
  text-decoration:none;display:block;
}
.book-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,0.1);}

.book-bg{position:absolute;inset:0;}
.book-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.06) 100%);
  pointer-events:none;
}

/* 한자 대형 표시 */
.book-hanja{
  position:absolute;
  top:42%;left:50%;transform:translate(-50%,-50%);
  font-family:'Noto Serif KR',serif;
  font-size:clamp(32px,7vw,44px);font-weight:900;
  color:rgba(0,0,0,0.1);line-height:1.1;
  z-index:1;pointer-events:none;
  text-align:center;white-space:nowrap;
}

.book-text{
  position:absolute;bottom:10px;left:0;right:0;
  text-align:center;z-index:2;
}
.book-num{
  display:block;font-family:'Playfair Display',serif;
  font-size:10px;font-weight:400;color:rgba(0,0,0,0.3);
  letter-spacing:2px;margin-bottom:2px;
}
.book-reading{
  display:block;font-family:'Noto Serif KR',serif;
  font-size:clamp(12px,2vw,14px);font-weight:700;
  color:rgba(0,0,0,0.55);letter-spacing:1px;
}
.book-meaning{
  display:block;font-size:10px;font-weight:400;
  color:rgba(0,0,0,0.35);margin-top:1px;letter-spacing:0.5px;
}

/* 업로드 카운트 */
.book-badge{
  position:absolute;top:6px;right:8px;z-index:3;
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;border-radius:9px;
  background:rgba(16,185,129,.8);color:#fff;
  font-size:9px;font-weight:700;padding:0 5px;
}

/* Ready dot */
.book-dot{
  position:absolute;top:6px;left:8px;z-index:2;
  width:6px;height:6px;border-radius:50%;background:#8fbc8f;opacity:0.7;
}

/* Lock overlay */
.book-lock{
  position:absolute;inset:0;z-index:3;
  background:rgba(245,242,236,0.5);
  display:flex;align-items:center;justify-content:center;
}
.book-lock .material-symbols-outlined{font-size:20px;color:rgba(0,0,0,0.15);}

/* ── Footer ── */
.page-footer{
  text-align:center;padding:1rem 1rem 2.5rem;
  font-size:11px;color:#ccc;letter-spacing:1px;font-weight:300;
  position:relative;z-index:1;
}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<header class="page-header">
  <a href="../main/classes.html" class="back-btn">
    <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
    수업 목록
  </a>
  <div class="title-en" style="font-family:'Noto Serif KR',serif;letter-spacing:6px;">어원 사전 900</div>
  <div class="title-kr">그림으로 그리는 한자 문해력</div>
  <div class="title-divider"></div>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<nav class="cat-pills" id="catPills">
  <button class="cat-pill active" data-level="all">전체</button>
</nav>

<main class="books-grid" id="booksGrid"></main>

<footer class="page-footer">LUNA WHALE ART LAB &copy; 2026</footer>

<script>
(function(){
  const grid = document.getElementById('booksGrid');
  const pills = document.getElementById('catPills');

  /* 색상 팔레트 — 파스텔 톤 */
  const PALETTES = [
    ['#e8f5e9','#c8e6c9'], ['#e0f2f1','#b2dfdb'], ['#f3e5f5','#e1bee7'],
    ['#fff3e0','#ffe0b2'], ['#e3f2fd','#bbdefb'], ['#fce4ec','#f8bbd0'],
    ['#f1f8e9','#dcedc8'], ['#e8eaf6','#c5cae9'], ['#fff8e1','#ffecb3'],
    ['#e0f7fa','#b2ebf2'], ['#fbe9e7','#ffccbc'], ['#ede7f6','#d1c4e9'],
    ['#f9fbe7','#f0f4c3'], ['#efebe9','#d7ccc8'], ['#eceff1','#cfd8dc'],
  ];

  /* 레벨 필터 버튼 생성 */
  HANJA_LEVELS.forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.level = lv.id;
    btn.textContent = lv.icon + ' ' + lv.label;
    pills.appendChild(btn);
  });

  /* 전체 데이터 수집 */
  let allCards = [];
  let totalReady = 0;
  let totalLessons = 0;

  HANJA_LEVELS.forEach(lv => {
    const lessons = HANJA_LESSONS[lv.id] || [];
    totalLessons += lv.total;
    lessons.forEach(lesson => {
      if (lesson.ready) totalReady++;
      allCards.push({ ...lesson, levelId: lv.id, levelInfo: lv });
    });
  });

  /* 진행바 */
  const pct = totalLessons > 0 ? (totalReady / totalLessons * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = totalReady + ' / ' + totalLessons + ' lessons ready';

  /* 카드 렌더 */
  function renderCards(filter) {
    grid.innerHTML = '';
    const cards = filter === 'all' ? allCards : allCards.filter(c => c.levelId === filter);

    if (cards.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#bbb;font-size:.9rem;">준비 중이에요 🚧</div>';
      return;
    }

    cards.forEach((lesson, idx) => {
      const pal = PALETTES[idx % PALETTES.length];
      const a = document.createElement('a');
      a.className = 'book-card';
      a.href = `hanja-lesson.html?level=${lesson.levelId}&lesson=${lesson.id}`;

      // 업로드 카운트
      let uploadCount = 0;
      try { uploadCount = JSON.parse(localStorage.getItem(`hanja-gallery-${lesson.levelId}-${lesson.id}`) || '[]').length; } catch(e){}

      a.innerHTML = `
        <div class="book-bg" style="background:linear-gradient(135deg,${pal[0]},${pal[1]});"></div>
        <div class="book-vignette"></div>
        <div class="book-hanja">${lesson.hanja}</div>
        <div class="book-dot"></div>
        <span class="book-badge" style="${uploadCount > 0 ? '' : 'background:rgba(0,0,0,.12);'}">${uploadCount}</span>
        <div class="book-text">
          <span class="book-num">${lesson.levelId.replace('elem','E').replace('mid','M').replace('high','H').toUpperCase()} — ${String(lesson.id).padStart(2,'0')}</span>
          <span class="book-reading">${lesson.reading}</span>
          <span class="book-meaning">${lesson.word}</span>
        </div>
      `;
      grid.appendChild(a);
    });
  }

  renderCards('all');

  /* 필터 클릭 */
  pills.addEventListener('click', e => {
    const btn = e.target.closest('.cat-pill');
    if (!btn) return;
    pills.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.level);
  });
})();
</script>
</body>
</html>
