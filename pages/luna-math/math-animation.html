<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 애니메이션 - Luna Math</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--gold:#e3a008;--gold2:#ca8a04;
  --text:#c9d1d9;--dim:#6e7681;--green:#22c55e;--red:#f85149;
  --blue:#58a6ff;--radius:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable',sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}

/* Header */
.header{
  display:flex;align-items:center;gap:16px;padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
  background:var(--bg);z-index:100;height:52px;
}
.back-btn{background:transparent;border:none;color:var(--text);padding:8px 0;font-size:14px;font-weight:600;opacity:0.7;transition:all .2s}
.back-btn:hover{opacity:1}
.header-title{font-size:14px;font-weight:600;color:var(--gold);letter-spacing:0.5px;white-space:nowrap}
.header-sep{flex:1}
.nav-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  transition:all .15s;white-space:nowrap;text-decoration:none;
}
.nav-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.nav-btn.active{background:rgba(227,160,8,0.15);border-color:var(--gold);color:var(--gold)}

/* Main */
.main{display:flex;flex:1;overflow:hidden}

/* Graph area */
.graph-area{flex:1;position:relative;background:#1e293b;overflow:hidden}
#graphCanvas{display:block;position:absolute;top:0;left:0;touch-action:none}

/* Side panel */
.side-panel{
  width:320px;flex-shrink:0;background:var(--card);
  border-left:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-section{padding:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.panel-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:8px}

/* Formula input */
.formula-list{flex:1;overflow-y:auto;padding:0}
.formula-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;
}
.formula-row:hover{background:rgba(255,255,255,0.03)}
.formula-color{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);transition:transform .15s;
}
.formula-color:hover{transform:scale(1.2)}
.formula-input{
  flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;padding:6px 10px;color:var(--text);font-size:14px;
  font-family:'Pretendard Variable',monospace;outline:none;transition:border-color .15s;
}
.formula-input:focus{border-color:var(--gold)}
.formula-input.error{border-color:var(--red)}
.formula-del{
  background:none;border:none;color:var(--dim);font-size:16px;
  padding:0 4px;opacity:0.5;transition:opacity .15s;
}
.formula-del:hover{opacity:1;color:var(--red)}
.formula-vis{
  background:none;border:none;font-size:14px;padding:0 2px;
  opacity:0.7;transition:opacity .15s;cursor:pointer;
}
.formula-vis:hover{opacity:1}
.formula-vis.off{opacity:0.2}

/* Add button */
.add-formula{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;color:var(--gold);font-size:12px;font-weight:600;
  cursor:pointer;border:none;background:none;width:100%;
  transition:background .15s;
}
.add-formula:hover{background:rgba(245,158,11,0.08)}

/* Controls */
.controls{padding:12px;border-top:1px solid rgba(255,255,255,0.06)}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctrl-label{font-size:11px;color:var(--dim);min-width:24px;font-weight:600}
.ctrl-slider{
  flex:1;-webkit-appearance:none;appearance:none;height:4px;
  background:rgba(255,255,255,0.15);border-radius:2px;outline:none;
}
.ctrl-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--gold);cursor:pointer;
}
.ctrl-value{font-size:12px;color:var(--text);min-width:48px;text-align:right;font-weight:600}

/* Play controls */
.play-bar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:rgba(0,0,0,0.2);border-radius:8px;margin-top:4px;
}
.play-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--gold);color:#000;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.play-btn:hover{transform:scale(1.1)}
.time-slider{flex:1}
.time-label{font-size:12px;color:var(--dim);min-width:50px;text-align:right;font-weight:600}

/* Presets / Library */
.library{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.lib-tabs{
  display:flex;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);
}
.lib-tab{
  flex:1;padding:8px 0;border:none;background:none;color:var(--dim);
  font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;
  border-bottom:2px solid transparent;
}
.lib-tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.lib-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,158,11,0.05)}
.lib-content{flex:1;overflow-y:auto;padding:4px 0}
.lib-content::-webkit-scrollbar{width:4px}
.lib-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.lib-group{margin-bottom:2px}
.lib-group-header{
  display:flex;align-items:center;gap:6px;padding:6px 12px;cursor:pointer;
  font-size:11px;font-weight:700;color:var(--dim);letter-spacing:0.5px;
  transition:all .12s;user-select:none;
}
.lib-group-header:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.lib-group-header .arrow{font-size:10px;transition:transform .2s;display:inline-block}
.lib-group-header.open .arrow{transform:rotate(90deg)}
.lib-group-header .count{
  font-size:10px;color:var(--dim);background:rgba(255,255,255,0.06);
  padding:1px 6px;border-radius:8px;margin-left:auto;
}
.lib-items{display:none;padding:2px 8px 6px 8px}
.lib-items.open{display:flex;flex-wrap:wrap;gap:4px}
.lib-item{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  color:var(--text);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;line-height:1.3;
}
.lib-item:hover{background:rgba(245,158,11,0.12);border-color:var(--gold);color:var(--gold)}
.lib-item .li-desc{font-size:10px;color:var(--dim);font-weight:400;display:block;margin-top:1px}
.lib-item:hover .li-desc{color:rgba(245,158,11,0.6)}

/* Calc buttons */
.calc-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:8px;
}
.calc-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  color:var(--text);padding:6px 2px;border-radius:6px;font-size:12px;font-weight:600;
  transition:all .12s;text-align:center;
}
.calc-btn:hover{background:rgba(245,158,11,0.15);color:var(--gold)}
.calc-btn.fn{color:var(--blue)}
.calc-btn.op{color:var(--gold)}

/* Toast */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(245,158,11,0.9);color:#000;padding:8px 20px;border-radius:20px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;
  transition:all .3s;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Hint bar */
.hint-bar{
  height:28px;display:flex;align-items:center;padding:0 16px;
  background:var(--bg);border-top:1px solid rgba(255,255,255,0.06);
  font-size:11px;color:var(--dim);flex-shrink:0;gap:16px;
}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">← Luna Math</button>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <div class="header-title">수학 애니메이션</div>
    <div class="header-sep"></div>
    <a class="nav-btn" href="math-canvas.html">🎨 그림판</a>
    <a class="nav-btn active" href="math-animation.html">📈 애니메이션</a>
  </div>

  <div class="main">
    <div class="graph-area" id="graphArea">
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="side-panel">
      <!-- Formula + Controls (compact) -->
      <div class="panel-section" style="padding:8px 12px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <div class="panel-title" style="margin:0;flex:1">현재 수식</div>
          <button class="add-formula" style="width:auto;padding:3px 10px;font-size:11px" onclick="addFormula()">+ 추가</button>
        </div>
        <div id="formulaList"></div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <button class="play-btn" id="playBtn" onclick="togglePlay()" style="width:28px;height:28px;font-size:12px">▶</button>
          <input type="range" class="ctrl-slider" id="timeSlider" min="0" max="100" value="0" oninput="onTimeSlider()" style="flex:1">
          <span style="font-size:11px;color:var(--dim);min-width:44px;text-align:right;font-weight:600" id="timeLabel">t = 0.00</span>
          <input type="range" class="ctrl-slider" id="speedSlider" min="1" max="50" value="10" style="width:50px" title="속도">
        </div>
      </div>

      <!-- Library (main area) -->
      <div class="library">
        <div class="lib-tabs">
          <button class="lib-tab active" data-level="elementary" onclick="setLibTab('elementary')">초등</button>
          <button class="lib-tab" data-level="middle" onclick="setLibTab('middle')">중등</button>
          <button class="lib-tab" data-level="high" onclick="setLibTab('high')">고등</button>
          <button class="lib-tab" data-level="fun" onclick="setLibTab('fun')">재미</button>
        </div>
        <div class="lib-content" id="libContent"></div>
      </div>

      <!-- Hidden calc grid (toggle) -->
      <div class="panel-section" style="padding:6px 12px;border-top:1px solid rgba(255,255,255,0.06)">
        <div style="display:flex;align-items:center;cursor:pointer" onclick="toggleCalc()">
          <span class="panel-title" style="margin:0;flex:1">계산기</span>
          <span id="calcArrow" style="font-size:10px;color:var(--dim)">▲</span>
        </div>
        <div class="calc-grid" id="calcGrid" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="hint-bar">
    <span>수식에 <b>t</b>를 넣으면 시간에 따라 애니메이션 | 마우스 휠: 줌 | 드래그: 이동</span>
    <span style="margin-left:auto" id="cursorInfo"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

      {name:'타원', desc:'x²/9 + y²/4 = 1', formulas:['2*sqrt(1-x^2/9)','-2*sqrt(1-x^2/9)']},
      {name:'쌍곡선', desc:'x²/4 - y²/1 = 1', formulas:['sqrt(x^2/4-1)','-sqrt(x^2/4-1)']},
    ]},
    { group: '극좌표와 매개변수', items: [
      {name:'나선', desc:'점점 커지는 원', formulas:['x*sin(x)/10','x*cos(x)/10']},
      {name:'사이클로이드', desc:'굴러가는 바퀴', formulas:['x-sin(x+t)','1-cos(x+t)'], anim:true},
      {name:'리사주 곡선', desc:'x:y 진동수 비', formulas:['sin(3*x+t)','sin(2*x)'], anim:true},
      {name:'장미 곡선', desc:'꽃잎 모양', formulas:['cos(3*x)*cos(x)','cos(3*x)*sin(x)']},
    ]},
  ],
  fun: [
    { group: '아름다운 곡선', items: [
      {name:'하트 곡선', desc:'사랑의 수학', formulas:['sqrt(abs(x))+sqrt(1-x^2)*0.8','-sqrt(abs(x))-sqrt(1-x^2)*0.8']},
      {name:'무한대 ∞', desc:'렘니스케이트', formulas:['sqrt(abs(2*cos(2*x)))*cos(x)','sqrt(abs(2*cos(2*x)))*sin(x)']},
      {name:'별 모양', desc:'뾰족한 곡선', formulas:['cos(x)^3','sin(x)^3']},
      {name:'나비 곡선', desc:'복잡한 아름다움', formulas:['sin(x)*(exp(cos(x))-2*cos(4*x))','cos(x)*(exp(cos(x))-2*cos(4*x))']},
    ]},
    { group: '물리 시뮬레이션', items: [
      {name:'자유낙하', desc:'중력 가속도', formulas:['-0.5*x^2 + 5']},
      {name:'포물선 운동', desc:'공 던지기', formulas:['-0.1*(x-t)^2 + 5'], anim:true},
      {name:'감쇠진동', desc:'마찰이 있는 용수철', formulas:['exp(-abs(x)/3)*sin(x*3+t)'], anim:true},
      {name:'도플러 효과', desc:'파장이 변하는 파동', formulas:['sin((x+t)*3/(1+0.3*cos(t)))'], anim:true},
      {name:'중첩 원리', desc:'파동의 합', formulas:['sin(x+t)+sin(1.5*x+t)','sin(x+t)','sin(1.5*x+t)'], anim:true},
    ]},
    { group: '소리와 음악', items: [
      {name:'순음 (라)', desc:'440Hz 사인파', formulas:['sin(x*6.28)']},
      {name:'화음', desc:'도미솔 화음', formulas:['sin(x)+sin(x*1.25)+sin(x*1.5)']},
      {name:'비트 현상', desc:'가까운 주파수 간섭', formulas:['sin(10*x+t)+sin(10.5*x+t)'], anim:true},
      {name:'사각파', desc:'디지털 신호', formulas:['sin(x)+sin(3*x)/3+sin(5*x)/5+sin(7*x)/7']},
    ]},
  ],
};

// ─── State ─────────────────────────────────────────
let canvas, ctx, graphArea;
let W = 800, H = 600;
let zoom = 40; // pixels per unit
let panX = 0, panY = 0; // in pixels, center offset
let formulas = [];
let nextId = 0;
let t = 0, playing = false, speed = 1.0;
let graphRange = 10; // x range ±
let isPanning = false, panStart = null, panStartPan = null;
let focusedFormulaId = null;
// Touch
let lastTouchDist = 0, lastTouchMid = null;

// ─── Formula Object ────────────────────────────────
function createFormula(expr = '') {
  return {
    id: nextId++,
    expr,
    color: COLORS[formulas.length % COLORS.length],
    visible: true,
    compiled: null,
    error: false,
  };
}

// ─── Safe Math Parser ──────────────────────────────
function compileMath(expr) {
  if (!expr.trim()) return null;
  try {
    // Replace math notation
    let s = expr
      .replace(/\bPI\b/g, 'Math.PI')
      .replace(/\bE\b/g, 'Math.E')
      .replace(/\bsin\b/g, 'Math.sin')
      .replace(/\bcos\b/g, 'Math.cos')
      .replace(/\btan\b/g, 'Math.tan')
      .replace(/\basin\b/g, 'Math.asin')
      .replace(/\bacos\b/g, 'Math.acos')
      .replace(/\batan\b/g, 'Math.atan')
      .replace(/\bsqrt\b/g, 'Math.sqrt')
      .replace(/\blogs?\b/g, 'Math.log10')
      .replace(/\bln\b/g, 'Math.log')
      .replace(/\babs\b/g, 'Math.abs')
      .replace(/\bfloor\b/g, 'Math.floor')
      .replace(/\bceil\b/g, 'Math.ceil')
      .replace(/\bexp\b/g, 'Math.exp')
      .replace(/\^/g, '**');
    // Validate — only allow safe chars
    if (/[^0-9x t+\-*/().,%&|!<>=?:Math.sincoatqlgbrfep **\n\r]/.test(s)) return null;
    const fn = new Function('x', 't', `"use strict"; try { return (${s}); } catch(e) { return NaN; }`);
    fn(0, 0); // test
    return fn;
  } catch (e) {
    return null;
  }
}

// ─── Init ──────────────────────────────────────────
function init() {
  canvas = document.getElementById('graphCanvas');
  ctx = canvas.getContext('2d');
  graphArea = document.getElementById('graphArea');
  resizeCanvas();

  const ro = new ResizeObserver(() => resizeCanvas());
  ro.observe(graphArea);

  // Mouse events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, {passive: false});
  // Touch events
  canvas.addEventListener('touchstart', onTouchStart, {passive: false});
  canvas.addEventListener('touchmove', onTouchMove, {passive: false});
  canvas.addEventListener('touchend', onTouchEnd, {passive: false});

  // Build UI
  buildCalcGrid();
  buildLibrary('elementary');
  addFormula('sin(x + t)');

  // Speed slider
  document.getElementById('speedSlider').addEventListener('input', (e) => {
    speed = e.target.value / 10;
  });

  requestAnimationFrame(loop);
}

function resizeCanvas() {
  const rect = graphArea.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

// ─── UI Build ──────────────────────────────────────
function buildCalcGrid() {
  const grid = document.getElementById('calcGrid');
  CALC_BUTTONS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'calc-btn' + (b.c ? ' ' + b.c : '');
    btn.textContent = b.l;
    btn.addEventListener('click', () => onCalcBtn(b.v));
    grid.appendChild(btn);
  });
}

let currentLibTab = 'elementary';

function setLibTab(level) {
  currentLibTab = level;
  document.querySelectorAll('.lib-tab').forEach(t => t.classList.toggle('active', t.dataset.level === level));
  buildLibrary(level);
}
window.setLibTab = setLibTab;

function buildLibrary(level) {
  const content = document.getElementById('libContent');
  content.innerHTML = '';
  const groups = LIBRARY[level] || [];
  groups.forEach((g, gi) => {
    const grp = document.createElement('div');
    grp.className = 'lib-group';
    const totalItems = g.items.length;
    const header = document.createElement('div');
    header.className = 'lib-group-header' + (gi === 0 ? ' open' : '');
    header.innerHTML = `<span class="arrow">▶</span> ${g.group} <span class="count">${totalItems}</span>`;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      items.classList.toggle('open');
    });
    const items = document.createElement('div');
    items.className = 'lib-items' + (gi === 0 ? ' open' : '');
    g.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'lib-item';
      btn.innerHTML = `${item.name}${item.anim ? ' ▶' : ''}<span class="li-desc">${item.desc}</span>`;
      btn.addEventListener('click', () => loadPreset(item));
      items.appendChild(btn);
    });
    grp.appendChild(header);
    grp.appendChild(items);
    content.appendChild(grp);
  });
}

function toggleCalc() {
  const grid = document.getElementById('calcGrid');
  const arrow = document.getElementById('calcArrow');
  const show = grid.style.display === 'none';
  grid.style.display = show ? 'grid' : 'none';
  arrow.textContent = show ? '▼' : '▲';
}
window.toggleCalc = toggleCalc;

function loadPreset(preset) {
  formulas = [];
  preset.formulas.forEach(f => {
    const fo = createFormula(f);
    fo.compiled = compileMath(f);
    formulas.push(fo);
  });
  t = 0;
  document.getElementById('timeSlider').value = 0;
  updateTimeLabel();
  renderFormulaList();
  // Auto-play animation presets
  if (preset.anim && !playing) {
    playing = true;
    document.getElementById('playBtn').textContent = '⏸';
    lastTime = performance.now();
  } else if (!preset.anim && playing) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶';
  }
  showToast('📈 ' + preset.name);
}

// ─── Formula List UI ───────────────────────────────
function addFormula(expr = '') {
  const f = createFormula(expr);
  f.compiled = compileMath(expr);
  formulas.push(f);
  renderFormulaList();
  // Focus new input
  setTimeout(() => {
    const input = document.querySelector(`.formula-input[data-id="${f.id}"]`);
    if (input) { input.focus(); focusedFormulaId = f.id; }
  }, 50);
}
window.addFormula = addFormula;

function renderFormulaList() {
  const list = document.getElementById('formulaList');
  list.innerHTML = '';
  formulas.forEach((f, idx) => {
    const row = document.createElement('div');
    row.className = 'formula-row';
    row.innerHTML = `
      <div class="formula-color" style="background:${f.color}" onclick="cycleColor(${f.id})"></div>
      <span style="font-size:12px;color:var(--dim);font-weight:600;min-width:20px">y${formulas.length > 1 ? idx+1 : ''} =</span>
      <input class="formula-input${f.error ? ' error' : ''}" data-id="${f.id}" value="${escHtml(f.expr)}" placeholder="sin(x + t)" spellcheck="false">
      <button class="formula-vis${f.visible ? '' : ' off'}" onclick="toggleVis(${f.id})">${f.visible ? '👁' : '👁‍🗨'}</button>
      <button class="formula-del" onclick="delFormula(${f.id})">×</button>
    `;
    list.appendChild(row);
    const input = row.querySelector('.formula-input');
    input.addEventListener('input', (e) => onFormulaInput(f.id, e.target.value, e.target));
    input.addEventListener('focus', () => { focusedFormulaId = f.id; });
    input.addEventListener('blur', () => { focusedFormulaId = null; });
  });
}

function escHtml(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function onFormulaInput(id, val, el) {
  const f = formulas.find(f => f.id === id);
  if (!f) return;
  f.expr = val;
  f.compiled = compileMath(val);
  f.error = val.trim() && !f.compiled;
  el.classList.toggle('error', f.error);
}

function delFormula(id) {
  formulas = formulas.filter(f => f.id !== id);
  renderFormulaList();
}
window.delFormula = delFormula;

function toggleVis(id) {
  const f = formulas.find(f => f.id === id);
  if (f) { f.visible = !f.visible; renderFormulaList(); }
}
window.toggleVis = toggleVis;

function cycleColor(id) {
  const f = formulas.find(f => f.id === id);
  if (!f) return;
  const idx = COLORS.indexOf(f.color);
  f.color = COLORS[(idx + 1) % COLORS.length];
  renderFormulaList();
}
window.cycleColor = cycleColor;

function onCalcBtn(v) {
  if (v === 'OK') return;
  const input = focusedFormulaId !== null
    ? document.querySelector(`.formula-input[data-id="${focusedFormulaId}"]`)
    : document.querySelector('.formula-input');
  if (!input) return;
  input.focus();
  if (v === 'DEL') {
    const pos = input.selectionStart;
    if (pos > 0) {
      const val = input.value;
      input.value = val.slice(0, pos - 1) + val.slice(pos);
      input.setSelectionRange(pos - 1, pos - 1);
    }
  } else {
    const pos = input.selectionStart;
    const val = input.value;
    input.value = val.slice(0, pos) + v + val.slice(pos);
    const newPos = pos + v.length;
    input.setSelectionRange(newPos, newPos);
  }
  input.dispatchEvent(new Event('input'));
}

// ─── Animation ─────────────────────────────────────
let lastTime = 0;

function togglePlay() {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
  if (playing) lastTime = performance.now();
}
window.togglePlay = togglePlay;

function onTimeSlider() {
  const v = +document.getElementById('timeSlider').value;
  t = v / 100 * 20; // 0-100 → 0-20
  updateTimeLabel();
}
window.onTimeSlider = onTimeSlider;

function updateTimeLabel() {
  document.getElementById('timeLabel').textContent = 't = ' + t.toFixed(2);
}

// ─── Graph Transform ───────────────────────────────
function graphToScreen(gx, gy) {
  return {
    x: W / 2 + panX + gx * zoom,
    y: H / 2 + panY - gy * zoom,
  };
}
function screenToGraph(sx, sy) {
  return {
    x: (sx - W / 2 - panX) / zoom,
    y: -(sy - H / 2 - panY) / zoom,
  };
}

// ─── Mouse Events ──────────────────────────────────
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}

function onMouseDown(e) {
  if (e.button !== 0) return;
  isPanning = true;
  panStart = getMousePos(e);
  panStartPan = {x: panX, y: panY};
}
function onMouseMove(e) {
  const sp = getMousePos(e);
  const gp = screenToGraph(sp.x, sp.y);
  document.getElementById('cursorInfo').textContent =
    `x: ${gp.x.toFixed(2)}  y: ${gp.y.toFixed(2)}`;
  if (isPanning) {
    panX = panStartPan.x + (sp.x - panStart.x);
    panY = panStartPan.y + (sp.y - panStart.y);
  }
}
function onMouseUp() { isPanning = false; }
function onWheel(e) {
  e.preventDefault();
  const sp = getMousePos(e);
  const gBefore = screenToGraph(sp.x, sp.y);
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  zoom = Math.max(2, Math.min(500, zoom * factor));
  // Keep point under cursor
  const sAfter = graphToScreen(gBefore.x, gBefore.y);
  panX += sp.x - sAfter.x;
  panY += sp.y - sAfter.y;
}

// ─── Touch Events ──────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    const [a, b] = [e.touches[0], e.touches[1]];
    lastTouchDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    lastTouchMid = {x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2};
    isPanning = false;
    return;
  }
  if (e.touches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    isPanning = true;
    panStart = {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
    panStartPan = {x: panX, y: panY};
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    const [a, b] = [e.touches[0], e.touches[1]];
    const newDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const newMid = {x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2};
    if (lastTouchDist > 0) {
      const rect = canvas.getBoundingClientRect();
      const sx = newMid.x - rect.left;
      const sy = newMid.y - rect.top;
      const gBefore = screenToGraph(sx, sy);
      zoom = Math.max(2, Math.min(500, zoom * (newDist / lastTouchDist)));
      const sAfter = graphToScreen(gBefore.x, gBefore.y);
      panX += sx - sAfter.x;
      panY += sy - sAfter.y;
    }
    if (lastTouchMid) {
      panX += newMid.x - lastTouchMid.x;
      panY += newMid.y - lastTouchMid.y;
    }
    lastTouchDist = newDist;
    lastTouchMid = newMid;
    return;
  }
  if (e.touches.length === 1 && isPanning) {
    const rect = canvas.getBoundingClientRect();
    const sp = {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
    panX = panStartPan.x + (sp.x - panStart.x);
    panY = panStartPan.y + (sp.y - panStart.y);
  }
}
function onTouchEnd(e) {
  e.preventDefault();
  lastTouchDist = 0;
  lastTouchMid = null;
  if (e.touches.length === 0) isPanning = false;
}

// ─── Render ────────────────────────────────────────
function loop(now) {
  if (playing) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt * speed;
    if (t > 20) t -= 20;
    document.getElementById('timeSlider').value = (t / 20) * 100;
    updateTimeLabel();
  }
  render();
  requestAnimationFrame(loop);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawAxes();
  drawFormulas();
}

function drawGrid() {
  // Adaptive grid
  let gridUnit = 1;
  const pixPerUnit = zoom;
  if (pixPerUnit < 15) gridUnit = 5;
  if (pixPerUnit < 8) gridUnit = 10;
  if (pixPerUnit > 80) gridUnit = 0.5;
  if (pixPerUnit > 200) gridUnit = 0.1;

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;

  const topLeft = screenToGraph(0, 0);
  const bottomRight = screenToGraph(W, H);
  const startX = Math.floor(topLeft.x / gridUnit) * gridUnit;
  const endX = Math.ceil(bottomRight.x / gridUnit) * gridUnit;
  const startY = Math.floor(bottomRight.y / gridUnit) * gridUnit;
  const endY = Math.ceil(topLeft.y / gridUnit) * gridUnit;

  ctx.beginPath();
  for (let gx = startX; gx <= endX; gx += gridUnit) {
    const s = graphToScreen(gx, 0);
    ctx.moveTo(s.x, 0);
    ctx.lineTo(s.x, H);
  }
  for (let gy = startY; gy <= endY; gy += gridUnit) {
    const s = graphToScreen(0, gy);
    ctx.moveTo(0, s.y);
    ctx.lineTo(W, s.y);
  }
  ctx.stroke();
}

function drawAxes() {
  const origin = graphToScreen(0, 0);

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, H);
  ctx.moveTo(0, origin.y); ctx.lineTo(W, origin.y);
  ctx.stroke();

  // Tick labels
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = "11px 'Pretendard Variable', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  let gridUnit = 1;
  if (zoom < 15) gridUnit = 5;
  if (zoom < 8) gridUnit = 10;
  if (zoom > 80) gridUnit = 0.5;
  if (zoom > 200) gridUnit = 0.1;

  // Major ticks every 5 units or every gridUnit
  const majorUnit = gridUnit >= 1 ? gridUnit : 1;
  const topLeft = screenToGraph(0, 0);
  const bottomRight = screenToGraph(W, H);

  for (let gx = Math.ceil(topLeft.x / majorUnit) * majorUnit; gx <= bottomRight.x; gx += majorUnit) {
    if (Math.abs(gx) < 0.001) continue;
    const s = graphToScreen(gx, 0);
    const label = Number.isInteger(gx) ? gx.toString() : gx.toFixed(1);
    ctx.fillText(label, s.x, origin.y + 4);
  }

  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let gy = Math.ceil(bottomRight.y / majorUnit) * majorUnit; gy <= topLeft.y; gy += majorUnit) {
    if (Math.abs(gy) < 0.001) continue;
    const s = graphToScreen(0, gy);
    const label = Number.isInteger(gy) ? gy.toString() : gy.toFixed(1);
    ctx.fillText(label, origin.x - 6, s.y);
  }

  // Origin label
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('0', origin.x - 4, origin.y + 4);
}

function drawFormulas() {
  formulas.forEach(f => {
    if (!f.visible || !f.compiled) return;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    let started = false;
    const step = 1 / zoom; // 1 pixel in graph space
    const topLeft = screenToGraph(0, 0);
    const bottomRight = screenToGraph(W, H);
    const xStart = topLeft.x - step;
    const xEnd = bottomRight.x + step;

    for (let gx = xStart; gx <= xEnd; gx += step) {
      const gy = f.compiled(gx, t);
      if (!isFinite(gy) || Math.abs(gy) > 1e6) {
        started = false;
        continue;
      }
      const s = graphToScreen(gx, gy);
      if (!started) {
        ctx.moveTo(s.x, s.y);
        started = true;
      } else {
        ctx.lineTo(s.x, s.y);
      }
    }
    ctx.stroke();

    // Glow effect
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.lineWidth = 8;
    ctx.stroke();
    ctx.restore();
  });
}

// ─── Toast ─────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── Start ─────────────────────────────────────────
init();

})();
</script>
