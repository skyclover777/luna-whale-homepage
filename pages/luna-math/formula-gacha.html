    <style>

        .pack-math-pattern {
            position: absolute;

            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='25' fill='%23f59e0b' opacity='0.08' font-size='18' font-family='serif'%3E%CF%80%3C/text%3E%3Ctext x='50' y='20' fill='%23f59e0b' opacity='0.06' font-size='16' font-family='serif'%3E%CE%A3%3C/text%3E%3Ctext x='90' y='30' fill='%23f59e0b' opacity='0.07' font-size='14' font-family='serif'%3E%E2%88%AB%3C/text%3E%3Ctext x='20' y='55' fill='%23f59e0b' opacity='0.05' font-size='18' font-family='serif'%3E%E2%88%9A%3C/text%3E%3Ctext x='65' y='60' fill='%23f59e0b' opacity='0.08' font-size='20' font-family='serif'%3E%E2%88%9E%3C/text%3E%3Ctext x='100' y='55' fill='%23f59e0b' opacity='0.06' font-size='15' font-family='serif'%3E%CE%94%3C/text%3E%3Ctext x='35' y='90' fill='%23f59e0b' opacity='0.07' font-size='17' font-family='serif'%3E%CE%B1%3C/text%3E%3Ctext x='75' y='95' fill='%23f59e0b' opacity='0.05' font-size='19' font-family='serif'%3E%CE%B8%3C/text%3E%3Ctext x='5' y='110' fill='%23f59e0b' opacity='0.06' font-size='16' font-family='serif'%3E%CE%BB%3C/text%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ===== CARD RARITY STYLES ===== */
        .card-common {
            border-color: #475569;

        }
        .card-rare {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #1e3a5f, #0c1e3a);
            box-shadow: 0 0 20px rgba(59,130,246,0.25);
        }
        .card-epic {
            border-color: #8b5cf6;
            background: linear-gradient(135deg, #2e1065, #1a0a3e);
            box-shadow: 0 0 25px rgba(139,92,246,0.3);
        }
        .card-legendary {
            border-image: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899, #8b5cf6, #3b82f6, #10b981, #f59e0b) 1;
            border-width: 3px;
            background: linear-gradient(135deg, #1a1207, #0f0a1a);
            box-shadow: 0 0 35px rgba(245,158,11,0.35);
        }

        /* Holographic effect for legendary */
        .legendary-holo::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: linear-gradient(125deg, rgba(255,0,0,0.2) 0%, rgba(255,255,0,0.2) 16%, rgba(0,255,0,0.2) 33%, rgba(0,255,255,0.2) 50%, rgba(0,0,255,0.2) 66%, rgba(255,0,255,0.2) 83%, rgba(255,0,0,0.2) 100%);
            background-size: 250% 250%;
            animation: holo-shimmer 3s infinite linear;
            mix-blend-mode: color-dodge;
            pointer-events: none;
            z-index: 30;
        }

        /* Purple shimmer for epic */
        .epic-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: linear-gradient(115deg, transparent 20%, rgba(139,92,246,0.35) 40%, rgba(168,85,247,0.2) 50%, transparent 60%);
            background-size: 300% 300%;
            animation: foil-shift 4s infinite linear;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 30;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        @keyframes foil-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== FORMULA ART BACKGROUND PATTERNS ===== */
        .formula-bg-geometry {
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(255,255,255,0.02) 30px, rgba(255,255,255,0.02) 31px),
                repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(255,255,255,0.02) 30px, rgba(255,255,255,0.02) 31px);
        }

        .formula-bg-circles {
            background-image:
                radial-gradient(circle at 20% 30%, currentColor 1px, transparent 1px),
                radial-gradient(circle at 60% 70%, currentColor 1.5px, transparent 1.5px),
                radial-gradient(circle at 80% 20%, currentColor 1px, transparent 1px);
            opacity: 0.06;
        }

        /* Card back pattern */
        .card-back-pattern {
            background: #0f1729;
            background-image:
                url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='5' y='20' fill='%23f59e0b' opacity='0.12' font-size='14' font-family='serif'%3E%CF%80%3C/text%3E%3Ctext x='40' y='18' fill='%23f59e0b' opacity='0.09' font-size='12' font-family='serif'%3E%CE%A3%3C/text%3E%3Ctext x='60' y='25' fill='%23f59e0b' opacity='0.1' font-size='13' font-family='serif'%3E%E2%88%AB%3C/text%3E%3Ctext x='15' y='45' fill='%23f59e0b' opacity='0.08' font-size='15' font-family='serif'%3E%E2%88%9A%3C/text%3E%3Ctext x='50' y='50' fill='%23f59e0b' opacity='0.11' font-size='16' font-family='serif'%3E%E2%88%9E%3C/text%3E%3Ctext x='25' y='70' fill='%23f59e0b' opacity='0.09' font-size='14' font-family='serif'%3E%CE%94%3C/text%3E%3Ctext x='65' y='72' fill='%23f59e0b' opacity='0.07' font-size='11' font-family='serif'%3E%CE%B8%3C/text%3E%3C/svg%3E");
        }

        /* Particle burst keyframes */
        @keyframes particle-burst {

        .particle {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            animation: particle-burst 0.8s ease-out forwards;
        }

        /* Shake animation */
        @keyframes pack-shake {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-8px) rotate(-1deg); }
            20% { transform: translateX(8px) rotate(1deg); }
            30% { transform: translateX(-6px) rotate(-0.5deg); }
            40% { transform: translateX(6px) rotate(0.5deg); }
            50% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            70% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
            90% { transform: translateX(-1px); }

        .pack-shaking { animation: pack-shake 0.6s ease-in-out; }

        /* Golden flash overlay */
        @keyframes golden-flash {

        /* Progress bar fill animation */
        @keyframes progress-fill {

        /* Float animation for pack Sigma */
        @keyframes float-sigma {
            0%, 100% { transform: translateY(0); }

        /* Gradient text */
        .text-gradient-gold {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .card-size { width: 180px !important; height: 265px !important; }

<script>
// ── LunaCoin Bridge (standalone pages) ──
window.LunaCoinBridge = {
    _key: 'luna_coins',
    get coins() { return parseInt(localStorage.getItem(this._key) || '0'); },
    spend(amount) {
        const cur = this.coins;
        if (cur < amount) return false;
        localStorage.setItem(this._key, String(cur - amount));
        try {
            const user = firebase.auth().currentUser;
            if (user) firebase.firestore().collection('users').doc(user.uid).update({ coins: cur - amount });
        } catch(e) {}
        return true;
    }
};

<body class="bg-navy-900 text-slate-100 min-h-screen flex flex-col">

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform, AnimatePresence } from 'framer-motion';
        import confetti from 'canvas-confetti';

        // ========== DATABASE ==========
        let formulaDB = [];
        const loadDatabase = async () => {
            try {
                const res = await fetch('../../data/cards/math_formulas.json');
                formulaDB = await res.json();
                console.log('Loaded formula DB:', formulaDB.length, 'cards');
            } catch (e) {
                console.error('Failed to load formula DB', e);
            }
        };

        // ========== GACHA MECHANICS ==========
        const drawByRarity = (rarity, pool = null) => {
            const db = pool || formulaDB;
            const filtered = db.filter(c => c.rarity === rarity);
            if (filtered.length === 0) return db[Math.floor(Math.random() * db.length)];
            return filtered[Math.floor(Math.random() * filtered.length)];
        };

        const drawRandom = (pool) => {
            return pool[Math.floor(Math.random() * pool.length)];
        };

        const pickRarity = (weights) => {
            const r = Math.random();
            let cum = 0;
            for (const [rarity, w] of weights) {
                cum += w;
                if (r < cum) return rarity;
            }
            return weights[weights.length - 1][0];
        };

        const generatePack = (packType) => {
            if (formulaDB.length === 0) return [];
            const pack = [];
            const uid = () => Math.random().toString(36).substr(2,9);

            // Grade-specific pack
            if (packType.startsWith('grade:')) {
                const gradeStr = packType.replace('grade:', '');
                let gradePool;
                if (gradeStr === 'all') {
                    gradePool = formulaDB;
                } else {
                    const grades = gradeStr.split(',');
                    gradePool = formulaDB.filter(c => c.grade && c.grade.some(g => grades.includes(g)));
                }
                if (gradePool.length === 0) gradePool = formulaDB;
                // 3 random cards from grade pool (no rarity weighting, pure random)
                const used = new Set();
                for (let i = 0; i < 3; i++) {
                    let card;
                    let tries = 0;
                    do { card = drawRandom(gradePool); tries++; } while (used.has(card.id) && tries < 20);
                    used.add(card.id);
                    pack.push({ ...card, uid: uid() });
                }
                return pack;
            }

            if (packType === 'basic') {
                // Basic Pack: 2 cards
                const r1 = pickRarity([['Legendary', 0.15], ['Epic', 0.25], ['Rare', 0.30], ['Common', 0.30]]);
                const r2 = pickRarity([['Legendary', 0.02], ['Epic', 0.08], ['Rare', 0.20], ['Common', 0.70]]);
                pack.push({ ...drawByRarity(r1), uid: uid() });
                pack.push({ ...drawByRarity(r2), uid: uid() });
            } else {
                // Legendary Pack: 3 cards
                const r1 = pickRarity([['Legendary', 0.30], ['Epic', 0.35], ['Rare', 0.25], ['Common', 0.10]]);
                const r2 = pickRarity([['Legendary', 0.10], ['Epic', 0.20], ['Rare', 0.30], ['Common', 0.40]]);
                const r3 = pickRarity([['Legendary', 0.02], ['Epic', 0.08], ['Rare', 0.20], ['Common', 0.70]]);
                pack.push({ ...drawByRarity(r1), uid: uid() });
                pack.push({ ...drawByRarity(r2), uid: uid() });
                pack.push({ ...drawByRarity(r3), uid: uid() });
            }
            return pack;
        };

        // ========== SOUND ==========
        const sfxCache = {};
        const playSfx = (key) => {
            const paths = {
                packOpen: '../../assets/sounds/SonSounds/DA - Paper Tear - 3.mp3',
                cardReveal: '../../assets/sounds/SonSounds/DA - Paper Turn - 3.mp3',
                sparkle: '../../assets/sounds/SonSounds/DA - Chimes - 1.mp3',
                rare: '../../assets/sounds/SonSounds/080_깨달음.mp3',
                legendary: '../../assets/sounds/SonSounds/049_띠룽 (슈퍼마리오 코인먹).mp3',
                click: '../../assets/sounds/SonSounds/DA - Pop - 3.mp3',
            };
            try {
                if (!sfxCache[key]) sfxCache[key] = new Audio(paths[key]);
                const a = sfxCache[key];
                a.currentTime = 0;
                a.volume = key === 'legendary' ? 0.7 : 0.5;
                a.play().catch(() => {});
            } catch(e) {}
        };

        // ========== FIREBASE SAVE ==========
        const saveCards = async (cards) => {
            try {
                const user = firebase.auth().currentUser;
                if (!user) return;
                const db = firebase.firestore();
                const batch = db.batch();
                cards.forEach(card => {
                    const ref = db.collection('users').doc(user.uid).collection('math_cards').doc();
                    batch.set(ref, {
                        cardId: card.id,
                        title_ko: card.title_ko,
                        rarity: card.rarity,
                        category: card.category,
                        drawnAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                await batch.commit();
            } catch(e) {
                console.warn('Save failed:', e);
            }
        };

        const loadCollection = async () => {
            try {
                const user = firebase.auth().currentUser;
                if (!user) return new Set();
                const snap = await firebase.firestore()
                    .collection('users').doc(user.uid).collection('math_cards').get();
                const ids = new Set();
                snap.forEach(doc => ids.add(doc.data().cardId));
                return ids;
            } catch(e) { return new Set(); }
        };

        // ========== RARITY HELPERS ==========
        const rarityColors = {
            Common: { border: '#475569', bg: 'from-slate-700 to-slate-900', star: '⬡', textColor: 'text-slate-400' },
            Rare: { border: '#3b82f6', bg: 'from-blue-900 to-blue-950', star: '◆', textColor: 'text-blue-400' },
            Epic: { border: '#8b5cf6', bg: 'from-purple-900 to-purple-950', star: '◆◆', textColor: 'text-purple-400' },
            Legendary: { border: '#f59e0b', bg: 'from-amber-900 to-amber-950', star: '★★★', textColor: 'text-amber-400' },
        };

        const rarityStars = (rarity) => {
            switch(rarity) {
                case 'Common': return '★';
                case 'Rare': return '★★';
                case 'Epic': return '★★★';
                case 'Legendary': return '★★★★';
                default: return '★';
            }
        };

        // ========== CATEGORY PATTERN SVG ==========
        const categoryPattern = (category, color) => {
            switch(category) {
                case '기하학':
                    return `url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='30,5 55,50 5,50' fill='none' stroke='${encodeURIComponent(color)}' stroke-width='0.5' opacity='0.15'/%3E%3Ccircle cx='30' cy='30' r='20' fill='none' stroke='${encodeURIComponent(color)}' stroke-width='0.5' opacity='0.1'/%3E%3C/svg%3E")`;
                case '대수학':
                    return `url("data:image/svg+xml,%3Csvg width='50' height='50' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='5' y='25' fill='${encodeURIComponent(color)}' opacity='0.08' font-size='20' font-family='monospace'%3Ex%3C/text%3E%3Ctext x='25' y='40' fill='${encodeURIComponent(color)}' opacity='0.06' font-size='16' font-family='monospace'%3Ey%3C/text%3E%3C/svg%3E")`;
                case '역학':
                case '운동학':
                    return `url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10,50 Q30,10 50,50' fill='none' stroke='${encodeURIComponent(color)}' stroke-width='0.8' opacity='0.12'/%3E%3C/svg%3E")`;
                case '해석학':
                    return `url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,30 Q15,10 30,30 Q45,50 60,30' fill='none' stroke='${encodeURIComponent(color)}' stroke-width='0.8' opacity='0.12'/%3E%3C/svg%3E")`;
                default:
                    return `url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='5' y='5' width='30' height='30' fill='none' stroke='${encodeURIComponent(color)}' stroke-width='0.5' opacity='0.1'/%3E%3C/svg%3E")`;
            }
        };

        // ========== PARTICLE BURST COMPONENT ==========
        const ParticleBurst = ({ color }) => {
            const particles = Array.from({length: 16}, (_, i) => {
                const angle = (i / 16) * Math.PI * 2;
                const dist = 60 + Math.random() * 80;
                return {
                    tx: Math.cos(angle) * dist,
                    ty: Math.sin(angle) * dist,
                    color: ['#f59e0b', '#fbbf24', '#ef4444', '#ec4899', '#8b5cf6', '#3b82f6'][i % 6],
                    delay: Math.random() * 0.2,
                    size: 4 + Math.random() * 4,
                };
            });
            return (
                <div className="absolute inset-0 pointer-events-none z-[60]" style={{left:'50%',top:'50%'}}>
                    {particles.map((p, i) => (
                        <div key={i} className="particle" style={{
                            '--tx': p.tx+'px', '--ty': p.ty+'px',
                            background: p.color,
                            width: p.size, height: p.size,
                            animationDelay: p.delay+'s',
                            left: -p.size/2, top: -p.size/2,
                        }}/>
                    ))}
                </div>
            );
        };

        // ========== FORMULA CARD COMPONENT ==========
        const FormulaCard = ({ data, index, total, onEnlarge }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const [showParticles, setShowParticles] = useState(false);
            const cardRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const mouseXSpring = useSpring(x, { stiffness: 150, damping: 20 });
            const mouseYSpring = useSpring(y, { stiffness: 150, damping: 20 });
            const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["12deg", "-12deg"]);
            const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-12deg", "12deg"]);

            const handleMouseMove = (e) => {
                if (!cardRef.current || !isFlipped) return;

                            ].map(g => (
                                <motion.div
                                    key={g.label}
                                    className="rounded-lg p-3 cursor-pointer text-center border transition-colors"
                                    style={{
                                        borderColor: g.color + '30',
                                        background: `linear-gradient(135deg, ${g.color}08, ${g.color}04)`,
                                    }}
                                    whileHover={{ scale: 1.05, borderColor: g.color }}
                                    whileTap={{ scale: 0.97 }}
                                    onClick={() => { playSfx('click'); onSelect('grade:' + g.grade); }}
                                >
                                    <div className="text-lg mb-1">{g.emoji}</div>
                                    <div className="text-[11px] font-bold" style={{color: g.color}}>{g.label}</div>
                                    <div className="text-[9px] text-white/30">카드 3장</div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </motion.div>
            );
        };

        // ========== MAIN APP ==========
        const FormulaGacha = () => {
            const [phase, setPhase] = useState('selecting'); // selecting -> sealed -> opened
            const [packType, setPackType] = useState(null);
            const [cards, setCards] = useState([]);
            const [enlargedCard, setEnlargedCard] = useState(null);
            const [collectedIds, setCollectedIds] = useState(new Set());
            const [goldenFlash, setGoldenFlash] = useState(false);

            // Load DB on mount
            useEffect(() => {
                loadDatabase().then(() => {
                    // Load collection
                    loadCollection().then(ids => setCollectedIds(ids));
                });
            }, []);

            // ── Daily draw limit ──
            const DAILY_LIMIT = 3;
            const [drawsToday, setDrawsToday] = useState(0);
            const [showLimitPopup, setShowLimitPopup] = useState(false);

            const getDailyKey = () => 'formula_gacha_' + new Date().toISOString().slice(0,10);
            const getDrawCount = () => parseInt(localStorage.getItem(getDailyKey()) || '0');
            const incDrawCount = () => {
                const c = getDrawCount() + 1;
                localStorage.setItem(getDailyKey(), c);
                setDrawsToday(c);
                return c;
            };

            useEffect(() => { setDrawsToday(getDrawCount()); }, []);

            const handleSelectPack = (type) => {
                if (getDrawCount() >= DAILY_LIMIT) {
                    setShowLimitPopup(true);
                    playSfx('click');
                    return;
                }
                setPackType(type);
                setPhase('sealed');
            };

            const [coinError, setCoinError] = useState(false);
            const [isMultiDraw, setIsMultiDraw] = useState(false);
            const [multiCards, setMultiCards] = useState([]);

            const handleMultiDraw = (type) => {
                if (!window.LunaCoinBridge.spend(250)) {
                    setCoinError(true);
                    setTimeout(() => setCoinError(false), 2500);
                    return;
                }
                setPackType(type);
                setIsMultiDraw(true);
                const allCards = [];
                for (let i = 0; i < 10; i++) {
                    const pack = generatePack(type);
                    allCards.push(...pack);
                }
                setMultiCards(allCards);
                setCards(allCards);
                saveCards(allCards);
                setCollectedIds(prev => {
                    const next = new Set(prev);
                    allCards.forEach(c => next.add(c.id));
                    return next;
                });
                setPhase('opened');
            };

            const handleOpenPack = () => {
                if (getDrawCount() >= DAILY_LIMIT) {
                    setShowLimitPopup(true);
                    return;
                }
                // 코인 차감 (30코인)
                if (!window.LunaCoinBridge.spend(30)) {
                    setCoinError(true);
                    setTimeout(() => setCoinError(false), 2500);
                    return;
                }
                setIsMultiDraw(false);

                const drawn = generatePack(packType);
                setCards(drawn);
                incDrawCount();

                // Check for legendary for flash effect
                const hasLegendary = drawn.some(c => c.rarity === 'Legendary');
                if (hasLegendary) {
                    setGoldenFlash(true);
                    setTimeout(() => setGoldenFlash(false), 800);
                }

                setPhase('opened');

                // Save to Firebase
                saveCards(drawn);

                // Update collection
                setCollectedIds(prev => {
                    const next = new Set(prev);
                    drawn.forEach(c => next.add(c.id));
                    return next;
                });
            };

            const handleDrawAgain = () => {
                if (getDrawCount() >= DAILY_LIMIT) {
                    setShowLimitPopup(true);
                    return;
                }
                setCards([]);
                setPhase('selecting');
                setPackType(null);
            };

            return (
                <div className="flex flex-col items-center min-h-full py-6 px-3 relative">
                    {/* 코인 잔액 표시 */}
                    <div className="fixed top-20 right-4 z-[300] flex items-center gap-1.5 bg-amber-900/80 backdrop-blur-md px-3 py-1.5 rounded-full border border-amber-500/30 shadow-lg">
                        <span className="text-sm">🪙</span>
                        <span className="font-black text-amber-400 text-sm">{window.LunaCoinBridge.coins}</span>
                    </div>
                    {/* 코인 부족 토스트 */}
                    <AnimatePresence>
                        {coinError && (
                            <motion.div
                                className="fixed top-32 left-1/2 -translate-x-1/2 z-[300] bg-red-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl shadow-2xl border border-red-500/30 text-center"
                                initial={{ opacity: 0, y: -20, scale: 0.9 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, y: -20, scale: 0.9 }}
                            >
                                <div className="font-bold text-base">🪙 코인이 부족해요!</div>
                                <div className="text-xs text-red-200 mt-1">카드 뽑기에는 30코인이 필요합니다</div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                    {/* Background decoration */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                        <div className="absolute top-[10%] left-[5%] w-[300px] h-[300px] rounded-full bg-gold-500/[0.02] blur-[80px]" />
                        <div className="absolute bottom-[20%] right-[10%] w-[250px] h-[250px] rounded-full bg-purple-500/[0.02] blur-[60px]" />
                        <div className="absolute top-[40%] right-[20%] w-[200px] h-[200px] rounded-full bg-blue-500/[0.015] blur-[70px]" />
                    </div>

                    {/* Golden flash overlay */}
                    <AnimatePresence>
                        {goldenFlash && (
                            <motion.div
                                className="fixed inset-0 z-[250] golden-flash-overlay pointer-events-none"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                            />
                        )}
                    </AnimatePresence>

                    {/* Collection bar + daily draws */}
                    <div className="w-full max-w-md mb-4 relative z-10">
                        <CollectionBar collected={collectedIds.size} total={formulaDB.length || 120} />
                        <div className="flex justify-between items-center mt-2 px-1">
                            <span className="text-[10px] text-white/30">
                                오늘 뽑기: <span className="text-gold-500 font-bold">{Math.max(0, DAILY_LIMIT - drawsToday)}</span>/{DAILY_LIMIT}회 남음
                            </span>
                            <a href="formula-collection.html" className="text-[10px] text-gold-500/60 hover:text-gold-500 transition-colors">
                                📚 내 컬렉션 보기 →
                            </a>
                        </div>
                    </div>

                    {/* Daily limit popup */}
                    <AnimatePresence>
                        {showLimitPopup && (
                            <motion.div
                                className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[200]"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                onClick={() => setShowLimitPopup(false)}
                            >
                                <motion.div
                                    className="bg-navy-800 border border-gold-500/30 rounded-2xl p-8 max-w-sm mx-4 text-center"
                                    style={{ boxShadow: '0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(245,158,11,0.1)' }}
                                    initial={{ scale: 0.8, y: 30 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.8, y: 30 }}
                                    onClick={e => e.stopPropagation()}
                                >
                                    <div className="text-5xl mb-4">⏰</div>
                                    <h3 className="text-lg font-bold text-gold-300 mb-2">오늘의 카드뽑기 완료!</h3>
                                    <p className="text-sm text-white/50 mb-1">
                                        오늘 {DAILY_LIMIT}회 카드뽑기를 모두 사용했습니다.
                                    </p>
                                    <p className="text-xs text-white/30 mb-6">
                                        내일 다시 도전하세요! 매일 새로운 공식을 만나보세요.
                                    </p>
                                    <div className="flex gap-3 justify-center">
                                        <button
                                            onClick={() => setShowLimitPopup(false)}
                                            className="px-5 py-2.5 rounded-lg bg-white/[0.06] hover:bg-white/[0.1] text-white/60 hover:text-white/80 text-sm font-medium transition-all border border-white/[0.08]"
                                        >
                                            닫기
                                        </button>
                                        <a
                                            href="formula-collection.html"
                                            className="px-5 py-2.5 rounded-lg bg-gold-500 hover:bg-gold-300 text-navy-900 font-bold text-sm transition-all hover:scale-105 inline-block"
                                        >
                                            📚 내 컬렉션 보기
                                        </a>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Main content */}
                    <div className="flex-1 flex items-center justify-center w-full relative z-10">
                        <AnimatePresence mode="wait">
                            {phase === 'selecting' && (
                                <PackSelection key="select" onSelect={handleSelectPack} onMultiDraw={handleMultiDraw} />
                            )}

                            {phase === 'sealed' && (
                                <SealedPack key="sealed" packType={packType} onOpen={handleOpenPack} />
                            )}

                            {phase === 'opened' && (
                                <motion.div
                                    key="opened"
                                    className="flex flex-col items-center gap-6 w-full"
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                >
                                    {/* Cards fan (1회) or grid (10연) */}
                                    {!isMultiDraw ? (
                                    <div className="flex items-end justify-center gap-[-10px] relative" style={{ minHeight: '340px' }}>
                                        {cards.map((card, i) => (
                                            <FormulaCard
                                                key={card.uid}
                                                data={card}
                                                index={i}
                                                total={cards.length}
                                                onEnlarge={setEnlargedCard}
                                            />
                                        ))}
                                    </div>
                                    ) : (
                                    <div className="w-full">
                                        <div className="text-center mb-4">
                                            <div className="text-xl font-black text-gold-400">10연뽑 결과!</div>
                                            <div className="text-xs text-white/40 mt-1">{multiCards.length}장 획득</div>
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 w-full max-w-lg mx-auto">
                                            {multiCards.map((card, i) => (
                                                <motion.div
                                                    key={card.uid || i}
                                                    className="cursor-pointer hover:scale-105 transition-transform"
                                                    initial={{ opacity: 0, y: 15 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    transition={{ delay: i * 0.04 }}
                                                    onClick={() => setEnlargedCard(card)}
                                                >
                                                    <div className={`rounded-lg overflow-hidden shadow-lg border-2 ${card.rarity === 'Legendary' ? 'border-amber-400' : card.rarity === 'Epic' ? 'border-purple-400' : card.rarity === 'Rare' ? 'border-blue-400' : 'border-white/10'}`}>
                                                        <div className="bg-slate-800 p-3 text-center aspect-[3/4] flex flex-col items-center justify-center">
                                                            <div className="text-2xl mb-1">{card.emoji || '\u03A3'}</div>
                                                            <div className="text-[10px] font-bold text-white truncate w-full">{card.title}</div>
                                                            <div className={`text-[9px] font-bold mt-0.5 ${card.rarity === 'Legendary' ? 'text-amber-400' : card.rarity === 'Epic' ? 'text-purple-400' : card.rarity === 'Rare' ? 'text-blue-400' : 'text-white/40'}`}>{card.rarity}</div>
                                                        </div>
                                                    </div>
                                                </motion.div>
                                            ))}
                                        </div>
                                    </div>
                                    )}

                                    {/* Action buttons */}
                                    <motion.div
                                        className="flex gap-3 mt-2"
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 1.2 }}
                                    >
                                        <button
                                            onClick={() => { playSfx('click'); handleDrawAgain(); }}
                                            className="px-5 py-2.5 rounded-lg bg-gold-500 hover:bg-gold-300 text-navy-900 font-bold text-sm transition-all hover:scale-105 active:scale-95"
                                        >
                                            한 번 더! 🪙30
                                        </button>
                                        <button
                                            onClick={() => { playSfx('click'); /* placeholder */ }}
                                            className="px-5 py-2.5 rounded-lg bg-white/[0.06] hover:bg-white/[0.1] text-white/60 hover:text-white/80 font-medium text-sm transition-all border border-white/[0.08]"
                                        >
                                            컬렉션 보기
                                        </button>
                                    </motion.div>

                                    {/* Hint */}
                                    <motion.p
                                        className="text-[11px] text-white/20"
                                        initial={{ opacity: 0 }}
                                        animate={{ opacity: 1 }}
                                        transition={{ delay: 1.5 }}
                                    >
                                        카드를 클릭하여 뒤집기 · 뒤집은 카드 클릭 시 확대
                                    </motion.p>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>

                    {/* Enlarged card modal */}
                    <AnimatePresence>
                        {enlargedCard && (
                            <EnlargedCardModal card={enlargedCard} onClose={() => setEnlargedCard(null)} />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        // ========== MOUNT ==========
        const root = createRoot(document.getElementById('root'));
        root.render(<FormulaGacha />);
    </script>
</body>

</html>
