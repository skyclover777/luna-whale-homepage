<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공식 컬렉션 - Luna Math</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f59e0b",
                        "navy-900": "#0f1729",
                        "navy-800": "#162036",
                        "gold-500": "#f59e0b",
                        "gold-300": "#fbbf24",
                        "gold-100": "#fef3c7"
                    },
                    fontFamily: {
                        sans: ["Pretendard Variable", "sans-serif"],
                        serif: ["Playfair Display", "serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Pretendard Variable", sans-serif;
            overflow-x: hidden;
            background: #0f1729;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; height: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Card rarity styles */
        .card-common {
            border-color: #475569;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }
        .card-rare {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #1e3a5f, #0c1e3a);
            box-shadow: 0 0 15px rgba(59,130,246,0.2);
        }
        .card-epic {
            border-color: #8b5cf6;
            background: linear-gradient(135deg, #2e1065, #1a0a3e);
            box-shadow: 0 0 20px rgba(139,92,246,0.25);
        }
        .card-legendary {
            border-image: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899, #8b5cf6, #3b82f6, #10b981, #f59e0b) 1;
            border-width: 2px;
            background: linear-gradient(135deg, #1a1207, #0f0a1a);
            box-shadow: 0 0 25px rgba(245,158,11,0.3);
        }

        /* Holographic for legendary */
        .legendary-holo::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(125deg, rgba(255,0,0,0.15) 0%, rgba(255,255,0,0.15) 16%, rgba(0,255,0,0.15) 33%, rgba(0,255,255,0.15) 50%, rgba(0,0,255,0.15) 66%, rgba(255,0,255,0.15) 83%, rgba(255,0,0,0.15) 100%);
            background-size: 250% 250%;
            animation: holo-shimmer 3s infinite linear;
            mix-blend-mode: color-dodge;
            pointer-events: none;
            z-index: 10;
        }

        /* Purple shimmer for epic */
        .epic-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(115deg, transparent 20%, rgba(139,92,246,0.3) 40%, rgba(168,85,247,0.15) 50%, transparent 60%);
            background-size: 300% 300%;
            animation: foil-shift 4s infinite linear;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        @keyframes foil-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Gradient text */
        .text-gradient-gold {
            background: linear-gradient(135deg, #f59e0b, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Silhouette card */
        .card-silhouette {
            background: #1a2640;
            border: 2px solid #2a3654;
            opacity: 0.6;
        }

        /* Filter tab scrollbar */
        .filter-tabs::-webkit-scrollbar { height: 0; }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../assets/js/luna-nav.js"></script>
</head>

<body class="bg-navy-900 text-slate-100 min-h-screen flex flex-col">

    <!-- Nav -->
    <div class="sticky top-0 z-[200] bg-navy-900/90 backdrop-blur-md border-b border-slate-800/50 h-14 flex items-center px-4 justify-between">
        <button onclick="window.location.href='index.html'" class="text-slate-400 hover:text-gold-300 transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="text-sm font-medium">Luna Math</span>
        </button>
        <span class="font-mono font-bold text-gold-500 tracking-wider text-sm">
            <span class="text-gold-300">📚</span> 공식 컬렉션
        </span>
        <div class="w-20"></div>
    </div>

    <main class="flex-1 overflow-auto relative" id="root"></main>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        // ========== DATABASE ==========
        let formulaDB = [];
        const loadDatabase = async () => {
            try {
                const res = await fetch('../../data/cards/math_formulas.json');
                formulaDB = await res.json();
                console.log('Loaded formula DB:', formulaDB.length, 'cards');
            } catch (e) {
                console.error('Failed to load formula DB', e);
            }
        };

        // ========== FIREBASE LOAD ==========
        const loadCollection = async () => {
            try {
                const user = firebase.auth?.()?.currentUser;
                if (!user) return new Set();
                const snap = await firebase.firestore()
                    .collection('users').doc(user.uid).collection('math_cards').get();
                const ids = new Set();
                snap.forEach(doc => ids.add(doc.data().cardId));
                return ids;
            } catch(e) { return new Set(); }
        };

        // ========== ADMIN CHECK ==========
        const isAdmin = () => {
            try {
                const user = firebase.auth?.()?.currentUser;
                return user?.email === 'skyclover777@gmail.com';
            } catch(e) { return false; }
        };

        // ========== RARITY HELPERS ==========
        const rarityColors = {
            Common: { border: '#475569', glow: 'rgba(71,85,105,0.15)', textColor: 'text-slate-400', label: 'text-slate-500' },
            Rare: { border: '#3b82f6', glow: 'rgba(59,130,246,0.2)', textColor: 'text-blue-400', label: 'text-blue-500' },
            Epic: { border: '#8b5cf6', glow: 'rgba(139,92,246,0.25)', textColor: 'text-purple-400', label: 'text-purple-500' },
            Legendary: { border: '#f59e0b', glow: 'rgba(245,158,11,0.3)', textColor: 'text-amber-400', label: 'text-amber-500' },
        };

        const rarityStars = (rarity) => {
            switch(rarity) {
                case 'Common': return '\u2605';
                case 'Rare': return '\u2605\u2605';
                case 'Epic': return '\u2605\u2605\u2605';
                case 'Legendary': return '\u2605\u2605\u2605\u2605';
                default: return '\u2605';
            }
        };

        const rarityOrder = { Legendary: 0, Epic: 1, Rare: 2, Common: 3 };

        // ========== FILTER TABS ==========
        const gradeFilters = [
            { key: 'all', label: '전체' },
            { key: '초1-2', label: '초1-2', grades: ['초1','초2'] },
            { key: '초3-4', label: '초3-4', grades: ['초3','초4'] },
            { key: '초5-6', label: '초5-6', grades: ['초5','초6'] },
            { key: '중1', label: '중1', grades: ['중1'] },
            { key: '중2', label: '중2', grades: ['중2'] },
            { key: '중3', label: '중3', grades: ['중3'] },
            { key: '고1', label: '고1', grades: ['고1'] },
            { key: '고2', label: '고2', grades: ['고2'] },
            { key: '고3', label: '고3', grades: ['고3'] },
        ];

        const rarityFilters = [
            { key: 'Legendary', label: 'Legendary' },
            { key: 'Epic', label: 'Epic' },
            { key: 'Rare', label: 'Rare' },
            { key: 'Common', label: 'Common' },
        ];

        // ========== STATS BAR ==========
        const StatsBar = ({ cards, collectedIds }) => {
            const total = cards.length;
            const collected = cards.filter(c => collectedIds.has(c.id)).length;
            const pct = total > 0 ? Math.round((collected / total) * 100) : 0;

            const byRarity = (r) => {
                const rCards = cards.filter(c => c.rarity === r);
                const rCollected = rCards.filter(c => collectedIds.has(c.id)).length;
                return { collected: rCollected, total: rCards.length };
            };

            const leg = byRarity('Legendary');
            const epic = byRarity('Epic');
            const rare = byRarity('Rare');
            const common = byRarity('Common');

            return (
                <div className="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl p-3 mb-4">
                    {/* Progress bar */}
                    <div className="flex items-center gap-3 mb-2">
                        <span className="text-[11px] text-white/40 font-medium whitespace-nowrap">수집률</span>
                        <div className="flex-1 h-2.5 bg-white/[0.06] rounded-full overflow-hidden">
                            <motion.div
                                className="h-full rounded-full"
                                style={{ background: 'linear-gradient(90deg, #f59e0b, #fbbf24)' }}
                                initial={{ width: 0 }}
                                animate={{ width: `${pct}%` }}
                                transition={{ duration: 1, ease: 'easeOut', delay: 0.3 }}
                            />
                        </div>
                        <span className="text-[12px] font-mono font-bold text-gold-500 whitespace-nowrap">{pct}%</span>
                    </div>
                    {/* Rarity breakdown */}
                    <div className="flex flex-wrap gap-x-4 gap-y-1 text-[10px]">
                        <span className="text-amber-400">★★★★ <span className="text-white/50">{leg.collected}/{leg.total}</span></span>
                        <span className="text-purple-400">★★★ <span className="text-white/50">{epic.collected}/{epic.total}</span></span>
                        <span className="text-blue-400">★★ <span className="text-white/50">{rare.collected}/{rare.total}</span></span>
                        <span className="text-slate-400">★ <span className="text-white/50">{common.collected}/{common.total}</span></span>
                        <span className="ml-auto text-gold-500 font-bold">{collected} / {total}</span>
                    </div>
                </div>
            );
        };

        // ========== MINI CARD (COLLECTED) ==========
        const CollectedCard = ({ card, index, onClick }) => {
            const rInfo = rarityColors[card.rarity] || rarityColors.Common;
            const isLeg = card.rarity === 'Legendary';
            const isEpic = card.rarity === 'Epic';

            return (
                <motion.div
                    className={`relative rounded-lg border-2 overflow-hidden cursor-pointer
                        card-${card.rarity.toLowerCase()}
                        ${isLeg ? 'legendary-holo' : ''} ${isEpic ? 'epic-shimmer' : ''}`}
                    style={{ minHeight: 200 }}
                    initial={{ opacity: 0, y: 30, scale: 0.9 }}
                    animate={{ opacity: 1, y: 0, scale: 1 }}
                    transition={{ duration: 0.4, delay: Math.min(index * 0.03, 1.5) }}
                    whileHover={{ scale: 1.05, y: -4, boxShadow: `0 8px 30px ${rInfo.glow}` }}
                    onClick={() => onClick(card)}
                >
                    {/* Emoji */}
                    <div className="text-center pt-3 pb-1">
                        <span className="text-3xl">{card.emoji}</span>
                    </div>
                    {/* Formula */}
                    <div className="px-2 text-center">
                        <div className="font-mono text-[12px] leading-tight text-white/80 truncate" title={card.formula}>
                            {card.formula}
                        </div>
                    </div>
                    {/* Title */}
                    <div className="px-2 mt-1 text-center">
                        <div className="text-[11px] font-bold text-white/90 leading-tight line-clamp-2">
                            {card.title_ko}
                        </div>
                    </div>
                    {/* Stars */}
                    <div className={`text-center mt-1 text-[10px] ${rInfo.textColor}`}>
                        {rarityStars(card.rarity)}
                    </div>
                    {/* Grade tags */}
                    <div className="flex flex-wrap justify-center gap-0.5 px-1 mt-1 pb-2">
                        {card.grade?.slice(0, 3).map((g, i) => (
                            <span key={i} className="text-[8px] px-1.5 py-0.5 rounded-full bg-white/[0.06] text-white/40">
                                {g}
                            </span>
                        ))}
                    </div>
                </motion.div>
            );
        };

        // ========== MINI CARD (UNCOLLECTED / SILHOUETTE) ==========
        const UncollectedCard = ({ card, index }) => {
            return (
                <motion.div
                    className="relative rounded-lg border-2 card-silhouette overflow-hidden"
                    style={{ minHeight: 200 }}
                    initial={{ opacity: 0, y: 30, scale: 0.9 }}
                    animate={{ opacity: 0.5, y: 0, scale: 1 }}
                    transition={{ duration: 0.4, delay: Math.min(index * 0.03, 1.5) }}
                >
                    {/* Question mark */}
                    <div className="text-center pt-3 pb-1">
                        <span className="text-3xl grayscale opacity-40">❓</span>
                    </div>
                    {/* Hidden formula */}
                    <div className="px-2 text-center">
                        <div className="font-mono text-[12px] text-white/15">???</div>
                    </div>
                    {/* Hidden title */}
                    <div className="px-2 mt-1 text-center">
                        <div className="text-[11px] font-bold text-white/15">???</div>
                    </div>
                    {/* Dim stars */}
                    <div className="text-center mt-1 text-[10px] text-white/10">
                        {rarityStars(card.rarity)}
                    </div>
                    {/* Dim grade */}
                    <div className="flex flex-wrap justify-center gap-0.5 px-1 mt-1 pb-2">
                        {card.grade?.slice(0, 3).map((g, i) => (
                            <span key={i} className="text-[8px] px-1.5 py-0.5 rounded-full bg-white/[0.03] text-white/10">
                                {g}
                            </span>
                        ))}
                    </div>
                </motion.div>
            );
        };

        // ========== DETAIL MODAL ==========
        const DetailModal = ({ card, onClose }) => {
            if (!card) return null;
            const rInfo = rarityColors[card.rarity] || rarityColors.Common;
            const isLeg = card.rarity === 'Legendary';
            const isEpic = card.rarity === 'Epic';

            return (
                <motion.div
                    className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[300] p-4"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    onClick={onClose}
                >
                    <motion.div
                        className={`relative w-full max-w-sm rounded-xl border-2 p-6 overflow-hidden
                            card-${card.rarity.toLowerCase()}
                            ${isLeg ? 'legendary-holo' : ''} ${isEpic ? 'epic-shimmer' : ''}`}
                        style={{ maxHeight: '85vh', overflowY: 'auto' }}
                        initial={{ scale: 0.7, y: 40 }}
                        animate={{ scale: 1, y: 0 }}
                        exit={{ scale: 0.7, y: 40, opacity: 0 }}
                        transition={{ type: 'spring', damping: 20, stiffness: 200 }}
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Close button */}
                        <button
                            onClick={onClose}
                            className="absolute top-3 right-3 z-20 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white/60 hover:text-white transition-all"
                        >
                            <span className="material-symbols-outlined text-[18px]">close</span>
                        </button>

                        {/* Emoji large */}
                        <div className="text-center mb-3">
                            <span className="text-6xl">{card.emoji}</span>
                        </div>

                        {/* Rarity stars */}
                        <div className={`text-center text-sm mb-1 ${rInfo.textColor}`}>
                            {rarityStars(card.rarity)} <span className="text-[10px] text-white/30 ml-1">{card.rarity}</span>
                        </div>

                        {/* Title */}
                        <h2 className="text-xl font-bold text-center text-white mb-1">{card.title_ko}</h2>
                        <p className="text-[11px] text-white/30 text-center mb-3">{card.title_en}</p>

                        {/* Formula */}
                        <div className="bg-white/[0.05] rounded-lg p-3 mb-3 text-center">
                            <div className="font-mono text-lg font-bold text-gold-300">{card.formula}</div>
                        </div>

                        {/* Mathematician */}
                        <div className="flex items-center justify-center gap-2 text-[11px] text-white/40 mb-3">
                            <span>{card.mathematician_ko}</span>
                            <span className="text-white/20">|</span>
                            <span>{card.era}</span>
                            <span className="text-white/20">|</span>
                            <span>{card.category}</span>
                        </div>

                        {/* Description */}
                        <p className="text-[13px] text-white/60 leading-relaxed mb-3">{card.desc_ko}</p>

                        {/* Uses */}
                        {card.uses && card.uses.length > 0 && (
                            <div className="mb-3">
                                <div className="text-[10px] text-white/30 mb-1.5 font-medium">실생활 활용</div>
                                <div className="flex flex-wrap gap-1.5">
                                    {card.uses.map((u, i) => (
                                        <span key={i} className="text-[10px] px-2 py-1 rounded-full bg-white/[0.06] text-white/50">{u}</span>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Grade tags */}
                        <div className="flex flex-wrap gap-1.5 mb-4">
                            {card.grade?.map((g, i) => (
                                <span key={i} className="text-[10px] px-2 py-1 rounded-md bg-gold-500/10 text-gold-500/70 border border-gold-500/20">{g}</span>
                            ))}
                        </div>

                        {/* Game link */}
                        {card.game && (
                            <a
                                href={card.game}
                                className="block w-full text-center py-2.5 rounded-lg bg-gold-500/20 hover:bg-gold-500/30 text-gold-300 text-sm font-bold transition-all border border-gold-500/30"
                            >
                                게임하러 가기 →
                            </a>
                        )}
                    </motion.div>
                </motion.div>
            );
        };

        // ========== MAIN APP ==========
        const FormulaCollection = () => {
            const [allCards, setAllCards] = useState([]);
            const [collectedIds, setCollectedIds] = useState(new Set());
            const [activeFilter, setActiveFilter] = useState('all');
            const [selectedCard, setSelectedCard] = useState(null);
            const [isAdminUser, setIsAdminUser] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const init = async () => {
                    await loadDatabase();
                    setAllCards([...formulaDB]);

                    // Wait for auth state
                    const waitAuth = () => new Promise(resolve => {
                        try {
                            const unsub = firebase.auth().onAuthStateChanged(user => {
                                unsub();
                                resolve(user);
                            });
                            setTimeout(() => resolve(null), 3000);
                        } catch(e) { resolve(null); }
                    });

                    await waitAuth();

                    // Admin check
                    const admin = isAdmin();
                    setIsAdminUser(admin);

                    if (admin) {
                        // Admin sees all
                        const allIds = new Set(formulaDB.map(c => c.id));
                        setCollectedIds(allIds);
                    } else {
                        // Load from Firebase
                        const fbIds = await loadCollection();
                        // Also check localStorage fallback
                        let lsIds = new Set();
                        try {
                            const keys = Object.keys(localStorage);
                            keys.forEach(k => {
                                if (k.startsWith('formula_gacha_')) return;
                                // Check for any stored card IDs
                            });
                        } catch(e) {}
                        // Merge
                        const merged = new Set([...fbIds, ...lsIds]);
                        setCollectedIds(merged);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            // Filter logic
            const filteredCards = useMemo(() => {
                let cards = [...allCards];

                // Grade filter
                const gradeF = gradeFilters.find(f => f.key === activeFilter);
                if (gradeF && gradeF.grades) {
                    cards = cards.filter(c => c.grade?.some(g => gradeF.grades.includes(g)));
                }

                // Rarity filter
                const rarityF = rarityFilters.find(f => f.key === activeFilter);
                if (rarityF) {
                    cards = cards.filter(c => c.rarity === rarityF.key);
                }

                // Sort: collected first, then by rarity
                cards.sort((a, b) => {
                    const aCol = collectedIds.has(a.id) ? 0 : 1;
                    const bCol = collectedIds.has(b.id) ? 0 : 1;
                    if (aCol !== bCol) return aCol - bCol;
                    const aR = rarityOrder[a.rarity] ?? 9;
                    const bR = rarityOrder[b.rarity] ?? 9;
                    return aR - bR;
                });

                return cards;
            }, [allCards, activeFilter, collectedIds]);

            const collectedCount = allCards.filter(c => collectedIds.has(c.id)).length;

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-[60vh]">
                        <div className="text-center">
                            <div className="text-4xl mb-3 animate-pulse">📚</div>
                            <div className="text-sm text-white/30">컬렉션 불러오는 중...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-full relative">
                    {/* Background decoration */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                        <div className="absolute top-[10%] left-[5%] w-[300px] h-[300px] rounded-full bg-gold-500/[0.02] blur-[80px]" />
                        <div className="absolute bottom-[20%] right-[10%] w-[250px] h-[250px] rounded-full bg-purple-500/[0.02] blur-[60px]" />
                        <div className="absolute top-[40%] right-[20%] w-[200px] h-[200px] rounded-full bg-blue-500/[0.015] blur-[70px]" />
                    </div>

                    <div className="relative z-10 px-4 py-4 max-w-6xl mx-auto w-full">

                        {/* Header: collection count */}
                        <div className="flex items-center justify-between mb-3">
                            <h1 className="text-lg font-bold text-gradient-gold">공식 컬렉션</h1>
                            <div className="flex items-center gap-2">
                                <span className="text-[12px] font-mono text-gold-500 font-bold">
                                    수집: {collectedCount} / {allCards.length}
                                </span>
                                {isAdminUser && (
                                    <span className="text-[9px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30">ADMIN</span>
                                )}
                            </div>
                        </div>

                        {/* Filter Tabs */}
                        <div className="filter-tabs flex gap-1.5 overflow-x-auto pb-2 mb-3 custom-scrollbar">
                            {[...gradeFilters, ...rarityFilters].map(f => {
                                const active = activeFilter === f.key;
                                const isRarityTab = rarityFilters.some(rf => rf.key === f.key);
                                let tabColor = '';
                                if (isRarityTab && active) {
                                    switch(f.key) {
                                        case 'Legendary': tabColor = 'bg-amber-500 text-white'; break;
                                        case 'Epic': tabColor = 'bg-purple-600 text-white'; break;
                                        case 'Rare': tabColor = 'bg-blue-600 text-white'; break;
                                        case 'Common': tabColor = 'bg-slate-600 text-white'; break;
                                    }
                                }

                                return (
                                    <button
                                        key={f.key}
                                        onClick={() => setActiveFilter(f.key)}
                                        className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-[11px] font-medium transition-all flex-shrink-0
                                            ${active
                                                ? (tabColor || 'bg-gold-500 text-white shadow-lg shadow-gold-500/20')
                                                : 'bg-white/[0.04] text-white/35 hover:bg-white/[0.08] hover:text-white/50'
                                            }`}
                                    >
                                        {f.label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Stats Bar */}
                        <StatsBar cards={allCards} collectedIds={collectedIds} />

                        {/* Card Grid */}
                        {filteredCards.length === 0 ? (
                            <div className="text-center py-20">
                                <div className="text-4xl mb-3 opacity-30">🔍</div>
                                <div className="text-sm text-white/30">이 카테고리에 해당하는 카드가 없습니다</div>
                            </div>
                        ) : (
                            <div className="grid gap-3" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))' }}>
                                {filteredCards.map((card, idx) => {
                                    const isCollected = collectedIds.has(card.id);
                                    return isCollected
                                        ? <CollectedCard key={card.id} card={card} index={idx} onClick={setSelectedCard} />
                                        : <UncollectedCard key={card.id} card={card} index={idx} />;
                                })}
                            </div>
                        )}

                        {/* Bottom link to gacha */}
                        <div className="text-center mt-8 mb-6">
                            <a
                                href="formula-gacha.html"
                                className="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gold-500/10 hover:bg-gold-500/20 text-gold-300 text-sm font-bold transition-all border border-gold-500/20 hover:border-gold-500/40"
                            >
                                <span>🎴</span>
                                <span>뽑기하러 가기 →</span>
                            </a>
                        </div>
                    </div>

                    {/* Detail Modal */}
                    <AnimatePresence>
                        {selectedCard && (
                            <DetailModal card={selectedCard} onClose={() => setSelectedCard(null)} />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        // ========== MOUNT ==========
        const root = createRoot(document.getElementById('root'));
        root.render(<FormulaCollection />);
    </script>
</body>
</html>
