            drawVehicle(ctx, vehicleX, vehicleY, vehicleAngle);
        } else if (phase_anim === 'fail') {
            failTimer++;
            if (failType === 'pyth' && failTimer < 60) {
                // Falling back down
                vehicleVY += 0.2;
                vehicleY += vehicleVY;
                vehicleAngle += 0.02;
                if (vehicleY >= ROAD_Y - 28) {
                    vehicleY = ROAD_Y - 28;
                    vehicleVY = 0;
                    playSound('crash');
                    spawnExplosion(vehicleX, vehicleY);
                    pigExpression = 'dizzy';
                }
            }

            shakeX = failTimer < 10 ? (Math.random() - 0.5) * 6 : 0;
            shakeY = failTimer < 10 ? (Math.random() - 0.5) * 4 : 0;

            drawVehicle(ctx, vehicleX, vehicleY, vehicleAngle);

            if (failTimer > 20) {
                showMsg = true;
                msgAlpha = Math.min(msgAlpha + 0.05, 1);
            }
            drawMessage(failMsg);

            if (failTimer > 160) {
                phase_anim = 'done';
                failed = true;
                showResult(false);
            }
        } else if (phase_anim === 'arrive') {
            arriveTimer++;
            pigExpression = 'happy';
            drawVehicle(ctx, vehicleX, vehicleY, 0);

            if (arriveTimer % 20 === 0 && arriveTimer < 80) {
                spawnConfetti(MARKET_X + (Math.random() - 0.5) * 60, ROAD_Y - 40);
            }

            showMsg = true;
            msgAlpha = Math.min(msgAlpha + 0.05, 1);
            drawMessage(LEVELS[currentLevelIdx].anim.arrive);

            if (arriveTimer > 120) {
                phase_anim = 'done';
                showResult(true);
            }
        }

        drawParticles();

        if (phase_anim !== 'done') {
            animFrame = requestAnimationFrame(animate);
        }
    }

    // Start animation
    animate();
}

// ──── BUOYANCY MINI-GAME ────
function runBuoyancyMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.buoyancy;

    // Layout constants
    const surfaceY = 80;
    const bottomY = H - 70;
    const vehicleStartY = bottomY - 40;

    // State
    let time = 0;
    let phase_buoy = 'intro'; // intro, interactive, rising, success, sinkfail, done
    let introTimer = 0;
    let endTimer = 0;
    let currentV = cfg.vMin;
    let vehicleY = vehicleStartY;
    let vehicleVY = 0;
    let pigExpression = 'happy';
    let particles = [];
    let animFrame;
    let sliderDragging = false;
    let hoveringButton = false;
    let propAngle = 0;
    let sinkTimer = 0;
    let shakeX = 0, shakeY = 0;

    // Bubble ambient particles
    let bubbles = [];

    // Slider geometry
    const sliderX = W / 2 - 150, sliderTrackY = H - 42, sliderW = 300;
    // Button geometry
    const btnW = 120, btnH = 32;
    const btnX = W / 2 - btnW / 2, btnY = H - 18;

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    // ── Event handlers ──
    function onPointerDown(e) {
        if (phase_buoy !== 'interactive') return;
        const pos = getCanvasPos(e);
        // Check slider handle
        const handleX = sliderX + ((currentV - cfg.vMin) / (cfg.vMax - cfg.vMin)) * sliderW;
        const dx = pos.x - handleX, dy = pos.y - sliderTrackY;
        if (dx * dx + dy * dy < 20 * 20) {
            sliderDragging = true;
            e.preventDefault();
            return;
        }
        // Check slider track click
        if (pos.x >= sliderX && pos.x <= sliderX + sliderW && Math.abs(pos.y - sliderTrackY) < 15) {
            const ratio = (pos.x - sliderX) / sliderW;
            currentV = cfg.vMin + ratio * (cfg.vMax - cfg.vMin);
            currentV = Math.max(cfg.vMin, Math.min(cfg.vMax, currentV));
            currentV = Math.round(currentV * 10) / 10;
            sliderDragging = true;
            e.preventDefault();
            return;
        }
        // Check launch button
        if (pos.x >= btnX && pos.x <= btnX + btnW && pos.y >= btnY && pos.y <= btnY + btnH) {
            phase_buoy = 'rising';
            sinkTimer = 0;
            playSound('drive');
            e.preventDefault();
        }
    }
    function onPointerMove(e) {
        if (phase_buoy !== 'interactive') return;
        const pos = getCanvasPos(e);
        // Hover check for button
        hoveringButton = (pos.x >= btnX && pos.x <= btnX + btnW && pos.y >= btnY && pos.y <= btnY + btnH);
        if (sliderDragging) {
            const ratio = Math.max(0, Math.min(1, (pos.x - sliderX) / sliderW));
            currentV = cfg.vMin + ratio * (cfg.vMax - cfg.vMin);
            currentV = Math.round(currentV * 10) / 10;
            e.preventDefault();
        }
    }
    function onPointerUp(e) {
        sliderDragging = false;
    }

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    canvas.addEventListener('touchmove', onPointerMove, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    function cleanup() {
        canvas.removeEventListener('mousedown', onPointerDown);
        canvas.removeEventListener('mousemove', onPointerMove);
        canvas.removeEventListener('mouseup', onPointerUp);
        canvas.removeEventListener('touchstart', onPointerDown);
        canvas.removeEventListener('touchmove', onPointerMove);
        canvas.removeEventListener('touchend', onPointerUp);
    }

    // ── Drawing helpers ──
    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ── Background ──
    function drawBuoyancyBg() {
        // Deep ocean gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#1a4d7a');
        grad.addColorStop(0.15, '#153d6a');
        grad.addColorStop(1, '#0a1628');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Surface line
        ctx.strokeStyle = 'rgba(56,189,248,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 4) {
            const sy = surfaceY + Math.sin(x * 0.03 + time * 0.04) * 3;
            x === 0 ? ctx.moveTo(x, sy) : ctx.lineTo(x, sy);
        }
        ctx.stroke();

        // Surface glow
        const surfGrad = ctx.createLinearGradient(0, surfaceY - 10, 0, surfaceY + 20);
        surfGrad.addColorStop(0, 'rgba(56,189,248,0.15)');
        surfGrad.addColorStop(1, 'rgba(56,189,248,0)');
        ctx.fillStyle = surfGrad;
        ctx.fillRect(0, surfaceY - 10, W, 30);

        // Light rays from top
        ctx.save();
        ctx.globalAlpha = 0.04;
        for (let i = 0; i < 5; i++) {
            const rx = (i * 180 + 60) % W;
            const sway = Math.sin(time * 0.015 + i * 1.2) * 30;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(rx + sway - 15, 0);
            ctx.lineTo(rx + sway + 15, 0);
            ctx.lineTo(rx + sway + 60, H);
            ctx.lineTo(rx + sway - 60, H);
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();

        // Depth grid lines
        ctx.strokeStyle = 'rgba(56,189,248,0.08)';
        ctx.lineWidth = 1;
        for (let gy = surfaceY + 50; gy < bottomY; gy += 50) {
            ctx.beginPath();
            ctx.moveTo(30, gy);
            ctx.lineTo(W - 50, gy);
            ctx.stroke();
        }

        // Coral reef at bottom
        const coralColors = ['#e06060', '#e08040', '#d04080', '#50b060', '#c07030'];
        for (let i = 0; i < 12; i++) {
            const cx = (i * 73 + 20) % (W - 60) + 10;
            const cw = 12 + (i * 7) % 18;
            const ch = 10 + (i * 11) % 20;
            ctx.fillStyle = coralColors[i % coralColors.length];
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(cx, bottomY + 15, cw, ch, 0, Math.PI, 0);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Sea floor
        ctx.fillStyle = '#1a2a40';
        ctx.fillRect(0, bottomY + 15, W, H - bottomY - 15);

        // Ambient bubbles
        if (time % 8 === 0) {
            bubbles.push({
                x: Math.random() * W,
                y: bottomY + 10,
                r: 1 + Math.random() * 3,
                speed: 0.3 + Math.random() * 0.8,
                wobble: Math.random() * Math.PI * 2,
            });
        }
        for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            b.y -= b.speed;
            b.x += Math.sin(time * 0.05 + b.wobble) * 0.3;
            if (b.y < surfaceY - 10) { bubbles.splice(i, 1); continue; }
            ctx.strokeStyle = 'rgba(56,189,248,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.stroke();
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ── Formula HUD ──
    function drawFormulaHUD(rho, V, g, F) {
        const pw = 340, ph = 72;
        const px = W / 2 - pw / 2, py = 6;
        // Panel bg
        ctx.fillStyle = 'rgba(13,33,55,0.92)';
        roundRect(ctx, px, py, pw, ph, 10);
        ctx.fill();
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 1.5;
        roundRect(ctx, px, py, pw, ph, 10);
        ctx.stroke();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        // Line 1: formula
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px JetBrains Mono, monospace';
        ctx.fillText('F = \u03C1 \u00D7 V \u00D7 g', W / 2, py + 8);
        // Line 2: values
        ctx.font = '13px JetBrains Mono, monospace';
        ctx.fillStyle = '#38bdf8';
        ctx.fillText('= ' + rho + ' \u00D7 ' + V.toFixed(1) + ' \u00D7 ' + g, W / 2, py + 28);
        // Line 3: result
        ctx.font = 'bold 18px JetBrains Mono, monospace';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('= ' + F.toLocaleString() + ' N', W / 2, py + 48);
    }

    // ── Volume slider ──
    function drawVolumeSlider(V, vMin, vMax) {
        const ratio = (V - vMin) / (vMax - vMin);
        const handleX = sliderX + ratio * sliderW;

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = '14px Jua, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('V = ' + V.toFixed(1) + ' m\u00B3', W / 2, sliderTrackY - 12);

        // Track background
        ctx.fillStyle = '#1a2d45';
        roundRect(ctx, sliderX, sliderTrackY - 3, sliderW, 6, 3);
        ctx.fill();
        ctx.strokeStyle = '#2a5080';
        ctx.lineWidth = 1;
        roundRect(ctx, sliderX, sliderTrackY - 3, sliderW, 6, 3);
        ctx.stroke();

        // Fill
        if (ratio > 0) {
            const fillGrad = ctx.createLinearGradient(sliderX, 0, handleX, 0);
            fillGrad.addColorStop(0, '#0ea5e9');
            fillGrad.addColorStop(1, '#38bdf8');
            ctx.fillStyle = fillGrad;
            roundRect(ctx, sliderX, sliderTrackY - 3, handleX - sliderX, 6, 3);
            ctx.fill();
        }

        // Min/max labels
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '10px JetBrains Mono, monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(vMin.toString(), sliderX, sliderTrackY + 6);
        ctx.textAlign = 'right';
        ctx.fillText(vMax.toString(), sliderX + sliderW, sliderTrackY + 6);

        // Handle
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(handleX, sliderTrackY, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // Value inside handle
        ctx.fillStyle = '#0d2137';
        ctx.font = 'bold 9px JetBrains Mono, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(V.toFixed(1), handleX, sliderTrackY);
    }

    // ── Launch button ──
    function drawLaunchButton() {
        const active = phase_buoy === 'interactive' && currentV > cfg.vMin;
        ctx.fillStyle = active ? (hoveringButton ? '#22d3ee' : '#0ea5e9') : '#555';
        roundRect(ctx, btnX, btnY, btnW, btnH, 8);
        ctx.fill();
        if (active && hoveringButton) {
            ctx.shadowColor = '#38bdf8';
            ctx.shadowBlur = 12;
            roundRect(ctx, btnX, btnY, btnW, btnH, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        ctx.strokeStyle = active ? '#38bdf8' : '#666';
        ctx.lineWidth = 1.5;
        roundRect(ctx, btnX, btnY, btnW, btnH, 8);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 15px Jua, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\uBC1C\uC0AC!', btnX + btnW / 2, btnY + btnH / 2);
    }

    // ── Depth meter ──
    function drawDepthMeter(vY) {
        const mx = W - 32, my = surfaceY, mh = bottomY - surfaceY;
        const mw = 18;
        // Background
        ctx.fillStyle = 'rgba(13,33,55,0.8)';
        roundRect(ctx, mx - mw / 2 - 4, my - 4, mw + 8, mh + 8, 6);
        ctx.fill();
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 1;
        roundRect(ctx, mx - mw / 2 - 4, my - 4, mw + 8, mh + 8, 6);
        ctx.stroke();

        // Water fill
        const depthRatio = Math.max(0, Math.min(1, (vY - surfaceY) / (bottomY - surfaceY)));
        const fillH = depthRatio * mh;
        const waterGrad = ctx.createLinearGradient(0, my, 0, my + mh);
        waterGrad.addColorStop(0, '#38bdf8');
        waterGrad.addColorStop(1, '#0a1628');
        ctx.fillStyle = waterGrad;
        ctx.fillRect(mx - mw / 2, my + (mh - fillH), mw, fillH);

        // Vehicle marker triangle
        const markerY = my + depthRatio * mh;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(mx - mw / 2 - 8, markerY);
        ctx.lineTo(mx - mw / 2 - 2, markerY - 4);
        ctx.lineTo(mx - mw / 2 - 2, markerY + 4);
        ctx.closePath();
        ctx.fill();

        // Labels
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '9px Jua, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('\uC218\uBA74', mx, my - 6);
        ctx.textBaseline = 'top';
        ctx.fillText('\uD574\uC800', mx, my + mh + 6);
    }

    // ── Weight bar ──
    function drawWeightBar(F, weight) {
        const bx = W / 2 + 195, by = 18, bh = 58, bw = 24;
        const maxVal = Math.max(F, weight) * 1.2 || 1;

        // Buoyancy bar
        const fH = Math.min(bh, (F / maxVal) * bh);
        ctx.fillStyle = F > weight ? '#22d3ee' : '#2a5080';
        ctx.fillRect(bx, by + bh - fH, bw, fH);
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, bh);

        // Weight bar
        const wH = Math.min(bh, (weight / maxVal) * bh);
        ctx.fillStyle = '#e05050';
        ctx.fillRect(bx + bw + 8, by + bh - wH, bw, wH);
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx + bw + 8, by, bw, bh);

        // Labels
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '9px Jua, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('\uBD80\uB825', bx + bw / 2, by + bh + 3);
        ctx.fillText('\uBB34\uAC8C', bx + bw + 8 + bw / 2, by + bh + 3);

        // Arrow between bars
        const arrowX = bx + bw + 4;
        const arrowY = by + bh / 2;
        ctx.fillStyle = F > weight ? '#22d3ee' : '#e05050';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(F > weight ? '\u2191' : '\u2193', arrowX, arrowY);
    }

    // ── Pig drawing (Archimedes crown) ──
    function drawPig(ctx, x, y, expression) {
        // Archimedes crown
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(x - 10, y - 6); ctx.lineTo(x - 8, y - 16);
        ctx.lineTo(x - 4, y - 10); ctx.lineTo(x, y - 18);
        ctx.lineTo(x + 4, y - 10); ctx.lineTo(x + 8, y - 16);
        ctx.lineTo(x + 10, y - 6);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#D69E2E'; ctx.lineWidth = 1; ctx.stroke();
        // Head
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#FF8FA0'; ctx.lineWidth = 1.5; ctx.stroke();
        // Ears
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath(); ctx.ellipse(x - 10, y - 8, 5, 4, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + 10, y - 8, 5, 4, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FF8FA0';
        ctx.beginPath(); ctx.ellipse(x - 10, y - 8, 3, 2.5, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + 10, y - 8, 3, 2.5, 0.3, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#333';
        if (expression === 'happy') {
            ctx.beginPath(); ctx.arc(x - 4, y - 3, 2.5, 0, Math.PI * 2); ctx.arc(x + 4, y - 3, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x - 3, y - 4, 1, 0, Math.PI * 2); ctx.arc(x + 5, y - 4, 1, 0, Math.PI * 2); ctx.fill();
        } else if (expression === 'worried') {
            ctx.beginPath(); ctx.arc(x - 4, y - 2, 2.5, 0, Math.PI * 2); ctx.arc(x + 4, y - 2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x - 7, y - 7); ctx.lineTo(x - 2, y - 6); ctx.moveTo(x + 2, y - 6); ctx.lineTo(x + 7, y - 7); ctx.stroke();
        } else if (expression === 'surprised') {
            ctx.beginPath(); ctx.arc(x - 4, y - 3, 3, 0, Math.PI * 2); ctx.arc(x + 4, y - 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x - 3.5, y - 3.5, 1.5, 0, Math.PI * 2); ctx.arc(x + 4.5, y - 3.5, 1.5, 0, Math.PI * 2); ctx.fill();
        } else if (expression === 'dizzy') {
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
            for (let side of [-1, 1]) {
                ctx.beginPath();
                for (let t = 0; t < 8; t += 0.2) {
                    const sx = x + side * 4 + Math.cos(t + time * 0.1) * t * 0.4;
                    const sy = y - 3 + Math.sin(t + time * 0.1) * t * 0.4;
                    t === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
                }
                ctx.stroke();
            }
        }
        // Snout
        ctx.fillStyle = '#FF9999';
        ctx.beginPath(); ctx.ellipse(x, y + 4, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#E88888'; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = '#E88888';
        ctx.beginPath(); ctx.ellipse(x - 2, y + 4, 1.5, 1, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + 2, y + 4, 1.5, 1, 0, 0, Math.PI * 2); ctx.fill();
        // Mouth
        if (expression === 'happy') {
            ctx.strokeStyle = '#E88888'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(x, y + 6, 4, 0.1, Math.PI - 0.1); ctx.stroke();
        } else if (expression === 'surprised') {
            ctx.fillStyle = '#E88888';
            ctx.beginPath(); ctx.ellipse(x, y + 9, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
    }

    // ── Vehicle drawing ──
    function drawBuoyancyVehicle(x, y, vehicleType) {
        ctx.save();
        ctx.translate(shakeX, shakeY);

        if (vehicleType === 'submarine') {
            // Hull
            ctx.fillStyle = '#1a8a7a';
            ctx.beginPath();
            ctx.ellipse(x, y, 42, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0d6b5e';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Hull highlight
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.ellipse(x, y - 6, 35, 8, 0, Math.PI, 0);
            ctx.fill();

            // Conning tower
            ctx.fillStyle = '#15756a';
            roundRect(ctx, x - 8, y - 30, 16, 16, 4);
            ctx.fill();
            ctx.strokeStyle = '#0d6b5e';
            ctx.lineWidth = 1.5;
            roundRect(ctx, x - 8, y - 30, 16, 16, 4);
            ctx.stroke();
            // Periscope
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - 30);
            ctx.lineTo(x, y - 38);
            ctx.lineTo(x + 6, y - 38);
            ctx.stroke();

            // Porthole
            ctx.fillStyle = '#81D4FA';
            ctx.beginPath();
            ctx.arc(x - 12, y, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#B0BEC5';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Pig inside porthole
            drawPig(ctx, x - 12, y, pigExpression);

            // Propeller at rear
            propAngle += 0.15;
            ctx.save();
            ctx.translate(x + 42, y);
            ctx.rotate(propAngle);
            ctx.fillStyle = '#999';
            for (let i = 0; i < 3; i++) {
                ctx.save();
                ctx.rotate(i * Math.PI * 2 / 3);
                ctx.beginPath();
                ctx.ellipse(0, -8, 3, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.restore();

            // Engine glow
            if (phase_buoy === 'rising') {
                ctx.fillStyle = 'rgba(34,211,238,0.3)';
                ctx.beginPath();
                ctx.arc(x + 46, y, 6 + Math.sin(time * 0.3) * 2, 0, Math.PI * 2);
                ctx.fill();
            }

        } else if (vehicleType === 'raft') {
            // Logs
            ctx.fillStyle = '#8B6914';
            for (let i = 0; i < 5; i++) {
                const lx = x - 35 + i * 15;
                roundRect(ctx, lx, y - 5, 12, 22, 3);
                ctx.fill();
                // Log texture lines
                ctx.strokeStyle = '#6B4E0A';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(lx + 3, y - 3);
                ctx.lineTo(lx + 3, y + 15);
                ctx.moveTo(lx + 8, y - 2);
                ctx.lineTo(lx + 8, y + 14);
                ctx.stroke();
            }
            // Cross beams
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(x - 33, y + 2, 66, 4);
            ctx.fillRect(x - 33, y + 10, 66, 4);

            // Sail mast
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x + 5, y - 5);
            ctx.lineTo(x + 5, y - 45);
            ctx.stroke();
            // Sail triangle
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.beginPath();
            ctx.moveTo(x + 5, y - 42);
            ctx.lineTo(x + 5, y - 12);
            ctx.lineTo(x + 30, y - 15);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Pig on raft
            drawPig(ctx, x - 15, y - 18, pigExpression);

        } else if (vehicleType === 'treasure') {
            // Treasure chest
            ctx.fillStyle = '#8B4513';
            roundRect(ctx, x - 25, y - 10, 50, 30, 4);
            ctx.fill();
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            roundRect(ctx, x - 25, y - 10, 50, 30, 4);
            ctx.stroke();
            // Chest lid (arched)
            ctx.fillStyle = '#A0522D';
            ctx.beginPath();
            ctx.moveTo(x - 25, y - 10);
            ctx.quadraticCurveTo(x, y - 28, x + 25, y - 10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Gold trim bands
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(x - 25, y - 12, 50, 4);
            ctx.fillRect(x - 25, y + 8, 50, 4);
            // Lock
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y - 2, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 2, y - 2, 4, 5);

            // Balloons above
            const balloonColors = ['#FF5252', '#4CAF50', '#2196F3', '#FF9800'];
            for (let i = 0; i < 4; i++) {
                const bx = x - 20 + i * 14;
                const by = y - 45 - Math.sin(time * 0.06 + i) * 3;
                // String
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(bx, by + 10);
                ctx.lineTo(x - 10 + i * 8, y - 15);
                ctx.stroke();
                // Balloon
                ctx.fillStyle = balloonColors[i];
                ctx.beginPath();
                ctx.ellipse(bx, by, 9, 11, 0, 0, Math.PI * 2);
                ctx.fill();
                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.ellipse(bx - 3, by - 4, 3, 4, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }
            // Pig next to chest
            drawPig(ctx, x + 35, y + 5, pigExpression);
        }
        ctx.restore();
    }

    // ── Particles ──
    function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.type !== 'bubble') p.vy += 0.15;
            else p.vy -= 0.02;
            p.life--;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            if (p.type === 'confetti') {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle + time * p.spin);
                ctx.fillRect(-4, -2, 8, 4);
                ctx.restore();
            } else if (p.type === 'smoke') {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (1 + (1 - alpha) * 2), 0, Math.PI * 2);
                ctx.fill();
            } else if (p.type === 'star') {
                ctx.font = p.size + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText('\u2B50', p.x, p.y);
            } else if (p.type === 'bubble') {
                ctx.strokeStyle = p.color;
                ctx.globalAlpha = alpha * 0.6;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
    }

    function spawnConfetti(x, y) {
        const colors = ['#FF5252', '#4CAF50', '#FFD700', '#2196F3', '#FF9800', '#E040FB'];
        for (let i = 0; i < 30; i++) {
            particles.push({
                type: 'confetti', x: x + (Math.random() - 0.5) * 60, y: y,
                vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 8 - 2,
                size: 4, life: 80 + Math.random() * 40, maxLife: 120,
                color: colors[Math.floor(Math.random() * colors.length)],
                angle: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 0.3,
            });
        }
        for (let i = 0; i < 5; i++) {
            particles.push({
                type: 'star', x: x + (Math.random() - 0.5) * 80, y: y - Math.random() * 30,
                vx: (Math.random() - 0.5) * 3, vy: -Math.random() * 5 - 1,
                size: 16 + Math.random() * 10, life: 60 + Math.random() * 30, maxLife: 90, color: '#FFD700',
            });
        }
    }

    function spawnExplosion(x, y) {
        const colors = ['#FF5252', '#FF9800', '#FFD700', '#FF6D00'];
        for (let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            particles.push({
                type: 'default', x: x, y: y,
                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
                size: 3 + Math.random() * 4, life: 30 + Math.random() * 20, maxLife: 50,
                color: colors[Math.floor(Math.random() * colors.length)],
            });
        }
    }

    function spawnBubbleTrail(x, y) {
        for (let i = 0; i < 4; i++) {
            particles.push({
                type: 'bubble',
                x: x + (Math.random() - 0.5) * 30,
                y: y + (Math.random() - 0.5) * 10,
                vx: (Math.random() - 0.5) * 1,
                vy: -Math.random() * 1.5 - 0.5,
                size: 2 + Math.random() * 4,
                life: 40 + Math.random() * 30,
                maxLife: 70,
                color: 'rgba(56,189,248,0.5)',
            });
        }
    }

    // ── Message bubble ──
    function drawBuoyancyMessage(msg) {
        ctx.save();
        const lines = msg.split('\n');
        ctx.font = '18px Jua, sans-serif';
        const lineH = 28;
        const totalH = lines.length * lineH + 24;
        const maxW = Math.max(...lines.map(l => ctx.measureText(l).width)) + 60;
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        roundRect(ctx, W / 2 - maxW / 2 - 10, surfaceY + 30, maxW + 20, totalH, 16);
        ctx.fill();
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 2;
        roundRect(ctx, W / 2 - maxW / 2 - 10, surfaceY + 30, maxW + 20, totalH, 16);
        ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        lines.forEach(function(line, i) {
            ctx.fillText(line, W / 2, surfaceY + 42 + i * lineH);
        });
        ctx.restore();
    }

    // ── Main animation loop ──
    function animate() {
        time++;
        ctx.clearRect(0, 0, W, H);
        drawBuoyancyBg();

        const F = cfg.rho * currentV * cfg.g;
        const vehicleX = W / 2 - 30;

        switch (phase_buoy) {
            case 'intro':
                introTimer++;
                // Fade in: vehicle settles at bottom with bounce
                if (introTimer < 30) {
                    vehicleY = vehicleStartY + 20 - (20 * introTimer / 30);
                } else if (introTimer < 50) {
                    vehicleY = vehicleStartY + Math.sin((introTimer - 30) * 0.3) * 5 * (1 - (introTimer - 30) / 20);
                } else {
                    vehicleY = vehicleStartY;
                }
                pigExpression = 'happy';
                drawBuoyancyVehicle(vehicleX, vehicleY, cfg.vehicleType);

                // Instruction text
                if (introTimer > 30) {
                    ctx.globalAlpha = Math.min(1, (introTimer - 30) / 20);
                    drawBuoyancyMessage('\uC2AC\uB77C\uC774\uB354\uB85C \uBD80\uD53C(V)\uB97C \uC870\uC808\uD558\uACE0\n\uBC1C\uC0AC \uBC84\uD2BC\uC744 \uB204\uB974\uC138\uC694!');
                    ctx.globalAlpha = 1;
                }

                if (introTimer >= 90) {
                    phase_buoy = 'interactive';
                }
                break;

            case 'interactive':
                // Vehicle bobs gently
                vehicleY = vehicleStartY + Math.sin(time * 0.05) * 3;
                pigExpression = 'happy';
                shakeX = 0; shakeY = 0;
                drawBuoyancyVehicle(vehicleX, vehicleY, cfg.vehicleType);
                drawLaunchButton();
                break;

            case 'rising': {
                const netForce = F - cfg.weight;
                if (netForce > 0) {
                    // Rising
                    const accel = netForce / cfg.weight * 0.08;
                    vehicleVY -= accel;
                    vehicleVY *= 0.98; // damping
                    vehicleY += vehicleVY;
                    pigExpression = 'happy';
                    shakeX = 0; shakeY = 0;

                    // Bubble trail
                    if (time % 3 === 0) spawnBubbleTrail(vehicleX, vehicleY + 15);

                    // Reached surface
                    if (vehicleY <= surfaceY + 5) {
                        vehicleY = surfaceY + 5;
                        phase_buoy = 'success';
                        endTimer = 0;
                        playSound('ding');
                        spawnConfetti(vehicleX, surfaceY);
                    }
                } else {
                    // Sinking / insufficient buoyancy
                    sinkTimer++;
                    vehicleY = Math.min(vehicleStartY + 10, vehicleY + 0.3);
                    shakeX = (Math.random() - 0.5) * 4;
                    shakeY = (Math.random() - 0.5) * 3;
                    pigExpression = 'worried';
                    if (sinkTimer > 60) {
                        phase_buoy = 'sinkfail';
                        endTimer = 0;
                        playSound('crash');
                        spawnExplosion(vehicleX, vehicleY);
                        pigExpression = 'dizzy';
                        shakeX = 0; shakeY = 0;
                    }
                }
                drawBuoyancyVehicle(vehicleX, vehicleY, cfg.vehicleType);
                break;
            }

            case 'success':
                endTimer++;
                vehicleY = surfaceY + 5 + Math.sin(time * 0.08) * 2;
                pigExpression = 'happy';
                shakeX = 0; shakeY = 0;
                drawBuoyancyVehicle(vehicleX, vehicleY, cfg.vehicleType);

                if (endTimer % 20 === 0 && endTimer < 80) {
                    spawnConfetti(vehicleX + (Math.random() - 0.5) * 80, surfaceY);
                }

                drawBuoyancyMessage('\uD83C\uDF89 \uC218\uBA74\uC5D0 \uB3C4\uCC29\uD588\uC5B4\uC694!');

                if (endTimer > 120) {
                    phase_buoy = 'done';
                    cleanup();
                    showResult(true);
                }
                break;

            case 'sinkfail':
                endTimer++;
                shakeX = endTimer < 10 ? (Math.random() - 0.5) * 6 : 0;
                shakeY = endTimer < 10 ? (Math.random() - 0.5) * 4 : 0;
                pigExpression = 'dizzy';
                drawBuoyancyVehicle(vehicleX, vehicleY, cfg.vehicleType);

                if (endTimer > 20) {
                    drawBuoyancyMessage('\uBD80\uB825\uC774 \uBD80\uC871\uD574\uC694!\n\uBD80\uD53C\uB97C \uB354 \uB298\uB824\uBCF4\uC138\uC694!');
                }

                if (endTimer > 120) {
                    phase_buoy = 'done';
                    cleanup();
                    showResult(false);
                }
                break;
        }

        // Draw UI overlays
        drawFormulaHUD(cfg.rho, currentV, cfg.g, F);
        if (phase_buoy === 'interactive' || phase_buoy === 'intro') {
            drawVolumeSlider(currentV, cfg.vMin, cfg.vMax);
        }
        drawDepthMeter(vehicleY);
        drawWeightBar(F, cfg.weight);

        drawParticles();

        if (phase_buoy !== 'done') {
            animFrame = requestAnimationFrame(animate);
        }
    }

    // Start
    animate();
}

// ──── VELOCITY MINI-GAME (v = d/t) ────
function runVelocityMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W; canvas.height = H;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.velocity;
    let userSpeed = 5, launched = false, carX = 50, success = false, done = false;
    let elapsed = 0;

    canvas.onclick = (e) => {
        if (done) { showResult(success); return; }
        if (!launched) { launched = true; playSound('drive'); }
    };
    canvas.onmousemove = (e) => {
        if (launched) return;
        const rect = canvas.getBoundingClientRect();
        userSpeed = Math.max(1, Math.min(20, ((e.clientY - rect.top) / H) * 20));
    };

    function animate() {
        if (done && elapsed > 3) return;
        ctx.clearRect(0, 0, W, H);
        // Sky + ground
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, W, H * 0.6);
        ctx.fillStyle = '#8B7355'; ctx.fillRect(0, H * 0.6, W, H * 0.4);
        // Road
        ctx.fillStyle = '#555'; ctx.fillRect(0, H * 0.6 - 10, W, 20);
        // Formula HUD
        ctx.font = 'bold 18px "Jua"'; ctx.fillStyle = '#fff';
        ctx.fillText(`v = d / t = ${cfg.dist}m / t`, 20, 30);
        ctx.fillText(`설정 속도: ${userSpeed.toFixed(1)} m/s`, 20, 55);
        if (launched) {
            elapsed += 0.033;
            carX += userSpeed * 0.033 * (W - 100) / (cfg.dist / cfg.speed);
            ctx.fillText(`경과: ${elapsed.toFixed(1)}s`, 20, 80);
        }
        // Car
        ctx.fillStyle = '#ef4444'; ctx.fillRect(carX, H * 0.6 - 30, 40, 20);
        ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(carX + 8, H * 0.6 - 8, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(carX + 32, H * 0.6 - 8, 6, 0, Math.PI * 2); ctx.fill();
        // Goal
        ctx.fillStyle = '#22c55e'; ctx.fillRect(W - 60, H * 0.6 - 40, 10, 40);
        ctx.font = '24px sans-serif'; ctx.fillText('🏪', W - 65, H * 0.6 - 45);
        // Check arrival
        if (carX >= W - 70) {
            done = true;
            const expectedTime = cfg.dist / userSpeed;
            success = Math.abs(expectedTime - cfg.dist / cfg.speed) < 3;
            ctx.font = 'bold 28px "Jua"';
            ctx.fillStyle = success ? '#22c55e' : '#ef4444';
            ctx.fillText(success ? '🎉 도착!' : '❌ 실패', W / 2 - 50, H / 2);
        }
        if (!launched) {
            ctx.font = '16px "Jua"'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText('마우스 위아래로 속도 조절 → 클릭하여 출발!', W / 2 - 160, H - 20);
        }
        requestAnimationFrame(animate);
    }
    animate();
}

// ──── FORCE MINI-GAME (F = ma) ────
function runForceMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W; canvas.height = H;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.force;
    let userForce = 50, pushing = false, boxX = 100, boxV = 0, done = false, success = false;

    canvas.onclick = () => {
        if (done) { showResult(success); return; }
        pushing = !pushing;
        if (pushing) playSound('drive');
    };
    canvas.onmousemove = (e) => {
        if (pushing) return;
        const rect = canvas.getBoundingClientRect();
        userForce = Math.max(10, Math.min(200, (1 - (e.clientY - rect.top) / H) * 200));
    };

    function animate() {
        if (done) return;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#f5f5dc'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ddd'; ctx.fillRect(0, H * 0.7, W, H * 0.3);
        // Formula
        const accel = userForce / cfg.mass;
        ctx.font = 'bold 18px "Jua"'; ctx.fillStyle = '#333';
        ctx.fillText(`F = ma → ${userForce.toFixed(0)}N = ${cfg.mass}kg × ${accel.toFixed(1)}m/s²`, 20, 30);
        // Push
        if (pushing) {
            boxV += accel * 0.01;
            boxX += boxV;
        }
        // Box
        ctx.fillStyle = '#8B4513'; ctx.fillRect(boxX, H * 0.7 - 50, 50, 50);
        ctx.font = '24px sans-serif'; ctx.fillText('📦', boxX + 8, H * 0.7 - 15);
        // Force arrow
        if (pushing) {
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(boxX - 5, H * 0.7 - 25);
            ctx.lineTo(boxX - 5 - userForce * 0.3, H * 0.7 - 25); ctx.stroke();
            ctx.fillStyle = '#ef4444'; ctx.font = '14px "Jua"';
            ctx.fillText(`${userForce.toFixed(0)}N →`, boxX - 5 - userForce * 0.3, H * 0.7 - 35);
        }
        // Goal
        ctx.fillStyle = '#22c55e'; ctx.fillRect(W - 80, H * 0.7 - 60, 60, 60);
        ctx.font = '16px "Jua"'; ctx.fillStyle = '#fff'; ctx.fillText('🏠 목표', W - 78, H * 0.7 - 25);
        // Check
        if (boxX >= W - 90) {
            done = true; success = true;
            ctx.font = 'bold 28px "Jua"'; ctx.fillStyle = '#22c55e';
            ctx.fillText('🎉 성공! F = ma 확인!', W / 2 - 130, H / 2);
            setTimeout(() => showResult(true), 2000);
            return;
        }
        if (!pushing) {
            ctx.font = '14px "Jua"'; ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillText('마우스로 힘 조절 → 클릭하여 밀기!', W / 2 - 120, H - 15);
        }
        requestAnimationFrame(animate);
    }
    animate();
}

// ──── KINETIC ENERGY MINI-GAME (E = ½mv²) ────
function runKineticEMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W; canvas.height = H;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.kineticE;
    let userV = 10, launched = false, rocketY = H - 80, done = false, success = false;

    canvas.onclick = () => {
        if (done) { showResult(success); return; }
        if (!launched) { launched = true; playSound('drive'); }
    };
    canvas.onmousemove = (e) => {
        if (launched) return;
        const rect = canvas.getBoundingClientRect();
        userV = Math.max(1, Math.min(cfg.vMax, (1 - (e.clientY - rect.top) / H) * cfg.vMax));
    };

    function animate() {
        if (done) return;
        ctx.clearRect(0, 0, W, H);
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0a0a2e'); grad.addColorStop(1, '#1a1a4e');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        // Stars
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 30; i++) { ctx.fillRect((i*97)%W, (i*53)%H, 2, 2); }
        // Ground
        ctx.fillStyle = '#4a4a4a'; ctx.fillRect(0, H - 30, W, 30);
        // Formula HUD
        const E = 0.5 * cfg.mass * userV * userV;
        ctx.font = 'bold 18px "Jua"'; ctx.fillStyle = '#fff';
        ctx.fillText(`E = ½mv² = ½ × ${cfg.mass} × ${userV.toFixed(1)}² = ${E.toFixed(0)}J`, 20, 30);
        // Energy bar
        const maxE = 0.5 * cfg.mass * cfg.vMax * cfg.vMax;
        const barW = (E / maxE) * 200;
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(20, 40, 200, 12);
        ctx.fillStyle = E >= 800 ? '#22c55e' : '#f59e0b'; ctx.fillRect(20, 40, barW, 12);
        // Launch
        if (launched) {
            rocketY -= userV * 0.15;
            // Flame
            ctx.fillStyle = '#ff6600';
            ctx.beginPath(); ctx.moveTo(W/2-8, rocketY+30); ctx.lineTo(W/2, rocketY+50+Math.random()*10);
            ctx.lineTo(W/2+8, rocketY+30); ctx.fill();
        }
        // Rocket
        ctx.font = '36px sans-serif'; ctx.fillText('🚀', W/2-18, rocketY);
        // Target line
        ctx.strokeStyle = 'rgba(34,197,94,0.5)'; ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(W, 60); ctx.stroke();
        ctx.setLineDash([]); ctx.font = '12px "Jua"'; ctx.fillStyle = '#22c55e'; ctx.fillText('🌟 목표 고도', W-100, 55);
        // Check
        if (rocketY <= 60) {
            done = true; success = true;
            ctx.font = 'bold 28px "Jua"'; ctx.fillStyle = '#22c55e';
            ctx.fillText('🎉 발사 성공!', W/2-80, H/2);
            setTimeout(() => showResult(true), 2000); return;
        }
        if (launched && rocketY >= H - 30) {
            done = true; success = false;
            ctx.font = 'bold 28px "Jua"'; ctx.fillStyle = '#ef4444';
            ctx.fillText('❌ 에너지 부족!', W/2-80, H/2);
            setTimeout(() => showResult(false), 2000); return;
        }
        if (!launched) {
            ctx.font = '14px "Jua"'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText('마우스로 속도 조절 → 클릭하여 발사!', W/2-130, H-40);
        }
        requestAnimationFrame(animate);
    }
    animate();
}

// ──── POTENTIAL ENERGY MINI-GAME (E = mgh) ────
function runPotentialEMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W; canvas.height = H;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.potentialE;
    let userH = 3, launched = false, carX = 80, carY = H - 80, done = false, success = false;
    const targetH = cfg.height;
    const slopeLen = W * 0.6;

    canvas.onclick = () => {
        if (done) { showResult(success); return; }
        if (!launched) { launched = true; playSound('drive'); }
    };
    canvas.onmousemove = (e) => {
        if (launched) return;
        const rect = canvas.getBoundingClientRect();
        userH = Math.max(1, Math.min(10, (1 - (e.clientY - rect.top) / H) * 10));
    };

    function animate() {
        if (done) return;
        ctx.clearRect(0, 0, W, H);
        // Sky
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, W, H);
        // Hill
        const hillTop = H - 80 - (userH / 10) * (H - 120);
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(0, H - 80);
        ctx.lineTo(W * 0.6, hillTop); ctx.lineTo(W, hillTop); ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
        // Formula
        const E = cfg.mass * cfg.g * userH;
        ctx.font = 'bold 18px "Jua"'; ctx.fillStyle = '#333';
        ctx.fillText(`E = mgh = ${cfg.mass} × ${cfg.g} × ${userH.toFixed(1)} = ${E.toFixed(0)}J`, 20, 30);
        // Target
        const needE = cfg.mass * cfg.g * targetH;
        ctx.fillText(`필요 에너지: ${needE}J (높이 ${targetH}m)`, 20, 55);
        // Energy bar
        ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(20, 65, 200, 10);
        ctx.fillStyle = E >= needE ? '#22c55e' : '#f59e0b'; ctx.fillRect(20, 65, Math.min(E/needE,1)*200, 10);
        // Car on slope
        if (launched) {
            const progress = Math.min(1, (Date.now() % 5000) / 3000);
            carX = 80 + progress * (W * 0.6 - 80);
            carY = (H - 80) + progress * (hillTop - (H - 80));
        }
        ctx.font = '28px sans-serif'; ctx.fillText('🚗', carX, carY - 5);
        // Flag at top
        ctx.fillText('⛰️', W * 0.8, hillTop - 10);
        // Check
        if (launched && carX >= W * 0.55) {
            done = true; success = E >= needE;
            ctx.font = 'bold 28px "Jua"';
            ctx.fillStyle = success ? '#22c55e' : '#ef4444';
            ctx.fillText(success ? '🎉 정상 도달!' : '❌ 에너지 부족!', W/2-80, H/2-50);
            setTimeout(() => showResult(success), 2000); return;
        }
        if (!launched) {
            ctx.font = '14px "Jua"'; ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillText('마우스로 높이 조절 → 클릭하여 출발!', W/2-130, H-15);
        }
        requestAnimationFrame(animate);
    }
    animate();
}

// ──── PYTHAGOREAN MINI-GAME (a²+b²=c²) ────
function runPythagorasMiniGame() {
    const canvas = document.getElementById('trackCanvas');
    const parent = document.getElementById('testPhase');
    const W = Math.min(parent.clientWidth - 40, 900);
    const H = Math.min(parent.clientHeight - 40, 400);
    canvas.width = W; canvas.height = H;
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const lv = LEVELS[currentLevelIdx];
    const cfg = lv.pythag;
    let userC = 30, confirmed = false, done = false, success = false;

    canvas.onclick = () => {
        if (done) { showResult(success); return; }
        if (!confirmed) {
            confirmed = true;
            success = Math.abs(userC - cfg.c) < 2;
            done = true;
            playSound(success ? 'success' : 'fail');
            setTimeout(() => showResult(success), 2500);
        }
    };
    canvas.onmousemove = (e) => {
        if (confirmed) return;
        const rect = canvas.getBoundingClientRect();
        userC = Math.max(10, Math.min(80, ((e.clientX - rect.left) / W) * 80));
    };

    function animate() {
        ctx.clearRect(0, 0, W, H);
        // Water background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#87CEEB'); grad.addColorStop(0.6, '#4A90D9'); grad.addColorStop(1, '#2E5090');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        // Banks
        ctx.fillStyle = '#5D8C5A'; ctx.fillRect(0, H*0.35, W*0.15, H*0.65);
        ctx.fillRect(W*0.85, H*0.35, W*0.15, H*0.65);
        // Triangle
        const x1 = W * 0.15, y1 = H * 0.7; // bottom-left
        const x2 = W * 0.85, y2 = H * 0.7; // bottom-right
        const x3 = W * 0.15, y3 = H * 0.3; // top-left
        // a (vertical)
        ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x3, y3); ctx.stroke();
        ctx.font = 'bold 16px "Jua"'; ctx.fillStyle = '#FFD700';
        ctx.fillText(`a = ${cfg.a}m`, x1 - 80, (y1+y3)/2);
        // b (horizontal)
        ctx.strokeStyle = '#4ECDC4';
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.fillStyle = '#4ECDC4';
        ctx.fillText(`b = ${cfg.b}m`, (x1+x2)/2 - 30, y1 + 25);
        // c (hypotenuse) — user adjusts
        ctx.strokeStyle = confirmed ? (success ? '#22c55e' : '#ef4444') : '#fff';
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 18px "Jua"';
        ctx.fillText(`c = ${userC.toFixed(0)}m ?`, (x3+x2)/2, (y3+y2)/2 - 10);
        // Formula
        ctx.font = 'bold 16px "Jua"'; ctx.fillStyle = '#fff';
        ctx.fillText(`a² + b² = c²`, 20, 25);
        ctx.fillText(`${cfg.a}² + ${cfg.b}² = ${cfg.a*cfg.a + cfg.b*cfg.b}`, 20, 48);
        ctx.fillText(`c = √${cfg.a*cfg.a + cfg.b*cfg.b} = ${cfg.c}`, 20, 71);
        // Bridge emoji
        ctx.font = '32px sans-serif'; ctx.fillText('🌉', (x3+x2)/2 - 16, (y3+y2)/2 + 25);
        // Result
        if (confirmed) {
            ctx.font = 'bold 28px "Jua"';
            ctx.fillStyle = success ? '#22c55e' : '#ef4444';
            ctx.fillText(success ? `🎉 정답! c = ${cfg.c}m` : `❌ 오답! 정답: ${cfg.c}m`, W/2-120, 120);
        } else {
            ctx.font = '14px "Jua"'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText('마우스로 c 값 조절 → 클릭하여 확인!', W/2-130, H-15);
        }
        if (!done) requestAnimationFrame(animate);
    }
    animate();
}

// ──── RESULT ────
function showResult(success) {
    const overlay = document.getElementById('resultOverlay');
    overlay.style.display = 'flex';

    const formula = FORMULAS[engineFormula];
    let stars = 0;
    let title, message, formulaText;

    const lv = LEVELS[currentLevelIdx];
    const correctF = Object.entries(lv.formulas).find(([k,f])=>f.correct);
    const resultCard = document.getElementById('resultCard');
    const trophyEl = document.getElementById('resultTrophy');
    const pigReaction = document.getElementById('resultPigReaction');

    resultCard.classList.remove('fail-card');

    if (success) {
        stars = 1;
        if (firstTry) stars = 2;
        const actualAns = lv.predict.ans;
        if (predictedTime && Math.abs(predictedTime - actualAns) / actualAns <= 0.15) stars = 3;

        title = stars === 3 ? 'PERFECT!' : stars === 2 ? 'GREAT!' : 'CLEAR!';
        message = lv.anim.result;
        formulaText = lv.anim.formulaR;
        trophyEl.textContent = stars === 3 ? '🏆' : stars === 2 ? '🎖️' : '🎯';
        pigReaction.textContent = stars === 3 ? '🐷✨🎉' : stars === 2 ? '🐷👏' : '🐷👍';

        // Save progress
        localStorage.setItem('mp_stars_'+currentLevelIdx, Math.max(stars, parseInt(localStorage.getItem('mp_stars_'+currentLevelIdx)||'0')));
        if (currentLevelIdx + 1 < LEVELS.length) {
            lvProgress[currentLevelIdx + 1] = true;
            localStorage.setItem('mp_progress', JSON.stringify(lvProgress));
        }

        // Spawn CSS confetti
        spawnCSSConfetti();
    } else {
        stars = 0;
        title = 'OOPS!';
        resultCard.classList.add('fail-card');
        const wrongF = lv.formulas[engineFormula];
        const correctName = correctF ? correctF[1].name : '';
        message = `${wrongF?.name || '이 공식'}은 여기에 맞지 않아요.\n${correctName}를 사용해보세요!`;
        formulaText = `${wrongF?.formula}  →  이 문제에 맞지 않아요!`;
        trophyEl.textContent = '💥';
        pigReaction.textContent = '🐷😅💦';
        firstTry = false;
    }

    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMessage').textContent = message;
    document.getElementById('resultFormula').textContent = formulaText;

    // Animate stars
    for (let i = 1; i <= 3; i++) {
        const starEl = document.getElementById('star' + i);
        starEl.classList.remove('earned');
        if (i <= stars) {
            setTimeout(() => {
                starEl.classList.add('earned');
                playSound('success');
            }, 400 * i);
        }
    }
}

function spawnCSSConfetti() {
    const container = document.getElementById('resultConfetti');
    container.innerHTML = '';
    const colors = ['#FFD700','#FF5252','#4CAF50','#2196F3','#FF9800','#E040FB','#00BCD4','#FF1493'];
    for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'result-confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.animationDelay = (Math.random() * 1.5) + 's';
        container.appendChild(piece);
    }
}

// ──── NEXT LEVEL ────
function nextLevel() {
    if (currentLevelIdx + 1 < LEVELS.length) {
        document.getElementById('resultOverlay').style.display = 'none';
        startLevel(currentLevelIdx + 1);
    } else {
        // All levels done — back to selector
        document.getElementById('resultOverlay').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        document.getElementById('levelSelect').style.display = '';
        renderLevelSelect();
    }
}

function backToLevelSelect() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('levelSelect').style.display = '';
    renderLevelSelect();
}

// ──── INITIALIZATION ────
function init() {
    renderLevelSelect();
}

init();
</script>
