// ═══════════════════════════════════════════════════════
// ██  FREEHAND SHAPE RECOGNITION
// ═══════════════════════════════════════════════════════

function recognizeFreehand(screenPoints) {
  // Convert screen points to world points
  const worldPts = screenPoints.map(sp => screenToWorld(sp.x, sp.y));
  // Simplify with Ramer-Douglas-Peucker
  const simplified = rdpSimplify(worldPts, RDP_TOLERANCE / zoom);

  if (simplified.length < 2) return;

  // Check if it's roughly circular
  if (isRoughlyCircular(worldPts)) {
    const c = fitCircle(worldPts);
    if (c.radius > 5) {
      finishCircle(c.center, c.radius);
      showToast('⭕ 원 인식!');
      return;
    }
  }

  // Check endpoints proximity (closed shape)
  const first = simplified[0], last = simplified[simplified.length - 1];
  const isClosed = dist(first, last) < 40 / zoom;

  if (!isClosed && simplified.length === 2) {
    // Line
    const p1 = snapPoint(simplified[0].x, simplified[0].y);
    const p2 = snapPoint(simplified[1].x, simplified[1].y);
    finishLine(p1, p2);
    showToast('📏 직선 인식!');
    return;
  }

  if (isClosed) {
    // Remove duplicate last point
    const verts = simplified.slice(0, -1);
    if (verts.length === 3) {
      const pts = verts.map(v => snapPoint(v.x, v.y));
      const s = makeShape('triangle', {points: pts});
      shapes.push(s);
      selectedIds.clear(); selectedIds.add(s.id);
      saveState(); updatePropsPanel();
      showToast('🔺 삼각형 인식!');
      return;
    }
    if (verts.length === 4) {
      // Check if roughly rectangular
      const pts = verts.map(v => snapPoint(v.x, v.y));
      const angles = [];
      for (let i = 0; i < 4; i++) {
        const prev = pts[(i+3)%4], cur = pts[i], next = pts[(i+1)%4];
        angles.push(angleBetween(cur, prev, next));
      }
      const isRect = angles.every(a => Math.abs(a - 90) < 20);
      if (isRect) {
        const s = makeShape('rect', {points: pts});
        shapes.push(s);
        selectedIds.clear(); selectedIds.add(s.id);
        saveState(); updatePropsPanel();
        showToast('⬜ 사각형 인식!');
        return;
      }
      const s = makeShape('polygon', {points: pts});
      shapes.push(s);
      selectedIds.clear(); selectedIds.add(s.id);
      saveState(); updatePropsPanel();
      showToast('⬠ 사각형 인식!');
      return;
    }
    if (verts.length >= 3) {
      const pts = verts.map(v => snapPoint(v.x, v.y));
      const s = makeShape('polygon', {points: pts});
      shapes.push(s);
      selectedIds.clear(); selectedIds.add(s.id);
      saveState(); updatePropsPanel();
      showToast('⬠ 다각형 인식!');
      return;
    }
  }

  // Fallback: draw as line
  if (simplified.length >= 2) {
    const p1 = snapPoint(simplified[0].x, simplified[0].y);
    const p2 = snapPoint(simplified[simplified.length-1].x, simplified[simplified.length-1].y);
    finishLine(p1, p2);
    showToast('📏 직선 인식!');
  }
}

function rdpSimplify(points, epsilon) {
  if (points.length <= 2) return points;
  let maxDist = 0, maxIdx = 0;
  const first = points[0], last = points[points.length - 1];
  for (let i = 1; i < points.length - 1; i++) {
    const d = distToSegment(points[i], first, last);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > epsilon) {
    const left = rdpSimplify(points.slice(0, maxIdx + 1), epsilon);
    const right = rdpSimplify(points.slice(maxIdx), epsilon);
    return left.slice(0, -1).concat(right);
  }
  return [first, last];
}

function isRoughlyCircular(pts) {
  if (pts.length < 10) return false;
  const first = pts[0], last = pts[pts.length - 1];
  if (dist(first, last) > 60 / zoom) return false; // not closed
  const c = fitCircle(pts);
  if (c.radius < 5) return false;
  let sumErr = 0;
  for (const p of pts) {
    const d = Math.abs(dist(p, c.center) - c.radius);
    sumErr += d;
  }
  const avgErr = sumErr / pts.length;
  return avgErr < c.radius * 0.3;
}

function fitCircle(pts) {
  let cx = 0, cy = 0;
  pts.forEach(p => { cx += p.x; cy += p.y; });
  cx /= pts.length; cy /= pts.length;
  let r = 0;
  pts.forEach(p => { r += dist(p, {x:cx,y:cy}); });
  r /= pts.length;
  return {center:{x:cx,y:cy}, radius: r};
}

// ═══════════════════════════════════════════════════════
// ██  RENDERING
// ═══════════════════════════════════════════════════════

function renderLoop() {
  render();
  requestAnimationFrame(renderLoop);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  // Background
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, W, H);
  // Grid
  if (showGrid) drawGrid(ctx, 'rgba(255,255,255,0.07)', 0.5);
  // Shapes (drawn in layer order, respecting visibility & opacity)
  if (layers) {
    layers.forEach(layer => {
      if (!layer.visible) return;
      ctx.save();
      ctx.globalAlpha = layer.opacity;
      shapes.forEach(s => {
        if (s.layerId === layer.id) drawShape(ctx, s, selectedIds.has(s.id));
      });
      ctx.restore();
    });
    // Also draw shapes with no layerId (legacy)
    shapes.forEach(s => {
      if (!s.layerId || !layers.find(l => l.id === s.layerId)) {
        drawShape(ctx, s, selectedIds.has(s.id));
      }
    });
  } else {
    shapes.forEach(s => drawShape(ctx, s, selectedIds.has(s.id)));
  }
  // Building shapes
  drawBuilding(ctx);
  // Freehand stroke
  if (isFreehandDrawing && freehandPoints.length > 1) {
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(freehandPoints[0].x, freehandPoints[0].y);
    for (let i = 1; i < freehandPoints.length; i++) {
      ctx.lineTo(freehandPoints[i].x, freehandPoints[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  // Marquee
  if (marqueeStart && marqueeEnd) {
    ctx.strokeStyle = 'rgba(59,130,246,0.6)';
    ctx.fillStyle = 'rgba(59,130,246,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    const x = Math.min(marqueeStart.x, marqueeEnd.x);
    const y = Math.min(marqueeStart.y, marqueeEnd.y);
    const w = Math.abs(marqueeEnd.x - marqueeStart.x);
    const h = Math.abs(marqueeEnd.y - marqueeStart.y);
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
  }
  // Vertex tool: draw larger vertex handles
  if (currentTool === 'vertex') {
    shapes.forEach(s => {
      const layer = getLayer(s.layerId);
      if (layer && (!layer.visible || layer.locked)) return;
      const isSel = selectedIds.has(s.id);
      if (s.type === 'circle') {
        // Draw center handle
        const cp = worldToScreen(s.center.x, s.center.y);
        ctx.fillStyle = isSel ? '#f59e0b' : 'rgba(245,158,11,0.6)';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // Draw edge resize ring
        const r = s.radius * zoom;
        ctx.strokeStyle = isSel ? 'rgba(245,158,11,0.5)' : 'rgba(245,158,11,0.25)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      } else if (s.points) {
        s.points.forEach((p, i) => {
          const sp = worldToScreen(p.x, p.y);
          const isActive = isVertexDragging && vertexDragShape === s && vertexDragIndex === i;
          ctx.fillStyle = isActive ? '#fff' : (isSel ? '#f59e0b' : 'rgba(245,158,11,0.6)');
          ctx.strokeStyle = isActive ? '#f59e0b' : '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(sp.x, sp.y, isActive ? 10 : 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        });
      }
    });
  }
  // Measurements
  drawMeasurements(ctx);
  // Measure tool: in-progress points
  if (currentTool === 'measure' && measurePoints.length > 0) {
    ctx.fillStyle = '#58a6ff';
    measurePoints.forEach(p => {
      const sp = worldToScreen(p.x, p.y);
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 5, 0, Math.PI * 2);
      ctx.fill();
    });
    if (measurePoints.length >= 1 && rubberPoint) {
      const sp1 = worldToScreen(measurePoints[0].x, measurePoints[0].y);
      const sp2 = worldToScreen(rubberPoint.x, rubberPoint.y);
      ctx.strokeStyle = 'rgba(88,166,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(sp1.x, sp1.y);
      ctx.lineTo(sp2.x, sp2.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // Text annotations
  drawTextAnnotations(ctx);
  // Ruler overlay & graph functions (added by extended tools)
  if (typeof drawRulerOverlay === 'function') drawRulerOverlay();
  if (typeof drawGraphFunctions === 'function') drawGraphFunctions();
}

function drawMeasurements(c) {
  measurements.forEach(m => {
    if (m.type === 'dist') {
      const s1 = worldToScreen(m.p1.x, m.p1.y);
      const s2 = worldToScreen(m.p2.x, m.p2.y);
      // Dashed blue line
      c.strokeStyle = '#58a6ff';
      c.lineWidth = 1.5;
      c.setLineDash([6,4]);
      c.beginPath();
      c.moveTo(s1.x, s1.y); c.lineTo(s2.x, s2.y);
      c.stroke();
      c.setLineDash([]);
      // Dots
      [s1, s2].forEach(p => {
        c.fillStyle = '#58a6ff';
        c.beginPath();
        c.arc(p.x, p.y, 4, 0, Math.PI * 2);
        c.fill();
      });
      // Label
      const mx = (s1.x + s2.x) / 2, my = (s1.y + s2.y) / 2;
      const label = (m.value / GRID_SIZE).toFixed(2) + 'm';
      c.font = "bold 12px 'Pretendard Variable', sans-serif";
      const tw = c.measureText(label).width;
      c.fillStyle = 'rgba(15,23,41,0.85)';
      c.fillRect(mx - tw/2 - 4, my - 9, tw + 8, 18);
      c.fillStyle = '#58a6ff';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText(label, mx, my);
    } else if (m.type === 'angle') {
      const s1 = worldToScreen(m.p1.x, m.p1.y);
      const s2 = worldToScreen(m.p2.x, m.p2.y); // vertex
      const s3 = worldToScreen(m.p3.x, m.p3.y);
      // Lines
      c.strokeStyle = 'rgba(88,166,255,0.5)';
      c.lineWidth = 1.5;
      c.setLineDash([6,4]);
      c.beginPath();
      c.moveTo(s1.x, s1.y); c.lineTo(s2.x, s2.y); c.lineTo(s3.x, s3.y);
      c.stroke();
      c.setLineDash([]);
      // Arc
      const a1 = Math.atan2(s1.y - s2.y, s1.x - s2.x);
      const a2 = Math.atan2(s3.y - s2.y, s3.x - s2.x);
      c.strokeStyle = '#58a6ff';
      c.lineWidth = 2;
      c.beginPath();
      c.arc(s2.x, s2.y, 25, a1, a2, a2 < a1);
      c.stroke();
      // Label
      const midA = (a1 + a2) / 2;
      const lx = s2.x + Math.cos(midA) * 38;
      const ly = s2.y + Math.sin(midA) * 38;
      const label = m.value.toFixed(1) + '°';
      c.font = "bold 12px 'Pretendard Variable', sans-serif";
      const tw = c.measureText(label).width;
      c.fillStyle = 'rgba(15,23,41,0.85)';
      c.fillRect(lx - tw/2 - 4, ly - 9, tw + 8, 18);
      c.fillStyle = '#58a6ff';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText(label, lx, ly);
      // Dots
      [s1, s2, s3].forEach(p => {
        c.fillStyle = '#58a6ff';
        c.beginPath();
        c.arc(p.x, p.y, 4, 0, Math.PI * 2);
        c.fill();
      });
    }
  });
}

function drawTextAnnotations(c) {
  textAnnotations.forEach(t => {
    const sp = worldToScreen(t.x, t.y);
    c.font = `bold ${t.fontSize}px 'Pretendard Variable', sans-serif`;
    const tw = c.measureText(t.text).width;
    // Background
    c.fillStyle = 'rgba(15,23,41,0.75)';
    c.fillRect(sp.x - 4, sp.y - t.fontSize + 2, tw + 8, t.fontSize + 6);
    // Text
    c.fillStyle = t.color;
    c.textAlign = 'left';
    c.textBaseline = 'top';
    c.fillText(t.text, sp.x, sp.y - t.fontSize + 5);
  });
}

function drawGrid(c, color, alpha) {
  c.save();
  c.globalAlpha = alpha;
  c.strokeStyle = color;
  c.lineWidth = 0.5;

  const step = GRID_SIZE * zoom;
  // Adaptive: if step too small, multiply
  let gridStep = step;
  while (gridStep < 10) gridStep *= 5;

  const offsetX = panX % gridStep;
  const offsetY = panY % gridStep;

  c.beginPath();
  for (let x = offsetX; x < W; x += gridStep) {
    c.moveTo(x, 0);
    c.lineTo(x, H);
  }
  for (let y = offsetY; y < H; y += gridStep) {
    c.moveTo(0, y);
    c.lineTo(W, y);
  }
  c.stroke();

  // Heavier lines every 5 grid cells
  const majorStep = gridStep * 5;
  if (majorStep > 20) {
    c.globalAlpha = alpha * 1.5;
    c.lineWidth = 1;
    const mOffX = panX % majorStep;
    const mOffY = panY % majorStep;
    c.beginPath();
    for (let x = mOffX; x < W; x += majorStep) { c.moveTo(x,0); c.lineTo(x,H); }
    for (let y = mOffY; y < H; y += majorStep) { c.moveTo(0,y); c.lineTo(W,y); }
    c.stroke();
  }

  // Origin axes
  const ox = worldToScreen(0,0);
  c.globalAlpha = alpha * 2;
  c.strokeStyle = 'rgba(245,158,11,0.3)';
  c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(ox.x, 0); c.lineTo(ox.x, H);
  c.moveTo(0, ox.y); c.lineTo(W, ox.y);
  c.stroke();

  c.restore();
}

function drawShape(c, s, selected, forExport=false) {
  const textColor = forExport ? '#333' : '#e2e8f0';
  const dimColor = forExport ? '#666' : '#94a3b8';
  const goldColor = forExport ? '#d97706' : '#f59e0b';
  const bgForLabel = forExport ? 'rgba(255,255,255,0.85)' : 'rgba(15,23,41,0.8)';

  if (s.type === 'circle') {
    drawCircleShape(c, s, selected, forExport, textColor, dimColor, goldColor, bgForLabel);
    return;
  }
  if (s.type === 'line') {
    drawLineShape(c, s, selected, forExport, textColor, dimColor, goldColor, bgForLabel);
    return;
  }

  const pts = s.points.map(p => worldToScreen(p.x, p.y));
  const n = pts.length;

  // 1. Fill
  c.fillStyle = s.fill;
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < n; i++) c.lineTo(pts[i].x, pts[i].y);
  c.closePath();
  c.fill();

  // 2. Stroke (per-edge colors)
  c.lineWidth = s.strokeWidth;
  const eColors = s.edgeColors || {};
  if (Object.keys(eColors).length === 0) {
    c.strokeStyle = s.stroke;
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < n; i++) c.lineTo(pts[i].x, pts[i].y);
    c.closePath();
    c.stroke();
  } else {
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      c.strokeStyle = eColors[i] || s.stroke;
      c.beginPath();
      c.moveTo(pts[i].x, pts[i].y);
      c.lineTo(pts[j].x, pts[j].y);
      c.stroke();
    }
  }

  // 3. Selected bounding box
  if (selected) {
    drawBoundingBox(c, pts);
  }

  // 4. Angle arcs & right-angle markers (skip hidden)
  if (s.angles) {
    const hiddenA = s.hiddenAngles || [];
    for (let i = 0; i < n; i++) {
      if (hiddenA.includes(i)) continue;
      const prev = pts[(i - 1 + n) % n];
      const cur = pts[i];
      const next = pts[(i + 1) % n];
      const angle = s.angles[i];
      if (Math.abs(angle - 90) < 1) {
        drawRightAngleMarker(c, cur, prev, next, s.stroke);
      } else {
        drawAngleArc(c, cur, prev, next, angle, goldColor, textColor, bgForLabel);
      }
    }
  }

  // 5. Edge lengths (skip hidden)
  if (s.lengths) {
    const hidden = s.hiddenEdges || [];
    for (let i = 0; i < n; i++) {
      if (hidden.includes(i)) continue;
      const j = (i + 1) % n;
      drawEdgeLength(c, pts[i], pts[j], s.lengths[i], dimColor, textColor, bgForLabel);
    }
  }

  // 6. Edge midpoint markers (small squares, skip hidden)
  for (let i = 0; i < n; i++) {
    if ((s.hiddenEdges || []).includes(i)) continue;
    const j = (i + 1) % n;
    const mx = (pts[i].x + pts[j].x) / 2;
    const my = (pts[i].y + pts[j].y) / 2;
    c.fillStyle = eColors[i] || s.stroke;
    c.globalAlpha = 0.6;
    const hs = MIDPOINT_SIZE / 2;
    c.fillRect(mx - hs, my - hs, MIDPOINT_SIZE, MIDPOINT_SIZE);
    c.globalAlpha = 1;
  }

  // 7. Vertex dots & labels
  for (let i = 0; i < n; i++) {
    c.fillStyle = goldColor;
    c.beginPath();
    c.arc(pts[i].x, pts[i].y, VERTEX_RADIUS, 0, Math.PI * 2);
    c.fill();
    // Label
    if (s.labels && s.labels[i]) {
      c.font = LABEL_FONT;
      const label = s.labels[i];
      const tw = c.measureText(label).width;
      // Offset away from center
      const cx = pts.reduce((a,p)=>a+p.x,0)/n;
      const cy = pts.reduce((a,p)=>a+p.y,0)/n;
      const dx = pts[i].x - cx;
      const dy = pts[i].y - cy;
      const len = Math.hypot(dx, dy) || 1;
      const offX = pts[i].x + (dx/len)*16;
      const offY = pts[i].y + (dy/len)*16;
      // Background
      c.fillStyle = bgForLabel;
      c.fillRect(offX - tw/2 - 3, offY - 8, tw + 6, 16);
      c.fillStyle = textColor;
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText(label, offX, offY);
    }
  }
}

function drawCircleShape(c, s, selected, forExport, textColor, dimColor, goldColor, bgForLabel) {
  const center = worldToScreen(s.center.x, s.center.y);
  const r = s.radius * zoom;

  // Fill
  c.fillStyle = s.fill;
  c.beginPath();
  c.arc(center.x, center.y, r, 0, Math.PI*2);
  c.fill();
  // Stroke
  c.strokeStyle = s.stroke;
  c.lineWidth = s.strokeWidth;
  c.beginPath();
  c.arc(center.x, center.y, r, 0, Math.PI*2);
  c.stroke();

  // Radius line
  c.strokeStyle = dimColor;
  c.lineWidth = 1;
  c.setLineDash([4,4]);
  c.beginPath();
  c.moveTo(center.x, center.y);
  c.lineTo(center.x + r, center.y);
  c.stroke();
  c.setLineDash([]);

  // Radius label
  const rlabel = (s.radius / GRID_SIZE).toFixed(2) + 'm';
  c.font = SMALL_FONT;
  const tw = c.measureText(rlabel).width;
  const rx = center.x + r/2;
  const ry = center.y - 10;
  c.fillStyle = bgForLabel;
  c.fillRect(rx - tw/2 - 3, ry - 7, tw + 6, 14);
  c.fillStyle = dimColor;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(rlabel, rx, ry);

  // Center dot
  c.fillStyle = goldColor;
  c.beginPath();
  c.arc(center.x, center.y, VERTEX_RADIUS, 0, Math.PI*2);
  c.fill();

  // Center label
  if (s.labels && s.labels[0]) {
    c.font = LABEL_FONT;
    const label = s.labels[0];
    const lw = c.measureText(label).width;
    c.fillStyle = bgForLabel;
    c.fillRect(center.x - lw/2 - 3, center.y - r - 20, lw + 6, 16);
    c.fillStyle = textColor;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(label, center.x, center.y - r - 12);
  }

  if (selected) {
    c.strokeStyle = 'rgba(59,130,246,0.5)';
    c.lineWidth = 1;
    c.setLineDash([6,4]);
    const pad = 8;
    c.strokeRect(center.x - r - pad, center.y - r - pad, (r+pad)*2, (r+pad)*2);
    c.setLineDash([]);
  }
}

function drawLineShape(c, s, selected, forExport, textColor, dimColor, goldColor, bgForLabel) {
  const pts = s.points.map(p => worldToScreen(p.x, p.y));

  // Stroke
  c.strokeStyle = s.stroke;
  c.lineWidth = s.strokeWidth;
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  c.lineTo(pts[1].x, pts[1].y);
  c.stroke();

  // Length label
  const len = s.length || dist(s.points[0], s.points[1]);
  drawEdgeLength(c, pts[0], pts[1], len, dimColor, textColor, bgForLabel);

  // Midpoint marker
  const mx = (pts[0].x + pts[1].x)/2, my = (pts[0].y + pts[1].y)/2;
  c.fillStyle = s.stroke;
  c.globalAlpha = 0.6;
  const hs = MIDPOINT_SIZE/2;
  c.fillRect(mx-hs, my-hs, MIDPOINT_SIZE, MIDPOINT_SIZE);
  c.globalAlpha = 1;

  // Vertex dots & labels
  for (let i = 0; i < 2; i++) {
    c.fillStyle = goldColor;
    c.beginPath();
    c.arc(pts[i].x, pts[i].y, VERTEX_RADIUS, 0, Math.PI*2);
    c.fill();
    if (s.labels && s.labels[i]) {
      c.font = LABEL_FONT;
      const label = s.labels[i];
      const tw = c.measureText(label).width;
      const dx = i === 0 ? -16 : 16;
      c.fillStyle = bgForLabel;
      c.fillRect(pts[i].x + dx - tw/2 - 3, pts[i].y - 18, tw + 6, 16);
      c.fillStyle = textColor;
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText(label, pts[i].x + dx, pts[i].y - 10);
    }
  }

  if (selected) {
    c.strokeStyle = 'rgba(59,130,246,0.5)';
    c.lineWidth = 1;
    c.setLineDash([6,4]);
    const pad = 10;
    const minX = Math.min(pts[0].x, pts[1].x) - pad;
    const minY = Math.min(pts[0].y, pts[1].y) - pad;
    const maxX = Math.max(pts[0].x, pts[1].x) + pad;
    const maxY = Math.max(pts[0].y, pts[1].y) + pad;
    c.strokeRect(minX, minY, maxX-minX, maxY-minY);
    c.setLineDash([]);
  }
}

function drawAngleArc(c, vertex, p1, p2, angleDeg, goldColor, textColor, bgForLabel) {
  const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
  const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);

  // Determine sweep direction (always draw the interior angle)
  let start = a1, end = a2;
  let diff = end - start;
  while (diff < -Math.PI) diff += 2*Math.PI;
  while (diff > Math.PI) diff -= 2*Math.PI;

  c.strokeStyle = goldColor;
  c.lineWidth = 1.5;
  c.globalAlpha = 0.7;
  c.beginPath();
  if (diff > 0) {
    c.arc(vertex.x, vertex.y, ANGLE_ARC_R, start, start + diff);
  } else {
    c.arc(vertex.x, vertex.y, ANGLE_ARC_R, start + diff, start);
  }
  c.stroke();
  c.globalAlpha = 1;

  // Angle text
  const midAngle = start + diff / 2;
  const tx = vertex.x + Math.cos(midAngle) * (ANGLE_ARC_R + 14);
  const ty = vertex.y + Math.sin(midAngle) * (ANGLE_ARC_R + 14);
  const label = Math.round(angleDeg) + '°';
  c.font = SMALL_FONT;
  const tw = c.measureText(label).width;
  c.fillStyle = bgForLabel;
  c.fillRect(tx - tw/2 - 2, ty - 7, tw + 4, 14);
  c.fillStyle = goldColor;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(label, tx, ty);
}

function drawRightAngleMarker(c, vertex, p1, p2, color) {
  const size = 12;
  const v1 = {x: p1.x - vertex.x, y: p1.y - vertex.y};
  const v2 = {x: p2.x - vertex.x, y: p2.y - vertex.y};
  const l1 = Math.hypot(v1.x, v1.y) || 1;
  const l2 = Math.hypot(v2.x, v2.y) || 1;
  const u1 = {x: v1.x/l1*size, y: v1.y/l1*size};
  const u2 = {x: v2.x/l2*size, y: v2.y/l2*size};

  c.strokeStyle = color;
  c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(vertex.x + u1.x, vertex.y + u1.y);
  c.lineTo(vertex.x + u1.x + u2.x, vertex.y + u1.y + u2.y);
  c.lineTo(vertex.x + u2.x, vertex.y + u2.y);
  c.stroke();
}

function drawEdgeLength(c, p1, p2, worldLen, dimColor, textColor, bgForLabel) {
  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  const label = (worldLen / GRID_SIZE).toFixed(2) + 'm';
  c.font = SMALL_FONT;
  const tw = c.measureText(label).width;
  // Offset perpendicular to edge
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy) || 1;
  const nx = -dy/len * 14, ny = dx/len * 14;
  const tx = mx + nx, ty = my + ny;
  c.fillStyle = bgForLabel;
  c.fillRect(tx - tw/2 - 3, ty - 7, tw + 6, 14);
  c.fillStyle = dimColor;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(label, tx, ty);
}

function getBoundingCorners(pts, pad) {
  const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
  const p = pad || 6;
  const minX = Math.min(...xs) - p, minY = Math.min(...ys) - p;
  const maxX = Math.max(...xs) + p, maxY = Math.max(...ys) + p;
  return [{x:minX,y:minY},{x:maxX,y:minY},{x:maxX,y:maxY},{x:minX,y:maxY}];
}

function drawBoundingBox(c, pts) {
  const corners = getBoundingCorners(pts, 6);
  const minX = corners[0].x, minY = corners[0].y;
  const maxX = corners[2].x, maxY = corners[2].y;
  c.strokeStyle = 'rgba(59,130,246,0.5)';
  c.lineWidth = 1;
  c.setLineDash([6,4]);
  c.strokeRect(minX, minY, maxX - minX, maxY - minY);
  c.setLineDash([]);
  // Corner handles
  corners.forEach((h, i) => {
    if (i === hoverRotateCorner && !isRotating) {
      // Rotation icon — curved arrow
      c.save();
      c.strokeStyle = '#f59e0b';
      c.lineWidth = 2;
      c.beginPath();
      c.arc(h.x, h.y, 10, -Math.PI * 0.8, Math.PI * 0.3);
      c.stroke();
      // Arrow head
      const ax = h.x + 10 * Math.cos(Math.PI * 0.3);
      const ay = h.y + 10 * Math.sin(Math.PI * 0.3);
      c.fillStyle = '#f59e0b';
      c.beginPath();
      c.moveTo(ax, ay);
      c.lineTo(ax - 6, ay - 4);
      c.lineTo(ax - 2, ay + 5);
      c.closePath();
      c.fill();
      c.restore();
    } else {
      c.fillStyle = '#f59e0b';
      c.fillRect(h.x - 3, h.y - 3, 6, 6);
    }
  });

  // Rotation anchor point
  if (isRotating || rotateAnchor) {
    const selShape = shapes.find(s => s.id === rotateShapeId);
    if (selShape && rotateAnchor) {
      const aScr = worldToScreen(rotateAnchor.x, rotateAnchor.y);
      // Crosshair anchor
      c.save();
      c.strokeStyle = '#ef4444';
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(aScr.x - 8, aScr.y); c.lineTo(aScr.x + 8, aScr.y);
      c.moveTo(aScr.x, aScr.y - 8); c.lineTo(aScr.x, aScr.y + 8);
      c.stroke();
      c.beginPath();
      c.arc(aScr.x, aScr.y, 5, 0, Math.PI * 2);
      c.strokeStyle = '#ef4444';
      c.lineWidth = 1.5;
      c.stroke();
      c.fillStyle = 'rgba(239,68,68,0.3)';
      c.fill();
      c.restore();
    }
  }
}

function drawBuilding(c) {
  // Triangle / Polygon build points
  if ((currentTool === 'triangle' || currentTool === 'polygon') && buildPoints.length > 0) {
    const pts = buildPoints.map(p => worldToScreen(p.x, p.y));
    c.strokeStyle = '#f59e0b';
    c.lineWidth = 2;
    c.setLineDash([6,4]);
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
    // Rubber band
    if (rubberPoint) {
      const rp = worldToScreen(rubberPoint.x, rubberPoint.y);
      c.lineTo(rp.x, rp.y);
    }
    c.stroke();
    c.setLineDash([]);
    // Dots
    pts.forEach(p => {
      c.fillStyle = '#f59e0b';
      c.beginPath();
      c.arc(p.x, p.y, 5, 0, Math.PI*2);
      c.fill();
    });
  }

  // Line build
  if (currentTool === 'line' && lineDragStart && rubberPoint) {
    const p1 = worldToScreen(lineDragStart.x, lineDragStart.y);
    const p2 = worldToScreen(rubberPoint.x, rubberPoint.y);
    c.strokeStyle = '#f59e0b';
    c.lineWidth = 2;
    c.setLineDash([6,4]);
    c.beginPath();
    c.moveTo(p1.x, p1.y);
    c.lineTo(p2.x, p2.y);
    c.stroke();
    c.setLineDash([]);
    c.fillStyle = '#f59e0b';
    c.beginPath(); c.arc(p1.x,p1.y,5,0,Math.PI*2); c.fill();
  }

  // Rect preview
  if (rectDragStart && rubberPoint) {
    const p1 = worldToScreen(rectDragStart.x, rectDragStart.y);
    const p2 = worldToScreen(rubberPoint.x, rubberPoint.y);
    c.strokeStyle = '#f59e0b';
    c.lineWidth = 2;
    c.setLineDash([6,4]);
    c.strokeRect(Math.min(p1.x,p2.x), Math.min(p1.y,p2.y), Math.abs(p2.x-p1.x), Math.abs(p2.y-p1.y));
    c.setLineDash([]);
  }

  // Circle preview
  if (circleDragCenter && rubberPoint) {
    const center = worldToScreen(circleDragCenter.x, circleDragCenter.y);
    const r = dist(circleDragCenter, rubberPoint) * zoom;
    c.strokeStyle = '#f59e0b';
    c.lineWidth = 2;
    c.setLineDash([6,4]);
    c.beginPath();
    c.arc(center.x, center.y, r, 0, Math.PI*2);
    c.stroke();
    c.setLineDash([]);
    // Center dot
    c.fillStyle = '#f59e0b';
    c.beginPath(); c.arc(center.x,center.y,4,0,Math.PI*2); c.fill();
    // Radius line
    c.beginPath();
    c.moveTo(center.x, center.y);
    const edge = worldToScreen(rubberPoint.x, rubberPoint.y);
    c.lineTo(edge.x, edge.y);
    c.stroke();
  }
}

// ═══════════════════════════════════════════════════════
// ██  SPINNER (Angle & Length)
// ═══════════════════════════════════════════════════════

function openSpinner(shape, type, index, screenPos) {
  closeSpinner();
  spinnerTarget = {shapeId: shape.id, type, index};

  let value = 0;
  let label = '';
  let unit = '';

  if (type === 'angle') {
    if (shape.type === 'circle' || shape.type === 'line') return;
    if (!shape.angles || index >= shape.angles.length) return;
    value = Math.round(shape.angles[index]);
    label = '∠' + (shape.labels ? shape.labels[index] : '');
    unit = '°';
  } else if (type === 'length') {
    if (shape.type === 'circle') {
      value = Math.round(shape.radius / GRID_SIZE * 100) / 100;
      label = 'r';
      unit = 'm';
    } else if (shape.type === 'line') {
      value = Math.round(shape.length / GRID_SIZE * 100) / 100;
      label = (shape.labels||[])[0] + (shape.labels||[])[1];
      unit = 'm';
    } else {
      if (!shape.lengths || index >= shape.lengths.length) return;
      value = Math.round(shape.lengths[index] / GRID_SIZE * 100) / 100;
      const j = (index + 1) % shape.points.length;
      label = (shape.labels ? shape.labels[index] : '') + (shape.labels ? shape.labels[j] : '');
      unit = 'm';
    }
  }

  // For angle spinner, value is integer degrees
  // For length spinner, value is in meters (float)
  const isAngle = type === 'angle';
  const intVal = isAngle ? Math.round(value) : Math.round(value * 10); // for length, work in 0.1m units
  const maxDigits = isAngle ? 3 : 3;
  const startDigits = intVal >= 100 ? 3 : 2;

  const popup = document.createElement('div');
  popup.className = 'spinner-popup';
  popup.dataset.digits = startDigits;
  popup.dataset.maxDigits = maxDigits;
  popup.dataset.isAngle = isAngle ? '1' : '0';

  // Position near click
  let posX = screenPos.x + canvasArea.getBoundingClientRect().left + 10;
  let posY = screenPos.y + canvasArea.getBoundingClientRect().top - 30;
  // Keep on screen
  posX = Math.min(posX, window.innerWidth - 250);
  posY = Math.max(posY, 50);
  popup.style.left = posX + 'px';
  popup.style.top = posY + 'px';

  // Build content
  let html = `<div class="spinner-label">${label}</div>`;
  html += `<button class="spinner-expand" onclick="expandSpinner()">+</button>`;
  html += `<div class="spinner-digits" id="spDigits">`;
  html += buildDigitCols(intVal, startDigits);
  html += `</div>`;
  html += `<span class="spinner-unit">${unit}</span>`;
  // Lock button for length type (not angle, not circle)
  if (type === 'length' && shape.type !== 'circle' && shape.type !== 'line') {
    if (!shape.lockedEdges) shape.lockedEdges = [];
    const isLocked = shape.lockedEdges.includes(index);
    html += `<button class="lock-btn${isLocked ? ' locked' : ''}" id="spLockBtn" onclick="toggleEdgeLock(${shape.id},${index})" title="${isLocked ? '잠금 해제' : '길이 잠금'}" style="font-size:14px;margin-left:4px">${isLocked ? '🔒' : '🔓'}</button>`;
  }

  popup.innerHTML = html;
  document.body.appendChild(popup);
  activeSpinner = popup;
}

function buildDigitCols(value, numDigits) {
  let html = '';
  const digits = [];
  let v = Math.max(0, Math.abs(value));
  for (let i = 0; i < numDigits; i++) {
    digits.unshift(v % 10);
    v = Math.floor(v / 10);
  }
  for (let i = 0; i < numDigits; i++) {
    html += `<div class="sp-digit-col">`;
    html += `<button class="sp-up" onmousedown="spinnerDigit(${i},1,event)">▲</button>`;
    html += `<div class="sp-digit-val" id="spD${i}">${digits[i]}</div>`;
    html += `<button class="sp-down" onmousedown="spinnerDigit(${i},-1,event)">▼</button>`;
    html += `</div>`;
  }
  return html;
}

function getSpinnerValue() {
  if (!activeSpinner) return 0;
  const numDigits = parseInt(activeSpinner.dataset.digits);
  let val = 0;
  for (let i = 0; i < numDigits; i++) {
    const el = document.getElementById('spD' + i);
    if (el) val = val * 10 + parseInt(el.textContent);
  }
  return val;
}

// Expose to onclick handlers
window.spinnerDigit = function(colIdx, delta, e) {
  e.stopPropagation();
  if (!activeSpinner) return;
  const el = document.getElementById('spD' + colIdx);
  if (!el) return;
  let d = parseInt(el.textContent) + delta;
  if (d > 9) d = 0;
  if (d < 0) d = 9;
  el.textContent = d;
  applySpinnerValue();

  // Auto-repeat
  let repeatTimer = null;
  let repeatInterval = null;
  const doRepeat = () => {
    let dd = parseInt(el.textContent) + delta;
    if (dd > 9) dd = 0;
    if (dd < 0) dd = 9;
    el.textContent = dd;
    applySpinnerValue();
  };
  repeatTimer = setTimeout(() => {
    repeatInterval = setInterval(doRepeat, 100);
  }, 400);
  const stopRepeat = () => {
    clearTimeout(repeatTimer);
    clearInterval(repeatInterval);
    document.removeEventListener('mouseup', stopRepeat);
  };
  document.addEventListener('mouseup', stopRepeat);
};

window.expandSpinner = function() {
  if (!activeSpinner) return;
  const cur = parseInt(activeSpinner.dataset.digits);
  const max = parseInt(activeSpinner.dataset.maxDigits);
  if (cur >= max) return;
  const newDigits = cur + 1;
  activeSpinner.dataset.digits = newDigits;
  const currentVal = getSpinnerValue();
  const digitsDiv = document.getElementById('spDigits');
  if (digitsDiv) {
    digitsDiv.innerHTML = buildDigitCols(currentVal, newDigits);
  }
};

function applySpinnerValue() {
  if (!spinnerTarget) return;
  const {shapeId, type, index} = spinnerTarget;
  const shape = shapes.find(s => s.id === shapeId);
  if (!shape) return;

  const val = getSpinnerValue();
  const isAngle = activeSpinner.dataset.isAngle === '1';

  if (type === 'angle' && isAngle) {
    applyAngleChange(shape, index, val);
  } else if (type === 'length') {
    const meters = val / 10; // convert from 0.1m units
    applyLengthChange(shape, index, meters);
  }
  updatePropsPanel();
}

function closeSpinner() {
  if (activeSpinner) {
    if (spinnerTarget) saveState();
    activeSpinner.remove();
    activeSpinner = null;
    spinnerTarget = null;
  }
}

// ═══════════════════════════════════════════════════════
// ██  CONSTRAINT SOLVER
// ═══════════════════════════════════════════════════════

function applyAngleChange(shape, vertexIdx, newAngle) {
  if (shape.type === 'rect') return; // Rect angles fixed at 90

  if (shape.type === 'triangle') {
    const oldAngle = shape.angles[vertexIdx];
    let delta = newAngle - oldAngle;
    // Clamp: angle must be 1-178, and other angles must also remain valid
    if (newAngle < 1) newAngle = 1;
    if (newAngle > 178) newAngle = 178;
    delta = newAngle - oldAngle;

    const other1 = (vertexIdx + 1) % 3;
    const other2 = (vertexIdx + 2) % 3;
    const totalOther = shape.angles[other1] + shape.angles[other2];

    if (totalOther <= 0) return;

    // Distribute -delta proportionally
    const ratio1 = shape.angles[other1] / totalOther;
    const ratio2 = shape.angles[other2] / totalOther;
    let new1 = shape.angles[other1] - delta * ratio1;
    let new2 = shape.angles[other2] - delta * ratio2;

    if (new1 < 1 || new2 < 1) return; // Can't make valid triangle

    // Reconstruct triangle from angles, keeping one edge length fixed
    const edgeLen = dist(shape.points[other1], shape.points[other2]); // side opposite to vertexIdx
    const A = newAngle * Math.PI / 180;
    const B = new1 * Math.PI / 180;
    const C = new2 * Math.PI / 180;

    // Use law of sines: a/sinA = b/sinB = c/sinC
    // a = side opposite A (between other1 and other2)
    const a = edgeLen;
    const scale = a / Math.sin(A);
    const b = scale * Math.sin(B); // side opposite B (between vertexIdx and other2)
    const c = scale * Math.sin(C); // side opposite C (between vertexIdx and other1)

    // Keep other1 and other2 fixed, compute vertexIdx position
    const baseAngle = Math.atan2(
      shape.points[other2].y - shape.points[other1].y,
      shape.points[other2].x - shape.points[other1].x
    );

    // Determine winding direction from original vertex position
    const oldVx = shape.points[vertexIdx].x - shape.points[other1].x;
    const oldVy = shape.points[vertexIdx].y - shape.points[other1].y;
    const baseDx = shape.points[other2].x - shape.points[other1].x;
    const baseDy = shape.points[other2].y - shape.points[other1].y;
    const crossSign = (baseDx * oldVy - baseDy * oldVx) >= 0 ? 1 : -1;

    // vertexIdx is at angle C from other1, on the correct side
    const px = shape.points[other1].x + Math.cos(baseAngle + crossSign * C) * b;
    const py = shape.points[other1].y + Math.sin(baseAngle + crossSign * C) * b;

    // Check for NaN
    if (isNaN(px) || isNaN(py)) return;

    shape.points[vertexIdx] = {x: px, y: py};
    recalcShape(shape);
    return;
  }

  // For polygons, just adjust this angle (no constraint solver for general polygons)
  // This is a simplified version
  if (shape.type === 'polygon') {
    // TODO: implement polygon angle constraint
    return;
  }
}

function applyLengthChange(shape, edgeIdx, newLengthMeters) {
  const newLength = newLengthMeters * GRID_SIZE;
  if (newLength <= 0) return;

  if (shape.type === 'circle') {
    shape.radius = newLength;
    recalcShape(shape);
    return;
  }

  if (shape.type === 'line') {
    const oldLen = dist(shape.points[0], shape.points[1]);
    if (oldLen < 0.001) return;
    const scale = newLength / oldLen;
    const mid = {x:(shape.points[0].x+shape.points[1].x)/2, y:(shape.points[0].y+shape.points[1].y)/2};
    shape.points[0] = {x: mid.x + (shape.points[0].x-mid.x)*scale, y: mid.y + (shape.points[0].y-mid.y)*scale};
    shape.points[1] = {x: mid.x + (shape.points[1].x-mid.x)*scale, y: mid.y + (shape.points[1].y-mid.y)*scale};
    recalcShape(shape);
    return;
  }

  // For triangles and polygons: scale proportionally (keep angles constant)
  if (shape.type === 'triangle' || shape.type === 'polygon' || shape.type === 'rect') {
    const n = shape.points.length;
    const j = (edgeIdx + 1) % n;
    const oldLen = dist(shape.points[edgeIdx], shape.points[j]);
    if (oldLen < 0.001) return;
    const scale = newLength / oldLen;

    // Scale entire shape from centroid
    const cx = shape.points.reduce((a,p)=>a+p.x,0) / n;
    const cy = shape.points.reduce((a,p)=>a+p.y,0) / n;
    shape.points = shape.points.map(p => ({
      x: cx + (p.x - cx) * scale,
      y: cy + (p.y - cy) * scale,
    }));
    recalcShape(shape);
    return;
  }
}

// ═══════════════════════════════════════════════════════
// ██  PROPERTIES PANEL
// ═══════════════════════════════════════════════════════

function updatePropsPanel() {
  const none = document.getElementById('propNone');
  const content = document.getElementById('propContent');

  if (selectedIds.size === 0) {
    none.style.display = '';
    content.style.display = 'none';
    return;
  }

  none.style.display = 'none';
  content.style.display = '';

  if (selectedIds.size > 1) {
    content.innerHTML = `<div class="prop-title">다중 선택</div><div class="prop-section"><div class="prop-row"><span class="prop-label">선택 수</span><span class="prop-value">${selectedIds.size}개</span></div></div>`;
    return;
  }

  const shape = shapes.find(s => selectedIds.has(s.id));
  if (!shape) { none.style.display = ''; content.style.display = 'none'; return; }

  recalcShape(shape);
  let html = '';

  // Shape type
  const typeNames = {triangle:'삼각형',rect:'사각형',circle:'원',line:'직선',polygon:'다각형'};
  html += `<div class="prop-title">SHAPE PROPERTIES</div>`;
  html += `<div class="prop-section">`;
  html += `<div class="prop-row"><span class="prop-label">도형</span><span class="prop-value">${typeNames[shape.type]||shape.type}</span></div>`;
  html += `</div>`;

  // Colors (compact: fill + stroke on same lines)
  html += `<div class="prop-section">`;
  html += `<div class="prop-row"><span class="prop-label">채우기</span></div>`;
  html += `<div class="color-swatches" data-mode="fill">`;
  COLORS.swatches.forEach((c, i) => {
    const active = shape.fill.includes(c.replace('#','')) || (i === 0 && shape.fill === COLORS.fill[0]) ? ' active' : '';
    html += `<div class="color-sw${active}" style="background:${c}" onclick="setShapeColor('fill',${i})"></div>`;
  });
  html += `</div>`;
  html += `<div class="prop-row"><span class="prop-label">테두리</span><span class="prop-value" style="font-size:11px">${shape.strokeWidth}px</span></div>`;
  html += `<div style="display:flex;align-items:center;gap:6px">`;
  html += `<div class="color-swatches" style="flex:1;margin:0" data-mode="stroke">`;
  COLORS.swatches.forEach((c, i) => {
    const active = shape.stroke === c ? ' active' : '';
    html += `<div class="color-sw${active}" style="background:${c}" onclick="setShapeColor('stroke',${i})"></div>`;
  });
  html += `</div>`;
  html += `<input type="range" class="prop-slider" style="width:60px" min="1" max="8" value="${shape.strokeWidth}" oninput="setStrokeWidth(this.value)">`;
  html += `</div>`;
  html += `</div>`;

  // Angles with hide
  if (shape.angles) {
    if (!shape.hiddenAngles) shape.hiddenAngles = [];
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">각도</span></div>`;
    shape.angles.forEach((a, i) => {
      const lbl = shape.labels ? shape.labels[i] : i;
      const isRight = Math.abs(a - 90) < 1;
      const isHidden = shape.hiddenAngles.includes(i);
      html += `<div class="prop-row"><span class="prop-label">∠${lbl}</span><span class="prop-value" style="display:flex;align-items:center;gap:2px">`;
      html += `${isHidden ? '<s style="opacity:0.4">' : ''}${a.toFixed(1)}°${isRight ? ' ⬜직각' : ''}${isHidden ? '</s>' : ''}`;
      html += `<button class="lock-btn${isHidden ? ' locked' : ''}" onclick="toggleAngleHide(${shape.id},${i})" title="${isHidden ? '각도 표시' : '각도 숨기기'}" style="font-size:11px">${isHidden ? '👁‍🗨' : '👁'}</button>`;
      html += `</span></div>`;
    });
    html += `</div>`;
  }

  // Lengths with lock, hide, color
  if (shape.lengths) {
    if (!shape.lockedEdges) shape.lockedEdges = [];
    if (!shape.hiddenEdges) shape.hiddenEdges = [];
    if (!shape.edgeColors) shape.edgeColors = {};
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">변 길이</span></div>`;
    shape.lengths.forEach((l, i) => {
      const j = (i + 1) % shape.points.length;
      const lbl = (shape.labels ? shape.labels[i] : i) + '' + (shape.labels ? shape.labels[j] : j);
      const isLocked = shape.lockedEdges.includes(i);
      const isHidden = shape.hiddenEdges.includes(i);
      const edgeCol = shape.edgeColors[i];
      html += `<div class="prop-row"><span class="prop-label" style="display:flex;align-items:center;gap:3px">`;
      html += `<span class="color-sw" style="width:12px;height:12px;background:${edgeCol||shape.stroke};border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.2)" onclick="cycleEdgeColor(${shape.id},${i})" title="변 색상"></span>`;
      html += `${lbl}</span>`;
      html += `<span class="prop-value" style="display:flex;align-items:center;gap:2px">`;
      html += `${isHidden ? '<s style="opacity:0.4">' : ''}${(l/GRID_SIZE).toFixed(2)}m${isHidden ? '</s>' : ''}`;
      html += `<button class="lock-btn${isHidden ? ' locked' : ''}" onclick="toggleEdgeHide(${shape.id},${i})" title="${isHidden ? '정보 표시' : '정보 숨기기'}" style="font-size:11px">${isHidden ? '👁‍🗨' : '👁'}</button>`;
      html += `<button class="lock-btn${isLocked ? ' locked' : ''}" onclick="toggleEdgeLock(${shape.id},${i})" title="${isLocked ? '잠금 해제' : '길이 잠금'}">${isLocked ? '🔒' : '🔓'}</button>`;
      html += `</span></div>`;
    });
    html += `</div>`;
  }

  // Circle props
  if (shape.type === 'circle') {
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">치수</span></div>`;
    html += `<div class="prop-row"><span class="prop-label">반지름</span><span class="prop-value">${(shape.radius/GRID_SIZE).toFixed(2)}m</span></div>`;
    html += `<div class="prop-row"><span class="prop-label">지름</span><span class="prop-value">${(shape.diameter/GRID_SIZE).toFixed(2)}m</span></div>`;
    html += `</div>`;
  }

  // Line props
  if (shape.type === 'line') {
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label">길이</span><span class="prop-value">${(shape.length/GRID_SIZE).toFixed(2)}m</span></div>`;
    html += `<div class="prop-row"><span class="prop-label">각도</span><span class="prop-value">${shape.angle.toFixed(1)}°</span></div>`;
    html += `</div>`;
  }

  // Calculations
  html += `<div class="prop-section">`;
  html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">계산</span></div>`;
  if (shape.area !== undefined) {
    html += `<div class="prop-row"><span class="prop-label">넓이</span><span class="prop-value">${(shape.area/GRID_SIZE/GRID_SIZE).toFixed(2)}m²</span></div>`;
  }
  if (shape.perimeter !== undefined) {
    html += `<div class="prop-row"><span class="prop-label">둘레</span><span class="prop-value">${(shape.perimeter/GRID_SIZE).toFixed(2)}m</span></div>`;
  }
  if (shape.type === 'circle') {
    html += `<div class="prop-row"><span class="prop-label">넓이</span><span class="prop-value">${(shape.area/GRID_SIZE/GRID_SIZE).toFixed(2)}m²</span></div>`;
    html += `<div class="prop-row"><span class="prop-label">둘레</span><span class="prop-value">${(shape.circumference/GRID_SIZE).toFixed(2)}m</span></div>`;
  }
  if (shape.type === 'rect') {
    html += `<div class="prop-row"><span class="prop-label">대각선</span><span class="prop-value">${(shape.diagonal/GRID_SIZE).toFixed(2)}m</span></div>`;
  }
  html += `</div>`;

  // Formula
  if (shape.type === 'triangle' && shape.isRight && shape.pythagorean) {
    const p = shape.pythagorean;
    const a = (p.a/GRID_SIZE).toFixed(2), b = (p.b/GRID_SIZE).toFixed(2), cc = (p.c/GRID_SIZE).toFixed(2);
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">공식</span></div>`;
    html += `<div class="formula-box">`;
    html += `<div class="fm-line">a² + b² = c²</div>`;
    html += `<div class="fm-line">${a}² + ${b}² = ${cc}²</div>`;
    html += `<div class="fm-line">${(p.lhs/GRID_SIZE/GRID_SIZE).toFixed(2)} = ${(p.rhs/GRID_SIZE/GRID_SIZE).toFixed(2)} ${p.valid ? '<span class="fm-ok">✓</span>' : '<span class="fm-no">✗</span>'}</div>`;
    html += `</div></div>`;
  }
  if (shape.type === 'circle') {
    html += `<div class="prop-section">`;
    html += `<div class="prop-row"><span class="prop-label" style="font-weight:700;color:var(--gold)">공식</span></div>`;
    html += `<div class="formula-box">`;
    const r = (shape.radius/GRID_SIZE).toFixed(2);
    html += `<div class="fm-line">넓이 = πr² = π×${r}² = ${(shape.area/GRID_SIZE/GRID_SIZE).toFixed(2)}</div>`;
    html += `<div class="fm-line">둘레 = 2πr = 2π×${r} = ${(shape.circumference/GRID_SIZE).toFixed(2)}</div>`;
    html += `</div></div>`;
  }

  content.innerHTML = html;
}

// Expose color/stroke handlers
window.setShapeColor = function(mode, idx) {
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    if (mode === 'fill') s.fill = COLORS.fill[idx];
    else s.stroke = COLORS.stroke[idx];
  });
  saveState();
  updatePropsPanel();
};

window.setStrokeWidth = function(val) {
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    s.strokeWidth = parseInt(val);
  });
  updatePropsPanel();
};

window.toggleAngleHide = function(shapeId, angleIdx) {
  const s = shapes.find(s => s.id === shapeId);
  if (!s) return;
  if (!s.hiddenAngles) s.hiddenAngles = [];
  const idx = s.hiddenAngles.indexOf(angleIdx);
  if (idx >= 0) s.hiddenAngles.splice(idx, 1);
  else s.hiddenAngles.push(angleIdx);
  saveState();
  updatePropsPanel();
};

window.toggleEdgeHide = function(shapeId, edgeIdx) {
  const s = shapes.find(s => s.id === shapeId);
  if (!s) return;
  if (!s.hiddenEdges) s.hiddenEdges = [];
  const idx = s.hiddenEdges.indexOf(edgeIdx);
  if (idx >= 0) s.hiddenEdges.splice(idx, 1);
  else s.hiddenEdges.push(edgeIdx);
  saveState();
  updatePropsPanel();
};

window.cycleEdgeColor = function(shapeId, edgeIdx) {
  const s = shapes.find(s => s.id === shapeId);
  if (!s) return;
  if (!s.edgeColors) s.edgeColors = {};
  const current = s.edgeColors[edgeIdx] || s.stroke;
  const cidx = COLORS.swatches.indexOf(current);
  const next = COLORS.swatches[(cidx + 1) % COLORS.swatches.length];
  if (next === s.stroke) delete s.edgeColors[edgeIdx];
  else s.edgeColors[edgeIdx] = next;
  saveState();
  updatePropsPanel();
};

window.toggleEdgeLock = function(shapeId, edgeIdx) {
  const s = shapes.find(s => s.id === shapeId);
  if (!s) return;
  if (!s.lockedEdges) s.lockedEdges = [];
  const idx = s.lockedEdges.indexOf(edgeIdx);
  if (idx >= 0) s.lockedEdges.splice(idx, 1);
  else s.lockedEdges.push(edgeIdx);
  saveState();
  updatePropsPanel();
  // Also update spinner lock button if open
  const lockBtn = document.getElementById('spLockBtn');
  if (lockBtn) {
    const isLocked = s.lockedEdges.includes(edgeIdx);
    lockBtn.className = 'lock-btn' + (isLocked ? ' locked' : '');
    lockBtn.textContent = isLocked ? '🔒' : '🔓';
    lockBtn.title = isLocked ? '잠금 해제' : '길이 잠금';
  }
};

// ═══════════════════════════════════════════════════════
// ██  DUPLICATE / SYMMETRY / ROTATION
// ═══════════════════════════════════════════════════════

function duplicateSelected() {
  if (selectedIds.size === 0) return;
  const newIds = new Set();
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    const clone = JSON.parse(JSON.stringify(s));
    clone.id = shapeIdCounter++;
    // Offset by 1 grid unit
    if (clone.points) clone.points.forEach(p => { p.x += GRID_SIZE; p.y += GRID_SIZE; });
    if (clone.center) { clone.center.x += GRID_SIZE; clone.center.y += GRID_SIZE; }
    // New labels
    clone.labels = generateLabels(clone.type, clone);
    shapes.push(clone);
    newIds.add(clone.id);
  });
  selectedIds.clear();
  newIds.forEach(id => selectedIds.add(id));
  saveState();
  updatePropsPanel();
  showToast('📋 복제!');
}

function flipSelected(axis) {
  // axis: 'h' (horizontal/좌우) or 'v' (vertical/상하)
  if (selectedIds.size === 0) return;
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    const pts = s.points || (s.center ? [{x:s.center.x, y:s.center.y}] : []);
    if (pts.length === 0) return;
    // Find center of selected shape
    const cx = pts.reduce((a,p) => a + p.x, 0) / pts.length;
    const cy = pts.reduce((a,p) => a + p.y, 0) / pts.length;
    if (s.points) {
      s.points.forEach(p => {
        if (axis === 'h') p.x = 2 * cx - p.x;
        else p.y = 2 * cy - p.y;
      });
    }
    recalcShape(s);
  });
  saveState();
  updatePropsPanel();
  showToast(axis === 'h' ? '↔ 좌우 대칭!' : '↕ 상하 대칭!');
}

function rotateSelected(deg) {
  if (selectedIds.size === 0) return;
  const rad = deg * Math.PI / 180;
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    const pts = s.points || [];
    if (pts.length === 0 && !s.center) return;
    // Find center
    const allPts = s.points || [{x:s.center.x, y:s.center.y}];
    const cx = allPts.reduce((a,p) => a + p.x, 0) / allPts.length;
    const cy = allPts.reduce((a,p) => a + p.y, 0) / allPts.length;
    if (s.points) {
      s.points.forEach(p => {
        const dx = p.x - cx, dy = p.y - cy;
        p.x = cx + dx * Math.cos(rad) - dy * Math.sin(rad);
        p.y = cy + dx * Math.sin(rad) + dy * Math.cos(rad);
      });
    }
    recalcShape(s);
  });
  saveState();
  updatePropsPanel();
  showToast(`🔄 ${deg}° 회전!`);
}

function openTextInput(worldPos) {
  // Create an input overlay on the canvas
  const screenPos = worldToScreen(worldPos.x, worldPos.y);
  const areaRect = canvasArea.getBoundingClientRect();

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '텍스트 입력...';
  input.style.cssText = `
    position:fixed;left:${areaRect.left + screenPos.x}px;top:${areaRect.top + screenPos.y - 16}px;
    background:rgba(15,23,41,0.95);border:1.5px solid var(--gold);border-radius:6px;
    color:#fff;font-size:14px;font-family:'Pretendard Variable',sans-serif;font-weight:600;
    padding:4px 10px;outline:none;z-index:300;min-width:120px;
  `;
  document.body.appendChild(input);
  input.focus();

  function finish() {
    const val = input.value.trim();
    if (val) {
      textAnnotations.push({
        id: textIdCounter++,
        x: worldPos.x, y: worldPos.y,
        text: val,
        color: '#e2e8f0',
        fontSize: 14,
      });
      saveState();
    }
    input.remove();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') input.remove();
  });
  input.addEventListener('blur', finish);
}

// ═══════════════════════════════════════════════════════
// ██  LAYERS SYSTEM
// ═══════════════════════════════════════════════════════

function addLayer() {
  const layer = {
    id: layerIdCounter++,
    name: 'Layer ' + (layers.length + 1),
    visible: true,
    locked: false,
    opacity: 1.0,
  };
  layers.push(layer);
  activeLayerId = layer.id;
  renderLayersPanel();
  showToast('📄 레이어 추가!');
}

function deleteLayer() {
  if (layers.length <= 1) { showToast('기본 레이어는 삭제할 수 없습니다'); return; }
  const idx = layers.findIndex(l => l.id === activeLayerId);
  if (idx < 0) return;
  const delId = activeLayerId;
  // Remove shapes on this layer
  shapes = shapes.filter(s => s.layerId !== delId);
  selectedIds.clear();
  layers.splice(idx, 1);
  activeLayerId = layers[Math.min(idx, layers.length - 1)].id;
  saveState();
  updatePropsPanel();
  renderLayersPanel();
  showToast('🗑 레이어 삭제!');
}

function setActiveLayer(id) {
  activeLayerId = id;
  renderLayersPanel();
}

function toggleLayerVisibility(id) {
  const layer = layers.find(l => l.id === id);
  if (layer) { layer.visible = !layer.visible; renderLayersPanel(); }
}

function toggleLayerLock(id) {
  const layer = layers.find(l => l.id === id);
  if (layer) { layer.locked = !layer.locked; renderLayersPanel(); }
}

function setLayerOpacity(id, val) {
  const layer = layers.find(l => l.id === id);
  if (layer) { layer.opacity = parseFloat(val); renderLayersPanel(); }
}

function renameLayer(id, newName) {
  const layer = layers.find(l => l.id === id);
  if (layer && newName.trim()) { layer.name = newName.trim(); }
}

function moveLayerUp(id) {
  const idx = layers.findIndex(l => l.id === id);
  if (idx < layers.length - 1) {
    [layers[idx], layers[idx + 1]] = [layers[idx + 1], layers[idx]];
    renderLayersPanel();
  }
}

function moveLayerDown(id) {
  const idx = layers.findIndex(l => l.id === id);
  if (idx > 0) {
    [layers[idx], layers[idx - 1]] = [layers[idx - 1], layers[idx]];
    renderLayersPanel();
  }
}

function renderLayersPanel() {
  const list = document.getElementById('layerList');
  if (!list) return;
  let html = '';
  // Render in reverse order (top layer first)
  for (let i = layers.length - 1; i >= 0; i--) {
    const l = layers[i];
    const isActive = l.id === activeLayerId;
    const visIcon = l.visible ? '👁' : '🚫';
    const visClass = l.visible ? '' : ' off';
    const lockIcon = l.locked ? '🔒' : '🔓';
    const lockClass = l.locked ? '' : ' off';
    html += `<li class="layer-row${isActive ? ' active' : ''}" onclick="window._setActiveLayer(${l.id})">`;
    html += `<button class="layer-icon-btn${visClass}" onclick="event.stopPropagation();window._toggleLayerVis(${l.id})" title="Toggle visibility">${visIcon}</button>`;
    html += `<button class="layer-icon-btn${lockClass}" onclick="event.stopPropagation();window._toggleLayerLock(${l.id})" title="Toggle lock">${lockIcon}</button>`;
    html += `<input class="layer-name" value="${l.name.replace(/"/g,'&quot;')}" ondblclick="this.focus();this.select()" onblur="window._renameLayer(${l.id},this.value)" onkeydown="if(event.key==='Enter')this.blur()" onclick="event.stopPropagation()">`;
    html += `<input type="range" class="layer-opacity" min="0" max="1" step="0.05" value="${l.opacity}" oninput="window._setLayerOpacity(${l.id},this.value)" onclick="event.stopPropagation()">`;
    html += `<span class="layer-opacity-val">${Math.round(l.opacity * 100)}%</span>`;
    html += `</li>`;
  }
  list.innerHTML = html;
}

// Expose layer functions to global
window._setActiveLayer = setActiveLayer;
window._toggleLayerVis = toggleLayerVisibility;
window._toggleLayerLock = toggleLayerLock;
window._setLayerOpacity = setLayerOpacity;
window._renameLayer = renameLayer;

// ═══════════════════════════════════════════════════════
// ██  EXPOSE FUNCTIONS TO GLOBAL SCOPE (for inline onclick)
// ═══════════════════════════════════════════════════════
window.undo = undo;
window.redo = redo;
window.clearAll = clearAll;
window.exportPNG = exportPNG;
window.toggleGrid = toggleGrid;
window.toggleSnap = toggleSnap;

// ═══════════════════════════════════════════════════════
// ██  INIT
// ═══════════════════════════════════════════════════════

// Patch init to wire up layers
const _origInit = init;
function patchedInit() {
  _origInit();
  // Wire up layer buttons
  document.getElementById('btnAddLayer').addEventListener('click', addLayer);
  document.getElementById('btnDelLayer').addEventListener('click', deleteLayer);
  renderLayersPanel();
}

// ─── RULER (눈금자) ─────────────────────────────────
let showRulerOverlay = false;
function toggleRuler() {
    showRulerOverlay = !showRulerOverlay;
    showToast(showRulerOverlay ? '📏 눈금자 ON' : '📏 눈금자 OFF');
    render();
}

function drawRulerOverlay() {
    if (!showRulerOverlay) return;
    ctx.save();
    // Horizontal ruler
    ctx.fillStyle = 'rgba(10,10,30,0.7)';
    ctx.fillRect(0, 0, canvas.width, 24);
    ctx.fillRect(0, 0, 24, canvas.height);
    ctx.font = '9px "JetBrains Mono"';
    ctx.fillStyle = 'rgba(6,182,212,0.7)';
    ctx.strokeStyle = 'rgba(6,182,212,0.3)';
    ctx.lineWidth = 0.5;
    // Horizontal ticks
    const step = GRID_SIZE * zoom;
    const startX = (panX % step + step) % step;
    for (let px = startX; px < canvas.width; px += step) {
        const worldX = ((px - panX) / zoom / GRID_SIZE).toFixed(0);
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, worldX % 5 === 0 ? 20 : 12); ctx.stroke();
        if (worldX % 5 === 0) ctx.fillText(worldX, px + 2, 10);
    }
    // Vertical ticks
    const startY = (panY % step + step) % step;
    for (let py = startY; py < canvas.height; py += step) {
        const worldY = ((py - panY) / zoom / GRID_SIZE).toFixed(0);
        ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(worldY % 5 === 0 ? 20 : 12, py); ctx.stroke();
        if (worldY % 5 === 0) ctx.fillText(worldY, 2, py - 2);
    }
    ctx.restore();
}

// (ruler/graph drawing is called directly from render())

// ─── FUNCTION GRAPH (함수 그래프) ────────────────────
let graphFunctions = []; // [{expr: 'x', color: '#06b6d4', label: 'y=x'}]

function openGraphDialog() {
    const existing = document.getElementById('graphDialog');
    if (existing) existing.remove();

    const div = document.createElement('div');
    div.id = 'graphDialog';
    div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,15,40,0.95);border:1px solid rgba(6,182,212,0.3);border-radius:16px;padding:20px;z-index:500;min-width:320px;font-family:"Jua",sans-serif;color:#e2e8f0;backdrop-filter:blur(12px);';
    div.innerHTML = `
        <h3 style="color:#06b6d4;margin:0 0 12px;">📈 함수 그래프</h3>
        <div style="margin-bottom:8px;">
            <label style="font-size:12px;color:#94a3b8;">y = </label>
            <input id="graphExpr" type="text" value="2*x+1" placeholder="수식 (예: 2*x+1, x*x, Math.sin(x))" style="width:200px;padding:6px 10px;background:#1a1a3a;border:1px solid rgba(6,182,212,0.3);border-radius:8px;color:#fff;font-size:14px;">
        </div>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
            <button id="btnGraphAdd" style="flex:1;padding:8px;background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.3);color:#06b6d4;border-radius:8px;cursor:pointer;font-family:'Jua';">추가</button>
            <button id="btnGraphClear" style="padding:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;border-radius:8px;cursor:pointer;font-family:'Jua';">지우기</button>
            <button id="btnGraphClose" style="padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;border-radius:8px;cursor:pointer;font-family:'Jua';">닫기</button>
        </div>
        <div style="font-size:11px;color:#64748b;">
            예시: <code>2*x+1</code>, <code>x*x</code>, <code>-0.5*x+3</code>, <code>Math.sin(x)*3</code>
        </div>
        <div id="graphList" style="margin-top:8px;font-size:12px;"></div>
    `;
    document.body.appendChild(div);
    div.querySelector('#btnGraphAdd').addEventListener('click', () => addGraphFunction('graphExpr'));
    div.querySelector('#btnGraphClear').addEventListener('click', () => clearGraphFunctions());
    div.querySelector('#btnGraphClose').addEventListener('click', () => div.remove());
    div.querySelector('#graphExpr').addEventListener('keydown', (e) => { if (e.key === 'Enter') addGraphFunction('graphExpr'); });
    updateGraphList();
}

function addGraphFunction(inputId, color) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const expr = input.value.trim();
    if (!expr) return;
    const colors = ['#06b6d4','#10b981','#f59e0b','#ec4899','#8b5cf6','#ef4444'];
    const c = colors[graphFunctions.length % colors.length];
    graphFunctions.push({ expr, color: c, label: 'y=' + expr });
    input.value = '';
    // Auto-center origin on first graph
    if (graphFunctions.length === 1) {
        panX = canvas.width / 2;
        panY = canvas.height / 2;
    }
    updateGraphList();
    render();
    showToast(`📈 y=${expr} 추가`);
}

function clearGraphFunctions() {
    graphFunctions = [];
    updateGraphList();
    render();
}

function updateGraphList() {
    const list = document.getElementById('graphList');
    if (!list) return;
    list.innerHTML = graphFunctions.map((f, i) =>
        `<div style="padding:3px 6px;color:${f.color};"><span style="display:inline-block;width:12px;height:12px;background:${f.color};border-radius:3px;margin-right:6px;"></span>${f.label}</div>`
    ).join('');
}

function drawGraphFunctions() {
    if (graphFunctions.length === 0) return;
    // Draw axes first
    const originScr = worldToScreen(0, 0);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    // X axis
    ctx.beginPath();
    ctx.moveTo(0, originScr.y);
    ctx.lineTo(canvas.width, originScr.y);
    ctx.stroke();
    // Y axis
    ctx.beginPath();
    ctx.moveTo(originScr.x, 0);
    ctx.lineTo(originScr.x, canvas.height);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    graphFunctions.forEach(f => {
        ctx.strokeStyle = f.color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        let first = true;
        try {
            const evalFn = new Function('x', 'return ' + f.expr);
            for (let px = 0; px < canvas.width; px += 2) {
                // Convert screen X to math X (in grid units, where 1 unit = GRID_SIZE world pixels)
                const worldX = (px - panX) / zoom;
                const mathX = worldX / GRID_SIZE;
                const mathY = evalFn(mathX);
                if (isNaN(mathY) || !isFinite(mathY)) { first = true; continue; }
                // Convert math Y back to world Y (flip Y: up is positive in math)
                const worldY = -mathY * GRID_SIZE;
                const screenY = worldY * zoom + panY;
                if (screenY < -500 || screenY > canvas.height + 500) { first = true; continue; }
                if (first) { ctx.moveTo(px, screenY); first = false; }
                else ctx.lineTo(px, screenY);
            }
            ctx.stroke();
            // Label near right edge
            const labelPx = canvas.width - 100;
            const labelWorldX = (labelPx - panX) / zoom;
            const labelMathX = labelWorldX / GRID_SIZE;
            const labelMathY = evalFn(labelMathX);
            const labelScreenY = (-labelMathY * GRID_SIZE) * zoom + panY;
            ctx.font = 'bold 13px "JetBrains Mono"';
            ctx.fillStyle = f.color;
            const ly = Math.max(20, Math.min(canvas.height - 10, labelScreenY - 10));
            // Background for label
            const tw = ctx.measureText(f.label).width;
            ctx.fillStyle = 'rgba(15,15,40,0.8)';
            ctx.fillRect(labelPx - 4, ly - 11, tw + 8, 16);
            ctx.fillStyle = f.color;
            ctx.fillText(f.label, labelPx, ly);
        } catch(e) {}
    });
    ctx.restore();
}

// (graph drawing is called directly from render())

// Help text for new tools
const _origHints = typeof TOOL_HINTS !== 'undefined' ? TOOL_HINTS : {};
if (typeof TOOL_HINTS !== 'undefined') {
    TOOL_HINTS.ruler = '클릭하여 눈금자 토글 ON/OFF';
    TOOL_HINTS.graph = '클릭하여 함수 그래프 입력 다이얼로그 열기';
}

document.addEventListener('DOMContentLoaded', patchedInit);
})();
