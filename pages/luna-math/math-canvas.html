<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 그림판 - Luna Math</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--gold:#e3a008;--gold2:#ca8a04;
  --text:#c9d1d9;--dim:#6e7681;--green:#22c55e;--red:#f85149;
  --blue:#58a6ff;--radius:12px;--canvas-bg:#1c2333;
  --tool-size:52px;--panel-w:240px;--shape-color:#f85149;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable',sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* Header — Stitch-matched */
.header{
  display:flex;align-items:center;gap:16px;padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
  background:var(--bg);z-index:100;height:52px;
}
.back-btn{
  background:transparent;border:none;
  color:var(--text);padding:8px 0;font-size:14px;font-weight:600;transition:all .2s;
  opacity:0.7;
}
.back-btn:hover{opacity:1}
.header-title{font-size:14px;font-weight:600;color:var(--gold);letter-spacing:0.5px;white-space:nowrap}
.header-sep{flex:1}

/* Top toolbar — Stitch-matched */
.toolbar{
  display:flex;align-items:center;gap:8px;padding:0;
}
.tb-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  transition:all .15s;white-space:nowrap;letter-spacing:0.3px;
}
.tb-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.tb-btn.active{background:rgba(227,160,8,0.15);border-color:var(--gold);color:var(--gold)}
.tb-btn:disabled{opacity:0.3;cursor:default}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,0.08);margin:0 4px}
.tb-zoom{font-size:12px;color:var(--dim);min-width:48px;text-align:center;font-weight:700;letter-spacing:0.5px}

/* Main area */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* Tool palette */
/* Tool palette — Stitch-matched */
.tool-palette{
  width:var(--tool-size);flex-shrink:0;background:var(--card);
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;
  z-index:50;overflow-y:auto;
}
.tool-btn{
  width:40px;height:40px;border:none;border-radius:10px;
  background:transparent;color:var(--dim);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;position:relative;cursor:pointer;
  flex-shrink:0;font-family:'Pretendard Variable',sans-serif;
}
.tool-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.tool-btn.active{background:rgba(227,160,8,0.2);color:var(--gold);border-radius:12px}
.tool-btn.shape-tool{color:var(--shape-color)}
.tool-btn.shape-tool:hover{color:#ff6b6b}
.tool-btn.shape-tool.active{background:rgba(248,81,73,0.15);color:var(--shape-color)}
.tool-btn .tool-key{
  position:absolute;bottom:2px;right:4px;font-size:9px;color:var(--dim);font-weight:700;letter-spacing:0.5px;
}
.tool-sep{width:30px;height:1px;background:rgba(255,255,255,0.06);margin:4px 0;flex-shrink:0}

/* Canvas area */
.canvas-area{flex:1;position:relative;overflow:hidden;background:var(--canvas-bg)}
#mainCanvas{display:block;position:absolute;top:0;left:0;touch-action:none}

/* Properties panel */
.props-panel{
  width:var(--panel-w);flex-shrink:0;background:var(--card);
  border-left:1px solid rgba(255,255,255,0.06);
  overflow-y:auto;overflow-x:hidden;padding:12px;font-size:13px;
  z-index:50;
}
.props-panel::-webkit-scrollbar{width:4px}
.props-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.prop-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.prop-section{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)}
.prop-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;min-height:20px}
.prop-label{color:var(--dim);font-size:11px}
.prop-value{font-weight:600;font-size:12px}
.prop-none{color:var(--dim);font-size:12px;text-align:center;padding:40px 0}
.color-swatches{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.color-sw{
  width:20px;height:20px;border-radius:5px;border:2px solid transparent;cursor:pointer;
  transition:all .15s;
}
.color-sw:hover{transform:scale(1.15)}
.color-sw.active{border-color:white}
.prop-slider{width:100%;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none;margin-top:2px}
.prop-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer}
.lock-btn{
  background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;
  opacity:0.4;transition:all .15s;line-height:1;
}
.lock-btn:hover{opacity:0.8}
.lock-btn.locked{opacity:1;color:var(--gold)}
.formula-box{
  background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;font-size:12px;
  border:1px solid rgba(255,255,255,0.06);margin-top:6px;
}
.formula-box .fm-line{margin-bottom:3px}
.formula-box .fm-ok{color:var(--green)}
.formula-box .fm-no{color:var(--red)}

/* Bottom hint bar */
.hint-bar{
  height:28px;display:flex;align-items:center;padding:0 16px;
  background:var(--bg);border-top:1px solid rgba(255,255,255,0.06);
  font-size:11px;color:var(--dim);flex-shrink:0;gap:16px;
}
.hint-bar kbd{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:3px;padding:1px 5px;font-size:10px;font-family:inherit;color:var(--text);
}

/* Spinner popup */
.spinner-popup{
  position:absolute;z-index:200;background:var(--card);
  border:1.5px solid rgba(245,158,11,0.3);border-radius:12px;
  padding:8px 10px;display:flex;align-items:center;gap:6px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 16px rgba(245,158,11,0.08);
  backdrop-filter:blur(12px);user-select:none;
}
.spinner-label{font-size:12px;font-weight:700;color:var(--gold);min-width:24px;text-align:center}
.spinner-expand{
  width:22px;height:22px;border-radius:5px;border:1px solid rgba(245,158,11,0.3);
  background:rgba(245,158,11,0.1);color:var(--gold);font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.spinner-expand:hover{background:rgba(245,158,11,0.25)}
.spinner-digits{display:flex;gap:2px;align-items:center}
.sp-digit-col{display:flex;flex-direction:column;align-items:center}
.sp-digit-col .sp-up,.sp-digit-col .sp-down{
  width:28px;height:20px;border:none;border-radius:5px;cursor:pointer;
  background:rgba(255,255,255,0.08);color:var(--gold);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.sp-digit-col .sp-up:hover,.sp-digit-col .sp-down:hover{background:rgba(245,158,11,0.2)}
.sp-digit-col .sp-up:active,.sp-digit-col .sp-down:active{transform:scale(.9)}
.sp-digit-val{
  font-size:22px;font-weight:800;color:var(--text);line-height:1;
  width:28px;height:30px;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.3);border-radius:6px;border:1px solid rgba(255,255,255,0.1);
  font-family:'Pretendard Variable',monospace;margin:2px 0;
}
.spinner-unit{font-size:14px;color:var(--dim);font-weight:600;margin-left:2px}

/* Toast */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(245,158,11,0.9);color:#000;padding:8px 20px;border-radius:20px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;
  transition:all .3s;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Cursor styles */
.cursor-crosshair{cursor:crosshair}
.cursor-grab{cursor:grab}
.cursor-grabbing{cursor:grabbing!important}
.cursor-move{cursor:move}
.cursor-zoomin{cursor:zoom-in}
.cursor-zoomout{cursor:zoom-out}
.cursor-vertex{cursor:default}

/* ── Right panel split ── */
.right-panel{
  width:var(--panel-w);flex-shrink:0;background:var(--card);
  border-left:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;z-index:50;overflow:hidden;
}
.right-panel .props-panel{
  width:100%;border-left:none;flex:1 1 auto;min-height:40px;overflow-y:auto;
}
.panel-resizer{
  height:6px;flex-shrink:0;cursor:row-resize;
  background:rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.08);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.panel-resizer:hover,.panel-resizer.active{background:rgba(245,158,11,0.15)}
.panel-resizer::after{
  content:'';width:24px;height:2px;border-radius:1px;
  background:rgba(255,255,255,0.25);
}
.panel-resizer:hover::after,.panel-resizer.active::after{background:var(--gold)}
.right-panel .layers-panel{
  flex:0 0 auto;min-height:36px;
  overflow-y:auto;overflow-x:hidden;padding:0;font-size:13px;
}
.right-panel .layers-panel::-webkit-scrollbar{width:4px}
.right-panel .layers-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* Layers panel */
.layers-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;position:sticky;top:0;background:var(--card);z-index:1;
}
.layers-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px}
.layers-actions{display:flex;gap:4px}
.layers-actions button{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:var(--text);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.layers-actions button:hover{background:rgba(255,255,255,0.12)}
.layer-list{list-style:none;padding:0 4px 8px}
.layer-row{
  display:flex;align-items:center;gap:6px;padding:4px 8px;
  border-radius:6px;cursor:pointer;height:28px;
  border-left:3px solid transparent;transition:all .12s;
  margin-bottom:2px;
}
.layer-row:hover{background:rgba(255,255,255,0.05)}
.layer-row.active{background:rgba(227,160,8,0.1);border-left-color:var(--gold)}
.layer-icon-btn{
  background:none;border:none;cursor:pointer;font-size:14px;
  padding:0;line-height:1;opacity:0.7;transition:opacity .15s;min-width:18px;text-align:center;
}
.layer-icon-btn:hover{opacity:1}
.layer-icon-btn.off{opacity:0.3}
.layer-name{
  flex:1;font-size:12px;color:var(--text);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:none;border:none;outline:none;font-family:inherit;
}
.layer-name:focus{
  background:rgba(0,0,0,0.3);border-radius:4px;padding:0 4px;color:#fff;
}
.layer-opacity{
  width:40px;-webkit-appearance:none;appearance:none;height:3px;
  background:rgba(255,255,255,0.15);border-radius:2px;outline:none;
}
.layer-opacity::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:var(--gold);cursor:pointer;
}
.layer-opacity-val{font-size:10px;color:var(--dim);min-width:24px;text-align:right}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">← Luna Math</button>
    <div class="tb-sep"></div>
    <div class="header-title">수학 그림판</div>
    <div class="header-sep"></div>
    <div class="toolbar">
      <button class="tb-btn" id="btnUndo" title="Ctrl+Z" onclick="undo()" disabled>↩ Undo</button>
      <button class="tb-btn" id="btnRedo" title="Ctrl+Shift+Z" onclick="redo()" disabled>↪ Redo</button>
      <div class="tb-sep"></div>
      <span class="tb-zoom" id="zoomLabel">100%</span>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnGrid" onclick="toggleGrid()">Grid</button>
      <button class="tb-btn" id="btnSnap" onclick="toggleSnap()">Snap</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="duplicateSelected()" title="Ctrl+D">📋</button>
      <button class="tb-btn" onclick="flipSelected('h')" title="좌우 대칭">↔</button>
      <button class="tb-btn" onclick="flipSelected('v')" title="상하 대칭">↕</button>
      <button class="tb-btn" onclick="rotateSelected(90)" title="90° 회전">🔄</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="clearAll()">🗑</button>
      <button class="tb-btn" onclick="exportPNG()">📷</button>
      <div class="tb-sep"></div>
      <a class="tb-btn" href="math-animation.html" style="text-decoration:none">📈 애니메이션</a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Tool Palette -->
    <div class="tool-palette" id="toolPalette"></div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Right Panel (Properties + Layers) -->
    <div class="right-panel">
      <div class="props-panel" id="propsPanel">
        <div class="prop-none" id="propNone">SHAPE PROPERTIES<br><span style="font-size:12px;opacity:0.5">Please select a shape</span></div>
        <div id="propContent" style="display:none"></div>
      </div>
      <div class="panel-resizer" id="panelResizer"></div>
      <div class="layers-panel" id="layersPanel">
        <div class="layers-header">
          <span class="layers-title">LAYERS</span>
          <div class="layers-actions">
            <button id="btnAddLayer" title="New Layer">+ New</button>
            <button id="btnDelLayer" title="Delete Layer">🗑</button>
          </div>
        </div>
        <ul class="layer-list" id="layerList"></ul>
      </div>
    </div>
  </div>

  <!-- Hint Bar -->
  <div class="hint-bar" id="hintBar">
    <span id="hintText">도구를 선택하고 캔버스를 클릭하세요</span>
    <span style="margin-left:auto" id="cursorInfo"></span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// ██  MATH CANVAS — Photoshop-like Geometry Drawing Board
// ═══════════════════════════════════════════════════════

(() => {
'use strict';

// ─── Constants ─────────────────────────────────────────
const COLORS = {
  fill: ['rgba(245,158,11,0.08)','rgba(59,130,246,0.08)','rgba(34,197,94,0.08)','rgba(239,68,68,0.08)',
         'rgba(168,85,247,0.08)','rgba(236,72,153,0.08)','rgba(20,184,166,0.08)','rgba(255,255,255,0.05)'],
  stroke: ['#f59e0b','#3b82f6','#22c55e','#ef4444','#a855f7','#ec4899','#14b8a6','#94a3b8'],
  swatches: ['#f59e0b','#3b82f6','#22c55e','#ef4444','#a855f7','#ec4899','#14b8a6','#94a3b8'],
};
const GRID_SIZE = 20; // world-space pixels per grid cell (= 1 meter)
const SNAP_SIZE = 20;
const ANGLE_SNAP = 15; // degrees
const VERTEX_RADIUS = 6;
const MIDPOINT_SIZE = 8;
const ANGLE_ARC_R = 30;
const MAX_UNDO = 50;
const RDP_TOLERANCE = 15;
const CLEAN_ANGLE_TOL = 1.5; // degrees tolerance for snapping to clean angles
const LABEL_FONT = "bold 13px 'Pretendard Variable', sans-serif";
const SMALL_FONT = "12px 'Pretendard Variable', sans-serif";

// ─── State ─────────────────────────────────────────────
let canvas, ctx, canvasArea;
let W = 800, H = 600;

// Transform
let zoom = 1, panX = 0, panY = 0;
// Grid / Snap
let showGrid = true, snapEnabled = true;
// Tool
let currentTool = 'move'; // move, hand, zoom, triangle, rect, circle, line, polygon, freehand
// Shapes
let shapes = [];
let selectedIds = new Set();
let nextLabelBase = 0; // 0=A, 1=D, 2=G...
// Undo
let undoStack = [], redoStack = [];
// Interaction
let isDragging = false, dragStart = null, dragShape = null;
let isSpaceDown = false, isPanning = false, panStart = null, panStartPan = null;
let buildingShape = null; // partial shape being built (triangle, polygon)
let buildPoints = [];
let rubberPoint = null;
let freehandPoints = [];
let isFreehandDrawing = false;
let rectDragStart = null;
let circleDragCenter = null;
let lineDragStart = null;
let marqueeStart = null, marqueeEnd = null;
// Vertex drag
let vertexDragShape = null, vertexDragIndex = -1, isVertexDragging = false;
// Measure tool
let measurePoints = []; // world coords for measurement
let measurements = []; // persistent measurements [{p1, p2, dist}] or [{p1, p2, p3, angle}]
// Text tool
let textAnnotations = []; // [{id, x, y, text, color, fontSize}]
let textIdCounter = 0;
let editingTextId = null;
// Spinner
let activeSpinner = null; // DOM element
let spinnerTarget = null; // {shapeId, type:'angle'|'length', index}
// Rotation
let isRotating = false;
let rotateAnchor = null; // world coords {x,y} — pivot point
let rotateStartAngle = 0; // angle from anchor to mouse at drag start
let rotateOriginalPoints = null; // snapshot of points before rotation
let rotateOriginalCenter = null; // snapshot for circles
let rotateShapeId = null;
let hoverRotateCorner = -1; // which bounding corner is hovered (-1=none)
let isAnchorDragging = false; // dragging the anchor point
// Shape ID counter
let shapeIdCounter = 0;
// Layers
let layers = [
  { id: 1, name: 'Layer 1 (기본)', visible: true, locked: false, opacity: 1.0 }
];
let activeLayerId = 1;
let layerIdCounter = 2;

// ─── Tools Definition ──────────────────────────────────
const TOOLS = [
  {id:'move', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14L6 2L10 10L7 10L6 14Z"/></svg>', key:'V', label:'이동', color:'gold'},
  {id:'vertex', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><path d="M5.5 10.5L10.5 5.5"/></svg>', key:'A', label:'꼭지점 편집', color:'gold'},
  {id:'hand', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8V4M4 4a1 1 0 012 0V3a1 1 0 012 0v1a1 1 0 012 0v1a1 1 0 012 0v4c0 3-2 4-4 4H7c-2 0-3-1-3-3V8"/></svg>', key:'H', label:'손', color:'gold'},
  {id:'zoom', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10 10L14 14"/><path d="M5 7H9M7 5V9"/></svg>', key:'Z', label:'줌', color:'gold'},
  '_sep_',
  {id:'triangle', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L14 14H2Z"/></svg>', key:'T', label:'삼각형', color:'shape'},
  {id:'rect', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/></svg>', key:'R', label:'사각형', color:'shape'},
  {id:'polygon', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1L14 5.5L12 13H4L2 5.5Z"/></svg>', key:'P', label:'다각형', color:'shape'},
  {id:'circle', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg>', key:'C', label:'원', color:'shape'},
  {id:'line', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13L13 3"/></svg>', key:'L', label:'직선', color:'shape'},
  '_sep_',
  {id:'freehand', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12Q5 6 8 8Q11 10 13 4"/></svg>', key:'F', label:'그리기', color:'gold'},
  {id:'eraser', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 14H14M3 11L9 3L14 7L9 14H5Z"/></svg>', key:'E', label:'지우개', color:'gold'},
  '_sep_',
  {id:'measure', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14L14 2M2 14L2 10M2 14L6 14"/><path d="M5 11L3 13M8 8L6 10M11 5L9 7"/></svg>', key:'M', label:'측정', color:'gold'},
  {id:'ruler', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="5" width="14" height="6" rx="1"/><path d="M4 5V8M7 5V9M10 5V8M13 5V8"/></svg>', key:'U', label:'눈금자', color:'gold'},
  {id:'graph', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V2M2 14H14"/><path d="M3 12L7 6L11 8L14 3" stroke="#06b6d4"/></svg>', key:'G', label:'함수 그래프', color:'gold'},
  {id:'text', icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4H13M8 4V14"/></svg>', key:'X', label:'텍스트', color:'gold'},
];

// ─── Shape Class ───────────────────────────────────────
function makeShape(type, data) {
  const id = shapeIdCounter++;
  const labels = generateLabels(type, data);
  return {
    id,
    type, // 'triangle','rect','circle','line','polygon'
    points: data.points || [],
    center: data.center || null, // circle
    radius: data.radius || 0,   // circle
    fill: COLORS.fill[shapes.length % COLORS.fill.length],
    stroke: COLORS.stroke[shapes.length % COLORS.stroke.length],
    strokeWidth: 2,
    labels, // vertex labels [A,B,C...]
    lockedEdges: [], // indices of locked edges
    hiddenEdges: [], // indices of hidden edge labels
    hiddenAngles: [], // indices of hidden angle labels
    edgeColors: {}, // index → color override for individual edges
    layerId: activeLayerId,
    ...computeShapeMetrics({type, points:data.points||[], center:data.center, radius:data.radius||0}),
  };
}

function generateLabels(type, data) {
  const count = type === 'circle' ? 1 : type === 'line' ? 2 : (data.points || []).length;
  const base = nextLabelBase;
  nextLabelBase += count;
  const labels = [];
  for (let i = 0; i < count; i++) {
    labels.push(String.fromCharCode(65 + ((base + i) % 26)));
  }
  return labels;
}

// ─── Metrics Computation ───────────────────────────────
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
function dot(a, b) { return a.x * b.x + a.y * b.y; }
function cross(a, b) { return a.x * b.y - a.y * b.x; }

function angleBetween(p, a, b) {
  const va = {x: a.x - p.x, y: a.y - p.y};
  const vb = {x: b.x - p.x, y: b.y - p.y};
  const d = dot(va, vb);
  const c = cross(va, vb);
  let angle = Math.atan2(Math.abs(c), d);
  return angle * 180 / Math.PI;
}

function polygonArea(pts) {
  let area = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    area += pts[i].x * pts[j].y;
    area -= pts[j].x * pts[i].y;
  }
  return Math.abs(area) / 2;
}

function computeShapeMetrics(shape) {
  const {type, points, center, radius} = shape;
  const m = {};
  if (type === 'triangle' || type === 'polygon' || type === 'rect') {
    const n = points.length;
    m.angles = [];
    m.lengths = [];
    for (let i = 0; i < n; i++) {
      const prev = points[(i - 1 + n) % n];
      const cur = points[i];
      const next = points[(i + 1) % n];
      m.angles.push(angleBetween(cur, prev, next));
      m.lengths.push(dist(cur, next));
    }
    m.area = polygonArea(points);
    m.perimeter = m.lengths.reduce((s, l) => s + l, 0);
    // Clean angles
    m.angles = m.angles.map(a => {
      const cleanAngles = [30, 45, 60, 90, 120, 135, 150];
      for (const ca of cleanAngles) {
        if (Math.abs(a - ca) < CLEAN_ANGLE_TOL) return ca;
      }
      return Math.round(a * 10) / 10;
    });
    // Right triangle detection
    if (type === 'triangle') {
      m.isRight = m.angles.some(a => Math.abs(a - 90) < 0.5);
      if (m.isRight) {
        const sorted = [...m.lengths].sort((a, b) => a - b);
        const [a, b, c] = sorted;
        m.pythagorean = {a, b, c, lhs: a*a + b*b, rhs: c*c, valid: Math.abs(a*a + b*b - c*c) < 0.1};
      }
    }
    if (type === 'rect') {
      m.width = m.lengths[0];
      m.height = m.lengths[1];
      m.diagonal = Math.hypot(m.width, m.height);
    }
  } else if (type === 'circle') {
    m.radius = radius;
    m.diameter = radius * 2;
    m.area = Math.PI * radius * radius;
    m.circumference = 2 * Math.PI * radius;
  } else if (type === 'line') {
    m.length = dist(points[0], points[1]);
    m.angle = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x) * 180 / Math.PI;
  }
  return m;
}

function recalcShape(shape) {
  Object.assign(shape, computeShapeMetrics(shape));
}

// ─── World/Screen Transform ────────────────────────────
function worldToScreen(wx, wy) {
  return {x: wx * zoom + panX, y: wy * zoom + panY};
}
function screenToWorld(sx, sy) {
  return {x: (sx - panX) / zoom, y: (sy - panY) / zoom};
}

// ─── Init ──────────────────────────────────────────────
function init() {
  canvas = document.getElementById('mainCanvas');
  ctx = canvas.getContext('2d');
  canvasArea = document.getElementById('canvasArea');
  resizeCanvas();
  buildToolPalette();
  setTool('move');
  updateGridSnapButtons();
  saveState();

  // Events
  const ro = new ResizeObserver(() => resizeCanvas());
  ro.observe(canvasArea);

  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, {passive: false});
  canvas.addEventListener('dblclick', onDblClick);
  canvas.addEventListener('contextmenu', onContextMenu);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('mousedown', onDocMouseDown);

  // Touch events
  canvas.addEventListener('touchstart', onTouchStart, {passive: false});
  canvas.addEventListener('touchmove', onTouchMove, {passive: false});
  canvas.addEventListener('touchend', onTouchEnd, {passive: false});

  initPanelResizer();
  requestAnimationFrame(renderLoop);
}

// ─── Panel Resizer ──────────────────────────────────
function initPanelResizer() {
  const resizer = document.getElementById('panelResizer');
  const rightPanel = document.querySelector('.right-panel');
  const layersPanel = document.getElementById('layersPanel');
  let isResizing = false, startY = 0, startH = 0;

  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isResizing = true;
    startY = e.clientY;
    startH = layersPanel.getBoundingClientRect().height;
    resizer.classList.add('active');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const dy = startY - e.clientY;
    const panelH = rightPanel.getBoundingClientRect().height;
    const newH = Math.max(36, Math.min(panelH - 80, startH + dy));
    layersPanel.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    resizer.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

function resizeCanvas() {
  const rect = canvasArea.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

// ─── Tool Palette ──────────────────────────────────────
function buildToolPalette() {
  const pal = document.getElementById('toolPalette');
  pal.innerHTML = '';
  const frag = document.createDocumentFragment();
  TOOLS.forEach(t => {
    if (t === '_sep_') {
      const sep = document.createElement('div');
      sep.className = 'tool-sep';
      frag.appendChild(sep);
      return;
    }
    const btn = document.createElement('button');
    const isShape = t.color === 'shape';
    btn.className = 'tool-btn' + (isShape ? ' shape-tool' : '');
    btn.id = 'tool_' + t.id;
    btn.title = t.label + ' (' + t.key + ')';
    const isSvg = t.icon.startsWith('<svg');
    btn.innerHTML = `<span style="${isSvg ? 'display:flex;align-items:center;justify-content:center;width:20px;height:20px' : 'font-size:20px;line-height:1'}">${t.icon}</span><span class="tool-key">${t.key}</span>`;
    btn.addEventListener('click', (e) => { e.stopPropagation(); setTool(t.id); });
    frag.appendChild(btn);
  });
  pal.appendChild(frag);
}

function setTool(id) {
  cancelBuilding();
  currentTool = id;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tool_' + id);
  if (el) el.classList.add('active');
  updateCursor();
  updateHint();
  // Auto-open dialogs for certain tools
  if (id === 'graph') openGraphDialog();
  if (id === 'ruler') toggleRuler();
}

function updateCursor() {
  const area = canvasArea;
  area.className = 'canvas-area';
  if (currentTool === 'hand' || isSpaceDown) area.classList.add(isPanning ? 'cursor-grabbing' : 'cursor-grab');
  else if (currentTool === 'zoom') area.classList.add('cursor-zoomin');
  else if (currentTool === 'eraser' || currentTool === 'measure' || currentTool === 'text') area.classList.add('cursor-crosshair');
  else if (['triangle','rect','circle','line','polygon','freehand'].includes(currentTool)) area.classList.add('cursor-crosshair');
  else if (currentTool === 'vertex') area.classList.add('cursor-vertex');
  else if (currentTool === 'move') {} // default
}

function updateHint() {
  const hints = {
    move: '클릭: 선택/이동 | <kbd>Shift</kbd> 다중선택',
    vertex: '드래그: 꼭지점 이동 | 더블클릭: 각도/변 길이 편집 | 원: 테두리로 크기 변경',
    eraser: '도형을 클릭하면 삭제',
    measure: '2점 클릭: 거리 측정 | 3점 클릭: 각도 측정 | <kbd>Esc</kbd> 초기화',
    text: '캔버스를 클릭하여 텍스트 추가',
    hand: '드래그로 캔버스 이동',
    zoom: '클릭: 확대 | <kbd>Alt</kbd>+클릭: 축소',
    triangle: '3개의 점을 클릭하여 삼각형 그리기. <kbd>Shift</kbd> 각도 스냅',
    rect: '드래그로 사각형 그리기. <kbd>Shift</kbd> 정사각형',

// ─── Grid / Snap ───────────────────────────────────────
function toggleGrid() { showGrid = !showGrid; updateGridSnapButtons(); }
function toggleSnap() { snapEnabled = !snapEnabled; updateGridSnapButtons(); }
function updateGridSnapButtons() {
  document.getElementById('btnGrid').classList.toggle('active', showGrid);
  document.getElementById('btnSnap').classList.toggle('active', snapEnabled);
}
function snapPoint(wx, wy) {
  if (!snapEnabled) return {x: wx, y: wy};
  return {
    x: Math.round(wx / SNAP_SIZE) * SNAP_SIZE,
    y: Math.round(wy / SNAP_SIZE) * SNAP_SIZE,
  };
}

// ─── Undo / Redo ───────────────────────────────────────
function saveState() {
  const layerState = layers ?{layers, activeLayerId, layerIdCounter} : {};
  undoStack.push(JSON.parse(JSON.stringify({shapes, nextLabelBase, shapeIdCounter, measurements, textAnnotations, textIdCounter, ...layerState})));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}
function undo() {
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  const state = undoStack[undoStack.length - 1];
  restoreState(state);
}
function redo() {
  if (redoStack.length === 0) return;
  const state = redoStack.pop();
  undoStack.push(state);
  restoreState(state);
}
function restoreState(state) {
  const s = JSON.parse(JSON.stringify(state));
  shapes = s.shapes;
  nextLabelBase = s.nextLabelBase;
  shapeIdCounter = s.shapeIdCounter;
  if (s.layers) { layers = s.layers; activeLayerId = s.activeLayerId; layerIdCounter = s.layerIdCounter; }
  if (s.measurements) measurements = s.measurements;
  if (s.textAnnotations) { textAnnotations = s.textAnnotations; textIdCounter = s.textIdCounter || 0; }
  selectedIds.clear();
  closeSpinner();
  updatePropsPanel();
  updateUndoButtons();
  renderLayersPanel();
}
function updateUndoButtons() {
  document.getElementById('btnUndo').disabled = undoStack.length <= 1;
  document.getElementById('btnRedo').disabled = redoStack.length === 0;
}

// ─── Clear / Export ────────────────────────────────────
function clearAll() {
  if (shapes.length === 0 && measurements.length === 0 && textAnnotations.length === 0) return;
  shapes = [];
  measurements = [];
  textAnnotations = [];
  textIdCounter = 0;
  selectedIds.clear();
  nextLabelBase = 0;
  shapeIdCounter = 0;
  if (layers) {
    layers = [{ id: 1, name: 'Layer 1 (기본)', visible: true, locked: false, opacity: 1.0 }];
    activeLayerId = 1;
    layerIdCounter = 2;
  }
  closeSpinner();
  cancelBuilding();
  saveState();
  updatePropsPanel();
  renderLayersPanel();
}

function exportPNG() {
  // Render to offscreen canvas with white bg
  const offCanvas = document.createElement('canvas');
  const sc = 2;
  offCanvas.width = W * sc;
  offCanvas.height = H * sc;
  const oc = offCanvas.getContext('2d');
  oc.setTransform(sc, 0, 0, sc, 0, 0);
  oc.fillStyle = '#ffffff';
  oc.fillRect(0, 0, W, H);
  // Draw grid
  if (showGrid) drawGrid(oc, '#e0e0e0', 0.3);
  // Draw shapes (respect layer order & visibility)
  if (layers) {
    layers.forEach(layer => {
      if (!layer.visible) return;
      oc.save();
      oc.globalAlpha = layer.opacity;
      shapes.forEach(s => {
        if (s.layerId === layer.id) drawShape(oc, s, false, true);
      });
      oc.restore();
    });
  } else {
    shapes.forEach(s => drawShape(oc, s, false, true));
  }
  // Download
  const link = document.createElement('a');
  link.download = 'math-canvas.png';
  link.href = offCanvas.toDataURL('image/png');
  link.click();
  showToast('📷 PNG 내보내기 완료!');
}

}

// ═══════════════════════════════════════════════════════
// ██  HIT TESTING
// ═══════════════════════════════════════════════════════

function getLayer(id) {
  return layers ?layers.find(l => l.id === id) : null;
}

function hitTestShapes(wx, wy) {
  // Returns {shape, hitType:'vertex'|'edge'|'fill'|'center', index}
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    // Skip shapes on hidden or locked layers
    const layer = getLayer(s.layerId);
    if (layer && (!layer.visible || layer.locked)) continue;
    const hit = hitTestShape(s, wx, wy);
    if (hit) return {...hit, shape: s};
  }
  return null;
}

function hitTestShape(s, wx, wy) {
  const threshold = 8 / zoom;
  const vtxHitR = (currentTool === 'vertex' ? 12 : VERTEX_RADIUS) / zoom + 2;
  if (s.type === 'circle') {
    // Center
    if (dist({x:wx,y:wy}, s.center) < vtxHitR) return {hitType:'center', index:0};
    // Edge
    const d = Math.abs(dist({x:wx,y:wy}, s.center) - s.radius);
    if (d < threshold) return {hitType:'edge', index:0};
    // Fill
    if (dist({x:wx,y:wy}, s.center) <= s.radius) return {hitType:'fill', index:0};
    return null;
  }
  if (s.type === 'line') {
    for (let j = 0; j < 2; j++) {
      if (dist({x:wx,y:wy}, s.points[j]) < vtxHitR) return {hitType:'vertex', index:j};
    }
    if (distToSegment({x:wx,y:wy}, s.points[0], s.points[1]) < threshold) return {hitType:'edge', index:0};
    return null;
  }
  // Polygon-type shapes
  const pts = s.points;
  const n = pts.length;
  // Check vertices (includes angle arc area for easier clicking)
  for (let j = 0; j < n; j++) {
    const vertexDist = dist({x:wx,y:wy}, pts[j]);
    if (vertexDist < vtxHitR) return {hitType:'vertex', index:j};
  }
  // Check angle arc area (within ANGLE_ARC_R + some tolerance from vertex)
  if (s.angles) {
    for (let j = 0; j < n; j++) {
      const vertexDist = dist({x:wx,y:wy}, pts[j]);
      const arcR = ANGLE_ARC_R / zoom;
      if (vertexDist > VERTEX_RADIUS / zoom && vertexDist < arcR + 16 / zoom) {
        // Check if the click is within the angle arc sector
        const prev = pts[(j - 1 + n) % n];
        const next = pts[(j + 1) % n];
        const a1 = Math.atan2(prev.y - pts[j].y, prev.x - pts[j].x);
        const a2 = Math.atan2(next.y - pts[j].y, next.x - pts[j].x);
        const clickAngle = Math.atan2(wy - pts[j].y, wx - pts[j].x);
        // Check if clickAngle is between a1 and a2 (interior)
        let diff1 = clickAngle - a1;
        while (diff1 < -Math.PI) diff1 += 2*Math.PI;
        while (diff1 > Math.PI) diff1 -= 2*Math.PI;
        let diff2 = a2 - a1;
        while (diff2 < -Math.PI) diff2 += 2*Math.PI;
        while (diff2 > Math.PI) diff2 -= 2*Math.PI;
        // Check if click is in the same angular range as the arc
        const inArc = (diff2 > 0) ? (diff1 >= 0 && diff1 <= diff2) : (diff1 <= 0 && diff1 >= diff2);
        if (inArc) return {hitType:'vertex', index:j};
      }
    }
  }
  // Check edge midpoints
  for (let j = 0; j < n; j++) {
    const k = (j + 1) % n;
    const mx = (pts[j].x + pts[k].x) / 2;
    const my = (pts[j].y + pts[k].y) / 2;
    if (dist({x:wx,y:wy}, {x:mx,y:my}) < MIDPOINT_SIZE / zoom + 2) return {hitType:'midpoint', index:j};
  }
  // Check edges
  for (let j = 0; j < pts.length; j++) {
    const k = (j + 1) % pts.length;
    if (distToSegment({x:wx,y:wy}, pts[j], pts[k]) < threshold) return {hitType:'edge', index:j};
  }
  // Check fill (point in polygon)
  if (pointInPolygon({x:wx,y:wy}, pts)) return {hitType:'fill', index:0};
  return null;
}

function distToSegment(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return dist(p, a);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return dist(p, {x: a.x + t*dx, y: a.y + t*dy});
}

function pointInPolygon(p, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    if (((yi > p.y) !== (yj > p.y)) && (p.x < (xj - xi) * (p.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ═══════════════════════════════════════════════════════
// ██  MOUSE EVENTS
// ═══════════════════════════════════════════════════════

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}

function onMouseDown(e) {
  if (e.button === 1) { e.preventDefault(); isPanning = true; panStart = getMousePos(e); panStartPan = {x:panX, y:panY}; updateCursor(); return; }
  if (e.button !== 0) return;
  const sp = getMousePos(e);
  const wp = screenToWorld(sp.x, sp.y);

  // Space+drag = pan
  if (isSpaceDown || currentTool === 'hand') {
    closeSpinner(); // dismiss spinner on pan
    isPanning = true;
    panStart = sp;
    panStartPan = {x: panX, y: panY};
    updateCursor();
    return;
  }

  if (currentTool === 'zoom') {
    const factor = e.altKey ? 1/1.3 : 1.3;
    zoomAt(sp.x, sp.y, factor);
    return;
  }

  if (currentTool === 'eraser') {
    const hit = hitTestShapes(wp.x, wp.y);
    if (hit) {
      shapes = shapes.filter(s => s.id !== hit.shape.id);
      selectedIds.delete(hit.shape.id);
      saveState();
      updatePropsPanel();
      showToast('🧹 삭제!');
    }
    return;
  }

  if (currentTool === 'measure') {
    const snapped = snapPoint(wp.x, wp.y);
    measurePoints.push(snapped);
    if (measurePoints.length === 2) {
      // Distance measurement
      const d = dist(measurePoints[0], measurePoints[1]);
      measurements.push({type:'dist', p1:{...measurePoints[0]}, p2:{...measurePoints[1]}, value: d});
      showToast(`📏 거리: ${(d/GRID_SIZE).toFixed(2)}m`);
      measurePoints = [];
    } else if (measurePoints.length === 3) {
      // Angle measurement
      const a = angleBetween(measurePoints[1], measurePoints[0], measurePoints[2]);
      measurements.push({type:'angle', p1:{...measurePoints[0]}, p2:{...measurePoints[1]}, p3:{...measurePoints[2]}, value: a});
      showToast(`📐 각도: ${a.toFixed(1)}°`);
      measurePoints = [];
    }
    return;
  }

  if (currentTool === 'ruler') {
    toggleRuler();
    return;
  }

  if (currentTool === 'graph') {
    openGraphDialog();
    return;
  }

  if (currentTool === 'text') {
    const snapped = snapPoint(wp.x, wp.y);
    openTextInput(snapped);
    return;
  }

  if (currentTool === 'vertex') {
    const hit = hitTestShapes(wp.x, wp.y);
    if (hit && (hit.hitType === 'vertex' || hit.hitType === 'center')) {
      // Start vertex drag
      vertexDragShape = hit.shape;
      vertexDragIndex = hit.index;
      isVertexDragging = true;
      selectedIds.clear();
      selectedIds.add(hit.shape.id);
      updatePropsPanel();
    } else if (hit && hit.hitType === 'edge' && hit.shape.type === 'circle') {
      // Circle edge drag = resize
      vertexDragShape = hit.shape;
      vertexDragIndex = -1; // special: circle resize
      isVertexDragging = true;
      selectedIds.clear();
      selectedIds.add(hit.shape.id);
      updatePropsPanel();
    } else if (hit) {
      // Clicked on shape body — select but allow whole-shape drag
      if (!selectedIds.has(hit.shape.id)) {
        selectedIds.clear();
        selectedIds.add(hit.shape.id);
      }
      isDragging = true;
      dragStart = wp;
      updatePropsPanel();
    } else {
      selectedIds.clear();
      updatePropsPanel();
    }
    return;
  }

  if (currentTool === 'move' || currentTool === 'vertex') {
    // Check if clicking on rotation anchor
    if (rotateAnchor && rotateShapeId != null) {
      const anchorScr = worldToScreen(rotateAnchor.x, rotateAnchor.y);
      if (dist(sp, anchorScr) < 12) {
        isAnchorDragging = true;
        return;
      }
    }

    // Check if clicking on a bounding box corner for rotation
    if (hoverRotateCorner >= 0 && selectedIds.size === 1) {
      const selId = [...selectedIds][0];
      const s = shapes.find(s => s.id === selId);
      if (s) {
        rotateShapeId = selId;
        // Set anchor to center if not already set
        if (!rotateAnchor) {
          if (s.type === 'circle') {
            rotateAnchor = {x: s.center.x, y: s.center.y};
          } else {
            const cx = s.points.reduce((a,p) => a+p.x, 0) / s.points.length;
            const cy = s.points.reduce((a,p) => a+p.y, 0) / s.points.length;
            rotateAnchor = {x: cx, y: cy};
          }
        }
        isRotating = true;
        rotateStartAngle = Math.atan2(wp.y - rotateAnchor.y, wp.x - rotateAnchor.x);
        if (s.points) {
          rotateOriginalPoints = s.points.map(p => ({x: p.x, y: p.y}));
        }
        if (s.type === 'circle') {
          rotateOriginalCenter = {x: s.center.x, y: s.center.y};
        }
        canvasArea.style.cursor = 'grabbing';
        return;
      }
    }
  }

  if (currentTool === 'vertex') {
    // Clear rotation state when clicking elsewhere (not on anchor or corner)
    if (!isRotating && hoverRotateCorner < 0) {
      rotateAnchor = null;
      rotateShapeId = null;
    }
    const hit = hitTestShapes(wp.x, wp.y);
    if (hit && (hit.hitType === 'vertex' || hit.hitType === 'center')) {
      vertexDragShape = hit.shape;
      vertexDragIndex = hit.index;
      isVertexDragging = true;
      selectedIds.clear();
      selectedIds.add(hit.shape.id);
      updatePropsPanel();
    } else if (hit && hit.hitType === 'edge' && hit.shape.type === 'circle') {
      vertexDragShape = hit.shape;
      vertexDragIndex = -1;
      isVertexDragging = true;
      selectedIds.clear();
      selectedIds.add(hit.shape.id);
      updatePropsPanel();
    } else if (hit) {
      if (!selectedIds.has(hit.shape.id)) {
        selectedIds.clear();
        selectedIds.add(hit.shape.id);
      }
      isDragging = true;
      dragStart = wp;
      updatePropsPanel();
    } else {
      selectedIds.clear();
      updatePropsPanel();
    }
    return;
  }

  if (currentTool === 'move') {
    // Clear rotation state when clicking elsewhere
    if (!isRotating && hoverRotateCorner < 0) {
      rotateAnchor = null;
      rotateShapeId = null;
    }
    const hit = hitTestShapes(wp.x, wp.y);
    if (hit) {
      if (e.shiftKey) {
        if (selectedIds.has(hit.shape.id)) selectedIds.delete(hit.shape.id);
        else selectedIds.add(hit.shape.id);
      } else {
        if (!selectedIds.has(hit.shape.id)) {
          selectedIds.clear();
          selectedIds.add(hit.shape.id);
        }
        isDragging = true;
        dragStart = wp;
      }
      updatePropsPanel();
    } else {
      if (!e.shiftKey) selectedIds.clear();
      marqueeStart = sp;
      marqueeEnd = sp;
      updatePropsPanel();
    }
    return;
  }

  if (currentTool === 'triangle') {
    const snapped = snapPoint(wp.x, wp.y);
    buildPoints.push(snapped);
    if (buildPoints.length === 3) {
      finishTriangle();
    }
    return;
  }

  if (currentTool === 'rect') {
    rectDragStart = snapPoint(wp.x, wp.y);
    return;
  }

  if (currentTool === 'circle') {
    circleDragCenter = snapPoint(wp.x, wp.y);
    return;
  }

  if (currentTool === 'line') {
    const snapped = snapPoint(wp.x, wp.y);
    if (!lineDragStart) {
      lineDragStart = snapped;
    } else {
      finishLine(lineDragStart, snapped);
      lineDragStart = null;
    }
    return;
  }

  if (currentTool === 'polygon') {
    const snapped = snapPoint(wp.x, wp.y);
    buildPoints.push(snapped);
    return;
  }

  if (currentTool === 'freehand') {
    isFreehandDrawing = true;
    freehandPoints = [sp];
    return;
  }
}

function onMouseMove(e) {
  const sp = getMousePos(e);
  const wp = screenToWorld(sp.x, sp.y);

  // Cursor info
  const wSnap = snapPoint(wp.x, wp.y);
  document.getElementById('cursorInfo').textContent =
    `X: ${(wp.x/GRID_SIZE).toFixed(1)}m  Y: ${(wp.y/GRID_SIZE).toFixed(1)}m`;

  if (isPanning) {
    panX = panStartPan.x + (sp.x - panStart.x);
    panY = panStartPan.y + (sp.y - panStart.y);
    updateZoomLabel();
    return;
  }

  // Anchor drag
  if (isAnchorDragging && rotateAnchor) {
    const snapped = snapPoint(wp.x, wp.y);
    // Snap to vertices of the shape
    const s = shapes.find(s => s.id === rotateShapeId);
    if (s && s.points) {
      let closest = null, closestDist = 15 / zoom;
      s.points.forEach(p => {
        const d = dist(p, snapped);
        if (d < closestDist) { closest = p; closestDist = d; }
      });
      if (closest) {
        rotateAnchor = {x: closest.x, y: closest.y};
      } else {
        rotateAnchor = snapped;
      }
    } else {
      rotateAnchor = snapped;
    }
    return;
  }

  // Rotation drag
  if (isRotating && rotateAnchor && rotateShapeId != null) {
    const currentAngle = Math.atan2(wp.y - rotateAnchor.y, wp.x - rotateAnchor.x);
    let delta = currentAngle - rotateStartAngle;
    // Snap to 15° increments when Shift held
    if (e.shiftKey) {
      const step = Math.PI / 12; // 15°
      delta = Math.round(delta / step) * step;
    }
    const s = shapes.find(s => s.id === rotateShapeId);
    if (s && s.points && rotateOriginalPoints) {
      for (let i = 0; i < s.points.length; i++) {
        const ox = rotateOriginalPoints[i].x - rotateAnchor.x;
        const oy = rotateOriginalPoints[i].y - rotateAnchor.y;
        s.points[i].x = rotateAnchor.x + ox * Math.cos(delta) - oy * Math.sin(delta);
        s.points[i].y = rotateAnchor.y + ox * Math.sin(delta) + oy * Math.cos(delta);
      }
      recalcShape(s);
      updatePropsPanel();
    } else if (s && s.type === 'circle' && rotateOriginalCenter) {
      const ox = rotateOriginalCenter.x - rotateAnchor.x;
      const oy = rotateOriginalCenter.y - rotateAnchor.y;
      s.center.x = rotateAnchor.x + ox * Math.cos(delta) - oy * Math.sin(delta);
      s.center.y = rotateAnchor.y + ox * Math.sin(delta) + oy * Math.cos(delta);
      recalcShape(s);
    }
    // Show angle in toast-like overlay
    const degDelta = (delta * 180 / Math.PI) % 360;
    document.getElementById('cursorInfo').textContent =
      `🔄 ${degDelta >= 0 ? '+' : ''}${degDelta.toFixed(1)}°`;
    return;
  }

  // Vertex drag
  if (isVertexDragging && vertexDragShape) {
    const snapped = snapPoint(wp.x, wp.y);
    if (vertexDragShape.type === 'circle' && vertexDragIndex === -1) {
      // Circle resize: set radius to distance from center to mouse
      vertexDragShape.radius = Math.max(GRID_SIZE / 2, dist(vertexDragShape.center, snapped));
      recalcShape(vertexDragShape);
    } else if (vertexDragShape.type === 'circle' && vertexDragIndex === 0) {
      // Circle center drag
      vertexDragShape.center = {x: snapped.x, y: snapped.y};
      recalcShape(vertexDragShape);
    } else if (vertexDragShape.points && vertexDragIndex >= 0 && vertexDragIndex < vertexDragShape.points.length) {
      // Check locked edges connected to this vertex
      const s = vertexDragShape;
      const n = s.points.length;
      const vi = vertexDragIndex;
      const locked = s.lockedEdges || [];
      // Edges connected to this vertex: edge (vi-1) connects (vi-1,vi), edge (vi) connects (vi, vi+1)
      const prevEdge = (vi - 1 + n) % n; // edge from prev→vi
      const nextEdge = vi; // edge from vi→next
      const prevLocked = locked.includes(prevEdge);
      const nextLocked = locked.includes(nextEdge);

      if (prevLocked && nextLocked) {
        // Both edges locked — can't move this vertex at all
      } else if (prevLocked) {
        // Constrain: maintain distance to prev vertex
        const prev = s.points[(vi - 1 + n) % n];
        const lockLen = dist(prev, s.points[vi]);
        const angle = Math.atan2(snapped.y - prev.y, snapped.x - prev.x);
        s.points[vi] = {x: prev.x + Math.cos(angle) * lockLen, y: prev.y + Math.sin(angle) * lockLen};
        recalcShape(s);
      } else if (nextLocked) {
        // Constrain: maintain distance to next vertex
        const next = s.points[(vi + 1) % n];
        const lockLen = dist(s.points[vi], next);
        const angle = Math.atan2(snapped.y - next.y, snapped.x - next.x);
        s.points[vi] = {x: next.x + Math.cos(angle) * lockLen, y: next.y + Math.sin(angle) * lockLen};
        recalcShape(s);
      } else {
        s.points[vi] = {x: snapped.x, y: snapped.y};
        recalcShape(s);
      }
    }
    updatePropsPanel();
    return;
  }

  if (isDragging && selectedIds.size > 0) {
    const dx = wp.x - dragStart.x;
    const dy = wp.y - dragStart.y;
    shapes.forEach(s => {
      if (!selectedIds.has(s.id)) return;
      if (s.type === 'circle') {
        s.center.x += dx;
        s.center.y += dy;
      } else {
        s.points.forEach(p => { p.x += dx; p.y += dy; });
      }
    });
    dragStart = wp;
    return;
  }

  if (marqueeStart && currentTool === 'move') {
    marqueeEnd = sp;
    // Select shapes in marquee
    const w1 = screenToWorld(Math.min(marqueeStart.x, marqueeEnd.x), Math.min(marqueeStart.y, marqueeEnd.y));
    const w2 = screenToWorld(Math.max(marqueeStart.x, marqueeEnd.x), Math.max(marqueeStart.y, marqueeEnd.y));
    selectedIds.clear();
    shapes.forEach(s => {
      if (shapeBoundsInRect(s, w1, w2)) selectedIds.add(s.id);
    });
    updatePropsPanel();
    return;
  }

  // Detect hover over bounding box corners for rotation
  const oldHover = hoverRotateCorner;
  hoverRotateCorner = -1;
  if ((currentTool === 'move' || currentTool === 'vertex') && selectedIds.size === 1) {
    const selId = [...selectedIds][0];
    const s = shapes.find(s => s.id === selId);
    if (s && s.points) {
      const scrPts = s.points.map(p => worldToScreen(p.x, p.y));
      const corners = getBoundingCorners(scrPts, 6);
      const hitR = 14;
      for (let i = 0; i < 4; i++) {
        if (Math.abs(sp.x - corners[i].x) < hitR && Math.abs(sp.y - corners[i].y) < hitR) {
          hoverRotateCorner = i;
          break;
        }
      }
    }
  }
  if (hoverRotateCorner >= 0) {
    canvasArea.style.cursor = 'grab';
  } else if (oldHover >= 0) {
    canvasArea.style.cursor = '';
    updateCursor();
  }

  // Rubber band for building tools
  rubberPoint = snapPoint(wp.x, wp.y);

  // Rect drag
  if (rectDragStart) {
    rubberPoint = snapPoint(wp.x, wp.y);
    if (e.shiftKey) {
      const dx = rubberPoint.x - rectDragStart.x;
      const dy = rubberPoint.y - rectDragStart.y;
      const side = Math.max(Math.abs(dx), Math.abs(dy));
      rubberPoint = {x: rectDragStart.x + Math.sign(dx)*side, y: rectDragStart.y + Math.sign(dy)*side};
    }
    return;
  }

  // Circle drag
  if (circleDragCenter) {
    rubberPoint = wp;
    return;
  }

  // Freehand
  if (isFreehandDrawing) {
    freehandPoints.push(sp);
    return;
  }
}

function onMouseUp(e) {
  if (isPanning) {
    isPanning = false;
    updateCursor();
    return;
  }

  if (isAnchorDragging) {
    isAnchorDragging = false;
    return;
  }

  if (isRotating) {
    isRotating = false;
    rotateOriginalPoints = null;
    rotateOriginalCenter = null;
    canvasArea.style.cursor = '';
    updateCursor();
    saveState();
    updatePropsPanel();
    return;
  }

  if (isVertexDragging) {
    isVertexDragging = false;
    vertexDragShape = null;
    vertexDragIndex = -1;
    saveState();
    updatePropsPanel();
    return;
  }

  if (isDragging) {
    isDragging = false;
    saveState();
    updatePropsPanel();
    return;
  }

  if (marqueeStart) {
    marqueeStart = null;
    marqueeEnd = null;
    return;
  }

  const sp = getMousePos(e);
  const wp = screenToWorld(sp.x, sp.y);

  // Rect finish
  if (rectDragStart) {
    let end = snapPoint(wp.x, wp.y);
    if (e.shiftKey) {
      const dx = end.x - rectDragStart.x;
      const dy = end.y - rectDragStart.y;
      const side = Math.max(Math.abs(dx), Math.abs(dy));
      end = {x: rectDragStart.x + Math.sign(dx)*side, y: rectDragStart.y + Math.sign(dy)*side};
    }
    if (Math.abs(end.x - rectDragStart.x) > 5 && Math.abs(end.y - rectDragStart.y) > 5) {
      finishRect(rectDragStart, end);
    }
    rectDragStart = null;
    rubberPoint = null;
    return;
  }

  // Circle finish
  if (circleDragCenter) {
    const r = dist(circleDragCenter, wp);
    if (r > 3) {
      finishCircle(circleDragCenter, r);
    }
    circleDragCenter = null;
    rubberPoint = null;
    return;
  }

  // Freehand finish
  if (isFreehandDrawing) {
    isFreehandDrawing = false;
    if (freehandPoints.length > 5) {
      recognizeFreehand(freehandPoints);
    }
    freehandPoints = [];
    return;
  }
}

// ─── Context Menu (우클릭) ─────────────────────────────
function onContextMenu(e) {
  e.preventDefault();
  removeContextMenu();
  const pos = getMousePos(e);
  const w = screenToWorld(pos.x, pos.y);
  const hit = hitTestShapes(w.x, w.y);
  if (!hit) return;
  // Select the shape if not already selected
  if (!selectedIds.has(hit.shape.id)) {
    selectedIds.clear();
    selectedIds.add(hit.shape.id);
    updatePropsPanel();
  }
  const menu = document.createElement('div');
  menu.id = 'ctxMenu';
  menu.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;background:rgba(15,15,40,0.95);border:1px solid rgba(6,182,212,0.3);border-radius:10px;padding:6px 0;z-index:600;min-width:160px;font-family:"Jua",sans-serif;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,0.5);`;
  const items = [
    {icon:'📋', label:'복제', key:'Ctrl+D', fn: () => duplicateSelected()},
    {icon:'↔️', label:'좌우 뒤집기', key:'', fn: () => flipSelected('h')},
    {icon:'↕️', label:'상하 뒤집기', key:'', fn: () => flipSelected('v')},
    {icon:'🔄', label:'90° 회전', key:'', fn: () => rotateSelected(90)},
    {divider: true},
    {icon:'🎨', label:'색상 변경', key:'', fn: () => { removeContextMenu(); cycleColor(); }},
    {divider: true},
    {icon:'🗑️', label:'삭제', key:'Del', fn: () => { shapes = shapes.filter(s => !selectedIds.has(s.id)); selectedIds.clear(); saveState(); updatePropsPanel(); }},
  ];
  items.forEach(item => {
    if (item.divider) {
      const hr = document.createElement('div');
      hr.style.cssText = 'height:1px;background:rgba(255,255,255,0.08);margin:4px 8px;';
      menu.appendChild(hr);
      return;
    }
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 14px;color:#e2e8f0;font-size:13px;cursor:pointer;transition:background 0.15s;';
    row.innerHTML = `<span>${item.icon} ${item.label}</span>${item.key ? `<span style="font-size:11px;color:#64748b;margin-left:16px;">${item.key}</span>` : ''}`;
    row.addEventListener('mouseenter', () => row.style.background = 'rgba(6,182,212,0.15)');
    row.addEventListener('mouseleave', () => row.style.background = 'transparent');
    row.addEventListener('click', () => { removeContextMenu(); item.fn(); });
    menu.appendChild(row);
  });
  document.body.appendChild(menu);
  // Adjust if overflows screen
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  // Close on click elsewhere
  setTimeout(() => document.addEventListener('mousedown', closeCtxMenuHandler, {once:true}), 0);
}
function removeContextMenu() { const m = document.getElementById('ctxMenu'); if (m) m.remove(); }
function closeCtxMenuHandler(e) { if (!e.target.closest('#ctxMenu')) removeContextMenu(); else setTimeout(() => document.addEventListener('mousedown', closeCtxMenuHandler, {once:true}), 0); }
function cycleColor() {
  const colors = COLORS.stroke;
  shapes.forEach(s => {
    if (!selectedIds.has(s.id)) return;
    const idx = colors.indexOf(s.strokeColor || s.color);
    const next = colors[(idx + 1) % colors.length];
    s.strokeColor = next; s.color = next;
  });
  saveState(); updatePropsPanel(); showToast('🎨 색상 변경!');
}

function onDblClick(e) {
  if (currentTool === 'polygon' && buildPoints.length >= 3) {
    finishPolygon(buildPoints);
    buildPoints = [];
    rubberPoint = null;
    return;
  }

  // Double-click on midpoint or vertex to open spinner
  if (currentTool === 'vertex') {
    const sp = getMousePos(e);
    const wp = screenToWorld(sp.x, sp.y);
    const hit = hitTestShapes(wp.x, wp.y);
    if (hit) {
      if (hit.hitType === 'midpoint') {
        // Open length spinner for this edge
        openSpinner(hit.shape, 'length', hit.index, sp);
        return;
      }
      if (hit.hitType === 'vertex' || hit.hitType === 'center') {
        // Open angle spinner for this vertex (only for shapes with angles)
        if (hit.shape.angles && hit.shape.angles.length > hit.index) {
          openSpinner(hit.shape, 'angle', hit.index, sp);
        }
        return;
      }
      if (hit.hitType === 'edge') {
        // Open length spinner for this edge
        openSpinner(hit.shape, 'length', hit.index, sp);
        return;
      }
    }
  }
}

function onWheel(e) {
  e.preventDefault();
  const sp = getMousePos(e);
  const factor = e.deltaY < 0 ? 1.1 : 1/1.1;
  zoomAt(sp.x, sp.y, factor);
}

function zoomAt(sx, sy, factor) {
  closeSpinner(); // dismiss spinner on zoom
  const newZoom = Math.max(0.1, Math.min(10, zoom * factor));
  const ratio = newZoom / zoom;
  panX = sx - (sx - panX) * ratio;
  panY = sy - (sy - panY) * ratio;
  zoom = newZoom;
  updateZoomLabel();
}

function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
}

function shapeBoundsInRect(s, w1, w2) {
  if (s.type === 'circle') {
    return s.center.x >= w1.x && s.center.x <= w2.x && s.center.y >= w1.y && s.center.y <= w2.y;
  }
  return s.points.every(p => p.x >= w1.x && p.x <= w2.x && p.y >= w1.y && p.y <= w2.y);
}

// ─── Document-level mousedown (for closing spinner) ───
function onDocMouseDown(e) {
  if (activeSpinner && !activeSpinner.contains(e.target)) {
    closeSpinner();
  }
}

// ═══════════════════════════════════════════════════════
// ██  TOUCH EVENTS (mobile / tablet)
// ═══════════════════════════════════════════════════════
let lastTouchDist = 0, lastTouchMid = null, touchDblTap = 0;

function touchToMouse(touch) {
  return {clientX: touch.clientX, clientY: touch.clientY, button: 0, preventDefault(){}, stopPropagation(){}};
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    // Pinch zoom / two-finger pan
    const [a, b] = [e.touches[0], e.touches[1]];
    lastTouchDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    lastTouchMid = {x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2};
    // Cancel any single-touch drag
    if (isDragging) { isDragging = false; }
    if (isVertexDragging) { isVertexDragging = false; vertexDragShape = null; }
    return;
  }
  if (e.touches.length === 1) {
    // Double-tap detection
    const now = Date.now();
    if (now - touchDblTap < 350) {
      onDblClick(touchToMouse(e.touches[0]));
      touchDblTap = 0;
      return;
    }
    touchDblTap = now;
    onMouseDown(touchToMouse(e.touches[0]));
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    const [a, b] = [e.touches[0], e.touches[1]];
    const newDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const newMid = {x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2};
    // Pinch zoom
    if (lastTouchDist > 0) {
      const rect = canvas.getBoundingClientRect();
      const sx = newMid.x - rect.left;
      const sy = newMid.y - rect.top;
      const factor = newDist / lastTouchDist;
      zoomAt(sx, sy, factor);
    }
    // Two-finger pan
    if (lastTouchMid) {
      panX += newMid.x - lastTouchMid.x;
      panY += newMid.y - lastTouchMid.y;
      updateZoomLabel();
    }
    lastTouchDist = newDist;
    lastTouchMid = newMid;
    return;
  }
  if (e.touches.length === 1) {
    onMouseMove(touchToMouse(e.touches[0]));
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  lastTouchDist = 0;
  lastTouchMid = null;
  if (e.touches.length === 0) {
    onMouseUp(touchToMouse(e.changedTouches[0]));
  }
}

// ═══════════════════════════════════════════════════════
// ██  KEYBOARD EVENTS
// ═══════════════════════════════════════════════════════

function onKeyDown(e) {
  // Don't handle when spinner is open (except Escape)
  if (e.key === 'Escape') {
    if (isRotating) {
      // Cancel rotation — restore original points
      const s = shapes.find(s => s.id === rotateShapeId);
      if (s && s.points && rotateOriginalPoints) {
        for (let i = 0; i < s.points.length; i++) {
          s.points[i].x = rotateOriginalPoints[i].x;
          s.points[i].y = rotateOriginalPoints[i].y;
        }
        recalcShape(s);
      }
      if (s && s.type === 'circle' && rotateOriginalCenter) {
        s.center.x = rotateOriginalCenter.x;
        s.center.y = rotateOriginalCenter.y;
      }
      isRotating = false;
      rotateOriginalPoints = null;
      rotateOriginalCenter = null;
      canvasArea.style.cursor = '';
      updateCursor();
      return;
    }
    if (rotateAnchor) { rotateAnchor = null; rotateShapeId = null; return; }
    if (activeSpinner) { closeSpinner(); return; }
    if (buildPoints.length > 0 || rectDragStart || circleDragCenter || lineDragStart) {
      cancelBuilding(); return;
    }
    selectedIds.clear();
    updatePropsPanel();
    return;
  }

  if (activeSpinner) return; // block shortcuts while spinner open

  const ctrl = e.ctrlKey || e.metaKey;

  if (e.key === ' ') {
    e.preventDefault();
    if (!isSpaceDown) { isSpaceDown = true; updateCursor(); }
    return;
  }

  if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if (ctrl && e.key === 'z' && e.shiftKey) { e.preventDefault(); redo(); return; }
  if (ctrl && e.key === 'Z') { e.preventDefault(); redo(); return; }
  if (ctrl && e.key === 'a') { e.preventDefault(); shapes.forEach(s => selectedIds.add(s.id)); updatePropsPanel(); return; }
  if (ctrl && e.key === 'd') { e.preventDefault(); duplicateSelected(); return; }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedIds.size > 0) {
      shapes = shapes.filter(s => !selectedIds.has(s.id));
      selectedIds.clear();
      saveState();
      updatePropsPanel();
    }
    return;
  }

  if (e.key === 'Enter' && currentTool === 'polygon' && buildPoints.length >= 3) {
    finishPolygon(buildPoints);
    buildPoints = [];
    rubberPoint = null;
    return;
  }

  // Tool shortcuts
  if (ctrl) return; // don't intercept ctrl combos
  const keyMap = {v:'move',a:'vertex',h:'hand',z:'zoom',t:'triangle',r:'rect',p:'polygon',c:'circle',l:'line',f:'freehand',e:'eraser',m:'measure',x:'text'};
  const lower = e.key.toLowerCase();
  if (keyMap[lower]) { setTool(keyMap[lower]); return; }
  if (lower === 'g') { toggleGrid(); return; }
  if (lower === 's') { toggleSnap(); return; }
  if (e.key === '[') { changeStrokeWidth(-1); return; }
  if (e.key === ']') { changeStrokeWidth(1); return; }
  if (e.key === '=' || e.key === '+') { zoomAt(W/2, H/2, 1.2); return; }
  if (e.key === '-') { zoomAt(W/2, H/2, 1/1.2); return; }
  if (e.key === '0') { zoom = 1; panX = 0; panY = 0; updateZoomLabel(); return; }
}

function onKeyUp(e) {
  if (e.key === ' ') { isSpaceDown = false; isPanning = false; updateCursor(); }
}

function changeStrokeWidth(delta) {
  shapes.forEach(s => {
    if (selectedIds.has(s.id)) {
      s.strokeWidth = Math.max(1, Math.min(10, s.strokeWidth + delta));
    }
  });
  updatePropsPanel();
}
