<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만들어주세요! - 루나웨일 아트랩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f6f6f8;
            overflow: hidden; /* Corkboard is the scroll container */
        }
        .pixel-font {
            font-family: 'Galmuri11', 'Press Start 2P', monospace;
        }
        .corkboard {
            width: 100vw;
            height: 100vh;
            background: #d4a373; /* Fallback */
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0,0,0,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            position: relative;
            overflow: auto;
            padding: 100px;
            box-sizing: border-box;
        }
        .corkboard::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/cork-board.png');
            opacity: 0.3;
            pointer-events: none;
        }
        .post-it {
            width: 180px;
            min-height: 180px;
            padding: 20px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.15);
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom-right-radius: 40px 5px;
        }
        .post-it:hover {
            transform: scale(1.05) rotate(1deg);
            z-index: 10;
        }
        .post-it.dragging {
            opacity: 0.7;
            transform: scale(1.1);
            z-index: 100;
        }
        .avatar-preview {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
        .pin {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 4px 4px, #ff4d4d, #990000);
            border-radius: 50%;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.3);
        }
        
        /* Modal Styles */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Pixel Grid */
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 1px;
            background: #eee;
            border: 2px solid #333;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }
        .pixel-cell {
            background: white;
            cursor: crosshair;
        }
        .pixel-cell:hover {
            filter: brightness(0.9);
        }
        
        @media (max-width: 640px) {
            .corkboard { padding: 80px 20px 200px 20px; }
            .post-it { width: 140px; min-height: 140px; padding: 15px; }
            .post-it .avatar-preview { width: 30px; height: 30px; }
            .post-it p { font-size: 13px; }
            
            /* Responsive Archive Boxes */
            .archive-box.w-64 { width: 45%; height: 80px; }
            .archive-box span.material-symbols-outlined { font-size: 24px; }
            .archive-box span.font-black { font-size: 11px; }
            
            /* Smaller drawing grid */
            .pixel-grid { width: 240px; height: 240px; }
        }
    </style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body class="bg-[#f0e6d2]">

    <!-- Toolbar -->
    <div class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b flex items-center justify-between px-4 sm:px-6 z-50">
        <div class="flex items-center gap-2 sm:gap-4">
            <button onclick="window.location.href='../../index.html'" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors shrink-0">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="font-black text-lg sm:text-xl text-slate-800 tracking-tight truncate">만들어주세요!</h1>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-3 shrink-0">
            <button id="admin-toggle" class="px-3 sm:px-4 py-2 rounded-full bg-slate-100 text-slate-600 text-xs sm:text-sm font-bold hover:bg-slate-200 transition-all flex items-center gap-1 sm:gap-2">
                <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
                <span class="hidden sm:inline">관리자 모드</span>
            </button>
            <button onclick="openPostModal()" class="px-4 sm:px-6 py-2.5 rounded-full bg-[#1337ec] text-white font-black hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/25 flex items-center gap-1 sm:gap-2">
                <span class="material-symbols-outlined text-sm sm:text-base">add_circle</span>
                <span class="hidden sm:inline">새 요청</span>
            </button>
        </div>
    </div>

    <!-- Corkboard -->
    <div id="board" class="corkboard pt-24 pb-40">
        <!-- Post-its will be dynamically added here -->
    </div>

    <!-- Archive Boxes (Locked to bottom) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 sm:p-6 flex justify-center gap-4 sm:gap-8 pointer-events-none">
        <div id="solved-box" class="archive-box w-64 h-32 bg-green-100/80 border-4 border-dashed border-green-400 rounded-3xl flex flex-col items-center justify-center gap-2 pointer-events-auto transition-transform hover:scale-105">
            <span class="material-symbols-outlined text-green-500 text-3xl">check_circle</span>
            <span class="font-black text-green-700">해결 완료</span>
        </div>
        <div id="rejected-box" class="archive-box w-64 h-32 bg-red-100/80 border-4 border-dashed border-red-400 rounded-3xl flex flex-col items-center justify-center gap-2 pointer-events-auto transition-transform hover:scale-105">
            <span class="material-symbols-outlined text-red-500 text-3xl">cancel</span>
            <span class="font-black text-red-700">이건 못해요</span>
        </div>
    </div>

    <!-- Post Creation Modal -->
    <div id="post-modal" class="modal-backdrop">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6 flex items-center gap-3">
                <span class="material-symbols-outlined text-blue-600">edit_note</span>
                게시글 작성
            </h2>
            
            <div class="space-y-6">
                <!-- Avatar Preview & Button -->
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl">
                    <canvas id="final-avatar-preview" width="40" height="40" class="avatar-preview"></canvas>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-slate-700">도트 아바타</p>
                        <p class="text-xs text-slate-400">자신만의 아이콘을 그려보세요</p>
                    </div>
                    <button onclick="openAvatarModal()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 rounded-xl text-xs font-black transition-colors">그리기</button>
                </div>

                <!-- Text Input -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">요청 내용</label>
                    <textarea id="post-text" placeholder="루나웨일에서 보고 싶은 기능이나 그림을 알려주세요!" class="w-full h-32 p-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all resize-none"></textarea>
                </div>

                <!-- Color Selection -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">포스트잇 색상</label>
                    <div class="flex gap-3">
                        <div onclick="selectPostitColor('#fff5a0')" class="w-10 h-10 rounded-full cursor-pointer border-2 border-transparent transition-all" style="background:#fff5a0"></div>
                        <div onclick="selectPostitColor('#a0f5ff')" class="w-10 h-10 rounded-full cursor-pointer border-2 border-transparent transition-all" style="background:#a0f5ff"></div>
                        <div onclick="selectPostitColor('#ffa0f5')" class="w-10 h-10 rounded-full cursor-pointer border-2 border-transparent transition-all" style="background:#ffa0f5"></div>
                        <div onclick="selectPostitColor('#a0ffa0')" class="w-10 h-10 rounded-full cursor-pointer border-2 border-transparent transition-all" style="background:#a0ffa0"></div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closePostModal()" class="flex-1 py-4 rounded-2xl text-slate-500 font-bold hover:bg-slate-50 transition-colors">취소</button>
                    <button onclick="submitPost()" class="flex-1 py-4 bg-[#1337ec] text-white rounded-2xl font-black shadow-lg shadow-blue-500/20 hover:scale-[1.02] active:scale-95 transition-all">부착하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Avatar Drawing Modal -->
    <div id="avatar-modal" class="modal-backdrop">
        <div class="modal-content !max-w-[400px]">
            <h2 class="text-xl font-black mb-4">도트 아바타 만들기</h2>
            <div id="pixel-grid" class="pixel-grid mb-4"></div>
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2">
                    <div onclick="setDrawColor('#000000')" class="w-8 h-8 rounded-md cursor-pointer border-2 border-slate-200" style="background:#000000"></div>
                    <div onclick="setDrawColor('#ffffff')" class="w-8 h-8 rounded-md cursor-pointer border-2 border-slate-200" style="background:#ffffff"></div>
                    <div onclick="setDrawColor('#ff0000')" class="w-8 h-8 rounded-md cursor-pointer border-2 border-slate-200" style="background:#ff0000"></div>
                    <div onclick="setDrawColor('#0000ff')" class="w-8 h-8 rounded-md cursor-pointer border-2 border-slate-200" style="background:#0000ff"></div>
                    <div onclick="setDrawColor('transparent')" class="w-8 h-8 rounded-md cursor-pointer border-2 border-slate-200 bg-white flex items-center justify-center">
                        <span class="material-symbols-outlined text-slate-300 text-sm">block</span>
                    </div>
                </div>
                <input type="color" onchange="setDrawColor(this.value)" class="w-8 h-8 cursor-pointer">
            </div>

            <div class="flex gap-2">
                <button onclick="clearGrid()" class="flex-1 py-3 text-slate-400 text-sm font-bold">전체 삭제</button>
                <button onclick="saveAvatar()" class="flex-[2] py-3 bg-slate-900 text-white rounded-xl font-black">저장 완료</button>
            </div>
        </div>
    </div>

    <!-- Archive View Modal -->
    <div id="archive-modal" class="modal-backdrop">
        <div class="modal-content !max-w-[600px] h-[80vh] flex flex-col">
            <h2 id="archive-title" class="text-2xl font-black mb-6 flex items-center gap-3">
                <span class="material-symbols-outlined text-slate-600">inventory_2</span>
                보관함
            </h2>
            <div id="archive-list" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar">
                <!-- Archived items will be listed here -->
            </div>
            <button onclick="closeArchiveModal()" class="mt-6 w-full py-4 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 transition-colors">닫기</button>
        </div>
    </div>

    <script>
        // --- State ---
        let posts = [];
        let isAdmin = false;
        let currentDrawColor = '#000000';
        let selectedPostitColor = '#fff5a0';
        let tempAvatarData = Array(64).fill('transparent');

        // Wait for Firebase to init
        const checkAuthInterval = setInterval(() => {
            if (window.firebase && window.LunaAuth && LunaAuth.getDb) {
                clearInterval(checkAuthInterval);
                initFirebasePosts();
            }
        }, 100);

        function initFirebasePosts() {
            const db = LunaAuth.getDb();
            db.collection('make_it_posts').onSnapshot((snapshot) => {
                posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                renderPosts();
            });
            
            LunaAuth.onAuthChange((user, profile) => {
                if (profile && profile.role === 'admin') {
                    // Allowed to toggle admin
                } else {
                    isAdmin = false;
                    document.getElementById('admin-toggle').style.display = 'none';
                    renderPosts();
                }
            });
        }

        // --- Core Functions ---
        function init() {
            initAvatarGrid();
            
            document.getElementById('admin-toggle').addEventListener('click', () => {
                const currentUser = LunaAuth.getCurrentUser();
                const currentRole = localStorage.getItem('lw_role');
                if (currentRole !== 'admin') {
                    alert('관리자만 사용할 수 있습니다.');
                    return;
                }
                isAdmin = !isAdmin;
                document.getElementById('admin-toggle').classList.toggle('bg-blue-600', isAdmin);
                document.getElementById('admin-toggle').classList.toggle('text-white', isAdmin);
                renderPosts();
            });

            // Archive box clicks
            document.getElementById('solved-box').onclick = () => openArchiveModal('solved');
            document.getElementById('rejected-box').onclick = () => openArchiveModal('rejected');
        }

        function renderPosts() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            posts.filter(p => !p.archived).forEach(post => {
                const el = document.createElement('div');
                el.className = 'post-it';
                el.style.backgroundColor = post.color;
                el.style.left = post.x + 'px';
                el.style.top = post.y + 'px';
                el.style.transform = `rotate(${post.rotate}deg)`;
                
                el.innerHTML = `
                    <div class="pin"></div>
                    <canvas width="40" height="40" class="avatar-preview"></canvas>
                    <p class="text-sm font-medium text-slate-800 leading-snug break-words">${post.text}</p>
                `;
                
                const canvas = el.querySelector('canvas');
                drawAvatarToCanvas(canvas, post.avatarData);
                
                if (isAdmin) {
                    el.draggable = true;
                    el.addEventListener('dragstart', (e) => handleDragStart(e, post));
                    el.addEventListener('dragend', (e) => handleDragEnd(e, post));
                }
                
                board.appendChild(el);
            });
        }

        // --- Avatar Logic ---
        function initAvatarGrid() {
            const grid = document.getElementById('pixel-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'pixel-cell';
                cell.onclick = () => {
                    tempAvatarData[i] = currentDrawColor;
                    cell.style.backgroundColor = currentDrawColor === 'transparent' ? 'white' : currentDrawColor;
                    updateAvatarPreview('final-avatar-preview', tempAvatarData);
                };
                grid.appendChild(cell);
            }
        }

        function setDrawColor(color) {
            currentDrawColor = color;
        }

        function clearGrid() {
            tempAvatarData.fill('transparent');
            document.querySelectorAll('.pixel-cell').forEach(c => c.style.backgroundColor = 'white');
            updateAvatarPreview('final-avatar-preview', tempAvatarData);
        }

        function updateAvatarPreview(canvasId, data) {
            const canvas = document.getElementById(canvasId);
            drawAvatarToCanvas(canvas, data);
        }

        function drawAvatarToCanvas(canvas, data) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 40, 40);
            const size = 5;
            data.forEach((color, i) => {
                if (color !== 'transparent') {
                    ctx.fillStyle = color;
                    ctx.fillRect((i % 8) * size, Math.floor(i / 8) * size, size, size);
                }
            });
        }

        // --- UI Logic ---
        function openPostModal() { document.getElementById('post-modal').style.display = 'flex'; }
        function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }
        function openAvatarModal() { document.getElementById('avatar-modal').style.display = 'flex'; }
        function saveAvatar() { document.getElementById('avatar-modal').style.display = 'none'; }
        
        function openArchiveModal(status) {
            const modal = document.getElementById('archive-modal');
            const list = document.getElementById('archive-list');
            const title = document.getElementById('archive-title');
            
            title.innerText = status === 'solved' ? '해결 완료 박스' : '이건 못해요 박스';
            list.innerHTML = '';
            
            const filtered = posts.filter(p => p.archived && p.status === status);
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400">비어 있습니다.</div>`;
            } else {
                filtered.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'flex items-start gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100';
                    item.innerHTML = `
                        <canvas width="40" height="40" class="avatar-preview shrink-0"></canvas>
                        <div class="flex-1">
                            <p class="text-sm text-slate-800">${post.text}</p>
                            <p class="text-[10px] text-slate-400 mt-2">${new Date(post.id).toLocaleString()}</p>
                        </div>
                    `;
                    const canvas = item.querySelector('canvas');
                    drawAvatarToCanvas(canvas, post.avatarData);
                    list.appendChild(item);
                });
            }
            
            modal.style.display = 'flex';
        }

        function closeArchiveModal() { document.getElementById('archive-modal').style.display = 'none'; }

        function selectPostitColor(color) { 
            selectedPostitColor = color; 
            document.querySelectorAll('#post-modal div[style*="background"]').forEach(el => {
                el.style.borderColor = el.style.backgroundColor === color ? '#000' : 'transparent';
            });
        }

        function submitPost() {
            const text = document.getElementById('post-text').value;
            if (!text.trim()) return alert('내용을 입력해주세요!');
            
            const newPost = {
                id: Date.now().toString(),
                text: text,
                color: selectedPostitColor,
                avatarData: [...tempAvatarData],
                x: 100 + Math.random() * (Math.max(window.innerWidth - 300, 50)),
                y: 100 + Math.random() * (Math.max(window.innerHeight - 300, 50)),
                rotate: (Math.random() - 0.5) * 10,
                archived: false,
                status: 'active',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (window.LunaAuth && LunaAuth.getDb) {
                LunaAuth.getDb().collection('make_it_posts').doc(newPost.id).set(newPost);
            }
            
            closePostModal();
            
            // Reset fields
            document.getElementById('post-text').value = '';
            clearGrid();
        }

        // --- Admin & DnD Logic ---
        let draggedPost = null;
        function handleDragStart(e, post) {
            draggedPost = post;
            e.target.classList.add('dragging');
        }

        function handleDragEnd(e, post) {
            e.target.classList.remove('dragging');
            const x = e.clientX - 90;
            const y = e.clientY - 90;
            
            // Check archive zones
            const solved = document.getElementById('solved-box').getBoundingClientRect();
            const rejected = document.getElementById('rejected-box').getBoundingClientRect();
            
            let updateData = { x, y };
            
            if (isInRect(e.clientX, e.clientY, solved)) {
                updateData = { archived: true, status: 'solved' };
            } else if (isInRect(e.clientX, e.clientY, rejected)) {
                updateData = { archived: true, status: 'rejected' };
            }
            
            if (window.LunaAuth && LunaAuth.getDb) {
                LunaAuth.getDb().collection('make_it_posts').doc(post.id).update(updateData);
            }
        }

        function isInRect(x, y, rect) {
            return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
        }

        // --- Init ---
        init();
    </script>
</body>
</html>
