<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>화학 몬스터 🥚 Chem Monster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<script src="chem-monster-data.js"></script>
<script src="../../assets/js/luna-nav.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--bg2:#0e0e24;--bg3:#141430;
  --neon:#39ff14;--neon2:#00ff88;--cyan:#06b6d4;
  --text:#e0e0e0;--text2:#999;--border:rgba(57,255,20,.15);
  --gold:#ffd700;--red:#ff4444;--green:#10b981;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Jua',sans-serif}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ── 배경 ── */
.cyber-bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,#050510 0%,#0a0a1a 40%,#0e1525 100%)}
.cyber-bg::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(57,255,20,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,.03) 1px,transparent 1px);
  background-size:40px 40px}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}

/* ── 상단바 ── */
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:rgba(10,10,26,.95);border-bottom:1px solid var(--border);min-height:48px;flex-shrink:0}
.top-bar .back-btn{color:var(--neon);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:4px}
.top-bar .title{font-size:16px;color:var(--neon);text-shadow:0 0 8px rgba(57,255,20,.5)}
.top-bar .coin-badge{display:flex;align-items:center;gap:4px;background:rgba(255,215,0,.15);padding:4px 10px;border-radius:20px;font-size:13px;color:var(--gold)}
.top-bar .coin-badge .coin-icon{font-size:16px}

/* ── 슬롯 탭 ── */
.slot-tabs{position:relative;z-index:10;display:flex;gap:6px;justify-content:center;padding:6px 12px;flex-shrink:0}
.slot-tab{flex:1;max-width:120px;padding:6px 0;border-radius:8px;border:1px solid var(--border);background:rgba(20,20,48,.6);color:var(--text2);font-size:12px;cursor:pointer;text-align:center;transition:.2s}
.slot-tab.active{border-color:var(--neon);color:var(--neon);background:rgba(57,255,20,.08);box-shadow:0 0 8px rgba(57,255,20,.2)}
.slot-tab.empty{opacity:.4;border-style:dashed}

/* ── 몬스터 뷰포트 ── */
.viewport{position:relative;z-index:5;flex-shrink:0;display:flex;justify-content:center;padding:8px}
.monster-frame{position:relative;width:260px;height:260px;border:2px solid var(--border);border-radius:16px;
  background:radial-gradient(circle at 50% 60%,rgba(20,20,48,.8),rgba(10,10,26,.95));overflow:hidden}
.monster-frame canvas{width:100%;height:100%}
.monster-frame .stage-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--neon);background:rgba(0,0,0,.6);padding:2px 10px;border-radius:10px;white-space:nowrap}
.monster-frame .name-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  font-size:12px;color:var(--text);background:rgba(0,0,0,.7);padding:2px 10px;border-radius:10px;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-counter{position:absolute;top:6px;right:8px;font-size:10px;color:var(--text2)}
.petrified-overlay{position:absolute;inset:0;background:rgba(100,100,100,.6);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:2;border-radius:14px}
.petrified-overlay.show{display:flex}
.petrified-overlay span{font-size:40px}
.petrified-overlay p{color:#ccc;font-size:12px;margin-top:4px}

/* ── 스탯바 ── */
.stats{position:relative;z-index:5;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;padding:4px 16px;flex-shrink:0}
.stat-row{display:flex;align-items:center;gap:6px}
.stat-row .stat-icon{font-size:14px;width:18px;text-align:center}
.stat-row .stat-name{font-size:10px;color:var(--text2);width:32px}
.stat-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden;position:relative}
.stat-bar{height:100%;border-radius:5px;transition:width .5s ease}
.stat-bar.hunger{background:linear-gradient(90deg,#ff6b35,#ff4444)}
.stat-bar.happiness{background:linear-gradient(90deg,#ff69b4,#ff1493)}
.stat-bar.energy{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.stat-bar.cleanliness{background:linear-gradient(90deg,#06b6d4,#0891b2)}
.stat-val{font-size:9px;color:var(--text2);width:22px;text-align:right}

/* ── 액션 버튼 ── */
.actions{position:relative;z-index:5;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:6px 12px;flex-shrink:0}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:10px;
  border:1px solid var(--border);background:rgba(20,20,48,.6);cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.act-btn:active{transform:scale(.92);background:rgba(57,255,20,.1)}
.act-btn .act-icon{font-size:20px}
.act-btn .act-icon-img{display:none}
.act-btn .act-label{font-size:9px;color:var(--text2)}
.act-btn.disabled{opacity:.3;pointer-events:none}

/* ── 하단 탭 패널 ── */
.bottom-panel{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid var(--border)}
.panel-tabs{display:flex;flex-shrink:0}
.panel-tab{flex:1;padding:8px 0;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.panel-tab.active{color:var(--neon);border-bottom-color:var(--neon)}
.panel-content{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}

/* ── 상점 ── */
.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mineral-card{display:flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:8px;
  border:1px solid var(--border);background:rgba(20,20,48,.5);cursor:pointer;transition:.2s;position:relative}
.mineral-card:active{transform:scale(.95)}
.mineral-card .mineral-dot{width:28px;height:28px;border-radius:50%;margin-bottom:2px;border:2px solid rgba(255,255,255,.1)}
.mineral-card .mineral-name{font-size:9px;color:var(--text);text-align:center;line-height:1.2}
.mineral-card .mineral-cost{font-size:9px;color:var(--gold);margin-top:2px}
.mineral-card .mineral-formula{font-size:7px;color:var(--text2);margin-top:1px}
.mineral-card.uncommon{border-color:rgba(6,182,212,.3)}
.mineral-card.rare{border-color:rgba(252,211,77,.4);box-shadow:0 0 6px rgba(252,211,77,.15)}
.element-header{grid-column:1/-1;font-size:11px;color:var(--text2);padding:4px 0 2px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px}

/* ── 인벤토리 ── */
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.inv-item{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:8px;
  border:1px solid var(--border);background:rgba(20,20,48,.5);cursor:pointer;transition:.2s}
.inv-item:active{transform:scale(.95)}
.inv-item .inv-dot{width:24px;height:24px;border-radius:50%;margin-bottom:2px}
.inv-item .inv-name{font-size:8px;color:var(--text2);text-align:center}
.inv-item .inv-count{font-size:11px;color:var(--neon);font-weight:bold}
.inv-empty{grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text2);font-size:13px}

/* ── 진화트리 ── */
.evo-tree{padding:8px 0}
.evo-stage{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.evo-stage .evo-marker{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.evo-stage .evo-marker.current{border-color:var(--neon);box-shadow:0 0 10px rgba(57,255,20,.3)}
.evo-stage .evo-marker.completed{border-color:var(--green);background:rgba(16,185,129,.15)}
.evo-stage .evo-info{flex:1}
.evo-stage .evo-title{font-size:12px;color:var(--text)}
.evo-stage .evo-desc{font-size:10px;color:var(--text2)}
.evo-connector{width:2px;height:16px;background:var(--border);margin-left:17px}

/* ── 주의 호출 팝업 ── */
.attention-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;
  background:var(--bg2);border:2px solid var(--neon);border-radius:16px;padding:24px;text-align:center;
  box-shadow:0 0 30px rgba(57,255,20,.3);display:none;max-width:300px;width:90%}
.attention-popup.show{display:block;animation:popIn .3s ease}
.attention-popup h3{color:var(--neon);font-size:16px;margin-bottom:8px}
.attention-popup p{color:var(--text);font-size:13px;margin-bottom:16px}
.attention-popup .att-btn{padding:10px 24px;border-radius:10px;border:none;background:var(--neon);color:var(--bg);font-family:inherit;font-size:14px;cursor:pointer}
.attention-popup .att-timer{color:var(--text2);font-size:11px;margin-top:8px}

/* ── 진화 연출 ── */
.evo-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column}
.evo-overlay.show{display:flex;animation:fadeIn .5s}
.evo-overlay canvas{width:280px;height:280px}
.evo-overlay .evo-text{color:var(--neon);font-size:20px;margin-top:16px;text-shadow:0 0 20px rgba(57,255,20,.8)}
.evo-overlay .evo-name{color:var(--text);font-size:14px;margin-top:8px}
.evo-overlay .evo-close{margin-top:20px;padding:10px 30px;border-radius:10px;border:1px solid var(--neon);background:transparent;color:var(--neon);font-family:inherit;font-size:14px;cursor:pointer}

/* ── 토스트 ── */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:300;
  background:rgba(57,255,20,.15);border:1px solid var(--neon);color:var(--neon);
  padding:8px 20px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* ── 디버그 패널 ── */
.debug-panel{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(0,0,0,.95);
  border-top:1px solid var(--neon);padding:8px;display:none;max-height:40vh;overflow-y:auto}
.debug-panel.show{display:block}
.debug-panel button{padding:4px 8px;margin:2px;border-radius:4px;border:1px solid var(--neon);
  background:transparent;color:var(--neon);font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.debug-panel button:active{background:rgba(57,255,20,.2)}
.debug-panel .debug-info{font-size:9px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:4px;white-space:pre-wrap}

/* ── 온보딩/인트로 ── */
.intro-screen{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.intro-screen h1{color:var(--neon);font-size:24px;text-shadow:0 0 20px rgba(57,255,20,.5)}
.intro-screen p{color:var(--text);font-size:14px;text-align:center;max-width:300px;line-height:1.6}
.intro-screen .start-btn{padding:14px 40px;border-radius:12px;border:2px solid var(--neon);
  background:rgba(57,255,20,.1);color:var(--neon);font-family:inherit;font-size:16px;cursor:pointer;
  box-shadow:0 0 20px rgba(57,255,20,.2);transition:.2s}
.intro-screen .start-btn:active{transform:scale(.95);background:rgba(57,255,20,.2)}

/* ── 몬스터 상세 모달 ── */
.detail-modal{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
.detail-modal.show{display:flex}
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:340px;width:90%;text-align:center}
.detail-card canvas{width:180px;height:180px;margin:0 auto 12px}
.detail-card h3{color:var(--neon);font-size:16px}
.detail-card .detail-element{font-size:12px;color:var(--text2);margin:4px 0}
.detail-card .detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:12px 0;text-align:left}
.detail-card .detail-stat{font-size:11px;color:var(--text)}
.detail-card .close-btn{padding:8px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:inherit;cursor:pointer;margin-top:8px}

@keyframes popIn{from{transform:translate(-50%,-50%) scale(.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── 반응형 ── */
@media(max-width:380px){
  .monster-frame{width:220px;height:220px}
  .shop-grid{grid-template-columns:repeat(3,1fr)}
  .actions{grid-template-columns:repeat(3,1fr)}
  .act-btn .act-icon{font-size:18px}
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="scanlines"></div>

<!-- 인트로 -->
<div class="intro-screen" id="introScreen">
  <div style="font-size:60px;animation:float 2s infinite">🥚</div>
  <h1>화학 몬스터</h1>
  <p>신비한 알에서 태어난 화학 몬스터를 광물로 키워보세요!<br>먹이는 광물에 따라 400가지 진화가 가능합니다.</p>
  <button class="start-btn" onclick="startGame()">🧪 시작하기</button>
</div>

<div class="app" id="gameApp" style="display:none">
  <!-- 상단바 -->
  <div class="top-bar">
    <a href="index.html" class="back-btn"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span></a>
    <div class="title">🥚 화학 몬스터</div>
    <div class="coin-badge"><span class="coin-icon">🪙</span><span id="coinDisplay">0</span></div>
  </div>

  <!-- 슬롯 탭 -->
  <div class="slot-tabs" id="slotTabs"></div>

  <!-- 몬스터 뷰포트 -->
  <div class="viewport">
    <div class="monster-frame" id="monsterFrame">
      <canvas id="monsterCanvas" width="520" height="520"></canvas>
      <div class="stage-label" id="stageLabel">🥚 알</div>
      <div class="name-label" id="nameLabel"></div>
      <div class="day-counter" id="dayCounter"></div>
      <div class="petrified-overlay" id="petrifiedOverlay">
        <span>🪨</span>
        <p>석화됨 — 광물을 먹여 깨워주세요!</p>
      </div>
    </div>
  </div>

  <!-- 스탯 -->
  <div class="stats" id="statsArea">
    <div class="stat-row"><span class="stat-icon">🍖</span><span class="stat-name">배고픔</span><div class="stat-bar-bg"><div class="stat-bar hunger" id="barHunger" style="width:50%"></div></div><span class="stat-val" id="valHunger">50</span></div>
    <div class="stat-row"><span class="stat-icon">💕</span><span class="stat-name">행복</span><div class="stat-bar-bg"><div class="stat-bar happiness" id="barHappy" style="width:50%"></div></div><span class="stat-val" id="valHappy">50</span></div>
    <div class="stat-row"><span class="stat-icon">⚡</span><span class="stat-name">에너지</span><div class="stat-bar-bg"><div class="stat-bar energy" id="barEnergy" style="width:50%"></div></div><span class="stat-val" id="valEnergy">50</span></div>
    <div class="stat-row"><span class="stat-icon">🫧</span><span class="stat-name">청결</span><div class="stat-bar-bg"><div class="stat-bar cleanliness" id="barClean" style="width:50%"></div></div><span class="stat-val" id="valClean">50</span></div>
  </div>

  <!-- 액션 버튼 -->
  <div class="actions" id="actionsArea">
    <div class="act-btn" onclick="doFeed()"><span class="act-icon">🍽️</span><span class="act-label">먹이기</span></div>
    <div class="act-btn" onclick="doPlay()"><span class="act-icon">🎮</span><span class="act-label">놀기</span></div>
    <div class="act-btn" onclick="doBath()"><span class="act-icon">🛁</span><span class="act-label">목욕</span></div>
    <div class="act-btn" onclick="doSleep()"><span class="act-icon">😴</span><span class="act-label">잠</span></div>
    <div class="act-btn" onclick="doTrain()"><span class="act-icon">💪</span><span class="act-label">훈련</span></div>
    <div class="act-btn" onclick="showDex()"><span class="act-icon">📖</span><span class="act-label">도감</span></div>
  </div>

  <!-- 하단 패널 -->
  <div class="bottom-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="shop" onclick="switchTab('shop')">🏪 상점</div>
      <div class="panel-tab" data-tab="inventory" onclick="switchTab('inventory')">🎒 인벤토리</div>
      <div class="panel-tab" data-tab="evotree" onclick="switchTab('evotree')">🧬 진화트리</div>
    </div>
    <div class="panel-content" id="panelContent"></div>
  </div>
</div>

<!-- 주의 호출 팝업 -->
<div class="attention-popup" id="attentionPopup">
  <h3>❗ 몬스터가 부르고 있어요!</h3>
  <p id="attentionMsg">관심이 필요해요!</p>
  <button class="att-btn" onclick="respondAttention()">돌봐주기 💚</button>
  <div class="att-timer" id="attTimer"></div>
</div>

<!-- 진화 연출 -->
<div class="evo-overlay" id="evoOverlay">
  <canvas id="evoCanvas" width="560" height="560"></canvas>
  <div class="evo-text" id="evoText">진화 중...</div>
  <div class="evo-name" id="evoName"></div>
  <button class="evo-close" onclick="closeEvoOverlay()">확인</button>
</div>

<!-- 도감 모달 -->
<div class="detail-modal" id="detailModal">
  <div class="detail-card" id="detailCard">
    <canvas id="detailCanvas" width="360" height="360"></canvas>
    <h3 id="detailName"></h3>
    <div class="detail-element" id="detailElement"></div>
    <div class="detail-stats" id="detailStats"></div>
    <button class="close-btn" onclick="closeDetail()">닫기</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 디버그 -->
<div class="debug-panel" id="debugPanel">
  <div style="display:flex;flex-wrap:wrap;gap:2px">
    <button onclick="debugEvolve()">즉시 진화</button>
    <button onclick="debugFillStats()">스탯 MAX</button>
    <button onclick="debugDrainStats()">스탯 0</button>
    <button onclick="debugAddCoins()">+100 코인</button>
    <button onclick="debugAddAllMinerals()">모든 광물 +10</button>
    <button onclick="debugToggle()">닫기</button>
  </div>
  <div class="debug-info" id="debugInfo"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   화학 몬스터 다마고치 — 메인 게임 로직
   ═══════════════════════════════════════════ */

const D = window.CHEM_DATA;
const CFG = D.EVOLUTION_CONFIG;

/* ── 상태 ── */
let save = null;
let lang = localStorage.getItem('chem-monster-lang') || 'ko';
let currentTab = 'shop';
let animFrame = null;
let animTime = 0;
let attentionTimeout = null;
let isSleeping = false;

/* ── 세이브/로드 ── */
function defaultSave() {
  return {
    version: 1,
    activeSlot: 0,
    slots: [null, null, null],
    storage: [],
    inventory: {},
    dex: {},
    achievements: [],
    settings: { lang: 'ko', soundOn: true, debugMode: false },
    stats: { totalFeeds: 0, hatchCount: 0, evolutionCount: 0, finalCount: 0, petrifyRevived: 0, mythicCount: 0 }
  };
}

function loadSave() {
  try {
    const raw = localStorage.getItem('chem-monster-save');
    if (raw) { save = JSON.parse(raw); return; }
  } catch(e) {}
  save = defaultSave();
}

function writeSave() {
  localStorage.setItem('chem-monster-save', JSON.stringify(save));
}

function getActiveMonster() {
  const slot = save.slots[save.activeSlot];
  return slot ? slot.monster : null;
}

function setActiveMonster(m) {
  if (!save.slots[save.activeSlot]) save.slots[save.activeSlot] = { monster: null };
  save.slots[save.activeSlot].monster = m;
}

/* ── 코인 ── */
function getCoins() {
  return parseInt(localStorage.getItem('luna_coins') || '0', 10);
}
function setCoins(n) {
  localStorage.setItem('luna_coins', String(Math.max(0, n)));
  updateCoinDisplay();
}
function updateCoinDisplay() {
  document.getElementById('coinDisplay').textContent = getCoins();
}

/* ── 게임 시작 ── */
function startGame() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('gameApp').style.display = 'flex';
  loadSave();
  if (!getActiveMonster()) {
    // 첫 게임: 새 알 생성
    createNewEgg(save.activeSlot);
  }
  updateCoinDisplay();
  renderSlotTabs();
  updateUI();
  switchTab('shop');
  startGameLoop();
}

function createNewEgg(slotIndex) {
  const m = {
    stage: 'egg',
    element: null,
    subType: null,
    temperament: null,
    specialization: null,
    birthTime: Date.now(),
    petrifyCount: 0,
    totalFeeds: 0,
    feedHistory: [],
    elementCounts: {},
    stats: { hunger: 50, happiness: 50, energy: 50, cleanliness: 50 },
    discipline: { callsTotal: 0, callsAnswered: 0 },
    gameDaysOld: 0,
    lastUpdate: Date.now(),
    feedsToday: 0,
    currentDayStart: Date.now(),
    sleeping: false
  };
  D.ELEMENT_IDS.forEach(el => m.elementCounts[el] = 0);
  if (!save.slots[slotIndex]) save.slots[slotIndex] = {};
  save.slots[slotIndex].monster = m;
  writeSave();
}

/* ── 슬롯 UI ── */
function renderSlotTabs() {
  const el = document.getElementById('slotTabs');
  let html = '';
  for (let i = 0; i < CFG.MAX_SLOTS; i++) {
    const slot = save.slots[i];
    const mon = slot ? slot.monster : null;
    const active = i === save.activeSlot;
    const empty = !mon;
    let label = '빈 슬롯';
    if (mon) {
      if (mon.stage === 'egg') label = '🥚 알';
      else if (mon.stage === 'petrified') label = '🪨 석화';
      else {
        const elem = D.ELEMENTS[mon.element];
        label = elem ? elem.emoji + ' ' + (lang==='ko' ? elem.nameKr : elem.nameEn) : mon.stage;
      }
    }
    html += `<div class="slot-tab ${active?'active':''} ${empty?'empty':''}" onclick="switchSlot(${i})">${empty ? `<span style="font-size:16px">+</span>` : label}</div>`;
  }
  el.innerHTML = html;
}

function switchSlot(i) {
  if (!save.slots[i] || !save.slots[i].monster) {
    // 새 알 생성
    createNewEgg(i);
    toast('새로운 알이 나타났어요! 🥚');
  }
  save.activeSlot = i;
  writeSave();
  renderSlotTabs();
  updateUI();
}

/* ── 탭 전환 ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderPanel();
}

/* ── 상점 렌더링 ── */
function renderShop() {
  const pc = document.getElementById('panelContent');
  let html = '';
  let lastElement = '';
  for (const mineral of D.MINERALS) {
    if (mineral.element !== lastElement) {
      const el = D.ELEMENTS[mineral.element];
      html += `<div class="element-header">${el.emoji} ${lang==='ko'?el.nameKr:el.nameEn}</div>`;
      lastElement = mineral.element;
    }
    const cls = mineral.rarity === 'rare' ? 'rare' : mineral.rarity === 'uncommon' ? 'uncommon' : '';
    html += `<div class="mineral-card ${cls}" onclick="buyMineral('${mineral.id}')">
      <div class="mineral-dot" style="background:${mineral.color};box-shadow:0 0 6px ${mineral.color}44"></div>
      <div class="mineral-name">${lang==='ko'?mineral.nameKr:mineral.nameEn}</div>
      <div class="mineral-formula">${mineral.formula}</div>
      <div class="mineral-cost">${mineral.cost}🪙</div>
    </div>`;
  }
  pc.innerHTML = `<div class="shop-grid">${html}</div>`;
}

/* ── 인벤토리 렌더링 ── */
function renderInventory() {
  const pc = document.getElementById('panelContent');
  const items = Object.entries(save.inventory).filter(([_,c]) => c > 0);
  if (items.length === 0) {
    pc.innerHTML = '<div class="inv-empty">인벤토리가 비어있어요<br>상점에서 광물을 구매하세요! 🏪</div>';
    return;
  }
  let html = '';
  for (const [id, count] of items) {
    const m = D.MINERAL_MAP[id];
    if (!m) continue;
    html += `<div class="inv-item" onclick="feedMineral('${id}')">
      <div class="inv-dot" style="background:${m.color};box-shadow:0 0 4px ${m.color}66"></div>
      <div class="inv-count">×${count}</div>
      <div class="inv-name">${lang==='ko'?m.nameKr:m.nameEn}</div>
    </div>`;
  }
  pc.innerHTML = `<div class="inv-grid">${html}</div>`;
}

/* ── 진화트리 렌더링 ── */
function renderEvoTree() {
  const pc = document.getElementById('panelContent');
  const mon = getActiveMonster();
  if (!mon) { pc.innerHTML = '<p style="text-align:center;color:var(--text2)">몬스터가 없어요</p>'; return; }

  const stages = [
    { stage:'egg', icon:'🥚', name:'알', desc:'광물을 먹여 부화시키세요' },
    { stage:'hatchling', icon:'🐣', name:'해츨링', desc:'원소 타입이 결정됩니다' },
    { stage:'juvenile', icon:'🧬', name:'유년체', desc:'순수/하이브리드 분기' },
    { stage:'adult', icon:'⚔️', name:'성체', desc:'기질 분기: 단련형 vs 야생형' },
    { stage:'final', icon:'👑', name:'최종형', desc:'5가지 특화 중 하나로 완성!' }
  ];
  const stageOrder = ['egg','hatchling','juvenile','adult','final'];
  const currentIdx = stageOrder.indexOf(mon.stage === 'petrified' ? (mon.lastStage||'egg') : mon.stage);

  let html = '<div class="evo-tree">';
  stages.forEach((s, i) => {
    const isCurrent = i === currentIdx;
    const isCompleted = i < currentIdx;
    html += `<div class="evo-stage">
      <div class="evo-marker ${isCurrent?'current':''} ${isCompleted?'completed':''}">${s.icon}</div>
      <div class="evo-info">
        <div class="evo-title">${s.name} ${isCompleted?'✅':isCurrent?'◀ 현재':''}</div>
        <div class="evo-desc">${s.desc}</div>
      </div>
    </div>`;
    if (i < stages.length - 1) html += '<div class="evo-connector"></div>';
  });

  // 현재 진화 정보
  if (mon.element) {
    const el = D.ELEMENTS[mon.element];
    html += `<div style="margin-top:12px;padding:8px;border:1px solid ${el.color}33;border-radius:8px;background:rgba(0,0,0,.3)">`;
    html += `<div style="font-size:12px;color:${el.color}">${el.emoji} ${lang==='ko'?el.nameKr:el.nameEn} 타입</div>`;
    if (mon.subType !== null) {
      const juv = D.JUVENILES[mon.element][mon.subType];
      html += `<div style="font-size:11px;color:var(--text2);margin-top:2px">${lang==='ko'?juv.nameKr:juv.nameEn}</div>`;
    }
    if (mon.temperament) {
      const t = D.TEMPERAMENTS[mon.temperament];
      html += `<div style="font-size:11px;color:var(--text2);margin-top:2px">기질: ${lang==='ko'?t.nameKr:t.nameEn}</div>`;
    }
    if (mon.specialization !== null) {
      const sp = D.SPECIALIZATIONS[mon.specialization];
      html += `<div style="font-size:11px;color:var(--text2);margin-top:2px">특화: ${lang==='ko'?sp.nameKr:sp.nameEn}</div>`;
    }
    // 원소 비율 표시
    const total = Object.values(mon.elementCounts).reduce((s,v)=>s+v,0) || 1;
    html += '<div style="display:flex;gap:2px;margin-top:6px;height:8px;border-radius:4px;overflow:hidden">';
    D.ELEMENT_IDS.forEach(eid => {
      const ratio = (mon.elementCounts[eid]||0)/total;
      if (ratio > 0) {
        html += `<div style="flex:${ratio};background:${D.ELEMENTS[eid].color};min-width:2px" title="${D.ELEMENTS[eid].nameKr}: ${Math.round(ratio*100)}%"></div>`;
      }
    });
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  pc.innerHTML = html;
}

function renderPanel() {
  if (currentTab === 'shop') renderShop();
  else if (currentTab === 'inventory') renderInventory();
  else if (currentTab === 'evotree') renderEvoTree();
}

/* ── 구매 ── */
function buyMineral(id) {
  const mineral = D.MINERAL_MAP[id];
  if (!mineral) return;
  const coins = getCoins();
  if (coins < mineral.cost) { toast('코인이 부족해요! 🪙'); return; }
  setCoins(coins - mineral.cost);
  save.inventory[id] = (save.inventory[id] || 0) + 1;
  writeSave();
  toast(`${lang==='ko'?mineral.nameKr:mineral.nameEn} 구매! 🎉`);
  if (currentTab === 'shop') renderShop();
  if (currentTab === 'inventory') renderInventory();
}

/* ── 먹이기 ── */
function feedMineral(id) {
  const mon = getActiveMonster();
  if (!mon) return;
  if (mon.stage === 'final') { toast('이미 최종형이에요! 📖'); return; }
  if (!save.inventory[id] || save.inventory[id] <= 0) { toast('인벤토리에 없어요!'); return; }

  // 하루 3번 체크
  const now = Date.now();
  if (now - mon.currentDayStart >= CFG.GAME_DAY_MS) {
    mon.feedsToday = 0;
    mon.currentDayStart = now;
  }
  if (mon.feedsToday >= CFG.FEEDS_PER_DAY && mon.stage !== 'petrified') {
    toast('오늘은 더 먹일 수 없어요! (3/3) 🕐');
    return;
  }

  save.inventory[id]--;
  if (save.inventory[id] <= 0) delete save.inventory[id];

  const mineral = D.MINERAL_MAP[id];

  // 석화 상태면 부활
  if (mon.stage === 'petrified') {
    mon.stage = mon.lastStage || 'egg';
    mon.stats.hunger = 30;
    mon.stats.happiness = 20;
    mon.stats.energy = 20;
    mon.stats.cleanliness = 20;
    save.stats.petrifyRevived = (save.stats.petrifyRevived || 0) + 1;
    toast('몬스터가 석화에서 깨어났어요! ✨');
    document.getElementById('petrifiedOverlay').classList.remove('show');
  }

  // 스탯 적용
  mon.stats.hunger = Math.min(CFG.STAT_MAX, mon.stats.hunger + mineral.hunger);
  mon.stats.happiness = Math.min(CFG.STAT_MAX, mon.stats.happiness + mineral.happy);
  mon.stats.energy = Math.min(CFG.STAT_MAX, mon.stats.energy + mineral.energy);

  // 원소 카운트
  mon.elementCounts[mineral.element] = (mon.elementCounts[mineral.element] || 0) + 1;
  mon.totalFeeds++;
  mon.feedsToday++;
  mon.feedHistory.push({ mineralId: id, timestamp: now });
  save.stats.totalFeeds++;

  // 진화 체크
  checkEvolution(mon);

  writeSave();
  updateUI();
  renderPanel();

  // 먹이기 애니메이션
  playFeedAnimation(mineral.color);
}

function doFeed() {
  // 인벤토리에서 먹이기 → 탭을 인벤토리로 전환
  switchTab('inventory');
  const mon = getActiveMonster();
  if (!mon) return;
  if (mon.stage !== 'petrified') {
    const now = Date.now();
    if (now - mon.currentDayStart >= CFG.GAME_DAY_MS) {
      mon.feedsToday = 0;
      mon.currentDayStart = now;
    }
    toast(`인벤토리에서 광물을 선택하세요 (${mon.feedsToday}/${CFG.FEEDS_PER_DAY})`);
  } else {
    toast('석화된 몬스터에게 광물을 먹여주세요! 🪨');
  }
}

/* ── 돌봄 액션 ── */
function doPlay() {
  const mon = getActiveMonster();
  if (!mon || mon.stage === 'petrified' || mon.stage === 'egg') return;
  if (mon.sleeping) { toast('자고 있어요... 😴'); return; }
  mon.stats.happiness = Math.min(CFG.STAT_MAX, mon.stats.happiness + 15);
  mon.stats.energy = Math.max(0, mon.stats.energy - 5);
  toast('놀아줬어요! 🎮 행복 +15');
  writeSave(); updateUI();
}

function doBath() {
  const mon = getActiveMonster();
  if (!mon || mon.stage === 'petrified' || mon.stage === 'egg') return;
  if (mon.sleeping) { toast('자고 있어요... 😴'); return; }
  mon.stats.cleanliness = Math.min(CFG.STAT_MAX, mon.stats.cleanliness + 25);
  mon.stats.happiness = Math.min(CFG.STAT_MAX, mon.stats.happiness + 5);
  toast('목욕 완료! 🛁 청결 +25');
  writeSave(); updateUI();
}

function doSleep() {
  const mon = getActiveMonster();
  if (!mon || mon.stage === 'petrified' || mon.stage === 'egg') return;
  mon.sleeping = !mon.sleeping;
  isSleeping = mon.sleeping;
  toast(mon.sleeping ? '잠들었어요... 😴💤' : '일어났어요! ☀️');
  writeSave(); updateUI();
}

function doTrain() {
  const mon = getActiveMonster();
  if (!mon || mon.stage === 'petrified' || mon.stage === 'egg') return;
  if (mon.sleeping) { toast('자고 있어요... 😴'); return; }
  mon.discipline.callsTotal++;
  mon.discipline.callsAnswered++;
  mon.stats.energy = Math.max(0, mon.stats.energy - 10);
  mon.stats.happiness = Math.min(CFG.STAT_MAX, mon.stats.happiness + 5);
  toast('훈련 완료! 💪 규율 +1');
  writeSave(); updateUI();
}

/* ── 주의 호출 ── */
function triggerAttention() {
  const mon = getActiveMonster();
  if (!mon || mon.stage === 'egg' || mon.stage === 'petrified' || mon.stage === 'final') return;
  if (document.getElementById('attentionPopup').classList.contains('show')) return;

  mon.discipline.callsTotal++;
  const messages = ['배가 고파요!', '심심해요...', '더러워요!', '피곤해요...', '놀아주세요!'];
  document.getElementById('attentionMsg').textContent = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById('attentionPopup').classList.add('show');

  let timeLeft = CFG.ATTENTION_CALL_DURATION / 1000;
  const timerEl = document.getElementById('attTimer');
  timerEl.textContent = `${timeLeft}초 남음`;
  attentionTimeout = setInterval(() => {
    timeLeft--;
    timerEl.textContent = `${timeLeft}초 남음`;
    if (timeLeft <= 0) {
      clearInterval(attentionTimeout);
      document.getElementById('attentionPopup').classList.remove('show');
      // 응답 실패
      writeSave();
    }
  }, 1000);
}

function respondAttention() {
  clearInterval(attentionTimeout);
  document.getElementById('attentionPopup').classList.remove('show');
  const mon = getActiveMonster();
  if (mon) {
    mon.discipline.callsAnswered++;
    mon.stats.happiness = Math.min(CFG.STAT_MAX, mon.stats.happiness + 10);
    toast('잘 돌봐줬어요! 💚 규율 +1');
    writeSave(); updateUI();
  }
}

/* ── 진화 체크 ── */
function checkEvolution(mon) {
  if (!mon || mon.stage === 'final' || mon.stage === 'petrified') return;

  if (mon.stage === 'egg' && mon.totalFeeds >= CFG.EGG_FEEDS_TO_HATCH) {
    // 부화!
    mon.element = D.getDominantElement(mon.elementCounts);
    mon.stage = 'hatchling';
    save.stats.hatchCount++;
    save.stats.evolutionCount++;
    showEvolution(mon, '부화했어요! 🐣');
    return;
  }

  const daysSinceBirth = (Date.now() - mon.birthTime) / CFG.GAME_DAY_MS;

  if (mon.stage === 'hatchling' && daysSinceBirth >= CFG.HATCHLING_DAYS) {
    mon.subType = D.getSubType(mon.elementCounts, mon.element);
    mon.stage = 'juvenile';
    save.stats.evolutionCount++;
    const juv = D.JUVENILES[mon.element][mon.subType];
    showEvolution(mon, `${lang==='ko'?juv.nameKr:juv.nameEn}(으)로 진화! 🧬`);
    return;
  }

  if (mon.stage === 'juvenile' && daysSinceBirth >= CFG.HATCHLING_DAYS + CFG.JUVENILE_DAYS) {
    mon.temperament = D.getTemperament(mon);
    mon.stage = 'adult';
    save.stats.evolutionCount++;
    const temp = D.TEMPERAMENTS[mon.temperament];
    showEvolution(mon, `${lang==='ko'?temp.nameKr:temp.nameEn} 성체로 진화! ⚔️`);
    return;
  }

  if (mon.stage === 'adult' && daysSinceBirth >= CFG.HATCHLING_DAYS + CFG.JUVENILE_DAYS + CFG.ADULT_DAYS) {
    mon.specialization = D.getSpecialization(mon);
    mon.stage = 'final';
    save.stats.finalCount++;
    save.stats.evolutionCount++;
    // 도감 등록
    const mId = D.getMonsterId(mon.element, mon.subType, mon.temperament, mon.specialization);
    if (!save.dex[mId]) save.dex[mId] = { discovered: true, timestamp: Date.now() };
    if (mon.specialization === 4) save.stats.mythicCount++;
    const name = D.getMonsterName(mon.element, mon.subType, mon.temperament, mon.specialization, lang);
    showEvolution(mon, `최종형 달성! 👑\n${name}`);
    return;
  }
}

/* ── 진화 연출 ── */
function showEvolution(mon, text) {
  const overlay = document.getElementById('evoOverlay');
  overlay.classList.add('show');
  document.getElementById('evoText').textContent = text.split('\n')[0];
  document.getElementById('evoName').textContent = text.split('\n')[1] || '';

  // 진화 캔버스에 새 형태 그리기
  const canvas = document.getElementById('evoCanvas');
  const ctx = canvas.getContext('2d');
  let t = 0;
  const evoAnim = () => {
    t += 0.05;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 배경 폭발 이펙트
    const elColor = mon.element ? D.ELEMENTS[mon.element].color : '#39ff14';
    for (let i = 0; i < 20; i++) {
      const angle = (i / 20) * Math.PI * 2 + t;
      const dist = 80 + Math.sin(t * 2 + i) * 40 + t * 30;
      const x = canvas.width/2 + Math.cos(angle) * dist;
      const y = canvas.height/2 + Math.sin(angle) * dist;
      ctx.beginPath();
      ctx.arc(x, y, 4 + Math.sin(t+i)*3, 0, Math.PI*2);
      ctx.fillStyle = elColor + Math.floor(Math.max(0, 1-t/3)*255).toString(16).padStart(2,'0');
      ctx.fill();
    }

    // 중앙 몬스터
    drawMonster(ctx, canvas.width, canvas.height, mon, t*20);

    if (t < 4) requestAnimationFrame(evoAnim);
  };
  evoAnim();
}

function closeEvoOverlay() {
  document.getElementById('evoOverlay').classList.remove('show');
  updateUI();
  renderSlotTabs();
}

/* ── 스탯 업데이트 (시간 경과) ── */
function updateStats() {
  for (let i = 0; i < CFG.MAX_SLOTS; i++) {
    const slot = save.slots[i];
    if (!slot || !slot.monster) continue;
    const mon = slot.monster;
    if (mon.stage === 'petrified' || mon.stage === 'final') continue;

    const now = Date.now();
    const elapsed = (now - mon.lastUpdate) / 3600000; // 시간 단위
    mon.lastUpdate = now;

    if (mon.stage === 'egg') continue; // 알은 스탯 감소 없음

    if (mon.sleeping) {
      mon.stats.energy = Math.min(CFG.STAT_MAX, mon.stats.energy + elapsed * 10);
      mon.stats.hunger = Math.max(0, mon.stats.hunger - elapsed * 2);
    } else {
      mon.stats.hunger = Math.max(0, mon.stats.hunger - elapsed * CFG.STAT_DECAY.hunger);
      mon.stats.happiness = Math.max(0, mon.stats.happiness - elapsed * CFG.STAT_DECAY.happiness);
      mon.stats.energy = Math.max(0, mon.stats.energy - elapsed * CFG.STAT_DECAY.energy);
      mon.stats.cleanliness = Math.max(0, mon.stats.cleanliness - elapsed * CFG.STAT_DECAY.cleanliness);
    }

    // 석화 체크
    const { hunger, happiness, energy, cleanliness } = mon.stats;
    if (hunger <= 0 && happiness <= 0 && energy <= 0 && cleanliness <= 0) {
      mon.lastStage = mon.stage;
      mon.stage = 'petrified';
      mon.petrifyCount++;
    }

    // 게임 일수 업데이트
    mon.gameDaysOld = (now - mon.birthTime) / CFG.GAME_DAY_MS;

    // 진화 체크
    checkEvolution(mon);
  }
  writeSave();
}

/* ── UI 업데이트 ── */
function updateUI() {
  const mon = getActiveMonster();
  if (!mon) return;

  // 스탯바
  const stats = mon.stats;
  document.getElementById('barHunger').style.width = stats.hunger + '%';
  document.getElementById('valHunger').textContent = Math.round(stats.hunger);
  document.getElementById('barHappy').style.width = stats.happiness + '%';
  document.getElementById('valHappy').textContent = Math.round(stats.happiness);
  document.getElementById('barEnergy').style.width = stats.energy + '%';
  document.getElementById('valEnergy').textContent = Math.round(stats.energy);
  document.getElementById('barClean').style.width = stats.cleanliness + '%';
  document.getElementById('valClean').textContent = Math.round(stats.cleanliness);

  // 스테이지 라벨
  const stageNames = {
    egg: '🥚 알', hatchling: '🐣 해츨링', juvenile: '🧬 유년체',
    adult: '⚔️ 성체', final: '👑 최종형', petrified: '🪨 석화'
  };
  document.getElementById('stageLabel').textContent = stageNames[mon.stage] || mon.stage;

  // 이름 라벨
  let name = '';
  if (mon.stage === 'hatchling' && mon.element) {
    const h = D.HATCHLINGS[mon.element];
    name = lang === 'ko' ? h.nameKr : h.nameEn;
  } else if (mon.stage === 'juvenile' && mon.subType !== null) {
    const j = D.JUVENILES[mon.element][mon.subType];
    name = lang === 'ko' ? j.nameKr : j.nameEn;
  } else if ((mon.stage === 'adult' || mon.stage === 'final') && mon.element) {
    name = D.getMonsterName(mon.element, mon.subType || 0, mon.temperament || 'wild', mon.specialization || 0, lang);
  }
  document.getElementById('nameLabel').textContent = name;

  // 일수
  const days = Math.floor(mon.gameDaysOld || 0);
  document.getElementById('dayCounter').textContent = `Day ${days}`;

  // 석화 오버레이
  document.getElementById('petrifiedOverlay').classList.toggle('show', mon.stage === 'petrified');

  isSleeping = mon.sleeping || false;
}

/* ── 몬스터 렌더링 (Canvas) ── */
function drawMonster(ctx, w, h, mon, time) {
  if (!mon) return;
  const cx = w / 2, cy = h / 2;
  ctx.save();

  if (mon.stage === 'egg') {
    drawEgg(ctx, w, h, mon, time);
  } else if (mon.stage === 'petrified') {
    drawPetrified(ctx, w, h, mon, time);
  } else {
    drawCreature(ctx, w, h, mon, time);
  }

  ctx.restore();
}

function drawEgg(ctx, w, h, mon, time) {
  const cx = w/2, cy = h/2;
  const rx = w * 0.18, ry = h * 0.24;

  // 부화 진행도
  const progress = Math.min(1, mon.totalFeeds / CFG.EGG_FEEDS_TO_HATCH);

  // 흔들림
  const wobble = Math.sin(time * 0.08) * (progress * 0.1);
  ctx.translate(cx, cy);
  ctx.rotate(wobble);

  // 그림자
  ctx.beginPath();
  ctx.ellipse(0, ry * 0.85, rx * 0.6, ry * 0.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // 우세 원소 색상
  const dominant = D.getDominantElement(mon.elementCounts);
  const total = Object.values(mon.elementCounts).reduce((s,v)=>s+v,0);
  const baseColor = total > 0 ? D.ELEMENTS[dominant].color : '#aaaaaa';

  // 알 본체
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(-rx*0.3, -ry*0.3, rx*0.1, 0, 0, rx*1.3);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, D.lerpColor('#ffffff', baseColor, progress * 0.6));
  grad.addColorStop(1, D.shadeColor(baseColor, -30));
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = D.shadeColor(baseColor, -50);
  ctx.lineWidth = 2;
  ctx.stroke();

  // 무늬 (원소별)
  if (progress > 0.3) {
    ctx.globalAlpha = (progress - 0.3) * 1.4;
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 + time * 0.02;
      const dist = rx * 0.5;
      ctx.beginPath();
      ctx.arc(Math.cos(angle)*dist, Math.sin(angle)*dist*0.8, 3 + progress*4, 0, Math.PI*2);
      ctx.fillStyle = baseColor;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // 균열 (부화 근접)
  if (progress > 0.7) {
    ctx.strokeStyle = D.shadeColor(baseColor, 30);
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = (progress - 0.7) * 3;
    ctx.beginPath();
    ctx.moveTo(-rx*0.1, -ry*0.3);
    ctx.lineTo(rx*0.05, -ry*0.1);
    ctx.lineTo(-rx*0.15, ry*0.05);
    ctx.lineTo(rx*0.1, ry*0.2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // 발광
  if (progress > 0.5) {
    ctx.globalAlpha = Math.sin(time*0.15) * 0.15 * progress;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx*1.3, ry*1.3, 0, 0, Math.PI*2);
    ctx.fillStyle = baseColor;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPetrified(ctx, w, h, mon, time) {
  const cx = w/2, cy = h/2;
  const size = w * 0.25;

  ctx.translate(cx, cy);

  // 그림자
  ctx.beginPath();
  ctx.ellipse(0, size*0.8, size*0.5, size*0.1, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // 돌 몸체
  ctx.beginPath();
  const pts = 8;
  for (let i = 0; i <= pts; i++) {
    const angle = (i/pts)*Math.PI*2;
    const r = size * (0.7 + Math.sin(angle*3+2)*0.15 + Math.cos(angle*5)*0.1);
    const x = Math.cos(angle)*r;
    const y = Math.sin(angle)*r*0.85;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(-size*0.2, -size*0.2, size*0.1, 0, 0, size);
  grad.addColorStop(0, '#888');
  grad.addColorStop(0.5, '#555');
  grad.addColorStop(1, '#333');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X 눈
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 3;
  const eyeOff = size*0.25;
  [-1,1].forEach(side => {
    const ex = side*eyeOff;
    ctx.beginPath(); ctx.moveTo(ex-6,-8); ctx.lineTo(ex+6,4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+6,-8); ctx.lineTo(ex-6,4); ctx.stroke();
  });

  // 미세 균열
  ctx.globalAlpha = 0.3 + Math.sin(time*0.05)*0.1;
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-size*0.3, -size*0.4);
  ctx.lineTo(-size*0.1, 0);
  ctx.lineTo(-size*0.25, size*0.3);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawCreature(ctx, w, h, mon, time) {
  const cx = w/2, cy = h/2;
  const el = D.ELEMENTS[mon.element];
  const color = el.color;
  const color2 = el.color2;
  const stageScale = { hatchling: 0.55, juvenile: 0.7, adult: 0.85, final: 1.0 };
  const scale = stageScale[mon.stage] || 0.7;
  const baseSize = w * 0.2 * scale;

  ctx.translate(cx, cy);

  // 부유 애니메이션
  const floatY = Math.sin(time * 0.06) * (mon.sleeping ? 2 : 5);
  ctx.translate(0, floatY);

  // 수면 시 어둡게
  if (mon.sleeping) ctx.globalAlpha = 0.6;

  // Layer 1: 그림자/광채
  ctx.beginPath();
  ctx.ellipse(0, baseSize*0.9, baseSize*0.6, baseSize*0.12, 0, 0, Math.PI*2);
  ctx.fillStyle = el.glow;
  ctx.fill();

  // 외부 오라
  if (mon.stage === 'final' || mon.stage === 'adult') {
    ctx.globalAlpha *= 0.2 + Math.sin(time*0.1)*0.1;
    ctx.beginPath();
    ctx.arc(0, 0, baseSize*1.5, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.globalAlpha = mon.sleeping ? 0.6 : 1;
  }

  // Layer 2: 몸체
  const bodyIdx = D.ELEMENT_IDS.indexOf(mon.element);
  drawBody(ctx, baseSize, bodyIdx, color, color2, mon, time);

  // Layer 3-4: 패턴
  drawPattern(ctx, baseSize, mon.element, time);

  // Layer 5: 눈
  if (!mon.sleeping) {
    drawEyes(ctx, baseSize, mon.stage, mon.temperament, color, time);
  } else {
    // 수면 눈 (가로줄)
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    [-1,1].forEach(side => {
      const ex = side * baseSize * 0.25;
      ctx.beginPath(); ctx.moveTo(ex-5, -baseSize*0.1); ctx.lineTo(ex+5, -baseSize*0.1); ctx.stroke();
    });
  }

  // Layer 6: 부속물 (성체/최종)
  if (mon.specialization !== null && (mon.stage === 'final' || mon.stage === 'adult')) {
    drawAppendages(ctx, baseSize, mon.specialization, color, time);
  }

  // Layer 7: 파티클
  drawParticles(ctx, baseSize, color, time, mon.stage);

  // ZZZ (수면)
  if (mon.sleeping) {
    ctx.globalAlpha = 1;
    ctx.font = `${baseSize*0.3}px Jua`;
    ctx.fillStyle = '#aaa';
    for (let i = 0; i < 3; i++) {
      const zx = baseSize*0.5 + i*12;
      const zy = -baseSize*(0.5+i*0.15) + Math.sin(time*0.1+i)*5;
      ctx.globalAlpha = 0.3 + i*0.2;
      ctx.fillText('Z', zx, zy);
    }
    ctx.globalAlpha = 1;
  }

  // 입 (기본)
  if (!mon.sleeping) {
    ctx.beginPath();
    ctx.arc(0, baseSize*0.15, baseSize*0.08, 0.1, Math.PI-0.1);
    ctx.strokeStyle = D.shadeColor(color, -60);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawBody(ctx, size, bodyIdx, color, color2, mon, time) {
  ctx.beginPath();
  const shapes = [
    // 0: Ignis — 불꽃형
    (s) => {
      for (let i = 0; i <= 12; i++) {
        const a = (i/12)*Math.PI*2;
        const spike = i%3===0 ? 1.3 : 1.0;
        const r = s * spike * (0.8 + Math.sin(time*0.15+i)*0.05);
        i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r*0.9) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r*0.9);
      }
    },
    // 1: Terra — 결정체
    (s) => {
      const pts = [[0,-s*1.1],[s*0.8,-s*0.3],[s*0.6,s*0.6],[-s*0.6,s*0.6],[-s*0.8,-s*0.3]];
      pts.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    },
    // 2: Aqua — 물방울
    (s) => {
      ctx.ellipse(0, s*0.1, s*0.75, s*0.85, 0, 0, Math.PI*2);
    },
    // 3: Volt — 톱니
    (s) => {
      for (let i = 0; i <= 10; i++) {
        const a = (i/10)*Math.PI*2;
        const spike = i%2===0 ? 1.2 : 0.75;
        const r = s * spike;
        i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r*0.85) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r*0.85);
      }
    },
    // 4: Flora — 잎사귀
    (s) => {
      ctx.ellipse(0, 0, s*0.65, s*0.9, 0, 0, Math.PI*2);
      // 잎 돌출
      ctx.moveTo(s*0.3, -s*0.7); ctx.quadraticCurveTo(s*0.9, -s*0.9, s*0.5, -s*0.3);
      ctx.moveTo(-s*0.3, -s*0.7); ctx.quadraticCurveTo(-s*0.9, -s*0.9, -s*0.5, -s*0.3);
    },
    // 5: Toxin — 포자형
    (s) => {
      ctx.arc(0, 0, s*0.7, 0, Math.PI*2);
      // 포자 돌출
      for (let i = 0; i < 5; i++) {
        const a = (i/5)*Math.PI*2 - Math.PI/2;
        ctx.moveTo(Math.cos(a)*s*0.7, Math.sin(a)*s*0.7);
        ctx.arc(Math.cos(a)*s*0.9, Math.sin(a)*s*0.9, s*0.15, 0, Math.PI*2);
      }
    },
    // 6: Lux — 별형
    (s) => {
      for (let i = 0; i <= 10; i++) {
        const a = (i/10)*Math.PI*2 - Math.PI/2;
        const r = i%2===0 ? s*1.1 : s*0.5;
        i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
    },
    // 7: Aero — 소용돌이
    (s) => {
      ctx.ellipse(0, 0, s*0.8, s*0.7, Math.sin(time*0.05)*0.1, 0, Math.PI*2);
    }
  ];

  const drawShape = shapes[bodyIdx] || shapes[0];
  drawShape(size);
  ctx.closePath();

  // 하이브리드 색상 블렌딩
  let fillColor = color;
  if (mon.subType > 0 && mon.element) {
    const juv = D.JUVENILES[mon.element][mon.subType];
    if (juv && juv.hybrid) {
      fillColor = D.lerpColor(color, D.ELEMENTS[juv.hybrid].color, 0.3);
    }
  }

  const grad = ctx.createRadialGradient(-size*0.2, -size*0.2, size*0.1, 0, 0, size*1.2);
  grad.addColorStop(0, D.lerpColor('#ffffff', fillColor, 0.5));
  grad.addColorStop(0.5, fillColor);
  grad.addColorStop(1, D.shadeColor(fillColor, -40));
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = D.shadeColor(fillColor, -50);
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawPattern(ctx, size, element, time) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  const patternType = D.PATTERNS[element];
  const color = D.ELEMENTS[element].color2;

  switch(patternType) {
    case 'flame':
      for (let i = 0; i < 4; i++) {
        const y = -size*0.4 + i*size*0.2;
        ctx.beginPath();
        ctx.moveTo(-size*0.3, y);
        ctx.quadraticCurveTo(0, y - 8 - Math.sin(time*0.2+i)*5, size*0.3, y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      break;
    case 'facet':
      for (let i = 0; i < 3; i++) {
        const a = (i/3)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a)*size*0.6, Math.sin(a)*size*0.6);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'ripple':
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, size*0.1, size*0.2*i, size*0.1*i, 0, 0, Math.PI*2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'crack':
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -size*0.5);
      ctx.lineTo(size*0.15, -size*0.1);
      ctx.lineTo(-size*0.1, size*0.2);
      ctx.lineTo(size*0.2, size*0.5);
      ctx.stroke();
      break;
    case 'vine':
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let t2 = 0; t2 < Math.PI*2; t2 += 0.3) {
        const x = Math.cos(t2)*size*0.3 + Math.sin(t2*3)*size*0.1;
        const y = Math.sin(t2)*size*0.4;
        t2 === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      break;
    case 'bubble':
      for (let i = 0; i < 6; i++) {
        const bx = Math.sin(i*1.1)*size*0.3;
        const by = Math.cos(i*1.7)*size*0.3;
        ctx.beginPath();
        ctx.arc(bx, by, 3 + Math.sin(time*0.1+i)*2, 0, Math.PI*2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'ray':
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + time*0.02;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(a)*size*0.7, Math.sin(a)*size*0.7);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'swirl':
      ctx.beginPath();
      for (let t2 = 0; t2 < Math.PI*4; t2 += 0.2) {
        const r = t2/(Math.PI*4)*size*0.5;
        const x = Math.cos(t2+time*0.03)*r;
        const y = Math.sin(t2+time*0.03)*r;
        t2 === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      break;
  }
  ctx.restore();
}

function drawEyes(ctx, size, stage, temperament, color, time) {
  const eyeW = size * 0.12;
  const eyeOff = size * 0.25;
  const eyeY = -size * 0.1;
  const isWild = temperament === 'wild';
  const blink = Math.sin(time * 0.08) > 0.97;

  [-1, 1].forEach(side => {
    const ex = side * eyeOff;
    ctx.save();
    ctx.translate(ex, eyeY);

    // 눈 흰자
    ctx.beginPath();
    if (isWild && stage !== 'hatchling') {
      // 각진 눈
      ctx.moveTo(-eyeW, 0);
      ctx.lineTo(0, -eyeW*0.8);
      ctx.lineTo(eyeW, 0);
      ctx.lineTo(0, eyeW*0.6);
    } else {
      ctx.ellipse(0, 0, eyeW, eyeW * (blink ? 0.1 : 0.8), 0, 0, Math.PI * 2);
    }
    ctx.fillStyle = '#fff';
    ctx.fill();

    // 동공
    if (!blink) {
      ctx.beginPath();
      ctx.arc(side * 1.5, 0, eyeW * 0.45, 0, Math.PI * 2);
      ctx.fillStyle = D.shadeColor(color, -60);
      ctx.fill();
      // 하이라이트
      ctx.beginPath();
      ctx.arc(side*1.5 - 1.5, -2, eyeW*0.15, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    ctx.restore();
  });
}

function drawAppendages(ctx, size, specIdx, color, time) {
  ctx.save();
  ctx.globalAlpha = 0.8;

  switch(specIdx) {
    case 0: // Sovereign — 왕관
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(-size*0.3, -size*0.8);
      ctx.lineTo(-size*0.15, -size*1.1);
      ctx.lineTo(0, -size*0.85);
      ctx.lineTo(size*0.15, -size*1.1);
      ctx.lineTo(size*0.3, -size*0.8);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#cc9900';
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    case 1: // Alchemist — 다색 수정
      for (let i = 0; i < 4; i++) {
        const a = (i/4)*Math.PI*2 - Math.PI/2 + time*0.02;
        const dist = size*1.1;
        const cx2 = Math.cos(a)*dist;
        const cy2 = Math.sin(a)*dist;
        ctx.beginPath();
        ctx.moveTo(cx2, cy2-6);
        ctx.lineTo(cx2+4, cy2);
        ctx.lineTo(cx2, cy2+6);
        ctx.lineTo(cx2-4, cy2);
        ctx.closePath();
        ctx.fillStyle = D.ELEMENTS[D.ELEMENT_IDS[i*2]].color;
        ctx.fill();
      }
      break;
    case 2: // Berserker — 가시
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 - Math.PI/2;
        const dist = size*0.85;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*dist, Math.sin(a)*dist);
        ctx.lineTo(Math.cos(a)*(dist+size*0.3), Math.sin(a)*(dist+size*0.3));
        ctx.strokeStyle = D.shadeColor(color, -30);
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      break;
    case 3: // Guardian — 방패
      ctx.beginPath();
      ctx.moveTo(0, -size*0.2);
      ctx.lineTo(size*1.3, -size*0.1);
      ctx.quadraticCurveTo(size*1.4, size*0.3, size*1.1, size*0.5);
      ctx.lineTo(0, size*0.2);
      ctx.closePath();
      ctx.fillStyle = D.shadeColor(color, -20) + '88';
      ctx.fill();
      ctx.strokeStyle = D.shadeColor(color, -40);
      ctx.lineWidth = 2;
      ctx.stroke();
      break;
    case 4: // Mythic — 오로라 날개
      ctx.globalAlpha = 0.3 + Math.sin(time*0.08)*0.15;
      [-1, 1].forEach(side => {
        ctx.beginPath();
        ctx.moveTo(0, -size*0.3);
        ctx.quadraticCurveTo(side*size*1.5, -size*0.8, side*size*1.2, size*0.2);
        ctx.quadraticCurveTo(side*size*0.5, size*0.1, 0, size*0.1);
        ctx.closePath();
        const wingGrad = ctx.createLinearGradient(0, -size, side*size*1.5, size*0.5);
        wingGrad.addColorStop(0, color + '66');
        wingGrad.addColorStop(0.5, '#ff69b4' + '44');
        wingGrad.addColorStop(1, '#87ceeb' + '44');
        ctx.fillStyle = wingGrad;
        ctx.fill();
      });
      break;
  }
  ctx.restore();
}

function drawParticles(ctx, size, color, time, stage) {
  const count = stage === 'final' ? 12 : stage === 'adult' ? 8 : 4;
  ctx.save();
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + time * 0.03;
    const dist = size * (1.2 + Math.sin(time * 0.05 + i * 1.5) * 0.3);
    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist * 0.7 - Math.sin(time * 0.04 + i) * 10;
    const particleSize = 2 + Math.sin(time * 0.1 + i) * 1.5;
    ctx.globalAlpha = 0.3 + Math.sin(time * 0.08 + i * 0.7) * 0.3;
    ctx.beginPath();
    ctx.arc(x, y, particleSize, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }
  ctx.restore();
}

/* ── 먹이기 애니메이션 ── */
function playFeedAnimation(mineralColor) {
  const canvas = document.getElementById('monsterCanvas');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  const feedAnim = () => {
    frame++;
    // 기존 몬스터 위에 파티클 오버레이
    for (let i = 0; i < 5; i++) {
      const x = canvas.width/2 + (Math.random()-0.5)*80;
      const y = canvas.height/2 + 40 - frame*3 + (Math.random()-0.5)*40;
      ctx.beginPath();
      ctx.arc(x, y, 3 + Math.random()*3, 0, Math.PI*2);
      ctx.fillStyle = mineralColor + Math.floor((1-frame/20)*200).toString(16).padStart(2,'0');
      ctx.fill();
    }
    if (frame < 20) requestAnimationFrame(feedAnim);
  };
  feedAnim();
}

/* ── 게임 루프 ── */
function startGameLoop() {
  const canvas = document.getElementById('monsterCanvas');
  const ctx = canvas.getContext('2d');
  let lastStatUpdate = Date.now();
  let lastAttentionCheck = Date.now();

  function loop() {
    animTime++;

    // 몬스터 그리기
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const mon = getActiveMonster();
    if (mon) drawMonster(ctx, canvas.width, canvas.height, mon, animTime);

    // 스탯 업데이트 (30초마다)
    const now = Date.now();
    if (now - lastStatUpdate > 30000) {
      updateStats();
      updateUI();
      lastStatUpdate = now;
    }

    // 주의 호출 체크 (5분마다)
    if (now - lastAttentionCheck > 300000) {
      if (Math.random() < CFG.ATTENTION_CALL_CHANCE) triggerAttention();
      lastAttentionCheck = now;
    }

    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

/* ── 도감 ── */
function showDex() {
  const modal = document.getElementById('detailModal');
  const card = document.getElementById('detailCard');

  const dexCount = Object.keys(save.dex).length;
  let html = `<h3 style="color:var(--neon);margin-bottom:8px">📖 몬스터 도감</h3>`;
  html += `<div style="font-size:12px;color:var(--text2);margin-bottom:12px">${dexCount} / ${D.TOTAL_MONSTERS}종 발견</div>`;

  // 원소별 필터
  html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px">';
  D.ELEMENT_IDS.forEach(el => {
    const e = D.ELEMENTS[el];
    html += `<span style="font-size:10px;padding:2px 6px;border-radius:8px;background:${e.color}22;color:${e.color};border:1px solid ${e.color}33">${e.emoji}</span>`;
  });
  html += '</div>';

  // 도감 그리드
  html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-height:300px;overflow-y:auto">';
  D.ELEMENT_IDS.forEach(el => {
    for (let sub = 0; sub < 5; sub++) {
      for (const temp of ['disciplined','wild']) {
        for (let spec = 0; spec < 5; spec++) {
          const id = D.getMonsterId(el, sub, temp, spec);
          const discovered = save.dex[id];
          const e = D.ELEMENTS[el];
          if (discovered) {
            html += `<div style="aspect-ratio:1;border-radius:6px;background:${e.color}15;border:1px solid ${e.color}33;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer" title="${D.getMonsterName(el,sub,temp,spec,lang)}">${e.emoji}</div>`;
          } else {
            html += `<div style="aspect-ratio:1;border-radius:6px;background:#111;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333">?</div>`;
          }
        }
      }
    }
  });
  html += '</div>';

  html += `<button class="close-btn" onclick="closeDetail()" style="margin-top:12px">닫기</button>`;
  card.innerHTML = html;
  modal.classList.add('show');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
}

/* ── 토스트 ── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── 디버그 ── */
let debugTapCount = 0;
let debugTapTimer = null;
document.addEventListener('click', (e) => {
  if (e.target.closest('.top-bar .title')) {
    debugTapCount++;
    clearTimeout(debugTapTimer);
    debugTapTimer = setTimeout(() => debugTapCount = 0, 1000);
    if (debugTapCount >= 5) {
      debugTapCount = 0;
      debugToggle();
    }
  }
});

function debugToggle() {
  document.getElementById('debugPanel').classList.toggle('show');
  updateDebugInfo();
}

function debugEvolve() {
  const mon = getActiveMonster();
  if (!mon) return;
  if (mon.stage === 'egg') {
    if (Object.values(mon.elementCounts).reduce((s,v)=>s+v,0) === 0) {
      mon.elementCounts.ignis = 3; mon.elementCounts.terra = 1;
    }
    mon.totalFeeds = CFG.EGG_FEEDS_TO_HATCH;
  }
  mon.birthTime = Date.now() - (CFG.HATCHLING_DAYS + CFG.JUVENILE_DAYS + CFG.ADULT_DAYS + 1) * CFG.GAME_DAY_MS;
  if (!mon.element) mon.element = D.getDominantElement(mon.elementCounts);
  if (mon.subType === null) mon.subType = D.getSubType(mon.elementCounts, mon.element);
  if (!mon.temperament) mon.temperament = D.getTemperament(mon);
  checkEvolution(mon);
  writeSave(); updateUI(); renderSlotTabs();
  toast('디버그: 진화 트리거!');
  updateDebugInfo();
}

function debugFillStats() {
  const mon = getActiveMonster();
  if (!mon) return;
  mon.stats = {hunger:100,happiness:100,energy:100,cleanliness:100};
  if (mon.stage === 'petrified') { mon.stage = mon.lastStage || 'hatchling'; }
  writeSave(); updateUI();
  toast('디버그: 스탯 MAX');
}

function debugDrainStats() {
  const mon = getActiveMonster();
  if (!mon) return;
  mon.stats = {hunger:0,happiness:0,energy:0,cleanliness:0};
  writeSave(); updateUI(); updateStats();
  toast('디버그: 스탯 0 (석화될 수 있음)');
}

function debugAddCoins() {
  setCoins(getCoins() + 100);
  toast('디버그: +100 코인');
}

function debugAddAllMinerals() {
  D.MINERALS.forEach(m => { save.inventory[m.id] = (save.inventory[m.id]||0) + 10; });
  writeSave(); renderPanel();
  toast('디버그: 모든 광물 +10');
}

function updateDebugInfo() {
  const mon = getActiveMonster();
  if (!mon) return;
  const info = document.getElementById('debugInfo');
  if (!info) return;
  const elCounts = D.ELEMENT_IDS.map(e => `${e}:${mon.elementCounts[e]||0}`).join(' ');
  info.textContent = `Stage: ${mon.stage}\nElement: ${mon.element}\nSubType: ${mon.subType}\nTemperament: ${mon.temperament}\nSpec: ${mon.specialization}\nFeeds: ${mon.totalFeeds} (today: ${mon.feedsToday})\nDays: ${(mon.gameDaysOld||0).toFixed(1)}\nPetrify: ${mon.petrifyCount}\nDiscipline: ${mon.discipline.callsAnswered}/${mon.discipline.callsTotal}\nElements: ${elCounts}\nDex: ${Object.keys(save.dex).length}/${D.TOTAL_MONSTERS}`;
}

/* ── 초기화 ── */
window.addEventListener('load', () => {
  loadSave();
  if (save && getActiveMonster()) {
    // 이미 진행 중인 게임이 있으면 바로 시작
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('gameApp').style.display = 'flex';
    updateStats(); // 오프라인 시간 보정
    updateCoinDisplay();
    renderSlotTabs();
    updateUI();
    switchTab('shop');
    startGameLoop();
  }
});
</script>
