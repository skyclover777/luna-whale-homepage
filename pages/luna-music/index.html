<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Whale Music</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#888880;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
    .synth{position:relative;width:95vw;max-width:1400px}
    .synth img{width:100%;display:block;image-rendering:pixelated}
    .hit{position:absolute;cursor:pointer;background:transparent;-webkit-tap-highlight-color:transparent}
    .hit.active{background:rgba(255,140,0,0.12)}
    .pad-hit.active{background:rgba(255,255,255,0.08)}
    .key-hit.active{background:rgba(0,0,0,0.06)}
    .knob-hit{cursor:ns-resize}
    #oled-canvas{position:absolute;pointer-events:none}
    /* Debug mode: press D to toggle */
    .debug .hit{outline:1px solid red;background:rgba(255,0,0,0.05)}
    .debug .pad-hit{outline:1px solid cyan}
    .debug .key-hit{outline:1px solid lime}
    .debug .knob-hit{outline:1px solid orange}
  </style>
</head>
<body>
<div class="synth" id="synth">
  <img src="../../images/op-1/op-1.png" alt="Luna Music" id="bgImg">
  <canvas id="oled-canvas"></canvas>
</div>

<script>
/* ═══ All positions from Python pixel analysis (image: 1614×458) ═══ */
const IW = 1614, IH = 458;
const synth = document.getElementById('synth');

function makeHit(id, cls, x, y, w, h){
  const d = document.createElement('div');
  d.className = 'hit ' + cls;
  d.id = id;
  d.style.cssText = `position:absolute;left:${x/IW*100}%;top:${y/IH*100}%;width:${w/IW*100}%;height:${h/IH*100}%`;
  synth.appendChild(d);
  return d;
}

/* ─── KNOBS (detected from image) ─── */
makeHit('knob-filter','knob-hit', 680,30,110,140);
makeHit('knob-res','knob-hit',    840,40,95,125);
makeHit('knob-lfo','knob-hit',    998,25,125,150);
makeHit('knob-mix','knob-hit',    1165,32,108,140);
makeHit('knob-com','knob-hit',    1348,14,68,80);

/* ─── ROW 2: Function buttons (y≈197-228) ─── */
const r2 = [
  [27,197,55,30],[104,197,55,30],[184,197,55,30],[258,197,55,30], // icons
  [340,197,72,30],[424,197,72,30],[512,197,72,30],[600,197,72,30], // 1-4
  [698,197,60,30],[770,197,60,30],[842,197,60,30],[916,197,60,30], // IN-QQ
  [990,197,60,30],[1064,197,60,30],[1138,197,60,30],[1213,197,60,30], // 5R-8M2
  [1300,197,50,30], // ...
];
r2.forEach((b,i) => makeHit('r2-'+i,'btn-hit',b[0],b[1],b[2],b[3]));

/* ─── ROW 3: Left buttons + 8 Black pads (pixel-detected) ─── */
makeHit('arr-up','btn-hit',   27,242,55,50);
makeHit('arr-dn','btn-hit',  104,242,55,50);
makeHit('scissors','btn-hit', 184,242,55,50);

// 10 pads detected, but OP-1 has 8 real pads — use first 8 contiguous or map correctly
// Looking at original: pads are in pairs with gaps matching the key columns
const padData = [
  {x:268,y:242,w:90,h:50},   // pad spanning col 1
  {x:387,y:242,w:70,h:50},   // pad 2
  {x:485,y:242,w:60,h:50},   // pad 3
  {x:620,y:242,w:60,h:50},   // pad 4 (gap before this = wider)
  {x:712,y:242,w:60,h:50},   // pad 5
  {x:892,y:242,w:60,h:50},   // pad 6 (another gap)
  {x:985,y:242,w:60,h:50},   // pad 7
  {x:1080,y:242,w:60,h:50},  // pad 8
];

// Actually use the precise detected coordinates
const padsDetected = [
  {x:313,y:242,w:52,h:50},
  {x:397,y:242,w:52,h:50},
  {x:491,y:242,w:52,h:50},
  {x:669,y:242,w:52,h:50},
  {x:766,y:242,w:53,h:50},
  {x:945,y:242,w:52,h:50},
  {x:1040,y:242,w:51,h:50},
  {x:1135,y:242,w:52,h:50},
  {x:1320,y:242,w:53,h:50},
  {x:1414,y:242,w:53,h:50},
];
// Original OP-1 has exactly 8 pads. The 10 detected might include some artifacts.
// Picking the 8 largest gaps: pads at indices 0-7, skip 8-9 (those might be right-edge artifacts)
const padNotes = [60,62,64,65,67,69,71,72];
padsDetected.slice(0,8).forEach((p,i) => {
  // Expand slightly to cover the full pad with margin
  const el = makeHit('pad-'+padNotes[i],'pad-hit', p.x-2, p.y-2, p.w+4, p.h+4);
  el.dataset.note = padNotes[i];
});

/* ─── ROWS 4+5: Left buttons + 14 White keys (pixel-detected) ─── */
// Left buttons row 4
makeHit('rec','btn-hit',   27,305,55,60);
makeHit('play','btn-hit', 104,305,55,60);
makeHit('stop','btn-hit', 184,305,55,60);
// Left buttons row 5
makeHit('left','btn-hit',  27,380,55,60);
makeHit('right','btn-hit',104,380,55,60);
makeHit('shift','btn-hit', 184,380,72,60);

// 14 white keys spanning rows 4+5 (y=303, h=140)
const keysDetected = [
  {x:268,w:57},{x:352,w:56},{x:436,w:64},{x:530,w:63},
  {x:621,w:61},{x:712,w:62},{x:805,w:64},{x:896,w:60},
  {x:987,w:61},{x:1081,w:63},{x:1175,w:63},{x:1269,w:63},
  {x:1362,w:63},{x:1453,w:63},
];
const keyNotes = [74,76,77,79,81,83,84,86,88,90,91,93,95,96];
keysDetected.forEach((k,i) => {
  const el = makeHit('key-'+keyNotes[i],'key-hit', k.x, 303, k.w, 140);
  el.dataset.note = keyNotes[i];
});

/* ─── OLED overlay (detected: x=286, y=18, w=415, h=162) ─── */
const oledCanvas = document.getElementById('oled-canvas');
const oCtx = oledCanvas.getContext('2d');

function positionOled(){
  const rect = document.getElementById('bgImg').getBoundingClientRect();
  const sx=rect.width/IW, sy=rect.height/IH;
  const ox=286,oy=18,ow=415,oh=162;
  oledCanvas.style.left=(ox/IW*100)+'%';
  oledCanvas.style.top=(oy/IH*100)+'%';
  oledCanvas.style.width=(ow*sx)+'px';
  oledCanvas.style.height=(oh*sy)+'px';
  oledCanvas.width=ow; oledCanvas.height=oh;
}
positionOled();
window.addEventListener('resize',positionOled);

let noteEnergy=0, wT=0;
function drawOled(){
  const W=oledCanvas.width,H=oledCanvas.height;
  oCtx.clearRect(0,0,W,H);
  oCtx.fillStyle='rgba(8,20,16,0.6)';
  oCtx.fillRect(0,0,W,H);
  const step=3,n=Math.floor(W/step);
  const base=0.12+noteEnergy*0.6;
  for(let i=0;i<n;i++){
    const p=(i/n)*Math.PI*6+wT*2;
    const a=base+0.3*Math.abs(Math.sin(p))+0.1*Math.abs(Math.sin(p*0.4+1));
    const bh=Math.max(1,a*(H*0.4));
    oCtx.fillStyle=`rgba(96,192,216,${0.3+0.7*a})`;
    oCtx.fillRect(i*step,(H-bh)/2+10,2,bh);
  }
  wT+=0.02;noteEnergy*=0.94;
  requestAnimationFrame(drawOled);
}
drawOled();

/* ═══ WEB AUDIO ═══ */
let audioCtx,masterGain;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0.5;masterGain.connect(audioCtx.destination)}
const midiFreq=n=>440*Math.pow(2,(n-69)/12);
const activeNotes={};

function noteOn(midi,type){
  initAudio();
  if(activeNotes[midi])return;
  noteEnergy=1;
  if(type==='pad'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.setValueAtTime(midiFreq(midi),audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(midiFreq(midi)*0.5,audioCtx.currentTime+0.15);
    g.gain.setValueAtTime(0.6,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
    o.connect(g);g.connect(masterGain);o.start();o.stop(audioCtx.currentTime+0.21);
    activeNotes[midi]={type:'oneshot'};
    setTimeout(()=>delete activeNotes[midi],250);
  } else {
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.value=midiFreq(midi);
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.3,audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.15,audioCtx.currentTime+0.1);
    o.connect(g);g.connect(masterGain);o.start();
    activeNotes[midi]={o,g,type:'sustained'};
  }
}
function noteOff(midi){
  const n=activeNotes[midi];if(!n||n.type==='oneshot')return;
  const t=audioCtx.currentTime;
  n.g.gain.cancelScheduledValues(t);n.g.gain.setValueAtTime(n.g.gain.value,t);
  n.g.gain.exponentialRampToValueAtTime(0.001,t+0.2);n.o.stop(t+0.21);
  delete activeNotes[midi];
}

/* ─── Event binding ─── */
document.querySelectorAll('.pad-hit').forEach(el=>{
  el.addEventListener('pointerdown',e=>{el.classList.add('active');noteOn(+el.dataset.note,'pad');e.preventDefault()});
  el.addEventListener('pointerup',()=>el.classList.remove('active'));
  el.addEventListener('pointerleave',()=>el.classList.remove('active'));
});
document.querySelectorAll('.key-hit').forEach(el=>{
  el.addEventListener('pointerdown',e=>{el.classList.add('active');noteOn(+el.dataset.note,'key');e.preventDefault()});
  el.addEventListener('pointerup',()=>{el.classList.remove('active');noteOff(+el.dataset.note)});
  el.addEventListener('pointerleave',()=>{el.classList.remove('active');noteOff(+el.dataset.note)});
});
document.querySelectorAll('.btn-hit').forEach(el=>{
  el.addEventListener('pointerdown',()=>el.classList.add('active'));
  el.addEventListener('pointerup',()=>el.classList.remove('active'));
  el.addEventListener('pointerleave',()=>el.classList.remove('active'));
});

/* ─── Debug mode: press D ─── */
document.addEventListener('keydown',e=>{
  if(e.key==='d'||e.key==='D') synth.classList.toggle('debug');
});
</script>
</body>
</html>
