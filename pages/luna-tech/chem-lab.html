        '....B.WWWW.B....',  // 17 waist
        '....FWWWWWWF....',  // 18 hands+belt
        '.....JJJJJJ.....',  // 19 hip
        '.....JJJJJJ.....',
        '.....JJ..JJ.....',
        '.....JJ..JJ.....',  // 22
        '....JJ....JJ....',
        '....JJ....JJ....',
        '....JJ....JJ....',
        '....jJ....Jj....',
        '....jJ....Jj....',  // 27
        '....jj....jj....',
        '....jj....jj....',
        '....jj....jj....',  // 30
        '....jj....jj....',
        '....jj....jj....',
        '....jj....jj....',
        '....SS....SS....',  // 34 ankle
        '....SS....SS....',
        '...SSS....SSS...',  // 36 shoes
        '...SSS....SSS...',
        '...SSS....SSS...',
        '..SSSS....SSSS..',  // 39 shoe sole
      ],
      [ // Frame 1 (walk phase B - left leg forward)
        '......1111......',
        '.....111111.....',
        '....11111111....',
        '....1FFFFFF1....',
        '....FFFFFFFF....',
        '....F.EFF.EF....',
        '....FFFFFFFF....',
        '....FFGGGFF.....',
        '.....FFFFFF.....',
        '.....NNNN.......',
        '....BBWWWWBB....',
        '...BBBWWWWBBB...',
        '...BBBWWWWBBB...',
        '...BBbWWWWbBB...',
        '...BB.WWWW.BB...',
        '...BB.WWWW.BB...',
        '...bB.WWWW.Bb...',
        '....B.WWWW.B....',
        '....FWWWWWWF....',
        '.....JJJJJJ.....',
        '.....JJJJJJ.....',
        '....JJJ..JJ.....',
        '...JJJ...JJ.....',  // left leg forward
        '...JJ.....JJ....',
        '..JJ......JJ....',
        '..JJ......JJ....',
        '..jj.....Jj.....',
        '..jj.....Jj.....',
        '..jj....jj......',
        '..jj....jj......',
        '.SSS....jj......',
        '.SSS....jj......',
        '.SSS...jj.......',
        '........jj......',
        '........SS......',
        '........SS......',
        '........SSS.....',
        '........SSS.....',
        '........SSS.....',
        '........SSSS....',
      ],
    ];

    const charColors = {
        '1': '#1a1a1a', 'H': '#2a2a2a', 'F': '#e0b080', 'E': '#1a1a1a',
        'M': '#8a6a4a', 'G': '#3a2a1a', 'N': '#d0a070',
        'B': '#8B6914', 'b': '#6a5010',
        'W': '#f0edd8', 'J': '#2D5F8A', 'j': '#1e4a6a',
        'S': '#4a2a10', '.': null
    };

    function drawPixelChar(px, py, scale, walkFrame) {
        const fi = Math.floor(Math.abs(walkFrame)) % 2;
        const rows = charFrames[fi];
        rows.forEach((row, ry) => {
            for (let rx = 0; rx < row.length; rx++) {
                const c = charColors[row[rx]];
                if (!c) continue;
                ictx.fillStyle = c;
                ictx.fillRect(px + rx * scale, py + ry * scale, scale, scale);
            }
        });
    }

    function drawRV(rx, ry, scale) {
        // RV body
        ictx.fillStyle = '#c4a55a';
        ictx.fillRect(rx, ry, 200 * scale, 100 * scale);
        // Roof
        ictx.fillStyle = '#e8dbb5';
        ictx.fillRect(rx, ry - 15 * scale, 200 * scale, 15 * scale);
        // Windows
        ictx.fillStyle = '#2a3a5a';
        ictx.fillRect(rx + 20 * scale, ry + 15 * scale, 35 * scale, 25 * scale);
        ictx.fillRect(rx + 70 * scale, ry + 15 * scale, 35 * scale, 25 * scale);
        ictx.fillRect(rx + 140 * scale, ry + 10 * scale, 45 * scale, 35 * scale);
        // Window reflections
        ictx.fillStyle = 'rgba(100,180,255,0.2)';
        ictx.fillRect(rx + 22 * scale, ry + 17 * scale, 10 * scale, 8 * scale);
        // Door
        ictx.fillStyle = '#a08840';
        ictx.fillRect(rx + 115 * scale, ry + 20 * scale, 20 * scale, 80 * scale);
        ictx.strokeStyle = '#806828';
        ictx.lineWidth = scale;
        ictx.strokeRect(rx + 115 * scale, ry + 20 * scale, 20 * scale, 80 * scale);
        // Door handle
        ictx.fillStyle = '#888';
        ictx.fillRect(rx + 130 * scale, ry + 55 * scale, 4 * scale, 8 * scale);
        // Wheels
        ictx.fillStyle = '#222';
        ictx.beginPath();
        ictx.arc(rx + 40 * scale, ry + 100 * scale, 12 * scale, 0, Math.PI * 2);
        ictx.fill();
        ictx.beginPath();
        ictx.arc(rx + 160 * scale, ry + 100 * scale, 12 * scale, 0, Math.PI * 2);
        ictx.fill();
        // Hubcaps
        ictx.fillStyle = '#555';
        ictx.beginPath();
        ictx.arc(rx + 40 * scale, ry + 100 * scale, 5 * scale, 0, Math.PI * 2);
        ictx.fill();
        ictx.beginPath();
        ictx.arc(rx + 160 * scale, ry + 100 * scale, 5 * scale, 0, Math.PI * 2);
        ictx.fill();
        // Stripe
        ictx.fillStyle = '#a08040';
        ictx.fillRect(rx, ry + 50 * scale, 200 * scale, 5 * scale);
    }

    function drawDesert() {
        // Sky gradient
        const skyGrad = ictx.createLinearGradient(0, 0, 0, groundY);
        skyGrad.addColorStop(0, '#1a0a00');
        skyGrad.addColorStop(0.3, '#3a1a08');
        skyGrad.addColorStop(0.7, '#8a4a20');
        skyGrad.addColorStop(1, '#c47830');
        ictx.fillStyle = skyGrad;
        ictx.fillRect(0, 0, W, groundY);

        // Stars
        for (let i = 0; i < 50; i++) {
            const sx = (i * 137.5 + 50) % W;
            const sy = (i * 73.3 + 20) % (groundY * 0.6);
            const brightness = 0.3 + Math.sin(frame * 0.02 + i) * 0.2;
            ictx.fillStyle = `rgba(255,255,200,${brightness})`;
            ictx.fillRect(sx, sy, 2, 2);
        }

        // Mountains (distant)
        ictx.fillStyle = '#2a1508';
        ictx.beginPath();
        ictx.moveTo(0, groundY);
        for (let x = 0; x <= W; x += 80) {
            ictx.lineTo(x, groundY - 30 - Math.sin(x * 0.005) * 50 - Math.cos(x * 0.01) * 30);
        }
        ictx.lineTo(W, groundY);
        ictx.fill();

        // Ground
        ictx.fillStyle = '#c47830';
        ictx.fillRect(0, groundY, W, H - groundY);
        // Ground texture
        ictx.fillStyle = '#a06020';
        for (let i = 0; i < 30; i++) {
            const gx = (i * 97 + 30) % W;
            const gy = groundY + 5 + (i * 53 % (H - groundY - 10));
            ictx.fillRect(gx, gy, 3 + i % 5, 1);
        }

        // Cacti
        drawCactus(W * 0.15, groundY - 5, 2);
        drawCactus(W * 0.8, groundY - 5, 1.5);
    }

    function drawCactus(cx, cy, scale) {
        ictx.fillStyle = '#2a5a1a';
        // Main body
        ictx.fillRect(cx - 4 * scale, cy - 40 * scale, 8 * scale, 40 * scale);
        // Left arm
        ictx.fillRect(cx - 15 * scale, cy - 30 * scale, 11 * scale, 5 * scale);
        ictx.fillRect(cx - 15 * scale, cy - 35 * scale, 5 * scale, 10 * scale);
        // Right arm
        ictx.fillRect(cx + 4 * scale, cy - 20 * scale, 12 * scale, 5 * scale);
        ictx.fillRect(cx + 12 * scale, cy - 28 * scale, 5 * scale, 13 * scale);
    }

    let introAnim;
    function animateIntro() {
        frame++;
        const progress = frame / totalFrames;

        ictx.clearRect(0, 0, W, H);
        drawDesert();

        const rvScale = Math.min(W / 500, H / 300) * 0.8;
        const rvX = W * 0.45;
        const rvY = groundY - 100 * rvScale;

        drawRV(rvX, rvY, rvScale);

        // Character walking (8-head-tall, smaller scale, feet on ground)
        const charScale = 2 * rvScale;
        let charX, charY;
        const charFeetY = groundY; // feet touch ground

        if (progress < 0.35) {
            // Walking from right to RV
            const walkProgress = progress / 0.35;
            charX = W * 0.9 - walkProgress * (W * 0.9 - (rvX + 115 * rvScale));
            charY = charFeetY - CHAR_H * charScale;
            drawPixelChar(charX, charY, charScale, frame * 0.12);
        } else if (progress < 0.45) {
            // Looking around
            charX = rvX + 115 * rvScale;
            charY = charFeetY - CHAR_H * charScale;
            drawPixelChar(charX, charY, charScale, 0);
            // "?" bubble
            const bubbleAlpha = Math.sin((progress - 0.35) * 100);
            if (bubbleAlpha > 0) {
                ictx.fillStyle = `rgba(255,255,255,${bubbleAlpha * 0.8})`;
                ictx.font = `${12 * rvScale}px 'Press Start 2P', monospace`;
                ictx.fillText('?', charX + CHAR_W * charScale + 4, charY - 4);
            }
        } else if (progress < 0.6) {
            // Door opening
            const doorProg = (progress - 0.45) / 0.15;
            charX = rvX + 115 * rvScale;
            charY = charFeetY - CHAR_H * charScale;
            drawPixelChar(charX, charY, charScale, 0);
            // Animate door open (yellow light from inside)
            const doorW = 20 * rvScale * (1 - doorProg * 0.3);
            ictx.fillStyle = `rgba(255,220,100,${doorProg * 0.6})`;
            ictx.fillRect(rvX + 115 * rvScale, rvY + 20 * rvScale, doorW, 80 * rvScale);
        } else if (progress < 0.75) {
            // Walking into RV
            const enterProg = (progress - 0.6) / 0.15;
            charX = rvX + 115 * rvScale;
            charY = charFeetY - CHAR_H * charScale;
            const fadeScale = charScale * (1 - enterProg * 0.5);
            ictx.globalAlpha = 1 - enterProg;
            drawPixelChar(charX, charY, fadeScale, frame * 0.1);
            ictx.globalAlpha = 1;
            // Bright interior light
            ictx.fillStyle = `rgba(255,220,100,${0.4 + enterProg * 0.3})`;
            ictx.fillRect(rvX + 115 * rvScale, rvY + 20 * rvScale, 20 * rvScale, 80 * rvScale);
        } else if (progress < 0.85) {
            // Green glow + goggles flash
            const greenProg = (progress - 0.75) / 0.1;
            // Windows glow green
            ictx.fillStyle = `rgba(0,255,100,${greenProg * 0.4})`;
            ictx.fillRect(rvX + 20 * rvScale, rvY + 15 * rvScale, 35 * rvScale, 25 * rvScale);
            ictx.fillRect(rvX + 70 * rvScale, rvY + 15 * rvScale, 35 * rvScale, 25 * rvScale);
            // Smoke from chimney
            for (let i = 0; i < 3; i++) {
                const sx = rvX + 80 * rvScale + Math.sin(frame * 0.05 + i) * 10;
                const sy = rvY - 15 * rvScale - greenProg * 30 - i * 15;
                ictx.beginPath();
                ictx.arc(sx, sy, 5 + i * 3, 0, Math.PI * 2);
                ictx.fillStyle = `rgba(100,200,100,${(1 - greenProg) * 0.3})`;
                ictx.fill();
            }
        } else {
            // Fade to lab
            const fadeProg = (progress - 0.85) / 0.15;
            // Green flash
            ictx.fillStyle = `rgba(0,255,100,${(1 - fadeProg) * 0.3})`;
            ictx.fillRect(0, 0, W, H);
            // Dark overlay
            ictx.fillStyle = `rgba(10,10,26,${fadeProg})`;
            ictx.fillRect(0, 0, W, H);
            // Text
            if (fadeProg > 0.3) {
                ictx.fillStyle = `rgba(6,182,212,${(fadeProg - 0.3) * 1.4})`;
                ictx.font = `bold ${20 * rvScale}px 'Jua', sans-serif`;
                ictx.textAlign = 'center';
                ictx.fillText('🧪 Luna Chem Lab', W / 2, H / 2);
                ictx.font = `${10 * rvScale}px 'JetBrains Mono', monospace`;
                ictx.fillStyle = `rgba(6,182,212,${(fadeProg - 0.5) * 2})`;
                ictx.fillText('"Let\'s cook... science!"', W / 2, H / 2 + 30 * rvScale);
            }
        }

        if (frame < totalFrames) {
            introAnim = requestAnimationFrame(animateIntro);
        } else {
            finishIntro();
        }
    }

    introAnim = requestAnimationFrame(animateIntro);

    // Skip button
    document.getElementById('skipBtn').onclick = () => {
        cancelAnimationFrame(introAnim);
        finishIntro();
    };
}

function finishIntro() {
    localStorage.setItem('chem-lab-intro-seen', '1');
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('labApp').style.display = 'flex';
    initLab();
}

function initLab() {
    buildChemPanel();
    updateI18n();
    updateMissionDisplay();
    document.getElementById('scoreValue').textContent = score;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

// ===== Start =====
window.addEventListener('load', () => {
    const seen = localStorage.getItem('chem-lab-intro-seen');
    if (seen) {
        finishIntro();
    } else {
        startIntro();
    }
});

// Expose for debugging
window._chem = { workbench, particles, createEquip, chemById, REACTIONS, MISSIONS, reactionLog, checkReactions, triggerExplosion, spawnParticle };

</script>
