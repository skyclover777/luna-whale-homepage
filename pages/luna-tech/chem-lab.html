<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport" />
    <title>화학 실험실 - Luna Whale TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Jua&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a1a;
            --bg2: #0e0e24;
            --cyan: #06b6d4;
            --green: #10b981;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --orange: #f59e0b;
            --red: #ef4444;
            --amber: #f59e0b;
            --acid-green: #84cc16;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --card-bg: rgba(15, 15, 40, 0.8);
            --border: rgba(6, 182, 212, 0.15);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .cyber-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* ===== Intro Screen ===== */
        #introScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200;
            background: #1a0a00;
        }
        #introCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #skipBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 201;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 8px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #skipBtn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* ===== App Container ===== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== Top Bar ===== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            backdrop-filter: blur(12px);
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 10px;
            padding: 6px 12px;
            color: var(--cyan);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(6,182,212,0.2); }
        .page-title {
            font-family: 'Jua', sans-serif;
            font-size: 20px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex: 1;
        }
        .mission-display {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .score-display {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 13px;
            color: var(--orange);
            font-weight: 600;
        }
        .lang-toggle {
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 8px;
            padding: 4px 10px;
            color: var(--cyan);
            font-size: 12px;
            cursor: pointer;
        }
        .replay-btn {
            background: rgba(236,72,153,0.1);
            border: 1px solid rgba(236,72,153,0.2);
            border-radius: 8px;
            padding: 4px 10px;
            color: var(--pink);
            font-size: 11px;
            cursor: pointer;
        }

        /* ===== Game Layout ===== */
        .game-layout {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            flex: 1;
        }

        .side-panel {
            width: 160px;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 5px;
            backdrop-filter: blur(12px);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            align-content: start;
        }
        .side-panel::-webkit-scrollbar { width: 3px; }
        .side-panel::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.2); border-radius: 3px; }

        .panel-title {
            grid-column: 1 / -1;
            font-family: 'Jua', sans-serif;
            font-size: 12px;
            color: var(--cyan);
            padding: 3px 4px;
            border-bottom: 1px solid rgba(6,182,212,0.2);
            margin-bottom: 1px;
        }
        .panel-group { grid-column: 1 / -1; font-size: 9px; color: var(--text-dim); padding: 3px 4px 1px; }

        .equip-btn, .chem-btn {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.15s;
            border: 1px solid transparent;
            position: relative;
        }
        .equip-btn { background: rgba(6,182,212,0.06); }
        .equip-btn:hover { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.3); }
        .equip-btn.active { background: rgba(6,182,212,0.2); border-color: var(--cyan); }
        .equip-btn .icon { font-size: 14px; flex-shrink: 0; }

        .chem-btn { background: rgba(132,204,22,0.06); }
        .chem-btn:hover { background: rgba(132,204,22,0.15); border-color: rgba(132,204,22,0.3); }
        .chem-btn.active { background: rgba(132,204,22,0.2); border-color: var(--acid-green); }
        .chem-btn .chem-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Tooltip on hover */
        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            left: 105%;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10,10,30,0.95);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 10px;
            color: var(--text);
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(6,182,212,0.2);
            max-width: 200px;
            white-space: normal;
            line-height: 1.4;
        }
        #chemPanel [data-tip]:hover::after {
            left: auto;
            right: 105%;
        }

        /* ===== Canvas Area ===== */
        .canvas-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .canvas-wrap {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #050510;
        }
        #labCanvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        .canvas-hud {
            position: absolute;
            top: 8px; left: 8px;
            display: flex;
            gap: 6px;
            pointer-events: none;
        }
        .hud-chip {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 10px;
            color: var(--text-dim);
            backdrop-filter: blur(4px);
        }

        /* Avatar in lab */
        .avatar-chip {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(236,72,153,0.3);
            border-radius: 10px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .avatar-face { font-size: 20px; }
        .avatar-name { font-size: 10px; color: var(--pink); }

        /* Canvas left toolbar (Photoshop style) */
        .canvas-toolbar {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: rgba(10,10,30,0.9);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .tb-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            font-size: 15px;
            position: relative;
            border: none;
            background: transparent;
            color: var(--text);
            transition: background 0.12s;
        }
        .tb-btn:hover { background: rgba(255,255,255,0.1); }
        .tb-btn.active { background: var(--cyan); color: #fff; }
        .tb-btn .tb-key {
            position: absolute;
            bottom: 1px; right: 2px;
            font-size: 7px;
            color: var(--text-dim);
            font-weight: bold;
        }
        .tb-btn.active .tb-key { color: rgba(255,255,255,0.6); }
        .tb-sep { width: 24px; height: 1px; background: rgba(255,255,255,0.08); margin: 2px auto; }

        /* Canvas bottom controls (compact) */
        .canvas-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px 6px;
        }
        .ctrl-label { font-size: 9px; color: var(--text-dim); }
        .ctrl-btn {
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 5px;
            padding: 2px 6px;
            font-size: 10px;
            color: var(--text);
            cursor: pointer;
        }
        .ctrl-btn.active { background: rgba(6,182,212,0.3); border-color: var(--cyan); }

        /* ===== Lab Notebook ===== */
        .notebook-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 12px;
            margin-top: 8px;
            max-height: 150px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
        }
        .notebook-title {
            font-family: 'Jua', sans-serif;
            font-size: 13px;
            color: var(--amber);
            margin-bottom: 6px;
            cursor: pointer;
        }
        .notebook-entry {
            font-size: 11px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            gap: 8px;
        }
        .notebook-entry .time { color: var(--text-dim); flex-shrink: 0; }
        .notebook-entry .eq { color: var(--cyan); }
        .notebook-entry .desc { color: var(--text); opacity: 0.7; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(15, 15, 40, 0.95);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            z-index: 150;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(6,182,212,0.2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.danger { border-color: var(--red); box-shadow: 0 0 30px rgba(239,68,68,0.3); }
        .toast.success { border-color: var(--green); box-shadow: 0 0 30px rgba(16,185,129,0.3); }

        /* ===== Mission Modal ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 160;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: linear-gradient(135deg, #0e0e24, #1a1a3e);
            border: 1px solid var(--cyan);
            border-radius: 16px;
            padding: 20px;
            max-width: 620px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(6,182,212,0.2);
        }
        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.3); border-radius: 4px; }
        .modal-title {
            font-family: 'Jua', sans-serif;
            font-size: 22px;
            color: var(--cyan);
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-body { font-size: 13px; line-height: 1.7; }
        .modal-close {
            display: block;
            margin: 16px auto 0;
            background: rgba(6,182,212,0.2);
            border: 1px solid var(--cyan);
            border-radius: 10px;
            padding: 8px 32px;
            color: var(--cyan);
            font-size: 14px;
            cursor: pointer;
        }

        /* ===== Mobile ===== */
        @media (max-width: 900px) {
            .game-layout { flex-direction: column; }
            .side-panel {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                max-height: none;
                overflow-y: visible;
            }
            .panel-title { width: 100%; }
            .panel-group { width: 100%; }
        }
        @media (max-width: 640px) {
            .top-bar { padding: 6px 8px; gap: 6px; }
            .page-title { font-size: 16px; }
            .mission-display { display: none; }
            .equip-btn span:not(.icon), .chem-btn span:not(.chem-dot) { display: none; }
            .equip-btn, .chem-btn { padding: 6px; justify-content: center; }
            .side-panel { padding: 6px 4px; gap: 2px; }
        }
    </style>
</head>
<body>

<!-- ===== INTRO SCREEN (Breaking Bad RV) ===== -->
<div id="introScreen">
    <canvas id="introCanvas"></canvas>
    <button id="skipBtn">SKIP ▸</button>
</div>

<!-- ===== MAIN LAB UI ===== -->
<div class="cyber-bg"></div>
<div class="scanlines"></div>

<div class="app-container" id="labApp" style="display:none;">
    <!-- Top Bar -->
    <div class="top-bar">
        <a class="back-btn" href="index.html">
            <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
            TECH
        </a>
        <div class="page-title">🧪 Luna Chem Lab</div>
        <div class="mission-display" id="missionDisplay" title="Click for missions">
            <span id="missionText">--</span>
        </div>
        <div class="score-display">⭐ <span id="scoreValue">0</span></div>
        <button class="replay-btn" id="replayBtn" title="Replay intro">🎬</button>
        <button class="lang-toggle" id="langBtn">EN</button>
    </div>

    <!-- Game Layout -->
    <div class="game-layout">
        <!-- Left Panel: Equipment (2-column grid) -->
        <div class="side-panel" id="equipPanel">
            <div class="panel-title">🔬 <span data-i18n="equip">장비</span></div>
            <div class="panel-group" data-i18n="containers">용기</div>
            <div class="equip-btn" data-type="beaker" data-tip="비커 (300mL) — 액체 혼합, 가열용. 주구로 붓기 가능"><span class="icon">🧪</span><span>비커</span></div>
            <div class="equip-btn" data-type="erlenmeyer" data-tip="삼각플라스크 (250mL) — 흔들기 좋은 형태. 반응 관찰용"><span class="icon">🧬</span><span>삼각</span></div>
            <div class="equip-btn" data-type="roundflask" data-tip="둥근바닥플라스크 (200mL) — 증류, 가열 반응용"><span class="icon">⚗️</span><span>둥근</span></div>
            <div class="equip-btn" data-type="testtube" data-tip="시험관 (50mL) — 소량 반응 테스트. 불꽃 반응에 적합"><span class="icon">🧫</span><span>시험관</span></div>
            <div class="equip-btn" data-type="cylinder" data-tip="메스실린더 (100mL) — 정확한 부피 측정용"><span class="icon">📏</span><span>메스</span></div>
            <div class="panel-group" data-i18n="heatsrc">열원</div>
            <div class="equip-btn" data-type="alcohollamp" data-tip="알코올램프 — 노란 불꽃, 약 600°C. 일반 가열용"><span class="icon">🕯️</span><span>알코올</span></div>
            <div class="equip-btn" data-type="bunsen" data-tip="분젠버너 — 파란 불꽃, 최대 1500°C. 강도 조절 가능"><span class="icon">🔥</span><span>분젠</span></div>
            <div class="panel-group" data-i18n="support">지지대</div>
            <div class="equip-btn" data-type="tripod" data-tip="삼발이+석면망 — 용기를 불꽃 위에 고정. 균일 가열"><span class="icon">🔺</span><span>삼발이</span></div>
            <div class="equip-btn" data-type="ringstand" data-tip="스탠드+클램프 — 높이 조절 가능한 지지대"><span class="icon">🗼</span><span>스탠드</span></div>
            <div class="panel-group" data-i18n="tools">도구</div>
            <div class="equip-btn" data-type="thermometer" data-tip="온도계 — 용기에 넣으면 현재 온도 표시"><span class="icon">🌡️</span><span>온도계</span></div>
            <div class="equip-btn" data-type="phstrip" data-tip="pH 시험지 — 용기에 넣으면 산성/염기성 색 변화"><span class="icon">🎨</span><span>pH지</span></div>
            <div class="equip-btn" data-type="stirrod" data-tip="유리막대 — 용기를 클릭하면 교반. 반응 촉진"><span class="icon">🥢</span><span>막대</span></div>
            <div class="equip-btn" data-type="dropper" data-tip="스포이트 — 소량(5mL) 정밀 이동"><span class="icon">💧</span><span>스포이트</span></div>
            <div class="equip-btn" data-type="scale" data-tip="저울 — 질량 측정. 위에 올려놓으면 g 표시"><span class="icon">⚖️</span><span>저울</span></div>
        </div>

        <!-- Center: Canvas -->
        <div class="canvas-area">
            <div class="canvas-wrap">
                <canvas id="labCanvas" width="1000" height="600"></canvas>
                <!-- Photoshop-style left toolbar -->
                <div class="canvas-toolbar" id="canvasToolbar">
                    <button class="tb-btn" data-action="move" title="이동 (V)">↕<span class="tb-key">V</span></button>
                    <button class="tb-btn active" data-action="place" title="배치 (P)">📌<span class="tb-key">P</span></button>
                    <button class="tb-btn" data-action="pour" title="붓기 (O)">💧<span class="tb-key">O</span></button>
                    <div class="tb-sep"></div>
                    <button class="tb-btn" data-action="ignite" id="tbIgnite" title="점화/소화 (I)">🔥<span class="tb-key">I</span></button>
                    <button class="tb-btn" data-action="seal" id="tbSeal" title="밀폐 토글 (S)">🔒<span class="tb-key">S</span></button>
                    <button class="tb-btn" data-action="stir" title="교반 (R)">🌀<span class="tb-key">R</span></button>
                    <div class="tb-sep"></div>
                    <button class="tb-btn" data-action="trash" title="삭제 (D)">🗑️<span class="tb-key">D</span></button>
                    <button class="tb-btn" data-action="clear" id="tbClear" title="전체 초기화">💣<span class="tb-key"></span></button>
                </div>
                <div class="canvas-hud">
                    <div class="hud-chip" id="hudTemp">🌡️ --°C</div>
                    <div class="hud-chip" id="hudPH">pH --</div>
                    <div class="hud-chip" id="hudFPS">FPS --</div>
                </div>
                <div class="avatar-chip">
                    <span class="avatar-face" id="avatarFace">🥽</span>
                    <span class="avatar-name">Dr. Luna</span>
                </div>
            </div>
            <div class="canvas-controls">

function getCurrentLevel() {
    // Unlock next level when 12+ missions of current level are done
    for (let lv = 7; lv >= 1; lv--) {
        const lvMissions = MISSIONS.filter(m => m.lv === lv);
        const done = lvMissions.filter(m => completedMissions.has(m.id)).length;
        if (done > 0 && lv === 7) return 7;
        if (lv < 7) {
            const needed = Math.min(12, lvMissions.length);
            if (done >= needed) return Math.min(lv + 1, 7);
        }
    }
    return 1;
}

function createEquip(type, x, y) {

    return {
        id: nextId++, type, x, y, w: def.w, h: def.h,
        contents: [], // { chemId, amount, phase, temperature }
        temperature: 25, sealed: false, cracked: false, melted: false, shattered: false,

        onSupport: null, // id of support it's on

function buildChemPanel() {
    const panel = document.getElementById('chemPanel');
    panel.innerHTML = '';
    const title = document.createElement('div');
    title.className = 'panel-title';
    title.innerHTML = '⚗️ <span data-i18n="reagents">' + t('reagents') + '</span>';
    panel.appendChild(title);

    const catOrder = ['acid','base','metal','salt','liquid','special'];
    const catNames = { acid:'acids', base:'bases', metal:'metals', salt:'salts', liquid:'liquids', special:'special' };

    catOrder.forEach(cat => {
        const grp = document.createElement('div');
        grp.className = 'panel-group';
        grp.textContent = t(catNames[cat]);
        panel.appendChild(grp);

        CHEM.filter(c => c.cat === cat).forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'chem-btn';
            btn.dataset.chem = c.id;
            const dot = document.createElement('span');
            dot.className = 'chem-dot';
            dot.style.background = `rgb(${c.color.join(',')})`;
            btn.appendChild(dot);
            const lbl = document.createElement('span');
            lbl.textContent = lang === 'en' ? c.en : c.formula;
            lbl.style.fontSize = '10px';
            btn.appendChild(lbl);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chem-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedChem = c.id;
                playSound('click');
            });
            panel.appendChild(btn);
        });
    });
}

function drawWorkbench() {
    // Dark lab bench surface
    ctx.fillStyle = '#0c0c18';
    ctx.fillRect(0, 0, CW, CH);

    // Bench grid (faint)
    ctx.strokeStyle = 'rgba(6,182,212,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < CW; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke(); }
    for (let y = 0; y < CH; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke(); }

    // Bench surface highlight
    const grad = ctx.createLinearGradient(0, CH - 80, 0, CH);
    grad.addColorStop(0, 'rgba(30,30,60,0.3)');
    grad.addColorStop(1, 'rgba(10,10,30,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, CH - 80, CW, 80);
    ctx.strokeStyle = 'rgba(6,182,212,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, CH - 80); ctx.lineTo(CW, CH - 80); ctx.stroke();
}

function drawBeaker(e) {
    const { x, y, w, h } = e;
    const topW = w, botW = w * 0.75;
    const glassAlpha = e.cracked ? 0.25 : (e.melted ? 0.15 : 0.35);
    ctx.save();

    // Glass body
    ctx.beginPath();
    ctx.moveTo(x - topW/2, y - h/2); // top-left
    ctx.lineTo(x - botW/2, y + h/2); // bottom-left
    ctx.lineTo(x + botW/2, y + h/2); // bottom-right
    ctx.lineTo(x + topW/2, y - h/2); // top-right
    ctx.closePath();

    // Fill with faint glass
    ctx.fillStyle = `rgba(150,200,255,${glassAlpha * 0.15})`;
    ctx.fill();

    // Draw liquid contents
    if (e.contents.length > 0) {
        const totalVol = e.contents.reduce((s, c) => s + c.amount, 0);
        const fillFrac = Math.min(1, totalVol / e.capacity);
        const liqH = h * fillFrac * 0.85;
        const liqY = y + h/2 - liqH;
        const liqTopW = botW + (topW - botW) * (1 - fillFrac * 0.85);
        const liqBotW = botW;

        // Mix color
        const mixColor = getMixedColor(e.contents);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x - topW/2, y - h/2);
        ctx.lineTo(x - botW/2, y + h/2);
        ctx.lineTo(x + botW/2, y + h/2);
        ctx.lineTo(x + topW/2, y - h/2);
        ctx.closePath();
        ctx.clip();

        // Liquid body
        ctx.fillStyle = `rgba(${mixColor[0]},${mixColor[1]},${mixColor[2]},0.7)`;
        const slosh = Math.sin(frameCount * 0.05 + e.sloshing) * 3 * (Math.abs(e.sloshing) > 0.1 ? 1 : 0);
        ctx.beginPath();
        ctx.moveTo(x - liqTopW/2, liqY + slosh);
        // Meniscus
        ctx.quadraticCurveTo(x, liqY - 4 + slosh, x + liqTopW/2, liqY + slosh);
        ctx.lineTo(x + botW/2, y + h/2);
        ctx.lineTo(x - botW/2, y + h/2);
        ctx.closePath();
        ctx.fill();

        // Boiling bubbles
        if (e.contents.some(s => s.temperature >= chemById[s.chemId]?.boilPt)) {
            for (let i = 0; i < 5; i++) {
                const bx = x + (Math.random() - 0.5) * botW * 0.6;
                const by = liqY + Math.random() * liqH;
                const br = 2 + Math.random() * 4;
                ctx.beginPath();
                ctx.arc(bx, by, br, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.random() * 0.3})`;
                ctx.fill();
            }
        }

        // Precipitate particles
        e.precipitateParticles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0.8)`;
            ctx.fill();
        });

        // Crystals
        e.crystals.forEach(cr => {
            drawCrystal(cr.x, cr.y, cr.size, cr.color);
        });

        ctx.restore();

        // Foam
        if (e.foamLevel > 0) {
            const foamY = liqY - e.foamLevel;
            for (let i = 0; i < e.foamLevel / 3; i++) {
                const fx = x + (Math.random() - 0.5) * topW * 0.8;
                const fy = foamY + Math.random() * e.foamLevel;
                const fr = 4 + Math.random() * 8;
                ctx.beginPath();
                ctx.arc(fx, fy, fr, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.15 + Math.random() * 0.2})`;
                ctx.fill();
            }
        }

        // Steam
        if (e.contents.some(s => s.temperature >= (chemById[s.chemId]?.boilPt || 100) * 0.9)) {
            for (let i = 0; i < 3; i++) {
                spawnParticle('smoke', x + (Math.random() - 0.5) * 30, liqY - 5,
                    (Math.random() - 0.5) * 0.5, -1 - Math.random(), 60,
                    [200, 220, 255], 8 + Math.random() * 6);
            }
        }
    }

    // Glass outline
    ctx.beginPath();
    ctx.moveTo(x - topW/2, y - h/2);
    ctx.lineTo(x - botW/2, y + h/2);
    ctx.lineTo(x + botW/2, y + h/2);
    ctx.lineTo(x + topW/2, y - h/2);
    ctx.strokeStyle = e.cracked ? 'rgba(255,100,100,0.5)' : (e.melted ? 'rgba(255,150,50,0.5)' : `rgba(150,200,255,${glassAlpha})`);
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Highlight line
    ctx.beginPath();
    ctx.moveTo(x - topW/2 + 4, y - h/2 + 5);
    ctx.lineTo(x - botW/2 + 4, y + h/2 - 5);
    ctx.strokeStyle = `rgba(255,255,255,${glassAlpha * 0.5})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Graduation marks
    for (let i = 1; i <= 4; i++) {
        const gy = y + h/2 - (i / 5) * h * 0.85;
        const gw = 8;
        const gxOff = botW/2 + (topW/2 - botW/2) * (1 - i / 5 * 0.85);
        ctx.beginPath();
        ctx.moveTo(x + gxOff - gw, gy);
        ctx.lineTo(x + gxOff, gy);
        ctx.strokeStyle = `rgba(150,200,255,${glassAlpha * 0.6})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Spout
    ctx.beginPath();
    ctx.moveTo(x + topW/2, y - h/2);
    ctx.lineTo(x + topW/2 + 8, y - h/2 - 6);
    ctx.strokeStyle = `rgba(150,200,255,${glassAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Crack lines
    if (e.cracked) {
        ctx.strokeStyle = 'rgba(255,200,200,0.6)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            const cx = x + (Math.random() - 0.5) * w * 0.6;
            const cy = y + (Math.random() - 0.5) * h * 0.6;
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + (Math.random() - 0.5) * 20, cy + (Math.random() - 0.5) * 20);
            ctx.stroke();
        }
    }

    // Heat glow
    if (e.temperature > 200) {
        const glow = Math.min(1, (e.temperature - 200) / 1000);
        ctx.fillStyle = `rgba(255,${Math.floor(150 - glow * 100)},0,${glow * 0.15})`;
        ctx.fillRect(x - w/2 - 5, y - h/2 - 5, w + 10, h + 10);
    }

    // Melting effect
    if (e.melted) {
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const dx = x - botW/2 + (botW / 4) * i;
            const dy = y + h/2 + Math.sin(frameCount * 0.03 + i) * 8 + 5;
            ctx.moveTo(dx, y + h/2);
            ctx.quadraticCurveTo(dx + 5, dy, dx + 10, y + h/2);
        }
        ctx.fillStyle = 'rgba(255,150,50,0.4)';
        ctx.fill();
    }

    // Sealed indicator
    if (e.sealed) {
        ctx.fillStyle = 'rgba(100,100,120,0.8)';
        ctx.fillRect(x - topW/2 - 2, y - h/2 - 6, topW + 4, 6);
        ctx.fillStyle = 'rgba(200,200,200,0.5)';
        ctx.font = '8px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('SEALED', x, y - h/2 - 1);
    }

    ctx.restore();
}

function drawErlenmeyer(e) {
    const { x, y, w, h } = e;
    const neckW = w * 0.25, neckH = h * 0.35;
    const bodyH = h - neckH;
    const glassAlpha = e.cracked ? 0.25 : 0.35;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x - neckW/2, y - h/2);
    ctx.lineTo(x - neckW/2, y - h/2 + neckH);
    ctx.lineTo(x - w/2, y + h/2);
    ctx.lineTo(x + w/2, y + h/2);
    ctx.lineTo(x + neckW/2, y - h/2 + neckH);
    ctx.lineTo(x + neckW/2, y - h/2);

    ctx.fillStyle = `rgba(150,200,255,${glassAlpha * 0.12})`;
    ctx.fill();

    // Liquid
    if (e.contents.length > 0) {
        const totalVol = e.contents.reduce((s, c) => s + c.amount, 0);
        const fillFrac = Math.min(1, totalVol / e.capacity);
        const mixColor = getMixedColor(e.contents);
        const liqH = bodyH * fillFrac;
        const liqY = y + h/2 - liqH;
        const liqW = w * (liqH / bodyH);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x - neckW/2, y - h/2);
        ctx.lineTo(x - neckW/2, y - h/2 + neckH);
        ctx.lineTo(x - w/2, y + h/2);
        ctx.lineTo(x + w/2, y + h/2);
        ctx.lineTo(x + neckW/2, y - h/2 + neckH);
        ctx.lineTo(x + neckW/2, y - h/2);
        ctx.clip();

        ctx.fillStyle = `rgba(${mixColor[0]},${mixColor[1]},${mixColor[2]},0.7)`;
        ctx.fillRect(x - w/2, liqY, w, liqH);
        ctx.restore();
    }

    // Outline
    ctx.beginPath();
    ctx.moveTo(x - neckW/2, y - h/2);
    ctx.lineTo(x - neckW/2, y - h/2 + neckH);
    ctx.lineTo(x - w/2, y + h/2);
    ctx.lineTo(x + w/2, y + h/2);
    ctx.lineTo(x + neckW/2, y - h/2 + neckH);
    ctx.lineTo(x + neckW/2, y - h/2);
    ctx.strokeStyle = `rgba(150,200,255,${glassAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
}

function drawTestTube(e) {
    const { x, y, w, h } = e;
    const r = w / 2;
    ctx.save();

    // Liquid
    if (e.contents.length > 0) {
        const totalVol = e.contents.reduce((s, c) => s + c.amount, 0);
        const fillFrac = Math.min(1, totalVol / e.capacity);
        const mixColor = getMixedColor(e.contents);
        const liqH = (h - r) * fillFrac;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x - r, y - h/2);
        ctx.lineTo(x - r, y + h/2 - r);
        ctx.arc(x, y + h/2 - r, r, Math.PI, 0);
        ctx.lineTo(x + r, y - h/2);
        ctx.clip();

        ctx.fillStyle = `rgba(${mixColor[0]},${mixColor[1]},${mixColor[2]},0.7)`;
        ctx.fillRect(x - r, y + h/2 - liqH - r, w, liqH + r);
        ctx.restore();
    }

    // Glass
    ctx.beginPath();
    ctx.moveTo(x - r, y - h/2);
    ctx.lineTo(x - r, y + h/2 - r);
    ctx.arc(x, y + h/2 - r, r, Math.PI, 0);
    ctx.lineTo(x + r, y - h/2);
    ctx.strokeStyle = 'rgba(150,200,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
}

function drawAlcoholLamp(e) {
    const { x, y, w, h } = e;
    ctx.save();

    // Bottle body
    const grad = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
    grad.addColorStop(0, '#3a2a1a');
    grad.addColorStop(0.5, '#5a4530');
    grad.addColorStop(1, '#3a2a1a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y + 10, w/2, h/2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,100,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Wick
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 3, y - h/2 + 5, 6, 20);
    ctx.fillStyle = '#888';
    ctx.fillRect(x - 5, y - h/2 + 20, 10, 5);

    // Flame
    if (e.lit) {
        drawFlame(x, y - h/2 - 5, e.flameIntensity / 100, 'alcohol');
    }
    ctx.restore();
}

function drawBunsen(e) {
    const { x, y, w, h } = e;
    ctx.save();

    // Base
    ctx.fillStyle = '#444';
    ctx.fillRect(x - w * 0.7, y + h/2 - 10, w * 1.4, 10);

    // Tube
    const tubeGrad = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
    tubeGrad.addColorStop(0, '#555');
    tubeGrad.addColorStop(0.5, '#777');
    tubeGrad.addColorStop(1, '#555');
    ctx.fillStyle = tubeGrad;
    ctx.fillRect(x - w/3, y - h/2 + 15, w * 2/3, h - 25);

    // Air hole
    ctx.fillStyle = '#333';
    ctx.fillRect(x - w/4, y + h/4, w/2, 8);

    // Flame
    if (e.lit) {
        drawFlame(x, y - h/2, e.flameIntensity / 100, 'bunsen');
    }
    ctx.restore();
}

function drawTripod(e) {
    const { x, y, w, h } = e;
    ctx.save();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    // Three legs
    ctx.beginPath();
    ctx.moveTo(x - w/2, y + h); ctx.lineTo(x - w/4, y); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w/2, y + h); ctx.lineTo(x + w/4, y); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y + h + 5); ctx.lineTo(x, y + 2); ctx.stroke();

    // Wire gauze
    ctx.fillStyle = 'rgba(150,150,150,0.4)';
    ctx.fillRect(x - w/2 + 5, y - 2, w - 10, 4);
    // Mesh lines
    ctx.strokeStyle = 'rgba(200,200,200,0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 8; i++) {
        const gx = x - w/2 + 8 + i * (w - 16) / 7;
        ctx.beginPath(); ctx.moveTo(gx, y - 2); ctx.lineTo(gx, y + 2); ctx.stroke();
    }
    ctx.restore();
}

function drawThermometer(e) {
    const { x, y, w, h } = e;
    ctx.save();
    // Stem
    ctx.fillStyle = 'rgba(200,220,255,0.3)';
    ctx.fillRect(x - 3, y - h/2, 6, h - 10);
    // Bulb
    ctx.beginPath();
    ctx.arc(x, y + h/2 - 8, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#c0392b';
    ctx.fill();
    // Mercury level
    const temp = e.temperature || 25;
    const mercH = Math.min(h - 20, Math.max(5, (temp / 1200) * (h - 20)));
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x - 2, y + h/2 - 14 - mercH, 4, mercH);
    // Reading
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(temp) + '°C', x, y - h/2 - 5);
    ctx.restore();
}

function drawFlame(x, y, intensity, type) {
    const h = 20 + intensity * 40;
    const w = 8 + intensity * 12;
    const t = frameCount * 0.1;

    if (type === 'bunsen') {
        // Blue inner cone
        for (let i = 0; i < 3; i++) {
            const layer = i / 2;
            const lh = h * (1 - layer * 0.3);
            const lw = w * (1 - layer * 0.2);
            const wobble = Math.sin(t + i) * 2;
            ctx.beginPath();
            ctx.moveTo(x - lw/2 + wobble, y);
            ctx.quadraticCurveTo(x + wobble * 0.5, y - lh, x + lw/2 + wobble, y);
            const r = 30 + layer * 80;
            const g = 100 + layer * 100;
            const b = 200 + layer * 55;
            ctx.fillStyle = `rgba(${r},${g},${b},${0.5 - layer * 0.15})`;
            ctx.fill();
        }
        // White tip
        ctx.beginPath();
        ctx.arc(x, y - h * 0.7, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fill();
    } else {
        // Alcohol lamp: yellow-orange
        for (let i = 0; i < 5; i++) {
            const layer = i / 4;
            const lh = h * (1 - layer * 0.3);
            const lw = w * (1 - layer * 0.15);
            const wobble = Math.sin(t * 1.3 + i * 0.7) * 3;
            ctx.beginPath();
            ctx.moveTo(x - lw/2 + wobble, y);
            ctx.quadraticCurveTo(x + wobble, y - lh, x + lw/2 + wobble, y);
            const r = 255;
            const g = Math.floor(200 - layer * 120);
            const b = Math.floor(50 - layer * 50);
            ctx.fillStyle = `rgba(${r},${g},${b},${0.4 - layer * 0.06})`;
            ctx.fill();
        }
    }

    // Glow
    const glowGrad = ctx.createRadialGradient(x, y - h * 0.3, 0, x, y - h * 0.3, h * 0.8);
    glowGrad.addColorStop(0, `rgba(255,200,50,${0.08 * intensity})`);
    glowGrad.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(x - h, y - h * 1.5, h * 2, h * 2);

    // Spark particles
    if (Math.random() < intensity * 0.3) {
        spawnParticle('spark', x + (Math.random() - 0.5) * 10, y - h * 0.5,
            (Math.random() - 0.5) * 2, -2 - Math.random() * 2, 20,
            type === 'bunsen' ? [100, 150, 255] : [255, 200, 50], 2);
    }
}

function drawCrystal(cx, cy, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
        const px = Math.cos(angle) * size;
        const py = Math.sin(angle) * size;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},0.6)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${color[0]+50},${color[1]+50},${color[2]+50},0.8)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Sparkle
    if (Math.random() < 0.05) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(-1, -1, 2, 2);
    }
    ctx.restore();
}

function getMixedColor(contents) {
    if (contents.length === 0) return [100, 160, 255];
    let r = 0, g = 0, b = 0, total = 0;
    contents.forEach(s => {
        const c = chemById[s.chemId];
        if (c) {
            r += c.color[0] * s.amount;
            g += c.color[1] * s.amount;
            b += c.color[2] * s.amount;
            total += s.amount;
        }
    });
    if (total === 0) return [100, 160, 255];
    return [Math.round(r / total), Math.round(g / total), Math.round(b / total)];
}

function drawEquipment(e) {
    switch (e.type) {
        case 'beaker': drawBeaker(e); break;
        case 'erlenmeyer': drawErlenmeyer(e); break;
        case 'roundflask': drawErlenmeyer(e); break; // similar shape
        case 'testtube': drawTestTube(e); break;
        case 'cylinder': drawTestTube(e); break; // similar
        case 'alcohollamp': drawAlcoholLamp(e); break;
        case 'bunsen': drawBunsen(e); break;
        case 'tripod': drawTripod(e); break;
        case 'ringstand': drawTripod(e); break; // simplified
        case 'thermometer': drawThermometer(e); break;
        case 'phstrip': drawPhStrip(e); break;
        case 'stirrod': drawStirRod(e); break;
        case 'dropper': drawDropper(e); break;
        case 'scale': drawScale(e); break;
        default: // fallback: simple rect
            ctx.strokeStyle = 'rgba(150,200,255,0.3)';
            ctx.strokeRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
    }
}

function drawPhStrip(e) {
    ctx.save();
    const { x, y, h } = e;
    ctx.fillStyle = '#f5f0d0';
    ctx.fillRect(x - 4, y - h/2, 8, h);
    // If measuring, show pH color
    if (e.measuredPH != null) {
        const phColor = pHtoColor(e.measuredPH);
        ctx.fillStyle = `rgb(${phColor.join(',')})`;
        ctx.fillRect(x - 4, y - h/2 + h * 0.3, 8, h * 0.5);
        ctx.fillStyle = '#fff';
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('pH ' + e.measuredPH.toFixed(1), x, y - h/2 - 5);
    }
    ctx.restore();
}

function drawStirRod(e) {
    ctx.save();
    const { x, y, h } = e;
    ctx.strokeStyle = 'rgba(200,220,255,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - h/2);
    ctx.lineTo(x, y + h/2);
    ctx.stroke();
    // Glass highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 1, y - h/2);
    ctx.lineTo(x - 1, y + h/2);
    ctx.stroke();
    ctx.restore();
}

function drawDropper(e) {
    ctx.save();
    const { x, y, h } = e;
    // Rubber bulb
    ctx.beginPath();
    ctx.ellipse(x, y - h/2 + 10, 8, 12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#c0392b';
    ctx.fill();
    // Glass tube
    ctx.strokeStyle = 'rgba(200,220,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y - h/2 + 22);
    ctx.lineTo(x, y + h/2);
    ctx.stroke();
    // Tip
    ctx.beginPath();
    ctx.moveTo(x - 3, y + h/2 - 15);
    ctx.lineTo(x, y + h/2);
    ctx.lineTo(x + 3, y + h/2 - 15);
    ctx.strokeStyle = 'rgba(200,220,255,0.5)';
    ctx.stroke();
    ctx.restore();
}

function drawScale(e) {
    ctx.save();
    const { x, y, w, h } = e;
    // Platform
    ctx.fillStyle = '#333';
    ctx.fillRect(x - w/2, y - 5, w, 10);
    // Display
    ctx.fillStyle = '#111';
    ctx.fillRect(x - 25, y - h, 50, 20);
    ctx.fillStyle = '#0f0';
    ctx.font = '11px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText((e.measuredMass || 0).toFixed(1) + 'g', x, y - h + 14);
    ctx.restore();
}

function pHtoColor(pH) {
    if (pH < 1) return [255, 0, 0];
    if (pH < 3) return [255, 100, 0];
    if (pH < 5) return [255, 200, 0];
    if (pH < 6) return [200, 255, 0];
    if (pH < 8) return [0, 200, 50];
    if (pH < 10) return [0, 100, 200];
    if (pH < 12) return [50, 0, 200];
    return [100, 0, 150];
}

// ===== Particle System =====
const MAX_PARTICLES = 500;
function spawnParticle(type, x, y, vx, vy, life, color, size) {
    if (particles.length >= MAX_PARTICLES) return;
    particles.push({ type, x, y, vx, vy, life, maxLife: life, color, size, age: 0 });
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age++;
        p.x += p.vx;
        p.y += p.vy;

        switch (p.type) {
            case 'smoke':
                p.vy *= 0.98;
                p.vx += (Math.random() - 0.5) * 0.1;
                p.size += 0.2;
                break;
            case 'bubble':
                p.vy = -0.5 - Math.random() * 0.5;
                p.vx = Math.sin(p.age * 0.1) * 0.3;
                break;
            case 'spark':
                p.vy += 0.05; // gravity
                p.life -= 0.5;
                break;
            case 'debris':
                p.vy += 0.15; // heavy gravity
                p.vx *= 0.99;
                break;
            case 'foam':
                p.vy *= 0.95;
                p.size += 0.1;
                break;
            case 'drop':
                p.vy += 0.1;
                break;
            case 'crystal':
                p.vy += 0.02; // slow settle
                p.vx *= 0.98;
                break;
        }

        p.life--;
        if (p.life <= 0 || p.age > p.maxLife) {
            particles.splice(i, 1);
        }
    }
}

function drawParticles() {
    particles.forEach(p => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save();
        switch (p.type) {
            case 'smoke':
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.15})`;
                ctx.fill();
                break;
            case 'bubble':
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
                // Highlight
                ctx.beginPath();
                ctx.arc(p.x - p.size * 0.3, p.y - p.size * 0.3, p.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
                ctx.fill();
                break;
            case 'spark':
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`;
                ctx.fillRect(p.x - 1, p.y - 1, p.size, p.size);
                // Trail
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.3})`;
                ctx.fillRect(p.x - p.vx * 2 - 1, p.y - p.vy * 2 - 1, p.size * 0.7, p.size * 0.7);
                break;
            case 'debris':
                ctx.translate(p.x, p.y);
                ctx.rotate(p.age * 0.1);
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
                break;
            case 'foam':
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.2})`;
                ctx.fill();
                break;
            case 'drop':
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.6})`;
                ctx.fill();
                break;
            case 'crystal':
                ctx.translate(p.x, p.y);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 / 6) * i;
                    const px = Math.cos(angle) * p.size;
                    const py = Math.sin(angle) * p.size;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.5})`;
                ctx.fill();
                break;
        }
        ctx.restore();
    });
}

// ===== Explosion Effect =====
let explosionState = null;
function triggerExplosion(x, y, power) {
    explosionState = { x, y, power, frame: 0, maxFrame: 90 };
    shakeDecay = power * 15;
    playSound('boom', 0.4);

    // Debris particles
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * power * 3;
        spawnParticle('debris', x, y,
            Math.cos(angle) * speed, Math.sin(angle) * speed - 2,
            60 + Math.random() * 40,
            [150, 200, 255], 3 + Math.random() * 5);
    }
    // Sparks
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * power * 4;
        spawnParticle('spark', x, y,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            30 + Math.random() * 20,
            [255, 200, 50], 2);
    }
    // Smoke
    for (let i = 0; i < 15; i++) {
        spawnParticle('smoke', x + (Math.random() - 0.5) * 40, y + (Math.random() - 0.5) * 40,
            (Math.random() - 0.5) * 1, -1 - Math.random(),
            100 + Math.random() * 60,
            [80, 80, 90], 10 + Math.random() * 15);
    }
}

function drawExplosion() {
    if (!explosionState) return;
    const e = explosionState;
    const progress = e.frame / e.maxFrame;

    if (progress < 0.05) {
        // White flash
        ctx.fillStyle = `rgba(255,255,255,${1 - progress * 20})`;
        ctx.fillRect(0, 0, CW, CH);
    }

    if (progress < 0.2) {
        // Fireball
        const radius = e.power * 50 * (progress * 5);
        const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, radius);
        grad.addColorStop(0, `rgba(255,200,50,${0.8 * (1 - progress * 5)})`);
        grad.addColorStop(0.5, `rgba(255,100,0,${0.5 * (1 - progress * 5)})`);
        grad.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(e.x - radius, e.y - radius, radius * 2, radius * 2);
    }

    if (progress > 0.05 && progress < 0.4) {
        // Shockwave ring
        const ringR = e.power * 80 * ((progress - 0.05) * 3);
        ctx.beginPath();
        ctx.arc(e.x, e.y, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,200,100,${0.5 * (1 - progress * 2.5)})`;
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    e.frame++;
    if (e.frame >= e.maxFrame) explosionState = null;
}

// ===== Physics Tick =====
function physicsTick() {
    workbench.forEach(equip => {
        const def = EQUIP_DEFS[equip.type];

        // Heat transfer from heat sources
        if (def.isHeat && equip.lit) {
            const heatRate = equip.flameIntensity / 100 * 5;
            // Find equipment above this heat source
            workbench.forEach(other => {
                if (other.id === equip.id) return;
                const dx = Math.abs(other.x - equip.x);
                const dy = equip.y - other.y; // other should be above
                if (dx < 80 && dy > 0 && dy < 200) {
                    other.temperature += heatRate * (1 - dx / 80) * (1 - dy / 200) * 0.5;
                }
            });
        }

        // Cool down towards ambient (25°C)
        if (equip.temperature > 25) {
            equip.temperature -= (equip.temperature - 25) * 0.001;
        }

        // Transfer temp to contents
        equip.contents.forEach(s => {
            s.temperature += (equip.temperature - s.temperature) * 0.05;
        });

        // Phase changes
        equip.contents.forEach(s => {
            const c = chemById[s.chemId];
            if (!c) return;
            if (s.temperature >= c.boilPt && s.phase !== 'gas') {
                s.phase = 'gas';
                if (equip.sealed) {
                    equip.pressure += 10;
                } else {
                    // Generate steam
                    s.amount -= 0.5;
                    spawnParticle('smoke', equip.x, equip.y - equip.h / 2 - 10,
                        (Math.random() - 0.5) * 0.5, -1, 60, [200, 220, 255], 8);
                }
            }
            if (s.temperature <= c.meltPt && s.phase === 'liquid') {
                s.phase = 'solid';
            }
            if (s.temperature > c.meltPt && s.phase === 'solid') {
                s.phase = 'liquid';
            }
        });

        // Remove depleted substances
        equip.contents = equip.contents.filter(s => s.amount > 0);

        // Glass damage from heat
        if (def.glass) {
            if (equip.temperature >= 600 && !equip.cracked) {
                equip.cracked = true;
                playSound('glass');
                showToast(t('glass_crack'), 'danger');
            }
            if (equip.temperature >= 1000 && !equip.shattered && !equip.melted) {
                equip.shattered = true;
                playSound('boom', 0.3);
                showToast(t('glass_shatter'), 'danger');
                triggerExplosion(equip.x, equip.y, 0.5);
                equip.contents = [];
            }
            if (equip.temperature >= 1500) {
                equip.melted = true;
            }
        }

        // Sealed pressure explosion
        if (equip.sealed && equip.pressure > 100) {
            equip.sealed = false;
            equip.shattered = true;
            triggerExplosion(equip.x, equip.y, 1.5);
            showToast(t('explosion_warn'), 'danger');
            reactionLog.push(lang === 'en' ? 'Sealed container explosion!' : '밀폐 용기 폭발!');
            equip.contents = [];
        }

        // Foam decay
        if (equip.foamLevel > 0) {
            equip.foamLevel -= 0.3;
            if (equip.foamLevel < 0) equip.foamLevel = 0;
        }

        // Precipitate settling
        equip.precipitateParticles.forEach(p => {
            p.y += 0.3;
            p.x += (Math.random() - 0.5) * 0.5;
        });

        // Crystal growth
        if (equip.contents.some(s => s.chemId === 'CuSO4' && s.temperature < 30 && s.amount > 20)) {
            if (equip.crystals.length < 15 && Math.random() < 0.005) {
                equip.crystals.push({
                    x: equip.x + (Math.random() - 0.5) * 30,
                    y: equip.y + equip.h / 2 - 10 - Math.random() * 20,
                    size: 2 + Math.random() * 3,
                    color: [30, 120, 220],
                });
            }
            equip.crystals.forEach(cr => {
                if (cr.size < 8) cr.size += 0.005;
            });
        }

        // Sloshing decay
        equip.sloshing *= 0.95;

        // Check reactions
        if (def.isContainer && equip.contents.length >= 1 && frameCount % 10 === 0) {
            checkReactions(equip);
        }
    });

    // Shake decay
    if (shakeDecay > 0) {
        shakeX = (Math.random() - 0.5) * shakeDecay;
        shakeY = (Math.random() - 0.5) * shakeDecay;
        shakeDecay *= 0.9;
        if (shakeDecay < 0.5) { shakeDecay = 0; shakeX = 0; shakeY = 0; }
    }

    // Bloom decay
    if (globalBloom > 0) globalBloom *= 0.95;

    // Update particles
    updateParticles();

    // Check missions
    if (frameCount % 60 === 0) checkMissions();
}

// ===== Reaction Checking =====
function checkReactions(equip) {
    const chemIds = equip.contents.map(s => s.chemId);
    const maxTemp = Math.max(...equip.contents.map(s => s.temperature), equip.temperature);

    for (const rule of REACTIONS) {
        const hasAll = rule.reactants.every(r => chemIds.includes(r));
        if (!hasAll) continue;
        if (rule.conditions.minTemp && maxTemp < rule.conditions.minTemp) continue;

        // Reaction happens!
        const desc = lang === 'en' ? rule.en : rule.kr;
        reactionLog.push(desc);
        addNotebookEntry(desc);
        playSound('sizzle');

        // Apply effects
        const eff = rule.effects;

        if (eff.heat) {
            equip.temperature += eff.heat;
            equip.contents.forEach(s => s.temperature += eff.heat);
        }

        if (eff.gas) {
            if (equip.sealed) {
                equip.pressure += 30;
            }
            for (let i = 0; i < 10; i++) {
                spawnParticle('bubble',
                    equip.x + (Math.random() - 0.5) * 30,
                    equip.y + (Math.random() - 0.5) * equip.h * 0.3,
                    (Math.random() - 0.5) * 0.5, -1, 40,
                    [200, 220, 255], 3 + Math.random() * 4);
            }
            playSound('bubble');
        }

        if (eff.foam) {
            equip.foamLevel = 80;
            for (let i = 0; i < 30; i++) {
                spawnParticle('foam',
                    equip.x + (Math.random() - 0.5) * 50,
                    equip.y - equip.h / 2 - Math.random() * 60,
                    (Math.random() - 0.5) * 2, -0.5 - Math.random(),
                    100 + Math.random() * 60,
                    [255, 255, 255], 5 + Math.random() * 10);
            }
            playSound('pour');
        }

        if (eff.explosion) {
            triggerExplosion(equip.x, equip.y, 2);
            equip.shattered = true;
            equip.contents = [];
            setAvatarFace('😱');
        }

        if (eff.fire) {
            for (let i = 0; i < 20; i++) {
                spawnParticle('spark',
                    equip.x + (Math.random() - 0.5) * 40,
                    equip.y - equip.h / 2,
                    (Math.random() - 0.5) * 3, -2 - Math.random() * 3,
                    40 + Math.random() * 30,
                    [255, 180, 30], 2 + Math.random() * 2);
            }
        }

        if (eff.precipitate) {
            for (let i = 0; i < 20; i++) {
                equip.precipitateParticles.push({
                    x: equip.x + (Math.random() - 0.5) * 30,
                    y: equip.y - (Math.random()) * equip.h * 0.3,
                    r: 1 + Math.random() * 2,
                    color: eff.precipitate,
                });
            }
        }

        if (eff.color) {
            // Transition contents color over time
            equip.contents.forEach(s => {
                const c = chemById[s.chemId];
                if (c) {
                    c.color = [...eff.color]; // mutate (intentional for visual feedback)
                }
            });
        }

        if (eff.bloom) {
            globalBloom = 1;
        }

        // Consume reactants (reduce amount)
        rule.reactants.forEach(rid => {
            const sub = equip.contents.find(s => s.chemId === rid);
            if (sub) sub.amount -= 10;
        });

        // Add products
        if (rule.products) {
            rule.products.forEach(pid => {
                if (pid.endsWith('_gas') || pid.endsWith('_ppt')) return; // gas escapes, ppt is visual
                const existing = equip.contents.find(s => s.chemId === pid);
                if (existing) {
                    existing.amount += 10;
                } else if (chemById[pid]) {
                    equip.contents.push({ chemId: pid, amount: 10, phase: 'liquid', temperature: equip.temperature });
                }
            });
        }

        showToast('⚗️ ' + desc, 'success');
        break; // one reaction per tick
    }
}

// ===== Mission Checking =====
function checkMissions() {
    MISSIONS.forEach(m => {
        if (completedMissions.has(m.id)) return;
        if (m.check()) {
            completedMissions.add(m.id);
            score += m.pts;
            localStorage.setItem('chem-lab-missions', JSON.stringify([...completedMissions]));
            localStorage.setItem('chem-lab-score', score);
            document.getElementById('scoreValue').textContent = score;
            showToast(`${m.emoji} ${t('mission_complete')} ${lang === 'en' ? m.en : m.kr} (+${m.pts})`, 'success');
            playSound('success');
            setAvatarFace('😄');
        }
    });
    updateMissionDisplay();
}

function updateMissionDisplay() {
    currentLevel = getCurrentLevel();
    const lvInfo = LEVEL_NAMES[currentLevel - 1];
    const lvMissions = MISSIONS.filter(m => m.lv === currentLevel);
    const lvDone = lvMissions.filter(m => completedMissions.has(m.id)).length;
    const next = MISSIONS.find(m => m.lv <= currentLevel && !completedMissions.has(m.id));
    if (next) {
        document.getElementById('missionText').textContent =
            `${lvInfo.emoji} Lv${currentLevel} ${next.emoji} ${lang === 'en' ? next.en : next.kr} (${lvDone}/${lvMissions.length})`;
    } else {
        document.getElementById('missionText').textContent = '🏆 All Complete!';
    }
}

// ===== Render Loop =====
function render() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawWorkbench();

    // Sort by Y for depth
    const sorted = [...workbench].filter(e => !e.shattered || e.melted).sort((a, b) => a.y - b.y);
    sorted.forEach(e => drawEquipment(e));

    drawParticles();
    drawExplosion();

    // Bloom overlay
    if (globalBloom > 0.01) {
        ctx.fillStyle = `rgba(255,255,240,${globalBloom * 0.4})`;
        ctx.fillRect(0, 0, CW, CH);
    }

    ctx.restore();
}

function gameLoop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;
    accumulator += Math.min(dt, 100);

    while (accumulator >= PHYSICS_DT) {
        physicsTick();
        accumulator -= PHYSICS_DT;
        frameCount++;
    }

    render();

    // HUD
    const sel = workbench.find(e => e._selected);
    if (sel) {
        document.getElementById('hudTemp').textContent = `🌡️ ${Math.round(sel.temperature)}°C`;
        if (sel.contents.length > 0) {
            const avgPH = sel.contents.reduce((s, c) => {
                const ch = chemById[c.chemId];
                return s + (ch?.pH || 7) * c.amount;
            }, 0) / sel.contents.reduce((s, c) => s + c.amount, 1);
            document.getElementById('hudPH').textContent = `pH ${avgPH.toFixed(1)}`;
        }
    }
    // FPS
    if (frameCount % 30 === 0) {
        document.getElementById('hudFPS').textContent = `FPS ${Math.round(1000 / (dt || 16))}`;
    }

    requestAnimationFrame(gameLoop);
}

// ===== Input Handling =====
let dragging = null;
let dragOffX = 0, dragOffY = 0;

function canvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CW / rect.width;
    const scaleY = CH / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return [(clientX - rect.left) * scaleX, (clientY - rect.top) * scaleY];
}

function hitTest(x, y) {
    for (let i = workbench.length - 1; i >= 0; i--) {
        const e = workbench[i];
        if (x >= e.x - e.w/2 - 10 && x <= e.x + e.w/2 + 10 &&
            y >= e.y - e.h/2 - 10 && y <= e.y + e.h/2 + 10) {
            return e;
        }
    }
    return null;
}

canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    const [mx, my] = canvasCoords(ev);
    const hit = hitTest(mx, my);

    if (actionMode === 'place' && selectedTool) {
        // Place new equipment
        const equip = createEquip(selectedTool, mx, my);
        workbench.push(equip);
        playSound('click');
        return;
    }

    if (actionMode === 'pour' && selectedChem && hit) {
        // Add chemical to container
        const def = EQUIP_DEFS[hit.type];
        if (def.isContainer) {
            const existing = hit.contents.find(s => s.chemId === selectedChem);
            if (existing) {
                existing.amount = Math.min(hit.capacity, existing.amount + 20);
            } else {
                const c = chemById[selectedChem];
                hit.contents.push({
                    chemId: selectedChem,
                    amount: 20,
                    phase: c.state25C,
                    temperature: 25,
                });
            }
            hit.sloshing = 1;
            playSound('pour');

            // Bubble animation
            for (let i = 0; i < 5; i++) {
                spawnParticle('drop',
                    hit.x + (Math.random() - 0.5) * 20,
                    hit.y - hit.h / 2,
                    (Math.random() - 0.5), 1 + Math.random(),
                    20, chemById[selectedChem]?.color || [100, 160, 255], 2);
            }
        }
        return;
    }

    if (actionMode === 'trash' && hit) {
        workbench = workbench.filter(e => e.id !== hit.id);
        playSound('whoosh');
        return;
    }

    if (actionMode === 'move' && hit) {
        dragging = hit;
        dragOffX = mx - hit.x;
        dragOffY = my - hit.y;
        return;
    }

    // Default: select
    workbench.forEach(e => e._selected = false);
    if (hit) {
        hit._selected = true;
        // If tool selected, apply measurement
        if (selectedTool === 'thermometer') {
            hit.temperature; // already shown in HUD
        }
        if (selectedTool === 'phstrip' && hit.contents.length > 0) {
            const avgPH = hit.contents.reduce((s, c) => s + (chemById[c.chemId]?.pH || 7) * c.amount, 0) /
                hit.contents.reduce((s, c) => s + c.amount, 1);
            // Create a pH strip near the container
            const strip = createEquip('phstrip', hit.x + hit.w / 2 + 15, hit.y);
            strip.measuredPH = avgPH;
            workbench.push(strip);
            playSound('click');
        }
    }
});

canvas.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    ev.preventDefault();
    const [mx, my] = canvasCoords(ev);
    dragging.x = mx - dragOffX;
    dragging.y = my - dragOffY;
    dragging.sloshing = 0.5;
});

// ===== Canvas Toolbar Actions =====
function setAction(action) {
    // Special actions (not modes)
    if (action === 'ignite') {
        const sel = workbench.find(e => e._selected && EQUIP_DEFS[e.type].isHeat);
        if (sel) { sel.lit = !sel.lit; if (sel.lit) playSound('flame'); }
        else { workbench.filter(e => EQUIP_DEFS[e.type].isHeat).forEach(e => { e.lit = !e.lit; }); playSound('flame'); }
        return;
    }
    if (action === 'seal') {
        const sel = workbench.find(e => e._selected && EQUIP_DEFS[e.type].isContainer);
        if (sel) { sel.sealed = !sel.sealed; playSound('click'); }
        return;
    }
    if (action === 'stir') {
        const sel = workbench.find(e => e._selected && EQUIP_DEFS[e.type].isContainer);
        if (sel) { sel.sloshing = 2; playSound('pour'); }
        return;
    }
    if (action === 'clear') {
        workbench = []; particles = []; explosionState = null;
        shakeDecay = 0; globalBloom = 0; playSound('whoosh');
        return;
    }
    // Mode actions
    actionMode = action;
    document.querySelectorAll('.tb-btn[data-action]').forEach(b => {
        const a = b.dataset.action;
        b.classList.toggle('active', a === action && !['ignite','seal','stir','clear'].includes(a));
    });
    if (action === 'pour') {
        selectedTool = null;
        document.querySelectorAll('.equip-btn').forEach(b => b.classList.remove('active'));
    }
    playSound('click');
}

    // Legend: 1=hair, H=hairSide, F=skin, E=eye, M=mouth/beard, B=jacket, b=jacketDark,
    //         W=shirt, J=jeans, j=jeansDark, S=shoe, G=goatee, N=neck
    const charFrames = [
      [ // Frame 0 (standing / walk phase A)

        '...BB.WWWW.BB...',
