<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna Science - 태양계 탐험</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0a0a1a;
    --cyan: #06b6d4;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --panel-bg: rgba(10, 10, 40, 0.92);
    --border: rgba(6, 182, 212, 0.2);
}

body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
}

/* ── TOP BAR ── */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(10, 10, 30, 0.95);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
    height: 52px;
}
.top-bar .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--cyan); text-decoration: none; font-size: 14px;
    font-family: 'Jua', sans-serif;
    transition: opacity 0.2s;
}
.top-bar .back-btn:hover { opacity: 0.7; }
.top-bar .title {
    font-family: 'Jua', sans-serif;
    font-size: 20px;
    background: linear-gradient(135deg, #06b6d4, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.top-bar .view-toggle {
    display: flex; gap: 4px;
}
.view-toggle button {
    padding: 5px 14px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    cursor: pointer; border-radius: 4px; transition: all 0.2s;
}
.view-toggle button.active {
    background: var(--cyan); color: #000; border-color: var(--cyan);
}

/* ── CANVAS ── */
.canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
}
canvas#solar {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
}
canvas#solar:active { cursor: grabbing; }

/* ── SPEED CONTROL (overlay bottom-left) ── */
.speed-control {
    position: absolute;
    bottom: 70px; left: 20px;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    backdrop-filter: blur(12px);
    z-index: 50;
    font-size: 12px;
}
.speed-control label { color: var(--text-dim); }
.speed-control input[type=range] {
    width: 120px; accent-color: var(--cyan);
}
.speed-val { color: var(--cyan); font-weight: 600; min-width: 36px; text-align: right; }

/* ── COMPARE MODE BUTTON ── */
.compare-btn {
    position: absolute;
    bottom: 70px; right: 20px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text);
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    z-index: 50;
    transition: all 0.25s;
}
.compare-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.compare-btn.active { background: rgba(6,182,212,0.15); border-color: var(--cyan); color: var(--cyan); }

/* ── ZOOM BUTTONS (overlay) ── */
.zoom-controls {
    position: absolute;
    bottom: 120px; left: 20px;
    display: flex; flex-direction: column; gap: 4px;
    z-index: 50;
}
.zoom-controls button {
    width: 36px; height: 36px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
}
.zoom-controls button:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── TOOLTIP ── */
.tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 60;
    white-space: nowrap;
}
.tooltip.show { opacity: 1; }
.tooltip .tt-name {
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    color: var(--cyan);
    margin-bottom: 2px;
}
.tooltip .tt-info { color: var(--text-dim); }

/* ── INFO PANEL (right side) ── */
.info-panel {
    position: absolute;
    top: 0; right: 0;
    width: 340px; height: 100%;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(20px);
    z-index: 80;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 24px;
    display: flex; flex-direction: column;
}
.info-panel.open { transform: translateX(0); }

.info-panel .close-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
}
.info-panel .close-btn:hover { color: #f87171; border-color: #f87171; }

.info-planet-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin-bottom: 12px;
    box-shadow: 0 0 30px rgba(6,182,212,0.3);
}
.info-panel h2 {
    font-family: 'Jua', sans-serif;
    font-size: 24px;
    margin-bottom: 4px;
}
.info-panel .en-name {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
}
.info-panel .data-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 12px;
    margin-bottom: 20px;
    font-size: 13px;
}
.data-grid .label { color: var(--text-dim); }
.data-grid .value { color: var(--text); }
.info-panel h3 {
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    color: var(--cyan);
    margin-bottom: 8px;
}
.info-panel .features {
    list-style: none;
    margin-bottom: 20px;
}
.info-panel .features li {
    padding: 4px 0;
    font-size: 13px;
    color: var(--text);
}
.info-panel .features li::before {
    content: '•';
    color: var(--cyan);
    margin-right: 8px;
}
.info-panel .fun-fact {
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.15);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.6;
    font-family: 'Jua', sans-serif;
}
.info-panel .fun-fact .fact-title {
    color: #fbbf24;
    font-size: 14px;
    margin-bottom: 6px;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 12px;
    background: rgba(10, 10, 30, 0.95);
    border-top: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
    overflow-x: auto;
    height: 52px;
}
.planet-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.planet-btn:hover { border-color: var(--border); color: var(--text); }
.planet-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(6,182,212,0.08); }
.planet-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}

/* ── COMPARISON OVERLAY ── */
.compare-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,20,0.97);
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    overflow-y: auto;
    padding: 24px 20px;
}
.compare-overlay.show {
    opacity: 1;
    pointer-events: auto;
}
.compare-overlay h2 {
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    color: var(--cyan);
    margin-bottom: 16px;
    flex-shrink: 0;
}
.compare-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 900px;
    flex-shrink: 0;
    padding: 20px 10px 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}
.compare-planet {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
    border-radius: 10px;
    padding: 10px 8px 8px;
    border: 2px solid transparent;
    min-width: 60px;
}
.compare-planet:hover {
    transform: translateY(-5px);
    filter: brightness(1.1);
}
.compare-planet.cp-selected {
    border-color: rgba(251,191,36,0.6);
    background: rgba(251,191,36,0.08);
    box-shadow: 0 0 16px rgba(251,191,36,0.15);
}
.compare-planet .cp-circle {
    border-radius: 50%;
    flex-shrink: 0;
}
.compare-planet .cp-name {
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    margin-top: 6px;
    text-align: center;
}
.compare-planet .cp-size {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
}
.compare-planet .cp-shrink {
    font-size: 9px;
    color: #64748b;
}
/* Info card for selected planet */
.compare-info-card {
    width: 100%;
    max-width: 700px;
    background: rgba(6,182,212,0.06);
    border: 1px solid rgba(6,182,212,0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 16px;
    flex-shrink: 0;
    display: none;
}
.compare-info-card.visible { display: block; }
.compare-info-card .ci-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}
.compare-info-card .ci-name {
    font-family: 'Jua', sans-serif;
    font-size: 18px;
    color: var(--cyan);
}
.compare-info-card .ci-size {
    font-size: 13px;
    color: var(--text-dim);
}
.compare-info-card .ci-facts {
    list-style: none;
    padding: 0;
}
.compare-info-card .ci-facts li {
    padding: 5px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}
.compare-info-card .ci-facts li:last-child { border-bottom: none; }
.compare-info-card .ci-facts li::before {
    content: '▸';
    color: #a78bfa;
    margin-right: 8px;
}
.compare-close {
    margin-top: 20px;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}
.compare-close:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── LEVEL TABS ── */
.level-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.level-btn {
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.25s;
    white-space: nowrap;
}
.level-btn:hover { border-color: var(--cyan); color: var(--text); }
.level-btn.active {
    background: rgba(6,182,212,0.15);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(6,182,212,0.25);
}

/* Level section in info panel */
.info-panel .level-section {
    margin-top: 8px;
    margin-bottom: 16px;
}
.info-panel .level-section .level-title {
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    color: #a78bfa;
    margin-bottom: 10px;
}
.info-panel .level-section .level-facts {
    list-style: none;
    padding: 0;
}
.info-panel .level-section .level-facts li {
    padding: 5px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}
.info-panel .level-section .level-facts li:last-child { border-bottom: none; }
.info-panel .level-section .level-facts li::before {
    content: '▸';
    color: #a78bfa;
    margin-right: 8px;
}

/* Compare overlay level section */
.compare-level-area {
    margin-bottom: 12px;
    text-align: center;
    flex-shrink: 0;
}
.compare-level-area .level-tabs {
    justify-content: center;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.2); border-radius: 3px; }

@media (max-width: 768px) {
    .info-panel { width: 100%; }
    .bottom-bar { gap: 2px; }
    .planet-btn { font-size: 11px; padding: 5px 7px; }
    .planet-btn .dot { width: 6px; height: 6px; }
    .speed-control { bottom: 62px; left: 10px; padding: 6px 10px; }
    .speed-control input[type=range] { width: 80px; }
    .compare-btn { bottom: 62px; right: 10px; font-size: 12px; padding: 6px 12px; }
    .zoom-controls { bottom: 108px; left: 10px; }
    .compare-overlay { padding: 16px 10px; }
    .compare-row { gap: 6px; justify-content: flex-start; }
    .compare-planet { padding: 6px 4px; min-width: 50px; }
    .compare-planet .cp-name { font-size: 11px; }
    .compare-planet .cp-size { font-size: 9px; }
    .compare-info-card { padding: 14px 16px; }
    .compare-info-card .ci-facts li { font-size: 12px; }
}
</style>
<script src="../../assets/js/luna-nav.js"></script>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <a class="back-btn" href="index.html" id="backBtn">&#9664; 돌아가기</a>
    <div class="title">&#127756; 태양계 탐험</div>
    <div class="view-toggle">
        <button class="active">2D</button>
        <button disabled style="opacity:0.35" title="준비 중">3D</button>
    </div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="canvasWrap">
    <canvas id="solar"></canvas>

    <!-- Speed -->
    <div class="speed-control">
        <label>속도</label>
        <input type="range" id="speedSlider" min="0.1" max="20" step="0.1" value="1"/>
        <span class="speed-val" id="speedVal">1x</span>
    </div>

    <!-- Zoom -->
    <div class="zoom-controls">
        <button id="zoomIn" title="확대">+</button>
        <button id="zoomOut" title="축소">&#x2212;</button>
        <button id="zoomReset" title="초기화">&#x25CE;</button>
    </div>

    <!-- Compare -->
    <button class="compare-btn" id="compareBtn">&#128207; 크기 비교</button>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tt-name"></div>
        <div class="tt-info"></div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <button class="close-btn" id="infoPanelClose">&times;</button>
        <canvas class="info-planet-icon" id="infoPlanetIcon" width="128" height="128"></canvas>
        <h2 id="infoName"></h2>
        <div class="en-name" id="infoEn"></div>
        <div class="data-grid" id="infoGrid"></div>
        <h3>&#x2728; 특징</h3>
        <ul class="features" id="infoFeatures"></ul>
        <div class="fun-fact">
            <div class="fact-title">&#128161; 재미있는 사실</div>
            <div id="infoFact"></div>
        </div>
        <h3 style="margin-top:20px">&#127891; 학습 레벨</h3>
        <div class="level-tabs" id="infoLevelTabs">
            <button class="level-btn active" data-level="elementary">초등</button>
            <button class="level-btn" data-level="middle">중등</button>
            <button class="level-btn" data-level="high">고등</button>
            <button class="level-btn" data-level="university">대학</button>
        </div>
        <div class="level-section" id="infoLevelSection">
            <div class="level-title" id="infoLevelTitle"></div>
            <ul class="level-facts" id="infoLevelFacts"></ul>
        </div>
    </div>

    <!-- Compare Overlay -->
    <div class="compare-overlay" id="compareOverlay">
        <h2>&#128207; 행성 크기 비교</h2>
        <div class="compare-level-area">
            <div class="level-tabs" id="compareLevelTabs">
                <button class="level-btn active" data-level="elementary">초등</button>
                <button class="level-btn" data-level="middle">중등</button>
                <button class="level-btn" data-level="high">고등</button>
                <button class="level-btn" data-level="university">대학</button>
            </div>
        </div>
        <div class="compare-row" id="compareRow"></div>
        <div class="compare-info-card" id="compareInfoCard">
            <div class="ci-header">
                <canvas id="ciIcon" width="64" height="64" style="width:32px;height:32px;border-radius:50%;"></canvas>
                <span class="ci-name" id="ciName"></span>
                <span class="ci-size" id="ciSize"></span>
            </div>
            <ul class="ci-facts" id="ciFacts"></ul>
        </div>
        <button class="compare-close" id="compareClose">돌아가기</button>
    </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar"></div>

<script>
/* ============================================================
   Luna Science - 2D Solar System
   ============================================================ */

// ── PLANET KNOWLEDGE BY LEVEL ──
const PLANET_KNOWLEDGE = {
    sun: {
        elementary: {
            title: '태양 알아보기',
            facts: [
                '태양은 엄청나게 큰 불덩어리예요!',
                '지구에서 빛이 오는 데 8분 걸려요',
                '태양이 없으면 지구는 꽁꽁 얼어요',
                '태양은 스스로 빛나는 별이에요',
            ]
        },
        middle: {
            title: '태양의 과학',
            facts: [
                '분류: G2V 주계열성 (황색 왜성)',
                '나이: 약 46억 년 (수명의 절반)',
                '구성: 수소 73%, 헬륨 25%, 기타 2%',

                '표면 온도: 약 5,505°C',
                '매초 수소 6억 톤을 헬륨으로 핵융합',
            ]
        },
        high: {
            title: '태양의 물리학',
            facts: [
                '핵융합: 양성자-양성자 연쇄반응 (pp chain)',
                '광도: 3.828 × 10²⁶ W',
                '태양풍: 초속 400~800km의 하전 입자 흐름',
                '흑점 주기: 약 11년 (자기장 극성 반전은 22년)',
                '코로나: 표면보다 온도가 높음 (100만~300만°C) → 코로나 가열 문제',
            ]
        },
        university: {
            title: '태양의 고급 천문학',
            facts: [
                'pp chain: 4¹H → ⁴He + 2e⁺ + 2νₑ + 26.73 MeV',
                '태양 중성미자 문제: MSW 효과 (중성미자 진동)로 해결',
                '태양 지진학(Helioseismology): 내부 자전 차등 회전 프로파일 측정',
                '타코클라인(Tachocline): 복사층-대류층 경계, 자기장 다이나모 기원',
                '파커 태양 탐사선: 코로나 직접 진입, 알벤 임계면 통과 확인',
            ]
        }
    },
    mercury: {
        elementary: {
            title: '수성 알아보기',
            facts: [
                '태양에서 가장 가까운 행성이에요',
                '크기가 아주 작아요 (달보다 조금 커요)',

const canvas = document.getElementById('solar');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

let W, H, dpr;
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let viewX = 0, viewY = 0;
let zoom = 1;
const MIN_ZOOM = 0.3, MAX_ZOOM = 4;
let time = 0;
let speedMul = 1;
let selectedPlanet = null;
let compareMode = false;

// Stars
const stars = [];
for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * 4000 - 2000,
        y: Math.random() * 4000 - 2000,
        r: Math.random() * 1.2 + 0.3,
        a: Math.random() * 0.6 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 2 + 0.5,
    });
}

// Planet positions cache
const planetPositions = [];

function getCenterX() { return W / 2 + viewX; }
function getCenterY() { return H / 2 + viewY; }

// ── DRAW ──
function drawStars() {
    for (const s of stars) {
        const sx = (s.x - (W/2 - getCenterX()) * 0.1) * zoom + W/2;
        const sy = (s.y - (H/2 - getCenterY()) * 0.1) * zoom + H/2;
        if (sx < -10 || sx > W+10 || sy < -10 || sy > H+10) continue;
        const flicker = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkle);
        ctx.beginPath();
        ctx.arc(sx, sy, s.r * zoom, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a * flicker})`;
        ctx.fill();
    }
}

function drawSun(cx, cy) {
    const pulse = 1 + 0.03 * Math.sin(time * 2);
    const r = SUN.size * zoom * pulse;

    // Outer glow
    const glow3 = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 3);
    glow3.addColorStop(0, 'rgba(251,191,36,0.12)');
    glow3.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(cx, cy, r * 3, 0, Math.PI * 2);
    ctx.fillStyle = glow3;
    ctx.fill();

    // Mid glow
    const glow2 = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 1.8);
    glow2.addColorStop(0, 'rgba(251,191,36,0.25)');
    glow2.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = glow2;
    ctx.fill();

    // Corona rays
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 0.1);
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const len = r * (1.4 + 0.3 * Math.sin(time * 3 + i));
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * r * 0.9, Math.sin(angle) * r * 0.9);
        ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        ctx.strokeStyle = `rgba(251,191,36,${0.15 + 0.1 * Math.sin(time*2+i)})`;
        ctx.lineWidth = 2 * zoom;
        ctx.stroke();
    }
    ctx.restore();

    // Sun body gradient
    const grad = ctx.createRadialGradient(cx - r*0.2, cy - r*0.2, r*0.1, cx, cy, r);
    grad.addColorStop(0, '#fff7ed');
    grad.addColorStop(0.3, '#fbbf24');
    grad.addColorStop(0.7, '#f59e0b');
    grad.addColorStop(1, '#d97706');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Sun label
    if (zoom > 0.5) {
        ctx.fillStyle = '#fbbf24';
        ctx.font = `${Math.max(11, 13 * zoom)}px Jua`;
        ctx.textAlign = 'center';
        ctx.fillText('태양', cx, cy + r + 16 * zoom);
    }
}

function drawOrbit(cx, cy, r) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4 * zoom, 6 * zoom]);
    ctx.stroke();
    ctx.setLineDash([]);
}

// ── REALISTIC PLANET RENDERING HELPERS ──
function drawCraters(ctx, x, y, r) {
    const craters = [
        {dx:-0.3,dy:0.2,s:0.15},{dx:0.2,dy:-0.1,s:0.1},{dx:0.1,dy:0.3,s:0.08},
        {dx:-0.15,dy:-0.3,s:0.07},{dx:0.35,dy:0.15,s:0.06},{dx:-0.05,dy:0.1,s:0.12}
    ];
    craters.forEach(c => {
        const cx2 = x + c.dx*r, cy2 = y + c.dy*r, cr = c.s*r;
        // Crater shadow
        ctx.beginPath();
        ctx.arc(cx2, cy2, cr, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fill();
        // Crater rim highlight
        ctx.beginPath();
        ctx.arc(cx2 - cr*0.2, cy2 - cr*0.2, cr*0.7, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(160,150,140,0.15)';
        ctx.fill();
    });
}

function drawVenusClouds(ctx, x, y, r) {
    // Swirly cloud bands
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.clip();
    for (let i = -3; i <= 3; i++) {
        const yOff = i * r * 0.28;
        ctx.beginPath();
        ctx.ellipse(x + Math.sin(time*0.5 + i)*r*0.1, y + yOff, r*1.1, r*0.08, 0.1*i, 0, Math.PI*2);
        ctx.fillStyle = `rgba(230,200,120,${0.12 + Math.abs(i)*0.02})`;
        ctx.fill();
    }
    ctx.restore();
}

function drawContinents(ctx, x, y, r) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.clip();
    // Ocean is already the base color
    // Green continent blobs
    ctx.fillStyle = 'rgba(34,139,34,0.5)';
    ctx.beginPath(); ctx.arc(x-r*0.2, y-r*0.15, r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*0.15, y+r*0.2, r*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*0.3, y-r*0.25, r*0.13, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.35, y+r*0.1, r*0.1, 0, Math.PI*2); ctx.fill();
    // White cloud wisps
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath(); ctx.ellipse(x-r*0.1, y-r*0.35, r*0.25, r*0.06, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+r*0.2, y+r*0.1, r*0.2, r*0.05, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x-r*0.25, y+r*0.3, r*0.18, r*0.04, 0.1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawPolarCap(ctx, x, y, r) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.clip();
    // North polar cap
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(x, y - r*0.78, r*0.4, r*0.18, 0, 0, Math.PI*2);
    ctx.fill();
    // Surface texture - darker patches
    ctx.fillStyle = 'rgba(120,50,20,0.15)';
    ctx.beginPath(); ctx.arc(x+r*0.2, y+r*0.15, r*0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.25, y-r*0.1, r*0.15, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawJupiterDetailed(ctx, x, y, r) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.clip();
    // Cloud bands with realistic colors
    const bands = [
        { offset: -0.7, color: '#c4a45a', h: 0.14 },
        { offset: -0.5, color: '#8B6914', h: 0.1 },
        { offset: -0.3, color: '#dbb870', h: 0.15 },
        { offset: -0.1, color: '#a07830', h: 0.1 },
        { offset: 0.1, color: '#e0c080', h: 0.15 },
        { offset: 0.3, color: '#907020', h: 0.1 },
        { offset: 0.5, color: '#c8a050', h: 0.14 },
        { offset: 0.7, color: '#8B6914', h: 0.1 },
    ];
    bands.forEach(b => {
        ctx.fillStyle = b.color + 'bb';
        ctx.fillRect(x - r, y + b.offset * r - b.h * r * 0.5, r * 2, b.h * r);
    });
    // Great Red Spot
    ctx.beginPath();
    const spotX = x + r*0.25, spotY = y + r*0.2;
    const spotGrad = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, r*0.2);
    spotGrad.addColorStop(0, '#c0392bcc');
    spotGrad.addColorStop(0.6, '#a0302888');
    spotGrad.addColorStop(1, 'transparent');
    ctx.ellipse(spotX, spotY, r*0.22, r*0.13, 0, 0, Math.PI*2);
    ctx.fillStyle = spotGrad;
    ctx.fill();
    ctx.restore();
}

function drawSaturnRings(ctx, x, y, r) {
    // Detailed rings with gaps
    const ringInner = r * 1.3;
    const ringOuter = r * 2.2;
    const ringTilt = 0.3;
    ctx.save();
    // Ring behind planet
    ctx.beginPath();
    ctx.ellipse(x, y, ringOuter, ringOuter * ringTilt, -0.15, Math.PI, Math.PI * 2);
    ctx.ellipse(x, y, ringInner, ringInner * ringTilt, -0.15, Math.PI * 2, Math.PI, true);
    ctx.closePath();
    const ringGrad = ctx.createLinearGradient(x - ringOuter, y, x + ringOuter, y);
    ringGrad.addColorStop(0, 'rgba(212,164,96,0.3)');
    ringGrad.addColorStop(0.3, 'rgba(212,180,120,0.5)');
    ringGrad.addColorStop(0.45, 'rgba(180,140,80,0.15)'); // Cassini Division
    ringGrad.addColorStop(0.55, 'rgba(180,140,80,0.15)');
    ringGrad.addColorStop(0.7, 'rgba(200,170,110,0.45)');
    ringGrad.addColorStop(1, 'rgba(212,164,96,0.3)');
    ctx.fillStyle = ringGrad;
    ctx.fill();
    ctx.restore();
    return { ringInner, ringOuter, ringTilt };
}

function drawRealisticPlanetBody(ctx, px, py, sz, planet) {
    // 3D sphere gradient
    const grad = ctx.createRadialGradient(
        px - sz*0.3, py - sz*0.3, sz*0.1,
        px, py, sz
    );

    switch(planet.id) {
        case 'mercury':
            grad.addColorStop(0, '#c0b0a0');
            grad.addColorStop(0.6, '#8a8078');
            grad.addColorStop(1, '#4a4a4a');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 4) drawCraters(ctx, px, py, sz);
            break;
        case 'venus':
            grad.addColorStop(0, '#f5e0a0');
            grad.addColorStop(0.5, '#d4a860');
            grad.addColorStop(1, '#9a7020');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 5) drawVenusClouds(ctx, px, py, sz);
            break;
        case 'earth':
            grad.addColorStop(0, '#6bb5ff');
            grad.addColorStop(0.5, '#3080d0');
            grad.addColorStop(1, '#1a4a76');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 5) drawContinents(ctx, px, py, sz);
            break;
        case 'mars':
            grad.addColorStop(0, '#e8935a');
            grad.addColorStop(0.5, '#c06030');
            grad.addColorStop(1, '#6b2500');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 4) drawPolarCap(ctx, px, py, sz);
            break;
        case 'jupiter':
            grad.addColorStop(0, '#f0d090');
            grad.addColorStop(0.5, '#c09848');
            grad.addColorStop(1, '#7a5818');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 6) drawJupiterDetailed(ctx, px, py, sz);
            break;
        case 'saturn':
            grad.addColorStop(0, '#f5e8c0');
            grad.addColorStop(0.5, '#d0b470');
            grad.addColorStop(1, '#907828');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            break;
        case 'uranus':
            grad.addColorStop(0, '#b8ecec');
            grad.addColorStop(0.5, '#60b8b8');
            grad.addColorStop(1, '#2a7070');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 6) drawUranusFeatures(ctx, px, py, sz);
            break;
        case 'neptune':
            grad.addColorStop(0, '#7898ff');
            grad.addColorStop(0.5, '#4060d0');
            grad.addColorStop(1, '#1a2b6b');
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            if (sz > 6) drawNeptuneFeatures(ctx, px, py, sz);
            break;
        default:
            grad.addColorStop(0, lightenColor(planet.color, 40));
            grad.addColorStop(1, planet.color);
            ctx.beginPath();
            ctx.arc(px, py, sz, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
    }

    // Specular highlight for 3D look
    const spec = ctx.createRadialGradient(
        px - sz*0.3, py - sz*0.3, 0,
        px - sz*0.3, py - sz*0.3, sz*0.6
    );
    spec.addColorStop(0, 'rgba(255,255,255,0.25)');
    spec.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI*2);
    ctx.fillStyle = spec;
    ctx.fill();

    // Terminator (dark edge on right side for lighting)
    const term = ctx.createLinearGradient(px - sz, py, px + sz, py);
    term.addColorStop(0, 'transparent');
    term.addColorStop(0.7, 'transparent');
    term.addColorStop(1, 'rgba(0,0,0,0.25)');
    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI*2);
    ctx.fillStyle = term;
    ctx.fill();
}

function drawPlanet(planet, index) {
    const cx = getCenterX();
    const cy = getCenterY();
    const orbitR = planet.orbitR * zoom;
    const angle = time * planet.speed * 0.3;
    const px = cx + orbitR * Math.cos(angle);
    const py = cy + orbitR * Math.sin(angle);
    const sz = Math.max(planet.size * zoom, 3);

    // Draw orbit
    drawOrbit(cx, cy, orbitR);

    // AU label on orbit (right side)
    if (zoom > 0.6) {
        const au = (planet.orbitR / 125).toFixed(1); // Earth=1AU at orbitR=125
        const lx = cx + orbitR + 4;
        const ly = cy - 3;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.font = `${9 * Math.min(zoom, 1.2)}px JetBrains Mono`;
        ctx.textAlign = 'left';
        ctx.fillText(au + ' AU', lx, ly);
    }

    // Saturn detailed rings (behind planet)
    let saturnRingData = null;
    if (planet.id === 'saturn' && sz > 4) {
        saturnRingData = drawSaturnRings(ctx, px, py, sz);
    } else if (planet.ringColor && planet.id !== 'saturn') {
        // Legacy ring for other ringed planets
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(px, py, sz + planet.ringWidth * zoom, (sz + planet.ringWidth * zoom) * 0.3, -0.3, Math.PI, Math.PI * 2);
        ctx.strokeStyle = planet.ringColor + '99';
        ctx.lineWidth = Math.max(2 * zoom, 1.5);
        ctx.stroke();
        ctx.restore();
    }

    // Planet glow
    const glow = ctx.createRadialGradient(px, py, sz * 0.3, px, py, sz * 2.5);
    glow.addColorStop(0, planet.color + '30');
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(px, py, sz * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Realistic planet body
    drawRealisticPlanetBody(ctx, px, py, sz, planet);

    // Saturn detailed rings (front)
    if (saturnRingData) {
        drawSaturnRingsFront(ctx, px, py, sz, saturnRingData);
    } else if (planet.ringColor && planet.id !== 'saturn') {
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(px, py, sz + planet.ringWidth * zoom, (sz + planet.ringWidth * zoom) * 0.3, -0.3, 0, Math.PI);
        ctx.strokeStyle = planet.ringColor + '99';
        ctx.lineWidth = Math.max(2 * zoom, 1.5);
        ctx.stroke();
        ctx.restore();
    }

    // Earth's moon
    if (planet.moon) {
        const moonAngle = time * planet.moon.speed * 0.3;
        const mOrbitR = planet.moon.orbitR * zoom;
        const mx = px + mOrbitR * Math.cos(moonAngle);
        const my = py + mOrbitR * Math.sin(moonAngle);
        const ms = Math.max(planet.moon.size * zoom, 1.5);

        // Moon orbit
        ctx.beginPath();
        ctx.arc(px, py, mOrbitR, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // Realistic moon
        const moonGrad = ctx.createRadialGradient(mx - ms*0.3, my - ms*0.3, ms*0.1, mx, my, ms);
        moonGrad.addColorStop(0, '#e8e4e0');
        moonGrad.addColorStop(0.5, '#c0b8b0');
        moonGrad.addColorStop(1, '#808080');
        ctx.beginPath();
        ctx.arc(mx, my, ms, 0, Math.PI * 2);
        ctx.fillStyle = moonGrad;
        ctx.fill();
    }

    // Label
    if (zoom > 0.4) {
        const fontSize = Math.max(12, 13 * zoom);
        ctx.font = `bold ${fontSize}px Jua`;
        ctx.textAlign = 'center';
        const labelY = py + sz + 16 * Math.min(zoom, 1.5);
        const labelText = planet.kr;
        const textW = ctx.measureText(labelText).width;
        // Background box for readability
        ctx.fillStyle = 'rgba(10,10,30,0.7)';
        const pad = 3;
        const bx = px - textW/2 - pad, by = labelY - fontSize + 1, bw = textW + pad*2, bh = fontSize + pad;
        ctx.beginPath();
        if (ctx.roundRect) { ctx.roundRect(bx, by, bw, bh, 3); }
        else { ctx.rect(bx, by, bw, bh); }
        ctx.fill();
        // Text with shadow
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 4;
        ctx.fillStyle = '#ffffff';
        ctx.fillText(labelText, px, labelY);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
    }

    // Store position for hit detection
    planetPositions[index] = { x: px, y: py, r: Math.max(sz, 12) };
}

function lightenColor(hex, amt) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    r = Math.min(255, r + amt);
    g = Math.min(255, g + amt);
    b = Math.min(255, b + amt);
    return `rgb(${r},${g},${b})`;
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Faint grid
    if (zoom > 0.6) {
        ctx.strokeStyle = 'rgba(255,255,255,0.015)';
        ctx.lineWidth = 1;
        const step = 50 * zoom;
        const offX = (getCenterX() * zoom) % step + (W / 2) % step;
        const offY = (getCenterY() * zoom) % step + (H / 2) % step;
        // Only draw if step > 10 to avoid clutter
        if (step > 15) {
            for (let x = (offX % step) - step; x < W + step; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
            }
            for (let y = (offY % step) - step; y < H + step; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
            }
        }
    }

    drawStars();
    drawSun(getCenterX(), getCenterY());

    for (let i = 0; i < PLANETS.length; i++) {
        drawPlanet(PLANETS[i], i);
    }

    // Highlight selected
    if (selectedPlanet !== null && selectedPlanet >= 0) {
        const pos = planetPositions[selectedPlanet];
        if (pos) {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, pos.r + 6, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(6,182,212,0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }
    // Highlight sun if selected
    if (selectedPlanet === -1) {
        const cx = getCenterX(), cy = getCenterY();
        const r = SUN.size * zoom * (1 + 0.03 * Math.sin(time * 2));
        ctx.beginPath();
        ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(6,182,212,0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    time += 0.016 * speedMul;
    requestAnimationFrame(draw);
}

// ── HIT TEST ──
function hitTest(mx, my) {
    // Check sun
    const cx = getCenterX(), cy = getCenterY();
    const sunR = SUN.size * zoom;
    if (Math.hypot(mx - cx, my - cy) < sunR + 10) return -1;

    // Check planets (reverse for top-most)
    for (let i = PLANETS.length - 1; i >= 0; i--) {
        const p = planetPositions[i];
        if (p && Math.hypot(mx - p.x, my - p.y) < p.r + 4) return i;
    }
    return null;
}

// ── MOUSE / TOUCH ──
let isDragging = false;
let dragStartX, dragStartY, dragViewX, dragViewY;
let didDrag = false;

canvas.addEventListener('mousedown', e => {
    isDragging = true;
    didDrag = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
});

window.addEventListener('mousemove', e => {
    if (isDragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) + Math.abs(dy) > 5) didDrag = true;
        viewX = dragViewX + dx / zoom;
        viewY = dragViewY + dy / zoom;
    }

    // Tooltip
    if (!isDragging && !compareMode) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const hit = hitTest(mx, my);
        const tooltip = document.getElementById('tooltip');
        if (hit !== null) {
            const data = hit === -1 ? SUN : PLANETS[hit];
            tooltip.querySelector('.tt-name').textContent = data.kr + ' ' + data.en;
            if (hit === -1) {
                tooltip.querySelector('.tt-info').textContent = '크기: ' + data.realSize.toLocaleString() + ' km | ' + data.temp;
            } else {
                tooltip.querySelector('.tt-info').textContent = '거리: ' + data.dist + ' | 공전: ' + data.orbit;
            }
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
            tooltip.classList.add('show');
            canvas.style.cursor = 'pointer';
        } else {
            tooltip.classList.remove('show');
            canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
        }
    }
});

window.addEventListener('mouseup', e => {
    if (isDragging && !didDrag) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const hit = hitTest(mx, my);
        if (hit !== null) {
            playSFX('click');
            showInfo(hit);
        } else {
            closeInfo();
        }
    }
    isDragging = false;
});

// Touch
let touchStartDist = 0;
let touchStartZoom = 1;

canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
        isDragging = true;
        didDrag = false;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        dragViewX = viewX;
        dragViewY = viewY;
    }
    if (e.touches.length === 2) {
        isDragging = false;
        touchStartDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        touchStartZoom = zoom;
    }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        const dx = e.touches[0].clientX - dragStartX;
        const dy = e.touches[0].clientY - dragStartY;
        if (Math.abs(dx) + Math.abs(dy) > 5) didDrag = true;
        viewX = dragViewX + dx / zoom;
        viewY = dragViewY + dy / zoom;
    }
    if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, touchStartZoom * (dist / touchStartDist)));
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    if (e.touches.length === 0 && !didDrag && isDragging) {
        // tap
        const rect = canvas.getBoundingClientRect();
        const mx = e.changedTouches[0].clientX - rect.left;
        const my = e.changedTouches[0].clientY - rect.top;
        const hit = hitTest(mx, my);
        if (hit !== null) {
            playSFX('click');
            showInfo(hit);
        } else {
            closeInfo();
        }
    }
    isDragging = false;
});

// Wheel zoom
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = -e.deltaY * 0.001;
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * (1 + delta)));
}, { passive: false });

document.getElementById('zoomOut').addEventListener('click', () => {

const compareOverlay = document.getElementById('compareOverlay');

let compareSelectedId = null;

// Distance order: Sun → Mercury → Neptune
const DISTANCE_ORDER = ['sun', 'mercury', 'venus', 'earth', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune'];

function buildComparison() {
    const row = document.getElementById('compareRow');
    const jupiterReal = 139820;
    const maxPlanetPx = 60; // Jupiter = 60px
    const sunCapPx = 72; // Sun capped display size
    const minPx = 6; // Minimum visible size

    // Build items in distance order
    const allItems = DISTANCE_ORDER.map(id => {
        if (id === 'sun') return { id:'sun', kr:'태양', en:'Sun', realSize:1392700, color:'#fbbf24', isSun:true };
        const p = PLANETS.find(pl => pl.id === id);
        return { id:p.id, kr:p.kr, en:p.en, realSize:p.realSize, color:p.color, isSun:false };
    });

    let html = '';
    for (const item of allItems) {
        let circleSize;
        if (item.isSun) {
            circleSize = sunCapPx;
        } else {
            circleSize = Math.max(minPx, Math.round((item.realSize / jupiterReal) * maxPlanetPx));
        }

        const canvasRes = Math.max(circleSize * 2, 20);
        const shrinkNote = item.isSun ? '<div class="cp-shrink">(축소)</div>' : '';
        const sizeText = item.realSize >= 1000000
            ? (item.realSize / 1000000).toFixed(2) + 'M km'
            : item.realSize.toLocaleString() + ' km';

        html += `<div class="compare-planet" data-cid="${item.id}">
            <canvas class="cp-circle" width="${canvasRes}" height="${canvasRes}" style="width:${circleSize}px;height:${circleSize}px;" data-planet-id="${item.id}" data-is-sun="${item.isSun}"></canvas>
            ${shrinkNote}
            <div class="cp-name">${item.kr}</div>
            <div class="cp-size">${sizeText}</div>
        </div>`;
    }
    row.innerHTML = html;

    // Draw realistic planets on compare canvases
    const savedZoom = zoom;
    zoom = 1;
    row.querySelectorAll('canvas[data-planet-id]').forEach(cvs => {
        const pid = cvs.dataset.planetId;
        const isSun = cvs.dataset.isSun === 'true';
        const cCtx = cvs.getContext('2d');
        const cx = cvs.width / 2, cy = cvs.height / 2;
        const r = Math.min(cx, cy) * 0.9;
        if (isSun) {
            const gr = cCtx.createRadialGradient(cx * 0.85, cy * 0.85, r * 0.1, cx, cy, r);
            gr.addColorStop(0, '#fff7ed');
            gr.addColorStop(0.3, '#fbbf24');
            gr.addColorStop(0.7, '#f59e0b');
            gr.addColorStop(1, '#d97706');
            cCtx.beginPath();
            cCtx.arc(cx, cy, r, 0, Math.PI * 2);
            cCtx.fillStyle = gr;
            cCtx.fill();
        } else {
            const planet = PLANETS.find(p => p.id === pid);
            if (planet) drawRealisticPlanetBody(cCtx, cx, cy, r, planet);
        }
    });
    zoom = savedZoom;

    // Click handler
    row.querySelectorAll('.compare-planet').forEach(el => {
        el.addEventListener('click', () => {
            const cid = el.dataset.cid;
            if (compareSelectedId === cid) {
                compareSelectedId = null;
            } else {
                compareSelectedId = cid;
            }
            updateCompareSelection();
            playSFX('click');
        });
    });

    compareSelectedId = null;
    updateCompareSelection();
}

function updateCompareSelection() {
    // Highlight selected planet
    document.querySelectorAll('.compare-planet').forEach(el => {
        el.classList.toggle('cp-selected', el.dataset.cid === compareSelectedId);
    });

    const card = document.getElementById('compareInfoCard');
    if (!compareSelectedId) {
        card.classList.remove('visible');
        return;
    }

    // Show info card
    const knowledge = PLANET_KNOWLEDGE[compareSelectedId];
    if (!knowledge || !knowledge[currentLevel]) {
        card.classList.remove('visible');
        return;
    }

    const levelData = knowledge[currentLevel];
    const itemData = compareSelectedId === 'sun' ? SUN : PLANETS.find(p => p.id === compareSelectedId);
    if (!itemData) { card.classList.remove('visible'); return; }

    document.getElementById('ciName').textContent = itemData.kr + ' (' + itemData.en + ')';
    document.getElementById('ciSize').textContent = '크기: ' + itemData.realSize.toLocaleString() + ' km';

    // Draw icon
    const ciCanvas = document.getElementById('ciIcon');
    const ciCtx = ciCanvas.getContext('2d');
    ciCtx.clearRect(0, 0, 64, 64);
    const savedZoom2 = zoom;
    zoom = 1;
    if (compareSelectedId === 'sun') {
        const gr = ciCtx.createRadialGradient(28, 28, 3, 32, 32, 28);
        gr.addColorStop(0, '#fff7ed');
        gr.addColorStop(0.3, '#fbbf24');
        gr.addColorStop(0.7, '#f59e0b');
        gr.addColorStop(1, '#d97706');
        ciCtx.beginPath();
        ciCtx.arc(32, 32, 28, 0, Math.PI * 2);
        ciCtx.fillStyle = gr;
        ciCtx.fill();
    } else {
        drawRealisticPlanetBody(ciCtx, 32, 32, 28, itemData);
    }
    zoom = savedZoom2;

    // Facts list
    document.getElementById('ciFacts').innerHTML = levelData.facts.map(f => `<li>${f}</li>`).join('');

    card.classList.add('visible');
}

function updateCompareLevel() {
    // Just refresh the info card for current selection
    updateCompareSelection();
}

// ── COMPARE LEVEL TABS ──
document.getElementById('compareLevelTabs').addEventListener('click', e => {
    const btn = e.target.closest('.level-btn');
    if (!btn) return;
    currentLevel = btn.dataset.level;
    // Sync all level tab sets
    document.querySelectorAll('.level-tabs .level-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.level === currentLevel);
    });
    updateCompareLevel();
    // Also update info panel if open
    const data = selectedPlanet === -1 ? SUN : (selectedPlanet !== null ? PLANETS[selectedPlanet] : null);
    if (data) updateInfoLevel(data.id);
    playSFX('click');
});

compareBtn.addEventListener('click', () => {
    compareMode = !compareMode;
    compareBtn.classList.toggle('active', compareMode);
    if (compareMode) {
        buildComparison();
        compareOverlay.classList.add('show');
        playSFX('whoosh');
    } else {
        compareOverlay.classList.remove('show');
    }
});
document.getElementById('compareClose').addEventListener('click', () => {
    compareMode = false;
    compareBtn.classList.remove('active');
    compareOverlay.classList.remove('show');
    playSFX('click');
});

// ── BACK BUTTON SOUND ──
document.getElementById('backBtn').addEventListener('click', () => playSFX('whoosh'));

// ── INITIAL ZOOM (fit all orbits) ──
function autoZoom() {
    const maxOrbit = PLANETS[PLANETS.length - 1].orbitR;
    const minDim = Math.min(W, H);
    zoom = Math.min(1, (minDim * 0.45) / maxOrbit);
}
autoZoom();
window.addEventListener('resize', () => { resize(); autoZoom(); });

// ── START ──
draw();
</script>
