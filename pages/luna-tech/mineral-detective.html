            ctx.beginPath(); ctx.arc(mgX,mgY,28+zp*10,0,Math.PI*2); ctx.clip();
            ctx.fillStyle='rgba(0,0,20,0.8)'; ctx.fillRect(mgX-40,mgY-40,80,80);
            // Draw cleavage pattern inside
            ctx.strokeStyle='rgba(6,182,212,0.7)'; ctx.lineWidth=1.5;
            if(cl==='perfect') {
                // Smooth parallel lines
                for(let i=0;i<8;i++) { ctx.beginPath(); ctx.moveTo(mgX-25,mgY-25+i*7); ctx.lineTo(mgX+25,mgY-25+i*7); ctx.stroke(); }
                for(let i=0;i<6;i++) { ctx.beginPath(); ctx.moveTo(mgX-25+i*10,mgY-25); ctx.lineTo(mgX-25+i*10,mgY+25); ctx.stroke(); }
            } else if(cl==='good') {
                for(let i=0;i<6;i++) { ctx.beginPath(); ctx.moveTo(mgX-25,mgY-20+i*8); ctx.lineTo(mgX+25,mgY-20+i*8+hash(i*33)*6); ctx.stroke(); }
            } else if(cl==='poor') {
                for(let i=0;i<4;i++) { ctx.beginPath(); ctx.moveTo(mgX-20+hash(i*55)*10,mgY-20+i*10); ctx.bezierCurveTo(mgX-5,mgY-15+i*10,mgX+5,mgY-20+i*10+hash(i*55+11)*8,mgX+20,mgY-20+i*10+hash(i*55+22)*10); ctx.stroke(); }
            } else { /* none - conchoidal fracture */
                for(let i=0;i<5;i++) { const r=5+i*5; ctx.beginPath(); ctx.arc(mgX+hash(i*44)*10-5,mgY+hash(i*44+11)*10-5,r,0,Math.PI*2); ctx.stroke(); }
            }
            ctx.restore();
        }
        // Result text
        if(p>0.7) {
            const cln=CLEAVAGE_N[cl]||[cl,cl];
            ctx.font='bold 22px Jua'; ctx.textAlign='center';
            ctx.fillStyle='#06b6d4';
            ctx.fillText('📐 '+t(cln[0],cln[1]),W/2,rockY-40);
            ctx.textAlign='left';
        }
    }
    else if (type==='uv') {
        const cx=rockX+rockW/2, cy=rockY+rockH/2;
        const uvv=data.u;
        // Phase 1: Darken room (0~0.2)
        const darkP=Math.min(1,p/0.2);
        ctx.fillStyle=`rgba(0,0,10,${0.7*darkP})`;
        ctx.fillRect(0,0,W,H);
        // UV Lamp
        const lampX=rockX-60, lampY=rockY-20;
        ctx.fillStyle='#333'; ctx.fillRect(lampX,lampY,15,80); // body
        ctx.fillStyle='#222'; ctx.fillRect(lampX-5,lampY+80,25,8); // base
        // UV light cone
        if(p>0.15) {
            const lp=Math.min(1,(p-0.15)/0.2);
            ctx.save(); ctx.globalAlpha=0.3*lp;
            ctx.fillStyle='rgba(120,0,255,1)';
            ctx.beginPath();
            ctx.moveTo(lampX+15,lampY+10); ctx.lineTo(cx+rockW/2,cy-rockH/2);
            ctx.lineTo(cx+rockW/2,cy+rockH/2); ctx.lineTo(lampX+15,lampY+70);
            ctx.fill();
            ctx.globalAlpha=1; ctx.restore();
        }
        // Fluorescence glow on rock (0.35~0.9)
        if(p>0.3 && uvv>0) {
            const gp=Math.min(1,(p-0.3)/0.3);
            const glowColors = [null, 'rgba(100,200,255,', 'rgba(50,255,100,', 'rgba(200,150,255,'];
            const gc = glowColors[uvv] || 'rgba(100,200,255,';
            const intensity = uvv===2 ? 0.6 : uvv===3 ? 0.7 : 0.3;
            // Glow around rock
            const glow=ctx.createRadialGradient(cx,cy,10,cx,cy,rockW*0.7);
            glow.addColorStop(0,gc+(intensity*gp)+')');
            glow.addColorStop(0.5,gc+(intensity*0.5*gp)+')');
            glow.addColorStop(1,gc+'0)');
            ctx.fillStyle=glow;
            ctx.beginPath(); ctx.arc(cx,cy,rockW*0.7,0,Math.PI*2); ctx.fill();
            // Pulsing sparkles for strong
            if(uvv>=2) {
                for(let i=0;i<12;i++) {
                    const a=Math.PI*2/12*i+p*2;
                    const d=rockW*0.3+Math.sin(p*6+i)*10;
                    const sx2=cx+Math.cos(a)*d, sy2=cy+Math.sin(a)*d;
                    ctx.fillStyle=gc+(0.8*(1-((p*3+i*0.1)%1)))+')';
                    ctx.beginPath(); ctx.arc(sx2,sy2,2+Math.sin(p*10+i)*1,0,Math.PI*2); ctx.fill();
                }
            }
            // Phosphorescence lingers
            if(uvv===3 && p>0.7) {
                const pp2=(p-0.7)/0.3;
                ctx.fillStyle=gc+(0.3*(1-pp2))+')';
                ctx.beginPath(); ctx.arc(cx,cy,rockW*0.5,0,Math.PI*2); ctx.fill();
            }
        }
        // Result text
        if(p>0.7) {
            const ul=UV_LABELS[uvv];
            ctx.font='bold 22px Jua'; ctx.textAlign='center';
            ctx.fillStyle=uvv>0?'#a855f7':'#888';
            ctx.fillText('🔮 '+t(ul[0],ul[1]),W/2,rockY-40);
            ctx.textAlign='left';
        }
    }
    else if (type==='conduct') {
        const cx=rockX+rockW/2, cy=rockY+rockH/2;
        const cv=data.c;
        // Two probes approaching from sides
        const probeP=Math.min(1,p/0.3);
        const leftX=rockX-80+probeP*60, rightX=rockX+rockW+80-probeP*60;
        // Left probe (red wire)
        ctx.strokeStyle='#e44'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(0,cy-10); ctx.lineTo(leftX,cy-10); ctx.stroke();
        ctx.fillStyle='#c33'; ctx.fillRect(leftX-2,cy-16,8,12); // probe tip
        ctx.fillStyle='#aaa'; ctx.fillRect(leftX,cy-14,4,8);
        // Right probe (black wire)
        ctx.strokeStyle='#444'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(W,cy+10); ctx.lineTo(rightX,cy+10); ctx.stroke();
        ctx.fillStyle='#333'; ctx.fillRect(rightX-6,cy+4,8,12);
        ctx.fillStyle='#aaa'; ctx.fillRect(rightX-4,cy+6,4,8);
        // Light bulb above
        const bulbX=cx, bulbY=rockY-60;
        ctx.strokeStyle='#888'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(bulbX,bulbY+15); ctx.lineTo(bulbX,bulbY+25); ctx.stroke();
        ctx.fillStyle='#aa9'; ctx.fillRect(bulbX-5,bulbY+25,10,8); // socket
        // Bulb glass
        if(cv>0 && p>0.4) {
            const lp2=Math.min(1,(p-0.4)/0.2);
            const bright = cv>=2 ? 1 : 0.5;
            ctx.fillStyle=`rgba(255,255,100,${0.8*lp2*bright})`;
            ctx.beginPath(); ctx.arc(bulbX,bulbY,14,0,Math.PI*2); ctx.fill();
            // Glow
            const glow2=ctx.createRadialGradient(bulbX,bulbY,5,bulbX,bulbY,35);
            glow2.addColorStop(0,`rgba(255,255,150,${0.3*lp2*bright})`);
            glow2.addColorStop(1,'rgba(255,255,150,0)');
            ctx.fillStyle=glow2; ctx.beginPath(); ctx.arc(bulbX,bulbY,35,0,Math.PI*2); ctx.fill();
            // Sparks between probes and rock
            if(cv>=2 && p>0.45) {
                for(let i=0;i<6;i++) {
                    const sp2=((p-0.45)*4+i*0.15)%1;
                    const sx3=leftX+8+sp2*(cx-leftX-20), sy3=cy-10+Math.sin(sp2*20+i)*8;
                    ctx.fillStyle=`rgba(100,200,255,${0.7*(1-sp2)})`;
                    ctx.fillRect(sx3-1,sy3-1,3,3);
                }
            }
            // Filament glow
            ctx.strokeStyle=`rgba(255,200,50,${0.6*lp2*bright})`; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(bulbX-4,bulbY+8); ctx.lineTo(bulbX-2,bulbY-2); ctx.lineTo(bulbX+2,bulbY+4); ctx.lineTo(bulbX+4,bulbY-4); ctx.stroke();
        } else {
            // Dark bulb
            ctx.strokeStyle='rgba(150,150,150,0.4)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.arc(bulbX,bulbY,14,0,Math.PI*2); ctx.stroke();
        }
        // Result text
        if(p>0.7) {
            const cdl=CONDUCT_LABELS[cv];
            ctx.font='bold 22px Jua'; ctx.textAlign='center';
            ctx.fillStyle=cv>0?'#f59e0b':'#888';
            ctx.fillText('⚡ '+t(cdl[0],cdl[1]),W/2,rockY-40);
            ctx.textAlign='left';
        }
    }
}

// Draw hammer tool on canvas based on type
function drawHammerTool(type, x, y, angle) {
    ctx.save();
    ctx.translate(x+15, y+25);
    ctx.rotate(angle);

    if(type==='wood') {
        // Wooden handle
        ctx.fillStyle='#8B6914'; ctx.fillRect(-3,0,6,35);
        // Wood head
        ctx.fillStyle='#A0522D'; ctx.fillRect(-12,-12,24,12);
        ctx.strokeStyle='#6B3A0A'; ctx.lineWidth=1; ctx.strokeRect(-12,-12,24,12);
    } else if(type==='steel') {
        // Steel handle
        ctx.fillStyle='#654321'; ctx.fillRect(-3,0,6,35);
        // Steel head
        ctx.fillStyle='#888'; ctx.fillRect(-14,-14,28,14);
        ctx.fillStyle='#aaa'; ctx.fillRect(-14,-14,28,3); // highlight
        ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(-14,-14,28,14);
    } else if(type==='chisel') {
        // Chisel handle
        ctx.fillStyle='#8B6914'; ctx.fillRect(-3,5,6,30);
        // Chisel blade
        ctx.fillStyle='#999'; ctx.beginPath();
        ctx.moveTo(-2,5); ctx.lineTo(2,5); ctx.lineTo(4,-8); ctx.lineTo(-4,-8);
        ctx.fill();
        ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.stroke();
        // Small hammer above
        ctx.fillStyle='#777'; ctx.fillRect(8,-6,12,8);
        ctx.fillStyle='#654321'; ctx.fillRect(12,-6,3,20);
    } else if(type==='diamond') {
        // Diamond saw handle
        ctx.fillStyle='#333'; ctx.fillRect(-3,5,6,25);
        ctx.fillStyle='#555'; ctx.fillRect(-6,5,12,6); // grip
        // Circular blade
        ctx.strokeStyle='#bbb'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,-8,14,0,Math.PI*2); ctx.stroke();
        // Diamond edge dots
        ctx.fillStyle='#8df';
        for(let i=0;i<8;i++) {
            const a=Math.PI*2/8*i;
            ctx.beginPath(); ctx.arc(Math.cos(a)*14, -8+Math.sin(a)*14, 1.5, 0, Math.PI*2); ctx.fill();
        }
    }
    ctx.restore();
}

function lerp(a,b,t) { return a+(b-a)*t; }
function flash() { const f=document.getElementById('canvasFlash'); f.classList.add('active'); setTimeout(()=>f.classList.remove('active'),200); }
function showMsg(text, dur=2000) { const m=document.getElementById('canvasMsg'); m.textContent=text; m.classList.add('show'); setTimeout(()=>m.classList.remove('show'),dur); }

// ===== Tool Actions =====
function selectTool(tool) {
    if (answered) return;
    if (animating) { animating = false; animState.type = null; } // cancel previous anim
    document.querySelectorAll('.tool-panel .tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('breakSub').classList.remove('show');
    document.getElementById('hardnessSub').classList.remove('show');

    if (curTool === tool) { curTool = null; render(); return; }
    curTool = tool;
    const btn = document.getElementById('tool-'+tool);
    if (btn) btn.classList.add('active');
    playSound('click');

    if (tool === 'break') { document.getElementById('breakSub').classList.add('show'); return; }
    if (tool === 'hardness') { document.getElementById('hardnessSub').classList.add('show'); return; }
    if (tool === 'streak') { streakPts = []; showMsg(t('도판 위를 드래그하세요!','Drag across the streak plate!')); render(); return; }

    // Auto-execute
    execTool(tool);

}

function tryBreak(type) {
    if (broken || !cur) return;
    if (animating) { animating = false; animState.type = null; } // cancel previous bounce
    const power = BREAK_POWER[type];
    const bn = BREAK_NAMES[type];
    const emojis = { wood:'🪵', steel:'🔨', chisel:'⚒️', diamond:'💎' };

    if (cur.hard <= power) {
        // Success — break!
        playSound(type==='diamond' ? 'saw' : 'hammerHit');
        broken = true;
        brokenWith = type;
        tests.break = { tool: t(bn[0],bn[1]), power, crystal: cur.crystal };
        testCount++;
        flash();
        startAnim('hammerHit', { toolType: type }, 50);
        markUsed('break');
        setTimeout(() => { eliminateByCrystal(); renderChips(); updateHud(); updateAttemptMeter(); }, 400);

        // Also gives info: broke with power X → hardness ≤ X
        if (!tests.hardness) tests.hardness = { min: 0, max: power };
        else tests.hardness.max = Math.min(tests.hardness.max, power);
        setTimeout(() => eliminateByHardness(), 500);
    } else {
        // Fail — bounces off!
        playSound('bounce');
        startAnim('hammerBounce', { toolType: type }, 55);
        showMsg(t(`${bn[0]}(으)로는 안 깨진다!`, `${bn[1]} can't break it!`));

        // This tells us: hardness > power
        if (!tests.hardness) tests.hardness = { min: power, max: 10 };
        else tests.hardness.min = Math.max(tests.hardness.min, power);

        if (!tests._hardCounted) { tests._hardCounted = true; testCount++; markUsed('hardness'); }
        setTimeout(() => { eliminateByHardness(); renderChips(); updateHud(); updateAttemptMeter(); }, 500);
    }
}

    if (tests[tool] || !cur) return;

        testCount++; markUsed('water');
        setTimeout(() => { eliminateByWater(); renderChips(); updateHud(); updateAttemptMeter(); }, 500);

function testHardness(toolH) {
    if (!cur || animating) return;
    const scratched = cur.hard <= toolH;
    playSound(scratched ? 'scratch' : 'noReact');

    if (!tests.hardnessTests) tests.hardnessTests = [];
    tests.hardnessTests.push({ tool: toolH, scratched });

    if (!tests.hardness) tests.hardness = { min: 0, max: 10 };
    if (scratched) tests.hardness.max = Math.min(tests.hardness.max, toolH);
    else tests.hardness.min = Math.max(tests.hardness.min, toolH);

    if (!tests._hardCounted) { tests._hardCounted = true; testCount++; markUsed('hardness'); }

    flash();
    showMsg(scratched ?
        t(`경도 ≤ ${toolH} (긁힘!)`, `Hardness ≤ ${toolH} (Scratched!)`) :
        t(`경도 > ${toolH} (안 긁힘)`, `Hardness > ${toolH} (No scratch)`)
    );

    eliminateByHardness();
    renderChips();
    updateHud();
    updateAttemptMeter();
    render();
}

// Streak interaction
canvas.addEventListener('pointerdown', e => {
    if (curTool !== 'streak' || tests.streak || animating) return;
    const r = canvas.getBoundingClientRect();
    const sx = W/r.width, sy = H/r.height;
    const x = (e.clientX-r.left)*sx, y = (e.clientY-r.top)*sy;
    if (y > H-70) { streakActive = true; streakPts = [[x,y]]; playSound('scratch'); }
});
canvas.addEventListener('pointermove', e => {
    if (!streakActive) return;
    const r = canvas.getBoundingClientRect();
    const x = (e.clientX-r.left)*(W/r.width), y = (e.clientY-r.top)*(H/r.height);
    streakPts.push([x, Math.max(H-60, Math.min(H-20, y))]);
    render();
});
canvas.addEventListener('pointerup', () => {
    if (!streakActive) return;
    streakActive = false;
    if (streakPts.length > 3) {
        tests.streak = { rgb: cur.streak, name: t(cur.streakN[0], cur.streakN[1]) };
        testCount++; markUsed('streak');
        eliminateByStreak();
        renderChips(); updateHud(); updateAttemptMeter();
    }
    render();
});

function markUsed(tool) {
    const btn = document.getElementById('tool-'+tool);
    if (btn) btn.classList.add('used');
}

// ===== Elimination Logic =====
function getPool() {
    const maxLv = DIFF_CONFIG[difficulty].maxLv;
    return DB.filter(m => m.lv <= maxLv);
}

function eliminateByHardness() {
    if (!tests.hardness) return;
    const { min, max } = tests.hardness;
    getPool().forEach(m => {
        if (m.hard < min || m.hard > max) eliminate(m.id);
    });
}

function eliminateByCrystal() {
    if (!tests.break) return;
    getPool().forEach(m => {
        if (m.crystal !== cur.crystal) eliminate(m.id);
    });
}

function eliminateByFlame() {
    if (!tests.flame) return;
    const hasFlame = !!tests.flame.color;
    getPool().forEach(m => {
        const mHas = !!m.flame;
        if (hasFlame !== mHas) eliminate(m.id);
        if (hasFlame && mHas) {
            // Same flame color?
            const [r1,g1,b1] = tests.flame.color;
            const [r2,g2,b2] = m.flame;
            if (Math.abs(r1-r2)+Math.abs(g1-g2)+Math.abs(b1-b2) > 100) eliminate(m.id);
        }
    });
}

function eliminateByAcid() {
    if (!tests.acid) return;
    getPool().forEach(m => {
        if (m.acidR !== tests.acid.r) eliminate(m.id);
    });
}

function eliminateByMagnet() {
    if (!tests.magnet) return;
    getPool().forEach(m => {
        if (m.magnetic !== tests.magnet.m) eliminate(m.id);
    });
}

function eliminateByLuster() {
    if (!tests.luster) return;
    getPool().forEach(m => {
        if (m.luster !== tests.luster.l) eliminate(m.id);
    });
}

function eliminateByDensity() {
    if (!tests.density) return;
    const myCat = tests.density.cat;
    getPool().forEach(m => {
        const d = m.density;
        const cat = d<2.5?0 : d<4?1 : d<8?2 : 3;
        if (cat !== myCat) eliminate(m.id);
    });
}

function eliminateByStreak() {
    if (!tests.streak) return;
    const [sr,sg,sb] = tests.streak.rgb;
    getPool().forEach(m => {
        const [mr,mg,mb] = m.streak;
        if (Math.abs(sr-mr)+Math.abs(sg-mg)+Math.abs(sb-mb) > 80) eliminate(m.id);
    });
}


function eliminateByWater() {
    if (!tests.water) return;
    const wv = tests.water.w;
    getPool().forEach(m => {
        if ((m.water||0) !== wv) eliminate(m.id);
    });
}

function eliminateByCrystalTool() {
    if (!tests.crystal) return;
    getPool().forEach(m => {
        if (m.crystal !== tests.crystal.c) eliminate(m.id);
    });
}

function eliminateByCleavage() {
    if (!tests.cleavage) return;
    getPool().forEach(m => {
        if (m.cleavage !== tests.cleavage.cl) eliminate(m.id);
    });
}

function eliminateByUV() {
    if (!tests.uv) return;
    const uv = tests.uv.u;
    getPool().forEach(m => {
        if ((m.uv||0) !== uv) eliminate(m.id);
    });
}

function eliminateByConductivity() {
    if (!tests.conduct) return;
    const cv = tests.conduct.c;
    getPool().forEach(m => {
        if ((m.conduct||0) !== cv) eliminate(m.id);
    });
}
function eliminateByTaste() {
    if (!tests.taste) return;
    const tv = tests.taste.tv;
    getPool().forEach(m => {
        if ((m.taste||0) !== tv) eliminate(m.id);
    });
}

function eliminate(id) {
    if (eliminated.has(id)) return;
    eliminated.add(id);
    playSound('eliminate');
    renderSuspects();
}

// ===== Suspect List =====
function renderSuspects() {
    const pool = getPool();
    const list = document.getElementById('suspectList');
    const remaining = pool.filter(m => !eliminated.has(m.id));

    // Group by category
    const groups = {};
    pool.forEach(m => {
        if (!groups[m.cat]) groups[m.cat] = [];
        groups[m.cat].push(m);
    });

    let html = '';
    Object.keys(groups).forEach(cat => {
        const catColor = CAT_COLORS[cat] || '#64748b';
        html += `<div class="cat-header" style="color:${catColor};border-bottom-color:${catColor}40">${cat}</div>`;
        groups[cat].forEach(m => {
            const isElim = eliminated.has(m.id);
            const isSel = selectedSuspect === m.id;
            const cls = isElim ? 'eliminated' : isSel ? 'confirmed' : '';
            const name = t(m.kr, m.en);
            html += `<div class="suspect-card ${cls}" data-id="${m.id}" onclick="selectSuspect(${m.id})" style="border-left:3px solid ${catColor}">
                <span class="suspect-emoji">${isElim ? '❌' : m.emoji}</span>
                <span class="suspect-name">${name}</span>
                <span class="suspect-info">${m.cat}</span>
            </div>`;
        });
    });
    list.innerHTML = html;

    document.getElementById('remainCount').textContent = remaining.length;

    // Enable confirm if exactly selected
    const btn = document.getElementById('confirmBtn');
    btn.disabled = !selectedSuspect || eliminated.has(selectedSuspect);

    // Auto-select if only 1 left
    if (remaining.length === 1 && !answered) {
        selectedSuspect = remaining[0].id;
        renderSuspects();
    }
}

function selectSuspect(id) {
    if (answered || eliminated.has(id)) return;
    selectedSuspect = (selectedSuspect === id) ? null : id;
    renderSuspects();
}

function confirmAnswer() {
    if (!selectedSuspect || answered) return;
    answered = true;

    const correct = selectedSuspect === cur.id;
    const cards = document.querySelectorAll('.suspect-card');

    cards.forEach(c => {
        const cid = +c.dataset.id;
        if (cid === cur.id) c.classList.add('confirmed');
        if (cid === selectedSuspect && !correct) c.classList.add('wrong-pick');
    });

    if (correct) {
        playSound('correct');
        flash();
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        const base = 10;
        const attemptMult = getMultiplier(testCount);
        const diffBonus = DIFF_CONFIG[difficulty].bonus;
        const comboMult = Math.min(4, 1 + (combo - 1) * 0.3);
        const pts = Math.round(base * attemptMult * diffBonus * comboMult);
        score += pts;
        coll.add(cur.id);
        save();
        updateCombo();
        showResult(cur, pts, comboMult);
        updateDisplays();
        document.getElementById('confirmBtn').disabled = true;
    } else {
        combo = 0;
        updateCombo();
        loseHeart();
        showMsg(t('틀렸어요! 하트 -1','Wrong! Heart -1'));
        eliminated.add(selectedSuspect);
        selectedSuspect = null;
        if (lives > 0) {
            setTimeout(() => { answered = false; renderSuspects(); }, 1200);
        }
    }
}

// checkLevelUp removed — difficulty sets pool at start

// ===== Chips =====
function renderChips() {
    const bar = document.getElementById('resultsBar');
    const chips = [];

    if (tests.break) {
        const cn = CRYSTAL_N[tests.break.crystal] || [tests.break.crystal, tests.break.crystal];
        chips.push(`<span class="result-chip">⛏️ ${tests.break.tool} → ${t(cn[0],cn[1])}</span>`);
    }
    if (tests.hardness) {
        const {min,max} = tests.hardness;
        const r = min===0 ? `≤${max}` : max===10 ? `>${min}` : `${min}~${max}`;
        chips.push(`<span class="result-chip">💎 ${t('경도','Hard')}: ${r}</span>`);
    }
    if (tests.streak) chips.push(`<span class="result-chip">📋 ${t('조흔','Streak')}: ${tests.streak.name}</span>`);
    if (tests.flame) chips.push(`<span class="result-chip">🔥 ${t('불꽃','Flame')}: ${tests.flame.name||t('없음','None')}</span>`);
    if (tests.acid) { const l=ACID_LABELS[tests.acid.r]; chips.push(`<span class="result-chip">🧪 ${t(l[0],l[1])}</span>`); }
    if (tests.magnet) chips.push(`<span class="result-chip">🧲 ${tests.magnet.m?t('끌림','Yes'):t('무반응','No')}</span>`);
    if (tests.luster) { const ln=LUSTER_N[tests.luster.l]||[tests.luster.l,tests.luster.l]; chips.push(`<span class="result-chip">💡 ${t(ln[0],ln[1])}</span>`); }
    if (tests.density) { const lb=DENSITY_LABELS[tests.density.cat]; chips.push(`<span class="result-chip">⚖️ ${t(lb[0],lb[1])}</span>`); }
    if (tests.taste) { const tl=TASTE_LABELS[tests.taste.tv]; chips.push(`<span class="result-chip">👅 ${t(tl[0],tl[1])}</span>`); }
    if (tests.water) { const wl=WATER_LABELS[tests.water.w]; chips.push(`<span class="result-chip">💧 ${t(wl[0],wl[1])}</span>`); }
    if (tests.crystal) { const cn2=CRYSTAL_N[tests.crystal.c]||[tests.crystal.c,tests.crystal.c]; chips.push(`<span class="result-chip">🔬 ${t(cn2[0],cn2[1])}</span>`); }
    if (tests.cleavage) { const cl=CLEAVAGE_N[tests.cleavage.cl]||[tests.cleavage.cl,tests.cleavage.cl]; chips.push(`<span class="result-chip">📐 ${t(cl[0],cl[1])}</span>`); }
    if (tests.uv) { const ul=UV_LABELS[tests.uv.u]; chips.push(`<span class="result-chip">🔮 UV: ${t(ul[0],ul[1])}</span>`); }
    if (tests.conduct) { const cdl=CONDUCT_LABELS[tests.conduct.c]; chips.push(`<span class="result-chip">⚡ ${t(cdl[0],cdl[1])}</span>`); }

    bar.innerHTML = chips.length > 0 ? chips.join('') : `<span class="results-empty">${t('도구를 사용하여 광석을 조사하세요','Use tools to examine the specimen')}</span>`;
}


// ===== Attempt Meter =====
function getMultiplier(attempts) {
    if(attempts<=2) return 5;
    if(attempts<=4) return 3;
    if(attempts<=6) return 2;
    if(attempts<=8) return 1;
    return 0.5;
}

function updateAttemptMeter() {
    const dots = document.querySelectorAll('.attempt-dot');
    dots.forEach((dot, i) => {
        dot.classList.remove('used','over');
        if(i < testCount) {
            dot.classList.add(i < 5 ? 'used' : 'over');
        }
    });
    const mult = getMultiplier(testCount);
    const mEl = document.getElementById('attemptMult');
    if(mEl) {
        const labels = {5:'천재!',3:'훌륭해!',2:'잘했어!',1:'보통',0.5:'감점...'};
        mEl.textContent = '×'+mult+' '+(labels[mult]||'');
        mEl.style.color = mult>=3?'var(--green)':mult>=2?'var(--cyan)':mult>=1?'var(--orange)':'var(--red)';
    }
}
// ===== HUD =====
function updateHud() {
    document.getElementById('specNum').textContent = '#'+specNum;
}

function updateDisplays() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('levelBadge').textContent = 'Lv.'+level;
    document.getElementById('collCount').textContent = coll.size + '/' + getPool().length;
}

// ===== Hearts System =====
function updateHearts() {
    document.querySelectorAll('.heart-icon').forEach((h, i) => {
        h.classList.remove('breaking', 'lost', 'danger');
        if (i >= lives) h.classList.add('lost');
        else if (lives <= 2) h.classList.add('danger');
    });
}

function loseHeart() {
    lives--;
    const hearts = document.querySelectorAll('.heart-icon');
    const target = hearts[lives];
    if (target) {
        target.classList.add('breaking');
        setTimeout(() => { target.classList.remove('breaking'); target.classList.add('lost'); }, 600);
    }
    // Add danger pulse to remaining hearts if low
    if (lives <= 2) {
        hearts.forEach((h, i) => {
            if (i < lives) h.classList.add('danger');
        });
    }
    playSound('wrong');

    if (lives <= 0) {
        setTimeout(() => showGameOver(), 1000);
    }
}

function showGameOver() {
    document.getElementById('gameoverScore').textContent = score;
    document.getElementById('gameoverFound').textContent = coll.size;
    document.getElementById('gameoverCombo').textContent = maxCombo;
    document.getElementById('gameoverDiff').textContent = DIFF_CONFIG[difficulty].label;
    document.getElementById('gameoverOverlay').classList.add('show');
}

function restartGame() {
    document.getElementById('gameoverOverlay').classList.remove('show');
    document.getElementById('startScreen').classList.remove('hidden');
}

function startGame(diff) {
    difficulty = diff;
    lives = MAX_LIVES;
    score = 0;
    combo = 0;
    maxCombo = 0;
    testCount = 0;
    specNum = 0;
    coll.clear();
    eliminated.clear();

    const cfg = DIFF_CONFIG[diff];
    level = cfg.maxLv;

    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('diffBadge').textContent = cfg.label;
    document.getElementById('diffBadge').style.display = 'inline-flex';
    updateHearts();
    updateDisplays();
    updateCombo();
    nextSpecimen();
}

function updateCombo() {
    const el = document.getElementById('comboDisplay');
    if (combo >= 2) {
        document.getElementById('comboCount').textContent = combo;
        el.style.display = 'flex';
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'comboIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    } else {
        el.style.display = 'none';
    }
}

// ===== Result Overlay =====
function showResult(m, pts, comboMult) {
    document.getElementById('resultPhoto').src = mineralImg(m);
    document.getElementById('resultPhoto').alt = m.en;
    document.getElementById('resultEmoji').textContent = m.emoji;
    document.getElementById('resultTitle').textContent = t('정답!','Correct!');
    const mult2 = getMultiplier(testCount);
    const multLabels = {5:'천재!',3:'훌륭해!',2:'잘했어!',1:'보통',0.5:'감점...'};
    const diffCfg = DIFF_CONFIG[difficulty];
    let pointsText = `+${pts} ⭐  (${testCount}${t('회 시도',' tries')} ×${mult2}`;
    if (combo >= 2) pointsText += ` | ${t('콤보','Combo')} ×${comboMult.toFixed(1)}`;
    pointsText += ` | ${diffCfg.label} ×${diffCfg.bonus})`;
    document.getElementById('resultPoints').textContent = pointsText;
    document.getElementById('resultName').textContent = `${m.kr} / ${m.en}`;

    const ln = LUSTER_N[m.luster]||[m.luster,m.luster];
    const cn = CRYSTAL_N[m.crystal]||[m.crystal,m.crystal];
    const tasteLabel = TASTE_LABELS[m.taste||0];

    const clvn = CLEAVAGE_N[m.cleavage]||[m.cleavage,m.cleavage];
    const uvLabel = UV_LABELS[m.uv||0];
    const condLabel = CONDUCT_LABELS[m.conduct||0];
    const waterLabel = WATER_LABELS[m.water||0];
    const items = [
        [t('분류','Category'), m.cat],
        [t('결정계','Crystal'), t(cn[0],cn[1])],
        [t('경도','Hardness'), `${m.hard} (Mohs)`],
        [t('밀도','Density'), `${m.density} g/cm³`],
        [t('광택','Luster'), t(ln[0],ln[1])],
        [t('벽개','Cleavage'), t(clvn[0],clvn[1])],
        [t('조흔색','Streak'), t(m.streakN[0],m.streakN[1])],
        [t('불꽃','Flame'), m.flameN ? t(m.flameN[0],m.flameN[1]) : t('없음','None')],
        [t('맛','Taste'), t(tasteLabel[0],tasteLabel[1])],
        [t('물반응','Water'), t(waterLabel[0],waterLabel[1])],
        [t('UV','UV'), t(uvLabel[0],uvLabel[1])],
        [t('전도','Conduct'), t(condLabel[0],condLabel[1])],
    ];

    document.getElementById('resultInfoGrid').innerHTML = items.map(([label,val]) =>
        `<div class="result-info-item">${label}: <span>${val}</span></div>`
    ).join('');

    document.getElementById('resultFact').textContent = t(m.factKr, m.factEn);

    // Spawn confetti particles
    const pc = document.getElementById('resultParticles');
    pc.innerHTML = '';
    const colors = ['#06b6d4','#10b981','#f59e0b','#ec4899','#8b5cf6','#ef4444'];
    for(let i=0;i<30;i++) {
        const p = document.createElement('div');
        p.className = 'result-particle';
        p.style.cssText = `left:50%;top:50%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${colors[i%colors.length]};--dx:${(Math.random()-.5)*400}px;--dy:${(Math.random()-.5)*400}px;animation-delay:${Math.random()*.5}s;`;
        pc.appendChild(p);
    }

    document.getElementById('resultOverlay').classList.add('show');
}

function closeResult() {
    document.getElementById('resultOverlay').classList.remove('show');
    nextSpecimen();
}

// ===== Codex =====
function openCodex() {
    const grid = document.getElementById('codexGrid');
    grid.innerHTML = DB.map(m => {
        const found = coll.has(m.id);
        const locked = m.lv > level;
        if (locked) return `<div class="codex-card locked"><div class="codex-emoji">🔒</div><div class="codex-name">Lv.${m.lv}</div></div>`;
        if (!found) return `<div class="codex-card"><div class="codex-emoji">❓</div><div class="codex-name">???</div></div>`;
        return `<div class="codex-card discovered"><img class="codex-photo" src="${mineralImg(m)}" alt="${m.en}"><div class="codex-name">${t(m.kr,m.en)}</div><div class="codex-detail">${t('경도','H')}:${m.hard} ${t(LUSTER_N[m.luster][0],LUSTER_N[m.luster][1])}<br>${t(m.factKr,m.factEn)}</div></div>`;
    }).join('');
    document.getElementById('codexModal').classList.add('show');
}
function closeCodex() { document.getElementById('codexModal').classList.remove('show'); }
document.getElementById('codexModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeCodex(); });

// ===== Next =====
function nextSpecimen() {
    tests = {}; testCount = 0; broken = false; brokenWith = null;
    answered = false; streakPts = []; curTool = null;
    selectedSuspect = null; eliminated = new Set();
    updateAttemptMeter();
    document.querySelectorAll('.tool-panel .tool-btn').forEach(b => b.classList.remove('active','used'));
    document.getElementById('breakSub').classList.remove('show');
    document.getElementById('hardnessSub').classList.remove('show');
    document.getElementById('nextBtn').classList.remove('show');
    document.getElementById('confirmBtn').disabled = true;
    document.getElementById('resultOverlay').classList.remove('show');
    pickMineral();
    genRockShape();
    render(); renderChips(); renderSuspects(); updateHud();
    playSound('appear');
}

function pickMineral() {
    const pool = getPool();
    let pick;
    do { pick = pool[~~(Math.random()*pool.length)]; } while (pick===cur && pool.length>1);
    cur = pick;
    specNum++;
}

// ===== Init =====
function init() {
    // Show start screen — do NOT auto-start game
    document.getElementById('startScreen').classList.remove('hidden');
    updateDisplays();
    updateHearts();
}

init();
</script>
