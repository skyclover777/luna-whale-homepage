<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport" />
    <title>Atomic Builder - Luna Whale TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Jua&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a1a;
            --cyan: #06b6d4;
            --green: #10b981;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --red: #ef4444;
            --amber: #f59e0b;
            --yellow: #eab308;
            --slate: #64748b;
            --slate-light: #94a3b8;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --card-bg: rgba(15, 15, 40, 0.8);
            --border: rgba(6, 182, 212, 0.15);
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ===== Cyber Grid Background ===== */
        .cyber-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0; pointer-events: none;
        }
        .cyber-bg::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(6,182,212,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 70%, rgba(139,92,246,0.05) 0%, transparent 70%);
            animation: gridPulse 8s ease-in-out infinite alternate;
        }
        @keyframes gridPulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ===== Header ===== */
        .game-header {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--cyan); text-decoration: none;
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(6,182,212,0.12); border-color: rgba(6,182,212,0.3); }
        .back-btn .material-symbols-outlined { font-size: 16px; }
        .game-title {
            font-family: 'Jua', sans-serif;
            font-size: clamp(16px, 3vw, 22px);
            color: #fff;
        }
        .game-title span { color: var(--cyan); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .score-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; font-weight: 700;
            color: var(--green);
            padding: 6px 16px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
        }
        .mission-counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 600;
            color: var(--purple);
            padding: 4px 12px;
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 8px;
        }

        /* ===== Level Filter Bar ===== */
        .level-bar {
            position: relative; z-index: 10;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 20px;
            background: rgba(10, 10, 30, 0.85);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .level-btn {
            padding: 5px 14px; border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim); font-size: 12px; font-weight: 600;
            font-family: 'Jua', sans-serif;
            cursor: pointer; transition: all 0.2s;
        }
        .level-btn:hover { background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.2); }
        .level-btn.active {
            background: rgba(6,182,212,0.15);
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .cat-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.08); margin: 0 4px; }
        .cat-btn {
            padding: 4px 10px; border-radius: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-dim); font-size: 11px; font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.2s;
        }
        .cat-btn:hover { background: rgba(139,92,246,0.1); }
        .cat-btn.active {
            background: rgba(139,92,246,0.12);
            border-color: var(--purple);
            color: var(--purple);
        }

        /* ===== Main Layout ===== */
        .game-container {
            position: relative; z-index: 1;
            max-width: 100%; margin: 0 auto;
            padding: 10px 16px;
            min-height: auto;
        }

        /* ===== Mission Panel ===== */
        .mission-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
        }
        .mission-text {
            font-family: 'Jua', sans-serif;
            font-size: clamp(14px, 2.5vw, 18px);
            color: #fff;
        }
        .mission-text .formula {
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }
        .mission-hint {
            font-size: 12px; color: var(--text-dim);
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .hint-atom {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 10px; border-radius: 8px;
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.15);
            font-weight: 600; font-size: 12px;
        }
        .skip-btn {
            padding: 6px 14px; border-radius: 8px;
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
            color: var(--purple); font-size: 12px; font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.2s;
        }
        .skip-btn:hover { background: rgba(139,92,246,0.2); }

        /* ===== Building Field ===== */
        .build-section {
            flex: 1; display: flex; flex-direction: column; gap: 10px;
        }
        .build-toolbar {
            display: flex; align-items: center; justify-content: space-between;
        }
        .build-label {
            font-family: 'Jua', sans-serif;
            font-size: 14px; color: var(--text-dim);
        }
        .clear-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--red); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .clear-btn:hover { background: rgba(239,68,68,0.2); }

        .build-field {
            position: relative;
            flex: 1; min-height: 260px;
            background: rgba(10, 10, 30, 0.6);
            border: 2px dashed rgba(6,182,212,0.2);
            border-radius: 16px;
            overflow: hidden;
        }
        .build-field.drag-over {
            border-color: var(--cyan);
            background: rgba(6,182,212,0.04);
        }
        /* inner grid for build field */
        .build-field::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(6,182,212,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }
        .build-field-hint {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-family: 'Jua', sans-serif;
            font-size: 16px; color: rgba(100,116,139,0.3);
            pointer-events: none;
            text-align: center; line-height: 1.6;
        }
        .build-field.has-atoms .build-field-hint { display: none; }

        /* ===== Bond lines (SVG) ===== */
        .bond-svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .bond-svg.scissor-mode { pointer-events: all; }
        .bond-line {
            stroke: var(--cyan);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 4px rgba(6,182,212,0.5));
            pointer-events: stroke;
        }
        .bond-line.double { stroke-dasharray: none; }
        .bond-line.cuttable {
            stroke-width: 14;
            stroke: transparent;
            cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><text y='20' font-size='18'>✂️</text></svg>") 12 12, crosshair;
            pointer-events: stroke;
        }
        .bond-line.cuttable-visible {
            transition: stroke 0.15s;
        }
        .bond-line.cuttable-visible:hover {
            stroke: rgba(239,68,68,0.7) !important;
            filter: drop-shadow(0 0 6px rgba(239,68,68,0.5));
        }
        /* Bond feedback icons */
        .bond-feedback {
            position: absolute; pointer-events: none; z-index: 20;
            font-size: 28px; font-weight: 800;
            animation: bondFeedbackPop 0.6s ease-out forwards;
        }
        @keyframes bondFeedbackPop {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .bond-feedback.success { color: #10b981; text-shadow: 0 0 12px rgba(16,185,129,0.6); }
        .bond-feedback.fail { color: #ef4444; text-shadow: 0 0 12px rgba(239,68,68,0.6); animation: bondFeedbackFail 0.6s ease-out forwards; }
        @keyframes bondFeedbackFail {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            40% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            60% { transform: scale(1.1) rotate(-5deg); opacity: 0.8; }
            100% { transform: scale(0.8) rotate(0deg); opacity: 0; }
        }
        /* Noble gas glow in field */
        .field-atom.noble-glow {
            animation: nobleFieldGlow 1.5s ease-out forwards;
        }
        @keyframes nobleFieldGlow {
            0% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
            30% { box-shadow: 0 0 30px 10px rgba(139,92,246,0.6), 0 0 60px 20px rgba(139,92,246,0.2); }
            100% { box-shadow: 0 0 16px 4px rgba(139,92,246,0.3); }
        }

        /* ===== Atoms in build field ===== */
        .field-atom {
            position: absolute; z-index: 5;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            cursor: grab;
            transition: box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .field-atom:active { cursor: grabbing; }
        .field-atom .atom-sym {
            font-weight: 800; color: #fff;
            text-shadow: 0 0 8px currentColor;
            line-height: 1;
        }
        .field-atom .atom-kr {
            font-family: 'Jua', sans-serif;
            font-size: 8px; color: rgba(255,255,255,0.7);
            line-height: 1;
        }
        /* Valence dots */
        .valence-dot {
            position: absolute;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 4px rgba(255,255,255,0.3);
        }
        .valence-dot.used {
            background: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 6px var(--cyan);
        }

        /* ===== Electron Orbits ===== */
        .electron-shell {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(6,182,212,0.12);
            pointer-events: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: electronOrbit linear infinite;
        }
        @keyframes electronOrbit { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .electron-dot {
            position: absolute;
            width: 3px; height: 3px;
            background: #06b6d4;
            border-radius: 50%;
            box-shadow: 0 0 4px #06b6d4, 0 0 8px rgba(6,182,212,0.3);
        }

        /* ===== Bond Electron Animations ===== */
        .bond-electron {
            position: absolute;
            width: 5px; height: 5px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }
        .bond-electron.covalent {
            background: #06b6d4;
            box-shadow: 0 0 6px #06b6d4, 0 0 12px rgba(6,182,212,0.4);
            animation: electronShared 2s ease-in-out infinite;
        }
        @keyframes electronShared {
            0% { offset-distance: 25%; }
            50% { offset-distance: 75%; }
            100% { offset-distance: 25%; }
        }
        .bond-electron.ionic-launch {
            width: 6px; height: 6px;
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b, 0 0 20px rgba(245,158,11,0.5);
            animation: ionicLaunch 0.8s ease-in forwards;
        }
        @keyframes ionicLaunch {
            0% { offset-distance: 0%; transform: scale(1); opacity: 1; }
            70% { transform: scale(1.5); opacity: 1; }
            100% { offset-distance: 100%; transform: scale(0.5); opacity: 0; }
        }
        .charge-label {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; font-weight: 800;
            pointer-events: none; z-index: 6;
            animation: chargeAppear 0.5s ease-out forwards;
        }
        @keyframes chargeAppear {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            60% { transform: scale(1.3) translateY(-5px); }
            100% { transform: scale(1) translateY(-8px); opacity: 1; }
        }
        @keyframes noblePopIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes sparkFly {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0) translateY(-20px); opacity: 0; }
        }
        .charge-glow-pos {
            box-shadow: 0 0 20px rgba(239,68,68,0.4), 0 0 40px rgba(239,68,68,0.15) !important;
        }
        .charge-glow-neg {
            box-shadow: 0 0 20px rgba(6,182,212,0.4), 0 0 40px rgba(6,182,212,0.15) !important;
        }
        .ionic-flash {
            position: absolute; pointer-events: none; z-index: 4;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,158,11,0.6) 0%, transparent 70%);
            animation: ionicFlash 0.5s ease-out forwards;
        }
        @keyframes ionicFlash {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .electron-trail {
            position: absolute; pointer-events: none; z-index: 3;
            width: 3px; height: 3px; border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 4px #f59e0b;
            opacity: 0.7;
            animation: trailFade 0.5s ease-out forwards;
        }
        @keyframes trailFade { to { opacity: 0; transform: scale(0); } }

        /* Metallic sea electrons */
        .metallic-electron {
            position: absolute; pointer-events: none; z-index: 3;
            width: 4px; height: 4px; border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 5px #f59e0b;
            animation: metallicFloat 3s ease-in-out infinite;
        }
        @keyframes metallicFloat {
            0% { transform: translate(0, 0); }
            25% { transform: translate(var(--mx1), var(--my1)); }
            50% { transform: translate(var(--mx2), var(--my2)); }
            75% { transform: translate(var(--mx3), var(--my3)); }
            100% { transform: translate(0, 0); }
        }

        /* ===== Periodic Table (real 18-col layout) ===== */
        .periodic-section {
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
        }
        .periodic-label {
            font-family: 'Jua', sans-serif;
            font-size: 13px; color: var(--text-dim);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .periodic-label::before {
            content: ''; width: 3px; height: 14px;
            background: var(--cyan); border-radius: 2px;
            box-shadow: 0 0 6px rgba(6,182,212,0.4);
        }
        .periodic-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
            display: flex;
            justify-content: center;
        }
        .periodic-scroll::-webkit-scrollbar { height: 4px; }
        .periodic-scroll::-webkit-scrollbar-track { background: transparent; }
        .periodic-scroll::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.3); border-radius: 4px; }
        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, 40px);
            grid-template-rows: repeat(7, 42px) 4px repeat(2, 42px);
            gap: 2px;
            min-width: fit-content;
            margin: 0 auto;
        }
        .ptable-cell {
            width: 40px; height: 42px;
            border-radius: 4px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: grab;
            transition: all 0.15s;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            touch-action: none;
            padding: 1px;
        }
        .ptable-cell:hover {
            transform: scale(1.35);
            z-index: 10;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 12px currentColor;
        }
        .ptable-cell:active {
            cursor: grabbing;
            transform: scale(0.95);
        }
        .ptable-cell .el-num {
            font-size: 6px; color: rgba(255,255,255,0.4);
            position: absolute; top: 1px; left: 2px;
            font-weight: 600; line-height: 1;
        }
        .ptable-cell .el-sym {
            font-size: 11px;
            font-weight: 800; color: #fff;
            line-height: 1;
            text-shadow: 0 0 4px currentColor;
        }
        .ptable-cell .el-kr {
            font-family: 'Jua', sans-serif;
            font-size: 7px;
            color: rgba(255,255,255,0.6);
            line-height: 1;
            margin-top: 1px;
        }
        .ptable-cell .el-val {
            font-size: 6px; color: rgba(255,255,255,0.3);
            position: absolute; bottom: 1px; right: 2px;
            display: none;
        }
        /* Noble gas cells - draggable */
        .ptable-cell.noble { opacity: 0.7; }
        .ptable-cell.noble:hover { opacity: 1; }
        /* Dimmed for difficulty filter */
        .ptable-cell.dimmed { opacity: 0.2; }
        .ptable-cell.dimmed:hover { transform: scale(1.1); }
        /* Highlight glow for key elements */
        .ptable-cell.highlighted { animation: ptHighlight 2s ease-in-out infinite alternate; }
        @keyframes ptHighlight {
            0% { box-shadow: 0 0 4px rgba(6,182,212,0.2); }
            100% { box-shadow: 0 0 10px rgba(6,182,212,0.5); }
        }
        /* Lanthanide/actinide gap row */
        .pt-gap { grid-column: 1 / -1; height: 4px; }
        .pt-label-cell {
            display: flex; align-items: center; justify-content: center;
            font-size: 7px; color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        /* Element tooltip */
        .el-tooltip {
            position: fixed;
            z-index: 1000;
            background: rgba(10, 10, 35, 0.95);
            border: 1px solid rgba(6,182,212,0.3);
            border-radius: 8px;
            padding: 8px 12px;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 240px;
        }
        .el-tooltip.show { opacity: 1; }
        .el-tooltip .tt-sym {
            font-weight: 800; font-size: 16px;
            margin-right: 6px;
        }
        .el-tooltip .tt-kr { font-family: 'Jua', sans-serif; }
        .el-tooltip .tt-en { color: var(--text-dim); font-size: 11px; }
        .el-tooltip .tt-info { color: var(--text-dim); font-size: 10px; }
        .el-tooltip .tt-desc { margin-top: 4px; font-size: 9px; color: #94a3b8; line-height: 1.4; }

        /* Legend */
        .periodic-legend {
            display: flex; gap: 6px; margin-top: 6px;
            flex-wrap: wrap; justify-content: center;
        }
        .legend-item {
            display: flex; align-items: center; gap: 4px;
            font-size: 9px; color: var(--text-dim);
            cursor: pointer; position: relative;
            padding: 2px 4px; border-radius: 4px;
            transition: background 0.2s;
        }
        .legend-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .legend-desc {
            position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%);
            background: rgba(15,15,40,0.95);
            border: 1px solid rgba(6,182,212,0.3);
            color: #e2e8f0; font-size: 11px;
            padding: 10px 14px; border-radius: 10px;
            width: 220px; line-height: 1.5;
            font-family: 'Jua', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: none; z-index: 200;
            opacity: 0; transition: opacity 0.2s;
        }
        .legend-item:hover .legend-desc {
            opacity: 1;
        }
        .legend-dot {
            width: 8px; height: 8px; border-radius: 2px;
        }

        /* Remove button */
        .remove-btn {
            display: flex; align-items: center; gap: 6px;

            cursor: pointer; transition: all 0.2s;

        .guide-popup {

            border-radius: 16px;

            color: var(--text);

        }

            border-radius: 50%; background: rgba(16,185,129,0.2);
            border: 1px solid rgba(16,185,129,0.3);

            font-size: 11px; font-weight: 700; color: var(--green);

            margin-top: 10px; padding: 8px 12px;
            background: rgba(6,182,212,0.08);
            border: 1px solid rgba(6,182,212,0.15);
            border-radius: 8px;
            font-size: 12px; color: var(--cyan);

        .guide-popup .guide-close {
            margin-top: 12px;

        .molecule-card {

        .molecule-card::before {

            z-index: -1;
        }
        .molecule-card::after {
            content: '';
            position: absolute; top: 1px; left: 1px; right: 1px; bottom: 1px;
            background: rgba(15, 15, 45, 0.97);
            border-radius: 19px; z-index: -1;

            50% { background-position: 100% 50%; }

            border: 1px solid rgba(16,185,129,0.25);

        .mol3d-container {

        }

        /* Detail toggle */
        .detail-toggle {
            display: flex; justify-content: center; gap: 0; margin-bottom: 12px;
        }

            padding: 6px 20px; font-size: 12px; font-weight: 600;

        }
        .detail-toggle button:first-child { border-radius: 8px 0 0 8px; }
        .detail-toggle button:last-child { border-radius: 0 8px 8px 0; }
        .detail-toggle button.active {
            background: rgba(6,182,212,0.15);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .card-details {
            text-align: left;
            background: rgba(0,0,0,0.3);

            font-size: 12px; color: var(--text-dim);

        }
        .card-details strong { color: var(--cyan); font-weight: 600; }
        .card-info {
            padding: 12px; border-radius: 10px;
            background: rgba(6,182,212,0.06);
            border: 1px solid rgba(6,182,212,0.1);
            font-family: 'Jua', sans-serif;
            font-size: 14px; color: var(--text);
            line-height: 1.6; margin-bottom: 16px;
        }
        .next-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 32px; border-radius: 14px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            color: #0a0a1a; font-family: 'Jua', sans-serif;
            font-size: 16px; font-weight: 700;
            border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .next-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* ===== Complete Modal ===== */
        .complete-title {
            font-family: 'Jua', sans-serif;
            font-size: 28px; color: var(--cyan);
            margin-bottom: 8px;
        }
        .complete-sub {
            font-size: 14px; color: var(--text-dim);
            margin-bottom: 20px;
        }
        .final-score {
            font-size: 48px; font-weight: 800;
            color: var(--green);
            text-shadow: 0 0 20px rgba(16,185,129,0.5);
            margin-bottom: 6px;
        }

        /* ===== Particles ===== */
        .particle {
            position: fixed; pointer-events: none; z-index: 200;
            border-radius: 50%;
            animation: particleBurst 0.8s ease-out forwards;
        }
        @keyframes particleBurst {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* ===== Screen flash ===== */
        .screen-flash {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6,182,212,0.15);
            pointer-events: none; z-index: 150;
            animation: flashAnim 0.4s ease-out forwards;
        }
        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .game-container { padding: 10px; gap: 10px; }
            .mission-panel { padding: 10px 14px; }
            .build-field { min-height: 220px; }

            .molecule-card { padding: 18px; }
        }

        /* Scrollbar for modal */
        .molecule-card::-webkit-scrollbar { width: 4px; }
        .molecule-card::-webkit-scrollbar-track { background: transparent; }
        .molecule-card::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.3); border-radius: 4px; }

    function t(key) { return I18N[currentLang][key] || I18N['ko'][key] || key; }

    function getMolName(mol) { return currentLang === 'en' ? mol.en : mol.kr; }
    function getElName(el) { return currentLang === 'en' ? el.en : el.kr; }
    function getElDesc(sym) { return currentLang === 'en' ? (ELEMENT_DESCS_EN[sym] || '') : (ELEMENT_DESCS[sym] || ''); }

    function applyI18n() {
        // Static HTML elements
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const val = t(el.dataset.i18n);
            if (val.includes('\n')) el.innerHTML = val.replace(/\n/g, '<br>');
            else el.textContent = val;
        });
        document.querySelectorAll('[data-i18n-html]').forEach(el => {
            el.innerHTML = t(el.dataset.i18nHtml);
        });
        // Legend descs
        document.querySelectorAll('[data-i18n-desc]').forEach(el => {
            el.dataset.desc = t(el.dataset.i18nDesc);
            const descDiv = el.querySelector('.legend-desc');
            if (descDiv) descDiv.textContent = t(el.dataset.i18nDesc);
        });
        // Level buttons
        const levelMap = {'전체':'all','초등1':'elem1','초등2':'elem2','초등3':'elem3','중등1':'mid1','중등2':'mid2','고등1':'high1','고등2':'high2','대학':'univ'};
        document.querySelectorAll('.level-btn[data-level]').forEach(btn => {
            const k = levelMap[btn.dataset.level];
            if (k) btn.textContent = t(k);
        });
        const catMap = {'전체':'catAll','일상':'catDaily','자연':'catNature','산업':'catIndustry'};
        document.querySelectorAll('.cat-btn[data-cat]').forEach(btn => {
            const k = catMap[btn.dataset.cat];
            if (k) btn.textContent = t(k);
        });
        // Update mission UI
        if (typeof updateMissionUI === 'function') updateMissionUI();
        if (typeof updateMissionCounter === 'function') updateMissionCounter();
        // Rebuild legend descs
        document.querySelectorAll('.legend-item[data-i18n-desc]').forEach(item => {
            const desc = item.querySelector('.legend-desc');
            if (desc) desc.textContent = t(item.dataset.i18nDesc);
        });
        // Lang button
        const langBtn = document.getElementById('langToggleBtn');
        if (langBtn) langBtn.textContent = currentLang === 'ko' ? 'EN' : '한';
    }

    function toggleLang() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko';

    function applyFilters() {
        filteredMolecules = MOLECULES.filter(m => {
            const lvl = selectedLevel === '전체' || m.level === selectedLevel;
            const cat = selectedCategory === '전체' || m.category === selectedCategory;
            return lvl && cat;
        });
        if (filteredMolecules.length === 0) filteredMolecules = [...MOLECULES];
        buildMissionQueue();
        currentMissionIdx = 0;
        clearField();
        updateMissionUI();
        applyDifficultyFilter();
    }

    function buildMissionQueue() {
        // Shuffle filtered molecules
        missionQueue = filteredMolecules.map((m, i) => i);
        for (let i = missionQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [missionQueue[i], missionQueue[j]] = [missionQueue[j], missionQueue[i]];
        }
    }

    levelBar.addEventListener('click', (e) => {
        const levelBtn = e.target.closest('.level-btn');
        const catBtn = e.target.closest('.cat-btn');
        if (levelBtn) {
            levelBar.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            levelBtn.classList.add('active');
            selectedLevel = levelBtn.dataset.level;
            playSound('click');
            applyFilters();
        }
        if (catBtn) {
            levelBar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            catBtn.classList.add('active');
            selectedCategory = catBtn.dataset.cat;
            playSound('click');
            applyFilters();
        }
    });

    function getCurrentMolecule() {
        if (missionQueue.length === 0) return filteredMolecules[0] || MOLECULES[0];
        const idx = missionQueue[currentMissionIdx % missionQueue.length];
        return filteredMolecules[idx] || filteredMolecules[0];
    }

    function buildPeriodicTable() {
        periodicGrid.innerHTML = '';

        // Build a 2D map: key = "row-col" -> element index
        const cellMap = {};
        ELEMENTS.forEach((el, idx) => {
            cellMap[el.row + '-' + el.col] = idx;
        });

        // Main rows 1-7: only place actual elements and La/Ac placeholders
        for (let r = 1; r <= 7; r++) {
            for (let c = 1; c <= 18; c++) {
                const key = r + '-' + c;
                if (cellMap[key] !== undefined) {
                    const idx = cellMap[key];
                    const el = ELEMENTS[idx];
                    periodicGrid.appendChild(createPTCell(el, idx));
                } else if (r === 6 && c === 3) {
                    const ph = document.createElement('div');
                    ph.className = 'ptable-cell pt-label-cell';
                    ph.style.gridRow = r; ph.style.gridColumn = c;
                    ph.style.background = GROUP_COLORS.lanthanide + '15';
                    ph.style.border = '1px dashed ' + GROUP_COLORS.lanthanide + '40';
                    ph.style.fontSize = '7px'; ph.style.color = GROUP_COLORS.lanthanide;
                    ph.textContent = 'La-Lu';
                    periodicGrid.appendChild(ph);
                } else if (r === 7 && c === 3) {
                    const ph = document.createElement('div');
                    ph.className = 'ptable-cell pt-label-cell';
                    ph.style.gridRow = r; ph.style.gridColumn = c;
                    ph.style.background = GROUP_COLORS.actinide + '15';
                    ph.style.border = '1px dashed ' + GROUP_COLORS.actinide + '40';
                    ph.style.fontSize = '7px'; ph.style.color = GROUP_COLORS.actinide;
                    ph.textContent = 'Ac-Lr';
                    periodicGrid.appendChild(ph);
                }
            }
        }

        // Gap row between main table and lanthanide/actinide
        const gap = document.createElement('div');
        gap.className = 'pt-gap';
        gap.style.gridRow = 8;
        gap.style.gridColumn = '1 / -1';
        periodicGrid.appendChild(gap);

        // Lanthanide row (row 9 in data)
        // Label
        const lnLabel = document.createElement('div');
        lnLabel.className = 'pt-label-cell';
        lnLabel.style.gridRow = 9; lnLabel.style.gridColumn = '1 / 3';
        lnLabel.style.color = GROUP_COLORS.lanthanide;
        lnLabel.textContent = 'Ln';
        periodicGrid.appendChild(lnLabel);
        for (let c = 3; c <= 17; c++) {
            const key = '9-' + c;
            if (cellMap[key] !== undefined) {
                const idx = cellMap[key];
                const el = ELEMENTS[idx];
                const cell = createPTCell(el, idx);
                cell.style.gridRow = 9;
                cell.style.gridColumn = c;
                periodicGrid.appendChild(cell);
            }
        }

        // Actinide row (row 10 in data)
        const acLabel = document.createElement('div');
        acLabel.className = 'pt-label-cell';
        acLabel.style.gridRow = 10; acLabel.style.gridColumn = '1 / 3';
        acLabel.style.color = GROUP_COLORS.actinide;
        acLabel.textContent = 'Ac';
        periodicGrid.appendChild(acLabel);
        for (let c = 3; c <= 17; c++) {
            const key = '10-' + c;
            if (cellMap[key] !== undefined) {
                const idx = cellMap[key];
                const el = ELEMENTS[idx];
                const cell = createPTCell(el, idx);
                cell.style.gridRow = 10;
                cell.style.gridColumn = c;
                periodicGrid.appendChild(cell);
            }
        }

        applyDifficultyFilter();
    }

    function createPTCell(el, idx) {
        const cell = document.createElement('div');
        cell.className = 'ptable-cell' + (el.group === 'noble' ? ' noble' : '');
        cell.style.gridRow = el.row;
        cell.style.gridColumn = el.col;
        cell.style.background = el.color + '20';
        cell.innerHTML = `
            <span class="el-num">${el.num}</span>
            <span class="el-sym" style="color:${el.color}">${el.sym}</span>
            <span class="el-kr">${el.kr}</span>
        `;
        cell.dataset.idx = idx;
        cell.addEventListener('pointerdown', onCellPointerDown);
        // Tooltip on hover
        cell.addEventListener('pointerenter', (e) => showElementTooltip(e, el));
        cell.addEventListener('pointerleave', hideElementTooltip);
        return cell;
    }
