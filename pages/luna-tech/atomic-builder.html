    // ---- Element Tooltip ----
    function showElementTooltip(e, el) {
        const rect = e.currentTarget.getBoundingClientRect();
        const desc = ELEMENT_DESCS[el.sym] || '';
        elTooltip.innerHTML = `
            <div><span class="tt-sym" style="color:${el.color}">${el.sym}</span> <span class="tt-kr">${el.kr}</span> <span class="tt-en">(${el.en})</span></div>
            <div class="tt-info">${t('atomicNum')}: ${el.num} &nbsp;|&nbsp; ${t('valence')}: ${el.valence > 0 ? el.valence : '-'}</div>
            ${desc ? `<div class="tt-desc">${getElDesc(el.sym)}</div>` : ''}
        `;
        // Position above the cell
        let left = rect.left + rect.width / 2;
        let top = rect.top - 8;
        elTooltip.style.left = left + 'px';
        elTooltip.style.top = top + 'px';
        elTooltip.style.transform = 'translate(-50%, -100%)';
        elTooltip.classList.add('show');
    }
    function hideElementTooltip() {
        elTooltip.classList.remove('show');
    }

    // ---- Difficulty Filter ----
    function applyDifficultyFilter() {
        const cells = periodicGrid.querySelectorAll('.ptable-cell[data-idx]');
        cells.forEach(cell => {
            const idx = parseInt(cell.dataset.idx);
            const el = ELEMENTS[idx];
            cell.classList.remove('dimmed', 'highlighted');
            if (selectedLevel.startsWith('초등')) {
                if (ELEMENTARY_ELEMENTS.has(el.num)) {
                    cell.classList.add('highlighted');
                } else if (el.group !== 'noble') {
                    cell.classList.add('dimmed');
                }
            }
        });
    }

    // ---- Remove Mode ----
    function toggleRemoveMode() {
        removeMode = !removeMode;
        const btn = document.getElementById('removeBtn');
        btn.classList.toggle('active', removeMode);
        buildField.classList.toggle('remove-mode', removeMode);
        playSound('click');
    }

    function deactivateRemoveMode() {
        removeMode = false;
        const btn = document.getElementById('removeBtn');
        btn.classList.remove('active');
        buildField.classList.remove('remove-mode');
    }

    function removeAtom(atomData) {
        // Remove bonds connected to this atom
        bonds = bonds.filter(b => {
            if (b.a1id === atomData.id || b.a2id === atomData.id) {
                const other = fieldAtoms.find(a => a.id === (b.a1id === atomData.id ? b.a2id : b.a1id));
                if (other) {
                    other.usedBonds = Math.max(0, other.usedBonds - b.count);
                    updateValenceDots(other);
                }
                return false;
            }
            return true;
        });
        // Remove bond electrons for this atom
        buildField.querySelectorAll('.bond-electron, .metallic-electron').forEach(el => {
            if (el.dataset.a1id == atomData.id || el.dataset.a2id == atomData.id) el.remove();
        });
        buildField.querySelectorAll('.charge-label').forEach(el => el.remove());
        // Remove atom element
        atomData.el.remove();
        fieldAtoms = fieldAtoms.filter(a => a.id !== atomData.id);
        if (fieldAtoms.length === 0) buildField.classList.remove('has-atoms');
        renderBonds();
        playSound('click');
        deactivateRemoveMode();
    }

    // ---- Guide Popup ----
    function showGuide() {
        playSound('click');
        const mol = getCurrentMolecule();
        if (!mol) return;

        // Generate steps from atoms
        const atomEntries = Object.entries(mol.atoms);
        // Sort: center atom first (highest valence or most connected)
        atomEntries.sort((a, b) => {
            const elA = ELEMENTS.find(e => e.sym === a[0]);
            const elB = ELEMENTS.find(e => e.sym === b[0]);
            return (elB ? elB.valence : 0) - (elA ? elA.valence : 0);
        });

        let stepsHTML = '';
        let stepNum = 1;
        atomEntries.forEach(([sym, count]) => {
            const el = ELEMENTS.find(e => e.sym === sym);
            const name = el ? getElName(el) : sym;
            const placeCenter = currentLang === 'en' ? `Place 1 ${sym} (${name}) in the center` : `${sym} (${name}) 1개를 가운데에 놓기`;
            const placeNear = currentLang === 'en' ? `Place 1 ${sym} (${name}) nearby` : `${sym} (${name}) 1개를 근처에 놓기`;
            if (stepNum === 1 && count === 1) {
                stepsHTML += `<div class="guide-step"><div class="step-num">${stepNum}</div><div>${placeCenter}</div></div>`;
                stepNum++;
            } else {
                for (let i = 0; i < count; i++) {
                    stepsHTML += `<div class="guide-step"><div class="step-num">${stepNum}</div><div>${placeNear}</div></div>`;
                    stepNum++;
                }
            }
        });

        const guideTitle = currentLang === 'en' ? `💡 How to build ${mol.formula}` : `💡 ${mol.formula} 만드는 법`;
        const guideTip = currentLang === 'en' ? '💡 Tip: Place atoms close together and they bond automatically!' : '💡 팁: 원자를 가까이 놓으면 자동으로 결합돼요!';
        guidePopup.innerHTML = `
            <h3>${guideTitle}</h3>
            ${stepsHTML}
            <div class="guide-tip">${guideTip}</div>
            <button class="guide-close" onclick="closeGuide()">${t('close')}</button>
        `;
        guidePopup.classList.add('show');
    }

    function closeGuide() {
        guidePopup.classList.remove('show');
    }

    // ---- Drag from Periodic Table ----
    let dragging = null;

    function onCellPointerDown(e) {
        e.preventDefault();
        const idx = parseInt(e.currentTarget.dataset.idx);
        const elData = ELEMENTS[idx];
        playSound('pick');

        const ghost = document.createElement('div');
        ghost.className = 'ghost-atom';
        ghost.style.background = elData.color + '40';
        ghost.style.boxShadow = `0 0 20px ${elData.color}60, inset 0 0 15px ${elData.color}30`;
        ghost.innerHTML = `
            <span class="atom-sym" style="color:${elData.color}">${elData.sym}</span>
            <span class="atom-kr">${elData.kr}</span>
        `;
        document.body.appendChild(ghost);

        const cx = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        const cy = e.clientY || (e.touches && e.touches[0].clientY) || 0;
        ghost.style.left = (cx - 27) + 'px';
        ghost.style.top = (cy - 27) + 'px';

        dragging = { elData, ghost };

        document.addEventListener('pointermove', onDragMove);
        document.addEventListener('pointerup', onDragEnd);
        document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
        if (!dragging) return;
        e.preventDefault();
        const cx = e.clientX || 0;
        const cy = e.clientY || 0;
        dragging.ghost.style.left = (cx - 27) + 'px';
        dragging.ghost.style.top = (cy - 27) + 'px';

        const rect = buildField.getBoundingClientRect();
        const over = cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
        buildField.classList.toggle('drag-over', over);
    }

    function onDragEnd(e) {
        if (!dragging) return;
        const cx = e.clientX || 0;
        const cy = e.clientY || 0;

        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragEnd);
        document.removeEventListener('pointercancel', onDragEnd);

        buildField.classList.remove('drag-over');
        dragging.ghost.remove();

        const rect = buildField.getBoundingClientRect();
        if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
            const r = dragging.elData.radius || 27;
            const x = cx - rect.left - r;
            const y = cy - rect.top - r;
            addAtomToField(dragging.elData, x, y);
        }

        dragging = null;
    }

    // ---- Field Atoms ----
    function addAtomToField(elData, x, y) {
        const isNoble = (elData.valence === 0 || elData.group === 'noble');
        const r = elData.radius || 27;
        const d = r * 2;
        const fw = buildField.clientWidth;
        const fh = buildField.clientHeight;
        x = Math.max(4, Math.min(x, fw - d - 4));
        y = Math.max(4, Math.min(y, fh - d - 4));

        const id = ++atomIdCounter;
        const atom = document.createElement('div');
        atom.className = 'field-atom';
        atom.style.width = d + 'px';
        atom.style.height = d + 'px';
        atom.style.left = x + 'px';
        atom.style.top = y + 'px';
        atom.style.background = elData.color + '30';
        atom.style.boxShadow = `0 0 16px ${elData.color}50, inset 0 0 10px ${elData.color}20`;
        atom.dataset.atomId = id;

        const fontSize = Math.max(10, Math.min(22, r * 0.7));
        atom.innerHTML = `
            <span class="atom-sym" style="color:${elData.color};font-size:${fontSize}px">${elData.sym}</span>
            <span class="atom-kr">${elData.kr}</span>
        `;

        // Valence dots
        const positions = getValenceDotPositions(elData.valence, r);
        positions.forEach((pos, i) => {
            const dot = document.createElement('div');
            dot.className = 'valence-dot';
            dot.dataset.dotIdx = i;
            dot.style.left = pos.x + 'px';
            dot.style.top = pos.y + 'px';
            atom.appendChild(dot);
        });

        // Electron shells
        if (elData.electrons) {
            addElectronShells(atom, elData.electrons, r);
        }

        buildField.appendChild(atom);
        buildField.classList.add('has-atoms');

        const atomData = {
            id, sym: elData.sym, kr: elData.kr, color: elData.color,
            valence: elData.valence, usedBonds: 0,
            radius: r, group: elData.group, legacyGroup: elData.legacyGroup || elData.group, electronegativity: elData.electronegativity || 0,
            x: x + r, y: y + r, el: atom
        };
        fieldAtoms.push(atomData);

        atom.addEventListener('pointerdown', (ev) => onFieldAtomDown(ev, atomData));

        playSound('click');

        if (isNoble) {
            showNobleGasFieldEffect(atomData, elData);
            setTimeout(checkMolecule, 300);
        } else {
            tryAutoConnect(atomData);
            // 단일 원소 미션 체크 (연결 없이도 클리어 가능)
            setTimeout(checkMolecule, 500);
        }
    }

    function addElectronShells(atomEl, electrons, atomRadius) {
        const shellGap = 10;
        const speeds = [2, 3.5, 5.5, 8, 11, 14.5, 18];
        // Limit to first 4 shells for performance
        const maxShells = Math.min(electrons.length, 4);
        electrons.slice(0, maxShells).forEach((count, shellIdx) => {
            const shellR = atomRadius + shellGap * (shellIdx + 1);
            const shellSize = shellR * 2;
            const shell = document.createElement('div');
            shell.className = 'electron-shell';
            shell.style.width = shellSize + 'px';
            shell.style.height = shellSize + 'px';
            shell.style.animationDuration = (speeds[shellIdx] || 10) + 's';
            const maxDots = Math.min(count, 8); // limit dots per shell
            for (let i = 0; i < maxDots; i++) {
                const angle = (2 * Math.PI * i) / count;
                const ex = shellR + Math.cos(angle) * shellR - 1.5;
                const ey = shellR + Math.sin(angle) * shellR - 1.5;
                const dot = document.createElement('div');
                dot.className = 'electron-dot';
                dot.style.left = ex + 'px';
                dot.style.top = ey + 'px';
                shell.appendChild(dot);
            }
            atomEl.appendChild(shell);
        });
    }

    function getValenceDotPositions(valence, atomRadius) {
        const r = atomRadius + 4;
        const center = atomRadius;
        const positions = [];
        for (let i = 0; i < valence; i++) {
            const angle = (Math.PI * 2 * i / Math.max(valence, 1)) - Math.PI / 2;
            positions.push({
                x: center + Math.cos(angle) * r - 3.5,
                y: center + Math.sin(angle) * r - 3.5
            });
        }
        return positions;
    }

    // ---- Drag field atoms ----
    let fieldDrag = null;

    function onFieldAtomDown(e, atomData) {
        e.preventDefault();
        e.stopPropagation();

        // Remove mode: click to remove this atom
        if (removeMode) {
            removeAtom(atomData);
            return;
        }

        const cx = e.clientX, cy = e.clientY;
        const rect = buildField.getBoundingClientRect();
        const r = atomData.radius || 27;
        const offsetX = cx - rect.left - (atomData.x - r);
        const offsetY = cy - rect.top - (atomData.y - r);

        fieldDrag = { atomData, offsetX, offsetY };
        const trashEl = document.getElementById('trashCan');

        const moveHandler = (ev) => {
            ev.preventDefault();
            const mx = ev.clientX, my = ev.clientY;
            const fx = mx - rect.left - offsetX;
            const fy = my - rect.top - offsetY;
            const d = r * 2;
            const clamped_x = Math.max(4, Math.min(fx, buildField.clientWidth - d - 4));
            const clamped_y = Math.max(4, Math.min(fy, buildField.clientHeight - d - 4));
            atomData.el.style.left = clamped_x + 'px';
            atomData.el.style.top = clamped_y + 'px';
            atomData.x = clamped_x + r;
            atomData.y = clamped_y + r;
            renderBonds();
            updateBondElectrons();

            // Trash can hover check
            const trashRect = trashEl.getBoundingClientRect();
            const fieldRect = buildField.getBoundingClientRect();
            const trashCX = trashRect.left - fieldRect.left + trashRect.width / 2;
            const trashCY = trashRect.top - fieldRect.top + trashRect.height / 2;
            const dist = Math.sqrt((atomData.x - trashCX) ** 2 + (atomData.y - trashCY) ** 2);
            trashEl.classList.toggle('hover', dist < 60);
        };

        const upHandler = (ev) => {
            document.removeEventListener('pointermove', moveHandler);
            document.removeEventListener('pointerup', upHandler);
            fieldDrag = null;

            // Trash can drop check
            const trashRect = trashEl.getBoundingClientRect();
            const fieldRect = buildField.getBoundingClientRect();
            const trashCX = trashRect.left - fieldRect.left + trashRect.width / 2;
            const trashCY = trashRect.top - fieldRect.top + trashRect.height / 2;
            const dist = Math.sqrt((atomData.x - trashCX) ** 2 + (atomData.y - trashCY) ** 2);
            trashEl.classList.remove('hover');

            if (dist < 50) {
                // Shrink animation then remove
                atomData.el.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                atomData.el.style.transform = 'scale(0)';
                atomData.el.style.opacity = '0';
                setTimeout(() => removeAtom(atomData), 200);
                playSound('click');
                return;
            }

            tryAutoConnect(atomData);
        };

        document.addEventListener('pointermove', moveHandler);
        document.addEventListener('pointerup', upHandler);
    }

    // ---- Bond System ----
    const BOND_DISTANCE = 110;

    function determineBondType(atom1, atom2) {
        const en1 = atom1.electronegativity || 0;
        const en2 = atom2.electronegativity || 0;
        const diff = Math.abs(en1 - en2);
        if (diff > 1.7) return 'ionic';
        const g1 = atom1.legacyGroup || atom1.group;
        const g2 = atom2.legacyGroup || atom2.group;
        if (g1 === 'metal' && g2 === 'metal') return 'metallic';
        return 'covalent';
    }

    function tryAutoConnect(newAtom) {
        let madeConnection = false;
        for (const other of fieldAtoms) {
            if (other.id === newAtom.id) continue;
            const dist = Math.hypot(other.x - newAtom.x, other.y - newAtom.y);
            if (dist > BOND_DISTANCE) continue;

            const existing = bonds.find(b =>
                (b.a1id === newAtom.id && b.a2id === other.id) ||
                (b.a1id === other.id && b.a2id === newAtom.id)
            );
            const existingCount = existing ? existing.count : 0;

            const newAvail = newAtom.valence - newAtom.usedBonds;
            const otherAvail = other.valence - other.usedBonds;

            if (newAvail > 0 && otherAvail > 0) {
                const bondType = determineBondType(newAtom, other);
                if (existing) {
                    existing.count += 1;
                } else {
                    bonds.push({ a1id: newAtom.id, a2id: other.id, count: 1, type: bondType });
                }
                newAtom.usedBonds += 1;
                other.usedBonds += 1;
                madeConnection = true;
                playSound('connect');
                updateValenceDots(newAtom);
                updateValenceDots(other);

                // Green glow + check mark feedback
                showBondFeedback(newAtom, other, true);
                animateBondFormation(newAtom, other, bondType);
            } else if (dist <= BOND_DISTANCE) {
                // Red glow + X feedback (can't bond)
                showBondFeedback(newAtom, other, false);
            }
        }
        renderBonds();
        if (madeConnection) {
            setTimeout(checkMolecule, 300);
        }
    }

    // ---- Bond Feedback (green ✓ / red ✗) ----
    function showBondFeedback(atom1, atom2, success) {
        const mx = (atom1.x + atom2.x) / 2;
        const my = (atom1.y + atom2.y) / 2;
        const color = success ? 'rgba(16,185,129,0.5)' : 'rgba(239,68,68,0.5)';

        // Glow on atoms
        atom1.el.style.transition = 'box-shadow 0.15s';
        atom2.el.style.transition = 'box-shadow 0.15s';
        atom1.el.style.boxShadow = `0 0 20px 8px ${color}`;
        atom2.el.style.boxShadow = `0 0 20px 8px ${color}`;
        setTimeout(() => {
            atom1.el.style.boxShadow = '';
            atom2.el.style.boxShadow = '';
        }, 500);

        // Icon between atoms
        const icon = document.createElement('div');
        icon.className = 'bond-feedback ' + (success ? 'success' : 'fail');
        icon.textContent = success ? '✓' : '✗';
        icon.style.left = (mx - 14) + 'px';
        icon.style.top = (my - 14) + 'px';
        buildField.appendChild(icon);
        setTimeout(() => icon.remove(), 600);

        if (!success) {
            playSound('fail');
            // Push atom away slightly
            const dx = atom1.x - atom2.x;
            const dy = atom1.y - atom2.y;
            const dist = Math.hypot(dx, dy) || 1;
            const pushDist = 15;
            const r = atom1.radius || 27;
            const newX = atom1.x + (dx / dist) * pushDist;
            const newY = atom1.y + (dy / dist) * pushDist;
            const clampedX = Math.max(r + 4, Math.min(newX, buildField.clientWidth - r - 4));
            const clampedY = Math.max(r + 4, Math.min(newY, buildField.clientHeight - r - 4));
            atom1.x = clampedX;
            atom1.y = clampedY;
            atom1.el.style.left = (clampedX - r) + 'px';
            atom1.el.style.top = (clampedY - r) + 'px';
        }
    }

    // ---- Bond Formation Animations ----
    function animateBondFormation(atom1, atom2, bondType) {
        if (bondType === 'ionic') {
            animateIonicBond(atom1, atom2);
        } else if (bondType === 'metallic') {
            animateMetallicBond(atom1, atom2);
        } else {
            animateCovalentBond(atom1, atom2);
        }
    }

    function animateCovalentBond(atom1, atom2) {
        // Create shared electron dot that oscillates between atoms
        const elec = document.createElement('div');
        elec.className = 'bond-electron covalent';
        // Position using offset-path
        const mx = (atom1.x + atom2.x) / 2;
        const my = (atom1.y + atom2.y) / 2;
        elec.style.left = (mx - 2.5) + 'px';
        elec.style.top = (my - 2.5) + 'px';
        // Determine which atom is more electronegative for asymmetric oscillation
        const en1 = atom1.electronegativity || 0;
        const en2 = atom2.electronegativity || 0;
        const bias = en2 > en1 ? 0.65 : (en1 > en2 ? 0.35 : 0.5);
        elec.dataset.a1id = atom1.id;
        elec.dataset.a2id = atom2.id;
        elec.dataset.bias = bias;
        buildField.appendChild(elec);
    }

    function animateIonicBond(atom1, atom2) {
        // Determine metal (donor) and nonmetal (acceptor)
        const g1 = atom1.legacyGroup || atom1.group;
        const g2 = atom2.legacyGroup || atom2.group;
        const metal = g1 === 'metal' ? atom1 : atom2;
        const nonmetal = g1 === 'metal' ? atom2 : atom1;

        playSound('sizzle');

        // Create electron that launches from metal to nonmetal
        const elec = document.createElement('div');
        elec.className = 'bond-electron ionic-launch';
        elec.style.left = (metal.x - 3) + 'px';
        elec.style.top = (metal.y - 3) + 'px';

        // Trail particles
        const trailCount = 8;
        const dx = nonmetal.x - metal.x;
        const dy = nonmetal.y - metal.y;
        for (let i = 0; i < trailCount; i++) {
            setTimeout(() => {
                const trail = document.createElement('div');
                trail.className = 'electron-trail';
                const t = i / trailCount;
                trail.style.left = (metal.x + dx * t - 1.5) + 'px';
                trail.style.top = (metal.y + dy * t - 1.5) + 'px';
                buildField.appendChild(trail);
                setTimeout(() => trail.remove(), 500);
            }, i * 80);
        }

        // Animate the electron moving
        const startTime = performance.now();
        const duration = 600;
        function animElec(now) {
            const t = Math.min((now - startTime) / duration, 1);
            const ease = t * t * (3 - 2 * t); // smoothstep
            elec.style.left = (metal.x + dx * ease - 3) + 'px';
            elec.style.top = (metal.y + dy * ease - 3) + 'px';
            elec.style.transform = `scale(${1 + 0.5 * Math.sin(t * Math.PI)})`;
            if (t < 1) {
                requestAnimationFrame(animElec);
            } else {
                elec.remove();
                // Flash on impact
                const flash = document.createElement('div');
                flash.className = 'ionic-flash';
                flash.style.left = (nonmetal.x - 15) + 'px';
                flash.style.top = (nonmetal.y - 15) + 'px';
                flash.style.width = '30px';
                flash.style.height = '30px';
                buildField.appendChild(flash);
                setTimeout(() => flash.remove(), 500);

                // Add charge glows and labels
                metal.el.classList.add('charge-glow-pos');
                nonmetal.el.classList.add('charge-glow-neg');

                const posLabel = document.createElement('div');
                posLabel.className = 'charge-label';
                posLabel.style.color = '#ef4444';
                posLabel.textContent = metal.sym + '⁺';
                posLabel.style.left = (metal.x - 15) + 'px';
                posLabel.style.top = (metal.y - metal.radius - 20) + 'px';
                buildField.appendChild(posLabel);

                const negLabel = document.createElement('div');
                negLabel.className = 'charge-label';
                negLabel.style.color = '#06b6d4';
                negLabel.textContent = nonmetal.sym + '⁻';
                negLabel.style.left = (nonmetal.x - 15) + 'px';
                negLabel.style.top = (nonmetal.y - nonmetal.radius - 20) + 'px';
                buildField.appendChild(negLabel);
            }
        }
        buildField.appendChild(elec);
        requestAnimationFrame(animElec);
    }

    function animateMetallicBond(atom1, atom2) {
        // Floating "sea" electrons between metal atoms
        const mx = (atom1.x + atom2.x) / 2;
        const my = (atom1.y + atom2.y) / 2;
        for (let i = 0; i < 3; i++) {
            const me = document.createElement('div');
            me.className = 'metallic-electron';
            me.style.left = (mx + (Math.random() - 0.5) * 30 - 2) + 'px';
            me.style.top = (my + (Math.random() - 0.5) * 30 - 2) + 'px';
            me.style.setProperty('--mx1', (Math.random() * 20 - 10) + 'px');
            me.style.setProperty('--my1', (Math.random() * 20 - 10) + 'px');
            me.style.setProperty('--mx2', (Math.random() * 20 - 10) + 'px');
            me.style.setProperty('--my2', (Math.random() * 20 - 10) + 'px');
            me.style.setProperty('--mx3', (Math.random() * 20 - 10) + 'px');
            me.style.setProperty('--my3', (Math.random() * 20 - 10) + 'px');
            me.style.animationDelay = (i * 0.7) + 's';
            me.dataset.a1id = atom1.id;
            me.dataset.a2id = atom2.id;
            buildField.appendChild(me);
        }
    }

    function updateBondElectrons() {
        // Update positions of covalent shared electrons
        buildField.querySelectorAll('.bond-electron.covalent').forEach(elec => {
            const a1 = fieldAtoms.find(a => a.id == elec.dataset.a1id);
            const a2 = fieldAtoms.find(a => a.id == elec.dataset.a2id);
            if (a1 && a2) {
                const mx = (a1.x + a2.x) / 2;
                const my = (a1.y + a2.y) / 2;
                elec.style.left = (mx - 2.5) + 'px';
                elec.style.top = (my - 2.5) + 'px';
            }
        });
        // Update metallic electrons
        buildField.querySelectorAll('.metallic-electron').forEach(elec => {
            const a1 = fieldAtoms.find(a => a.id == elec.dataset.a1id);
            const a2 = fieldAtoms.find(a => a.id == elec.dataset.a2id);
            if (a1 && a2) {
                const mx = (a1.x + a2.x) / 2;
                const my = (a1.y + a2.y) / 2;
                elec.style.left = (mx + parseFloat(elec.style.left) * 0 - 2) + 'px';
                elec.style.top = (my - 2) + 'px';
            }
        });
    }

    function updateValenceDots(atomData) {
        const dots = atomData.el.querySelectorAll('.valence-dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('used', i < atomData.usedBonds);
        });
    }

    function renderBonds() {
        bondSvg.innerHTML = '';
        bondSvg.classList.toggle('scissor-mode', bonds.length > 0);
        for (const bond of bonds) {
            const a1 = fieldAtoms.find(a => a.id === bond.a1id);
            const a2 = fieldAtoms.find(a => a.id === bond.a2id);
            if (!a1 || !a2) continue;

            const dx = a2.x - a1.x;
            const dy = a2.y - a1.y;
            const len = Math.hypot(dx, dy);
            const nx = -dy / len;
            const ny = dx / len;

            for (let i = 0; i < bond.count; i++) {
                const offset = (i - (bond.count - 1) / 2) * 5;
                const x1 = a1.x + nx * offset, y1 = a1.y + ny * offset;
                const x2 = a2.x + nx * offset, y2 = a2.y + ny * offset;

                // Visible bond line
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                line.setAttribute('class', 'bond-line cuttable-visible');
                if (bond.type === 'ionic') {
                    line.style.stroke = '#f59e0b';
                    line.style.strokeDasharray = '6 3';
                    line.style.filter = 'drop-shadow(0 0 4px rgba(245,158,11,0.5))';
                }
                bondSvg.appendChild(line);

                // Wider invisible hit area for scissors click
                const hitLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                hitLine.setAttribute('x1', x1); hitLine.setAttribute('y1', y1);
                hitLine.setAttribute('x2', x2); hitLine.setAttribute('y2', y2);
                hitLine.setAttribute('class', 'bond-line cuttable');
                hitLine.dataset.a1id = bond.a1id;
                hitLine.dataset.a2id = bond.a2id;
                hitLine.addEventListener('click', onBondCut);
                bondSvg.appendChild(hitLine);
            }
        }
    }

    // ---- Scissors: Cut Bond ----
    function onBondCut(e) {
        e.stopPropagation();
        const a1id = parseInt(e.target.dataset.a1id);
        const a2id = parseInt(e.target.dataset.a2id);
        const bondIdx = bonds.findIndex(b => b.a1id === a1id && b.a2id === a2id);
        if (bondIdx === -1) return;

        const bond = bonds[bondIdx];
        const atom1 = fieldAtoms.find(a => a.id === a1id);
        const atom2 = fieldAtoms.find(a => a.id === a2id);

        // Decrease bond count
        bond.count -= 1;
        if (atom1) { atom1.usedBonds = Math.max(0, atom1.usedBonds - 1); updateValenceDots(atom1); }
        if (atom2) { atom2.usedBonds = Math.max(0, atom2.usedBonds - 1); updateValenceDots(atom2); }

        if (bond.count <= 0) {
            bonds.splice(bondIdx, 1);
        }

        // Remove associated bond electrons
        buildField.querySelectorAll('.bond-electron, .metallic-electron').forEach(el => {
            if ((el.dataset.a1id == a1id && el.dataset.a2id == a2id) ||
                (el.dataset.a1id == a2id && el.dataset.a2id == a1id)) {
                el.remove();
            }
        });

        // Snip visual flash
        if (atom1 && atom2) {
            const mx = (atom1.x + atom2.x) / 2;
            const my = (atom1.y + atom2.y) / 2;
            const snipIcon = document.createElement('div');
            snipIcon.style.cssText = `
                position:absolute; left:${mx - 14}px; top:${my - 14}px;
                font-size:24px; z-index:20; pointer-events:none;
                animation:bondFeedbackPop 0.5s ease-out forwards;
            `;
            snipIcon.textContent = '✂️';
            buildField.appendChild(snipIcon);
            setTimeout(() => snipIcon.remove(), 500);
        }

        playSound('click');
        renderBonds();
        updateBondElectrons();
    }

    // ---- Molecule Check ----
    function checkMolecule() {
        const counts = {};
        fieldAtoms.forEach(a => {
            counts[a.sym] = (counts[a.sym] || 0) + 1;
        });

        const target = getCurrentMolecule();
        if (!target) return;

        const targetKeys = Object.keys(target.atoms);
        const fieldKeys = Object.keys(counts);

        if (targetKeys.length !== fieldKeys.length) return;

        for (const key of targetKeys) {
            if (counts[key] !== target.atoms[key]) return;
        }

        if (fieldAtoms.length > 1) {
            const unconnected = fieldAtoms.filter(a => a.usedBonds === 0);
            if (unconnected.length > 0) return;

            const visited = new Set();
            const queue = [fieldAtoms[0].id];
            visited.add(fieldAtoms[0].id);
            while (queue.length > 0) {
                const curr = queue.shift();
                for (const bond of bonds) {
                    let neighbor = null;
                    if (bond.a1id === curr) neighbor = bond.a2id;
                    else if (bond.a2id === curr) neighbor = bond.a1id;
                    if (neighbor !== null && !visited.has(neighbor)) {
                        visited.add(neighbor);
                        queue.push(neighbor);
                    }
                }
            }
            if (visited.size !== fieldAtoms.length) return;
        }

        // SUCCESS!
        arrangeMoleculeShape(target).then(() => onMoleculeSuccess(target));
    }

    // ---- 분자 구조 각도에 맞게 원자 재배치 애니메이션 ----
    function arrangeMoleculeShape(mol) {
        return new Promise(resolve => {
            if (fieldAtoms.length <= 1) { resolve(); return; }

            const fieldW = buildField.clientWidth;
            const fieldH = buildField.clientHeight;
            const cx = fieldW / 2;
            const cy = fieldH / 2;

            const targets = computeMoleculeTargets(mol, fieldAtoms, cx, cy);

            const duration = 1500;
            const startTime = performance.now();
            const startPositions = targets.map(t => ({ x: t.atom.x, y: t.atom.y }));

            function animateArrange(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                targets.forEach((tgt, i) => {
                    const r = tgt.atom.radius || 27;
                    tgt.atom.x = startPositions[i].x + (tgt.tx - startPositions[i].x) * ease;
                    tgt.atom.y = startPositions[i].y + (tgt.ty - startPositions[i].y) * ease;
                    tgt.atom.el.style.left = (tgt.atom.x - r) + 'px';
                    tgt.atom.el.style.top = (tgt.atom.y - r) + 'px';
                });
                renderBonds();
                updateBondElectrons();

                if (t > 0.7) {
                    const glow = (t - 0.7) / 0.3;
                    fieldAtoms.forEach(a => {
                        a.el.style.boxShadow = `0 0 ${20 * glow}px ${10 * glow}px rgba(6,182,212,${0.5 * glow})`;
                    });
                }

                if (t < 1) {
                    requestAnimationFrame(animateArrange);
                } else {
                    setTimeout(resolve, 600);
                }
            }
            requestAnimationFrame(animateArrange);
        });
    }

    function computeMoleculeTargets(mol, atoms, cx, cy) {
        const targets = [];
        const geo = mol.geometry || 'linear';

        function findBySymbol(sym) { return atoms.filter(a => a.sym === sym); }
        function findCenter() {
            const sorted = [...atoms].sort((a, b) => b.valence - a.valence);
            return sorted[0];
        }

        if (geo === 'linear' && atoms.length === 2) {
            const bl = getBondLength(atoms[0].sym, atoms[1].sym);
            targets.push({ atom: atoms[0], tx: cx - bl / 2, ty: cy });
            targets.push({ atom: atoms[1], tx: cx + bl / 2, ty: cy });
        }
        else if (geo === 'linear' && atoms.length === 3) {
            const center = findBySymbol('C')[0] || findBySymbol('Be')[0] || findBySymbol('Si')[0] || findCenter();
            const others = atoms.filter(a => a.id !== center.id);
            const bl = getBondLength(center.sym, others[0].sym);
            targets.push({ atom: center, tx: cx, ty: cy });
            targets.push({ atom: others[0], tx: cx - bl, ty: cy });
            targets.push({ atom: others[1], tx: cx + bl, ty: cy });
        }
        else if (geo === 'bent') {
            const centerSym = Object.keys(mol.atoms).find(s => {
                const el = ELEMENTS.find(e => e.sym === s);
                return el && el.valence >= 2;
            }) || findCenter().sym;
            const centerAtom = findBySymbol(centerSym)[0] || findCenter();
            const others = atoms.filter(a => a.id !== centerAtom.id);
            const bl = getBondLength(centerAtom.sym, others[0].sym);
            const halfAngle = ((mol.angle || 104.5) / 2) * Math.PI / 180;
            targets.push({ atom: centerAtom, tx: cx, ty: cy - 15 });
            if (others[0]) targets.push({ atom: others[0], tx: cx - Math.sin(halfAngle) * bl, ty: cy - 15 + Math.cos(halfAngle) * bl });
            if (others[1]) targets.push({ atom: others[1], tx: cx + Math.sin(halfAngle) * bl, ty: cy - 15 + Math.cos(halfAngle) * bl });
        }
        else if (geo === 'tetrahedral') {
            const centerAtom = findCenter();
            const others = atoms.filter(a => a.id !== centerAtom.id);
            const bl = getBondLength(centerAtom.sym, others[0].sym);
            targets.push({ atom: centerAtom, tx: cx, ty: cy });
            for (let i = 0; i < others.length && i < 4; i++) {
                const a = (i * 90 - 45) * Math.PI / 180;
                targets.push({ atom: others[i], tx: cx + Math.cos(a) * bl, ty: cy + Math.sin(a) * bl });
            }
        }
        else if (geo === 'trigonal_pyramidal') {
            const centerAtom = findCenter();
            const others = atoms.filter(a => a.id !== centerAtom.id);
            const bl = getBondLength(centerAtom.sym, others[0].sym);
            targets.push({ atom: centerAtom, tx: cx, ty: cy - 10 });
            for (let i = 0; i < others.length && i < 3; i++) {
                const a = (i * 120 + 30) * Math.PI / 180;
                targets.push({ atom: others[i], tx: cx + Math.cos(a) * bl, ty: cy - 10 + Math.sin(a) * bl });
            }
        }
        else if (geo === 'trigonal_planar') {
            const centerAtom = findCenter();
            const others = atoms.filter(a => a.id !== centerAtom.id);
            const bl = getBondLength(centerAtom.sym, others[0].sym);
            targets.push({ atom: centerAtom, tx: cx, ty: cy });
            for (let i = 0; i < others.length && i < 3; i++) {
                const a = (i * 120 - 90) * Math.PI / 180;
                targets.push({ atom: others[i], tx: cx + Math.cos(a) * bl, ty: cy + Math.sin(a) * bl });
            }
        }
        else if (geo === 'caco3') {
            const cAtom = findBySymbol('C')[0];
            const oAtoms = findBySymbol('O');
            const caAtom = findBySymbol('Ca')[0];
            const blCO = getBondLength('C', 'O');
            const blCaO = getBondLength('Ca', 'O');
            targets.push({ atom: cAtom, tx: cx, ty: cy });
            for (let i = 0; i < 3; i++) {
                const a = (i * 120 - 90) * Math.PI / 180;
                targets.push({ atom: oAtoms[i], tx: cx + Math.cos(a) * blCO, ty: cy + Math.sin(a) * blCO });
            }
            const oTarget = targets[3];
            targets.push({ atom: caAtom, tx: oTarget.tx + blCaO * 0.7, ty: oTarget.ty + blCaO * 0.7 });
        }
        else if (geo === 'h2o2') {
            const oAtoms = findBySymbol('O');
            const hAtoms = findBySymbol('H');
            const blOO = getBondLength('O', 'O');
            const blOH = getBondLength('O', 'H');
            const hooAngle = (mol.angle || 94.8) * Math.PI / 180;
            targets.push({ atom: oAtoms[0], tx: cx - blOO / 2, ty: cy });
            targets.push({ atom: oAtoms[1], tx: cx + blOO / 2, ty: cy });
            targets.push({ atom: hAtoms[0], tx: cx - blOO / 2 - Math.cos(hooAngle) * blOH, ty: cy - Math.sin(hooAngle) * blOH });
            targets.push({ atom: hAtoms[1], tx: cx + blOO / 2 + Math.cos(hooAngle) * blOH, ty: cy + Math.sin(hooAngle) * blOH });
        }
        else {
            const center = findCenter();
            const others = atoms.filter(a => a.id !== center.id);
            targets.push({ atom: center, tx: cx, ty: cy });
            for (let i = 0; i < others.length; i++) {
                const a = (i / others.length) * Math.PI * 2 - Math.PI / 2;
                const bl = getBondLength(center.sym, others[i].sym);
                targets.push({ atom: others[i], tx: cx + Math.cos(a) * bl, ty: cy + Math.sin(a) * bl });
            }
        }

        return targets;
    }

    // ---- 3D Molecule Viewer ----
    function show3DMolecule(mol, containerEl) {
        if (!mol.coords3d || !mol.bonds3d) return;
        if (typeof THREE === 'undefined') return;

        const w = containerEl.clientWidth || 300;
        const h = containerEl.clientHeight || 300;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        containerEl.appendChild(renderer.domElement);

        // OrbitControls
        let controls = null;
        if (THREE.OrbitControls) {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.enablePan = false;
            controls.minDistance = 2;
            controls.maxDistance = 15;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.5;
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 5, 4);
        scene.add(dirLight);
        const pointLight = new THREE.PointLight(0x06b6d4, 0.8, 20);
        pointLight.position.set(-2, 3, 2);
        scene.add(pointLight);

        // Calculate center and scale
        const coords = mol.coords3d;
        let cx = 0, cy = 0, cz = 0;
        coords.forEach(c => { cx += c.x; cy += c.y; cz += c.z; });
        cx /= coords.length; cy /= coords.length; cz /= coords.length;

        let maxDist = 0;
        coords.forEach(c => {
            const d = Math.sqrt((c.x-cx)**2 + (c.y-cy)**2 + (c.z-cz)**2);
            if (d > maxDist) maxDist = d;
        });
        const scale = maxDist > 0 ? 2.0 / maxDist : 1;

        // Create atoms (spheres)
        const atomMeshes = [];
        coords.forEach((coord, i) => {
            const color = CPK_COLORS[coord.sym] || CPK_COLORS.default;
            const radius = ((ATOMIC_RADII[coord.sym] || ATOMIC_RADII.default) * 0.35) * scale;

            // Main sphere
            const geo = new THREE.SphereGeometry(Math.max(radius, 0.15), 32, 32);
            const mat = new THREE.MeshPhongMaterial({
                color: color,
                shininess: 80,
                specular: 0x444444,
                transparent: true,
                opacity: 0.92,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(
                (coord.x - cx) * scale,
                (coord.y - cy) * scale,
                (coord.z - cz) * scale
            );
            scene.add(mesh);
            atomMeshes.push(mesh);

            // Glow sphere
            const glowGeo = new THREE.SphereGeometry(Math.max(radius, 0.15) * 1.4, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.12,
            });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.position.copy(mesh.position);
            scene.add(glowMesh);

            // Electron cloud particles
            const particleCount = Math.min(coord.sym === 'H' ? 4 : 8, 12);
            const pGeo = new THREE.BufferGeometry();
            const pPositions = new Float32Array(particleCount * 3);
            for (let j = 0; j < particleCount; j++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const pr = (Math.max(radius, 0.15) + 0.1 + Math.random() * 0.15);
                pPositions[j*3] = pr * Math.sin(phi) * Math.cos(theta);
                pPositions[j*3+1] = pr * Math.sin(phi) * Math.sin(theta);
                pPositions[j*3+2] = pr * Math.cos(phi);
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.04, transparent: true, opacity: 0.6 });
            const pMesh = new THREE.Points(pGeo, pMat);
            pMesh.position.copy(mesh.position);
            pMesh.userData = { basePositions: pPositions.slice(), center: mesh.position.clone() };
            scene.add(pMesh);
        });

        // Create bonds (cylinders)
        mol.bonds3d.forEach(bond => {
            const p1 = atomMeshes[bond.a].position;
            const p2 = atomMeshes[bond.b].position;
            const order = bond.order || 1;

            const dir = new THREE.Vector3().subVectors(p2, p1);
            const length = dir.length();
            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

            // Calculate perpendicular for multi-bond offset
            const up = new THREE.Vector3(0, 1, 0);
            const cross = new THREE.Vector3().crossVectors(dir, up).normalize();
            if (cross.length() < 0.01) cross.set(1, 0, 0);

            const bondSpacing = 0.08;

            for (let i = 0; i < order; i++) {
                const offset = (i - (order - 1) / 2) * bondSpacing;
                const bondGeo = new THREE.CylinderGeometry(0.04, 0.04, length, 8);
                const bondMat = new THREE.MeshPhongMaterial({
                    color: 0x88ccdd,
                    shininess: 30,
                    transparent: true,
                    opacity: 0.7,
                });
                const bondMesh = new THREE.Mesh(bondGeo, bondMat);

                // Position and orient
                const offsetVec = cross.clone().multiplyScalar(offset);
                bondMesh.position.copy(mid).add(offsetVec);

                // Orient cylinder to point from p1 to p2
                const axis = new THREE.Vector3(0, 1, 0);
                const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir.clone().normalize());
                bondMesh.quaternion.copy(quaternion);

                scene.add(bondMesh);
            }

            // Shared electron particles on bond
            if (order >= 1) {
                const ePCount = order * 2;
                const eGeo = new THREE.BufferGeometry();
                const ePos = new Float32Array(ePCount * 3);
                for (let j = 0; j < ePCount; j++) {
                    const t = (j + 0.5) / ePCount;
                    ePos[j*3] = p1.x + dir.x * t;
                    ePos[j*3+1] = p1.y + dir.y * t;
                    ePos[j*3+2] = p1.z + dir.z * t;
                }
                eGeo.setAttribute('position', new THREE.BufferAttribute(ePos, 3));
                const eMat = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.06, transparent: true, opacity: 0.5 });
                const eMesh = new THREE.Points(eGeo, eMat);
                eMesh.userData = { bondStart: p1.clone(), bondDir: dir.clone(), count: ePCount };
                scene.add(eMesh);
            }
        });

        // Camera position
        camera.position.set(0, 0, maxDist * scale * 3 + 3);
        camera.lookAt(0, 0, 0);

        // Animation loop
        let animId = null;
        let isDisposed = false;
        const clock = new THREE.Clock();

        function animate() {
            if (isDisposed) return;
            animId = requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();

            // Animate electron cloud particles (orbit)
            scene.traverse(obj => {
                if (obj.isPoints && obj.userData.basePositions) {
                    const positions = obj.geometry.attributes.position.array;
                    const base = obj.userData.basePositions;
                    for (let i = 0; i < positions.length; i += 3) {
                        const angle = elapsed * 1.5 + i;
                        const r = 0.03;
                        positions[i] = base[i] + Math.sin(angle) * r;
                        positions[i+1] = base[i+1] + Math.cos(angle * 0.7) * r;
                        positions[i+2] = base[i+2] + Math.sin(angle * 1.3) * r;
                    }
                    obj.geometry.attributes.position.needsUpdate = true;
                }
                // Animate bond electrons (oscillate)
                if (obj.isPoints && obj.userData.bondStart) {
                    const positions = obj.geometry.attributes.position.array;
                    const { bondStart, bondDir, count } = obj.userData;
                    for (let j = 0; j < count; j++) {
                        const baseT = (j + 0.5) / count;
                        const oscillation = Math.sin(elapsed * 2 + j * 1.5) * 0.1;
                        const t = baseT + oscillation;
                        positions[j*3] = bondStart.x + bondDir.x * t;
                        positions[j*3+1] = bondStart.y + bondDir.y * t;
                        positions[j*3+2] = bondStart.z + bondDir.z * t;
                    }
                    obj.geometry.attributes.position.needsUpdate = true;
                }
            });

            if (controls) controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Stop auto-rotate on user interaction
        if (controls) {
            renderer.domElement.addEventListener('pointerdown', () => {
                controls.autoRotate = false;
            });
            renderer.domElement.addEventListener('pointerup', () => {
                setTimeout(() => { controls.autoRotate = true; }, 3000);
            });
        }

        // Return cleanup function
        return () => {
            isDisposed = true;
            if (animId) cancelAnimationFrame(animId);
            renderer.dispose();
            scene.traverse(obj => {
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });
            if (renderer.domElement.parentElement) {
                renderer.domElement.remove();
            }
        };
    }

    // ---- Success Handler ----
    function onMoleculeSuccess(mol) {
        fieldAtoms.forEach(a => a.el.style.boxShadow = '');
        score += mol.points;
        scoreDisplay.textContent = 'SCORE: ' + score;
        completedMissions.add(mol.formula);
        updateMissionCounter();
        playSound('success');
        spawnParticles();
        screenFlash();

        // Cleanup previous 3D viewer
        if (mol3dCleanup) { mol3dCleanup(); mol3dCleanup = null; }

        const has3D = mol.coords3d && mol.bonds3d && typeof THREE !== 'undefined';
        const hasAdvanced = mol.hybridization || mol.vsepr;

        const bondTypeStr = mol.bondType === 'ionic' ? t('ionicBond') : mol.bondType === 'metallic' ? t('metallicBond') : t('covalentBond');
        moleculeCard.innerHTML = `
            <div class="card-emoji">${mol.emoji}</div>
            <div class="card-mol-name">${getMolName(mol)} (${currentLang === 'en' ? mol.kr : mol.en})</div>
            <div class="card-mol-en">${mol.formula}</div>
            <div class="card-points">+${mol.points}${t('points')}</div>
            ${has3D ? `<div class="mol3d-container" id="mol3dContainer"><div class="mol3d-label">${t('drag3d')}</div></div>` : ''}
            ${hasAdvanced ? `
            <div class="detail-toggle" id="detailToggle">
                <button class="active" data-mode="basic">${t('basic')}</button>
                <button data-mode="advanced">${t('advanced')}</button>
            </div>` : ''}
            <div class="card-details" id="cardDetailsBasic">
                <strong>${t('formula')}:</strong> ${mol.formula}<br>
                <strong>${t('structure')}:</strong> ${mol.structure || '-'}<br>
                <strong>${t('bondType')}:</strong> ${bondTypeStr}
                ${mol.molarMass ? `<br><strong>${t('molarMass')}:</strong> ${mol.molarMass} g/mol` : ''}
            </div>
            ${hasAdvanced ? `
            <div class="card-details" id="cardDetailsAdvanced" style="display:none;">
                <strong>${t('formula')}:</strong> ${mol.formula}<br>
                <strong>${t('structure')}:</strong> ${mol.structure || '-'}<br>
                <strong>${t('bondType')}:</strong> ${bondTypeStr}<br>
                <strong>${t('vsepr')}:</strong> ${mol.vsepr || '-'}<br>
                <strong>${t('hybridization')}:</strong> ${mol.hybridization || '-'}<br>
                <strong>${t('polarity')}:</strong> ${mol.polarity || '-'}<br>
                <strong>${t('enDiff')}:</strong> ${mol.electronegativityDiff != null ? mol.electronegativityDiff : '-'}<br>
                <strong>${t('bondEnergy')}:</strong> ${mol.bondEnergy ? mol.bondEnergy + ' kJ/mol' : '-'}<br>
                <strong>${t('molarMass')}:</strong> ${mol.molarMass ? mol.molarMass + ' g/mol' : '-'}<br>
                <strong>${t('mp')}:</strong> ${mol.mp != null ? mol.mp + '°C' : '-'}<br>
                <strong>${t('bp')}:</strong> ${mol.bp != null ? mol.bp + '°C' : '-'}<br>
                <strong>${t('state')}:</strong> ${mol.state || '-'}<br>
                <strong>${t('color')}:</strong> ${mol.color || '-'}
            </div>` : ''}
            <div class="card-info">💡 ${mol.info}</div>
            <button class="next-btn" onclick="nextMission()">${t('nextMission')}</button>
        `;
        modalOverlay.classList.add('show');

        // Initialize 3D viewer
        if (has3D) {
            setTimeout(() => {
                const container = document.getElementById('mol3dContainer');
                if (container) {
                    mol3dCleanup = show3DMolecule(mol, container);
                }
            }, 100);
        }

        // Detail toggle
        if (hasAdvanced) {
            const toggle = document.getElementById('detailToggle');
            if (toggle) {
                toggle.addEventListener('click', (e) => {
                    const btn = e.target.closest('button');
                    if (!btn) return;
                    playSound('click');
                    toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.dataset.mode;
                    const basic = document.getElementById('cardDetailsBasic');
                    const adv = document.getElementById('cardDetailsAdvanced');
                    if (basic) basic.style.display = mode === 'basic' ? 'block' : 'none';
                    if (adv) adv.style.display = mode === 'advanced' ? 'block' : 'none';
                });
            }
        }
    }

    function nextMission() {
        playSound('click');
        modalOverlay.classList.remove('show');
        if (mol3dCleanup) { mol3dCleanup(); mol3dCleanup = null; }

        currentMissionIdx++;

        if (currentMissionIdx >= missionQueue.length) {
            showComplete();
            return;
        }

        playSound('levelup');
        clearField();
        updateMissionUI();
    }

    function showComplete() {
        playSound('levelup');
        if (mol3dCleanup) { mol3dCleanup(); mol3dCleanup = null; }
        moleculeCard.innerHTML = `
            <div class="card-emoji">🎉</div>
            <div class="complete-title">${t('allComplete')}</div>
            <div class="complete-sub">${t('greatChemist')}</div>
            <div class="final-score">${score}</div>
            <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px;">${t('totalScore')}</div>
            <button class="next-btn" onclick="restartGame()">${t('restart')}</button>
        `;
        modalOverlay.classList.add('show');
    }

    function restartGame() {
        playSound('click');
        modalOverlay.classList.remove('show');
        if (mol3dCleanup) { mol3dCleanup(); mol3dCleanup = null; }
        score = 0;
        currentMissionIdx = 0;
        completedMissions.clear();
        scoreDisplay.textContent = 'SCORE: 0';
        buildMissionQueue();
        clearField();
        updateMissionUI();
    }

    // ---- Mission UI ----
    function updateMissionUI() {
        const mol = getCurrentMolecule();
        if (!mol) return;

        const formulaDisplay = mol.formula;
        missionText.innerHTML = `${t('makeMission')(getMolName(mol))} <span class="formula">(${formulaDisplay})</span>`;
        missionEmoji.textContent = mol.emoji;

        let hintHTML = '';
        for (const [sym, count] of Object.entries(mol.atoms)) {
            const el = ELEMENTS.find(e => e.sym === sym);
            if (el) {
                hintHTML += `<span class="hint-atom" style="color:${el.color};border-color:${el.color}30">${sym} ×${count}</span>`;
            }
        }
        missionHint.innerHTML = hintHTML;
        updateMissionCounter();
    }

    function updateMissionCounter() {
        const total = missionQueue.length || filteredMolecules.length;
        missionCounter.textContent = `${completedMissions.size}/${total} ${t('missionOf')}`;
    }

    // ---- Noble Gas Field Effect (placed on field) ----
    function showNobleGasFieldEffect(atomData, elData) {
        playSound('success');
        atomData.el.classList.add('noble-glow');

        const popup = document.createElement('div');
        const px = atomData.x, py = atomData.y - (atomData.radius || 27) - 50;
        popup.style.cssText = `
            position:absolute; left:${Math.min(Math.max(10, px - 110), buildField.clientWidth - 240)}px; top:${Math.max(10, py)}px;
            background:rgba(139,92,246,0.95); color:#fff;
            padding:14px 18px; border-radius:14px; z-index:100;
            font-family:'Jua',sans-serif; font-size:14px; line-height:1.5;
            white-space:pre-line; max-width:220px;
            box-shadow:0 0 30px rgba(139,92,246,0.4);
            animation:noblePopIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events:none;
        `;
        popup.textContent = t('nobleMsg');

        // 파티클 이펙트 (반짝이)
        for (let i = 0; i < 8; i++) {
            const spark = document.createElement('div');
            const angle = (i / 8) * Math.PI * 2;
            const dist = 40 + Math.random() * 30;
            spark.style.cssText = `
                position:absolute; width:6px; height:6px; border-radius:50%;
                background:${elData.color || '#8b5cf6'};
                box-shadow:0 0 8px ${elData.color || '#8b5cf6'};
                left:${atomData.x + Math.cos(angle) * dist}px;
                top:${atomData.y + Math.sin(angle) * dist}px;
                z-index:99; pointer-events:none;
                animation:sparkFly 0.6s ease-out forwards;
                opacity:0.8;
            `;
            buildField.appendChild(spark);
            setTimeout(() => spark.remove(), 600);
        }

        buildField.appendChild(popup);
        setTimeout(() => {
            popup.style.transition = 'opacity 0.3s';
            popup.style.opacity = '0';
            setTimeout(() => popup.remove(), 300);
        }, 2500);
    }

    // ---- Clear Field ----
    function clearField() {
        playSound('click');
        fieldAtoms.forEach(a => a.el.remove());
        fieldAtoms = [];
        bonds = [];
        atomIdCounter = 0;
        bondSvg.innerHTML = '';
        // Remove bond electron animations
        buildField.querySelectorAll('.bond-electron, .metallic-electron, .charge-label, .ionic-flash, .electron-trail').forEach(el => el.remove());
        buildField.classList.remove('has-atoms');
        deactivateRemoveMode();
    }

    // ---- Particles ----
    function spawnParticles() {
        const colors = ['#06b6d4', '#10b981', '#8b5cf6', '#f59e0b', '#ec4899'];
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 8;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = (window.innerWidth / 2 - 4) + 'px';
            p.style.top = (window.innerHeight / 2 - 4) + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist = 80 + Math.random() * 200;
            p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 900);
        }
    }

    function screenFlash() {
        const f = document.createElement('div');
        f.className = 'screen-flash';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 500);
    }

    // ---- Legend tooltips ----
    document.querySelectorAll('.legend-item[data-desc]').forEach(item => {
        const desc = document.createElement('div');
        desc.className = 'legend-desc';
        desc.textContent = item.dataset.desc;
        item.appendChild(desc);
    });

    // ---- Free Mode (자유 모드) ----
    let freeMode = false;
    function toggleFreeMode() {
        freeMode = !freeMode;
        const btn = document.getElementById('freeModeBtn');
        if (freeMode) {
            btn.style.background = 'rgba(16,185,129,0.3)';
            btn.style.borderColor = '#10b981';
            btn.textContent = t('freeModeOn');
            document.getElementById('missionText').textContent = t('freeModeMsg');
            document.getElementById('missionEmoji').textContent = '🧪';
            document.getElementById('missionHint').innerHTML = '';
        } else {
            btn.style.background = '';
            btn.style.borderColor = '';
            btn.textContent = t('freeMode');
            updateMissionUI();
        }
    }

    // 자유 모드에서 분자 자동 인식
    const origCheckMolecule = typeof checkMolecule === 'function' ? checkMolecule : null;
    function checkFreeModeMolecule() {
        if (!freeMode || fieldAtoms.length === 0) return;
        // 현재 원자 카운트
        const counts = {};
        fieldAtoms.forEach(a => {
            counts[a.el.sym] = (counts[a.el.sym] || 0) + 1;
        });
        // MOLECULE_DB에서 매칭
        const db = typeof MOLECULE_DB !== 'undefined' ? MOLECULE_DB : [];
        for (const mol of db) {
            const mAtoms = mol.atoms;
            const keys1 = Object.keys(counts).sort().join(',');
            const keys2 = Object.keys(mAtoms).sort().join(',');
            if (keys1 !== keys2) continue;
            let match = true;
            for (const k of Object.keys(mAtoms)) {
                if (counts[k] !== mAtoms[k]) { match = false; break; }
            }
            if (match) {
                // 발견!
                playSound('success');
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position:fixed;top:20%;left:50%;transform:translateX(-50%);
                    background:rgba(16,185,129,0.95);color:#fff;
                    padding:16px 24px;border-radius:16px;z-index:200;
                    font-family:'Jua',sans-serif;font-size:18px;text-align:center;
                    box-shadow:0 0 40px rgba(16,185,129,0.4);
                    animation:noblePopIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
                `;
                toast.innerHTML = t('freeFound')(getMolName(mol), mol.formula, mol.info || '');
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.transition = 'opacity 0.5s';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 4000);
                return;
            }
        }
    }

    // ---- Init ----
    buildPeriodicTable();
    buildMissionQueue();
    updateMissionUI();
    applyI18n();

    </script>
</body>
