<!DOCTYPE html>
<html class="light" lang="ko" style="overflow-y: auto !important; height: auto !important;">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Luna Whale Art Lab - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../../assets/data/i18n.js?v=0312-2330"></script>
    <script src="../../assets/js/app.js?v=0312-2330"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js?v=0312-2330"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js?v=0312-2330"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js?v=0312-2330"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js?v=0312-2330"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js?v=0312-2330"></script>
    <script src="../../assets/js/firebase-auth.js?v=0312-2330"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: { "display": ["Lexend", "sans-serif"] },
                    borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
                },
            },
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #f8fafc;
            /* Allow natural page scrolling */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Toast */
        .login-toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            z-index: 99999;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 90vw;
            text-align: center;
        }

        .login-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .login-toast.error {
            background: #dc2626;
        }

        .login-toast.success {
            background: #059669;
        }

        /* Loading spinner */
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            right: 16px;
            top: 50%;
            margin-top: -9px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Role card */
        .role-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .role-card.active {
            border-color: #1337ec !important;
            background: rgba(19, 55, 236, 0.05) !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <div class="flex flex-col items-center justify-start min-h-screen py-8 px-4 sm:py-16">

        <!-- Main Card Container -->
        <div
            class="w-full max-w-[440px] bg-white rounded-[2rem] shadow-[0_24px_70px_-12px_rgba(19,55,236,0.12)] border border-slate-100 overflow-visible">

            <!-- Top Nav -->
            <div class="flex items-center p-4">
                <div class="flex items-center gap-2">
                    <img src="../../logo.png" alt="Logo" class="w-8 h-8 rounded-lg object-contain">
                </div>
                <div class="flex-1 flex justify-center">
                    <div class="flex bg-slate-100 rounded-full p-1 gap-1">
                        <button id="tab-signup" onclick="showTab('signup')"
                            class="px-4 py-1.5 rounded-full text-xs font-bold bg-primary text-white transition-all">회원가입</button>
                        <button id="tab-login" onclick="showTab('login')"
                            class="px-4 py-1.5 rounded-full text-xs font-bold text-slate-500 transition-all">로그인</button>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="px-6 sm:px-8 pb-8">

                <!-- Logo & Title -->
                <div class="pt-2 pb-6 flex flex-col items-center">
                    <div
                        class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center mb-3 shadow-sm border border-slate-100 overflow-hidden">
                        <img src="../../logo.png" alt="Luna Whale" class="w-full h-full object-contain p-1">
                    </div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900">LUNA WHALE</h1>
                    <p class="text-slate-500 text-[10px] font-medium tracking-widest uppercase">Art Lab</p>
                </div>

                <!-- ═══════ SIGN UP ═══════ -->
                <div id="panel-signup">
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-slate-600 mb-2">역할 선택 <span
                                class="text-red-400">*</span></label>
                        <div class="grid grid-cols-3 gap-2">
                            <div onclick="setRole('student')" id="role-student"
                                class="role-card flex flex-col items-center gap-1 p-2.5 rounded-xl border-2 border-slate-200">
                                <span class="text-xl">🎨</span>
                                <span class="text-[11px] font-bold text-slate-800">학생</span>
                                <span class="text-[9px] text-slate-400">Student</span>
                            </div>
                            <div onclick="setRole('parent')" id="role-parent"
                                class="role-card active flex flex-col items-center gap-1 p-2.5 rounded-xl border-2 border-slate-200">
                                <span class="text-xl">👨&zwj;👩&zwj;👧</span>
                                <span class="text-[11px] font-bold text-slate-800">학부모</span>
                                <span class="text-[9px] text-slate-400">Parent</span>
                            </div>
                            <div onclick="setRole('teacher')" id="role-teacher"
                                class="role-card flex flex-col items-center gap-1 p-2.5 rounded-xl border-2 border-slate-200">
                                <span class="text-xl">✏️</span>
                                <span class="text-[11px] font-bold text-slate-800">강사</span>
                                <span class="text-[9px] text-slate-400">Teacher</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <button id="btn-google-signup" onclick="doGoogleSignup()"
                            class="flex w-full items-center justify-center gap-3 rounded-xl h-12 bg-white hover:bg-slate-50 text-slate-900 text-sm font-bold transition-all shadow-sm border border-slate-200">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            Google로 가입하기
                        </button>

                        <div class="flex items-center py-2">
                            <div class="flex-1 border-t border-slate-100"></div>
                            <span class="px-3 text-slate-400 text-[10px] font-medium">또는 이메일로 가입</span>
                            <div class="flex-1 border-t border-slate-100"></div>
                        </div>

                        <div class="space-y-2">
                            <input type="text" id="signup-name" placeholder="이름 (닉네임)"
                                class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                            <input type="email" id="signup-email" placeholder="이메일 주소"
                                class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                            <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)"
                                class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                            <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인"
                                class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                        </div>

                        <button id="btn-email-signup" onclick="doEmailSignup()"
                            class="w-full h-12 bg-primary hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-primary/20 transition-all">
                            회원가입
                        </button>
                    </div>
                    <p class="mt-4 text-center text-xs text-slate-500">
                        이미 계정이 있으신가요? <a onclick="showTab('login')" href="javascript:void(0)"
                            class="font-bold text-primary hover:underline">로그인</a>
                    </p>
                </div>

                <!-- ═══════ LOG IN ═══════ -->
                <div id="panel-login" class="hidden">
                    <div class="space-y-4">
                        <button id="btn-google-login" onclick="doGoogleLogin()"
                            class="flex w-full items-center justify-center gap-3 rounded-xl h-12 bg-white hover:bg-slate-50 text-slate-900 text-sm font-bold transition-all shadow-sm border border-slate-200">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            Google로 로그인
                        </button>

                        <div class="flex items-center">
                            <div class="flex-1 border-t border-slate-100"></div>
                            <span class="px-3 text-slate-400 text-[10px] font-medium">또는</span>
                            <div class="flex-1 border-t border-slate-100"></div>
                        </div>

                        <div class="space-y-3">
                            <input type="email" id="login-email" placeholder="이메일 주소"
                                class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                            <div class="space-y-1">
                                <input type="password" id="login-password" placeholder="비밀번호"
                                    class="w-full h-11 rounded-xl border border-slate-200 px-4 text-sm focus:border-primary outline-none">
                                <div class="flex justify-end">
                                    <button onclick="doPasswordReset()" class="text-[10px] font-bold text-primary">비밀번호
                                        찾기</button>
                                </div>
                            </div>
                        </div>

                        <button id="btn-email-login" onclick="doEmailLogin()"
                            class="w-full h-12 bg-primary hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-primary/20 transition-all">
                            로그인
                        </button>
                    </div>
                    <p class="mt-6 text-center text-xs text-slate-500">
                        Luna Whale이 처음이신가요? <a onclick="showTab('signup')" href="javascript:void(0)"
                            class="font-bold text-primary hover:underline">가입하기</a>
                    </p>
                </div>
            </div>

            <!-- Footer Bar -->
            <div class="h-1.5 w-full bg-gradient-to-r from-purple-600 via-blue-400 to-primary rounded-b-[2rem]"></div>
        </div>
    </div>

    <!-- Hidden Admin Entry -->
    <div ondblclick="openAdminModal()" class="fixed bottom-0 right-0 w-20 h-20 z-10 cursor-default"></div>
    <div id="admin-modal"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;padding:20px;">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-black mb-4">Admin Access</h2>
            <div class="space-y-3">
                <input id="admin-email" type="text" placeholder="Admin ID" class="w-full h-11 border rounded-xl px-4">
                <input id="admin-pw" type="password" placeholder="Password" class="w-full h-11 border rounded-xl px-4">
                <button onclick="doAdminLogin()"
                    class="w-full h-11 bg-slate-900 text-white rounded-xl font-bold">Acccess</button>
                <button onclick="closeAdminModal()" class="w-full h-11 text-slate-400 font-bold">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'parent';

        function showLoginToast(msg, type = 'info') {
            document.querySelectorAll('.login-toast').forEach(t => t.remove());
            const t = document.createElement('div');
            t.className = `login-toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 4000);
        }

        function showTab(tab) {
            const signup = document.getElementById('panel-signup');
            const login = document.getElementById('panel-login');
            const tabSu = document.getElementById('tab-signup');
            const tabLi = document.getElementById('tab-login');

            if (tab === 'signup') {
                signup.style.display = 'block';
                login.style.display = 'none';
                tabSu.className = 'px-4 py-1.5 rounded-full text-xs font-bold bg-primary text-white transition-all';
                tabLi.className = 'px-4 py-1.5 rounded-full text-xs font-bold text-slate-500 transition-all';
            } else {
                signup.style.display = 'none';
                login.style.display = 'block';
                tabLi.className = 'px-4 py-1.5 rounded-full text-xs font-bold bg-primary text-white transition-all';
                tabSu.className = 'px-4 py-1.5 rounded-full text-xs font-bold text-slate-500 transition-all';
            }
        }

        function setRole(role) {
            currentRole = role;
            ['student', 'parent', 'teacher'].forEach(r => {
                const el = document.getElementById('role-' + r);
                if (r === role) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function goHome() {
            window.location.href = window.location.protocol === 'file:' ? '../../index.html' : '/index.html';
        }

        async function doEmailSignup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const pw = document.getElementById('signup-password').value;
            const pw2 = document.getElementById('signup-password-confirm').value;

            if (!name || !email || !pw) { showLoginToast('⚠️ 모든 정보를 입력해 주세요.', 'error'); return; }
            if (pw.length < 6) { showLoginToast('⚠️ 비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
            if (pw !== pw2) { showLoginToast('⚠️ 비밀번호가 일치하지 않습니다.', 'error'); return; }

            const btn = document.getElementById('btn-email-signup');
            btn.classList.add('btn-loading');
            const r = await LunaAuth.signUpWithEmail(email, pw, name, currentRole);
            btn.classList.remove('btn-loading');
            if (r.success) setTimeout(goHome, 1000);
        }

        async function doEmailLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pw = document.getElementById('login-password').value;
            if (!email || !pw) { showLoginToast('⚠️ 정보를 입력해 주세요.', 'error'); return; }

            const btn = document.getElementById('btn-email-login');
            btn.classList.add('btn-loading');
            const r = await LunaAuth.loginWithEmail(email, pw);
            btn.classList.remove('btn-loading');
            if (r.success) setTimeout(goHome, 800);
        }

        async function doGoogleSignup() {
            const r = await LunaAuth.loginWithGoogle(currentRole);
            if (r.success) setTimeout(goHome, 800);
        }

        async function doGoogleLogin() {
            const r = await LunaAuth.loginWithGoogle();
            if (r.success) setTimeout(goHome, 800);
        }

        async function doPasswordReset() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) { showLoginToast('⚠️ 이메일을 입력해 주세요.', 'error'); return; }
            await LunaAuth.sendPasswordReset(email);
        }

        function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }
        function doAdminLogin() { /* Same as before */ }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.firebase && firebase.auth) {
                firebase.auth().onAuthStateChanged(user => { if (user) goHome(); });
            }
        });
    </script>
</body>

</html>
